body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第五世之餘南嶽下後第四世之餘增收京兆府米和尚亦曰米大師又曰米胡嗣溈山問僧近離甚處僧曰藥山師曰藥山老子近日如何曰大似一片頑石師曰得漝麼鄭重曰也無你提掇處師曰非但藥山米胡也漝麼僧近前顧視而立師曰看看頑石動也其僧便出頌曰米胡好片頑石多少遊人不識及乎衲僧一見不免將南作北大溈增收米胡令僧去問仰山曰今時人還假悟也無仰曰悟即不無爭奈落在第二頭師深肯之頌曰碧岫峯頭借問人指山窮處未安身雖然免得重行令爭似靈苗不犯春投子青第二頭邊破悟迷快須撥寺捨筌成兮未盡成駢拇智者難知覺噬嚌兔老氷盤秋露泣烏寒玉樹晚風凄時來大仰辨真假痕玷渾無貴玉圭天童覺悟人千個道無憂肎信遭他第二頭寂寞山花寒食後夕陽西去水東流龍門遠增收襄州王敬初常侍見溈山視事次米和尚至公乃舉筆示之米曰還判得虗空否公擲筆入宅更不復出米致疑明日憑鼓山供養主入探其意米亦隨至潛在屏蔽間偵恥慶切伺供養主纔坐問曰昨日米和尚有甚麼言句便不相見公曰師子齩人韓獹逐磈米聞此語即省前謬遽出朗笑曰我會也我會也公曰會即不無你試道看米曰請常侍舉公竪起隻筯米曰這野狐精公曰這漢徹也頌曰賓主機先有路通筆端不是判虗空筯頭再運回天力千聖齊教立下風癡絕冲常侍舉筆萬事皆吉直下承當急急如律米胡參官忘前失後且告貴人為我相救癡禪妙機輪活脫走珠盤妙處都盧在筆端竪起依然還放下靈鋒寶劍倚天寒偃溪聞增收王常侍與臨濟至僧堂乃問這一堂僧還看經也無濟云不看經公曰還習禪也無濟云不習禪公曰經又不看禪又不習究竟作什麼濟云總教成佛作祖去公曰金屑雖貴落眼成翳又作麼生濟曰我將謂你是箇俗漢頌曰世出世間希有事顯露須憑過量人只將補𫋴調羮手撥轉如來正法輪徑山杲一著高一著一步闊一步明眼人前猶涉露布鳳棲不在梧桐樹松源岳事到無心不苟欺烏玄鵠白尚懷疑自非親見黃頭老爭敢逢人泄漏機虗堂愚增收王常侍參睦州一日師問何故入院遲公曰看馬打毬所以來遲州云人打毬馬打毬公曰人打毬州云人困麼公曰困曰馬困麼公曰困曰露柱困麼公茫然無對歸至私第中夜忽有省明日見州曰某會得昨日事也州云露柱困麼公曰困州遂肯之頌曰人困馬困未是困露柱之困始是困好於言下證無常莫向言中尋尺寸百丈若無雙耳聾臨濟爭解領三頓盡將業識作流傳此道今人棄如糞龍門遠看人騎馬打毬子不覺今朝入院遲官路雪殘春正好江梅著意要題詩懶菴樞蘄州三角山法遇菴主嗣溈山因荒亂魁師入山執刃而問和尚有甚財寶師曰僧家之寶非君所宜魁曰是何寶師振威一喝魁不悟以刃加之頌曰師將真寶濟兇人豈謂行恩反害身真寶與伊元不識而今更是好訴貧洞山聰深山深處隨時荒無價之珍不隱藏纔遇兇人便分付兇人少鑒返加傷正覺逸續收菴僧真實濟兇人一喝分明出差珍莫道賊魁非別者當頭雪刃用來親天目禮六祖下第六世之一南嶽下第五世之一臨濟魏府興化存獎禪師嗣臨濟師在三聖會裏為首座常曰我向南方行脚一遭拄杖頭上不曾撥著一個會佛法底人後大覺聞舉遂曰作麼生得風吹到大覺門裏來師後到大覺為院主一日覺喚院主我聞你道向南方行脚一遭拄杖頭不曾撥著一個會佛法底你憑個甚麼道理與麼道師便喝覺便打師又喝覺又打師來日從法堂過覺云我直下疑你昨日這兩喝師又喝覺又打師再喝覺又打師曰存獎於三聖師兄處學得個賓主句總被師兄折倒了也願與存獎個安樂法門覺曰這瞎漢來這裏納敗缺脫下納衣痛打一頓師於言下薦得臨濟於黃檗處喫棒底道理師後開堂日拈香曰此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師頌曰太孤太賒日杲杲璞玉渾金惡種草無負平生雪此冤不如一陣香風掃南巖勝劒為不平離寶匣藥因救病出金缾南方自古清如鏡何必無端用甲兵雪巖欽興化因後唐莊宗幸河北回魏府行宮詔師問曰朕取中原獲得一寶未曾有人酬價師曰請陛下寶看帝以兩手舒幞頭脚師曰君王之寶誰敢酬價玄覺徵云且道興化肯莊宗不肯莊宗若肯莊宗興化眼在甚麼處若不肯莊宗過在甚麼處頌曰君王之寶實難酬興化形言下一籌兩手展開幞頭脚勑書挂在鳳凰樓北塔祚北蕃王子彎弓射南國將軍仰面看沙上空餘斜影在翩翩直自入雲端白雲端君王之寶誰解尋討不許夜行投明須到莊宗所得未為真精鑑還他興化老地藏恩君王底事語知音天下傾誠葵藿心拈出中原無價寶不同趙璧與燕金天童覺二中原之寶呈興化一段光明難定價帝業堪為萬世師金輪景御四天下展手相呈老比丘至尊之寶敢輕酬滿庭和氣龍顏悅爭奈胡僧咲點頭上方益中原收至寶合國不能藏一入相如手佳聲滿大唐佛心才續收中原一寶有來由拶得君王引幞頭到此若無青白眼當機誰敢謾輕酬笑翁堪幞頭舒起君王寶司空見慣興化老千古君臣際會時落花滿地無人掃北海心收得中原無價珍幞頭拈起露全身勞他興化重酬價八兩元來是半斤尼閑林英君王寶自難酬價興化何曾敢借看天地既無私蓋載至今留得鎮中原閑極雲興化示眾云今日不用如何若何便請單刀直入興化與你證據時旻德長老出禮拜起便喝師亦喝德又喝師亦喝德禮拜師曰若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用便下座頌曰龍虎相交是底時未容擬議已參差分明一喝不作用却使禪人特地疑海印信獰龍出水虎離山四起風旋萬頃烟若具阿那律正眼橫身三界背摩天雲溪恭單刀直入不須論擬議之間賓主分不得放他旻德過須知興化棒頭親鼓山珪暗中擕手上高山及至天明各自行無限途中未歸客明明開眼墮深坑徑山杲續收旻德一喝如雷響興化一喝響如雷錦袍玉帶真瀟灑記得當年老萬回懶菴樞握七星刀尋作者倒司農印對冤讎當陽一句分賓主九曲黃河水逆流南巖勝一喝兩喝全機出沒賓主歷然未免俱瞎半夜摸烏龜明月照積雪雪菴瑾同時照用不同時權實雙行作者知有得雖然亦有失還他龍虎自交馳雪巖欽興化因僧問四方八面來時如何師曰打中間底僧便禮拜師曰昨日是箇村齋中途遇一陣卒風暴雨却向古廟裏軃避得過頌曰此問非常觸忤人如禽空噪荊榛須知興化奔馳疾值雨何曾濕著身洞山聰浪拏雲勢莫猜漁翁倚掉傍巖隈江邊依舊空歸去帝里同風不到來海印信一不是二不成落花芳草裏啼鶯閑庭雨歇夜初靜片月還從海上生晦堂心一陣狂風暴雨來却於古廟且閑隈雖然打入鬼窟裏吞炭藏身又一回鼓山珪古廟裏頭迴避得紙錢堆裏暗嗟吁閑神野鬼皆驚怕只為渠儂識梵書徑山杲續收天生白額南山虎牙爪曾當八面風月落三更穿市過癡人投曉覓行蹤雪堂行剜心剖腹繼傳燈鬼面神頭打葛藤傑出諸方無等匹也知只是赴齋僧南巖勝四方八面沒邊疆暴雨狂風無處藏古廟裏頭休軃避移舟別有好商量天目禮塞北烟塵終載靜江南花木四時榮不須特地分疆界萬里山河似掌平虗堂愚興化謂克賓維那曰汝不久為唱導之師賓曰不入這保社師曰會了不入不會了不入曰總不與麼師便打曰克賓維那法戰不勝罰錢五貫設饡飯一堂次日師自白槌曰克賓維那法戰不勝不得喫飯即便出院頌曰二虎爭戰俱用勢力一陷穽中不能返擲若返擲天下獵人無處覓海印信克賓法戰挫英雄興化嚴行振祖風棒下直明無生忍莫教知解入塵籠照覺總丈夫當斷不解斷興化為人徹底漢已後從教眼自開棒了罰錢趂出院真淨文主中主問賓中賓賓主分明到底親有理罰錢無說處太行山下淚霑巾佛國白得失是非都莫問縱橫收放在當人失錢遭罪尋常事休把條章說故新圓通仙克賓興化令雙行白髮通身透頂生穿過衲僧青白眼儘教天下競頭爭佛心才丹山生鸑鷟師子產狻猊棒下摩醯眼徒誇第一機徑山杲法戰從來許克賓掣旗奪鼓兩分明直須盡法方知愧老漢當年要話行鼓山珪增收罰錢出院眾人皆見有理難伸風流滿面直饒興化全提未免令行一半這一半明眼衲僧點檢看冶父川漢高拜將務決勝非韓誰敢當茲任赤旛高竪化城降皇在盤兮不在秤南巖勝赫日轟迅雷六月飄霜雪興化老古錐不妨太孤絕金毛哮吼亂峯前百獸聞之皆腦裂懶菴需罰錢出院揚家醜興化聱頭遇克賓父子不傳真妙訣棒頭敲出玉麒麟佛照光興化打克賓一棒一條痕古人雖已往留得典刑存三十年後幾個知恩尼無著總興化棒頭轟霹靂克賓脚下走塵煙若無塞外將軍令那得嘉名四海傳誰菴演主賓會合風雲異醉後添杯禮義全棒打自家親骨肉叢林扛鼓返成冤或菴體興化逐克賓觀音戴鬼面靴裏動指頭未免傍人見湛堂深棒頭有路透玄津徹底何曾打克賓雪後始知松栢操夜深方見把針人肯堂充興化打克賓猛虎驀腰騎養子不及父家門一世衰破菴先家法森嚴特異常親生父子沒商量罰錢打了趂出院橄欖點茶滋味長野雲南法戰場開驗克賓解施武略對將軍如何有罪全無賞待展奇謀自䇿勛天目禮興化打克賓言親語不親棒頭如雨點敲出玉麒麟瞎驢見增附雪竇云克賓要承嗣興化罰錢出院且致却須索取這頓棒始得且問諸人棒既喫了作麼生索得雪竇要斷不平之事今夜與克賓雪屈以拄杖一時趕散頌曰克賓維那法戰不勝曾因國離披金甲後來出世法嗣興化不為家貧賣寶刀興化臂健尚嫌弓力軟雪竇眼明猶識陣雲高瞎堂遠增收興化示眾曰我聞長廊下也喝後架裏也喝諸子汝莫盲喝亂喝直饒喝得興化向虗空裏却撲下來一點氣也無待我蘇息起來向汝道未在何故我未曾向紫羅帳裏撒真珠與汝諸人去在胡喝亂喝作麼頌曰紫羅帳裏撒真珠密意師丞會也無摸象眾盲徒亂說當臺古鏡見差殊海印信興化老也大差三十三天上撲下紫羅帳裏撒真珠古也今也誰酬價得一牛還一馬休說人間光照夜不見錦綉銀香囊直至如今成話欛上方益對眾全提摩竭令豈是閑開兩片皮喝下瞎驢成隊走夢中推倒五須彌徑山杲紫羅帳裏撒真珠禪客相逢總掠虗拍手呵呵開口笑釋迦彌勒是他奴鼓山珪增收興化見同參來纔上法堂便喝僧亦喝師又喝僧亦喝師近前拈棒僧又喝師曰你看這瞎漢猶作主在僧擬議師直打下法堂侍者請問適來那僧有甚觸忤和尚師曰他適來也有權也有實也有照也有用及乎我將手向伊面前橫兩橫到這裏却去不得似這般瞎漢不打更待何時侍者禮拜頌曰霹𮦷驚天地那容掩耳聽須知興化老一半是人情鼓山珪鏌鋣在握天魔膽落明眼衲僧休更卜度徑山杲恰如劊子氣雄豪便向咽喉下一刀五臟肝心皆剖出方知王法不相饒退菴休長松不改四時青縱奪當機幾箇明陣敗不禁苕帚掃眼中瞳子面前人劒門分㶑㶑灔灔水光浮不見孤帆不見舟斜陽欲落未落處盡是離人今古愁伊菴權須彌倒卓海水逆流同參相訪作盡冤讎休休明日黃花蝶也愁雪菴瑾驅耕夫牛照即用奪飢人食用即照不得同參把手行安知袖裏有穿竅南巖勝增收興化因僧問軍期急速時如何師曰日料半斤食頌曰離城別閣暗愁時月落星分信馬蹄風掃曉牕林木逈夜深汀岸火光微投子青增收鎮州寶壽第一世沼禪師嗣臨濟因僧問萬境來侵時如何師曰莫管他頌曰老大梢工慣經歷看風使帆果端的任他海獸作波濤直過如飛沒蹤跡海印信萬境來侵莫管伊干戈元是太平基當時踏著來時路月下騰騰信脚歸掩室開增收寶壽因趙州來師在禪牀背面而坐州展坐具禮拜師起身入方丈州收坐具而出頌曰動絃別曲落葉知秋人平不語水平不流只因脚底無覊絆去住縱橫得自由遯菴演增收寶壽因僧問訊師曰萬千諸聖盡不出此方丈內曰祇如古人道大千沙界海中漚未審此方丈向甚麼處著師曰千聖見在曰阿誰證明師擲下拂子僧從西過東立師便打僧曰若不久參焉知端的師曰三十年後此話大行圓悟云寶壽向方丈裏布網張羅這僧向釣餌邊擎頭帶角三度衝浪上來三度被來籠且道他得箇甚麼還會麼重賞之下必有勇夫頌曰捲則渾崙無縫舒則八面生光百千諸佛同處一方轉機輪於掌握奮大用於當場非獨三十年後面前簷蔔馨香佛燈珣增收寶壽因胡釘鉸參師問汝莫是胡釘鉸麼曰不敢師曰還釘得虗空麼曰請和尚打破師便打曰和尚莫錯打某甲師曰向後有多阿師與你點破在胡後到趙州舉前話州曰汝因甚麼被他打曰不知過在甚麼處州曰祇這一縫尚無奈何胡於此有省州曰且釘這一縫頌曰現出虗空眼便花更教打破事如麻直饒指出當堂縫分明子過新羅冶父川直饒釘得這一縫檢點將來非好手可憐兩個老禪翁却向俗人呈家醜月菴果一縫分明在當頭下手難饒君鉸釘得終是不完全鼓山珪增收寶壽問僧甚處來曰西山來師曰見獼猴麼曰見師曰作甚麼伎倆曰見某甲一箇伎倆也作不得師便打頌曰舊人相見話衷心借問西山路徑深對眾直言呈伎倆紅爐鍛鍊要真金汾陽昭西山路上有獼猴嘯雨哀風動客愁忽遇此林師子子萬般伎倆一時休中際能增收寶壽問僧甚處來曰崔禪處來師曰將得崔禪喝來麼曰不曾將得來師曰與麼則不從崔禪來僧便喝師拈棒僧擬議即便打頌曰五湖禪客扣禪關恰似初行學上山騰身欲出青雲外力到峯頭一步難佛鑑懃鎮州三聖院慧然禪師嗣臨濟住後上堂曰我逢人則出出則不為人便下座興化云我逢人則不出出則便為人頌曰騎驢戴笠迎南去躍馬搖鞭向北行兩箇大商俱突曉日高猶聽打三更保寧勇反是羅兮覆是繡弟兄同氣復連枝為人不為成歌曲祖父田園要及時圓通僊城南措大騎驢子市北郎君跨馬兒各各四蹄俱踏地三春同到金明池佛鑑懃出沒由誰卷舒在我搖舌鼓唇分明話墮京兆府天寧璉陽𦦨何曾止得渴畫餅幾時充得飢勸君不用栽荊棘後代兒孫惹著衣徑山杲湖光㶑灔晴偏好山色溟濛雨亦奇若把西湖比西子淡粧濃抹總相宜佛燈珣人貧多智短馬瘦自毛長獨宿雙峯寺同焚一炷香鼓山珪續收兩箇孩兒抱花鼓左邊打了右邊舞一曲兩曲無人會歷歷清風動千古懶菴需乍雨乍晴山裏寺或來或去洞中雲滿天星月明如晝此境此時誰欲分德山清南山鱉鼻蛇觸著兩頭動毒氣要傷人還他貧子弄雪菴瑾黃昏打漿奔城快日午回舟入港遲夜半相逢兩相喝不知蹉過已多時在菴賢二水分流共一源誰知正語却成偏斷腸不是因芳草破壞家門落一邊戴無為三聖因僧問如何是祖師西來意師曰臭肉來蠅興化云破驢脊上足蒼蠅頌曰水母有骨靈龜無殻瞎驢臭肉來於蠅佛意祖意如山岳正覺逸二靈龜有殻水母無骨破驢脊上足蒼蠅曹溪古路行人絕破脊驢多臭肉蠅誰知興化不徒行慣從五鳳樓前過手握金鞭賀太平白雲端帀地風光無間違因何不信却生疑老婆為君重指出臭肉團上青蠅飛黃檗勝續收青青掩暎蒼龍窟修竹超然物外物若將修竹比喬松未及喬松老風骨佛鑑懃一團臭肉有商量皮下流芳若麝囊忽若禪人親咬破看來滿口是清香龍門遠增收三聖到德山纔展坐具山曰莫展炊巾這裡無殘羮餿飯師曰縱有也無著處山便打師接住棒推向禪牀上山大笑師哭蒼天便下參堂堂中首座號踢天泰問行脚高士須得本道公驗作麼生是本道公驗師曰道甚麼座再問師打一坐具曰這漆桶前後觸忤多少賢良座擬人事師便過第二座人事頌曰呼為雲吸為雨襲襲清風動寰宇笑哭不是等閑聲路見不平應有主要斬不平人不與平人語而今何處見踪由剔起眉毛看子長靈卓殘羮餿飯無處安著換手搥胷劈頭蓋却兩箇無孔銕槌一樣無繩自縛佛燈珣南北山相對東西有路分不經場陣裏爭見李將軍木菴永增收魏府大覺和尚嗣臨濟因僧問如何是本來身師曰頭枕衡山脚踏北岳頌曰臨濟宗乘會者稀唯有大覺顯大機人問本來身有語頭枕衡山北岳隨洞山聰主山之後案山前下是地兮上是天身手太長衫袴短醉狂嬴得樂豐年保寧勇增收灌溪志閑禪師嗣臨濟因僧問久嚮灌溪到來祇見漚麻池師曰汝祇見漚麻池且不見灌溪曰如何是灌溪師曰劈箭急頌曰一派曹溪與灌溪龍行風雨動雲霓峻機箭筈波瀾急撼得毗盧海岳低涿州克符道者增收灌溪參臨濟濟搊住師師曰領領濟拓開頌曰雨散雲収後崔嵬數十峯倚闌頻顧望回首與誰同秀巖瑞增收定州善崔禪師亦曰崔禪嗣臨濟州將王令公於衙署張座請師說法師陞座拈拄杖曰出來也打不出來也打僧出曰崔禪聻師擲下拄杖曰久立令公伏惟珍重頌曰鏌鋣橫按寶光寒俠客嘍囉敢正看飛過青霄聲震吼乾坤直得黑漫漫保寧勇大展家風示眾人垂鈎入海釣金鱗遊魚弄水騰波浪船棹俱拋出大津延壽慧十三慣繡羅衣裳自憐紅袖聞馨香人言此是嫁時服含羞刺出雙鴛鴦空叟印增收襄州歷村和尚嗣臨濟師煎茶次僧問如何是祖師西來意師舉起茶匙僧曰莫祇這便當否師擲𢁈向火中頌曰煎茶未了人來問拈起茶𢁈呈似他當初若遇收燕手性命難存爭奈何投子青增收虎溪菴主嗣臨濟因僧問菴主在這裏多少年也師曰祇見冬凋夏長年代總不記得曰大好不記得師曰汝道我在這裏得多少年也曰冬凋夏長聻師曰閙市裏虎頌曰閙市中心虎能歌不能舞命值木星君不遇羅睺主琅瑯覺虎溪老住菴年深都不記閙市心中虎四邊如鼎沸草堂清增收桐峯菴主嗣臨濟因僧問和尚這裏忽遇大蟲作麼生師便作大蟲吼僧作怕勢師大笑僧曰這老賊師曰爭奈老僧何頌曰見之不取思之千里好箇斑斑牙爪未備君不見大雄山下忽相逢落落聲光皆振地大丈夫見也無收虎尾捋虎鬚雪竇顯增收滄州米倉禪師嗣臨濟問僧近離甚處曰冀州太湖師曰闍黎來時太湖向你道甚麼曰知道米倉路峻師曰到這裏又作麼生曰不異發足時道路師曰闍黎已孤太湖去在曰某甲亦不肎和尚恁麼道師曰來時路峻如今路平曰不妨和尚此路師曰漆桶裏漢有甚麼限頌曰發足超方地頭親到遇著嶮峻道途殺活杖子變豹米倉大路平如砥未免漆桶裏著到不搽紅粉也風流大抵還他肌骨好佛燈珣增收雲山和尚嗣臨濟問僧甚處來曰西京來師曰將得西京主人書來麼曰不敢通消息師曰作家師僧天然有在曰殘羮餿飯誰人肎喫師曰獨有闍黎不肎喫僧便作吐勢師喚侍者扶出這病僧頌曰這僧掩耳偷鈴雲山將錯就錯若是碧眼胡兒別有反身一著木菴永增收睦州刺史陳操尚書見睦州一日與僚屬登樓次見數僧行來一官人曰來者總是行脚僧公曰不是曰焉知不是公曰待來勘過須臾僧至樓前公驀喚上座僧皆舉首公謂諸官曰不信道頌曰一語離窠窟千生出蓋纏夜來風雪惡木折在巖前雪堂行奪鼓攙旗驗衲僧便將黑豆換雙睛昔年曾被雪霜苦看見楊花落也驚尼無著總拈得須彌第一槌銅頭鐵額豈容伊鹽梅舟楫并霖雨不是斯人更是誰復菴封季咸曾相壺丘子隨變難分亟自逃輸與高樓凝望者烱然明可察秋毫虗堂愚增收陳尚書問睦州看甚麼經州云金剛般若經公曰六朝翻譯師看底是第幾朝州拈起云一切有為法如夢幻泡影頌曰六朝翻譯傳來妙到頭未悟當時竅須信枝頭老鳳凰春來翻作黃鶯呌正堂辯
