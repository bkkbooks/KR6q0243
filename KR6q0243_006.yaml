body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣西天諸祖西天初祖摩訶迦葉尊者見世尊在靈山會上拈起一枝華以青蓮目普示大衆百萬聖賢惟迦葉破顏微笑世尊乃曰吾有正法眼藏涅槃妙心實相無相微妙解脫法門付囑於汝汝當護持流通無令斷絶頌曰仙子持來別是春還將分付與仙人可憐壞衲曾微笑有理傍觀不解伸佛印元霜風刮地掃枯荄誰覺東君令已回唯有嶺梅先漏泄一枝獨向雪中開佛慧泉盡説拈花微笑是不知將底辨宗風若言心眼同時證未免朧在夢中白雲端拈花我佛在靈山迦葉頭陀忽破顏金口密言親付囑不唯天上與人間保寧勇教外全提號別傳飲光閉目笑無言可憐十萬靈山衆不薦當頭一著玄照覺總靈山旱地紅蓮發白眉老翁笑不歇轟轟洪韻震東西八萬迷徒猶未瞥黃蘗勝世尊舉華迦葉微笑殃及兒孫上祖不了楊無為飲光誰謂悟拈華微笑依前隔海涯黃面只圖傳大事赤眉終不打貧家祖印明正眼由來付飲光靈山七衆盡歸降枝繁葉茂宗門盛自得兒孫滿大唐草堂清世尊拈華迦葉微笑不落宮商是何曲調古洞風清寒潭月皎長靈卓世尊迦葉不相知陷虎機關各自施正眼妙心真實相靈山會上付他誰張無盡舉華示衆誰相委迦葉頭陀獨破顏無限白雲藏不得又隨流水落人間南華昺聞琴作舞見華破顏一彩兩賽天上人間旻古佛百萬人天普請看頭陀末上獨開顏堪笑衣穿瘦骨露一肩授手搭金襴佛燈珣飲光當日笑無言家醜從來不外傳不撥韶絃成一曲至今清韻出人天雪峯預拈花已落微笑後笑出精神拈處先一片銀蟾無晝夜十分光影向人圓佛心才教外單傳事最奇兜羅綿手舉花時會中不得雞峯老無限清香付與誰正覺逸兜羅綿手舉花時風遞幽香幾個知除却雞峯迦葉後誰人眼內有瞳兒慈受深百萬人天望舉揚拈華微笑太乖張幾多業識茫茫者問著勞生沸似湯龍門遠海水翻空衮底流魚龍蝦蟹信沉浮可憐金色頭陀子直至如今笑未休鼓山圭一花拈起便承當正眼傳來不覆藏今古流通無間斷枝枝葉葉盡芬芳踈山如拈起一枝花風流出當家若言付心法天下事如麻徑山杲靈山用處許誰知迦葉偷顏笑展眉動便最初先漏泄兒孫扶取上玄機楚安方續收瞿曇拈起花枝迦葉微開笑面要知造物無私更聽黃鶯一囀石明拈花親付老頭陀平地俄興一丈波後代釘樁搖櫓者竹篙量水轉譊訛寶華鑑古冢露枯骨窮源逢斷橋一番新雨過翠色滿林梢白楊順項上鐵枷三百斤分明有理不容伸默然雞足峯前坐猶把金襴誑後人尼無著總末後無端重漏泄焦齒翁翁嚼生鐵玉鞭擊碎月明珠纍及兒孫揚醜拙湛堂深世尊拈花迦葉微笑天際二輪更相互照若能截斷老瞿曇閉目黃河只一跳惠通旦雪壓怪松露風高野渡橫將謂衆生苦更有苦衆生萬年間金色頭陀忽破顏看來也是管窺斑當時若得回頭早免見兒孫墮黑山應菴華世尊拈華迦葉微笑一對鐵錐渾無孔竅佛照光釋尊拈起枝花分明勾賊破家致今千古之下兒孫逐惡隨邪蒙菴聰世尊不曾拈花迦葉不曾微笑大地總是兒孫誰明向上一竅肯堂充白日青天開眼放尿黃面瞿曇一場漏逗木菴永拈起花來尾巴已露迦葉破顏人天罔措無門開迦葉因阿難問世尊傳金襴外別傳何物迦葉召阿難難應諾迦葉曰倒却門前剎竿著頌曰影略門前倒剎竿箇中消息授傳難玲瓏侍者能相委盤走明珠珠走盤天童覺金襴付外有何傳倒却門前舊剎竿不取一時為上瑞百千年後與人看草堂清金襴付外別何傳呼應雖勤意未圓迦葉更能施善巧剎竿倒却貴安然覺海元花葉聯芳信有期飲光抗召劃芬披而今莫問當時事路上行人口是正覺逸金襴之外復何傳弟應兄呼豈有偏倒却門前剎竿子免教依舊倚墻邊白雲端象王行處絶狐蹤象子雄雄繼此風休説二千年後事縱塵沙劫又何窮保寧勇金襴傳外更瞞頇漏泄天機倒剎竿東震西乾扶不起至今殃禍及兒孫照覺總提起金襴惹倒剎竿步步踏著緑水青山旻古佛慶喜門前倒剎竿金襴傳外有何傳天然外道無師證爭奈威音佛已前張無盡金襴傳外更何傳背角泥牛痛下鞭哮吼一聲魔膽裂翻身踏破碧潭煙南華昺難兄難弟問來端百衲金襴遞代傳弟應兄呼成底事免認剎竿頭指天佛燈珣心心相照始相知金色頭陀別是非五里牌從郭外看當人不肯怨它誰道場如琉璃殿上付金襴棣蕚聯芳得二難門外剎竿從放倒免教南北問風幡上方益弟兄相應鶺鴒原相喚相呼豈等間金襴之外傳何物向道門前倒剎竿文殊道頭陀飲光多聞慶喜合掌擎拳難兄難弟一朝狹路兩相逢裂轉雙睛無處避便向門前倒剎竿丈夫自有衝天志慈受深草衣木食道人高傳得金襴意氣豪此外已知無別法剎竿倒處纍兒曹踈山如續收金襴傳外復何傳報道門前倒剎竿好笑踏青人爛醉滿川桃李自無言石明怛薩阿竭二千年密付親承盡浪傳直至如今成露布剎竿依舊倚門前大洪恩鳳毛麟角一般奇弟應兄呼豈不知堪笑靈源春雨後落花流水自相宜開先瑛多子塔前衣付後更傳何物示於人驪珠迸出剎竿倒直得寒光徹四鄰佛性泰等間饒舌話金襴便與當頭倒剎竿從此天倫轉無義冷光猶自逼人寒瞎堂遠弟應兄呼畫不成誰人肯向裏頭行自從家破人亡後直至如今事轉生月林觀弟應兄呼有禮有義虎咬大蟲蛇吞鱉鼻倒却門前剎竿著唵囌嚕囌嚕悉唎悉唎退菴奇翡翠羽毛麒麟頭角弟應兄呼振動海嶽路遠夜長休把火倒却門前剎竿著高原泉家家門口透長安不見纖毫眼界寬無法無人誰付囑難兄難弟自相謾雪菴瑾倒却門前剎竿全提那涉玄端翻身不坐空王殿月照千峯夜色寒足菴鑒面面相看眼眼廝衣外別傳有甚憑據倒却門前剎竿著鳳棲不在梧桐樹無準範寵弟常常在侍邊傳金襴外問何傳自家兄弟無多事只道門前倒剎竿間極雲煮豆然豆萁豆在釜中泣本是同根生相煎何太急雲衲慶增收九祖伏馱蜜多尊者問八祖佛馱難提父母非我親誰是最親者諸佛非我道誰是最道者八祖以偈答汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離頌曰間却年光半百春可憐嫌富不嫌貧祖佛非道求何道父母不親誰更親七步豈勞蓮捧足無言須信鑑生塵禪門自古牢關鑰漏泄家風是此人佛慧泉見處孤危立處高急如石火利如刀到家問路家何在掀倒棊盤脫布袍瞎堂遠半生足不履地軒知踏遍天涯得箇冬瓜印子至今目瞪口呿松源嶽父母分明非我親祖師肝膽向人傾直下若能親薦得優曇華發火中春高原泉父母非親親是誰雙眸炯炯帶雙眉含元殿上不相識正是岷峩相見時石溪月增收十祖脅尊者本名難生處胎六十年神珠夢應誕生之日滿室光明出家得道至一林中有富那夜奢合掌前立祖問汝從何來奢曰我心非往祖曰汝何處住曰我心非止祖曰汝不定邪曰諸佛亦然祖曰汝非諸佛曰諸佛亦非祖知是法器即與剃度付法説偈曰真體自然真因真説有理領得真真法無行亦無止頌曰打鼓弄琵琶相逢兩會家清風拂白月地角接天涯碎玉凝朝露殘陽送晚霞寒山逢拾得拊掌笑嗄嗄南堂興二諸佛亦非窮子腹肥才一頓飽忘百日飢二十拄杖十分槌免教辜負兩莖眉電捲星飛珠回玉轉打破面皮赤心片片瞎堂遠增收十四祖龍樹大士見十五祖迦那提婆來先令侍者將一碗水致面前提婆見乃取一針投之祖由是大喜頌曰龍猛盂中水提婆毳上針人人爭得失箇箇話疏親不覩雲中鴈焉知沙塞深農人移片磉磉下獲黃金琅琊覺漏傳長樂未央靜月瀉甘泉太液秋夜半樂聲回步輦喚回三十六宮愁心聞賁二十四祖師子尊者因罽賓國王秉劒於前曰師得蘊空不祖曰已得蘊空曰離生死不祖曰已離生死曰既離生死可施我頭祖曰身非我有何吝於頭王即揮刃斷尊者首涌白乳高數尺王之右臂旋亦墮地玄沙云大小師子尊者頭也不解作得主頌曰尊者理非謬玄沙語甚奇首隨鋒刃落彼此沒毫釐永明壽楊子江頭楊柳春楊花愁殺渡頭人一聲羌笛離亭晚君向瀟湘我向秦龍門遠作家手段天然別不辭臂墮除妖孽萬里歌謠賀太平夜夜清光輝雪月大溈智得人一牛還人一馬有往有來可知禮也佛性泰船子下楊州浮萍逐水流一聲河滿子千古動悲愁鼓山圭殺人須是殺人漢當下一刀成兩段頭臂雖虧劒刃鋒何似秦時𨍏轢鑽徑山杲君王寶劒不虗施尊者遭逢也大奇從此清風遍寰宇太平消息幾人知或菴體吹毛劍首乾坤黑臂墮山河掩日光躍起須彌頭倒卓方知兩兩不成雙湛堂深尊者何曾得蘊空罽賓從自斬春風桃花雨後亂零落染得一溪流水紅咦菴鑑口念木瓜醫腳氣紙畫鍾馗驅鬼祟一生若解和羅槌日日喫酒日日醉懶菴樞佛法王法更無兩樣直下一刀未為諦當月林觀師子頭落罽賓臂折各人眼底有西施誰家甕裏無明月朴翁銛遇著山中人便説山中話六月賣松風人間恐無價孤峯深覿面當機掣電飛當機覿面誰能用一劒分身定死生君王萬古聲名重木菴永劒下十分真難藏獨露身江流石不轉獨有蘊空名北澗簡夢中要渡深溪水伎倆多般進不能驀地覺來伎倆盡牀頭山月已三更石菴玿蘊空誰見法中王覿體何曾礙劍光古廟藤蘿穿戶牖斷風雨碎文章雪菴瑾夜闌天際墮金盆膝上焦桐調轉新易水悲風輕按指鸞膠難續斷腸人虗堂愚二十七祖般若多羅東印土國王請師齋次王問諸人盡轉經唯師為甚不轉師云貧道出息不涉世緣入息不居蘊界常轉如是經百千萬億卷非但一卷兩卷汾陽昭云却勞尊者心力大溈智云諸仁者還見二十七祖看經麼行時腳跟不著地坐時心識似風飄乃頌曰秋高月色連雲白淡泊禪心滋味長歷歷分明今古意何須特地更商量靈犀玩月璨含輝木馬遊春駿不羈眉底一雙寒碧眼看經那得透牛皮明白心超曠劫英雄力破重圍妙圓樞口轉靈機寒山忘却來時路拾得相將携手歸天童覺入息未嘗居蘊界出息何曾涉萬緣一聲漁笛離南浦依舊蘆華深處眠懶菴需東土諸祖東土初祖菩提達磨大師即西土二十八祖初至金陵見梁武帝帝問曰如何是聖諦第一義師曰廓然無聖曰對朕者誰師曰不識帝不領悟師遂折蘆渡江至魏後帝舉問志公公曰陛下識此人不曰不識志曰此是觀音大士傳佛心印曰當遣使詔之志曰莫道陛下詔盍國人去它亦不回頌曰聖諦廓然何當辨的對朕者誰還云不識因茲暗渡江豈免生荊棘盍國人追不再來千古萬古空相憶休相憶清風匝地有何極師顧示左右云這裏還有祖師麼喚來與老僧洗腳雪竇顯客從方外來一人也弗識無心得可傳九年空面壁冷坐寥寥不自安手携隻履歸西國法雲秀凡聖縈纏情未忘廓然無聖便驚狂梁王殿下無謀略剛被胡人亂一場泉大道廓然一鏃遼天不識重下錐刺梁帝不知何處去千古萬古無消息正覺逸廓然絶聖猶方便不識天顏今對面對面不契渡長江北去少林方眷戀覺海元一箭尋常落一雕更加一箭已相饒直歸少室峯前坐梁主休云更去招白雲端煉得通紅打一鎚周遭無數火星飛十成好個金剛鑽攤向門前賣與誰保寧勇廓然無聖不須徵句後通機是眼睛莫怪相逢不下馬奈緣各自有前程雲漢恭第一義廓兮零兮超象帝不把多年曆日看爭辨春分并夏至遼東白鶴去無蹤三山半落青天外上方益聖諦第一義門廓然無聖誰尊堪笑江南二月裏鷓鴣啼在百花村太平古間將一段秦川錦裁作人間巧婦衣幾度著來呈伎倆暗中曲調少人知成枯木遠泛鯨濤入大梁廓然無聖對君王可憐寸徑無人鑑却與相如依舊藏佛心才不解作客勞煩主人面無慚色少喜多嗔長靈卓始鳴阿閣一聲鐘日暖蒼龍睡正濃再擊鳳皇臺上鼓半夜祥鸞未飛舞帝基永固如盤石胡僧虗費平生力回指少林歸去來春風一陳花狼藉佛鑑勤展陳開旗便要嬴誰知御駕不親征把定鏘旗收陳腳直向熊峯不出兵佛燈珣當時卞璧親持獻未遇徒然更再三折葦渡江江上水滔滔今古色如藍夢菴信西天屠子氣雄豪欺負神州罪莫逃梁帝當頭輕一拶果然提起活人刀雪堂行廓然無聖露全身覿面相呈已隔津莫問梁并魏苑一華五葉自然春雲巖因續收胡僧對漢主廓然無聖語復云不識渠神驥捉老鼠捉不著千里清光渾失却石明黃金鑿白玉椎鑿開混沌竅透出玄元機正堂辨老胡元不渡長江孰謂曾將一葦航堪笑普通年遠事兒孫多是錯商量肯堂充踏翻地軸地不動推倒天關天更高穩泛鐵船歸少室至今天下起風濤雪菴瑾強將不識鼓唇牙胡語如何亂得華若使老蕭皮有血定應趕逐過流沙天目禮一言既出駟難追賴遇梁王放過伊楊子江頭航折葦浪頭何似問頭危朴翁銛五葉芬敷自一花無人圖蔓剪根芽不教著腳金陵地猶恨蕭梁未作家北澗簡金烏飛上玉闌干黑漆崑崙對面看畢竟這些傳不得落花流水太無端天童淨提起須彌第一槌玉門金鎖擊難開重施背踏空勞力應悔迢迢萬里來癡鈍頴玉簫吹徹鳳皇臺古殿深沉曉未開滿地落花春已過緑陰空鎖舊莓苔虗堂愚萬浪千波一葦橫翩翩隻影可憐生老蕭若會截流句楊子江頭放你行石溪月一葦截流深心叵測梁土太平魏著賊雪屋珂遠到支那十萬餘清波無路一莖蘆而今面越之燕者對朕還曾識也無德巖祐廓然無聖真實語對朕者誰心未息本光燦爛照十方無量劫來到今日橫川珙西來十萬路迢迢智鑑當軒影莫逃四海浪平龍睡穩九霄雲淨鶴飛高雪巖欽增收達磨大師西來直指人心見性成佛頌曰急水波心下直鉤魚龍蝦蟹一時收祖師活計無多子惱亂春風卒未休松源嶽達磨大師自梁涉魏至洛陽少林面壁而坐經於九年方得二祖傳法頌曰先被梁王勘破却向少林孤坐謾言教外別傳爭奈不識這個白雲端十萬途窮得到梁梁王言語不相當少林不假東君力五葉花開動地香佛國白精進翻成怠墯莫守癡禪兀坐少林面壁九年已被梁王勘破祖印明六宗調伏向東來五葉芬披震旦開冷坐九年人不識手攜隻履又空回草堂清泛舶來梁自普通一槌擊碎有為功謾言面壁無言説爭奈當門齒露風佛性泰航海梯山緣底事遊梁歷魏意何傳九年面壁垂慈切剛被時人喚作禪太平古九年熊耳空留隻履一花五葉春風四起旻古佛達磨西來未足誇少林揑目強生花得皮得髓徒分別妙性圓明本不差疏山如少室山前風過耳九年人事隨流水若還不是弄潮人切須莫入洪波裏鼓山圭金鰲一掣滄溟竭徒自悠悠泛小舟今日煙波無可釣不須新月更為鉤徑山杲續收祖師面壁九年餘此是西來末上機直至如今天下客強將言句為施為南山省堂主千鄉萬里尋知己一語臨機不契梁面壁九年居少室覓心千古纍神光天童覺一片虗凝地丹青畫不成聖賢難啓口佛祖強安名正堂辨祖師遠遠來東土面壁少林坐九年二祖傳心親得髓算來早是已輪先高菴悟喪盡家財無本可據赤手殺人彌天罪過木菴永渡江一葦風濤急少室九年空面壁錯把安心露一機至今滿地花狼藉皖山凝不契梁王暗渡江一身無地避慚惶九年面壁成何事賺却平人入鑊湯湖隱濟九年面壁轉身無䇿冷地有人奮一臂力月坡明達磨大師將返西天謂門人曰時將至矣盍各言所得乎時門人道副曰如我所見不執文字不離文字而為道用祖曰汝得吾皮尼總持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得祖曰汝得吾骨最後慧可出禮三拜依位而立祖曰汝得吾髓乃傳法付衣頌曰神光三拜退後立瀑布嵓前水長急楞嚴會上逞圓通却使老盧雙淚泣天衣懷少林真嗣擇全才諸子紛紛點額回衣法莫言容易得曾憑三拜作良媒正覺逸門前諸子列成行各逞英雄越霸王如何獨有無言者坐斷毗盧不可當保寧勇四維上下絶遮攔湧出冰壺印碧天無孔笛中藏六律一聲驚起釣魚船成枯木神光三拜依位立解會都忘未端的皮毛脫盡孰親踈誰言得髓能情息圓通秀當門齒真堪笑面壁無言坐九年皮髓些些分俵了依前懡㦬返西天地藏恩誰透少林關三拜仍依位立雪要心安忘形甘斷臂祖印明缺齒胡僧到大唐却將皮髓強分張九年懡㦬空歸去添得華人笑幾場佛國白續收弟昆各自逞功能獨有家兄徹骨貧三拜起來無一語鼻孔纍垂蓋口脣雪竇宗一從三拜後千古錯流通永日無人到蕭蕭檜柏風龍門遠社舞村歌笑殺人騎牛挑鴨走成羣三杯酒罷歸家去留得豬頭礙塞人正堂辨鏡凹照人瘦鏡凸照人肥不如打破鏡還我舊面皮懶菴樞揑目生花立問端得它皮髓被它瞞這般瞎漢能多事六月無霜也道寒簡菴清死款都來一口供情窮理極卒難容若將皮髓論高下爭見花開五葉紅高峯妙增收達磨大師曰吾法於三千年後未曾移易一絲毫許頌曰東西縱目乾坤闊玉露澄秋氣宇高山是山兮水是水何曾移易一絲毫葛廬覃增收達磨大師既葬熊耳山後三歲魏宋雲使西域回遇祖於蔥嶺手携隻履翩翩獨逝雲問師何往祖曰西天去又謂雲曰汝主已厭世雲聞之茫然別祖東邁暨復命即明帝已登遐矣逮啓壙惟空棺一隻革履存焉舉朝為之驚歎奉詔取遺履於少林寺供養頌曰熊耳宗師葬洛陽龍城天子泣千行回擔隻履蔥山上驚殺梁王與魏王剋符道者師眼兮深師鼻兮大師耳兮穿師舌兮快師身兮墨師心兮戴手擕隻履返流沙熊耳石塔今猶在琅琊覺祖師遺下一隻履千古萬古播人耳空自肩擔跣足行何曾踏著自家底五祖演梁魏山河本太平無端容此老狐精九年皮髓分張盡隻履空棺更誑人東山空闔國人難挽西携隻履歸只應熊耳月千古冷光輝虎丘隆梯山航海自西來誰謂梁王眼未開一句等間輕勘破九年端坐冷如灰來時打落當門齒去後空留左子計切腳鞋到底往還無箇事依前隻履又空回開善祖航海東來黠兒落節為法求人自作深孽賴遇梁王是作家有理直教無處雪及乎隻履復西歸蔥嶺無端重漏泄不漏泄分明弄巧反成拙尼無著總揚下一隻履明明不覆藏兒孫才著腳遍地是刀鎗妙峯善九年冷坐已敗闕隻履西歸更脫空後代兒孫空妄想鶴鴣啼不為春風雪菴瑾死也不伏埋殯偷擕隻履西歸不被宋雲捉敗官司何處尋尸孤峯深增附禾山方曰死心先師每舉隻履西歸話以問衲子而實難明諸方或謂之隱顯或謂不可有兩箇或謂唯此一事實若也恁麼未識祖師意旨諸人要見麼乃頌曰濁中清清中濁勿謂麒麟生隻角西行東向路不差大用頭頭如啐莫莫玄要靈機休卜度
