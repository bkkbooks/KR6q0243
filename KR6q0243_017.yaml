body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第四世之三南嶽下前第三世之餘增收池州甘贄行者見南泉一日入南泉設齋時黃蘗為首座行者請施財座曰財法二施等無差別甘曰恁麼道爭消得某甲嚫便將出去須臾復入曰請施財座曰財法二施等無差別甘乃行嚫頌曰甘贄有收有放首座徹底惺惺雲收雨霽長空闊一對鴛鴦畫不成松源嶽拋來撒去互施呈地獄門前鬼眼睛破髑髏肝膽外摩醯頂上復重明虗堂愚甘贄又一日入南泉設粥仍請南泉念誦泉乃白椎曰請大衆為狸奴白牯念摩訶般若波羅蜜甘拂袖便出泉粥後問典座行者在甚麼處座曰當時便去也泉便打破鍋子頌曰一般設粥古今稀十利功圓果不低鍋鑊盡穿無煮粒叢林遠近總應知汾陽昭甘贄設粥詣南泉請師念佛衆僧前狸奴典座言歸去當時鍋鑊一時穿慈明圓兩頭水牯忽相逢出入平田淺草中杖子擊來何處去悠悠千古永無蹤保寧勇槌下分明漏泄多尋常設粥却誵訛狸奴白牯無尋處枉使厨頭打破鍋佛國白異路相逢句已酬間吹羌管向汀洲漁人貪顧沙頭鷺不覺扁舟逐浪流雪峯預財施無窮法施多為他狸牯念摩訶無端甘贄低頭拜撩撥南泉打破鍋張無盡特來設粥誇英俊那知王老更風流打破粥鍋呈醜拙狸奴白牯一齊收踈山如高吟大笑性猖狂潘閬騎驢出故鄉驚起暮天沙上鴈海門斜去兩三行湛堂凖狸奴白牯念摩訶爭似南泉打破鍋雖然佛法無多子天下叢林不奈何鼓山圭南泉打破間家具浩浩諸方作話看今日為君重舉過明明歷歷不顢頇徑山杲續收甘贄設粥顯家風王老無端贊施功報去始將鍋打破也知賊過後張弓海印信甘贄設粥念摩訶致見南泉打破鍋萬事但將公道斷任教四海動干戈照堂一甘贄設粥施財南泉將鍋打破輸他白牯狸奴嬴得一場因果二人暗中紅心疑殺厨前典座莫疑好煮粥別無巧只要頻頻攪圓悟勤太平自來不打諸人也須照顧甘贄米裏有蟲南泉鍋是鐵作君看大冶精金終不墮羣錮鏴佛鑑勤甘贄設白粥南泉費鹽醋彼此落便宜至今斷來路或菴體針鋒相揍便干戈帶纍南泉打粥鍋莫謂當年輕放過大都有罪不重科笑翁堪甘贄設粥南泉打鍋一般病痛徹底誵訛更有些兒好笑明朝餓殺禪和雪菴瑾設粥殷勤請念誦白槌各為念摩訶上來功德要圓滿復去厨頭打破鍋橫川珙行者失却眼南泉破却鍋滿堂僧不厭一箇俗人多南巖勝六祖下第四世之四清源下第三世澧州龍潭崇信禪師嗣天皇悟師未出家時為餅鋪住在寺前每日常供餅十枚上天皇皇受已却留一餅與之曰惠汝以蔭子孫師曰是某將來何以返曰惠汝皇曰是汝將來復汝何咎師因有悟入遂投出家頌曰將去將來事不差龍潭固問勿交加後來多少爭唇吻春鳥喃喃罵落花汾陽昭十餅每將留一箇因思何謂蔭兒孫團團將去還將入不覺醍醐到頂門白雲端南嶽山頭見石頭便歸古岸狎沙鷗謾分胡餅為香餌引得金龍上直鈎佛國白續收持來送去樣團團覆蔭兒孫義不寒何似當時休擘破渾崙留與後人看無凖範受惠當思報將他一餅回出家緣法到當下得心灰橫川珙增收龍潭因天皇曰汝昔崇福善今信吾言可名崇信由是服勤左右一日問曰某自到來不蒙指示心要皇曰自汝到來吾未嘗不指汝心要師曰何處指示曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不指示心要師低頭良久皇曰見則直下便見擬思即差師當下開解復問如何保任皇曰任性逍遙隨緣放曠但盡凡心別無聖解頌曰脫白投師貴苦辛擎茶問訊盡躬親無端再敘三年事笑倒街頭賣餅人白雲端據欵結案得失過半盡力擔當上船離岸無不指示汝擎茶行食處聖解凡情不過來軒軒頭角起風雷月堂昌潭州道吾山宗智禪師嗣藥山因僧問如何是和尚深深處或云深深密密意師下禪牀作女人拜曰謝子遠來無可抵待頌曰驪龍海臥瑞雲高四望歸宗萬派潮木人來問西宮事回惠東園一顆桃投子青回頭已落今時路不露鋒鋩豈得圓撥動少林關棙子誰知別是一壺天成枯木草戶柴門謝子來躬身下拜笑眉開深深密密親分付莫道寶山空手回踈山如續收深深親下拜三代禮全該此意如不然玉帛云乎哉無凖範歲稔時清禮義多相逢陪酒又陪歌當筵不解開懷飲如此一天風月何東叟頴增收道吾見南泉泉問闍黎名甚麼師曰宗智泉曰智不到處作麼生宗師曰切忌道著泉曰灼然道著即頭角生三日後師與雲巖在後架把針泉見乃問智頭陀前日道智不到處切忌道著道著即頭角生合作麼生行履師便抽身入僧堂泉便歸方丈師復來把針巖曰師弟適來為甚不抵對和尚師曰你不妨伶俐巖不薦却問南泉適來智頭陀為甚不抵對和尚某甲不會乞師垂示泉曰他却是異類中行巖曰如何是異類中行泉曰不見道智不到處切忌道著道著即頭角生直須向異類中行巖亦不會頌曰言詮不到是同袍拂袖歸堂衆乃淘沙礫真金無辨別不須疑慮更忉忉汾陽昭金剛際下古髑髏幾被人踏血濺空明月任從君自掬寒松那棄白雲封投子青增收道吾因石霜問百年後有人問極則事向他道甚麼師喚沙彌彌應諾師曰添淨瓶水著師良久却問霜適來問甚麼霜擬再舉師便歸方丈霜於此有省頌曰垂手還他作者機尋常語裏布鎗旗重詢擬進歸方丈一句分明更不疑丹霞淳增收道吾到五峯峯問還識藥山老宿麼師曰不識曰為甚麼不識師曰不識不識頌曰白雲深處路難通擬問蹤由已涉功挂角羚羊無影迹從容還落正偏中丹霞淳增收道吾因溈山問甚麼處去來師曰看病來山曰有幾人病師曰有病底有不病底山曰不病底莫是智頭陀麼師曰病與不病總不干他事速道速道山曰道得也與他沒交涉頌曰妙藥何曾過口神醫莫能捉手若存也渠本非無至虗也渠本非有不滅而生不亡而壽全起威音之前獨步劫空之後成平也天蓋地擎運轉也烏飛兔走天童覺增收道吾因趙州來著豹皮裩把吉撩棒在三門前等候才見州來便高聲唱喏而立州曰小心祗候著師又唱喏一聲而去頌曰得人一牛還人一馬虎驟龍驤誰敢定價三千里外見譊訛生鐵一團無縫罅尼無著總一吹無孔笛一撫沒絃琴一曲兩曲無人會雨過夜塘秋水深潛菴光道吾作舞一曲無譜若將耳聞未敢相許野菴璇潭州雲巖曇晟禪師嗣藥山因道吾問大悲千手眼那箇是正眼師曰如人夜間背手摸枕子吾曰我會也師曰作麼生會吾曰遍身是手眼師曰道也太煞道祇道得八成吾曰師兄作麼生師曰通身是手眼此依五燈會元所載按傳燈録乃曰道吾問大悲千手眼如何師曰如無燈時把得枕子作麼生道吾曰我會也我會也師曰作麼生會道吾曰通身是眼當據傳燈録為正聯燈與舊頌古聯珠所載皆作雲巖問道吾云云恐非頌曰遍身是通身是拈來猶較十萬里展翅崩騰六合雲摶風鼓蕩四溟水是何埃兮忽生那箇毫釐兮未止君不見網珠垂範影重重棒頭手眼從何起雪竇顯一竅虗通八面玲瓏無象無私春人律不留不礙月行空清淨寶目功德臂遍身何處通身是現前手眼顯全機大用縱橫何忌諱天童覺弟應兄呼豈偶然嬉遊時在舊山前通身手眼如何會拾得寒山笑揭天大洪預演若怖回鏡裏首那吒還復舊時身不知手眼從何起便道全軀在剎塵佛心才通身是手眼遍界不曾藏背摸牀頭枕翻身嫌夜長京兆府天寧璉續收觀音妙音十八十九眼見耳聞是人知有左握軍持右擎楊柳揑聚放開烏飛兔走大洪恩大悲許多手眼如人夜摸枕子遍身通身起來盡受奴驅婢使君不見認著牛迹裏失却大海水轉變未得時依前有依倚歸去來歸去來拍天洪浪如浮埃月堂昌遍身是通身是酥酪醍醐為一味毫端湧出須彌盧芥子吸竭滄溟水十虗吞爍正眼寥廓照用同時人境俱奪棒頭喝下錯承當背手拈來已失却莫莫水是水兮山是山切忌無繩而自縛圓悟勤大悲菩薩千手眼如人背手摸枕頭猢孫跳出布袋口不妨隨處逞風流懶菴樞遍身是通身是淨潔渾身涴却屎拽來露出猛風吹誰教背手摸枕子復打三棒無菴全雲巖掃地次道吾曰太區區生師曰須知有不區區者吾曰恁麼則有第二月也師竪起掃帚曰這箇是第幾月吾休去玄沙聞云正是第二月頌曰借來聊爾了門頭得用隨宜即便收象骨巖前弄蛇手兒時作處老知羞天童覺增收雲巖同道吾自南泉回藥山師問藥山曰如何是異類中行山曰吾今日困倦且待別時來師曰某甲特為此事歸山來山曰且去師便出吾在方丈外聞師不薦不覺咬得指頭血出却下來問師師兄去問和尚那因緣作麼生師曰不為某甲説吾便低頭頌曰飢餐嫩草遙山去渴飲寒泉曲澗回放蕩不耕空劫地暮天何用牧歌催丹霞淳雲巖因僧問暫時不在如同死人時如何師曰便好埋却頌曰便好埋却更無依托天上人間逍遙快樂切忌思量涉路途不勞彈指開樓閣普菴玉增收雲巖因藥山問聞汝解弄師子是否師曰是曰弄得幾出師曰弄得六出曰我亦弄得師曰和尚弄得幾出曰我弄得一出師曰一即六六即一後到溈山溈問承聞長老在藥山弄師子是否師曰是曰長弄有置時師曰要弄即弄要置即置曰置時師子在甚麼處師曰置也置也頌曰厇訴金毛師子子旃檀林下青莎裏置也置也威自全一出六出眉躍起非擬擬知幾幾星流不啻三千里天外風清哮吼時為君吸盡西江水咄雪竇顯放出金毛師子百獸不見蹤由要得爪牙全露直須自把繩頭懶菴樞增收雲巖初參百丈後造藥山山問甚處來師曰百丈來曰百丈有何言句示徒師曰尋常道我有一句子百味具足曰鹹則鹹味淡則淡味不鹹不淡是常味作麼生是百味具足底句師無對曰爭奈目前生死何師曰目前無生死曰在百丈多少時師曰二十年曰二十年在百丈俗氣也不除頌曰行盡千峯路轉高肯歸方憶舊雲房貪尋古調單于曲暨蹉胡家一韻長投子青增收雲巖因僧問二十年在百丈侍巾瓶為甚麼心燈不續師曰頭上寶華冠曰頭上寶華冠意旨如何師曰大唐天子及冥王後僧舉問九峯虔禪師大唐天子及冥王意旨如何虔曰却憶洞上之言頌曰玉鞭高舉擊金門引出珊瑚價莫論逈古輪王全意氣不彰寶印自然尊丹霞淳增收鄂州百巖明哲禪師嗣藥山洞山與密師伯到參師問曰闍黎近離什麼處洞山曰近離湖南師曰觀察使性什麼曰不得姓師曰名什麼曰不得名師曰還治事也無曰自有廊幕在師曰豈不出入山便拂袖去師明日入僧堂曰昨日對二闍黎一轉語不稔今請二闍黎道若道得老僧便開粥相伴過夏速道速道山曰太尊貴生師乃開粥共過一夏頌曰燒香人靜杳無聲苔滿丹墀皓月明入戶當堂慵正坐出門尤懶下階行丹霞淳枯木巖前煙嶂昏羚羊挂角覔無門玉梭暗擲千峯外一線虗通曉色分孤逈逈絶瘢痕萬古寒潭攪不渾正坐當堂金殿冷回頭盡是我兒孫自得暉賓則始終賓主則始終主拂袖辨誵訛依前還自舉還自舉柏巖堂上雨花雨月菴果秀州華亭船子德誠禪師嗣藥山師印心於藥山與道吾雲巖為交洎離藥山謂同志曰豫率性疏野唯好山水他後知我所止遇伶俐座主指一人來遂分携至華亭泛一小舟隨緣度日吾後到京口遇夾山上堂僧問如何是法身曰法身無相曰如何是法眼曰法眼無瑕吾失笑山下座請問某甲抵對這僧話必有不是致令失笑望不吝慈悲吾曰和尚一等是出世未有師在山曰甚處不是曰某甲終不説請往華亭船子處去山曰此人如何曰此人上無片瓦下無卓錐若去須易服而往山乃散衆直造華亭船子才見便問大德住甚麼寺山曰寺即不住住即不似師曰不似似箇甚麼山曰不是目前法師曰甚處學得來山曰非耳目之所到師曰一句合頭語萬劫繫驢橛師又問垂絲千尺意在深潭離鈎三寸子何不道山擬開口被師一橈打落水中山才上船師又曰道道山擬開口師便打山豁然大悟乃點頭三下師曰竿頭絲線從君弄不犯清波意自殊山遂問拋綸擲釣師意如何師曰絲懸淥水浮定有無之意山曰語帶玄而無路舌頭談而不談師曰釣盡江波錦鱗始遇山乃掩耳師曰如是如是頌曰泛舟駕險三十春繫處竿頭死活人夾嶺桂分千古韻朗江山翠萬重斯投子青捨短從長有幾人遠求船子扣玄津蘭橈數拄徒開口水色山光特地新覺海元不犯清波不擲鈎怪哉當面觸鼇頭微茫一噴朧雨萬壑千溪水逆流保寧勇長竿放去隨波浪絲線收來獲錦鱗橈下反身何脫灑回頭不見舊時人佛迹昱蘆葦蕭蕭江岸秋長天獨月向西流離鈎三寸無人道笑倚蘭橈自點頭張無盡驀口一橈玄路絶藥山之道始流傳離鈎三寸無消息覺海方乘般若船徑山杲續收白雲檻外思悠哉密密金刀剪不開幽洞不拘金鎖意縱橫無繫去還來丹霞淳一葉輕舟泛海隅金鈎釣得錦鱗粗幾多逐浪迷源者誰識清波意自殊枯木成離鈎三寸如何道駐擬還同眼裏沙篷底月明載歸去劫前風韻落誰家真歇了離鈎三寸何不道法眼無瑕瑕轉多若使一橈全腕力朱涇無復水重波竟陵海首座渺渺煙波一葉舟竿頭絲線幾沉浮離鈎三寸如何道便有金鱗暗點頭尼無著總一橈提起定綱宗直得乾坤大地空只為夾山輕放過至今四海錯流通別峯印一橈打著這瞎漢堪笑令猶行一半竿頭絲線釣鯨波攫浪拏雲猶是鈍圜極岑一橈劈腦沒遮攔大海波濤徹底乾盡謂單傳并直指誰知總被祖師謾密菴桀離鈎三寸已周遮臭口才開隔海涯嬴得雲山渺秋水至今長映夕陽斜孤雲權三寸離鈎槭一橈百千毛竅冷颼颼雖然兩手親分付要在渠儂自點頭無際派夾嶠當年錯用心貪他香餌被他擒點頭三下無言説水闊山遙恨轉深浙翁琰了無錐地可容身却泛孤舟據要津不獨夾山遭毒手至今賺殺一船人笑翁堪合頭著語酬船子恰如掘地覔青天直饒橈下通明徹也是華亭破漏船蘇臺辨無相無瑕便倒戈只因輕信智頭陀若還不到華亭上鐵鑄船橈奈汝何南叟茙朱涇深處泛扁舟伶俐闍黎上直鈎劈口一橈空宇宙遠山疊疊水悠悠葛廬覃笑中棄却竹林寺將謂華亭有幾多窮性命於橈下喪細思成敗是蕭何末宗本三十餘年在藥山鬼家活計豈能傳當時不得夾山老你且耐煩撑破船清溪徹船子囑夾山曰汝向去直須藏身處沒蹤迹沒蹤迹處莫藏身吾二十年在藥山祇明斯事汝今既得他後莫住城隍聚落但向深山裏钁頭邊覔取一箇半箇接續毋令斷絶山乃辭行頻頻回顧師遂喚闍黎山乃回首師竪起橈曰汝將謂別有乃覆船入水而逝頌曰夾山橈下悟心休何患身名踏覆舟今古華亭垂釣者煙波江上使人愁照覺總蓼夾蘆花碧海秋錦鱗躍浪上金鈎目前無法回頭看踏覆船來得自由羅漢南續收不犯清波意自殊口開目瞪尚踟蹰漁舟覆却無蹤迹落日秋風戰荻蘆佛陀遜老手當年靠夾山全機喪盡結深冤父南子北家何在撥轉天關地軸翻瞎堂遠驀口一橈全殺活點頭三下鼻撩天至今千古風流在誰道華亭覆却船佛照光拶透機先子欲酬迅雷楫下汗如流踏翻船子水悠悠直入千峯不轉頭水菴一藏身無迹更無藏脫體無依便廝當古鏡不磨還自照淡煙和露濕秋光沒蹤迹處莫藏身看來端是眼中塵全機打破繫驢橛棒頭敲出玉麒麟圜極岑明鏡當臺一椎打破東魯西秦無可不可肯堂充一橈劈口虗空破三點驢頭覆却船父子至今俱不了江湖波浪錯流傳天童淨機輪元不挂絲頭會有金鱗上直鈎驀口一橈猶未徹踏反船子有來由松源嶽臭口未開經萬劫絲毫才犯鐵輪隨雨散雲收明月夜反動江波説向誰木菴永夾山不在一橈上明月蘆花夜夜寒誰謂華亭消息斷儼然秋色在江山解空觀散席迢迢到海涯點頭橈下喪全機父南子北今何在月冷漁歌落釣磯天目禮一下蘭橈驀口鞭大洋海底火燒天父南子北家何許風滿長空月滿船𫎇菴聰稱意金鱗一上鈎華亭江水合西流釣船盡底掀翻了惱亂春風卒未休朴翁銛藥貼分明説得親不知裏面偽和真諄諄教誡癡兒女莫把方書誤後人虗堂愚一棹緑楊灣金鱗得處難長江深有恨不合踏反船西巖惠藏身處沒蹤迹無影樹頭靈鳥宅沒蹤迹處莫藏身不萌枝上春花拆有來由誰辨的天曉西風拂拂吹松叉一徑爭拋擲東谷光藥山高沙彌嗣藥山因藥山問曰見説長安甚閙師曰我國晏然法眼別云見誰説山曰汝從看經得請益得師曰不從看經得亦不從請益得山曰大有人不看經不請益為甚麼不得師曰不道他無只是他不肯承當頌曰撞破虗空七八片逆開金鎖兩三重轉身直入青霄外多少行人覔路蹤成枯木興亡虗去又虗來為渠國土絶纖埃須彌頂上無根草不受春風花自開投子青高沙彌住菴一日雨中來相看藥山山曰你來也師曰是山曰可煞濕師曰不打這鼓笛雲巖曰皮也無打甚麼鼓道吾曰鼓也無打甚麼皮師曰今日大好一場曲調頌曰偶爾垂言借問伊知音爭使落今時胡笳不犯宮商曲玉笛橫時劫外吹丹霞淳鼎州李翱刺史見藥山嚮藥山玄化屢請不赴乃躬謁之山執經卷不顧侍者曰太守在此李性褊急乃曰見面不如聞名拂袖便出山曰太守何得貴耳賤目李回拱謝問曰如何是道山以手指上下曰會麼李曰不會山曰雲在青天水在瓶李欣愜作禮述偈曰鍊得身形似鶴形千株松下兩函經我來問道無餘説雲在青天水在瓶頌曰雲在青天水在瓶恐君妄解作惺惺汾陽問你幽魂聽如實神通現姓名汾陽昭雲在青天水在瓶丹霄把手共君行回頭不覺寒更曉一片紅光海上生圓通仙雲在青天水在瓶眼光隨指落深坑溪花不耐霜風苦説甚深深海底行張無盡隴西賢相登藥嶠雲在青霄水在瓶風靜雲消空獨露天門玉女不曾扃京兆府天寧璉古人問道復何言水在瓶中雲在天故國要歸歸便得離亭雲月渡頭船白楊順續收制使當年問道時單鎗匹馬到禪扉再四垂慈猶未曉揮毫落紙更明詩洞山聰陌路相逢不相識雲水悠悠無定迹饒君富貴百千般爭似儂家窮的的大洪恩貴耳而賤目背手抽金鏃仰面看青天箭過新羅國辨山阡雲在青天水在瓶平生肝膽向人傾真金自有真金價終不和沙賣與人北海心若陳見面太懸殊雲水重新誑惑渠謾説當時曾省悟却將魚目當明珠天目禮撥草瞻風不奈何深山有道要經過只因貴耳而賤目引得全身入草窠毒菴常即今非見面昔日不聞名一句添三句篇章讀不成西巖惠增收京兆府翠微無學禪師嗣丹霞一日在法堂內行投子進前接禮問曰西來密旨和尚如何示人師駐步少時子曰乞師垂示師曰更要第二杓惡水那子便禮謝師曰莫跺根曰時至根苗自生頌曰曾扣西來問翠微經行駐步大慈悲當時投子如能薦惡水重將更潑誰水菴一師子出窟驪龍入穴擡眸風生衆獸腦裂更弄爪牙反成漏泄時至須憑返擲機分明踏破澄潭月投子舒增收吉州孝義寺性空禪師嗣丹霞因僧參人事了師曰與麼下去還有佛法道理也無曰某甲結舌有分師曰老僧又作麼生曰素非好手師便仰身合掌僧亦合掌師乃拊掌三下僧拂袖便出師曰烏不前兔不後幾人於此茫然走祇有闍黎達本源結舌何曾著空有頌曰進不前退不後頭尾中間兩處走胡僧撫掌笑呵呵此土西天未曾有佛鑑勤入林不動草入水不動波曾經達本源結舌更無過若是參方士須達末後句大圓智晝復夜初中後金烏飛玉兔走於此茫然與悄然總是蝦跳不出斗石溪月增收仙天禪師或作天仙嗣潭州大川披雲和尚來才入方丈師便問未見東越老人時作麼生為物雲曰祇見雲生碧嶂焉知月落寒潭師曰祇與麼也難得曰莫是未見時麼師便喝雲展兩手師曰錯怪人者有甚麼限雲掩耳而出師曰死却這漢平生也頌曰有客訪師才入門由來賓主未曾分箭鋒相拄皆無咎善始全終誠罕聞本覺一眼明慣識揮雲高兩手揮戈戰不休世事若將公道斷將軍歸去合封侯絶象鑒作者相逢箭拄鋒其中綿密不通風要須惜取眉毛好免使全身落草中竹屋簡增收仙天因僧參方展坐具師曰不用通時暄還我文彩未生時道理來曰某甲有口哂却即間苦死覔箇臘月扇子作麼師拈棒作打勢僧把住曰還我未拈棒時道理來師曰隨我者隨之南北不隨我者死住東西曰隨與不隨且置請師指出東西南北師便打頌曰將軍帳上孰能過不易僧初善切磋蛇尾龍頭弓劒折山藤三十未為多本覺一增收馬頰山本空禪師嗣大顛因僧問去却即今言句請師直指本來性師曰你迷源來得多少時曰即今蒙和尚指示師曰若指示你我即迷源曰如何即是師示頌曰心是性體性是心用心性一如誰別誰共妄外迷源祇者難洞古今凡聖如幻如夢佛鑑云問不徒然答無虗設才隨語轉覿面千山後偈中雖有收有放其奈錯下名言山僧重為別過乃有偈曰心本非心性本非性心性兩忘誰少誰剩老倒本空灼艾求病妄外迷源孤負凡聖心性從來體一同有無空處透真空古今妄外迷源者春入園林處處紅塗毒策增收本空上堂祇這施為動轉還合得本來祖翁麼若合得十二時中無虗棄底道理若合不得喫茶説話往往喚作茶話在僧便問如何免得不成茶話去師曰你識得口也未曰如何是口師曰兩片皮也不識曰如何是本來祖翁師曰大衆前不要牽爺恃娘曰大衆欣然去也師曰你試點大衆性看僧作禮師曰伊往往道一性一切性在僧欲進語師曰孤負平生行腳眼頌曰參禪學道莫匇匇動轉無非觸祖翁口在面門猶不見喫茶清話故難通水中鹽味如相似色裏膠清信不空欲得不招無間業莫將情解謗宗風南堂興漳州三平義忠禪師嗣大顛因問大顛不用指東劃西請師直指顛曰幽州江口石人蹲師曰猶是指東劃西顛曰若是鳳凰兒不向那邊討師禮拜顛曰若不得後句前話也難圓頌曰徹底老婆心不向那邊討父子要投機無端入荒草圓悟勤
