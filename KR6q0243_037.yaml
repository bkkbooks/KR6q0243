body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第九世之餘清源下第八世之餘曹洞增收鼎州梁山緣觀禪師嗣同安志僧問如何是空劫已前事師曰擊動乾坤鼓時人聽不聞頌曰虗空為鼓須彌槌擊者雖多聽者稀半夜髑髏驚破夢滿頭明月不思歸丹霞淳增收梁山因僧問如何是祖師西來意師曰莫亂道頌曰國令嚴嚴擬者危毫𨤲才動鐵輪隨心萌口應三千里齒露言來苦怨誰投子青增收梁山因僧問祖意教意是同是別師曰金烏東上人皆貴玉兔西沉佛祖迷頌曰靈山會上言雖普少室峯前句未形瑞草蒙茸含月秀寒松蓊出雲青丹霞淳增收梁山因僧問如何是日用事師曰碧玉點破琉璃色滿目紅塵不見沙頌曰劫火洞然無相宅金門不覩玉樓家寶天雲淡銀河冷浩浩波瀾豈動沙丹霞淳增收懹安軍雲頂山德敷禪師嗣護國遠成都帥請就衙升座有樂營將出禮拜起回顧下馬臺曰一口吸盡西江水即不問請師吞却階前下馬臺師展兩手唱曰細抹將來營將猛省頌曰吞却階前下馬臺逢人有口亦難開戲衫莫怪重拈出曾是村歌社舞來笑翁堪增收襄州石門紹遠禪師嗣石門徹僧問如何是祖師西來意師曰布袋盛烏龜頌曰剖出驚人句布袋裏烏龜衲僧莫錯會黑豆未生時洞山聰臨濟增收鼎州文殊應真禪師嗣德山密僧問萬法歸一一歸何處師曰黃河九曲頌曰問法窮因歸何處黃河透過碧波瀾須知雲外千峯上別有靈松帶露寒投子青路窮崖斷進無門賴有山翁指出原九曲黃河清徹底誰知別是一乾坤懶菴需九曲那容眨眼看操舟誰解別波瀾文殊曾展回天手直得朝宗萬派乾木菴永增收文殊真因僧問古人垂一足意旨如何師曰坐久成勞頌曰馳書才去返匇匇一足垂酬繼後蹤坐久成勞誰委悉紅爐點雪自相通投子青增收南嶽南臺勤禪師嗣德山密僧問如何是祖師西來意師曰一寸龜毛重七斤頌曰等間不語未逢人語便傷真似太親不顧火中鸞鳳息驚他石虎暗生瞋投子青蘄州五祖師戒禪師嗣雙泉寬僧問如何是佛師曰踏著稱鎚硬似鐵頌曰踏著稱鎚硬似鐵懵懂禪和猶未瞥三冬嶺上火雲生六月長天降大雪雲峯悅踏著稱鎚硬似鐵此時有理不能説新羅國裏火星飛直向雲門指上熱白雲端信步紅塵裏無人問短長歸來天欲暮片月照滄浪京兆府天寧璉續收牧童歸去倒騎牛白日城中晚未休踏著稱鎚硬似鐵那知船子下楊州佛陀遜增收五祖戒因智門問暑往寒來即不問林下相逢事若何師曰五鳳樓前聽玉漏問曰爭奈主山高案山低師曰須彌頂上擊金鐘頌曰高高峯頂翻銀浪深深海底起紅塵金鐘玉漏相酬酢疑殺滔滔天下人苟非作者孰問關津執鞭回首四海良鄰君不見仲尼溫伯雪傾蓋相逢也奇絶圓悟勤五鳳樓前聽玉漏須彌頂上擊金鐘巨靈擡手無多子擊破華山千萬重即菴覺隨州智門光祚禪師先住復州北塔嗣香林遠僧問蓮華未出水時如何師曰蓮華曰出水後如何師曰荷葉頌曰蓮花荷葉報君知出水還同未出時江北江南問王老一狐疑了一狐疑雪竇顯蓮花荷葉有由哉泥水分時絶點埃堪憶九龍初沐處東西一步一花開白雲端蓮花荷葉共池中花葉年年緑間紅春水漣清徹底一聲啼鳥五更風張無盡煙籠檻外差差緑風撼池中柄柄香多謝浣沙人不折雨中留得蓋鴛鴦慈受深蓮花荷葉的須分無限清香付與君彈指若知霄漢路便能平地步青雲長靈卓香苞冷透波心月緑葉輕搖水面風出未出時君看取都盧只在一池中佛鑑勤泥水未分紅菡萏雨餘先透碧波香千般意路終難會一著歸根便廝當佛燈珣續收蓮花荷葉非妙非玄碧潭澄徹明月初圓最好太平無一事儘教樵唱滿江村佛心才白藕未明非隱的紅花出水不當陽遊人莫用傳消息自有清風透遠香丹霞淳荷花荷葉為君通問答還同箭拄鋒覿面清香來不盡須知不在藕池中本覺一出水何如未出水蓮花荷葉有來由定光金地遙招手智者江陵點暗頭太源嶽荷葉團團擎翠蓋蓮花灼灼鬪紅粧馨香越格無人薦又逐薰風過野塘雲耕靜荷花荷葉意在言前神仙妙訣父子不傳石田薰智門因僧問如何是般若體師曰蚌含明月曰如何是般若用師曰兔子懷胎頌曰一片虗凝絶謂情人天從此見空生蚌含明月深深意曾與禪家作戰爭雪竇顯蚌含明月兔懷胎無限禪人劈不開鐵眼銅睛何擬擬三千里外笑咍咍長靈卓蚌含明月秋波冷兔子懷胎夜魄寒皎皎清光成一片直須回首好生觀佛鑑勤續收蚌含玄兔旨何深體用明來絶古今雪曲唱高還和寡不知何處是知音本覺一玉兔懷胎蚌含明月乘時正在中秋節一顆明珠轉玉盤徹底無瑕光皎潔慈受深增收智門因僧問如何是佛師曰踏著草鞋赤腳走曰如何是佛向上事師曰拄杖頭上挑日月頌曰路上忙忙赤腳人草鞋踏破走風塵東西南北忙中畔拄杖頻挑日月輪佛國白踏破草鞋赤腳走衲僧到此無窠臼拄杖頭邊挑日月九州四海任遨遊真如智門真得祖家風放出雲門廣長舌大智如愚大巧若拙用盡工夫參不徹莫於平地上增堆休向虗空裏釘橛天童覺拄杖頭上挑日月藏身北斗何殊絶三千剎海夜沉沉新出紅爐一點雪南堂興二踏破草鞋赤腳走胸中憤氣衝牛斗須彌頂上擊金鐘百戰場中師子吼踏破草鞋赤腳走堂堂向外揚家醜只知斂袂出人前不覺衣穿露兩肘最菴印增收天台蓮華峯祥菴主嗣奉先深示寂日拈拄杖示衆曰古人到這裏為甚麼不肯住衆無對師乃曰為它途路不得力復曰畢竟如何以杖橫肩曰楖𣗖橫擔不顧人直入千峯萬峯去言畢而逝頌曰眼裏塵沙耳裏土千峯萬峯不肯住落花流水太茫茫剔起眉毛何處去雪竇顯住不住兮日卓午蓮華菴主誰相許楖𣗖橫擔不顧人千峯萬峯是何處翠巖真作者仍甘在半途半途不住竟何如橫擔楖𣗖千峯去雲外何人得見渠本覺一石火光中爛熳遊白拈臨濟未同儔掀反華嶽連天黑幾箇知身在御樓無菴全六祖下第十世之一南嶽下第九世臨濟汾州太子院善昭禪師嗣首山僧問如何是祖師西來意師曰青絹扇子足風涼頌曰藂林傑出鎮汾陽譽走名馳振八方人問祖師西來意解云扇子足風涼正覺逸青絹扇子足風涼斷際全機善舉揚月明三峽猿啼夜何處人聞不斷腸佛慧泉青絹扇子足風涼親得搖來始息狂只愛團團無縫者人前空自眼如羊白雲端青絹扇子足風涼日用何曾有覆藏堪笑塵中無限客手遮西日汗如湯慈受深汾陽青扇價難酬為有涼風卒未休不見鹽官多少衆競頭爭角覓犀牛上方益風格團團妙意深等間拈出示知音汗流浹背曾施手氣爽中宵便負心佛鑑勤二祖意宗師先漏泄團團青扇足風涼禪人未曉重相問獨自凄凄過洛陽親得搖來始息狂風動荷花滿座香自從一得真歸趣無意涼人人自涼楚安方續收呷醋咬陳薑波斯鼻孔長得些滋味子婆是阿爺娘肯堂充青絹扇子足風涼標格團團不覆藏信手拈來隨處用清機元不在汾陽頑石空增收汾陽示衆曰識得拄杖子行腳事畢三角云識得拄杖子入地獄如箭頌曰平地無端立話端揭天聲撼怒濤寒直饒識得拄杖子也是封皮作信看笑翁堪汗漫學屠龍人言枉費工自非親到者誰與論窮通虗堂愚增收妙峯善著語云錯又舉三角語了云錯老僧則不然識得拄杖子錯乃頌曰妙峯三箇錯不是無病藥龐公賣笊籬清平道木杓增收汾陽示衆曰夫説法者須具十智同真若不具十智同真邪正不辨緇素不分不能與人天為眼目決斷是非如鳥飛空而折翼如箭射的而斷弦弦斷故射的不中翼折故空不可飛弦壯翼牢空的俱徹作麼生是十智同真與諸上座點出一同一質二同大事三總同參四同真志五同遍普六同具足七同得失八同生殺九同音吼十同得入又曰與甚麼人同得入與阿誰同音吼作麼生是同生殺甚麼物同得失阿那箇同具足是甚麼同遍普何人同真志孰能總同參那箇同大事何物同一質有點得出底麼點得出者不吝慈悲點不出來未有參學眼在切須辨取要識是非面目見在徑山杲云汾陽末後若無箇面目見在一場敗闕雖然如是喪我兒孫喝一喝頌曰兔角龜毛眼裏栽鐵山當面勢崔嵬東西南北無門入曠劫無明當下灰十智同真面目全於中一智是根源若人要識汾陽老擘破三玄作兩邊洪覺範十年湖海覓冤讎不得冤讎未肯休芍藥花開菩薩面棕櫚葉長夜叉頭鼓山圭畫得真如活花間翅展開黃鶯偷眼不敢下枝來正堂辨陽春白雪人難和藻鑑冰壺豈易觀一把柳絲收不得和風搭在玉闌干或菴體增收汝州葉縣廣教院歸省禪師嗣首山僧問如何是學人密用心處師曰閙市輥毬子曰意旨如何師曰溥請衆人看頌曰輥毬閙市衆人看一陳清風吹面寒定亂不須雙刃劒活人何必九還丹即菴覺襄州谷隱山蘊聰禪師亦曰石門聰亦曰慈照聰嗣首山僧問日往月來遷不覺年衰老還有不老者麼師曰有曰如何是不老者師曰虬龍筋力高聲呌晚後精靈轉更多頌曰洞裏無雲別是天桃花如錦柳如煙仙家不會論冬夏石爛松枯是一年無量壽慈照聰因僧問如何是道師曰臘月三十日頌曰臘月三十日開口便為敕更擬問如何明朝正月一無準範臘月三十日真人好消息戴帽空山行穿靴水上立雲衲慶汝州廣慧院元璉禪師嗣首山初到首山山問近離甚處師曰漢上山竪拳曰漢上還有這箇麼師曰這箇是甚麼碗鳴聲山曰瞎師曰恰是拍一拍便出他日又問學人親到寶山空手回時如何山曰家家門前火把子師大悟云某甲不疑天下老和尚舌頭也山曰汝會處作麼生與我説來看師曰祇是地上水碙砂也山曰汝會也師便禮拜頌曰空手歸時誰肯信驢馱馬載入門來家家舉起火把子半夜天如白日開白雲端寶山到日事如何空手回時所得多家家門前火把子明如日月照山河佛鑑勤六祖下第十世之餘清源下第九世雲門潭州北禪智賢禪師嗣福嚴雅歲夜小參曰年窮歲盡無可與諸人分歲老僧烹一頭露地白牛炊黍米飯煮野菜羮燒榾拙火大家喫了唱村田樂何故免見倚他門戶傍他墻剛被時人喚作郎下座歸方丈至夜深維那入方丈問訊曰縣裏有公人到勾和尚師曰作甚麼曰道和尚宰牛不納皮角師遂將下頭帽擲在地上那便拾去師下禪牀攔胸擒住呌曰賊賊那將帽子覆師頂曰天寒且還和尚師呵呵大笑那便出去時法昌遇為侍者師顧昌曰這公案作麼生昌曰潭州紙貴一狀領過頌曰納它皮角要輸機放下尋時結抄歸一任這回黃雪落滿家圍火掩柴扉白雲端佛性要當相節顯北禪除夜啓玄津當筵獨恣庖丁刃直至如今此話新靈源清二來勾皮骨訪知音一語當機直萬金帽子擲來如未曉眼前爭免拾花針分皮納角牛何在叉釧瓶盤只一金大用莫言無軌則當機須是芥投針草堂清白牛露地直須烹分歲間和野菜羮莫謂箇中滋味少須知四海飽膨脝普融平北禪分歲烹白牛官中文字急來勾立地交他納皮角連忙擲下舊兜鍪文殊道續收北禪夜分歲特地巧安排維那出隻手線去又絲來田郎催拍板鮑老舞三臺若教行正令活作一坑埋石菴玿白牛烹了正熙熙皮角官中却要追將下帽簷輸納了燈前更鼓夜遲遲天目禮增收北禪因僧問如何是佛師曰𢁈挑不上頌曰𢁈挑不上箸撥不開合掌讚言善哉善哉疏山如增收瑞州洞山曉聰禪師嗣文殊真常自負柴上山路逢一僧問山上有柴何故將去師放柴於地曰會麼曰不會師曰我要燒頌曰此行莫擬幾時回北去應須到五臺若遇文殊放光處殷勤為我記歸來虗堂愚柴火煎熬擔在身相逢狹路不堪論淡煙落日青山外滿地難收刀斧痕石林鞏增收洞山聰曰一大藏教只是箇之字頌曰點畫分明無道理老胡幾度提不起不如分付王將軍無限風流歸手裏白雲端增收洞山聰因僧問既是泗州大聖為什麼在楊州出現師曰君子愛財取之有道頌曰泗州忽示現楊州天下宗師話路稠君子愛財取有道南海波斯鼻孔粗慈明圓玉堂有路通人到金榜無名只自慚長恨貧儒書讀盡老來不得一青衫柏庭永增收明州雪竇山重顯禪師嗣智門祚示衆曰龍泉與刀斧同質利鈍懸殊駑駘與驥馬同途遲速有異頌曰説似琅玕猶是玉謂言鍮石又如金自慚識性多庸下未有昭昭至鑑心佛鑑勤增收雪竇示衆曰譬若世界壞時大水競作其間無量衆生或沒未沒互相悲號仰望蒼蒼皆云相救當是之時四禪天人一見高聲便喝咄哉衆生我預曾報汝令頻頻上來汝却不聽如今有什麼救處乃拍手云歸堂頌曰劫外濤聲滿世間羣生無處可躋攀寥寥天外清虗境誰解陵空上帝關圭堂居士增收雪竇住翠峯時有數僧到師曰新到那僧曰是師曰參堂去僧才行師復喚曰來來僧回首師曰洞庭難得師僧到與你一碗茶喫頌曰入門句子已先酬喚去呼來第二頭到此不知茶味者紛紛空買洞庭舟虗堂愚增收雪竇改船子漁父頌曰夜靜水寒魚不食滿船載得月明歸頌曰閃爍金鱗躍浪時華亭貪玩下鈎遲誰知雪老垂綸慣不犯波濤取得伊白雲端增收雪竇因僧問如何是諸佛本源師曰千峯寒色曰未審向上更有事也無師曰雨滴巖花頌曰千峯寒色事如何雪上加霜凍滑多若遇鄒陽吹暖律巖花應不待春和楊無為千峯寒色冷堆青雨滴巖花照眼明若問箇中端的旨休將鶴唳作鶯聲本覺一增收雪竇因僧問山花開似錦澗水湛如藍學人分上為什麼不會師曰枯木裏瞪眼曰恁麼則從苗辨地因語識人也師曰三十棒且待別時頌曰一枝枯草強遮羞明鏡當軒燭盡幽滿面慚惶移步去清光灼灼避無由白雲端增收雪竇頌革轍二門曰劫火曾洞然木人淚先落可憐傅大士處處失樓閣一德雲間古錐幾下妙峯頂喚它癡聖人擔雪共填井二祖佛未生前已震塗毒鼓如今誰樂聞請試分回互三宛轉復宛轉真金休百鍊喪却毗耶離無人解看箭四頌曰迦葉聆箏起舞淵明聞鐘皺眉息耕斗室危坐半窗凍日熙熙虗堂愚風卷浮雲盡青天絶點埃山川俱在目何必上高臺葛蘆覃增收雪竇頌曰三分光陰二早過靈臺一點不揩磨區區日逐貪生去喚不回頭爭奈何頌曰業識茫茫無本可據咄哉癡漢便恁麼去肯堂充鋸解稱鎚油煎石磉兩手擎來有功者賞且菴仁無禪才云雪竇老漢顢顢頇頇儱儱侗侗更參三十年也未會禪在然雖如是土曠人稀試聽下箇注腳乃頌曰瞎却摩醯三隻眼南北東西路不分千林落葉無人掃獨自松門展腳眠增收雪竇與李殿院坐次有秀才并道士到院李問云三教中那箇為貴師側身叉手而立李曰有口何不道取師曰對夫子而難言頌曰五老峯前古觀基老君元是一牟尼時難只得同香火莫聽他人説是非南堂興增收雪竇因僧問如何是佛師曰四山圍繞頌曰狂狗趂塊瞎驢趂隊只許我知不許伊會南華昺增收雪竇因僧問如何是諸佛向上人師曰白雲覆青山曰莫便是和尚為人處也無師曰淥水徒長蕖頌曰雪嶠層層翠瑣深風生寒岫結重雲夜來丹鳳沖霄漢聽曉樵人逐鴈羣投子青增收雪竇問大龍語者默者不是頌曰三軍不動旗閃爍龍蛇陳上看謀略令人長憶李將軍萬里晴空飛一鶚復菴封增收潭州雲蓋繼鵬禪師嗣智門祚初謁雙泉雅禪師泉令充侍者示以芭蕉拄杖話經久無省發一日泉向火次師侍立泉忽問拄杖子話試舉來與子商量師擬舉泉拈火箸便摵師豁然大悟頌曰與奪雙行驗正邪才爭拄杖便亡家驀然鐵棒如風疾失却從前眼裏花白雲端擊碎髑髏敲出骨節明眼人前自彰醜拙木菴永增收相州天平從禪師嗣清溪進師到西院常自曰莫道會佛法人覓箇舉話底人也無院聞而默之師異日上法堂次院召從師舉首院曰錯師進三兩步院又曰錯師近前院曰適來兩錯是上座錯是思明老漢錯師曰是從錯院曰錯錯乃曰上座且在這裏過夏共汝商量這兩錯師不肯便去後住相州天平山每舉前話曰我行腳時被惡風吹到汝州有西院長老勘過連下兩錯更留我過夏待共我商量我不道恁時錯我發足向南方去時早知錯了也首山念云據天平作恁麼解會未夢見西院在何故話在頌曰禪家流愛輕薄滿肚參來用不著堪笑堪笑天平老誰謂當初悔行腳錯錯西院清風頓銷爍復云忽有箇衲僧出來道錯雪竇錯何似天平錯雪竇顯把纜放船膠柱調絃遠水不救近火短綆那級深泉天平老太匆草為兩錯悔行腳大地茫茫愁殺人眼裏無筋一世貧圓悟勤彼呼我諾彼啐我聞如不聞將錯就錯金剛眼睛槵子換却會與不會都盧是錯佛鑑勤兩錯將來竟不成從而南北路頭分後來費盡分疏語半是思君半恨君雲衲慶曹洞增收郢州太陽警玄禪師嗣梁山觀僧問如何是和尚家風曰滿瓶傾不出大地沒飢人頌曰荊山美玉何須辨赤水玄珠不用拈罔象無心黃帝重卞和有智楚王嫌丹霞淳增收太陽玄問梁山如何是無相道場山指觀音曰這箇是吳道子畫師擬進語山急索曰這箇是有相底那箇是無相底師有省便禮拜山曰何不道取一句師曰道即不辭恐上紙筆山笑曰此語上去在頌曰路窮崖仞問山翁別指巖西東嶺東擬進霧垂嵐色重回頭忽見太陽紅投子青真空無相絶名模立底精兮畫底粗道即不辭難上紙西天鬍子沒髭鬚止泓鑑法眼增收天台山德韶國師嗣法眼示衆曰青蘿夤緣直上寒松之頂白雲淡佇出沒太虗之中萬法本間唯人自閙頌曰等是埀慈為你來舌頭拖地語如雷葛藤滿地無人剪狼藉春風又一回竹屋簡增收韶國師示衆曰通玄峯頂不是人間心外無法滿目青山頌曰心外本來無一法國師見處未為親若言滿目青山是認著還生眼裏塵無隱鑒增收金陵清涼泰欽法燈禪師嗣法眼師問僧如何是祖師西來意僧曰不東不西師不肯僧却問如何是祖師西來意師曰不東不西僧遂領旨頌曰西來祖意不東西猿鳥春深抱樹啼多少行人空悵望青山孤聳白雲低保寧勇不東不西一句全提軟似生鐵硬如爛泥投針未諳鉢水刮膜再用金鎞雲瑣家山歸路絶回頭翻笑杜鵑啼肯堂充增附雲居齊和尚法燈會中為知藏燈一日謂師曰有人問我西來意答他曰不東不西藏主作麼生會師對曰不東不西燈曰與麼會又爭得曰道齊祇恁麼未審和尚尊意如何燈曰它家自有兒孫在師頓明厥旨有頌曰接物利生絶妙外生終是不肖它家自有兒孫將來用得恰好頌曰他家自有兒孫在父祖田園都不愛平生活計剎那中東頭買得西頭賣大洪恩人問西來祖師意燈公對道不東西它家自有兒孫在多是隨言却自迷本覺一金陵報恩院玄則禪師嗣法眼初問青峯如何是學人自己峯曰丙丁童子來求火後謁法眼眼問甚處來師曰青峯眼曰青峯有何言句師舉前話眼曰上座作麼生會師曰丙丁屬火而更求火如將自己求自己眼曰與麼會又爭得師曰某甲祇與麼未審和尚如何眼曰你問我我與你道師問如何是學人自己眼曰丙丁童子來求火師於言下頓悟頌曰末上一回稱八兩又稱恰重半斤來定盤星在誰人手爭著絲毫可怪哉白雲端丙丁求火己躬明法眼青峯古路行行到水窮知盡處坐看雲起見平生照覺總丙丁求火問青峯叵耐韓獹逐塊蹤賴得清涼重點破一聲雷震化為龍大洪遂問處分明答處親青峯八字打開門頭頭盡是吾家物何必臨歧更問津佛燈珣續收丙丁童子來求火再問炎炎燎面門過現未來三世佛不離其中轉法輪冶父川丙丁童子來求火南方丙丁又屬火按劒宗師奈若何是君心下意不過卍菴顏一回醉倒玉樓前鬢亂叉橫語笑顛最是惱人腸斷處借婆衫子拜婆年皖山凝昔見非真今見非假字經三寫烏焉成馬寶葉源杭州永明開山道潛禪師嗣法眼初參法眼眼曰子參請外看什麼經師曰華嚴曰總別同異成壞六相是何門攝師曰世出世間一切法皆具六相曰空具六相不師無對曰何不問去師却問空具六相不曰空師於是開悟曰子作麼生會師曰空眼然之頌曰空兮空兮無背面拈起豁然成兩片簷向南屏山角頭千古萬古少人見要見麼以拂子打圓相云金烏飛上琉璃殿斷橋倫
