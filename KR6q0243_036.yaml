body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第八世之餘南嶽下後第七世襄州洞山守初禪師嗣雲門初參雲門門問近離甚麼處師曰槎度門曰夏在什麼處師曰湖南曰什麼時離湖南師曰去秋曰放汝三十棒師曰過在什麼處曰江西湖南便恁麼師於言下頓省五燈會元收曰初參雲門門問近離甚麼處師曰查度曰夏在甚麼處師曰湖南報慈曰幾時離彼師曰八月二十五曰放汝三頓棒師至明日却上問訊昨日𫎇和尚放三頓棒不知過在甚麼處曰飯袋子江西湖南便恁麼去師於言下大悟遂曰他後向無人烟處不蓄一粒米不種一莖接待十方往來盡與伊抽釘楔拈却炙脂帽子脫却鶻臭布衫教伊灑灑地作箇無事衲僧豈不快哉門曰你身如椰子大開得如許大口師便禮拜頌曰一鏃三關破不難如何猶在是非間曲勞提起飯袋子三頓方知徹骨寒白雲端三頓當時打不回鐵門重擊鎖方開堪嗟不蓄一粒米十字街頭接往來保寧勇從來大道透長安步步應須著眼看五里只知還五里到頭方覺路岐難枯木成去年八月離湖南行盡千山與萬山不喫雲門三頓棒不知虎體有玄斑慈受深坐鎮韶陽老牯牛江西湖外遽相酬當時鐵限高擡起未必黃河不倒流寶峯祥吹毛寶劒當機妙切玉如泥孰可猜不犯鋒鋩全正令法王心印為君開禾山方雲門棒頭有眼洞山腳下雲生覷破森羅萬象便能海上橫行佛心才問答分明豈偶然須知逆耳是忠言洞山眼似銅鈴轉剛被雲門三頓謾文殊道奉君三頓曲周遮屈辱雲門老作家渡水穿雲五湖客欲將何物當生涯龍門遠續收見兔放鷹因行掉臂赤骨律窮方圓富貴放三頓棒尚遲疑再挨方識錐頭利單提獨腳機關外明眼衲僧猶不會圓悟勤雲門飯袋子毒蛇當古路觸著便傷人誰敢正眼無相範洞山初因僧問如何是佛師曰麻三斤頌曰麻皮三斤不用稱稱頭那肯坐於蠅一念才生筋骨露徒勞更覔定盤星北塔祚五彩畫牛頭黃金為點額春晴二月初農人皆取則寒食賀新正鐵錢三五百福巖雅金烏急玉兔速善應何曾有輕觸展事投機見洞山跛鱉盲龜入空谷花簇簇錦簇簇南地竹兮北地木因思長慶陸大夫解道合笑不合哭雪竇顯三年一閏大家知也有顢頇不記時昨夜鴈回沙塞冷帶霜梧葉又披披舊本作嚴風吹綻月中枝投子青火麻皮子若何分臘雪煎茶解醉君更有路行人未到野花含笑舊枝春法昌遇打鼓弄琵琶相逢兩會家去年一百五今歲又還他浮山遠橫眸讀梵字彈舌念真言吹火長尖觜柴生滿竈烟大愚芝如何是佛麻三斤咄大地茫茫愁殺人翠巖真一片初生月蛾眉畫碧空水中魚避釣雲外鳥防弓野軒遵問佛三斤麻齊僧怕夜茶春來寒食後古木噪寒鴉海印信同袍參學問通津來扣宗師佛正因為說三斤麻最好三斤天下說尖新幾多匠者頻拈掇奈緣緇素有踈親子今更為重稱過那吒太子析全身道吾真洞山有語麻三斤衲子擎拳問要津因憶舊年看草字張顛顛後更無人雲峯悅雲起千山曉風高萬木秋石頭城下水浪打釣魚舟佛慧泉斤兩分明不負君眼中瞳子莫生瞋百年三萬六千日得欣欣處且欣欣白雲端洞山麻三斤分明缺一著衲僧放不下尋言空摸索雲蓋智江南三月鷓鴣天雨過諸峯景物鮮行盡天涯諳世事買鞋須是大光錢三祖宗尺璧未為重片言不可輕領取鈎頭意莫認定盤星地藏恩南天地暖北天寒水陸相通見不難無限黃花兼翠竹任他千古往來看草堂清洞山的的麻三斤明月堂前贈若人碧眼厖眉才舉首又隨雲雨暗驚神長靈卓三斤足稱洞山麻撥動錙銖萬里差啼得血流無用處夜來依舊宿蘆花張無盡千峯勢到嶽邊住萬派聲歸海上消迸出紅爐金彈子眼睛定動面皮焦南華昺鴻鵠一舉千里飛鑽天子與天齊鳳凰不是凡間鳥為瑞為祥自有時龍門遠續收洞山麻三斤真鍮不博金將錢買五彩壁上畫天神琅琊覺洞山麻三斤斤兩不謾人語稀難問事貌古易傳神慈受深現前三昧料水打碓漏泄天機失錢遭罪文殊能洞山佛話三斤麻縛殺藂林老作家最好風前一聲笛江城五月落梅花石明鐘在扣谷受響池印月鏡含像曾非展事投機豈是預搔待癢點鐵成金舉直錯枉一箭鵰一雙一摑血一掌君不見疏而不漏兮天網圓悟勤驢尾猪頭牛腳跡三斤麻皮露消息志公杖頭剪刀尺從來雨下階頭濕玉泉璉洞山老勿疏親答佛法麻三斤無面目得人憎見得徹賺殺人妙峯善水斷流山突兀為君放出遼天鶻擬欲風前瞬息時擡眸已是成窠窟非窠窟咄咄咄塗毒策增收洞山初因僧問如何是正法眼師曰紙撚無油頌曰洞山宗匠較些些紙撚無油驗作家老倒禪和針子眼說禪說道會如麻翠巖真增收洞山初上堂言無展事語不投機承言者喪滯句者迷還得麼你衲僧分上到這裏須具擇法眼始得祇如洞山恁麼道也有一場過且道過在甚麼處頌曰只要拔楔抽釘為人解粘去縛如何洞山老人先自螣蛇繞腳鼓山圭言無展事語不投機承言者喪滯句者迷逢人不得錯舉徑山杲展事無回互投機通一線洞山無眼筋入地獄如箭南巖勝增收金陵奉先深禪師嗣雲門同明和尚到淮河見人牽網有魚從網透出師曰明兄俊哉一似箇衲僧相似明曰雖然如此爭如當初不撞入網羅好師曰明兄你缺悟在明至中夜方省明即金陵清涼智明禪師諸家語録作深明二上座頌曰透網金鱗是衲僧鐵壁銀山膽不驚明老三更方瞥地任教千嶂碧層層大溈智網中跳出便飛騰好箇天然俊衲僧何似當初未入網悟來方始是知音鼓山圭俊哉一跳透重淵霹𮦷追之去不還却笑龍門燒尾者依然點額在波瀾徑山杲師子咬人狂狗逐塊三十里來方始悟何似當初莫入去冶父川增收饒州薦福承古禪師嗣雲門即古塔主僧問如何是佛師曰莫莫又問如何是祖師西來意師曰莫莫頌曰古人一莫切忌啖臨濟權寄庫德山頓蕭索截斷佛祖機關顯出頂門一著子細審思量分明缺一著且道缺那一著雪堂行莫莫拈出一條斷貫索任從我佛及衆生撩天鼻孔都穿却松源嶽增收韶州雙峯興福竟欽禪師嗣雲門僧問賓頭盧應供四天下還得遍也無師曰如月入水問如何是用而不雜師曰明月堂前垂玉露水精殿裏粲真珠頌曰混而不雜體常虗雪月交光類莫如應處萬端無罣礙片雲自在卷還舒自得暉六祖下第九世之一南嶽下第八世臨濟汝州首山省念禪師嗣風穴僧問如何是佛師曰新婦騎驢阿家牽曰未審此語甚麼句中收師曰三玄收不得四句豈能該曰此意如何師曰天長地久日月齊明頌曰新婦騎驢阿家牽誰後復誰先張三與李四拱手賀堯年從上諸聖總皆然起坐忪諸沒兩般有問又須向伊道新婦騎驢阿家牽神鼎諲得不得傳不傳歸根得旨復何言憶昔首山曾漏泄新婦騎驢阿家牽黃龍南手提巴鼻腳踏尾仰面看天聽流水天明送出路傍邊夜靜還歸茅屋裏道吾真新婦騎驢阿家牽王老空中駕鐵船井底掛帆風勢惡須彌頂上浪滔天海印信新婦騎驢阿家牽傍觀笑渠顛倒顛歸來舉目暮雲合嶺上蟾蜍光未圓京兆府天寧璉七手八腳三頭兩面耳聽不聞眼不見啼得血流無用處不如緘口過殘春保寧勇張顛不似首山顛不動毫芒百怪全猶得黃龍再拈出四方明眼若為傳新婦騎驢阿家牽低頭拾得一文錢十字街頭拍手笑東村王老屋頭穿真淨文首山有語古今傳此語休云返倒顛新婦醉騎驢子去是人笑道阿家牽佛國白新婦騎驢阿家牽面如滿月目如蓮更將羅袖相牽挽一段風流遍大千慈受深新婦騎驢阿家牽體段風流得自然堪笑效顰鄰舍女向人添醜不成妍天童覺莫問新婦阿家免煩上路波吒遇飯喫飯遇茶喫茶同門出入宿世冤家五祖演新婦騎驢阿家牽碧玉羅紋頂上旋播土揚塵尋不見元來只在舊山前文殊道新婦騎驢阿家牽萬里滄溟駕鐵船參差島嶼分諸國倣佛星河共一天南華昺阿家新婦兩同條咫尺家鄉路不遙可笑騎驢覔驢者一生錯認馬鞍橋鼓山圭新婦騎驢阿家牽步步相隨不著鞭歸到畫堂人不識從今懶更出人前徑山杲阿家新婦最相憐新婦騎驢家便牽幾度醉歸明月夜笙歌引入畫堂前護國元續收新婦快騎驢阿家引鞭走石筍夜抽條面南看北斗湛堂深新婦騎驢阿家牽草裏尋常萬萬千誰在後兮誰在先不須特地苦加鞭牧菴忠蹇驢須是阿家牽媳婦嬌癡懶著鞭在舍只知七十二出門方見化三千簡堂機首山因僧問親到寶山空手回時如何師曰家家門前火把子頌曰家家門前火把子今古分明須記取五更鐘後聽雞鳴失曉朝官不帶帽石門聰門前火把寶山回玄學之徒遍九垓南海岸頭波浪起西番氈帽樣時裁翠巖真空手歸時誰肯信驢䭾馬載入門來家家舉起火把子半夜天如白日開白雲端寶山到日事如何空手回時所得多家家門前火把子明如日月照山河佛鑑勤首山因僧問如何是佛法大意師曰楚王城畔汝水東流頌曰楚王古城畔汝水向東流兩岸競垂釣幾人能直鈎正覺逸楚王城畔水東流逐浪隨波早晚休誰謂謝郎生計在夜深明月上孤舟佛慧泉楚王城畔水東流樹倒藤枯笑不休好是自從投子去更無人解道油油真淨文楚王城畔水東流今古朝宗是到頭逐浪隨波如未息輸他漁父泛孤舟溈山秀楚國城邊水去東發船便被打頭風蘆花灣裏聽漁喝尉斗煎茶銚不同三祖宗楚王城畔水東流日夜波濤去不休巖下忽逢湘水客謂言依舊注悠悠雲溪恭千波萬浪曾無盡去槳來帆浩莫窮謝客睡醒孤月白閒吹一笛渡頭風普融平增收楚王城畔水東流南地禪僧北地遊眼目直教從淺辨權衡爭奈出常流金篦為子挑除翳驢上穿靴背打毬翠巖真楚王城畔水東流獨腳山魈踢氣毬貪著六么花十八斷頭船子下楊州瞎堂遠暑往寒來春復秋夕陽西去水東流茫茫宇宙人無數那箇親曾到地頭雪巖欽首山因僧問如何是祖師西來意師曰風吹日炙頌曰日炙風吹不計年行人塵路辨應難擬心早已深三尺更教誰問箇中玄洞山聰風吹日炙少人知頂仰先賢對此機饒君曠劫生前會穿耳胡僧也皺眉法華舉日炙風吹問祖來紅塵亘野眼難擡忙忙役役知多少二月春深動地雷翠巖真風吹日炙橫臥荒草觸著毒氣全身便倒天寧璉日炙風吹也大奇根鏘匹馬將家兒皇圖自古元無事撥動烟塵更是誰三祖宗日炙風吹當路頭衲僧見後莫遲留我今到此堪惆悵葉落花紅經幾秋雲溪恭續收風吹日炙點朱點漆行人嗟嘆共誰相識汾陽昭增收首山拈竹篦示衆曰汝諸人若喚作竹篦則觸不喚作竹篦則背汝諸人且道喚作甚麼速道速道頌曰竹篦舉起成生殺豈肯容人亂札錐劈脊一揮如薦得銀山鐵壁也光輝照堂一拈起竹篦子便到家祕魔若不會隨後却擎叉鼓山圭背觸非遮護明明為舉揚吹毛元不動遍地是刀鏘徑山杲不觸又不背徒勞生擬議開口更商量白雲千萬里此菴元黑漆竹篦非觸背大地山河俱粉碎咬人師子急反身莫學韓獹猶逐塊遁菴演罵他還自罵瞋他還自瞋戒之慎之出乎爾者反乎爾者也卍菴顏辨龍蛇眼定乾坤粲粲一天星斗分拈起竹篦言背觸明明刺腦入膠盆笑翁堪拈起竹篦行殺活令背觸交馳佛祖乞命無門開野干鳴師子吼喪盡生涯不容開口虗堂愚增收首山示衆曰諸上座不得盲喝亂喝尋常向你道賓則始終賓主則始終主賓無二賓主無二主若有二賓二主兩箇即成瞎漢所以道我若立你須坐我若坐你須立坐則共你坐立則共你立雖然如是是著眼始得頌曰賓主有無俱遣外藏須要出常情無棲泊處開門戶月到中宵不敢明虗堂愚增收首山因僧問如何是學人親切處師曰五九盡日又逢春曰畢竟如何師曰冬到寒食一百五頌曰日暮陰雲郊野深重陽到後菊花新不因西嶠殘冰盡爭得東山一帶春投子青增收首山因僧問如何是菩提路師曰襄縣五里曰向上事如何師曰來任不易頌曰問路窮途擬進程緑楊鶯語送行人牌標五里向君說莫道常年不指陳投子青增收首山因僧問如何是學人用心處師曰怪你一問遲也頌曰未語難明迷悟情發言方表赤心人祇貪進步求名玉爭信靈苗不受春投子青六祖下第九世之二清源下第八世之一法眼宗呈增收升州清凉院法眼文益禪師嗣羅漢琛行腳次值天雨忽作溪流暴漲暫寓城西地藏院因參琛和尚琛問曰上座何往曰邐迤行腳去曰行腳事作麼生師曰不知曰不知最親切師豁然開悟頌曰而今飽學似當時脫盡纖塵到不知任短任長休剪綴隨高隨下自平持家門豐儉臨時用田地優游信步移三十年前行腳事分明孤負一雙眉天童覺增收法眼開堂次子方上座自長慶來師舉先長慶稜和尚偈問作麼生是萬象之中獨露身子方舉拂子師恁麼會又爭得曰和尚尊意如何師曰喚甚麼作萬象曰古人不撥萬象師曰萬象之中獨露身說什麼撥不撥子方豁然悟解頌曰萬象之中獨露身一回相見一回親東西南北吾皇化莫向江南苦問津浮山遠離念見佛破塵出經現成家法誰立門庭日逐舟行江練靜春隨草上燒痕青撥不撥聽叮嚀三徑就荒歸便得舊年松菊尚芳馨天童覺法眼因僧惠超問如何是佛師曰汝是惠超僧於是悟入頌曰問佛從頭理不虧莫同巧妙騁鋒機真金若不爐中鍛爭得將金喚作泥汾陽昭江國春國吹不起鷓鴣啼在深華裏三級浪高魚化龍癡人猶戽夜塘水雪竇顯巇嶮行時問路難有人相問北村南長安無限人來往幾箇無鈴過得關投子青僧問如何是佛師云汝是惠超禮拜進前叉手思量十萬迢迢慈明圓逆官買賣不相饒問佛言云是惠超嗟見衲僧生異解認他虹虹作仙橋天衣懷當臺明鏡絶精粗誰道胡來便現胡法不相饒人莫問可憐天下亂名模佛印元木人行千里駿馬不移蹄落日依南土因風向北嘶正覺逸妙用不須霜刃劒能彈何必玉絃絲嚴冬午夜後三點閒坐閒眠雲散時翠巖真才到元正便是年暖風無處不陶然途中多少尋春客誤聽黃鸝作杜䳌佛慧泉一文大光錢買得箇油糍喫向肚裏了當下便不飢白雲端擊石乃出火火光終不然碧潭深萬丈直下見青天草堂清一顆靈丹大似拳服來平地便升仙塵緣若有絲毫在蹉過蓬萊路八千慈受深三千里外望家鄉雲水重重客路長向道莫行山下去果聞𤠔呌斷人腸上方益望風鳴處困鹽車伯樂回觀價萬殊可笑如今虞坂上錯將駑馬作龍駒普融平問佛如何答惠超稱鎚雖定價相饒雲中不覩雙鵰落箭過新羅十萬遙長靈卓問佛云言是惠超當機一句不相饒遲疑更向途中覓重疊關山十萬遙雲溪恭覿面相呈見不難髑髏鑑覺尚顢頇巨靈擡手擘不破始信從前踢突圞南華昺問佛分明答惠超半斤八兩不相饒藂林萬古為殃禍惡語傷人恨不消真歇了病遇良醫飢逢王膳醬裏得鹽雪中送炭圓悟勤借婆裙子拜婆朝問佛唯言汝惠超萬古石頭城下水終歸大海作波濤佛燈珣問佛還云是惠超和根帶子上枝條春風浩浩難回避發起乾坤那一苗楚安方續收微酸梅子始生仁鶯老花殘迹已陳一夜南風移斗柄明朝烟柳不關春正堂辨一字入公門九牛拔不出咄這野狐精鼻孔都打失月林觀惠超問佛佛何遙機就機兮答惠超到此直須揮劒刃不然漁父便棲巢覺鐵觜法眼因僧問如何是曹源一滴水師曰是曹源一滴水頌曰曹源一滴水是即波濤起桃花流出洞中來漁舟夜宿蘆花裏楊無為曹源一滴是曹源萬派滔滔向海門無限乘槎人不薦風濤鼓處有龍蟠照覺總曹源一滴久澄清流出千江絶浪聲大海幾多遊玩者茫茫空繞水邊行白雲端守株非得兔罔象獲玄珠一滴曹源水分明灌五湖佛心才曹溪一滴異常流流入滄溟冠九州垂釣幾番波浪嶮未曾聞道失漁舟草堂清一滴曹源立問端清涼答處在言前衆流截斷窮源底百川依舊勢朝天佛燈珣續收得人一牛還人一馬珍重曹源可知禮也雷奔洶湧海濤生誰解截流那下行那下行通玄日午打三更韶禪師應口曹源一滴時誰知依樣畫猫兒袖中三尺龍泉劒落盡髑髏人不知別峯印增附法眼答此話時天台韶國師聞已豁然開悟平生疑滯渙然冰釋以所悟聞于師師曰汝向後當為國王所師致祖道光大吾不如也頌曰曹源一滴水相罵饒插觜鷃空啾啾驊騮已千里月窟清增收法眼因僧問承教有言從無住本立一切法如何是無住本師曰形興未質名起未名頌曰沒踪跡斷消息白雲無根清風何色散乾蓋而非心持坤與而有力洞千古之淵源造萬象之模則剎塵逆會也處處普賢樓閣門開也頭頭彌勒天童覺增收法眼問覺上座船來陸來曰船來師曰船在甚麼處曰船在河裏覺退師却問傍僧曰你道適來這僧具眼不具眼頌曰水不洗水金不博金昧毛色而得馬靡絲絃而樂琴結繩畫卦有許事喪盡真淳盤古心天童覺法眼問修山主毫𨤲有差天地懸隔兄作麼生會修曰毫𨤲有差天地懸隔師曰與麼道又爭得曰某甲只與麼師兄作麼生師曰毫𨤲有差天地懸隔修遂禮拜頌曰宗師故故問同人一擊毫𨤲兩路分再審便能明的旨自然清白不從聞汾陽昭六國當時已太平太平才久不知兵修公換得長蛇陳天下人人會死生佛印元堪悲堪笑修山主因地起兮因地倒覿面難藏第一機令人却憶雲門老正覺逸石城親切問同參不話東西便指南明暗兩條來往路依俙屈曲在烟嵐保寧勇金鱗欲化遭它點額舉頭看湧波瀾浪拏雲處風高天地寒佛慧泉稱頭蠅坐便欹傾萬世權衡照不平斤兩錙銖見端的終歸輸我定盤星天童覺續收毫𨤲有差天地隔龍濟清涼何失得魚魯刀刁孰可分水中有乳鵝王擇本覺一一道如弦直長安信已傳萬皆入貢四海息狼烟掩室開增收法眼示衆曰識得凳子周匝有餘雲門出云識得凳子天地懸殊頌曰不知將甚報君恩雲起江湖浪皺痕一片古帆乘興去與誰相逐過天門保寧勇一不是二不成落花流水裏啼鶯閒庭雨散夜將半片月還從海底生象田卿識得凳子四腳著地要坐便坐要起便起在菴賢增收法眼因僧來參次師以手指簾尋有二僧齊去捲簾師曰一得一失頌曰松直棘曲鶴長鳧短羲黃世人俱玄治亂其安也潛龍在淵其逸也翔鳥脫絆夫何祖禰西來得失是非相半蓮隨風而轉空船截流而到岸箇中伶俐衲僧看取清涼手段天童覺老將高提白玉鞭雙駒一䇿去翩翩古今得失論量底空看西山暮雨前正堂辨清涼指出二僧捲起一得一失誰解相委只見桃花逐水流幾人親到桃源裏肯堂充增收法眼因僧問古佛堂前什麼人先到師曰不動步者頌曰古佛堂前到者稀相見難逢掣電機死水有龍終不聖驚起依前眼天衣懷增收法眼因僧問如何是塵劫來事師曰盡在于今頌曰塵劫來事盡在于今祖師不會面壁沉吟楊無為增收法眼問僧從什麼處來僧云泗州來師曰大聖今年曾出塔麼曰不出師曰去僧便去師却問傍僧曰你道這僧曾到泗州也無僧亦無對頌曰妙圓金地絶纖塵到者當觀無相真莫道玄門難近向舉頭便是塔中人雪竇宗增收法眼聞齊魚問僧還聞麼適來若聞如今不聞如今若聞適來不聞頌曰耳聽如聾口說如啞法眼舌頭孰真孰假尼無著總增收法眼因僧問聲色兩字如何透得師召大衆曰諸上座且道這箇僧還透得也未若會此問處透聲色即不難頌曰親口問來求透路作家直為指昏眼耳忽然春夢覺鶯吟燕語盡圓通大洪遂聲色本來唯兩字作家曾共辨言端若人識得其僧問直透色聲應不難本覺一聲色都來兩箇字衲僧不透眼中沙黃鶴樓前吹玉笛江城五月落梅花慈受深增收襄州清溪山洪進禪師嗣羅漢琛問修山主曰明知生不生性為什麼為生之所流修曰筍畢竟成竹去如今作篾使還得麼師曰汝向後自悟去在曰紹修所見只如此上座意旨如何師曰這箇是監院房那箇是典座房修禮謝頌曰進老分明到五臺修師真箇入閩來維那院主門相對說著令人兩眼開正覺逸豁落無依高閒不羈家平帖到人稀些些力量分階級蕩蕩身心絶是非是非絶分立大方無軌轍天童覺撫州龍濟山主紹修禪師嗣羅漢琛行腳時同悟空法眼到地藏向火舉話次藏入來乃問山河大地與上座自己是同是別師曰不別藏竪兩指云兩箇三人因此同參此舊集所載按傳燈録與此頗異乃云初與法眼同參地藏所得臻極同辭至建陽眼忽問曰古人道萬象之中獨露身是撥萬象不撥萬象師曰不撥萬象眼曰說什麼撥不撥懵然却回地藏藏曰子去未久何以却來師曰有事未決豈憚跋涉山川藏曰汝跋涉許多山川也還不惡師未喻旨乃問曰古人道萬象之中獨露身意旨如何藏曰汝道古人撥萬象不撥萬象師曰不撥藏曰兩箇也師駭然沉思却問曰未審古人撥萬象不撥萬象藏曰汝喚什麼作萬象師方省悟再辭地藏頌曰入院高茅總不疑都緣未達祖師機妄空學問爭長短虗記閒詞一肚皮大地山河君可別報云不別恰如癡當人被息狂迷者見成舉措不揚眉汾陽昭山河大地同兼別口中未有娘生舌多知禪客強分疏甕裏何曾走却鱉佛印元地藏當機竪指頭諸老至今猶未瞥天回地轉却等閒千古萬古兩條鐵白雲端商量同別有多般老倒何曾舉舌端今古不能提得去一雙靈劒倚天寒保寧勇續收休爭自己與山河撥動干戈不奈何看取將軍施武略兩條寒劒定龍蛇冶父川火爐頭話幾多般自己同時作麼觀直下起來呈伎倆山河大地黑漫漫虗堂愚增收龍濟示衆曰具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即是凡夫凡夫若知即是聖人此語具一理二義若人辨得不妨於佛法中有箇入處若辨不得莫道不疑頌曰凡全是聖聖全凡究實遺名直下參廓徹逈超凡聖處無言童子口喃喃靈源清剗除露布葛藤不用之乎者也饒君句下精通未免喚驢作馬卍菴顏融峯強萬丈未話足先酸若不緣雲去那知星斗寒虗堂愚增收龍濟因僧問劫火洞然大千俱壞未審這箇壞不壞師曰不壞曰為什麼不壞師曰為同大千頌曰問若剜心答如劈腹句裏反身何勞迅速劫火俱然同大千全機不動劒鋒旋龍濟山頭龍退骨𦦨摩天上鼓驚湍增收龍濟示衆曰是柱不見柱非柱不見柱是非已去了是非裏薦取頌曰是與不是俱不是亦無不是謾勞推兩頭截斷歸家後獨露乾坤更是誰靈源清薦得是移花兼蝶至薦得非擔泉帶月歸是也好鄭州梨勝青州棗非也好象山路入蓬萊島是亦沒交涉踏著稱鎚硬似鐵非亦沒交涉金剛寶劒當頭截阿呵呵會也麼知事少時煩惱少識人多處是非多全菴已是是非非來却易非非是是去還難是非從此銷磨盡一顆圓明照膽寒雲衲慶
