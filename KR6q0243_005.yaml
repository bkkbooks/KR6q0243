body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集大乘經偈之餘增收圓覺經如是我聞一時婆伽婆入於神通大光明藏三昧正受一切如來光嚴住持是諸衆生清淨覺地身心寂滅平等本際圓滿十方不二隨順頌曰東西南北水茫茫無角鐵牛入海藏千眼大悲尋不見倒騎佛殿入僧堂冶父川增收圓覺經於不二境現諸淨土與大菩薩摩訶薩十萬人俱頌曰明鏡當臺照不差短長好醜盡歸家山河大地渾如故不妨隨處玩煙霞冶父川增收圓覺經非幻不滅頌曰不屬內外與中間才落思惟入魔境大丈夫兒不自欺翻身坐斷毗盧頂月林觀增收圓覺經修多羅教如標月指頌曰方便門指頭月譊訛因底多甄別冷光靄靄登清途匝地茫茫尋舊穴指看畫處眼中屑到此何須更饒舌育王達增收圓覺經一切障礙即究竟覺頌曰枯樹雲充葉凋梅雪作花擊桐成木響蘸雪喫冬瓜長天秋水孤鶩落霞雪堂行早朝心悶三杯酒午後頭昏一碗茶入夜脫衣伸腳睡五更走起眼瞇麻或菴體增收圓覺經有我愛者亦愛涅槃伏我愛根為涅槃相頌曰黑山鬼窟至幽陰認得頑空盡力尋何似天窗饒一撥頓令大地作黃金增收圓覺經棄愛樂捨還滋愛本便現有為增上善果皆輪回故不成聖道頌曰傀儡牽絲舞柘枝百般俏俊百般宜自從舞罷青絲斷堪笑渠儂撒手歸圓覺經居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實頌曰黃花爛爛翠竹珊珊江南地暖塞此天寒遊人去後無消息留得溪山到老看晦堂心舉手攀南斗翻身倚北辰出頭天外看誰是我般人鼓山圭續收巍巍堂堂磊磊落落閙處刺頭穩處著腳腳下線斷我自由鼻端泥盡君休斫莫動著千年故紙中合藥天童覺荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛徑山杲和煙釣月是生涯古䇿風高未足誇欵乃一聲天地闊祖師何處渡流沙或菴體胡孫喫毛蟲烏狗上佛殿大地雪漫漫澄江淨如練圓極岑生鐵鑄牛頭牽犁還拽耙智者笑欣欣愚人驚怪差古往今來幾百年更向鬼門重貼卦密菴傑庭前栽萵苣萵苣生火筯火筯生蓮花蓮花結木爪木瓜才擘破撒出白油麻參拗堂仁昨夜深沙鑄鐵券阿那律陀來合伴醉來相打見閻王閻王握筆不能判不能判却相勸彼此事同一家更莫前思後算㘞你恁麼斷公事大醋無菴全張果老踏破葫蘆呂洞賓失却寶劒兩個撒手相逢囊篋更無一線何仙姑鐵笛橫吹解道長江靜如練正堂辨身世悠悠不繫舟得隨流處且隨流今朝有酒今朝醉明日無錢明日愁石菴玿春眠不覺曉是處聞啼鳥夜來風雨聲花落知多少朴翁銛春生夏長淡飯粗茶魚投濁水彩奔齪家無準範增收圓覺經以大圓覺為我伽藍頌曰毫髮不留縱橫自由閫外乾坤廓落大方無外優遊明明祖師意明明百草頭褫破狐疑網截斷愛河流縱有回天力爭如直下休四衢道中淨倮倮放出溈山水牯牛圓悟勤增收圓覺經恆作是念我今此身四大和合髮毛爪齒等皆歸地唾涕膿血等皆歸水暖氣歸火動轉歸風四大各離今者妄身當在何處頌曰今者妄身當在何不應𦦨水更尋波狂心誤認鑑中影豈異迷頭演若多本覺一增收法華經佛放眉間白毫相光照東方萬八千世界頌曰蠻奴赤腳上皇州賣盡奇珍跨白牛貪著市朝人作市又隨歌舞上官樓多意氣好風流月冷珠簾挂玉鈎分明妄却來時路百尺竿頭輥繡毬圓極岑增收法華經假使滿世間皆如舍利弗盡思共度量不能測佛智五祖演云尋常衲僧家高揖釋迦不拜彌勒是會佛智不會佛智衆中有則有只是藏牙伏爪太平有個見處不惜眉毛舉向諸人待有人問隨口便答破菴先云且畢竟如何是佛智乃頌曰雪子落紛紛烏盆變白盆忽然日頭出依舊是烏盆增收法華經觀世音菩薩普門品偈曰呪咀諸毒藥所欲害身者念彼觀音力還著於本人東坡居士別云念彼觀音力兩家都沒事法眼益禪師因閲至此乃有頌曰呪咀毒藥形聲之逆眼耳若通本人何失增收法華經譬如長者有一大宅於後宅舍忽然火起毒害火災衆難非一頌曰蝴蜂休戀舊時窠五百郎君不奈何欲火逼來無走路癡心要上白牛車門前羊鹿權為喻室內啀喍總是訛蓬㶿臭煙相惱處出身不用動干戈冶父川增收法華經如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異不如三界見於三界如斯之事如來明見無有錯謬頌曰峋嶁峯頭神禹字青石赤形模奇無目仙人才一見便應撫掌笑嘻嘻雲暗蒼龍化葛陂圓極岑火虐風叨水漬根石邊尚有舊苔痕化工肯未隨寒暑又孽清香為返魂間極雲增收法華經此經開方便門示真實相深固幽遠無人能到頌曰雖然幽遠涉途程到者方知不夜城鼓角聲寒蓮漏永佛燈猶作向來明圓極岑增收法華經云是法住法位世間相常住雲門云釋迦老子甚處去也頌曰犬子便吠賊牛子便牽犂衲僧若恁麼未曾摸著皮楊岐會世間相常住黃鶯啼緑樹真箇可憐生動著便飛去朴翁銛法華經偈大通智勝佛十劫坐道場佛法不現前不得成佛道頌曰三際斷時凡聖盡十身圓處剎塵周無私應物隨高下未過僧祇大劫修保寧勇種穀不生豆苗蒸沙豈能成飯大通智勝如來一個擔板底漢鼓山圭續收燕坐道場經十劫一一從頭俱漏泄世間多少守株人掉棒擬打天邊月徑山杲紅日杲杲切忌尋討拈得便用無非是寶鄭州梨青州棗大抵還他出處好月林觀太平時代不論兵路不齎糧戶不扃十劫坐來成底事平生肝膽一時傾道場融劫初鑄就毗盧印古篆雕蟲尚宛然堪笑堪悲人不識却嫌字畫不完全環溪一增收法華經若有衆生聞是觀世音菩薩品者當知是人功德不少頌曰觀音門普普門收才著襴衫便不羞昨夜猿啼新嶺上今朝鶴唳古溪頭惡風飄墯回光息欲火焚燒當處休瓔珞受來都不用平生活計冷湫湫冶父川文殊所説般若經清淨行者不入涅槃破戒比丘不入地獄頌曰平生疏逸無拘撿酒肆茶坊信意遊漢地不收秦不管又騎驢子過楊州保寧勇養就家欄水牯牛自歸自去有來由而今穩臥深雲裏秦不管兮漢不收祖印明鵠白烏本玄松直棘自曲清淨比丘僧却須入地獄鼓山圭壁上安燈盞堂前置酒臺悶來打三盞何處得愁來徑山杲續收僧問洞山詮清淨行者不入涅槃破戒比丘不入地獄時如何師云度盡無遺影還他越涅槃頌曰相好巍巍大丈夫一生無智恰如愚從來佛祖猶難望地獄天堂豈可拘丹霞淳清淨行者不涅槃破戒比丘無地獄天台相接到西川總是自家親眷屬照堂一夜來村飲歸健到三四五摩挲青莓苔莫瞋驚著汝自得暉嘉州石像陝府鐵牛人平不話水平不流尼無著總陪錢弄傀儡𢬵命打鞦韆渾家無眼見掩面哭蒼天或菴體事神者喫神事佛者喫佛神佛俱不事渾家窮徹骨肯堂充漢既不管秦亦不收人平不語水平不流月林觀犯重比丘清淨行平等性中無損益水裏不用覓魚蹤天邊何處觀鳥迹懶菴樞國有定亂劒家無白澤圖神仙張果老踏碎藥葫蘆朴翁銛清淨行者清淨破戒比丘破戒各自安貼家切忌放賊過界退菴奇飲官酒臥官街當處死當處埋寒山逢拾得撫掌笑咍咍此山應涅槃地獄本無差只為從來被眼遮三腳瞎驢才𨁝跳鑊湯罏炭即吾家高峯妙維摩經須菩提持鉢入維摩舍乞食時維摩詰取鉢盛飯謂言汝能於食等者諸法亦等諸法等者於食亦等如是行乞乃可取食乃至彼外道六師是汝之師因其出家彼師所墯汝亦隨墯乃可取食入諸邪見不到彼岸住於八難不得無難同於煩惱離清淨法汝得無諍三昧一切衆生亦得是定其施汝者不名福田供養汝者墮三惡道為與衆魔共一手作諸勞侶汝與衆魔及諸塵勞等無有異於一切衆生而有怨心謗諸佛毀於法不入衆數終不得滅度汝若如是乃可取食須菩提聞此茫然不知以何答置鉢欲出頌曰無邊無際休斟酌潮去潮來本自平清濁淺深并苦淡一般滋味逈分明保寧勇入林不動草入水不動波鑊湯無冷處合眼跳黃河鼓山圭獨坐許誰知青山對落暉花須連夜發不待曉風吹徑山杲續收白日街頭獨自行夜間屋裏獨自臥山高不礙白雲飛竹密不妨流水過照堂一邪見歸依外道師與師同墮復何疑憑君滿鉢盛香飯午日亭亭腹正飢張無盡七七四十九六六三十六是非才入耳渾家不和睦肯堂充獨弄單提單提獨弄劒刃上行寂然不動月林觀所生各不同所潤一雨普甜瓜徹蒂甜苦瓠連根苦冰谷衍青山白雲碧溪蘿月畫虎成狸只得一橛虗堂愚增收維摩經三十二菩薩各説不二法門至文殊云我於一切法無言無説無示無識離諸問答是為菩薩入不二法門殊又問維摩摩默然殊歎曰乃至無有語言文字是真入不二法門説是入不二法門時與此衆中五千菩薩皆入不二法門得無生法忍頌曰維摩大士去何從千古令人望莫窮不二法門休更問夜來明月上高峯雪竇顯虗空鳥迹謾追尋幽鳥投聲又報春若識東西無異路淨名一室不平沉慈明圓毗耶城裏競頭走謾謂南星真北斗還知蚌鷸兩相持須臾盡落漁人手太洪恩一箇兩箇百千萬屈指尋文數不辦暫時放在暗窗前明日與君重計算白雲端春有百花秋有月夏有涼風冬有雪若無間事在心頭便是人間好時節訥堂思毗耶城裏老維摩一默無言詭詐多三萬二千師子座一時掀倒看如何無用全言言言兮飄風灑雪默默默子靁轟電掣藕絲孔裏騎大鵬等間挨落天邊月懶菴需毗耶老子善藏機淵默靁聲徹四維今古競傳真不二豈知黃葉止兒啼尼無著總有無語默謾徒勞居士何曾動一毫世祖功成三十六雲臺爭似釣臺高別峯印深入不二門巧盡反成拙一默定千差常説熾然説説拙萬古清風寒徹骨松源嶽增收維摩經不斷煩惱而入涅槃頌曰朝生暮死千萬遍一日幾回相見面展陳開旗放出來一指動時客戲見白雲端增收僧問投子如何是不斷煩惱而入涅槃師曰這箇師僧恁麼發人業頌曰雖然無背面觸處頭頭現吞却太虗空吐出琉璃殿佛心才者箇師僧發人業賣油老翁説向人啼得血流無用處不如緘口過殘春文殊道增收維摩經觀身實相觀佛亦然頌曰眼空四海恣縱橫鼻孔遼天信腳行拏得電光為火把却來日午打三更或菴體增收維摩經佛以一音演説法或有怖畏或斷疑頌曰或有怖畏或斷疑雙明一句絶針錐於斯切莫生欣厭覿面還須眼似眉禾山方增收金剛般若經世尊食時著衣持鉢入舍衛城乞食於其城中次第乞已還至本處收衣鉢洗足已敷座而坐須菩提白佛言希有世尊頌曰食訖跏趺坐石牀斗間間氣燭天光幾多業識茫茫者衲被蒙頭在醉鄉水菴一一字未曾談般若謾天謾地儘饒伊祇園乞食歸來後法會因由又是誰北澗簡衛城乞食沿門處祇苑收衣洗足時善現無端讚希有斯文安得是如斯寶葉源增收金剛般若經應如是住如是降伏其心頌曰希有希有佛妙理極泥洹云何降伏住降伏信為難二儀法中妙三乘教喻寬善哉今諦聽六賊免遮攔傅大士七手八腳神頭鬼面棒打不開刀割不斷閻浮跳躑幾千回頭頭不離空王殿冶父川截斷從教來衮衮隨流未必去滔滔青山長鎖欲飛勢滄海合知來處高心聞賁增收金剛般若經凡所有相皆是虗妄若見諸相非相即見如來法眼云若見諸相非相即不見如來頌曰有相有求皆是妄無形無相墮偏枯堂堂密密何曾間一道寒光爍太虗冶父川映林映日一般紅吹落吹開總是風可惜擷芳人不見一時分付與遊蜂心聞賁金剛般若經一切賢聖皆以無為法而有差別頌曰一金成萬器皆由匠者智何必毗耶城人人説不二覺海元仁者見之謂之仁智者見之謂之智寒時向火熱時乘涼健即經行困即打睡仰面看天開口取氣保寧勇增收金剛般若經一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出僧問首山如何是此經山曰低聲云如何是受持山曰莫染污冶父川云且道此經從甚處出須彌頂上大海波心乃頌曰佛祖垂慈實有權言言不離此經宣此經出處還相委便向雲中駕鐵船切忌錯會水出崑崙山起雲釣人樵客問來因只知洪浪巖巒闊不肯拋絲弄斧斤投子青長時誦不停非義亦非聲若欲受持者應須用眼聽寶相元增收金剛般若經應無所住而生其心頌曰山堂靜坐夜無言寂寂寥寥本自然何事西風動林野一聲寒鴈唳長天冶父川應無所住豁心空金屑依然著眼中驀地虗空連地脫大千經卷一時通孤雲權應無所住生其心廓徹圓明處處真直下頂門開正眼大千沙界現全身呆堂定金剛般若經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提頌曰明珠在掌有功者賞胡漢不來全無伎倆伎倆既無波旬失途瞿曇瞿曇識我也無雪竇顯水不洗水誰不知旋嵐常靜太驅馳千年曆日如能算免被巡官掌上推白雲端四序炎涼去復還聖凡只在剎那間前人罪業今人賤倒却前人罪業山張無盡續收寶劍不失虗舟不刻不失不刻彼此為得倚待不堪孤然仍則鳥迹虗空有無彌忒思之法眼益半夜窗明鄰家有火鮑老敲門李老打鎖王婆叫船趙婆過渡油盡燈滅一場懡㦬佛鑑勤綴綴功過膠膠因果鏡外狂奔演若多杖頭擊著破竈墮竈墮破來相賀却道從前孤負我天童覺增收金剛般若經如來所得阿耨多羅三藐三菩提於是中無實無虗頌曰菩提無實亦無虗幾個男兒是丈夫丹穴不歸金鸞鷟碧潭空浸玉蟾蜍佛慧泉生涯如夢若浮雲活計都無絶六親留得一雙清白眼笑他無限往來人冶父川增收金剛般若經過去心不可得現在心不可得未來心不可得南堂興舉德山行腳時到潭州詣胡餅店覓點心喫店婆出問過現未來心不可得上座點那箇心德山無語今夜代德山幾轉語與諸人商量待他道三心不可得只向道咄咄老婆不得無禮似恁麼莫太剛麼不然道婆子你從甚麼處得這箇消息來似恁麼又却太弱麼當時若是老僧待他道過去心不可得現在心不可得未來心不可得上座點那箇心只向道與我換熱底一隻來才擬議便與換却眼睛乃頌曰過去現在未來心簸土揚塵無處尋坐臥經行無不是承當直下莫沉吟過去心不可得收綸罷釣秋江碧扁舟古岸恣間眠明月蘆華深穩密現在心不可得法王家法存今昔謀臣猛將定封疆説甚隋珠并趙璧未來心不可得不可得中只麼得石含玉兮地擎山惟證乃知難可測千古流芳誰共知清風匝地有何極雪竇宗三際求心心不見兩眼依然對兩眼不須遺劒刻舟尋雪月風華常見面冶父川後念起時前念滅起滅之念何嘗別喚取機關木人問從頭弄盡元無説懶菴樞三清道士無仙骨八教闍黎毀梵書黑漆崑崙舞華鼓天親無著暗嗟吁或菴體去歲春風燕子多社前先到舊時窠今年春色歸將半簾幕蕭蕭不見過寶葉源增收金剛般若經若以色見我以音聲求我是人行邪道不能見如來頌曰色身聲求也不妨百花影裏繡鴛鴦自從識得金針後一任風吹滿袖香塗毒䇿盡却耳根并眼底不知何處見如來數聲幽鳥啼寒木一片間雲鋪斷崖野菴璇增收金剛般若經一切有為法如夢幻泡影如露亦如電應作如是觀頌曰幻化空身即法身箇中無染亦無塵拈匙把箸如明了掃地燒香不倩人慈受深水中捉月鏡裏尋頭刻舟求劒騎牛覓牛空花陽𦦨夢幻浮漚一筆勾斷要休便休巴歌杜酒村田樂不風流處也風流冶父川作事存心貴要精不精終是不通靈棊逢絶處著方妙梅到寒時香愈清間極雲暑往寒來總不知有無名相一時離正如黑漆屏風上醉寫盧同月蝕詩雪巖欽增收佛華嚴經世尊因普眼菩薩欲見普賢不能得見乃至三度入定遍觀三千大千世界覓普賢不能得見却來白佛佛云汝但於靜三昧中起一念便見普賢普眼於是才起一念便見普賢乘六牙白象住於空中翠巖芝云諸仁者作麼生會翠巖道普眼推倒世尊世尊推倒普眼你道普賢在什麼處頌曰飄飄一鴈落寒空步步追空覓鴈蹤踏破草鞋跟子斷巍然獨坐大雄峯瞎堂遠瞿曇幾個舌頭衆會幾個眼睛頭頭物物剎剎塵塵自謾猶自可最苦是謾人北澗簡增收華嚴經世尊告普眼菩薩頗有人能説幻術文字中種種幻相所住處不答云不也佛言普眼幻中幻相尚不可得何況普賢菩薩祕密身境界祕密語境界祕密意境界而入其中能入能見頌曰晃晃在心目昭昭居色塵莫將銀世界喚作假銀城北澗簡增收華嚴經菩薩以菩提心為家以如理修行為家法頌曰浪宕樓頭無藉在零丁利帝可憐生惡叉聚是此中入佛子住非他處成北澗簡增收華嚴經偈如有大經卷量等三千界在於一塵中一切塵亦然有一聰慧人淨眼悉能見破塵出經卷廣饒益衆生頌曰擬破一微塵分明昧此經如何破經卷出此一微塵北澗簡增收華嚴經我今普見一切衆生具有如來智慧德相但以妄想執著而不證得頌曰天蓋地載成團成塊周法界而無邊析鄰虗而無內及盡玄微誰分向背佛祖來償口業債問取南泉王老師人人只喫一莖菜天童覺增收華嚴經法界觀法身流轉五道名曰衆生故令衆生現時法身不現頌曰佛真法身抵死謾生自沽村酒自把磁瓶却著衫來作主人北澗簡增收楞伽經五法三自性二種無我頌曰破瓶豈復作瓶事焦種不因生蘗牙如彼靈空槃大子毛輪垂法翳花開鼓山圭陝府鐵牛白癩嘉州大像耳聵兩箇病痛一般咄哉漆桶不快徑山杲增收般若心經是大神呪是大明呪是無上呪是無等等呪能除一切苦頌曰黯淡灘黯淡灘十度船來九度翻唯有三山陳上舍擔一柄傘岸上行奈我何無準範是大神呪四大六根元不有是大明呪三世十方無透漏是無上呪海印圓光明已久是無等等呪士農工商各成就何故去年梅今歲柳顏色馨香依舊等間勘破悟桃花選甚法身藏北斗或菴體
