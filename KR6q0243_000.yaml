body:
  text: 禪宗頌古聯珠通集序前集賢待制承事郎馮子振撰禪宗頌古聯珠者錢唐沙門普會演寶鑑師法應所編從上古德直指之聲咳也其機緣每一則續已有補未有因壽之板以喚禪客一日似爭第一帙蘄小序閲將竟則為之稱讚曰此勝自在耶此具足如意摩尼耶此會師所為聯珠果象罔親得之赤水者耶異時西域槖裝咸陽晞價之賈髯高鼻碧矑而之列肆雙肘擎戴端的即是非是則荊山之璞投之瞎砌病足再刖何有灑血抱泣以相明或謂遊吾園者睹須曼花登覺地者證菴羅果彼花不待眼撥而𮌎領果不待枚舉而髓味謂之實悟實參假泛而覽暫而嘗倉卒莫辨其為何者決定則亦尋常孟浪之布襪青行纏耳吾謂智有利鈍故解有疾遲見有淺深故思有工拙譬之天涯芳草王孫經目共知風光流轉不涉藜沙特於芊綿錯雜之叢獨能望而名其為荃為蘅為芷為斯則名為六合一薢茩之真賞識不然鼻端普嗅種種清芣膚頰小差終未是離騷注腳下具眼本色雖然掩舌摩竭分別相空杜口毗耶言語道斷尊者無説我乃無聞他日禪林覿面相呈交手付與家珍回首密在汝邊衲衣下一抖擻滿傾僧寶人人滄海珠矣奚聯之云書以為序禪宗頌古聯珠通集序夫鼻祖西來不立文字直指而已時門人又有所謂不執文字不離文字而為道用已向第二機矣故有汝得吾皮之記道不在言也審矣子以為何如曰非也道雖不在於言言而當終日言於道庸何傷否則一語猶以為贅也爰自一華敷而五葉聯芳方世傳而兩派支衍機緣公案五燈燁如諸祖相繼有拈古焉有頌古焉拈古則見之於八方珠玉類要等集頌古則有寶鑑大師宋淳熙間居池陽報恩採集佛祖至茶陵機緣凡三百二十有五則頌古宗師一百二十有二人頌二千一百首目之曰禪宗頌古聯珠叢林尚之而板將漫滅因念淳熙至今垂二百載其間負大名尊宿星布林立頌古亦不下先哲惜乎聯繼之作闕如也每慚濫廁宗門且有年矣禪無所悟道無所詣欲作之復止之趑趄者亦屢矣元貞乙未叨尸義烏普濟山院事簡輒事續稿僅得一二萍梗之蹤或出或處隨見隨筆二十三四年間稍成次序機緣先有者頌則續之未有者增之加機緣又四百九十又三則宗師四百二十六人頌三千丹五十首題曰禪宗頌古聯珠通集將募板行與後學共惑者曰道不在是拈華微笑三拜得髓初無一語與之而昭昭於心目之間道播無垠烏有如今日叶音韻事言句簧鼓後人俾其棄本逐末誠可歎哉豫笑而不答良久乃歌曰五雲影裏神仙現手把紅羅扇遮面急須著眼看仙人莫看仙人手中扇已而謂之曰子所論者手中扇也豫所集者果在扇邪噫知我罪我其惟此集乎時延祐戊午六月旦前住紹興路天衣萬壽禪寺錢唐沙門普會自序重刻禪宗頌古聯珠通集序佛祖葛藤水浸不爛火燒不壞枝聯蔓衍流布無窮禪宗頌古聯珠通集者魯菴會公集成鋟梓行世久矣近以他故其板散落人間洪武己巳夏余慮其亡失託道友收贖庋藏於大慈山之幻居實六月二十八日也明日舊置板處火作風烈燎及千數百家吁斯亦異矣然佛祖葛藤其果靈驗如此耶抑神物護持而致然耶敬捐衣資命工補完用廣流通永延慧命因書其得板所由之異庸識歲月云洪武壬申春二月中天竺住山沙門淨戒識禪宗頌古聯珠舊序寧武軍承宣使提舉隆興府玉隆萬壽宮武功郡開國矦張掄撰西方聖人為一大事因緣故出現於世後以正法眼藏付囑迦葉傳至二十七世而達磨入于中夏設大法藥開甘露門直接上根不立文字逮今六百餘年獲菩提者不可勝數雖其心以無傳而傳其法以無説而説然機緣偈頌前後寖多玉句金章公案具在池州報恩寶鑑大師法應嘗因禪悅餘暇集採托由佛世尊以至古今宗師凡得機緣三百草五則頌古一百草二人目之禪宗頌古聯珠集可謂毗盧藏內全收衆珍旃檀林中莫非香木開悟知見利益後來鋟木流通豈曰小補以豫夙慕宗乘樂推法施請為序引不獲固辭淳熙歲在屠維大淵獻冬十一月序禪宗頌古聯珠舊集本序宋池州報恩光孝禪寺傳法寶鑑大師法應述法應自昔南遊訪道禪燕之暇集諸頌古咨參知識隨所聞持同學討論去取校定三十餘年採托機緣三百二十五則頌二千一百首宗師一百二十二人編排成帙命名禪宗頌古聯珠集願與天下學般若菩薩共之雖佛祖不傳之妙不可得而名言初無字書安有密語臨機直指更不覆藏徹見當人本來面目故諸佛以一大事因緣出現於世譬喻言詞説法開示欲令衆生悟佛知見豈徒然哉池陽信士裒金刻板以廣見聞為大法光明之施淳熙二年乙未臘八日編次謹書
