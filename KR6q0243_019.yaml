body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第四世之六南嶽下後第三世之二趙州因僧問如何是祖師西來意師曰庭前柏樹子曰和尚莫將境示人師曰我不將境示人曰如何是祖師西來意師曰庭前柏樹子頌曰庭前柏樹地中生不假牛犁嶺上耕正示西來千種路密稠林是眼睛汾陽昭庭前柏樹趙州道廬陵米價吉陽敷三歲兒童皆念得八十翁翁會也無浮山遠趙州庭前柏天下走禪客養子莫教大大了作家賊慈明圓七百甲子老禪和安貼家苦是他人問西來指庭柏却令天下動干戈雪竇顯二千里靈機不易親龍生龍子莫因循趙州奪得連城璧秦主相如總喪身入門何必辨來機老倒禪和不自知柏樹庭前剛指示反令平地下針錐雲峯悅趙州有語庭前柏禪者相傳古到今摘葉尋枝雖有解須知獨樹不成林黃龍南三庭柏蒼蒼示祖心趙州此話播叢林盤根抱節在金地禪者休於格外尋萬木隨時有雕喪趙州庭柏鎮長榮不獨淩霜抱貞節幾奏清音對月明趙州全不犯工夫覿面寧存細與粗重疊示君君不見庭前柏樹本來無兜率悅深院盤根翠色幽老師曾指示禪流年年不改淩霜節下載清風何日休正覺逸趙州庭前柏三冬刮地寒處處緑楊堪繫馬家家門下透長安天衣懷人問庭前柏豫是嶺南客反憶臘月天雪裏梅花拆海印信僧問西來意趙州柏樹酬皮下若有血官差不自由翠巖真青青庭柏何年植祖意分明示趙州海變桑田有窮劫靈苗無影不凋秋照覺總造化無私不思力一一青青歲寒色長短大小在目前可笑時人會不得真淨文趙州庭柏衲僧苦厄井口轆轤橫吞不得野軒遵庭前柏樹示禪流幾箇親曾見趙州明年更有新條在惱亂春風卒未休保寧勇趙州庭下柏森森摘葉尋枝古到今明眼衲僧如著西來祖意合平沉楊無為趙州庭柏森然直露滴風清添翠色摘葉尋枝不可求盤根萬古終無極大溈秀真箇怪時方識怪是精靈眼識精靈時人不會西來旨只看青青柏在庭佛國白羚羊挂角絶狐疑翠柏庭前演妙機此道不將人境會杲天紅日夜長輝羅漢南舌頭無骨趙州老柏樹庭前説向渠好是晚來無限意𠴨𠴨啼鳥噪禪居三祖宗萬里長空雨霽時一輪明月映清輝浮雲掩斷千人目得見姮娥面者稀佛鑑勤庭前柏樹子少悟出常情雨過山添翠雲收日月明湛堂凖青青庭柏指西來趙老門風八字開歲寒枝有深深意誰把靈根著處栽佛燈珣西來祖意問如何柏樹庭前指似他射虎不真徒沒羽至今天下有誵訛踈山如續收天下禪和咬少林趙州有語庭前柏庭前柏老倒禪和眼赫赤不善東西失本源屈我觀音作胡客五祖戒趙州庭前柏衲僧皆罔測一堂雲水僧盡是十方客琅琊覺趙州庭前柏眼裏電光掣雲外往來多村翁行步劣道吾真一兔橫身當古路蒼鷹才見便生擒後來獵犬無靈性空向枯椿舊處尋承天宗蘇武不拜韓信臨朝恁麼會得十萬迢迢瞞菴成庭前柏樹宿根深葉葉真珠寸寸金佛祖長長出不得千古萬古只如今南堂興打人罵人易勸人除却難不識饒人處急水下高灘崇覺空趙州庭柏説向禪客黑漆屏風松蘿亮隔佛日才百寶光攢無見頂是大神呪最靈奇揭諦波羅僧揭諦石人半夜失烏雞正堂辨庭前柏樹子不是祖師心莫執一時見便忘千古音龍牙言庭前柏樹子分明向君舉大雪滿長安燈籠吞佛祖塗毒策靜鞭聲裏駕頭來緊握雙拳打不開打得開雲壓香塵何處是靜鞭聲裏駕頭來瞎堂遠西來祖意庭前柏鼻孔寥寥對眼睛落地枯枝才𨁝跳松蘿亮隔笑掀騰天童淨庭前柏樹子一二三四五竇八布衫穿禾山解打鼓石菴玿快人一言快馬一鞭趙州庭柏洗腳上船退菴奇增收清涼法眼禪師舉柏樹子話問覺鐵觜承聞趙州有此話是否覺曰先師無此語莫謗先師好眼曰真師子兒頌曰庭前柏樹子趙州無此語承言須會宗勿自立規矩佛印元僧問西來柏樹酬何必斯言謗趙州令人長憶清涼老一句當年喚轉頭大溈秀新羅子刺天飛鈍鳥籬邊懞不去趙州庭柏一何高誰道先師無此語白雲端日炙風吹瘦影孤趙州嘗指倚庭株升元大小清涼老未會先師此語無正覺逸趙州無語幾人知江北江南見者稀山寺桃花復何在相逢空愛白公詩大洪遂庭前柏樹子趙州無此語若是本色人直下未相許真淨文續收誰道先師無此語焦尾大蟲元是虎胡蜂不戀舊時窠猛將豈在家中死急著眼却回顧若會截流那下去匝地清風隨步舉慧通旦趙州庭前柏樹子崑崙眼睛如點漆笑他法眼謗先師覺公心苦口如蜜雪堂行行主無人能賽姐姐更是好手騰身百尺竿頭打箇背反筋斗正堂辨趙州有箇柏樹話禪客相傳遍天下多是摘葉與尋枝不能直向根源會覺公説道無此語正是惡言當面罵禪人若具通方眼好向此中辨真假文殊道一人背手抽金鏃一人反身控角弓南北東西競頭看果然一鴈落寒空巳菴深增收葉縣省和尚因僧問柏樹子話省曰我不辭與汝説還信麼曰和尚重言爭敢不信省曰汝還聞簷頭雨滴聲麼其僧豁然不覺失聲云㖿省曰汝見箇甚麼道理僧以頌對云簷頭雨滴分明歷歷打破乾坤當下心息頌曰庭前柏樹子簷頭雨滴聲風來荷折柄千古意分明簷頭滴滴分明歷歷碧眼黃頭二俱不識識不識普天匝地成狼籍東山源趙州問僧發足甚處曰雪峯師曰雪峯有何言句示人曰尋常道盡十方世界是沙門一隻眼你等諸人向甚處屙師曰闍黎若回寄箇鍬子去頌曰南望雪峯由萬里北遊未踏趙州關賺他一隻破鍬子二百餘年去不還正覺逸石橋一路滑如苔閩嶺風高凍不開相見盡言遊歷去幾人曾到雪峯來佛慧泉沙門隻眼不容物萬象森羅從彼出鍬子何人識趙州放行底事須綿密海印信大地是眼何處屙天下不奈雪老何趙州寄箇鍬子去方得此語圓堶堶鼓山圭續收大地是眼沒處屙衲僧到此便聱訛須知別有安身訣會得安身事更多咄鍬子安著在甚麼處照堂一雪峯何處屙趙州寄鍬子沙門一隻眼狼籍乃如此阿呵呵大唐國裏鼓聲起新羅國裏舞婆娑別峯印大地一隻眼誰敢屙其中鍬子寄將去那知到雪峯橫川珙增收趙州謂衆曰我向行腳到南方火爐頭有箇無賓主話直至如今無人舉著頌曰蒙頭不覺睡開眼從教𦦨𦦨紅若謂平常便無事須防豆𪹼冷灰中心聞賁無賓主話意深深流落叢林古到今火冷灰寒口挂壁衲僧凍死不知心石田薰增收趙州上堂至道無難唯嫌揀擇才有語言是揀擇是明白這僧不在明白裏是汝還護惜也無時有僧問既不在明白裏護惜箇甚麼師曰我亦不知僧曰和尚既不知為甚麼不在明白裏師曰問事即得禮拜了退頌曰至道無難言端語端一有多種二無兩般天際日上月下檻前山深水寒髑髏識盡喜何立枯木龍吟消未乾難難揀擇明白君自看雪竇顯至簡至易同天同地揀擇明白云何護惜口似椎眼如眉涉語默蚿憐夔堪笑卞和三獻玉縱榮刖却一雙足圓悟勤世間無物可羅籠獨有嵯峩萬仞峯忽若有人猛推落騰身雲外不留蹤隨菴緣至道無難萬水千山唯嫌揀擇鵠黑烏白才有是非還護惜不會不知全得力明白裏頭如放行腰金猶頌青青麥月堂昌亂撒明珠顆顆晶走盤應不貴金聲誰家女子能針線一串穿來不剩星無菴全增收趙州因僧問至道無難唯嫌揀擇是時人窠窟否師曰曾有人問我老僧直得五年分疏不下頌曰象王嚬呻師子哮吼無味之談塞斷人口南北東西烏飛兔走雪竇顯分疏不下五年強一葉舟中載大唐渺渺兀然波浪裏誰知別有好思量白雲端五年分疏不下一句元無縫罅只知推過商量誰信分明酬價玲瓏底相知莾鹵底相訝寧可與曉事人相罵不可共不曉事人説話天童覺五年分疏不下往往反成話須知至道無難於此誰知縫罅佛鑑勤天雷如鼓雲騰致雨雨霽雲收新月一鈎至道無難惟嫌揀擇五年分疏太隔脈東海鯉魚多赤梢南山大蟲有白額月堂昌風雨濛濛烏雲靉靉贔屭上山狐狸入海隨後追尋龍王不在咄呆堂定天高地厚尋常事海闊山重更要論霹𮦷震摧山鬼窟獨携霜劒定乾坤無菴全增收趙州因僧問至道無難唯嫌揀擇如何是不揀擇師曰天上天下唯吾獨尊曰此猶是揀擇師曰田厙奴甚處是揀擇僧無語頌曰似海之深如山之固蚊虻弄空裏猛風螻蟻撼於鐵柱揀兮擇兮當軒布鼓雪竇顯團團秋月印天心是物前頭有一輪入穴蝦蟆無出路却冤天道不平勻白雲端金毛師子大開口門天旋地轉雷擊電奔修羅喪膽外道亡魂含靈蠢動莫不沾恩佛鑑勤當門一脈透長安遊子空嗟行路難不是人前誇俏措金鎚擊碎萬重關無菴全增收趙州因僧問至道無難唯嫌揀擇才有語言是揀擇和尚如何為人師曰何不引盡此語曰某甲祇念得到這裏師曰至道無難唯嫌揀擇頌曰水灑不著風吹不入虎步龍行鬼號神泣頭長三尺知是誰相對無言獨足立雪竇顯驅山塞海也尋常所至文明始是王但見皇風成一片不知何處有封疆白雲端針線工夫妙入神沿情接意一何親太平胡越無疆界誰是南人與北人佛鑑勤紫綾紅錦青絲線巧手織來成一片其中縫罅不能無爭奈時人見不見龍門遠日暖風和鶯囀新柳垂金線繫東君東君不惜無私力一點花紅一點春無菴全增收趙州因僧問如何是道師曰墻外底曰某甲不問這箇道師曰你問那箇道曰大道師曰大道透長安頌曰知道還他老倒翁親言相指事匇匇關山路遠終須到一徑長遙君任通投子青趙老家風不熱謾問他大道答長安有誰平步歸家去多是區區自作難水菴一大道透長安言端語亦端臘盡雪消去春來依舊寒松源嶽增收趙州因僧問道人相見時如何師曰呈漆器頌曰作家相見時堂堂呈漆器烏龜落漆桶也有第一義南堂興漱石泠泠古澗陰喬松千尺帶寒青多應只看昂霄操誰信根頭有茯苓南叟茙道人相見問如何舉手寒溫事已多老倒趙州呈漆器嶽陽船子洞庭波石田薰增收趙州因僧問白雲自在時如何師曰爭似春風處處間頌曰爭似春風處處間花開花落豈相關白雲自在猶難擬飄鼓無心滿世間佛印元增收趙州因僧問祖意教意是同是別師曰會得祖師意便是教意頌曰波斯讀梵字寞窑人作詩烏頭倣佛附子依俙竹密不妨流水過山高豈礙白雲飛湛堂凖趙州因與文遠行乃指一片地曰這裏好造箇巡鋪文遠便去路傍立曰把將公驗來師遂與一摑曰公驗分明過頌曰雖然公驗各隨身去住皆由守鋪人踏破草鞋歸去後落花啼鳥一般春佛鑑勤天子居閙市裏山僧在百草頭擺手御街來往不怕巡火所由鼓山圭一正一邪一倒一起文遠趙州靴裏動指徑山杲續收鑽頭閙藍遠侍者刺腦膠盆老趙州兩箇人前誇好手面皮三寸不知羞𫎇菴聰增收趙州因僧問如何是祖師西來意師曰板齒生毛頌曰九年面壁自虗淹爭似當初一句傳板齒生毛猶可事石人踏破謝家船投子青增收趙州與文遠論義曰鬪劣不鬪勝勝者輸果子遠曰請和尚立義師曰我道一頭驢遠曰我是驢胃師曰我是驢糞遠曰我是糞中蟲師曰你在彼中作甚麼遠曰我在彼中過夏師曰把將果子來頌曰兩陳交鋒勢莫窮信旗獵獵卷秋風邊庭不用深深入勒馬歸來却有功慈受深趙州老古錐家風繼金粟文遠小廝兒窟中師子屬共撫無絃琴同唱還鄉曲花簇簇錦簇簇一片好良田瞥爾生荊棘赤腳漢趂兔著靴人喫肉南堂興增收趙州因僧問如何是佛師曰殿裏底曰殿裏者豈不是泥龕塑像師曰是曰如何是佛師曰殿裏底頌曰酸甜滋味本天然帶葉連枝顆顆圓南贍部洲人未識菴摩羅果信虗傳保寧勇不立孤危機本峻趙州老子玉無瑕當頭指出殿裏底剗盡茫茫眼裏花雪堂行如何是佛殿裏底世出世間難可比萬國同歌河海清稽首拜手元是你月林觀一尊殿裏佛兩度放毫光準擬酬高價無疑亂度量蒙菴聰趙州因學人問乍入叢林乞師指示師曰喫粥了也未曰喫粥了也師曰洗鉢盂去其僧忽然省悟頌曰牀窄先臥粥稀後坐濟濟鏘鏘瀟瀟灑灑要會趙州洗鉢盂了事沙彌消一箇泉大道梅花落盡杏花披未免春風著出褫一氣不言含有象萬靈何處謝無私白雲端粥了令教洗鉢盂粗心往往更心粗直饒到此分明了也是平生不丈夫佛陀遜趙州喫粥話尋常問禪客心若不負人面上無慚色雲蓋智喫粥了也洗鉢盂家常逐日最相於西來何處半零落六祖癡頑不讀書三祖宗二乍入藂林伸一問鉢盂洗却更何疑從前官路無迂曲底事遊人不見歸乍入叢林乞指示大施門開無擁滯往往靈山受記人未有如斯箇次第正覺逸粥了尋常洗鉢盂奈何依樣畫葫蘆靈光洞徹河沙界是則名為大丈夫雲居祐喫粥了洗鉢盂何曾指示曹溪路謾言隨衆三十年記得展單忘却筯揚無為之乎者也衲僧鼻孔大頭向下禪人若也不會問取東村王大姐湛堂凖粥了令教洗鉢盂趙州此語不相辜茫茫宇宙人無數幾箇男兒是丈夫慈受深粥了令教洗鉢盂豁然心地自相符而今參飽叢林客且道其間有悟無天童覺乍入叢林問作家由來枯木別抽芽鉢盂洗了相逢著又得濃烹一碗茶長靈卓大隱居廛小隱山世人無路得相干五湖禪客朝朝用誰解回頭子細看草堂清叢林乍入問來由喫喫無過洗鉢休有意氣時添意氣不風流處也風流門福寧宗師垂手貴天真肯事雕蟲篆刻新只向平田淺草處等間推出玉麒麟佛性泰推窮物理成家計會合時機便識心多謝春風無厚薄貧家桃李也成陰護國元續收開單展鉢每相親十二時中處處真直下要明端的旨韶陽句外露全身保寧勇喫粥了也未誰道趙州有指示粥後還教洗鉢盂敢問諸人悟也無趙州老孰為儔把斷要津水逆流伶俐衲僧才眨眼釣魚船子下揚州龍門遠趙州指示洗鉢盂衲子奔馳枉費工日用不知何處覔分明説向似盲聾南堂興喫粥了也洗鉢盂已是分明説向渠有時冷地思量著點鐵成金舉世無月林觀十方通透八面玲瓏駿駒顧影狐兔潛蹤尼無著總粥了令教洗鉢盂鐵船無底要人扶片帆高挂乘風便截海須還大丈夫密菴傑乍入叢林乞師指示拈出鉢盂令去洗行盡千山與萬山回頭撞著自家底不須指不須洗烜爀靈光照天地而今高挂在虗空長靈室內展腳睡文殊道相逢陪酒又陪歌醉倒家中要我駝駝到家中猶罵詈不知醒後又如何且菴仁只為分明極反令所得遲早知燈是火飯熟也多時無門開鶴立松梢月魚行水底天風光都占斷不費一文錢息菴觀只將乍入來伸請一到叢林志便高喫粥了也洗鉢去宗師不用更忉忉橫川珙趙州因僧問久嚮趙州石橋到來只見略彴師曰汝祇見略彴且不見石橋曰如何是石橋師曰度驢度馬頌曰趙州石橋本無星急水遊魚不易停橋上只觀驢馬迹誰人敢向御街行北塔祚孤危不立道方高入海還須釣巨鼇堪笑同時灌溪老解云劈箭亦徒勞雪竇顯我愛趙州對揚瀟灑僧問石橋度驢度馬碧眼胡僧笑點頭其餘誰是知音者地藏恩異類渠行李心真出語親隨流自得妙到岸不迷津京兆府天寧璉續收長鯨已壓浪頭飛跛鱉橋邊尚碾泥度馬度驢難解會緑楊影裏路東西地藏恩趙州石橋只見略彴度驢度馬應病與藥換步移身在富全貧當頭如認著東魯問西秦月堂昌增收趙州聞沙彌喝參向侍者曰教伊去侍者乃教去沙彌便珍重師曰沙彌得入門侍者在門外頌曰得入門在門外説向人人不會更高聲我耳背鼓山圭瑟瑟風松蕭蕭雨檜師子咬人韓驢逐塊徑山杲趙州因僧問狗子還有佛性也無師曰無曰上至諸佛下至螻蟻皆有佛性狗子為甚麼却無師曰為伊有業識性在又問狗子還有佛性也無師曰有曰既有為什麼入這皮袋裏來師曰知而故犯頌曰大用全機得自由有無雙放却雙收幾多業識逢人犬從此時時憶趙州佛印元少年學解昧宗途老倒依還滯有無古佛純金誰辨色惑為機智競躊躇圓通秀有無雙放復雙收趙老機關世莫儔試上海門高處望千江萬派盡東流普融平趙州口裏有雌黃句下誰人見短長堪笑幾多逐塊狗夜深無故吠虗堂慈受深道有道無無剩語千呼萬喚不回頭尋香逐氣隨他去空使流光暗度秋成枯木續收有佛性無佛性正却倒倒却正踏破澄潭水坳折無星稱火熱水面紅橛從空裏釘肯類盲龜嚼死蛇一對牙關緊咬定正覺逸趙州古佛言言中的話有話無燕金趙璧更有布衫重七斤天上人間無價直地藏恩佛性分明脫有無醋酸何用挂葫蘆薄霧輕煙留不住扁舟已過洞庭湖瞎堂遠狗子佛性無狗子無性有從來只向兩頭走未能一鏃破雙關業識依前還作狗本覺一狗子佛性有毗盧愛飲彌勒酒狗子佛性無文殊醉倒普賢扶扶到家中全銘酊胡言漢語罵妻奴正堂辨無直路却縈紆趙州東壁上依舊挂葫蘆有張公喫村酒李公醉不醒面南看北斗石菴玿狗子佛性無斫額路上逢子湖業識性在遭一口大地全無碧眼胡狗子佛性有春風吹動千株柳知而故犯可憐生一一面南看北斗無菴全狗子佛性全提正令才涉有無喪身失命無門開趙州因僧問狗子還有佛性也無師曰無頌曰言有業識在誰云意不深海枯終見底人死不知心真淨文趙州露刀劒寒霜光𦦨𦦨更擬問如何分身作數段五祖演力壯年高膽更雄清風隨虎雲從龍啀喍無限尋聲迹挂角羚羊不見蹤寶峯祥宣德門前過回頭便招禍若要無事時且歸堂裏坐鼓山圭有問狗佛性趙州答曰無言下滅胡族猶為不丈夫徑山杲狗子無佛性慈悲似海深尋言逐句者埋沒丈夫心踈山如狗子佛性無寶劒出規模落在將軍手橫按立當途楚安方續收問頭既實答亦堪誇洛陽雖好爭似我家趙州苦口太饒舌儂家信手摘楊花大溈智趙州狗子無佛性七佛如來合掌聽須彌岌崿舞三臺海水騰波行正令南堂興趙州狗子無佛性萬疊青山藏古鏡赤腳波斯入大唐八臂那吒行正令稠巖贇乙己大人丘叢林為寇讎利牙如劍戟生殺有來由南巖勝至道無難言端語端趙州開口露出心肝典牛遊連馬連人劈一刀虗空迸血湧波濤千千萬萬人爭看誰解分開蓋膽毛中菴空鐵壁銀山一箭穿過潦倒趙州口能招禍尼無著總狗子無佛性全提摩竭令才擬犯鋒鋩喪却窮性命潛菴光貧無所依兩親相擊旱地雷聲青天霹靂或菴體狗子佛性無老蚌吐明珠西川鳴杜宇江南啼鷓鴣文殊道趙州狗子無佛性當空掘出秦時鏡光明渾不見星兒上下四維俱徹映誰菴演狗子無佛性殺人便償命苦痛萬千般因邪却打正密菴傑大食波斯飲百杯停停把柂萬人魁逆風使過黃牛峽不問瞿塘灔澦堆東山空狗子無佛性打破大圓鏡七九六十三一切智清淨夷菴鑒狗子無佛性羅睺星入命不打殺別人被人打殺定南書記狗子佛性無門上釘桃符千邪俱不入百怪盡消除松源嶽狗子無佛性泥揑活大聖不是泗州人説著也不信別峯雲狗子無佛性勸君不用舉欲透萬重關須是千鈞弩巳菴深二十四州鐵鑄成一箇錯揚在大街路無人踏得著即菴然狗子佛性無還他大丈夫是非雖入耳東壁挂葫蘆朴翁銛無之一字殺人無數多少英雄橫尸當路鐵山仁二八佳人刺繡遲紫荊花下囀黃驪可憐無限傷春意盡在停針不語時拗堂仁利刀截斷命根跳出狐群狗隊拈起萬煆蒺藜鐵額銅頭粉碎石菴玿趙州曰無崖崩石裂未舉先知只得一橛少室睦狗子佛性趙州無呂公一箇藥葫蘆接來醫却人間病大死一回方見渠葛廬覃狗子無佛性干將入楚庭一揮三首落千古得虗名千峯琬增附京兆寬因問狗子還有佛性也無師曰有曰和尚還有也無師曰無曰一切衆生皆有佛性和尚為甚麼却無師曰我非衆生曰既非衆生莫是佛否師曰不是佛曰畢竟是何物師曰亦不是物曰可見可思否師曰思之不可及見之不可議是名不可思議頌曰拈却這僧問去却京兆答浩歌歸去來清風遍六合五祖演裂破須彌鼻孔踏反大海乾坤面前百千諸佛盡是我家兒孫楚安方趙州問一婆子甚麼處去曰偷趙州筍去師曰忽遇趙州又作麼生婆便與一掌師休去頌曰彎弓直勢射難當陷虎之機理最長雖是貪他一粒米誰知失却半年糧海印信趙州筍被婆偷遭摑如何肯便休合出手時須出手得抽頭處且抽頭野軒遵趙州老捉箇賊當面勘渠返遭一摑賊不成罪歸已天下衲僧知幾幾地藏恩趙州挨拶老婆時迦葉難陀盡皺眉却被老婆揮一掌從來多事落便宜張無盡從來柔弱勝剛強捉賊分明已見贓當下被他揮一掌猶如啞子喫生薑佛鑑勤續收虎穴魔宮到者稀老婆失腳人懷疑趙州喫掌無人會直至如今成是非金陵俞道婆去若丘山重來如一羽輕去來無別路傾蓋白頭新瞎堂遠一路雄兵犯界河煙塵塞路絶人過安賴有張良在畫角城頭唱楚歌雪竇宗驟馬加鞭上酒樓何如坐地看揚州是非長短俱裁了鼠竊終難似狗偷無凖範相見又無相觸忤攔腮便掌不相饒思量箇樣無滋味莫是趙州身命招間極雲增收趙州示衆曰看經也在生死裏不看經也在生死裏諸人且作麼生出得去僧便問只如俱不留時如何師曰實即得若不實爭能出得生死頌曰看經也在生死裏飯蘿裏坐無喫底不看經也在生死裏錦衣堆裏無著底忽然烏鵲呌一聲反身踴躍渾家喜休擬議如今拋向衆人前千手大悲提不起
