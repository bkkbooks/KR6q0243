body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第五世之三南嶽下第四世之餘福州靈雲志勤禪師嗣長慶安初在溈山因見桃花悟道有偈曰三十年來尋劒客幾回落葉又抽枝自從一見桃花後直至如今更不疑溈曰從緣悟達永無退失善自護持有僧舉似玄沙沙云諦當甚諦當敢保老兄未徹在衆疑此語沙問地藏我恁麼道汝作麼生會藏云不是桂琛即走殺天下人頌曰分明歷世三十春因悟桃花色轉新人人盡得靈雲意不識靈雲是何人首山念二玄沙道處少人知密密相逢更莫疑今古相傳親的旨少年多是白頭兒昔日靈雲自有知桃花已落布華夷寰中拔劒當鋒者未徹橫身斬萬機汾陽昭傷嗟尋劒客桃花遇春開靈雲一見處令我笑咍咍神鼎諲二月桃花處處新靈雲一見更無親相逢盡道休官去林下何曾見一人慈明圓本無迷悟數如麻獨許靈雲是作家借問遍參諸祖客不知何處見桃花雪竇顯春暖桃花樹樹紅靈雲千古道還同玄沙留語叢林問南北東西路莫窮正覺逸不是玄沙定紀綱靈雲那得事全彰桃花覺了咸皆委未徹何人共體量師子離群山嶽靜象王回顧海澄光二師不並歸何處釣魚船上謝三郎浮山遠桃花見後謂無疑壯志由來本是伊若問玄沙言未徹現前贓物自家知雲峯悅二月三月景和融遠近桃花樹樹紅宗匠悟來猶未徹至今依舊笑春風黃龍南二龍象相逢世不群一來一去顯疏親時人不悟其中旨摘葉尋枝長客塵子路當時問要津滔滔天下丈夫人相逢相見若如此更有春風春又春翠巖真二學劒宗師定不差叢林浩浩是玄沙一塵才舉知端的東海東邊萬萬家春暖桃花帶露開靈雲一見悟靈臺玄沙諦當傳千古誰解雌黃息衆猜淨照臻桃花開處忽伸眉未徹玄沙也大奇幾度狂風吹擺後依前似火萬千枝佛慧泉二月春庭雨霽時小桃紅綻兩三枝虹白爭妍人盡見因甚靈雲獨不疑法雲秀靈雲偶爾見桃花三十年來得到家何事玄沙未相保枯根株上別抽芽楊無為靈雲悟後復何如未徹無人辨得渠千古華山山腳下豈知潘閬倒騎驢白雲端萬年松下忽相逢拔樹鳴條浩浩風堪笑晚來無覓處崔嵬和雨在雲中保寧勇崑嵬捧出無瑕玉赤水波心得夜光今古有誰能辨別釣魚船上謝三郎成枯木奇哉一見桃花後萬別千差更不疑獨有玄沙言未徹子孫幾箇是男兒真淨文蠢動含靈同一性山河大地盡知音昔人解道黃鶯道似共桃花說舊心雲居祐桃花見了狐疑盡因甚玄沙却不然今古叢林爭浩浩欲驅良馬路揮鞭三祖宗靈雲老倒泄生涯消息傳來到謝家未徹根源箇端的從教春力自開花溈山秀靈雲聲價傳千古點檢元來未作家芳草滿園盡春色如何唯說悟桃花地藏恩堪笑春風漏泄機桃花新發舊年枝螺江有箇釣魚客笑殺靈雲道不疑佛國白春來物物盡紛華堪羡靈雲是作家一見桃花心境絶老胡空自涉流沙雲蓋昌靈雲眼中絶翳玄沙袖裏藏鋒把手直上峯頂一笑天地斗空佛心才靈雲見了絶譊訛獨步寰中不較多敢保老兄猶未徹令人疑著備頭陀長靈卓靈雲一見不再見紅白枝枝盡著花叵奈釣魚船上客却來平地摝魚蝦洪覺範溪上桃花開爛熳不知誰解見靈雲頭頭總是吾家物一念圓成盡屬君通照逢靈雲昔日悟桃花十里春風樹樹斜敢道老兄渾未徹夢中開眼見玄沙旻古佛山鳥芳時分外啼桃花如火映前溪明明三十年來事可笑靈雲說悟迷祖印明陌上笑春風枝頭漏消息紅光爍太虗豈藉陽和力學劒宗師既不疑玄沙未徹最新奇掃除學路刮肌骨格外之機如電拂圓悟勤春來依舊一枝枝同地同天道不疑未徹之言人莫問令人特地笑嘻嘻龍門遠百煉精金大冶中任他騰𦦨亘天紅須臾拈出教人看添得行家價轉豐開福寧十分風采露堂堂玉蕊璚枝未比量剛被傍人論好醜因茲難嫁與潘郎佛性泰二月桃花爛熳時靈雲一見便無疑玄沙未徹誰相委鼻孔從來向下垂南華昺靈雲一枝迎曉露玄沙一朵已離披畢竟水須朝海去到頭雲定覓山歸文殊道終日看天不舉頭桃花爛熳始擡眸饒君便有遮天網到得牢關即便休佛燈珣盡道見桃花悟道此語不知還是無茫茫宇宙人無數那箇男兒是丈夫打破鬼門關日輪正當午一箭中紅心大地無寸土徑山杲桃花尋劒客不語笑春風白頭歸未得家住海門東敢保老兄猶未徹玄沙之言何太切君看陌上桃花紅盡是離人眼中血鼓山圭似錦桃花滿樹紅靈雲一見便心空當時不遇玄沙老爭得名喧宇宙中踈山如桃花端的悟靈雲添得玄沙劫外春滿地不知何處去塵塵剎剎露全身楚安方續收學劒難提鋒刃頭艷光花發便心休不疑句播乾坤內得旨唯憑月滿秋雙泉瓊二玄沙聞舉悟中知當下云言未保伊一擊海濤皆湧沸天光回爍眼𭿇𭿇靈雲桃花見親切英俊超越古今哲星簇孤輪明皎潔和刃精揮用無絶玄沙敢保君未徹雲水休話箇生滅新羅打鐵燒腳熱磨礱還用三尺雪道吾真滿樹桃花行人競折靈雲悟後了無疑更有玄沙言未徹噓石明仰面穿針不見天低頭拾芥不見地天地針芥無處安堂堂面目眼中翳君不見諦當未徹在齪人趂大彩月堂昌桃花春暖盡情開一見無疑頗俊哉不是釣魚船上客無人把手上高臺東山空靈雲悟桃花玄沙傍不肯多少癡禪和擔雪去填井今春花又開此意誰能領端的少人知花落春風靜國清紹春風二月半桃花紅爛熳靈雲到處逢衲僧著眼看看看短棹孤舟誰居彼岸龍牙言一箇烏梅似本形蜘蛛結網打蜻蜓蜻蜓落了兩片翼堪笑烏梅咬鐵釘天童淨一見便見猶隔鐵圍玄沙老漢腦後痛錐名高豈在鐫頑石路上行人口似塗毒策靈雲一笑見桃花三十餘年始到家從此春風春雨後亂隨名字落天涯慈航朴靈雲親說悟桃花端的無疑眼裡沙縱使玄沙言未徹相逢且喫趙州茶誰庵演乞兒拾得錫暗地空寶惜撞著明眼人一文也不直木菴永不疑不徹不失片片春風狼籍至今江北江南游子徒勞外覓休外覓明如杲日黑如漆別峯印二月桃花爛熳紅靈雲打失主人翁隨邪逐惡玄沙老半是真情半脫空雲巢巖一見桃花便垛跟鐵圍生陷出無門倚墻傍壁知多少一度春來一斷魂少室睦一見不勞朱粉施玄沙掃帚畫蛾眉只知掩得靈雲醜落盡眉毛自不知朴翁銛紅入芳蹊錦色鮮酌然一點不相謾物歸元主自投合誰謂靈雲著眼看葛廬覃增收靈雲因長生問混沌未分時如何師曰露柱懷胎曰分後如何師曰如片雲點太清曰只如太清還受點也無師不答曰恁麼則含生不來也師亦不答曰直得純清絶點時如何師曰猶是真常流注曰如何是真常流注師曰如鏡常明曰未審向上還有事也無師曰有曰如何是向上事師曰打破鏡來與汝相見頌曰午夜霜凝星斗寒長空雲盡山月落青天喫棒人盡知蒼龍退骨誰龍覺金鳳衝開玉鎖關麒麟掣斷黃金索迢迢劫外孰能拘南北東西逈超卓雪竇宗金雞玉卵飛出鳳凰兒入戶能長嘯歸家著錦衣佛鑑勤靈雲因長慶問如何是佛法大意師曰驢事未去馬事到來頌曰靈雲因問出家才驢事前行馬後來長慶不明真實地句中認影影難開豫今報你諸禪侶九衢杲日照香街汾陽昭驢事未了馬事來鍾聲才斷鼓聲催祖師愛喫和羅飯北有文殊在五臺佛慧泉驢事未了馬事來一花欲謝一花開安南已得烟塵息塞北將軍唱凱回楊無為東行不見西行利南頭賣賤北賣貴橫千竪百算河沙九九反成八十二保寧勇驢事未了馬事來鍾聲未了鼓聲催春來縱步園間看無限桃花夾李開佛鑑勤續收問端如箭透垣墻賴值靈雲手段長駿馬蹇驢皆控勒鞭教戰勝出沙場南巖勝松陰行不盡疏雨下無時世事幾興廢山中人未知𫎇菴聰驢前馬後識靈雲滿眼風埃絶點塵行遍天台并雁蕩歸來重看錦江春心聞賁增收靈雲因僧問如何是歸根得旨師曰早時忘却不憶塵生頌曰家破人亡何所依無心無緒話求歸十年忘却來時路暫憶此時總不知投子青增收靈雲因僧問如何是端坐念實相師曰河裡失錢河裡摝頌曰河裡失錢河裡摝拈來天下任縱橫和雲買得南山地淺種深鋤恣意耕佛心才婺州金華俱胝和尚嗣天龍初住菴時有尼頂笠擕錫繞師三匝曰道得即下笠子如是三問師皆無對尼便去師曰日勢稍晚何不且住尼曰道得即住師又無對尼去後師嘆曰我雖處丈夫之形而無丈夫之器不如棄庵往諸方參尋知識去其夜山神告曰不須離此將有肉身菩薩來為說法逾旬果天龍和尚到師迎禮具陳前事龍竪一指示之師大悟自此凡學者參問師惟舉一指無別提唱將順世謂衆曰吾得天龍一指頭禪一生用不盡言訖示滅頌曰天龍一指悟俱胝當下無私物匪齊萬互千差寧別說直教今古勿針錐汾陽昭對揚深愛老俱胝宇宙空來更有誰曾向滄溟下浮木夜濤相共接盲龜雪竇顯老倒俱胝一指頭金華山下幾回秋至今坐石安禪處猶弄精魂未肯休佛印元丈夫無氣死無殊忽遇天龍𨺗頓蘇一指頭禪用不盡大悲千手費工夫野軒遵問答機關豈易酬無錢難作好風流心中有事說不得只得忙忙竪指頭佛國白頓悟天龍一指頭河沙佛祖便同儔饒他鶖子懸河辨百億須彌一芥收旻古佛不用將心向外求箇中消息有來由報言達磨西來意只在俱胝一指頭佛鑑勤老大宗師竪指頭一生用得最風流玄沙拗折無人會年來年去冷颼餿龍門遠席簾蓬戶在門頭誰謂村居院落幽雨散雲收山嶽露瑚枝上挂金鈎惠照預俱胝一指頭喫飯飽方休腰纏十萬貫騎鶴上揚州徑山杲續收俱胝一指報君知朝生子搏天飛若無舉鼎拔山力千里烏騅不易騎琅琊覺俱胝老子指頭禪二十年來用不殘信有道人方外術了無俗物眼前看所得甚簡施設彌寬大千剎海飲毫端麟龍無限落誰手珍重任公把釣竿天童覺獨脫風塵舉世無不明兵甲作良圖河清海晏從來事自是時人不丈夫塗毒策俱胝一指禪古今成話打破鬼門關露柱尋無罅誰庵演一著高一著一步闊一步五百年間生指出這條路這條路十聖三賢皆罔措月林觀佳人睡起懶梳頭把得金叉插便休大抵還他肌骨好不塗紅粉也風流報恩演增收俱胝有一童子每見人問事亦竪指人謂師曰和尚童子亦會佛法凡有問皆如和尚竪指師一日潛袖刀問童曰聞你會佛法是否童曰是師曰如何是佛童竪指師以刀斷其指童呌喚走出師召童子童回首師曰如何是佛童舉手不見指忽然大悟頌曰俱胝一指頭一毛拔九牛華嶽連天碧黃河徹底流截却指急回眸青箬笠前無限事緑蓑衣底一時休山堂淳俱胝鈍置老天龍利刃單提勘小童巨靈擡手無多子分破華山千萬重無門開增收瑞州末山尼了然禪師嗣大愚因灌溪問如何是末山師曰不露頂曰如何是末山主師曰非男女相溪乃喝曰何不變去師曰不是神不是鬼變箇什麼頌曰末山不露淩雲頂今古岧嶤在目前又道本無男女相非君莫辨火中蓮真淨文非男女相獨閒閒正體堂堂孰可攀一句不傳千聖眼九天風靜月彎彎自得暉非男女相末山主今古堂堂常獨露常獨露兮見也麼清聲藉藉播寰宇月林觀六祖下第五世之四清源下第四世之一鼎州德山宣鑒禪師嗣龍潭簡州周氏子在蜀常講金剛般若經時謂之周金剛遂將青龍疏鈔出蜀至澧陽路徑造龍潭到法堂曰久嚮龍潭及乎到來潭又不見龍又不現潭曰子親到龍潭師無語遂栖止焉頌曰浩渺深坑納衆流謾持香餌擲金鈎風雲匼匝雷霆動應訝龍王不出頭保寧勇親到龍潭不見龍龍潭龍不在潭中青天白日興雲雨千古人同笑葉翁佛國白親到龍潭不見龍妙符先覺證玄宗茆庵盤結孤峯上靜對寒蟾挂碧空羅漢南潭不見龍不現親到龍潭遭一玷瞥然歸去牙如劍棒頭撒出光𦦨𦦨長靈卓續收血盆似口劍如牙竭世樞機未足誇親到龍潭龍不現者回失却眼中花心聞賁潭不見龍不現親到龍潭須活薦莫學承虗接響人守株特兔亡機變知機變盞子撲落地楪子成七片遁庵演潭不見龍不現全身已在空王殿夢回忽聽曉鶯啼春風落盡桃花片皖山凝德山一日侍龍潭抵夜潭曰更深何不下去師珍重便出却回曰外面黑潭點紙燈度與師擬接潭復吹滅師於此大悟便禮拜潭曰子見箇甚麼師曰從今向去更不疑天下老和尚舌頭也至來日潭升座謂衆曰可中有箇漢牙如劍樹口似血盆一棒打不回頭他時向孤峯頂上立吾道去在師將疏鈔堆法堂前舉火炬曰窮諸玄辨若一毫置於大虗竭世樞機似一滴投於巨壑遂焚之於是禮辭而去頌曰明暗相陵不足云絲毫有解未為親紙燈忽滅眼睛出打破大唐無一人白雲端一時瀑布巖前落半夜金烏掌上明大開口來張意氣與誰天下共橫行保寧勇明暗相形事渺茫誰知腦後迸神光都來劃斷千差路南北東西達本鄉大洪邃明暗分時光定動火光滅處見來由龍潭截斷辭源後佛祖孤峯罵未休照覺總一陳旋風霧靄開千峯突出碧崔嵬驚猿怨鶴拋來久半夜山前喚得回上方益吹滅龍潭火一星當時心眼太精明微塵佛祖絶踪跡跛鱉奔騰作麼生旻古佛黃金為骨玉為稜莫把他家此日尋多少從來悟心匠盡將底事繼威音龍門遠德嶠龍潭啐機芥針投合契玄微孤峯盤結幪頭坐不顧青山雲自歸京兆府天寧璉續收龍潭霧起老龍吟嚇殺南山白額蟲不觸波瀾拿鱉鼻嶄然頭角氣如虹南堂興親到龍潭不見龍紙燈吹滅眼頭空一條白棒掀天地滅却西來達磨宗佛照光百結襴衫破幞頭年年落第出神州却因一隻穿楊箭臨老來封馬上候蘿月瑩開口不見齒伸手不見掌夜半忽相逢葛藤長萬丈雪庵瑾南來本欲破邪說紙燈滅處難分雪踏著銔鎚硬似鐵錯認烏龜喚作鱉玉泉窮谷璉親到龍潭已暗投夜深誰共御街遊紙燈吹滅狼烟息坐斷中原四百州天目禮驀劄相逢不再三才開臭口見鄉談紙燈滅處饒端的不許蒼龍臥碧潭村翁銛德山禮辭龍潭直抵溈山挾復子上法堂從西過東從東過西顧視方丈曰有麼有麼山坐次殊不顧盻師曰無無便出至門首乃曰雖然如此也不得草草遂具威儀再入相見才跨門提起坐具曰和尚山擬取拂子師便喝拂袖而出山至晚問首座今日新到在否座曰當時背却法堂著草鞋出去也山曰此子已後向孤峯頂上盤結草庵呵佛罵祖去在雪竇拈兩處云勘破了乃頌曰一勘破二勘破雪上加霜曾嶮墮飛騎將軍入虜庭再得完全能幾箇急走過莫放過孤峯頂上草裡坐虎穴深林人不到到者還須是獵人老虎睡驚才舉目瞥然跳出獲全身海印信偷營斫寨入中軍應是機謀已十分袖裡金槌猶未動山前飛騎去紛紛上方益德山老能法戰一喝聲光吼雷電騎虎頭兮收虎尾捋虎鬚兮真可羡急走下山三十里又被溈山追一箭佛鑑勤續收大用不拘今古規模倒拈蝎尾平捋虎鬚若非深辨端倪何以坐觀成敗俊處頴脫囊錐高來卷舒方外孤峯頂上浪滔天正令當行百雜碎咄圓悟勤騎虎頭把虎尾霹靂一聲驚萬里坐觀成敗老將軍腦後一槌誰敢擬擬不擬箇箇無裩長者豫懶庵需韜略雙全膽氣豪當頭不怕陳雲高排關自謂褰旗手未免孤峯沒草巢頑石空七事隨身一毫不用再展鎗旗乾坤震動孤峯頂上休更說夢退菴奇德山凡見僧入門便棒頌曰德山棒劃斷聖凡魔膽喪善能方便捋虎鬚忿怒那吒亦摧蕩海印信一棒一條痕辛酸不可論丈夫多意氣幾箇是知恩大洪恩突出雙頭卒辨難曾將一擊碎潼關自從天下太平後流落人間號德山白雲端驟雨迅雷擊雲興電影隨將軍雖有令何似帝堯時大洪邃兩手托開無縫塔一腳踢倒須彌山青天霹𮦷無遮護阿師猶自覓禪關成枯木一條白棒劈頭來血濺星飛痛可哀祖師更無回避處妙高峯頂也崩摧佛國白德嶠分明顯大奇棒頭揮出絶離微令行佛祖無空過一似輪王握萬機雲蓋昌一條楖𣗖倚青天別向三乘教外傳未眨眼時遭八百擬開口處著三千張無盡當機截斷聖凡膝上寒光照雪茫茫宇宙無窮皮下何人有血普融平坐斷生死要津不問凡聖迷悟一棒打破面門自然乾坤獨露佛心才入門棒棒沒商量拶出紅流便廝當不是奴奴情淡薄無錢難作好兒郎佛燈珣棒下真鍮不博金德山徹底老婆心後人只見波濤湧不見龍王宮殿深鼓山圭入門便棒郎當不少依而行之胡麻廝繳徑山杲曾透龍潭向上機便將一棒力橫揮當頭突出何人辨只許叢林作者知楚安方續收一條白棒胡揮亂揎撞著聱頭魂飛膽顫典牛游殺活並行醍醐毒藥是賞是罰一任卜度尼無著總皎潔晴天吼怒雷鐵山萬疊盡驚開因思塊雨條風日安得全提有此來寶葉源德山小參示衆曰今夜不答話問話者三十棒時有僧出禮拜師便打曰某甲話也未問和尚因甚麼打某甲師曰汝是甚麼處人曰新羅人師曰未跨船舷好與三十棒法眼云大小德山話作兩橛圓明密云大小德山龍頭蛇尾雲竇云二尊宿雖善裁長補短捨重從輕要見德山老漢亦未可在何故殊不知德山握閫外之威權有當斷不斷不招其亂底劍子諸人要識新羅僧麼只是撞著露柱底瞎漢頌曰德山自得任公手一線分明下兩鈎透網金鱗才弄水岸邊還把釣絲收佛印元誅龍之劒未可揮蛇大獵之家豈藉狐兔君不見諸葛亮作軍師或施擒縱少人知百萬雄兵如指掌小醜擒來又縱之兵歎訝馬頻嘶無限兒郎唱大奇如是四方英勇將聞名早已竪降旗海印信祖令全提孰敢論纖毫才動陷關津這僧不辨箇時節為法忘身有幾人枯木成烟塵掃蕩將軍令正勑流行宣德音公子只知歌既醉夜深還被活生擒寶峯照橫按鏌鎁居閫外當鋒誰敢犯重圍堪羡新羅箇衲子全機破敵也光輝旻古佛續收高提祖印踞寰中孰肯當機定吉凶不是新羅這衲子爭教千古振清風大溈大冶烹金忽雷驚春草木秀發光輝日新不費纖毫力擒下天麒麟全威殺活得自在千古照耀同氷輪話作兩橛句中眼活龍頭蛇尾以指喻指撞著露柱瞎衲僧塞斷咽喉無出氣擬議尋思隔萬山咭嘹舌頭三千里圓悟勤德山老人寂寂惺惺法眼圓明精精靈靈六韜三略武緯文經新羅衲子有丙無丁南堂興德山因廓侍者問從上諸聖向什麼處去師曰作麼作麼曰敕點飛龍馬跛鱉出頭來師休去明日師浴出廓過茶與師師撫廓背曰昨日公案作麼生曰這老漢今日方始瞥地師又休去頌曰跛鱉飛龍騎形殊理不殊欲明二大士棒下識真軀汾陽昭正十忠臣氣最英一言佐國死猶輕不同諂曲偷安者冒寵貪榮過一生佛印元袖裡藏鋒逈莫儔任他高作運機籌君看舉鼎拔山力未到烏江不肯休海印信雲鵬展翅天無光井底蝦䗫剛咄咄太陽忽轉跳出來千峯萬峰空突兀白雲端熟睡高聲呌不聞夢中讇語自紛紛明朝一下方眠覺懊惱昏沉不可論保寧勇覿面來時作者知可中石火電光遲輸機謀主有深意欺敵兵家無遠思發必中更謾誰腦後見腮兮人難觸犯眉底有眼兮渠得便宜天童覺不問文班與武班御街侵曉競朝天傍觀莫笑金吾老駿馬驕多不著鞭上方益商嶺東西路不分兩間茅屋一溪雲師言耳聵知師意人是人非不欲聞佛性泰續收臨機一味放憨癡其毒尤深棒喝時堪笑人來誇敏手得便宜是落便宜別峯印頑皮老虎臥林丘一任傍人放滴油滿肚只因曾飽肉縱加呼喚懶擡頭無凖範只一箇休去伎倆自然消諸聖在甚處腳下路迢迢橫川珙昨日罵詈一番了老倒疏慵不解聽今日又來由你罵饒人些子當看經間極雲德山一日飯遲托鉢下堂時雪峯作飯頭見便云這老漢鐘未鳴鼓未響托鉢向什麼處去師便歸方丈峯舉似巖頭頭曰大小德山未會末後句師聞令侍者喚來問汝不肯老僧那頭密啓其意師乃休去至明日升堂果與尋常不同頭至僧堂前撫掌大笑曰且喜老漢會末後句雖然如是只得三年師果三年而沒頌曰鐘鼓猶未鳴托鉢何處去一拶便回頭會得末後句寶峯照末後句會也無德山父子太含糊座中亦有江南客莫向樽前唱鷓鴣天童覺凜凜霜風戞地寒漁翁擲釣五湖寬錦鱗觸散波心月收取絲綸上古灘寶峯祥鼓寂鐘沉托鉢回巖頭一拶語如雷果然只得三年活莫是遭他授記來張無盡德山托鉢最為奇好語令人特地疑虎豹出林誇爪距叢林千古立雄基南堂興一撾塗毒聞皆喪身在其中總不知八十翁翁入場屋真誠不是小兒嬉徑山杲鐘未鳴鼓未響依前托鉢歸方丈德山不會末後句巖頭密意誰相亮只得三年也大奇留與諸方作榜樣鼓山圭續收千尺絲綸直下埀一波才動萬波隨兒童不慣風濤惡走入蘆花不敢窺真淨文鐘鼓未鳴先托鉢雪峯平地成饒舌當時一徑入僧堂且看巖頭有何說照堂一雪峯公然喚回巖頭密啓有力果然只得三年賊口元來是敕典牛游凜凜吹毛照膽寒不容擬議豈容傳擡眸已是身三段此是吾家紅鐵團明大禪斫却月中桂清光轉更多狐狸俱屏迹師子奮金毛密庵傑德山托鉢話低頭得人怕三家村裡人醉後胡廝罵率庵琮增收德山因僧問如何是佛師曰佛是西天老比丘頌曰佛是西天老比丘星移斗轉水東流茫茫宇宙人無數戶貫依前百草頭或菴體增收德山因臨濟侍次師曰今日困濟曰這老賊寐語作甚麼師擬拈棒濟掀倒禪床頌曰臥龍才奮迅猛虎便咆哮時人只見波濤湧不知新月出林梢中庵空德山示衆曰道得也三十棒道不得也三十棒臨濟聞得謂洛浦曰汝去問他道得為甚麼也三十棒待伊打汝接住棒送一送看他作麼生浦如教而問師便打浦接住送一送師便歸方丈浦回舉似臨濟濟曰我從來疑著這漢雖然如是你還識德山麼浦擬議濟便打頌曰單于自負藝過人小將教詔去似真到彼果然嬴小捷回來未免陷全身海印信譬若金籠鸚鵡兒觜如紅玉一青衣雖然學得人言語問著元來總不知佛鑑勤增收德山因僧來參便乃閉却門僧打門師曰誰曰師子師開門僧才入禮拜師驀頭騎曰者畜生許多時向甚麼處去來頌曰見兔放鷹因邪打正腳未跨門直須猛省木庵永增收德山上堂大衆及盡知也直得三世諸佛口挂壁上猶有一人呵呵大笑若識此人參學事畢或作圓明密語投子青云然雖如是德山大似藏盡楚天月猶存漢地星乃頌曰雙盲入暗路崎嶇日落棲蘆暫得蘇爭似石人眠半夜免教舜讓守林居須知花綻非干木無腳行時早觸途昨朝風起長安道元是崑崙進國圖收把斷襟喉風磨雲拭水冷天秋錦鱗莫謂無滋味釣盡滄浪月一釣天童覺
