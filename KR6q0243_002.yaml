body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集世尊機緣釋迦牟尼世尊初降生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊後雲門云我當時若見一棒打殺與狗子喫貴圖天下太平琅琊覺云可謂將此深心奉塵剎是則名為報佛恩頌曰四月八佛降生日指天指地稱第一九龍噴水沐金軀摩訶般若波羅蜜洞山聰指天指地語琅琅送語傳言出畫堂使者尚能多意氣主人應是不尋常泉大道寶殿龍樓忽降時周行七步豁眉開言不是言無謙遜天上人間更有誰野軒遵開基創業前王事端拱持盈後帝心劒戟盡為農器用此時誰報太平音佛印元才降王宮示本然周行七步又重宣指天指地無人會獨震雷音遍大千海印信混沌未分人未曉乾坤才剖事全彰天生伎倆能奇怪末上鍮他弄一場保寧勇七步周行手指天衲僧棒下命難全母胎出後成何事爭似閻浮未降前張無盡周行七步便稱尊家醜那堪放出門只向母胎度人畢也須一棒一條痕長靈卓才生能步便英靈天上人間我獨尊可笑瞻前不顧後那知身後有雲門草堂清一火鑄成金彈子團圞都不費鉗鎚拈來萬仞峯頭放打落天邊白鳳兒慈受深無憂樹下誕全身七步周行事斬新相見謂言侵早起誰知更有夜行人南華昺老胡不免出胞胎也解人前恁麼來指地指天稱第一衆生四十九年災鼓山圭老漢才生便著忙周行七步似顛狂賺他無限癡男女開眼堂堂入鑊湯徑山杲兜羅綿手指天地紺目重瞳顧四維七步周行渾屬我一生賣弄小孩兒佛燈珣黑白未分全體妙才彰文彩便成乖因茲漏泄家風甚末代兒孫鼻孔喎月菴果才出胞胎便逸羣周行七步獨稱尊當時若見雲門老不到如今纍子孫踈山如續收老胡種種空意氣一手指天兼指地當時盡謂獨稱尊今日翻思誰不是人人盡在光明裏臨文不用更加諱育王達千年石虎産麒麟一角通身五彩明金鎖玉關渾掣斷毗盧界內鼓煙塵雪竇宗美如西子離金闕嬌似楊妃下玉樓猶把琵琶半遮面不令人見轉風流佛鑑勤毗嵐園裏喪嘉聲分手徒勞布惡名決是一文偷不得至今虗作不良人瞎堂遠五天一隻蓬蒿箭攪動支那百萬兵不得雲門行正令幾乎錯認定盤星石窗恭周行四顧獨稱尊平地無風起浪痕禍及私門猶自可誰知千古纍兒孫懶菴需掀翻地軸乾坤窄撥轉天輪宇宙寬須向強中呈好手虗空打碎劫初看正堂辨奴兒婢子十生九死於裏不正被外邊使縱饒開口便過頭未免渾身輥泥水月堂昌無憂樹下浴嬰孩清曉薔微帶露開轉過衲僧相見處後槽驢馬出胞胎天童淨草本無端拈出來更加注腳轉癡呆西天此土誰知己夜半優曇火裏開應菴華走出門風相副稱東西南北更無人看來不得韶陽老未免兒孫惹客塵或菴體指天指地無處回避瞿曇瞿曇討甚巴鼻月林觀自謂五更侵早起誰知更有夜行人條風塊雨非云昔堯舜垂衣萬國賓運菴巖未曾撞入摩耶腹兩手知他甚處安右脅出來魔境現只堪惆悵不堪看天目禮一聲哇地便吒哩突出如斯大闡提此土西天起殃害堂堂洗土不成泥北澗簡七步周行猶倣佛指天指地不分明是非既落傍人耳洗到驢年也不清虗堂愚兩手指天地周行步更多可憐黃面老螃蟹落湯鍋西巖惠生來自恨錯同條鐵鑄心肝也合銷還你獨尊三界內奈何今日又明朝覺菴真僧問九峯虔云承聞和尚有言諸聖間出祇是傳語人是否師曰是曰世尊一手指天一手指地云天上天下唯吾獨尊和尚為甚麼却喚作傳語人師曰祗為一手指天一手指地所以喚作傳語人頌曰妙相圓明不可親奴兒婢子自殷勤指天指地稱尊大也是傳言送語人丹霞淳增收世尊未離兜率已降王宮未出母胎度人已畢頌曰大象本無形至虗包萬有末後已太過面南看北斗王宮兜率度生出胎始終一貫初無去來掃蹤滅迹除根蒂火裏蓮華處處開圓悟勤是非海裏橫身入豺虎羣中自在行莫把是非來辨我平生穿鑿不相干鼓山圭利刃有蜜不須舐蠱毒之家水莫嘗不舐不嘗俱不犯端然衣錦自還鄉徑山杲本離兜率降王宮便就刀山入鑊湯等間擒下白拈賊滿眼俱為敗露贓瞎堂遠垂鈎不似迷津客張網誠非待兔人半夜烏雞何處去天明吞却玉麒麟正堂辨肌骨當初赫赤窮面皮今日厚千重撩頭搭尾應更點嬴賽闍黎齋後鍾或菴體增收世尊初於臘月八日明星出時忽云奇哉一切衆生具有如來智慧德相但以妄想執著不能證得頌曰瞿曇失却眼睛時雪裏梅華只一枝而今到處生荊𣗥却笑春風惱亂吹晦堂心黃面瞿曇不丈夫明星現處自塗糊如今好覔生蛇弄免使兒孫在半途佛心才一見明星夢便回千年桃核長青梅雖然不是調羮味曾與將軍止渴來雪竇宗出得山來早是遲却於世上討便宜直饒一念超三界好與拳頭劈面椎佛照光此老從來謾自誇無端病眼見空華直教當下超三際檢點將來未到家無用全六年落草野狐精跳出渾身是葛藤打失眼睛無處覓誑人剛道悟明星天童淨二千年前黃面老舉頭莫是見明星茫茫宇宙人無數幾個男兒眼有睛肯堂充雪嶺崎嶇歲月深何曾夜半見明星可憐業識茫茫者蹉過如來正法輪妙峯善夜半明星出現時分明喪盡目前機若言總具如來相也是空拳誑小兒頑石空六載隈藏在雪山灰頭土面自慚顏今朝忽覩明星現始覺從前被眼瞞鐵山仁六載將身草裏埋當時有眼幾曾開果然見得明星現未到門庭冷似灰介石朋雪嶺六年修苦行今朝打失主人公普天匝地無尋處百億分身是脫空天目禮正覺山前失眼睛是凡是聖盡生盲至今夜夜明星現誰肯向伊行處行癡絶沖明星見處月三更箇箇眉毛眼上橫平地起堆黃面老夢中説夢可憐生大歇謙明星一見眼皮穿漢語胡言萬萬千暴富乞兒休説夢誰家竈裡火無煙無量壽金鍾夜擊九重城六載歸來改瘦形待得衆生心眼活雪山依舊碧崚層虗堂愚輕金輪位重草座金彈換人泥彈丸末世衆生心眼巧明星空照雪山寒間極雲月滿長空星滿天瞿曇一見眼皮穿長安市上人無數何似家家夜莫眠千峯琬世尊一日升座大衆才集定文殊白槌云諦觀法王法法王法如是世尊便下座頌曰聲振大千龍虎伏無人解和法王才言下便明猶是鈍頓教千眼一時開明招謙文殊白槌報衆知法王法令合如斯會中若有仙陀客不待眉間毫相輝北塔祚列聖藂中作者知法王法令不如斯會中若有仙陀客何必文殊下一槌雪竇顯百萬靈山似葦麻風行雲集已周遮當時不是文殊老往往瞿曇更撒沙佛印元頭角麟龍衆若干當時一例受欺謾法王真子揮楗椎直至而今作笑端正覺逸未兆之前早二三白槌之後更那堪當時若有仙陀客不到如今強指南海印信七佛之師下一槌鵝王成鴨鱉成龜滿筵龍象齊傾耳笑殺靈山老古錐野軒遵巍巍頂相終難見舒卷何當如掣電彼時若有此時人文殊槌下分針線白雲端諦觀法王法法王法如是玉輪影射珊瑚枝一陳清風動天地地藏恩月在波心徹底寒澄澄應不許龍蟠五湖多少未歸客却被傍人把釣竿上方益彌盧出海橫天外南北東西不見邊一幅素縑描不得競將天下與人傳大洪遂據坐凝眸語未形一槌直下意何明倒行此令如相委無限清風動地生夢菴信一段真風見也麼元元化母理機梭織成古錦含春象無奈東君漏泄何天童覺一輪明月映天心四海生靈荷照臨何必西風撼丹桂碧霄重送九秋音佛鑑勤法王法令若為酬老倒文殊強出頭負纍釋迦猶可事至今千古閙啾啾龍門遠銀蟾皎潔豈容模剛被文殊強塗糊千古兒孫無覓處三條椽下觜盧都月菴果金槌影動寶劒光寒百萬之衆齊著眼看楚安方瞿曇按指文殊據令漏泄天機一槌打正南華昺續收正令付全提不存凡聖機牢關百雜碎石火電光輝尼無著總古皇前化超羣檄無字印文明劃劃今時衲子若當陽往往半千成五百正堂辨法王法令沒周遮一片虗凝絶點瑕槌下不開諸聖眼幾多騏驥困鹽車靈巖安見成活計莫周遮椎下分疏事轉差若是咬人師子子何須牙上更安牙月林觀道泰時清才子貴家肥國富小兒嬌不因紫陌花開早爭見黃鶯下柳條木菴永世尊因五通仙人問云佛有六通我有五通如何是那一通世尊召仙人仙人應諾世尊曰那一通爾問我頌曰仙人一問通皆備却是瞿曇一物無喚得兔來依舊放幾多山鬼暗相呼佛印元那一通爾問我令人慚愧釋迦老只知步步踏紅蓮不覺茫茫入荒草正覺逸無量劫來曾未遇如何不動到其中莫言佛法無多子最苦瞿曇那一通保寧勇問佛如何那一通世尊當面指迷蹤祥雲密密微微雨大震雷音匝地風雲溪恭汝問如何此問親嶺梅江柳共芳春抱贓不用行搜檢已自當堂露賊身長靈卓續收那一通你問我玄關倒插無鬚鎖等間一掣掣得開三個老婆相對坐咄斷橋倫那一通你問我口是禍門招因帶果慚愧慈悲大法王丙乙離壬不屬火寶葉源世尊因外道問云不問有言不問無言世尊據坐外道讚曰世尊大慈大悲開我迷雲令我得入作禮而去後阿難問佛外道有何所證而言得入世尊曰如世良馬見鞭影而行頌曰鞭影分明指似君多聞瞥地爽精神汾陽報汝諸禪侶信手拈來莫厭塵汾陽昭機輪曾未轉轉必兩頭走明鏡忽臨臺當下知妍醜妍醜分兮迷雲開慈門何處生塵埃因思良馬窺鞭影千里追風喚得回雪竇顯雙鋒覆護兩俱摧迷雲從此豁然開收得劫初鈴子後輕輕一振動雲雷天衣懷萬丈寒潭徹底清錦鱗夜靜向光行和竿一掣隨鈎上水面茫茫散月明白雲端經過遇夜宿荒草開得眼來天大曉空心赤腳唱歌歸路上行人已不少保寧勇特地殷勤問有無因風應不費工夫迷雲縱得開令入未免區區在半途淨照臻雪覆喬林同一色清光上下含虗碧採樵人立渡頭寒極目圓蟾為誰白成枯木外道粗心慣險夷老胡鞭影露針錐行人拾得東門兔誰管韓獹精力疲長靈卓世尊恰似青銅鏡挂向虗空秋月靜表裏無私照膽寒高低一一皆相映佛鑑勤杲日連天照有無孰云善逝坐跏趺如今要見當年事邪正由來在半途龍門遠有無不問語先墯明鏡當臺雙照破迷雲散盡曉天空杲日團團紅似火佛性泰露影藏身問世尊瞿曇一點不加文迷雲舒卷從斯入十倍精神減八分佛燈珣迷悟躅髏前何勞更舉鞭只持雞狗戒不學祖師禪鼓山圭兩處牢關擊不通纖塵不動自乖宗忽然業鏡百雜碎黃面瞿曇失却蹤徑山杲續收外道殷勤來問佛有言不問及無言大雄不費纖毫力良馬何曾用舉鞭照堂一世尊隻眼通三界外道雙眸貫五天華意正濃桃臉笑春光不在柳梢邊雪巢一不問有言無言説甚見影見鞭露柱口挂壁上燈籠倒退三千瞎堂遠陷虎機關兩處安湍流一截萬源乾駿駒瞥爾窺鞭影凜凜霜蹄毛骨寒尼無著總獵涉榮枯未是奇到頭誰是出家兒故鄉漠漠無消息時有孤雲嶺外歸正堂辨赤日輝空照大千佛魔俱盡頭超然悠悠莫論途中事露出胸襟子細看大溈智不問有無先話墯軒轅古鏡忽臨臺雖然當下分妍醜依舊迷雲撥不開肯堂充自把碌磚空裏擲必端自打自家頭灼然自痛自難説自著摩挲歸去休斷橋倫不問無言及有言坐觀成敗自安然仙陀瞥爾知宗墮誰謂世尊曾舉鞭本覺一增收世尊因外道問昨日説何法曰説定法又問今日説何法曰説不定法云云頌曰古鑑從來絶點痕隨其妍醜目前分而今鑑破無光影風輥長江水色渾塗毒䇿昨日與今日説定説不定寰中天子敕塞外將軍令外道當年入夢鄉直至如今猶未省高安悟昨日定今日不定正令已行皆逐正卓下靈山皂纛旗百萬麾軍皆乞命山堂淳增收世尊因調達謗佛生身陷地獄佛敕阿難傳問云汝在地獄中安否云我雖在地獄如三禪天樂佛又令阿難傳問你還求出不云我待世尊來便出阿難云佛是三界大師豈有入地獄分云佛既無入地獄分我豈有出地獄分頌曰好笑提婆達多入捺落十小劫波然得三禪妙樂吹布毛須還鳥窠湛堂準大隱居小隱居山各得其所隨分安間何必更來論出入人生在處有餘歡別峯雲地獄天堂八字打開誰知無去亦無來若言已得三禪樂未免將身自活埋松源嶽萬仞崖頭𢬵得去不知何處覓全尸業風吹起再蘇省却問如今是甚時虗堂愚增收世尊因長爪梵志索論義預約云我義若墯我自斬首以謝世尊云汝義以何為宗梵志云我義以一切不受為宗世尊云是見受不志拂袖而去行至中路有省乃謂弟子云吾當回去斬首以謝世尊弟子云人天衆前幸當得勝何以斬首志云我寧於有智人前斬首不於無智人前得勝乃歎云我義兩處負墯是見若受負門處粗是見不受負門處細一切人天二乘皆不知我義墯處唯有世尊諸大菩薩知我義墯回至世尊前云我義兩處負墯故當斬首以謝世尊云我法中無如是事汝當回心向道於是同五百徒衆一時投佛出家證阿羅漢頌曰是見若受破家門是見不受與誰論匾簷驀折兩頭脫一毫頭上現乾坤天衣懷一切不受逞家風片言雙破兩頭攻赤幡奪了回光處始信言前墮己宗本覺一是見受時眼著屑見如不受事猶乖賊身已露徒回首鬼面神頭一處埋無用全增收世尊因乾闥婆王奏樂其時山河大地盡作琴聲迦葉起舞王問迦葉豈不是阿羅漢諸漏已盡何更有餘習世尊曰實無餘習莫謗法也王又撫琴三遍迦葉亦三度作舞王曰迦葉作舞豈不是世尊曰實不曾作舞王曰世尊何得妄語世尊曰不妄語汝撫琴山河大地草木盡作琴聲豈不是王曰是世尊曰迦葉亦復如是實不曾作舞王乃信受修山主問澄源禪師乾闥婆王奏樂直得須彌岌峇海水騰波迦葉作舞作麼生會源曰迦葉過去世曾作樂人來習氣未除修曰須彌岌峇海水騰波又作麼生源休去法眼代曰正是習氣頌曰輕輕撥轉一條絃聲振三千與大千賴得飲光知密意肯將羅袖惹春煙塗毒䇿有三尺劒可以謁趙國無千里眼難以見懸絲巍巍堂堂三界大師虗堂愚增收世尊在忉利天為母説法優瑱王思佛命匠雕旃檀像及至世尊下來像亦出迎頌曰紫金光聚照山河天上人間意氣多曾敕文殊領徒衆毗耶城裏問維摩虗堂愚增收世尊一日坐次見二人舁豬子過乃問這箇是甚麼其人云世尊具一切智豬子也不識世尊曰也要問過頌曰捨筏懷兼濟逢耕更問津却將未歸意説與欲行人木庵瓊首座增收世尊三喚三應乃云無為真佛實在我身大溈智云世尊為誰家分上事又喝云汝等切忌認著昭昭靈靈復頌曰真佛無為在我身三呼三應太惺惺若人不悟元由者塵劫茫茫認識神增收世尊一日敕阿難食時將至汝入城持鉢難應諾曰汝既持鉢當依過去七佛儀式難遂問如何是七佛儀式佛召阿難難應諾佛曰持鉢去密庵云大小世尊被阿難輕輕靠著未免喚鍾作甕頌曰從前七佛儀式慶喜何曾欠少堪笑黃面瞿曇無端打箇之繞遁庵演增收世尊因靈山會上有五百比丘得四禪定具五神通未得法忍以宿命智通各各自見過去殺父害母及諸重罪心內懷疑於甚深法不能證入於是文殊承佛神力手握利劒持逼如來世尊謂文殊曰住住不應作逆勿得害吾吾必被害為善被害文殊從本已來無有我人但以內心見有我人內心起時我必被害即名為害於是五百比丘自悟本心如夢如幻於夢幻中無有我人乃至能生所生父母於是五百比丘同聲讚歎曰文殊大智士深達法源底自手握利劒持逼如來身如劒佛亦爾一相無有二無相無所生是中云何殺頌曰為渠中路惹埃塵致使全機截斷雲佛劒兩忘何處去還家曲調一番新象田卿佛祖由來總是冤電機旋處直如弦金毛若解和聲拶月裏麒麟笑揭天瞎堂遠文殊當日逼如來五百聲聞眼豁開欲會如來佛亦爾青蛇匣裏吼風雷本覺一增收世尊敲髑髏問耆婆生何道曰生人道又敲一曰生何道曰生天又敲一耆罔措頌曰如來一擊少人知直下分明更是誰無限月光隨水去片雲偏向故山歸塗毒䇿老胡一擊許誰知大冶紅罏片雪飛青草冢間留不住白雲還望故山歸瞎堂遠增收世尊因地布髮掩泥獻華於然燈佛燈見布髮處遂約退衆乃指地云此一方地宜建一梵剎時有賢于長者持標於指處插云建梵剎已竟時諸天散花讚云庶子有大智矣頌曰百草頭上無邊春信手拈來用得親丈六金身功德聚等間擺手入紅塵塵中能作主化外自來賓觸處生涯隨分足未嫌伎倆不如人天童覺一枝修竹建精藍風捲蟭螟入海南惡水潑來成第二鈍根蹉過問前三張無盡增收世尊因廣額屠兒日殺千羊一日至世尊前揚下屠刀云我是千佛一數世尊云如是如是頌曰昔日為刀今日佛今朝為佛佛能刀能刀能佛無差別便見眉間白玉毫圓悟勤放下屠刀處棒打不回頭雲自帝鄉去水歸江漢流退菴休增收世尊因波斯匿王問勝義諦中有世俗諦否若言無智不應一若言有智不應二一二之義云何世尊曰大王汝於過去龍光佛法中曾問此義我今無説汝今無聽無説無聽是名一義二義頌曰問處奇特答處殊絶一二義諦驪龍角折真如無聽無説意無窮鐵壁銀山一線通何處是渠真聖諦秋風昨夜到梧桐東谷光增收世尊昔至多子塔前命摩訶迦葉分座令坐以僧伽黎圍之遂告云吾有正法眼藏密付於汝汝當護持傳授將來毋令斷絶頌曰密傳分半座正好驀面唾不與麼且放過子孫未免遭殃禍海印信僧問興化多子塔前共談何事化曰一人傳虗萬人傳實頌曰於道無所證方通萬法路或明或暗行不慎亦不護月來松色寒雲去青山露今古天台橋幾人能得度投子青增收世尊因黑齒梵志運神力以左右手擎合歡梧桐樹兩株至靈山獻佛佛云梵志志應諾佛云放下著志放下左手一株佛又云放下著志放下右手一株佛又云放下著志云我兩手盡空未審更放下個甚麼佛云吾非教汝放捨其華汝當放下內六根外六塵中六識無一可捨是你免生死處志忽然大悟頌曰梵志誰知有過愆閻王業鏡照無偏因茲見佛成羅漢方信壺中別有天南堂興兩手擎來教放下空身立地更疑猜根塵識界無尋處多謝春風爛漫開心聞賁截斷千崖路風前活計新誰知席帽下元是昔愁人無際派增收世尊臨入涅槃文殊請佛再轉法輪世尊咄云吾四十九年住世未嘗説一字汝請吾再轉法輪是吾曾轉法輪邪頌曰四十九年打之繞下梢大作師子吼雖然未始轉法輪畢竟分疏成應口無際派末上何曾轉法輪只今再轉謾勞神路行人不知天曉猶把靈符執夜明北澗簡老漢生平太脫空將無作有誑盲聾臨期一語方真實也是闍黎飯後鐘別山智世尊臨入涅槃以手摩胸普告人天大衆云汝等諦觀吾紫磨金色之身瞻仰取足莫令後悔若言吾滅度非吾弟子若言吾不滅亦非吾弟子頌曰言吾入滅非吾子言吾不滅亦非親但見落花隨水去不知流出洞中春釋迦老若為鄰臨行賣弄紫金身雙林盡道泥洹也夜夜羣星拱北辰佛鑑勤續收老倒瞿曇不識羞臨行猶自逞風流摩胸示衆歸何處啼鳥一聲山更幽皖山凝滅度不滅度總非吾弟子更把雙趺展示人苦瓠連根苦雲耕靜雙林樹下手摩胸説有談無恣脫空若謂瞿曇曾入滅錯教啼鳥笑春風盧舟度增收世尊涅槃日迦葉最後至世尊乃於槨中露雙趺示之迦葉乃作禮請如來以三昧火而自闍維即時金棺從七寶牀升舉繞俱尸羅城七匝却還本處化火光三昧而自焚之頌曰慚愧老胡槨示雙趺金色尊者還會也無目前悟得未辨精粗繞七匝兮成何事箇箇男兒是丈夫地藏恩未出王宮已涅槃何須雙足露金棺致令迦葉雙眉皺慶喜門前倒剎竿佛鑑勤
