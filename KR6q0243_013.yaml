body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第三世之四南嶽下第二世之四增收洪州泐潭常興禪師嗣馬祖因南泉來見師面壁而坐泉撫師背師曰阿誰曰普願師曰如何曰也尋常師曰汝何多事頌曰面壁堆危引客過問誰那更問如何道尋常已成多事檢點儂家事更多西巖惠增收汾州大達無業國師嗣馬祖僧問如何是佛師曰莫忘想頌曰王令威嚴誰敢擬纖毫才動鐵輪隨時人只見錐頭利幾人能見利頭錐懶菴需無業示衆曰若有一毫頭聖凡情念未盡未免入驢胎馬腹裏去白雲端曰直饒一毫頭聖凡情念頓盡亦未免入驢胎馬腹裏去瞎漢但恁麼會頌曰無業何太切白雲何太孤胡鬚將謂赤更有赤鬚胡南巖勝一道如弦直心親手更親箭穿紅日影方是射鵰人鼓山圭增收信州鵝湖大義禪師嗣馬祖因唐憲宗詔入內論議法師問如何是禪師以手點空法師無對帝曰法師講無窮經論祇這一點尚不奈何師却舉順宗問尸利禪師大地衆生如何得見性成佛利曰佛性如水中月可見不可取師謂帝曰佛性非見必見水中月如何攫取帝乃問如何是佛性師曰不離陛下所問帝默契頌曰因地而倒因地起離地求起無是理不離所問語雖親認著依前還不是枯禪鏡說理談真面紫宸鵝湖大義枉勞神由來佛性難名邈爭似君王默契親天目禮空中一點是箇甚麼直饒講無限經論其奈不識者行貨雖然價重須彌也被君王識破尼間林英增收潭州三角山總印禪師嗣馬祖示衆曰若論此事眨上眉毛早已蹉過也麻谷便問眨上眉毛即不問如何是此事師曰蹉過也谷乃掀倒禪牀師便打長慶代云悄然頌曰正令威嚴斷不容星移斗轉覔無蹤將軍勒起當頭馬殺氣紛紛袞黑風呆堂定增收三角示衆曰凡說法須用應時應節時有僧問四黃四赤時如何師曰三月杖頭挑曰為甚麼滿肚皮貯氣師曰爭奈一條繩何曰如何得出氣去師曰直待皮穿頌曰平地安身未肯休花陰柳徑逐時流放教滿肚無閒氣始信渠儂得自由慈受深增收三角因僧問如何是三寶師曰禾豆粟曰意旨如何師曰大衆歡喜奉行頌曰三角對酬禾豆粟龍宮海藏難收録空門曾問疏山僧便道如今粥飯足大洪遂池州魯祖山寶雲禪師嗣馬祖師尋常見僧來便面壁南泉聞曰我尋常向師僧道向佛未出世時會取尚不得一箇半箇他恁麼驢年去玄覺云為復唱和語不肯語保福問長慶祇如魯祖節文在甚麼處被南泉恁麼道長慶云退己讓於人萬中無一箇羅山云陳老師當時若見背上與五火抄何故為伊解放不解收玄沙云我當時若見也與五火抄雲居錫云羅山若沙總恁麼道為復一般別有道理若擇得出許上座佛法有去處玄覺云且道玄沙五火抄打伊著不著頌曰人來面壁坐顒顒不話多端說異同親切不教心外覔免將明暗呼盲聾秋霜博地生寒暑魯祖垂慈不用功汾陽昭老倒禪門傳魯祖見僧面壁親垂顧箇中若是丈夫兒剔起眉毛便回去佛印元魯祖三昧最省力才見僧來便面壁若是同心達道者不在揚眉便相悉梁山冀祖師面壁播諸方無限禪人謾度量無事晚來江上立數株寒柏倚斜陽琅琊覺坐斷千山與萬山勸人除却是非難池陽近日無消息果中當年不目觀翠巖真面壁咸言上上機衲僧到此擬何之直饒截斷千江水也落宗門第二槌海印信魯祖孤風振四維僧來面壁少人知南泉提起驢年事且道如今是甚時白雲端魯祖當年不用功逢僧面壁顯家風若遇上乘同道者請續此一句黃龍新堪笑池陽老古錐僧來面壁擬何為大都端正人男女清淨不勞紅粉施草堂清雖然不是作家好惡他家自識喫拳還似打人面赤不如語直黃龍震魯祖山前古路通熙微一徑沒西東杜䳌聲裏春光老零落桃花藉地紅普融平無絃不彈有曲誰聽匏土革木宮商自正寥寥千古少林人也道九年傳此令佛心才池陽何處得捫摸後代商量涉異途古人剛地成多事試問如今會也無龍門遠續收虎徑龍泉繞行巖鳳棲霜倚鶴和杉誰人會得宗師意紐轉乾坤好不參剋符道者魯祖見僧面壁此理何妨徑直時人更莫斟量祇者不勞心力中間或聞一類強言正是相為非唯謗他古人亦乃困於上智會得祖師現前不會也難逃避永明壽南泉黑豆未生時喃喃終是泄天機休向未生全曉悟日出東方月落西藥山昱池陽面壁許誰知萬古孤峯對落暉才見攢眉便回去早知不是丈夫兒懶菴需魯祖逢人面壁老大慵懶追隨後之參徒罔測一向打瓦鑽龜水菴一葉落江頭一望長幾莖喬木倚斜陽曾經巴峽猿啼處鐵作心肝也斷腸簡堂機背前面後揚家醜揭地洪音師子吼分付仙陀知不知法身午夜藏北斗足菴鑒家財喪盡沒絲毫祇箇一身猶恨多却向池陽最深處殺人空手不持刀石菴玿無目仙人揣骨頭暗中摸索認王侯價高畢竟無人買冷却構欄懡㦬休雪菴瑾日暖佳人刺繡遲紫荊枝上囀黃鸝欲知無限傷春意盡在停針不語時南叟茙人來面壁成何事爭得心開見本源空劫已前諸佛子話頭不舉自然圓橫川珙增收魯祖因僧問如何是不言言師曰汝口在甚麼處曰某甲無口師曰將甚麼喫飯僧無語洞山云他又不飢喫甚麼飯雪竇云好劈脊便棒這漢開口了合不得合口了開不得頌曰得因失有是在非邊根源未斷枝派相連不言言口何在轉得身來難下載一帆風過洞庭湖對面須知已違背月堂昌增收唐州紫玉山道通禪師嗣馬祖因于頔相公問佛法至理乞師一言師曰若問須去情謂公曰便請師曰但問將來曰如何是佛師召于頔公應諾師曰更莫別求頌曰如何是佛更莫別求相隨來也四大部洲月林觀增收紫玉因于公一日問如何是黑風吹其船舫漂墮羅剎鬼國師曰于頔客作漢問恁麼事作麼于失色師指曰這箇便是黑風漂墮羅剎鬼國于作禮而謝頌曰就身打劫壯吾曹喚得賢侯智眼高忿色不知何處去珠回玉轉透雲袍南巖勝增收五臺山隱峯禪師嗣馬祖一日辭祖祖曰甚處去師曰石頭去曰石頭路滑師曰竿木隨身逢場作戲便去才到石頭遂繞禪牀一匝振錫一下問是何宗旨頭曰蒼天蒼天師無語回舉似馬祖祖曰汝更去見他道蒼天蒼天便噓兩聲師又去一依前問頭乃噓兩聲師又無語歸舉似馬祖祖曰向汝道石頭路滑頌曰石頭路險人難到到者方知滑似苔兩度三回雖踏倒滿身泥水又歸來虗堂愚唱徹黃金縷重吹紫玉簫倚樓人不見風過樹頭搖增收隱峯因南泉把淨瓶與師曰淨瓶是境你不得動著境與我將水來師將淨瓶傾水於泉面前休去歸宗曰鄧隱峯也是亂潟頌曰南泉特地指瓶隱峯便來潟水兩人自不識羞掘地深埋自己照堂一南泉不指淨瓶隱峯何曾潟水從教打瓦鑽龜佛法不在這裏鼓山圭眼中無翳休挑刮鏡上無塵不用磨信腳出門行大路橫擔拄杖唱山歌徑山杲增收磁州馬頭峯神藏禪師嗣馬祖上堂謂衆曰知而無知不是無知而說無知南泉曰恁麼依師道始道得一半黃蘗曰不是南泉駮他要圓前話頌曰從頭數到一二三倒數却成三二一直饒善會大衍算掐指巡文數不出中菴空增收潭州華林善覺禪師嗣馬祖裴相國訪師問曰師還有侍者否師曰有只是不可見客曰何妨師乃喚曰大空小空唯二虎自菴後出裴見之驚悚師語二虎有客且去二虎於是哮吼而去曰師作何行業感得如斯師提起數珠曰會麼曰不會師曰老僧常念觀世音頌曰常念觀音力伏猛獸道眼通明萬緣何有良哉大士時時垂手念茲在茲安樂長壽龍門遠新羅渤海竺乾此土月白風清三界獨步對境無心馴菴有虎忽然提起數珠時誰識當陽第一機奇奇敵勝還他師子兒南堂興增收烏臼和尚嗣馬祖因玄紹二上座參師乃問二禪客發足甚處玄曰江西師便打曰久知和尚有此機要師曰汝既不會後面箇師僧祇對看紹擬近前師便打曰信知同坑無異土參堂去頌曰烏臼分明棒有眼這僧直是眼無筋假饒打著百千箇切莫將伊掛齒唇照堂一赤身挨白刃死中還得活一箭自迷踪萬車齊喪轍鼓山圭烈焰不容蚊蚋泊大海那堪宿死尸任是三頭并六臂望風無不竪降旗徑山杲鏌鋣在握當堂坐擬欲衝前便喪軀縱使機鋒如電拂到頭未免病棲蘆懶菴需增收烏臼問僧近離甚處曰定州師曰定州法道何似這裏曰不別師曰若不別更轉彼中去便打僧曰棒頭有眼不得草草打人師曰今日打著一箇也又打三下僧便出去師曰屈棒元來有人喫在曰爭奈杓柄在和尚手裏師曰汝若要山僧回與汝僧近前奪棒打師三下師曰屈棒屈棒曰有人喫在師曰草草打著箇漢僧禮拜師曰却與麼去也僧大笑而坐師曰消得恁麼消得恁麼頌曰呼即易遣即難互換機鋒子細看劫石固來猶可壞滄溟深處立須乾烏臼老烏臼老幾何般與他杓柄太無端雪竇顯相見不虗圖分明付與渠汝醉我扶起我倒汝相扶交互為賓主相將入帝都高歌大笑九衢裏天上人間我唯爾佛性泰增收石臼和尚初參馬祖祖問甚處來師曰烏臼來曰烏臼近日有何言句師曰幾人於此茫然在曰茫然且置悄然一句作麼生師乃近前三步曰我有七棒寄打烏臼你還甘否師曰和尚先喫某甲後甘却回烏臼頌曰石臼發腳太遲馬祖開口太早十字街頭要錢須是打他栲栳月堂昌增收石臼因僧問如何是地藏手中珠師曰你手中還有麼曰不會師曰莫謾大衆復頌曰不識自家寶隨他認外塵日中逃影質鏡裏失頭人頌曰貪觀天上月失却手中橈石臼山下路歸計轉迢遙覿面光輝日拍手笑吾曹且道笑他箇甚麼為人不得力佛燈珣喪盡自家寶何須問外塵萬緣俱照破方見本來人塗毒策增收本溪和尚嗣馬祖一日坐次龐居士至師才顧視公以拄杖畫一圓相師近前踏却士曰與麼不與麼師亦畫一圓相士亦近前踏却師曰與麼不與麼士拋下拄杖而立師曰來時有杖去時無杖曰幸目圓成徒勞側目師撫掌曰奇哉奇哉一無所得士拈杖便行師曰看路看路頌曰甎子來瓦子擲拳頭來腳尖躍子細點檢一場狼藉先賢為榜樣今人為法則莫學相似禪青天轟霹𮦷箇中若是惺惺漢餿飯殘羮誰肯喫咄大圓智起模畫樣弄精魂拂跡除蹤更見人行到水窮山盡處滿天雲散月華明瞎堂遠十九條平路終無一局同欲分先後手側目辨來蹤正覺顯各呈見解互逞機鋒石火莫及電光罔通拋下拄杖而立不同草草拈起拄杖便行亦豈匇匇者裏著得隻眼許你親見龐公石溪月增收本溪因龐公問丹霞打侍者意旨如何師曰老老大大見人長短曰為我與師同參所以借問師曰若恁麼從頭舉來共你商量曰老老大大不可共你說人是非師曰念公年老曰罪過罪過頌曰一對鐵槌如綿團一雙烏鴉如白鶴忽然狹路相逢不免將錯就錯佛鑑勤增收亮座主見馬祖講經論因參馬祖祖問見說座主大講得經論是否師曰不敢曰將甚麼講師曰將心講曰心如工伎兒意如和伎者爭解講得師抗聲曰心既講不得虗空莫講得麼曰却是虗空講得師不肯便去將下階祖召曰座主師回首祖曰是甚麼師豁然大悟便禮拜曰這鈍根阿師禮拜作麼師曰某甲所講經論將謂無人及得今日被大師一問平生功業一時冰釋禮謝而退乃隱於洪州西山更無消息頌曰幾年錯謂將心講誰信虗空講似流驀喚回頭方瞥地西山一去絶蹤由本覺一馬師瞎却亮師眼一入西山更不返我有三十二藤條寄與山中這擔板東山空昨夜月初明柴門猶未閉苗兒捉老鼠引得狗兒吠懶菴樞却是虗空解講經驢鳴狗吠一般聲郡樓昨夜鼕鼕鼓不是知音不解聽白楊順弓弦難結鴛鴦紐御道那栽栗棘蓬堪笑香嚴饒舌老今年猶勝去年窮正堂辨却是虗空講得經雨花狼籍曉風清賺人深入西山後多少闍黎又錯聽間極雲鎮州金牛和尚嗣馬祖每日自作飯供養衆僧至齊時舁飯桶到僧堂前作舞呵呵大笑曰菩薩子喫飯來長慶因僧問古人撫掌喚僧喫飯意旨如何慶云大似因齊慶讚僧問大光未審慶讚箇甚麼光作舞僧禮拜光云這野狐精東禪齊云古人自出手作飯舞了喚人來喫意作麼生還會麼祇如長慶與大光是明古人意別為他分㭊今問上座每日持鉢掌盂時迎來送去時為當與古人一般別有道理若道別且作麼生得別來若一般恰到他舞又被喚作野狐精有會處麼若未會行腳眼在甚麼處頌曰白雲影裏笑呵呵兩手扶來付與他若是金毛師子子三千里外見譊訛雪竇顯拳中十指展縮自由菩薩喫飯莫笑金牛有意氣時添意氣不風流處也風流地藏恩金牛作舞也奇哉撫掌相招喫飯來若謂因齊成慶讚都盧笑殺老黃梅佛國白菩薩子喫飯來一喚令人眼豁開却憶上方曾打鼓親持鐵鉢詣天台長靈卓長連牀上狐屎尿三聖堂前狗吠春跳出金牛窠窟子月明照見夜行人佛眼遠續收襴衫席帽積塵埃柳巷花衢去復來拈得舊時氈拍板逢人遍愛舞三臺佛心才絲來線去分明過與若不相諳如何驗取因齊慶讚和泥土蹈襲只言呈作舞野狐精七星利劒血長鯨圓悟勤堂前事事已辦只缺開口喫飯一飽能忘百飢說甚因齊慶讚識得當面主人翁眉毛決定遮雙眼佛鑑勤鐘鼓聲聲已喚齊堂前作舞老公家雖然一鉢充飢困不覺牙生滿口沙懶菴樞鴆鳥落水魚鱉死毒龍行處草木枯坐中若有江南客休向人前唱鷓鴣簡堂機作舞金牛錯用心喚人喫飯笑欣折黃金自有黃金價何必和沙賣與人天目禮增收嵩山和尚嗣馬祖因與龐居士喫茶士舉槖子曰人人盡有分為甚麼道不得師曰祇為人人盡有所以道不得曰阿兄為甚麼却道得師曰不可無言也曰灼然灼然師便喫茶士曰阿兄喫茶為甚麼不揖客師曰誰曰龐公師曰何須更揖後丹霞聞乃曰若不是嵩山幾被箇老翁惑亂一上士聞之乃令人傳語霞曰何不會取未舉槖子時頌曰未提槖子已前衲子難為下觜識得這箇靈苗不向黃泉作鬼不作鬼何准擬一拳拳倒黃鶴樓一踢踢翻大海水南堂興七碗清風生兩腋一回舉著便惺惺相逢不用輕相揖須要當頭道姓名正覺顯增收嵩山與龐公見衆僧擇菜次師曰黃葉即去青葉即留士曰不落青黃又作麼生師曰道取好曰互為賓主也大難師曰却來此間強作主宰曰誰不與麼師曰是曰不落青黃就中難道師笑曰也解與麼道士珍重大衆師曰大衆放你落機處佛鑑云龐公當時若下得一轉語方得話圓且道下得什麼語當時但道某甲亦放過長老蹉過處且道甚麼處是蹉過處諸人撿點得出麼若撿點不出山僧更與你注破乃頌曰蹉過處甚分明無耳僧人子細聽但得白雲消散盡夕陽斜照數峯青不落青黃道取好互為賓主也大難珍重衆僧便下去後回相見作何顏大圓智膠投漆水和乳一卷一舒全賓全主誰言不落青黃就中要人道取誰道取分付鑊湯熟蒸爛煮佛性泰增收則川和尚嗣馬祖因龐居士相看次師曰還記得見石頭時道理否曰猶得阿師重舉在師曰情知久參事慢曰阿師老耄不啻龐公師曰二彼同時又爭幾許曰龐公鮮健且勝阿師師曰不是勝我祇缺汝箇幞頭士拈下幞頭曰恰與師相似師大笑而已頌曰初見石頭久參事慢阿師老耄龐公鮮健一頂幞頭機鋒互換大笑呵呵風和日暖正覺顯增收則川與龐居士摘茶次士問曰法界不容身師還見我否師曰不是老僧洎答公話曰有問有答蓋是尋常師乃摘茶不聽士曰莫怪適來容易借問師亦不顧士喝曰這無禮儀老漢待我一一舉向明眼人師乃拋却茶藍便歸方丈雪竇云則川只解把定封疆要且不能同死同生當時好與捋下幞頭誰敢喚作龐居士頌曰相逢相識謾相邀碧水溪深隔斷橋無限說辭殊不聽急扄門戶更徒勞保寧勇二老機關誰共委幞頭捋下髮髼鬆山深不記來時路倣佛猿啼碧㵎中懶菴樞二八佳人巧畫眉穿簾入戶意如癡空勞笑語相調戲白髮山翁肯采伊寶葉源增收則川一日在方丈內坐居士來見乃曰只知端居丈室不覺僧到參時師垂下一足士便出行三兩步却回師乃收足士曰可謂自由自在師曰我是主士曰阿師只知有主不知有客師喚侍者點茶士作舞而出南堂興拈云好則川亦好龐公看他兩作家恁麼相見如二龍玩寶兩無相傷所謂入林不動草入水不動波到這裏方知有自由自在分且道是什麼得恁麼靈驗良久復頌曰衲子懷中寶文星袖裏珠夫子步亦步夫子趨亦趨又頌曰則川善唱居士能舞雲既從龍風亦從虎師子嚬呻象王回顧北斗藏身月宮趂兔踏破草鞋不移寸步樂行不如苦住富客不如貧主趍前退後說來端舞袖高歌却回去正覺顯增收欣州打地和尚嗣馬祖自江西領旨常晦其名凡學者致問唯以棒打地示之時謂之打地和尚一日被僧藏却棒然後致問師但張其口僧問門人曰祇如和尚每日有人問便打地意旨如何門人即於竈內取柴一片擲在釜中頌曰請問吾師皆打地問處雖殊理不殊古人總在斯門入早是慈悲曲為渠般若柔紫府山前真正事拄杖常擎在手中南北問津無限衆唯將打地報盲聾汾陽昭棒棒打著地始信無虗棄祇見鑿頭方失却錐頭利慈受深端坐似無為逢人却打地嚇得虗空神走入波斯鼻福州寶壽樂增收江西樹和尚嗣馬祖一日因道吾從外歸師問甚麼處去來曰親近來師曰用簸這兩片皮作麼曰借師曰他有從汝借無作麼生曰祇為有所以借後曹山聞舉乃云一子親得頌曰從來父子不相離石女何勞更問伊昨夜寒巖無影木白雲深處露橫枝丹霞淳增收樹臥次道吾近前牽被覆之師曰作麼曰蓋覆師曰臥底是坐底是曰不在這兩處師曰爭奈蓋覆何曰莫亂道頌曰樹臥起道吾蓋覆一喝當頭掀翻路布圓悟勤相逢不相避箇裏聊游戲喝一喝反天覆地大圓智增收石林和尚嗣馬祖見龐居士來乃竪起拂子曰不落丹霞機試道一句子士奪却拂子却自竪起拳師曰正是丹霞機曰與我不落看師曰丹霞患啞龐公患聾曰恰是師無語士曰向道偶爾頌曰擔東過西移前作後馬首千差佛面百醜月堂昌作家相見別無道理彼既搖頭此亦擺尾頭尾相應須存終始多少杜撰禪和一向撥波求水佛鑑勤增收潭州秀溪和尚嗣馬祖因谷山問聲色純真如何是道師曰亂道作麼山却從東過西立師曰若不恁麼即禍事也山又從西過東立師乃下禪牀方行兩步被谷山捉住曰聲色絶真事作麼生師便打一掌山曰三十年後要箇人下茶也無在師曰要谷山這漢作甚麼山呵呵大笑頌曰樓前巧燕雙雙語林上嬌鶯對對飛因看古人無義語等間又得一聯詩佛鑑勤兩陳交鋒笑似嗔雙眉倒卓眼生筋溪山雲月誰為侶南北東西絶近鄰瞎堂遠增收浮杯和尚嗣馬祖一日凌行婆來禮拜師與坐喫茶婆乃問盡力道不得底句分付阿誰師曰浮杯無剩語曰未到浮杯不妨疑著師曰別有長處不妨拈出婆斂手哭曰蒼天中更添冤苦師無語曰語不知偏正理不識倒邪為人即禍生後有僧舉似南泉泉曰苦哉浮杯被這老婆摧折一上婆後聞笑曰王老師猶少機關在澄一禪客逢見行婆便問怎生是南泉猶少機關在婆乃哭曰可悲可痛一罔措婆曰會麼一合掌而立婆曰伎死禪和如麻似粟一舉似趙州州曰我若見這臭老婆問教口啞一曰未審和尚怎生問他州便打一曰為甚麼却打某甲州曰似這伎死漢不打更待幾時連打數棒婆聞却曰趙州合喫婆手裏棒後僧舉似趙州州哭曰可悲可痛婆聞此語合掌歎曰趙州眼光爍破四天下州令僧問如何是趙州眼婆乃竪起拳頭僧回舉似趙州州作偈曰當機覿面提覿面當機疾報汝凌行婆哭聲何得失婆以偈答曰哭聲師已曉已曉復誰知當時摩竭國幾喪目前機頌曰掌內摩尼曾不顧誰能護惜娘生袴浮杯不會老婆禪直至如今遭點污徑山杲三電光石火尚猶遲伎死禪和那得知轉面回頭擬尋討夕陽已過緑梢西眼光爍破四天下婆子拳頭無縫罅當機覿面事如何猛虎脊梁誰解跨動絃別曲葉落知秋擬議不來休休休休中菴空行婆能擊塗毒鼓遠近聞之皆膽怖唯有南泉與趙州同死同生殊不顧阿呵呵伎死禪和不奈何佛性泰年少行藏獨倚樓一家女子百家求只因不入浮杯網對鏡看看白盡頭笑翁堪增收潭州龍山和尚亦云隱山嗣馬祖洞山與密師伯經由見溪流菜葉洞曰深山無人因何有菜隨流莫有道人居否乃共議撥草溪行五七里間忽見師羸形異貌放下行李問訊師曰此山無路闍黎從何處來洞曰無路且置和尚從何而入師曰我不從雲水來曰和尚住此山多少時耶師曰春秋不涉曰和尚先住此山先住師曰不知曰為甚麼不知師曰我不從人天來曰和尚得何道理便住此山師曰我見兩箇泥牛鬬入海直至于今絶消息頌曰泥牛入海無消息天上人間何處覔謂言春去秋復來步步乘騎得渠力保寧勇撥草瞻風海上遊海山深處葉隨流相將行到水窮處果見厖眉老比丘這比丘冷啾啾清風為線明月為鈎一合乾坤作釣舟孤峯絶頂垂綸坐不風流處也風流南堂興眼目高低鼻孔橫淺深輕重不多爭蚊虻蠆上挨肩入鸑鷟牙根借路行便把長河攪酥酪敢將粟柄作禾莖隱山未是潛身處出沒任他烏兔更瞎堂遠
