body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第七世之餘清源下第六世之餘增收雲門有時云燈籠是你自己把鉢盂噇飯底不是你自己有僧問飯是自己時如何師曰者野狐精三家村裏漢師却曰來來不是你道飯是自己曰是師曰驢年夢見三家村裏漢頌曰終朝噇飯貴工夫不識燈籠是鉢盂多少三家村裏漢忙忙樹上捉鮎魚慈受深增收雲門示衆曰拆半裂三針筒鼻孔在甚麼處為我一一拈出來看自代曰上中下頌曰昔年曾扣睦州關負義忘恩當等間見說吳音俱變盡語言渾似廣南蠻虗堂愚增收雲門因僧問撥塵見佛時如何師曰佛亦是塵卍菴顏為廬山圓通西堂為衆入室舉此公案問慈元菴慈隨聲便喝以手撥胸曰佛亦是塵復頌曰撥塵見佛佛亦是塵問了答了直下翻身勸君更盡一杯酒西出陽關無故人增收雲門因僧問如何是雲門一路師曰親頌曰雲門一路親眼裏不容塵自從五代干戈後得見升平有幾人楊無為增收雲門示衆曰拄杖子化為龍吞却乾坤了也山河大地甚處得來頌曰拄杖子吞乾坤徒說桃花浪裏奔燒尾者不在拏雲攫霧曝腮者何必喪膽忘魂拈了也聞不聞直須灑灑落落休更紛紛紜紜七十二棒且輕恕一百五十難放君雪竇顯養就黃龍變化材驀然平地一聲雷比圖對面教人見吞却乾坤吐出來佛鑑勤衲僧拄杖子為龍却不尊橫拈吞佛祖倒握撼乾坤眼裏有睛皮有血直須一棒一條痕狸奴白牯休相笑只今親侍絶兒孫投子舒增收雲門因僧問久雨不晴時如何師曰劄頌曰久雨不晴雲門道劄陽嗚奮羽翰蛟龍縮鱗𩮻為是時節為是佛法一箭兩垛謾猜量眼裏瞳人眉搭颯佛智裕雲門這一劄吹毛光透匣若不是張華徒勞眼眨眨月坡明增收雲門問僧近離甚處曰西禪師曰西禪有何言句僧展兩手師與一掌曰某甲話在師却展兩手僧無語師又打頌曰虎頭虎尾一時收凜凜威風四百州却問不知何太險師云放過一著雪竇顯將成之山不進一簣老倒雲門坐而獲利釣鼇釣鯨手段高慣曾下海涉波濤緩放急收自得便浮家泛宅何飄飄月堂昌增收雲門因僧問一切智通無障礙時如何師曰掃地潑水相公來頌曰掃地潑水相公來人人明鏡掛高臺碧油幢下呵呵笑青眼何妨特地開慈受深掃地潑水相公來聲高隘喝繡旗開天上玉麟來瑞世堪作人間將相才水菴一一切智通無障礙掃地潑水相公來覿面當機如激電寒山撫掌笑咍咍拙菴光雲門因有講僧參經時乃曰未到雲門時恰似初生月及乎到後曲彎彎地師得知乃召問是你道否曰是師曰甚好吾問汝作麼生是初生月僧乃斫額作望月勢師曰你如此已後失却目在僧經旬日復來師又問你還會也未曰未會師曰你問我僧便問如何是初生月師曰曲彎彎地僧罔措後果然失目頌曰雲門新月曲彎彎管見初明豹一斑點鐵化為金即易勸人除却是非難慈受深恰似初生月兩口無一舌到了曲彎彎把火入牛欄問他以手便斫額猴黑誰知有猴白向後失目果然是要見長人過深水月堂昌增收雲門上堂因聞鐘聲乃曰世界與麼廣闊為甚麼向鐘聲披七條僧無語師曰七里灘頭多蛤子頌曰七條披向鐘聲上遍界難藏比丘相若以色見音聲求迦葉師兄是虗妄鼓山圭七里灘頭多蛤子太陽一出口俱開平生肝膽雖然露狡鶻何曾逐臭來無菴全鐘聲披起多羅信手拈來不在多堪笑當年明上座狼忙馳逐太奔波率菴琮試問鐘聲披七條輕輕擊著無明發買來糊餅是謾頭苦哉觀世音菩薩笑菴悟會則事同一家不會萬別千差不會事同一家會則萬別千差無門開增收雲門因僧問如何是祖師西來意師曰沒即道或曰長連牀上有粥有飯或曰山河大地頌曰有時順水流舟去轉柂看看又逆風船到岸時人出陸山重重又水重重絶象鑒黃金與瓦礫恣意亂拋擲高價無人酬一地成狼籍竹屋簡增收雲門曰直得乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時節頌曰百尺竿頭弄嶮是非海裏橫身更有全提底時節只堪惆悵不堪陳松源嶽增收雲門因僧問如何是最初一句師曰七九六十三頌曰七九六十三休云是對談當機如不薦更去問瞿曇本覺一增收雲門因僧問如何是大修行底人師曰一榼在手頌曰手中一榼絶痕瑕道聽途傳轉見賒作者至今拈不起依然獨自挈歸家大中隆增收雲門因僧問如何是沙門行師曰會不得曰為甚麼會不得師曰祇守會不得頌曰君問沙門行沙門行最高若教人會得業性卒難逃智門祚增收雲門一日問明教今日喫得幾箇糊餅曰五箇師曰露柱喫得幾箇曰請和尚茶堂裏喫茶或作問直歲頌曰等間埀借問端由不負平生盡吐酬竭力為人須是徹方知茶味解人愁投子青韶陽門下足英明直歲之才又哲英雲萃堂前凹凸處不勞心力一齊平正覺逸增收雲門問僧江西湖南還聞長觜鳥說禪麼曰不聞師拈拄杖曰禪頌曰鴉鳴鴉鵲鳴鵲天然自會不從人學跛腳阿師放過一著拈起拄杖口邊吹𠴨𠴨猶勝鷓鴣啼三月提壺沽美酒杜䳌相勉不如歸增收雲門拈起糊餅曰我只供養兩浙人不供養向北人衆無語自代曰天寒日短兩人共一碗頌曰半在河南半河北一片虗凝如墨黑冷地思量愁殺人叵耐雲門這老賊龍華本增收雲門齊次拈起匙筯曰我不供養南僧只供養北僧時有僧問為甚麼不供養南僧師曰我要鈍置伊曰為什麼只供養北僧師曰一箭兩垛有僧拈問只如前意作麼生師曰好即同榮頌曰拈來匙筯普相呈不供南僧供北僧換却眼睛曾莫顧熟謾都為不惺惺本覺一雲門齊時問僧曰人喫飯飯喫人僧無語師自代曰謝師答話頌曰老倒雲門強指迷這僧無語顯全機勸君不用他尋覔一飽自然忘百飢鐵山仁增收雲門到江州陳操尚書請齊才見便問儒書中即不問三乘十二分教自有座主作麼生是衲僧行腳事師曰曾問幾人來曰即今問上座師曰即今且置作麼生是教意曰黃卷赤軸師曰這箇是文字語言作麼生是教意曰口欲談而辭喪心欲緣而慮忘師曰口欲談而辭喪為對有言心欲緣而慮亡為對妄想作麼生是教意書無語師曰見說尚書看法華經是否曰是師曰經中道一切治生産業皆與實相不相違背且道非非想天有幾人退位書無語師曰尚書且莫草草三經五論師僧拋却特入叢林十年二十年尚不奈何尚書又爭得會書禮拜曰某甲罪過頌曰作家慣戰不齎糧奪鼓攙旗勢莫當虎驟龍驤誰辨的反思仁義勝剛強尼無著總增收雲門上堂拈起拄杖曰凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空衲僧家見拄杖便喚作拄杖行但行坐但坐不得動著頌曰二乘菩薩何言盡諸佛凡夫早晚休世事但將公道斷人心難似水長流鼓山圭掣開金殿鎖撞動玉樓鐘泣露千般草吟風一樣松徑山杲雲門是箇老闍黎衲僧巴鼻幾時知拄杖從教不得動春來未免倒抽枝懶菴樞膽逐灘灘盡心隨浪浪飛舟人報灘盡心膽一時歸孤峯源增收雲門上堂光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細檢點將來有甚麼氣息亦是病頌曰森羅萬象許崢嶸透脫無方礙眼睛掃彼門庭誰有力隱人胸次自成情船橫野渡涵秋碧棹入蘆花照雪明串錦老漁懷就市飄飄一葉浪頭行天童覺雲門示衆曰讀經千卷紙上語頌曰先天後地本寥廓撥草尋芳途路樂不得春風花不開花開又被風吹落或菴體增收雲門因僧問達磨面壁意旨如何師曰念七又僧問南泉達磨面壁意旨如何泉曰天寒無被蓋頌曰一人會上竿一人會穿井伎倆雖不同總是一般病識得者般病衲僧鼻孔都穿盡慈受深雲門念七開口則失禿却舌頭有甚氣息東山源達磨面壁雲門念七兩箇漆桶多虗少實明眼衲僧如何委悉當知劒去久矣不用刻舟尋跡無相範增收潭州谷山有緣禪師嗣大光僧問如何是祖師西來意師曰夜半烏兒頭戴雪天明啞子抱頭歸頌曰瑞靄祥烟鎖玉樓妙年王子恣優游琉璃殿上騎金馬明月堂前輥繡毬丹霞淳增收京兆白雲善藏禪師嗣大光僧問如何是深深處師曰矮子渡深溪頌曰白頭童子智尤長半夜三更渡渺茫任運往來無間斷不消船艇與浮囊丹霞淳增收吉州禾山無殷禪師嗣九峯示衆曰習學謂之聞絶學謂之鄰過此二者謂之真過有僧問如何是真過師曰禾山解打鼓曰如何是真諦曰禾山解打鼓又問即心即佛則不問如何是非心非佛師曰禾山解打鼓曰如何是向上事師曰禾山解打鼓頌曰布毛拈起費人言爭似禾山一句傳打鼓一聲喧宇宙冰寒千丈忽生蓮投子青一拽石二搬土發機須是千鈞弩象骨老師曾輥毬爭似禾山解打鼓報君知莫莽鹵甜者甜兮苦者苦雪竇顯一二三四五禾山解打鼓觀音妙智力能救世間苦正覺逸當陽打動番南鼓萬象森羅立地聞不是大家齊則劇難消白日到黃昏雪菴瑾草履為冠松作叉一般瀟灑眼頭乖清音只在風簷不終日無人不下階虗堂愚禾山解打鼓大地無寸土不是邯鄲人切忌學唐步無相範增收洪州鳳棲山同安常察禪師嗣九峯問僧眼界無光如何得見僧曰北斗東轉南斗西移師曰夫子入太廟曰與麼則同安門下道絶人荒去也師曰橫抱嬰孩擬彰皇簡頌曰新羅海南嶽天台纖塵不礙豈涉去來回頭斂念解脫門開反憶善財尋勝友百城游遍不知回雪竇宗增收同安因僧問如何是鳳棲家風師曰鳳棲無家風曰既是鳳棲為什麼却無家風師曰不迎賓不待客曰恁麼即四海參尋當為何事師曰盤飣自有傍人施頌曰世如來一口吞故山深靜月黃昏光分頂後千門曉坐看春回入燒痕自得暉增收同安因僧問如何是天人師師曰頭上角不全身上毛不出頌曰祕殿重圍曉尚寒丹墀苔潤未排班寶香鳳燭烟雲合寂寂簾埀不露顏丹霞淳增收同安因僧問新歲方來殘年已去莫有不受歲者麼師曰有曰如何是不受歲者師曰作麼生曰恁麼則不受歲也師曰城上已吹新歲角窗前猶點隔年燈頌曰舊歲新年作問端同安從此放顢頇憑仗高樓莫吹笛大家留取倚䦨干懶菴樞樓上嗚咿角已吹燈前蝴蝶夢中迷如今要識不遷義日出東方夜落西無機惠增收新羅泊巖和尚五燈會元作新羅國百巖嗣谷山藏僧問如何是禪師曰古冢不為家曰如何是道師曰徒勞車馬迹曰如何是教師曰貝葉收不盡頌曰故國清平久有年白頭猶自戀生緣牧童却解忘功業懶放牛兒不把鞭古冢不為家丹霞淳四十九年成露布五千餘軸盡言詮妙明一句威音外折角泥牛雪裏眠貝葉收不盡貝葉收不盡一句無私萬法印千聖滿口不能宣嶺梅漏泄春光信雪竇宗四古冢不為家漁翁舉棹出蘆花湛水無風江月逈長空撒盡暮天霞不勞車馬迹文王去後無消息月華影裏釣魚磯萬古清風長歷歷一鏃三關俱透脫從前汗馬休拈掇須知舊閣快龍舟當年曾把錦標奪增收新羅國大嶺禪師嗣谷山藏僧問如何是一切處清淨師曰截瓊枝寸寸是寶析栴檀片片皆香頌曰乾坤盡是黃金國萬有全彰淨妙身玉女背風無巧拙靈苗花秀不知春丹霞淳增收杭州佛日和尚嗣雲居夾山一日大普請維那請師送茶師曰某甲為佛法來不為送茶來那云和尚教上座送茶師曰和尚尊命即得乃將茶去作務處搖茶碗作聲夾山回顧師曰釅茶三五碗意在钁頭邊山曰瓶有傾茶意籃中幾箇甌師曰瓶有傾茶意籃中無一甌便傾茶行之時大衆皆舉目師曰大衆鶴望請師一言山曰路逢死蛇莫打殺無底籃子盛將歸師曰手執夜明符幾箇知天曉山曰大衆有人歸去歸去從此住普請頌曰路逢死蛇莫打殺無底籃子須揚下往往事從間話生莫將間話為間話朴翁銛檐板漢沒拘束餓死首陽山誓不食周粟虗堂愚增收洪州鳳棲山同安丕禪師嗣雲居僧問如何是和尚家風師曰金雞抱子歸霄漢玉兔懷兒向紫微曰忽遇客來將何祇待師曰金果朝來𤠔去摘玉花晚後鳳銜歸頌曰日午烟凝山突兀夜央天淡月嬋娟混然寂照寒宵永明暗圓融未兆前丹霞淳尺素如殘雪結成雙鯉魚要知心裏事看取腹中書方菴顯白玉階前金鳳舞黃金殿上玉雞鳴正中來與兼中到昨夜雪深月正明雪巖欽增收同安丕因僧問依經解義三世佛冤離經一字即同魔說此理如何師曰孤峯逈秀不挂烟蘿片月行空白雲自異頌曰雲自高飛水自流海天空闊泳孤舟夜深不向蘆灣宿逈出中間與兩頭丹霞淳增收歙州朱溪謙禪師嗣雲居韶國師到參次聞犬咬靈鼠聲韶便問是甚麼聲師曰犬咬靈鼠聲曰既是靈鼠為甚麼却被犬咬師曰咬殺也曰好箇犬師便打曰莫打某甲話頭師休去頌曰針頭削鐵佛面刮金無處若有出手便驚月堂昌鼠既不靈官馬相踏借使乘風廝挨廝拶干戈中立太平基凜凜嘉聲振蘭若佛燈珣增收朱溪問僧甚處來曰廣南來師曰彼中還有奇特尊宿麼曰奇特尊宿並無人說著只有一人太無慚愧師曰誰僧便指師師曰果然無慚愧曰若不是朱溪時人罔措師以手掩鼻僧近前師便打曰恰是師曰老僧住持事繁僧拂袖便出師呵呵大笑曰盤陀石上藕頌曰亂走到家來到家便亂走捉得玉麒麟咬斷別人手月堂昌問著奇特尊宿指出無慚愧漢力戰當場彩旗撩亂頭尾兩全始終一貫蟠桃一熟三千年藕生石上誰親見佛燈珣撥草瞻風客機鋒劈箭來盤陀石上藕一夜鐵花開方菴顯奇特老尊宿大無慚愧人盤陀石上藕喜見一番新石溪月增收雲居山第二世道簡禪師嗣雲居僧問孤峯獨宿時如何師曰間著七間僧堂不宿阿誰教你孤峯獨宿頌曰法爾非修本十成平常酬答最分明端然指出長安道無奈遊人不肯行丹霞淳豁開萬仞崖劈面通消息一條白練飛界破青山色率菴琮雲居因僧問路逢猛虎時如何師曰千人萬人不逢如何却是你逢頌曰不搽紅粉色不挂緑羅衣一般間態度淡墨畫蛾眉率菴琮增收雲居簡因僧問如何是朱頂王菩薩師曰問這赤頭漢作麼高菴悟云這箇便是超宗越格底事直是無你會處須是悟了更能履踐始得諸人還明得麼乃頌曰朱頂王菩薩元是赤頭漢驚怪李三黑一生只賣炭增收廬山歸宗懷禪師嗣雲居因僧問截水停輪時如何師曰磨不轉頌曰千尋竿上反筋斗大海波心擲釣鈎大體還他肌骨好不塗紅粉也風流南華昺大用縱橫掣電機爍迦羅眼尚膠黐迷途夢裏爭唇吻却憶隨他去一回夢菴信增收新羅雲住和尚嗣雲居僧問如何是諸佛師師曰文殊聳耳頌曰無相光中未兆身清虗渺邈豈為鄰一輪明月當軒照玉殿蕭蕭不見人丹霞淳增收撫州荷玉山光慧禪師嗣曹山僧問如何是西來的的意師曰不禮拜更待何時頌曰虗堂寂寂夜深寒擕得瑤琴月下彈不是知音徒側耳悲風流水豈相干丹霞淳增收衡州常寧縣育王山弘通禪師嗣曹山僧問如何是和尚家風師曰渾身不直五分錢曰太恁貧寒生師曰古代如是曰如何施設師曰隨家豐儉頌曰祖代家風沒一文清貧中更是清貧著衣喫飯隨豐儉物物頭頭用最親丹霞淳增收撫州金峯從志禪師嗣曹山拈枕子示僧曰一切人喚作枕子金峯道不是僧曰未審和尚喚作甚麼師拈起枕子曰恁麼則依而行之師曰你喚作甚麼曰枕子師曰落在金峯窠裏頌曰天作孽猶可違自作孽不可逭皖山凝金峯窠裏絶譊訛枕子拈來會也麼回鴈一聲春夢斷始知身世悟南柯方菴顯渾崙拈起好風規石火明明已較遲不落金峯窠窟裏會須赤手討便宜石溪月增收金峯因僧問是身無知如土木瓦石此意如何師下禪床扭僧耳朵僧負痛作聲師曰今日始捉著箇無知漢僧作禮出去師召闍黎僧回首師曰若到堂中不可舉著曰何故師曰大有人笑金峯老婆心頌曰扁舟劃斷曉江雲一曲高歌遠送君驚起灘頭野鴨子海天飛去不成羣西巖惠是身土木無知漢忍痛聲中一皺眉好是南山射石虎縱饒沒羽亦徒為石溪月增收金峯於僧堂喫餅次自拈一枚餅從上板頭轉一匝大衆見一時合掌師曰縱饒你十分起手也只得一半至晚有僧請益云今日行餅見僧合掌和尚道縱饒十分起手也只得一半請和尚全道師作拈餅勢復云會麼曰不會師曰金峯也只得一半頌曰金峯糊餅只許一半若要完全後五日看方菴顯增收金峯見駢道者來擎起經作攬衣勢以目視之駢提坐具以目視師師曰一切人道你會禪曰和尚作麼生師曰草賊大敗頌曰龍起滄海虎出林端直下來也急著眼看石溪月增收金峯因僧問四海晏清時如何師曰猶是階下漢頌曰四海烟塵已晏然當軒皓月照人寒大功不賜將軍賞寶馬金鏘頓懶看丹霞淳增收撫州曹山慧霞禪師嗣曹山僧問佛未出時如何師曰曹山不如曰出世後如何師曰不如曹山頌曰日隱青山瑞氣高梧藏丹鳳無寥無端石馬潭中過驚起泥龍翻海潮投子青古木靈巢鶴夢迷崑崙白象倒騎歸魚鱗水漲舟橫岸羊角風生花落溪湛堂深曹山不如花根本艷不如曹山虎體元班江南地暖塞北春寒一把柳絲收不得和烟搭在玉䦨干石菴玿曹山不如是馬非驢不如曹山虎不食班龍吟霧起虎嘯風寒達觀之士兮一見便見中下之機兮千山萬山瘥病不假驢䭾藥延齡何用九還丹辛菴儔增收曹山霞因僧侍立師曰道者可煞熱曰是師曰祇如熱向甚處回避曰向鑊湯爐炭裏回避師曰祇如鑊湯爐炭又作麼生回避曰衆苦不能到頌曰崑崙片玉火中潤碧落孤烟水底圜一念翛然無異色任從滄海變桑田丹霞淳衆苦不能到特地好乾坤風光都買盡不費一文錢枯禪鏡賀家湖上天華寺一一軒窗面水開不是閉門防俗客愛間能有幾人來天目禮瞎却頂門三隻眼鑊湯爐炭裏優游若言衆苦不能到端的何曾有地頭少室睦增收瑞州黃檗山慧禪師嗣踈山問踈山剎那便去時如何山曰畐塞虗空汝作麼生去師曰畐塞虗空不如不去山便休去頌曰畐塞虗空不如不去前後際斷今亦無住倒騎佛殿出三門却把三門掛露柱懶菴需增收隨州護國守澄禪師嗣踈山因演化大師在湖南報慈值慈升堂次化出問如何是真如佛性慈云誰無化不契遂請益師師曰汝但問來化理前問師曰誰有化於言下契悟乃云首座或在衆或住持某甲誓終身相助後化亦繼師住護國即護國遠頌曰誰無誰有句中玄擊碎重關道宛然若是子期聽品弄肯將松韻作秋蟬大洪遂朝三暮四一何少暮四朝三何太多多少未能知數量有無從此見譊訛不譊訛唵蘇嚧悉哩薩婆訶佛性泰誰無誰有全機道言下反身不唧𠺕直饒未舉已先行錯認簸箕作尉斗阿呵呵若人便解倒騎驢一生不著隨人後秀巖瑞增收護國澄因僧問如何是本來心師曰犀因玩月紋生角象被雷驚花入牙頌曰三腳靈龜荒徑走一枝瑞草亂峯埀崑崙含玉山光潤涼兔懷胎月未知丹霞淳護國澄因僧問如何是梵音相師曰河北驢鳴河南犬吠頌曰目連求佛梵音相運盡神通不見邊誰悟驢鳴并犬吠圓音落落示人天大洪遂增收護國澄因僧問如何是本來父母師曰頭不白者曰將何奉獻師曰殷勤無米飯堂前不問親頌曰出門遍界無知己入戶盈眸不見親虗室夜寒何所有碧天明月頗為鄰丹霞淳增收護國澄因僧問鶴立枯松時如何師曰地下底一場懡㦬問會昌沙汰時護法善神向甚麼處去師曰三門前兩箇一場懡㦬問滴水滴凍時如何師曰日出後一場懡㦬頌曰鶴立孤松類莫齊豈同鵝鴨狎羣雞遼陽化去無踪跡靈木迢然鳳不棲大洪遂占寺門前護法神會昌沙汰鼻頭辛時來天地皆同力究竟還他有道君冰生滴水事清高日出東方便不牢溪㵎豈能留得住終歸大海作波濤壯志稜稜𩯭未秋男兒不患不封侯反思清白傳家客洗耳溪頭不飲牛天童覺增收潭州報慈藏嶼禪師嗣龍牙僧問情生智隔想變體殊祇如情未生時如何師曰隔曰情未生時隔箇甚麼師曰這箇梢郎子未遇人在頌曰古人一隔衲僧命脉欲識一貫兩箇五百天衣懷情未生時隔金毛多失色狐狸門外走縱橫笑殺藂林老禪客楊無為無情由隔若為通絲𩬊之間路萬重可惜兩頭空走者不能直下見其宗白雲端報慈一隔佛祖命脉放去收來聖凡罔測開福寧續收隔青天無雲轟霹𮦷藂林衲子如稻麻不知幾箇仙陀客大中隆江南船海南舶把柂張帆知節拍隨波逐浪幾時休撒手到家頭已白大洪遂隔穿耳胡僧眼睛黑東院西邊是趙州觀音院裏安彌勒石門玿增收襄州萬銅山廣德延禪師嗣青林䖍僧問如何是透法身句師曰無力登山水茅戶絶知音頌曰體妙探玄盡涉程爭如野老異中行功忘日用平懷穩免事君王寵辱驚丹霞淳增收襄州石門獻蘊禪師嗣青林䖍僧問如何是和尚家風師曰物外獨騎千里象萬年松下擊金鐘頌曰夜明簾外月朧騎象翻身擊寶鐘洪韻上騰三界外聾夫何事睡猶濃丹霞淳增收袁州木平山善道禪師嗣蟠龍文初參洛浦問一漚未發已前如何辨其水脉浦曰移舟諳水脉舉棹別波瀾師不契乃參蟠龍亦如前問龍曰移舟不別水舉棹即迷源師從此悟入頌曰金烏玉兔兩交馳照破威音未兆時若謂青霄別有路木人依舊皺雙眉丹霞淳移舟曾不別澄源舉棹波生豈更堪要會一漚初未發木人半夜好同參本覺一滔滔一脉混常流才觸波瀾卒未休岸闊風清澄皓月漁翁撥棹宿汀洲瞞菴成增收木平因僧問如何是西來意師曰石羊頭子向東看頌曰木平道高最難過人問西來意若何石羊頭子向東望月明才上遍山坡直言不用多疑慮海澄浪息見森羅汾陽昭老胡萬里向支那直至而今不奈何堪笑牧童誰問路一聲長笛過前坡佛印元不勞斤斧弄巧成拙壞衲通身頭髭若雪著雙破草鞋踏破澄潭月祖意石羊頭向東一漚前事如何說法雲秀木平本自無斤斧好肉那堪著灸瘢直指西來親切意石羊頭子向東看照覺總續收石羊頭子向東看大地茫茫被眼謾月映寒潭清徹底雲收華嶽露巑岏野菴璇石羊頭子向東看祖意明明會者難不惜當陽重指注今朝九日菊花斑此山應
