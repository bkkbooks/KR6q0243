body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第五世之二南嶽下前第四世之二睦州陳尊宿諱道明嗣黃檗學者扣激隨問遽答詞語峻嶮諸方歸慕謂之陳尊宿初居睦州龍興寺晦迹藏用後歸開元今改兜率居房織蒲鞋以養母故有陳蒲鞋之號因見講僧乃召曰座主主應諾師曰擔板漢頌曰垂慈只要總通靈不是宗師妄自生擔板直教須放下免伊虗度百千生汾陽昭睦州喚隨卦斷回不回擔板漢楊無為二不重師承重至公諸方誰敢觸機鋒指教臨濟參黃檗接得雲門嗣雪峯織屨只知供母飯閉門那更話禪宗叢林到處蒙霑潤莫測風雷起老龍腦後與一錐頭頭墮坑坎直饒喚不回也是虗擔板透過睦州關乾坤一隻眼長靈卓辛辛辣辣啀啀喍喍識濟北為大樹拶雲門墮險崖機峻莫偕言如枯柴夫是之謂陳蒲鞋圓悟勤雷火光中休草草劒輪鋒上莫忉忉等閒放却全身入終不當頭犯一毫鼓山圭睦州擔板那容眨眼闊狹短長不須增減徑山杲睦州擔板幾人扶喪者多應在半途言下要教通徹去逈然心眼頓醒蘇楚安方續收睦州擔板漢作事休分㭊衲僧鼻孔撩天言下要知端的南堂興朴實頭禪無伎倆一句分明如撲相客來只是呌擔板不知的當誰擔板懶菴樞睦州擔板漢從來見一邊淺深三尺水上下兩重天雪菴瑾山之峩峩水之湯湯冷眼著無處慚惶別峯印紅爐起浪拍天飛疾焰過風孰敢窺任是三頭并六臂到此休誇第一機木菴永睦州見僧乃曰見成公案放汝三十棒曰某甲如是師曰三門頭金剛為甚麼舉拳曰金剛尚乃如是師便打曰這掠虗漢頌曰見成公案未除瑕放過方能脫鎖枷四海澄清人富庶更來石上種油麻覺海元見成公案便相當稱則稱兮斗則量非較當年三十棒至今平步也翱翔佛燈珣呼蛇易遣蛇難袖裡金槌不易看長安夜夜家家月誰知愁樂有多般海印信續收見成公案沒商量不動絲毫便廝當三十烏藤聊放過可憐雪上更加霜無際派見成底事沒商量剔起眉毛未廝當日暮碧天鴻鴈斷海門斜去兩三行木菴永公案已見成放汝棒三十木馬走似烟泥牛趂不及復菴封睦州因秀才相訪稱會二十四家書師以拄杖空中點一點曰會麼秀才罔措師曰又道會二十四家書永字八法也不識頌曰一點曾無異微塵劫不增百千諸佛眼同共此靈明明招謙禪師拄杖秀才筆伎倆皆從手中出八法論書如未明面前一點黑如漆佛鑑勤續收一著機先用得親可憐窮子眼無筋須知八法論書處前箭猶輕後箭深水庵一增收睦州上堂首座𠰚答云在又曰寺主𠰚答云在又曰維那𠰚答云在三段不同今當第一向下文長付在來日頌曰八字打開十分漏泄孤危不立道方高伎倆更無隨意說別別南斗七兮北斗八護國欽增收睦州示衆曰大事未明如喪考妣大事已明亦如喪考妣頌曰春去秋來古與今相逢休論幾時深飢餐渴飲無他事儘聽滿頭霜雪侵保寧勇楊子江頭波浪深行人到此盡沉吟他時若到無波處還似有波時用心千峯琬增收青峯楚因僧問大事已成為甚麼也如喪考妣師曰不得春風花不開及至花開又吹落頌曰家山歸到莫因循竭力寅昏奉二親機盡功忘恩義斷便成不孝闡提人丹霞淳增收睦州常示衆曰忽然忽然大覺璉拈云不然不然頌曰忽然不然如鋏如鉗神仙祕訣父子不傳別峯印忽然忽然頭上是天不然不然腳下是地直下來也無處回避孤峯深增收睦州見僧來參便喝曰上座如何偷常住果子曰某甲方來因甚道偷常住果子師曰贓物現在聻頌曰傾盡寶山寶全身入荒草若是鳳凰兒不向那邊討松源嶽增收睦州示衆曰汝等諸人還得箇入頭處也未若未得箇入頭處須覓箇入頭處若得箇入頭處已後不得孤負老僧時有僧出禮拜曰某甲終不敢孤負和尚師曰早是孤負我了也又曰明明向你道尚自不會何況蓋覆將來頌曰學道先須入頭處既得入頭莫孤負明明向道尚猶迷何況言中曾蓋覆本覺一增收睦州問僧近離甚處僧便喝師曰老僧被你一喝僧又喝師曰三喝四喝後作麼生僧無語師便打曰這掠虗漢頌曰兩喝與三喝作者知機變若謂騎虎頭二俱成瞎漢誰瞎漢拈來天下與人看雪竇顯睦州擔板漢解使不解算人前嬴得五百家中著了一貫普庵玉增收睦州因僧問高揖釋迦不拜彌勒時如何師曰昨日有人問趂出了也曰和尚恐某甲不實那師曰拄杖不在苕帚柄聊與三十南堂興云衲僧家高揖釋迦不拜彌勒也不為分外却須是本分鉗鎚方知其真僞何故乃頌曰出羣須是英靈漢敵勝還他師子兒選佛若無如是眼假饒千載亦奚為凜凜將軍令已行八荒四海要澄清提來劒氣干牛斗洗蕩氛埃見太平天童覺殺人不眨眼救人須出手論實不論虗合升始為斗高揖釋迦不拜彌勒喫棒趂出猶費力滴水氷生知未知拋磚引玉有人識月堂昌增收睦州因僧問一氣還轉得一大藏教也無師曰有甚饆饠䭔子快下將來頌曰鈍钁頭邊得意時閒花著子不愁伊幾人不善根株者只見枝頭更長枝長靈卓睦州只愛錐頭利這僧不見鑿頭方直饒轉得百千藏這般供養也尋常鼓山圭一氣轉一大藏教頓漸偏圓權與實無邊妙義炳然彰元來一字也不識徑山杲等閒一問垂千古從此叢林共播揚堪笑睦州無相度饆饠䭔子要先嘗懶菴樞問若傾湫答如倒嶽出草羚羊時挂角明眼衲僧如何卜度尺短寸長一任貶剝投子舒快人一言快馬一鞭停囚長智十萬八千木菴永良玉不雕美言不文烟村三月裏別是一家春息庵觀增收睦州因僧問以一重去一重即不問不以一重去一重時如何師曰昨朝栽茄子今日種冬瓜頌曰重重去盡自平常春暖風和日漸長戶外鳥啼聲細碎巖花狼藉滿山房自得暉登壇道士羽衣輕呪力雖窮法轉新拇指破開天地暗蛇頭攧落鬼神驚瞎堂遠披簑側笠千峯上引水澆蔬五老前中有瓜田難納履睦州倒退在傍邊南巖勝昨日栽茄子今日種冬瓜一聲河滿子和月落誰家笑菴悟增收睦州問一官人易中道百姓日用而不知且道不知箇什麼官人云不知道師曰酌然不知頌曰酌然不知無孔鐵槌當面一擲佛祖難窺肯堂充增收睦州因僧問大衆臨筵合談何事師曰後園生菜熟水冷淘頌曰脫略情塵老睦州虎頭虎尾一時收芳草渡頭韓幹馬緑楊堤畔戴嵩牛正堂辨增收睦州因僧問如何是祖師西來意師云一隊衲僧來一隊衲僧去頌曰一隊衲僧來一隊衲僧去打破睦州關大地無寸土大川濟一隊衲僧來一隊衲僧去搆得搆不得鐵蛇橫古路雪磯綱增收睦州曰裂開也在我揑聚也在我時有僧問如何是裂開師曰三九二十七菩提涅槃真如解脫即心即佛我且與麼道你又作麼生曰某甲不與麼道師曰盞子撲落地碟子成七片曰如何是揑聚師乃斂手而坐頌曰溪邊嫩柳條條緑陌上桃花樹樹紅勿謂東君無管帶更加暖日與和風佛性泰增收睦州因僧問靈山還有蛇不師曰這蚯蚓雲門代云白骨連山頌曰水中鹽味色裏膠清若人辨得天下橫行草堂清增收福州烏石靈觀禪師嗣黃檗時稱老觀曹山行腳時問如何是毗盧師法身主師曰我若向你道即別有也曹山舉似洞山山曰好箇話頭祇缺進語何不更去問為甚麼不道曹山乃却來進前語師曰若言我不道即啞却我口若言我道即謇却我舌曹山歸舉似洞山山深肯之頌曰烏石老古錐門風能峭絶有問毗盧師開口端的別齒有嚙鏃機天無第二月軟語若金剛漚和是生滅南堂興毗盧師法身主通身是口實難舉縮却舌頭啞口時獨許洞山暗相許不相許猫兒偏解捉老鼠喝堂一增收烏石因雪峯一日伺便扣門師開門峯驀胸搊住曰是凡是聖師唾曰這野狐精便推出閉却門峯曰也祇要識老兄頌曰一不作二不休賓主互換有來由焦磚打著連底凍赤眼撞著火柴頭松源嶽峻硬門庭古莫儔曾郎欲入竟無由為渠八字打開著嬌緑覆田秧滿疇竹屋簡增收烏石因雪峯扣門師問誰峯云鳳凰兒師曰作麼生峯云來啖老觀師開門搊住曰道道峯擬議師便托開掩却門峯住後示衆云我當時若入得老觀門你這一隊噇酒糟漢向甚處摸索雪竇云這孤恩負德漢有甚麼交涉當時入不得豈是教你入今既摸索不著纍他雪峯俱在老觀門下頌曰養成羽翼鳳凰兒老觀門下偶差池冷地忽然思舊債却來別處討便宜尼無著總增收烏石引次有僧來參師引示之僧便去至晚問首座今日新到在什麼處曰當時便去了也師曰是則是只得一橛此是聯燈録所出與五燈會元略異蓋初有傳燈合依傳燈云師一日引水次有僧來參師以引水橫袖示之其僧便去師至暮問小師適來僧在何處小師曰發去也師云只得一橛玄覺云什麼處見少一橛頌曰草舍柴門僻更幽何期過客也經由蒿湯備禮不知愧猶對傍人賣口頭斷橋倫增收唐相國裴休見黃檗因見大安寺壁畫高僧真儀公曰真儀可觀高僧何在主事無對公曰此間有禪人否曰近有一僧投寺執役頗似禪者尋請至舉前話黃檗朗聲曰裴休公應諾檗曰在甚麼處公當下知旨如獲髻珠頌曰酆城寶劒沉埋久一道寒光射斗牛不是張華辨端的只應千古枉淹留慈受深翰墨場中喚得回桂林昨夜覺花開暗香漏泄通消息散作人間調鼎才自得暉浮雲宿霧兩朧行遍千峯與萬峯驀地喚回霜夜夢舉頭親見月當空萬菴柔增收裴相國問僧看什麼經僧云無言童子經公曰有幾卷曰兩卷公曰既是無言為什麼却有兩卷僧無言新羅龜山代云若論無言非唯兩卷頌曰曾落石霜機外笏又扶粗行到唐天只將四海垂綸手蝦蟹魚龍一串穿虗堂愚增收裴相國入大安寺問諸大德曰羅睺羅以何為第一曰以密行為第一公不肯遂問此間有何禪者時龍牙在後園種菜遂請來問羅睺羅以何為第一牙曰不知公便拜曰破布褁真珠頌曰密行第一精鑑還希具擇法眼真箇不知黃龍新以何為第一不知最親切破布褁真珠傾城換不得月坡明洪州新興嚴陽尊者諱善信嗣趙州初參趙州問一物不將來時如何曰放下著師曰既是一物不將來放下箇甚麼曰放不下擔取去師於言下大悟住山常有一蛇一虎隨從手中與食頌曰一物不將來肩頭擔不起言下忽知非心中無限喜惡毒既忘懷蛇虎為知己清風幾百年至今猶未已黃龍南移高就下縱威權解脫門開信可憐不得空王真妙訣動隨聲色被勾牽真淨文不妨行細輸先手自覺心粗愧撞頭局破腰間斧柯爛洗清凡骨共仙游天童覺一物不將來教渠放下著廓爾悟無生活計俱拋却旻古佛盡力放不下著力擔不起將謂一物無元是自家底見得自家底心中大歡喜自茲家業興一舉九萬里龍門遠續收一物不將來兩手提不起直下要承當渾是自家底佛燈珣劈面呈機不等閒纖毫盡處重如山斷腸曲調如親聽流水悲風不用彈塗毒策赤心片片少人知滿口含霜特地疑奉報五湖學道者不須孤負一雙眉月庵果趙州放下著碓觜忽生花雖然無一事驗盡當行家雪堂行驀就膏肓打一針當時無處著渾身呵呵笑入嚴陽去蛇虎為鄰不可尋密菴傑嚴陽擕狗頭臭穢於人怕因何老趙州與酬羊肉價野牛平增收杭州多福和尚嗣趙州因僧問如何是多福一叢竹師曰一莖兩莖斜曰學人不會師曰三莖四莖曲頌曰一莖兩莖斜其意毒如蛇三莖四莖曲無疑入地獄言下若知非心空及第歸堪笑蔣山老無端入荒草應菴華一莖兩莖斜疏影動龍蛇心疑生暗鬼眼病見空華三莖四莖曲還我一叢竹時引清風來落葉填山谷恁麼會得多福一叢竹若也不會三莖四莖曲無禪才增收興化軍梯山建福石梯禪師嗣茱萸一日見侍者托鉢上堂乃喚侍者者應諾師曰甚處去曰上堂齊去師曰我豈不知汝上堂齊去曰除此外別道箇甚麼即得師曰我只問你本分事曰和尚若問本分事某甲實是上堂齊去師曰汝不謬為吾侍者頌曰父子相將草裡行星馳電捲迅雷轟賺他無限英靈漢錯認鞍橇過一生辛菴壽益州大隨法真禪師嗣長慶安因僧問劫火洞然大千俱壞未審這箇壞不壞師曰壞曰恁麼則隨他去也師曰隨他去僧不肯後到投子舉前話子裝香遙禮曰西川古佛出世謂其僧曰汝速回去懺悔僧回大隨師已遷化僧再至投子子亦遷化頌曰切忌隨他不會他大隨此語播天涯真淨性中才一念早是千差與萬差北塔祚懶菴的子大隨師人問隨他師亦隨返顧不能休駐意更生異見却狐疑汾陽為汝開天路萬別千差一道歸汾陽昭劫火光中立問端衲僧猶滯兩重關可憐一句隨他去萬里區區獨往還雪竇顯隨他去隨他去千手大悲攔不住劫火光中相往來銅睛鐵眼無尋處正覺逸壞與不壞俱非內外不隔絲毫尋常面對道吾真隨他去亦太無端袖裡金槌豈易看問罷不知何處去白楊風送壠頭寒佛慧泉劫火洞然大千何在壞與不壞漆桶不快肯更隨他去被謾又太煞若是箇中人終不到錯會法雲秀步步相隨是大隨左邊吹了右邊吹思量未免空𥱰氣何不留將暖肚皮保寧勇壞與不壞舌無骨驀面看時眼突出大隨猶在劫火中天下熬熬謾啾唧白雲端劫火洞然大千壞面前鼻孔鎮長在只為隨他一句言腰間失却箇皮袋地藏恩壞與不壞兩相猜劒閣龍舒謾往來何人更有樊公腳一踏鴻門雙扇開慈受深劫火洞然俱敗壞青天白日愈光輝王孫醉寢迷春夢不覺鶯啼柳絮飛佛智裕臭烟蓬㶿中迸出鐵蒺藜當陽如未委喪却目前機佛性泰壞與不壞言端語端舌頭咬破自覺心酸大隨投子終無兩般萬里區區獨自往還楚安方續收陷虎之機總不知便隨流去落東西大隨自是持綱手放去收來要驗伊圓照本六合傾翻劈面來暫披麻縷混塵埃因風吹火渾間事引得游人不肯回壞不壞隨不隨徒將聞見強針錐太湖三萬六千頃月在波心說向誰通照逢了然無別法誰道印南能一句隨他去千山走衲僧蛩寒鳴砌葉鬼夜禮龕燈吟罷孤窗外徘徊恨不勝唐景遵壞與不壞兩彩一賽本無是非說甚憎愛雲過長空了無罣礙君不見衲僧鉢袋子接得將來日裡晒佛鑑勤壞與隨他去如何不肯休未明端的意特地覓回頭龍門遠劫火洞然大千俱壞這箇魔魅百生冤債禪流若問壞不壞昨夜石人鬪禮拜南堂興銜鐵負鞍無固必牽犁拽杷不辭勞貪生逐日區區去誰管年高白髮饒簡堂機劫火光中共唱酬隨波逐浪謾悠悠剖盡衷腸人不會草鞋拈取蓋龜休石庵玿大隨庵側有一龜僧問一切衆生皮褁骨這箇衆生為甚骨褁皮師拈草履覆龜背上僧無語頌曰如龜六藏已彰名休向人前弄眼睛一隻草鞋都蓋却直至如今猶未惺北塔祚問處爭如答處親眼中難著透金塵長安一路無多地過得潼關有幾人佛慧泉分明皮上骨團團卦畫重重更可觀拈起草鞋都蓋了大隨却被這僧謾白雲端露足藏頭可煞奇千年誰謂是靈龜雨傾不解隨流去浮木相逢是幾時保寧勇皮骨曾將問大隨當頭一著更狐疑可憐無限尋聲迹不薦羚羊挂角時照覺總大隨庵外一龜兒僧問如何骨裹皮草鞋蓋了無人會白雲流水共依依地藏恩皮裹骨兮骨裹皮吉凶徒自亂針錐草鞋覆了獨歸去千古何人識大隨普融平千古清聲老大隨機鋒壁立杳難窺未能直下超凡聖只道將鞋蓋却龜禾山方懶庵的子大隨師一著當頭更莫疑大地山河都蓋了從他衲子下針錐旻古佛骨裹皮兮皮裹骨大隨老子無窠窟上士聞之笑未休中流特地生疑惑龍門遠皮裹骨兮骨裹皮分明道了復何疑拈起草鞋如未委不如別處且烏龜佛性泰法不孤起仗境方生烏龜不解上壁草鞋隨人腳行佛燈珣續收學道須教正眼開莫將狂解意中猜脫鞋龜上人難會遂使擕囊特地來天童覺木禪庵畔定光老兒非銅非鐵無相無為有擎天之力有地之威有射鵰之手有囓鏃之機口如大海眼如眉人間天上許誰知南堂興骨裹皮兮皮裹骨大隨放出遼天鶻東西南北謾擡眸不知已過新羅國無凖範休將皮骨強分張得六藏時且六藏隻履盡情遮蓋了這僧無事可思量此山應千載靈龜庵下出團團骨上卦重重草鞋蓋却無頭尾且聽旁人定吉凶橫川珙增收大隨問僧甚處去曰蛾眉禮普賢去師舉拂子曰文殊普賢總在這裡僧作圓相拋向後乃禮拜師喚侍者取一貼茶與這僧頌曰楖𣗖杖頭光閃爍錫羅捲裹面鄒餿肩擔背負出門去好是無人敢駐留保寧勇大隨山下路縱橫老竹蒼藤處處生四海五湖為客慣三更無月也須行慈受深識法者懼欺敵者亡水中辨乳須是鵝王天童覺一輪明月照瀟湘更不逢人問故鄉自是天涯慣為客任他猿呌斷人腸上方益把火入牛欄反身外面看梨花千點白春雨幾聲寒月堂昌增收大隨因僧問如何是和尚家風師曰赤土畫簸箕曰未審此理如何師曰簸箕有唇米跳不出頌曰赤土畫簸箕團團無縫罅佛眼覷不見海神不知價簸土揚塵無處尋山高海闊白雲深南堂興簸箕有唇米跳不出天下衲僧赤胳𩪸更須撥轉上頭關十方世界黑似漆應菴華增收大隨因僧問如何是佛法的的大意師曰山前麥熟也未頌曰山前麥熟報君知佛祖端由辨者稀莫學朱涇老禪伯滿船空載月明歸象田鄉大匠不巧大儒不學動輒中方圓舉皆成禮樂堪笑鄉村賣卜人徒勞鑽破烏龜殼無凖範增收大隨燒畬次忽見一蛇師以杖挑向火中曰咄這箇形骸猶自不放捨你向這裡死如暗得燈時有僧問云正恁麼時還有罪也無師曰石虎呌時山谷響木人吼處鐵牛驚頌曰劫初劫末法弱魔強定光老子鐵作脊梁文經武緯把定封疆碧天雲散祖風涼佛日光輝舜日長南堂興增收韶州靈樹如敏禪師嗣長慶安因僧問如何是和尚家風師曰千年田八百主曰如何是千年田八百主師曰郎當屋舍沒人修頌曰來機深辨有舒有卷移却案山重添針線千年田八百主直下承當還莾鹵郎當屋舍沒人修片瓦根椽誰去竪君不見甜瓜徹蒂甜苦瓠連根苦月堂昌靈樹因僧問如何是祖師西來意師默然後遷化欲立行狀要選此語刻石時雲門為首座僧問先師默然處如何上雲門代云師頌曰師師師知知知三三兩兩過遼西一雙紅杏換消梨琅琊覺靈樹當初密對揚時中文采已全彰後人不見雲門老一字千般謾度量佛印元師之一字大巍巍獨向寰中定是非畢竟水須朝海去到頭雲定覓山歸白雲端靈樹大師雲門首座只知立不覺話墮智海山僧為伊點破知燈是火數如麻信火是燈能幾箇智海清師字相酬作者知韶陽千古特光輝茫茫宇宙人無數到底誰明一字師旻古佛西來祖意若為酬手把明珠已暗投却被雲門添一字致令千古閙啾啾寶峯明增收靈樹面皮多葛怛韶陽板齒上生毛拍右膝會得國清才子貴拍左膝不會家富小兒嬌此庵元師之一字見還難直下應須透祖關縱使祖關開正眼前頭更有萬重山佛照光師之一字太孤危文無作者知不領韶陽提起處且從默處認殘天目禮增收漳州浮石禪師嗣子湖上堂山僧開卜鋪能斷人貧富定人生死時有僧出云離却生死貧富不落五行請師直道師曰金木水火土頌曰達磨西來唯賣卜吉凶在汝不由人箇中只是依爻斷豈有人情疏與親本覺一金木水火土始終顛倒數五六下四三初爻傳白虎苦苦卜得此卦一生貧遠信不來病人死懶菴需金木水火土一二三四五南泉王老師不打鹽官鼓即庵覺金木水火土大蟲元是虎好笑李將軍藍田空沒羽無凖範
