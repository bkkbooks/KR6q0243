body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第七世之五清源下第六世之三雲門因僧問如何是透法身句師曰北斗裏藏身頌曰藏身北斗最分明只為人多見不精巧妙妄陳心意解却如平地作深坑昏燈日晝何曾易青竹黃花滿地生汾陽昭老倒雲門泛鐵船江南江北競頭看可憐無限垂鈎者隨例茫茫失釣竿雪竇顯雲門透法身法身何許人鴈回沙北塞鸚鵡戀西秦靈竹通南嶽峯高北嶽低行人泣淚雨遲疑火星昨夜移牛斗照見西瞿人不知投子青鑿斷龍門透碧津洪流驟雨豈停塵謫仙拏月沉江底漁舟笑殺謝家人天衣懹要透龍門特地難却成平地起波瀾凡鱗欲得風雷便且向桃花浪裏看佛印元人問透法身隨宜為指陳大地如膠漆長江波蹙顰法華舉北斗藏身句雲門道處看南辰分六角北斗七星攢春雨霏霏潤秋風颯颯寒崑崙牽白象歌謠入大安浮山遠北斗藏身為舉揚法身從此露堂堂雲門賺殺他家子直至如今謾度量玉㵎林天上有星皆拱北人間無水不朝東時人欲識藏身處拈起簸箕別處春黃龍南雲門透法身從此沒踈親盡道和風暖三春寒更新道吾真東西南北上下四維橫身宇宙拶破須彌甘露天五陵公子遊花慣未第貧儒自古多冷地看他人富貴等間不奈幞頭何白雲端北斗藏身句有由未明南北起戈矛風清月朗無雲夜莫認文星作斗牛照覺總東湧西沒北斗藏身法王法令德非有鄰真淨文北斗藏身句最玄未明向上謾勞傳黃河輥底流今古華嶽三峯頭指天三祖宗藏身北斗最分明四畔無雲廓太清猿鳥自啼山自寂水流巖下響泠泠草堂清北斗藏身坐不安開軒落日倚危䦨雲收月出空如水剎剎塵塵總一般佛心才何事文星與酒星一時分付與先生高吟大醉三千首留與人間伴月明五祖演透出毗盧頂上光夜來星轉斗中藏禪家不掐天師訣也解交乾步踏罡張無盡北斗藏身句商量幾萬般貪觀天上月誰覺骨毛寒疏山如雲門透法身分明語露親移步登山頂峯高與月鄰楚安方南北東西萬萬千乾坤上下兩無邊相逢相見呵呵笑屈指擡頭月半天普雲圓續收雲門透法身劃斷釋迦音文殊休惆悵普賢謾沉吟五祖戒北斗藏身事坦然法身無狀透何邊後人不曉前人意水底撑船捉月天法華舉北斗藏身句擬議即差訛鑽天白子不戀舊時窠慈受深飽粥飽飯一味早眠晏起何待封候典牛游昨夜東風落萬紅半隨流水半隨風何須短艇撑明月自與桃源一派通開善祖藏身北斗道彌昌三腳蝦蟆著錦襠多少病猫食死鼠日中擡首眼無光東山空天地廣無邊何云藏北斗跛腳老雲門未明三八九天目禮北斗裏藏身虗空中出沒道得一句來日頭東畔出橫川珙雲門因僧問如何是一代時教師曰對一說頌曰對一說太孤絶無孔鐵鎚重下楔閻浮樹下笑呵呵昨夜驪龍拗角折別別韶陽老人得一橛雪竇顯對一說遼天鶻萬重雲只一突韶陽老韶陽老南北東西無處討正覺逸對一說卷盡五千四十八風花雪月任流傳金剛腦後添生鐵五祖演對一說何卓絶畐塞虗空一團鐵飢來不顧飯如雷箇箇聚頭爭嚙齧龍門遠對一說五教三乘盡該攝龍宮海藏任縱橫水底泥牛吞却月佛性泰續收海藏龍宮金文玉牒逗器觀機破關擊節三百餘會振綱宗四十九年同箇舌阿剌剌對一說諦當之言如截鐵圓悟勤雲門因僧問不是目前機亦非目前事時如何師曰倒一說頌曰倒一說分一節同死同生為君決八萬四千非鳳毛三十三人入虎穴別別擾擾匇匇水裏月雪竇顯倒一說清人骨萬里無片雲拋下一團雪別別老大禪翁甘滅舌正覺逸倒一說這饒舌無端都把天機泄四海九州徒蹶蹶飛出龍宮鑽蟻穴野軒遵續收是賊識賊以楔出楔鳥迹空雲鏡像水月教兒師子迷蹤訣上樹老猫安身法活鱍鱍倒一說等間翻却狐狸穴圓悟勤雲門因僧問如何是塵塵三昧師曰鉢裏飯桶裏水頌曰鉢裏飯桶裏水多口阿師難下觜北斗南星位不殊白浪滔天平地起擬不擬止不止箇箇無裩長者子雪竇顯朝打三千未為多暮打八百未為少鉢裏飯兮桶裏水人前切忌無分曉白雲端塵塵三昧彼彼不外千峯向嶽百川赴海更無一法不如來只箇堂堂觀自在天童覺見之不取思之千里杓聽將來笊籬無耳二月三月花開時路岐芳馥春風起直下是休擬擬鉢裏飯桶裏水湛堂凖續收鉢裏飯桶裏水開口見膽求知己擬思便落二三機對面忽成千萬里韶陽師較些子斷金之義兮誰與相同匪石之心兮獨能如是天童覺塵塵三昧鉢飯桶水雲門眼中者僧身裏揑合起來無處藏𡎺著磕著埋沒你月堂昌鉢裏飯桶裏水狗子咬人不露齒堪笑韶陽老古錐倒地至今猶未起無菴全南頭買貴北頭賣賤只可聞名不可見面且菴仁雲門因僧問如何是雲門一句師曰臘月二十五五燈會元作如何是雲門一曲師曰臘月二十五曰唱者如何師曰且緩緩頌曰臘月二十五一曲超今古鎮州大蘿蔔生長在深土佛慧泉雲門一曲二十五不涉宮商角徵羽有人問我曲因由南山起雲北山雨黃龍南臘月二十五一曲無人舉韶陽老古錐屈指從頭數楊無為一曲韶陽古調清多年木石化為精廣陵傳去人何在留得杜䳌啼月明大洪遂臘月二十五騎驢不打鼓春風百草生冢上添新土真淨文臘月二十五韶陽曲調普欲會箇中意先天為心祖通照逢憶昔雲門老古錐曾將今日示當機奇哉二百年來事長作胡笳曲調吹圓通仙雲門曲調格何高轉使愁人不奈何明月清風無價數一時分付與仙陀長靈卓韶陽一曲二十五不屬五音亘今古剎剎觀音妙智力塵塵能救世間苦旻古佛續收臘月二十五雲門一曲新一回聞舉著笑殺洛陽人訥堂思臘月二十五雲門沒腸肚一曲盡情彈淳音超太古明眼衲僧休莾鹵肯堂充雲門一曲徹髓徹骨霽雪千峯寒梅破蕚啐公子風流鳴木鐸松源嶽雲門一曲從來無譜韻出五音調高千古就中妙旨許誰知幾擬黃金鑄子期無凖範雲門因僧問如何是法身師曰六不收圓悟云一不立頌曰一二三四五六碧眼胡僧數不足少林謾道付神光卷衣又說歸西竺西竺茫茫無處尋夜來却對乳峯宿雪竇顯六不收兮調最新能歌何待繞梁塵和風滿檻花千樹不換乾坤別是春白雲端一不立六不收突然那更有踪由無限青山留不住落花流水太悠悠圓悟勤續收村歌社舞那伽定疥狗泥猪清淨身透徹根塵無佛法優曇花現十洲春秀巖瑞六不收一不立清淨法身何處覓夜來一陳吹葉風掃盡浮雲月照壁掩室開雲門因僧問如何是超佛越祖之談師曰糊餅頌曰超談禪客問偏多縫罅披離見也麼糊餅𡎺來猶不住至今天下有譊訛雪竇顯天皇蔭子孫龍潭得一箇三代渾崙吞無人敢咬破始自韶陽拈出來為貽其福却貽災當時病本無人削迄至而今成禍胎正覺逸超佛越祖若何宣充齊糊餅恣情餐湖南展鉢新羅咬大食波斯索渡船慈明圓杜禪和杜禪和一箇糊餅不奈何禮拜任君頭著地海東船子過新羅雲峯悅雲門糊餅模樣小爭似法華爐竈大飽來一任帶刀眼誰問西來間達磨白雲端超佛越祖之談覿面相呈誰領不知箭過新羅動地間爭糊餅真淨文韶陽糊餅答禪人佛祖之談道最親不落言詮休擬議回頭識取自家珍雲居祐駕空欲上九層霄腳下紅絲繫轉牢賴是龍泉未出匣且施一割用鉛刀道場如堪悲堪笑老韶陽糊餅拈來撲鼻香端的若知滋味者不勝滿面負慚惶文殊道作家手段不隨流糊餅拈來答話頭任是衲僧超佛祖到頭不換飽黃龍震雲門糊餅對超談多少禪流看不穿若是孔門真弟子自然知道化三千佛燈珣續收雲門一枚糊餅天下衲僧咬嚼若非鐵作牙關往往圝吞却吞時易吐時難莫道從來一般踏著韶陽關捩子方能平地起波瀾慈受深超談糊餅應時機逐塊知非師子兒敗葉霜風都掃盡古松方見歲寒枝水菴一雲門因僧問如何是諸佛出身處師曰東山水上行頌曰東山水上行出處甚分明好看塵沙佛波濤四面生佛慧泉諸佛出身處東山水上行目前一彈指變現自分明日面月面過佛手驢腳呈皆承此恩力言外度迷情真淨文諸佛東山水上行擡頭舉步落深坑誰知獨足拖泥水不薦回途十萬程雲溪恭諸佛出身處東山水上行促裝無伴侶獨自赴前程大洪預續收諸佛出身處東山水上行面南看北斗日午打三更湛堂準東山水上行褊衫不染皂壁上畫枯松後園驢喫草三十二相八十種好赤膊抵沙蜂爛醉和衣倒或菴體諸佛出身處東山水上行石壓筍斜出崖懸花倒生覺報清要會東山水上行溪邊石女夜吹笙木人把板雲中拍一曲涼州恰二更石菴玿東山水上行乾元利貞亨譊訛一箇字才子競頭爭率菴琮諸佛出身處千般謾度量東山行水上眨眼過扶桑荊叟珏雲門因僧問如何是佛師曰乾屎橛頌曰稽首金容乾屎橛應物現形如水月香臭皆從佛口生凡聖從教同一舌佛鑑勤我佛如來乾屎橛隨機平等遍塵寰迷頭認影區區者目對慈顏似等間太平古問佛唯言乾屎橛非獨抽釘兼拔楔不是韶陽老古錐爭得親言出親舌佛燈珣不用唐言譯休將梵語傳摩醯首羅眼對面隔西天鼓山圭雲門乾屎橛全超法報化無事出山遊百錢杖頭掛徑山杲問處分明答處新半同含笑半同瞋君看陌上二三月那箇枝頭不帶春惠因淨續收韶陽乾屎橛多年硬似鐵堪笑韓獹不奈何狺狺怨恨天邊月典牛游雲門大作師子吼剛把衷腸為誰剖眼似流星尚懵然狂夫逐臭爭知有君不見巖頭有語兮咬人屎橛非好狗懶菴需問佛答云乾屎橛明明此理難分雪金剛寶劍倒殺人鈍鋼止用新羅鐵蒙菴嶽雲門小廝兒大作師子吼鼻孔得半邊不知失却口松源嶽祇箇乾屎橛雲門太饒舌喪盡目前機虗空迸出血毒菴常雲門因僧問樹凋葉落時如何師曰體露金風頌曰問既有宗答亦攸同三句可辨一鏃遼空大野兮涼飈颯颯長天兮踈雨濛濛君不見少林久坐未歸客靜依熊耳一藂藂雪竇顯體露金風觸處周何須葉落始知秋清風樓上當年事直至如今笑未休泉大道問標答旨答徹問宗樹凋葉落體露金風如今要識雲門老秋後霜林盡變紅靈源清因行不妨掉臂求他不如求己面前山子猶存處處無風浪起一聲鴻鴈忽聞盡在愁人窠裏長靈卓樹凋葉落何時節體露金風九月天滿目真如人不會一川風月正翛然佛鑑勤涼風落木楚山秋滿樹寒蟬噪不休紅蓼白蘋開兩岸不知誰在釣魚舟佛性泰金風體露復何言大道從來絶變遷一葉飄空天似水臨川人喚渡頭船白楊順續收皮毛脫落盡惟有真實在全體露金風超然三句外本覺一寂寂寥寥空索索遍界紛紛黃葉落東西南北絶遮攔萬里長天飛一鶚在菴賢樹凋葉落聊伸問體露金風錯指蹤帶纍兒孫無豹變等閒落在草窠中天目禮雲門因僧問不起一念還有過也無師曰須彌山頌曰不生一念豈通宗真僞分於一句中築著開花兼杜口須彌當面作屏風洞山聰念不起須彌山就中崎嶮路行難競向海門遙仰望四溟浩渺七金寒正覺逸作者縱橫終不虗應機湧出須彌盧人窮不到金剛際相逐年年役路途黃龍南不起一念須彌山逐語隨言會轉難錦鱗赬尾平生事剛被平人把釣竿楊無為須彌山塞宇宙千眼大悲看不透除非自解倒騎牛一生不著隨人後白雲端萬仞峯前立太乖須臾眨眼落懸崖通身不損毫毛者天上人間不敢埋保寧勇問答隨機或淺深雲門終是飽藂林如今競逐須彌走無限平人被陸沉佛陀遜不起一念海湧須彌把來便用休別針錐真淨文善對機宜作者難眉毫無際現毫端西來穿耳攢眉過南海波斯仰面看照覺總須彌山聳見還難烟水漫漫萬仞攢欲覔雲門端的處把住清風一問看地藏恩一念沉沉過有無亘空拈出大彌盧直饒玉兔金烏忽宮殿巡遊落半途張無盡巍巍一座大彌盧荷負非干氣力粗縱使不隨言語會却來當面受塗糊徑山杲明鏡當臺湛如水無端特地起塵埃積成山嶽面前立千手大悲擘不開佛性泰一波才動衆波隨汩沒塵寰幾箇知突兀須彌橫宇宙縱橫妙用更由誰踈山如續收不起一念向道須彌舌頭一臠肉口唇兩片皮雲門機用妙如許不落是非知不知天童覺石筍抽條泥牛吼月誰料同舟自胡越應機湧出須彌山一念不生何處雪金剛寶劍當頭截圓悟勤不起一念須彌山特立當頭著眼看拈一縷絲輕絆倒家家門底透長安水菴一不起一念突出須彌聖凡莫辨箇老古錐松源嶽雲門因僧問如何是清淨法身師曰花藥欄曰便恁麼去時如何師曰金毛師子頌曰花藥欄莫顢頇星在稱兮不在盤便與麼太無端金毛師子大家看雪竇顯遊子奔馳不少安但知門外逐歌歡自家田地荒來久只看人間花藥欄枯木成是處三春花藥欄五湖禪客不須看尋枝摘葉應難會牙爪分明子細觀雲溪恭金谷春光長滿眼紅藥花梢香爛熳昨夜西風一陳寒遍地殘芳落何限王孫醉倒不知歸猶向欄邊索金盞上方益清淨法身花藥欄眉毛刺倒須彌山誰將玉笛傳凄怨吹過蘆藂明月彎佛智裕續收清淨法身花藥欄分明一點不相瞞有誰得意春風裏時到階前子細看退耕寧雲門因僧問如何是學人自己師曰遊山玩水曰如何是和尚自己師曰賴遇維那不在頌曰南嶽山前徑山後瀑布聲如雷電吼拈却笠子露頂行踏著草鞋赤腳走佛慧泉學人自己游山玩水只知踏破草鞋忘却來時年幾楊無為游山玩水須究宗旨莫作等間游山玩水黃蘗勝杖藜林下步莓苔擾擾勞生眼未開好是落花隨緑水一時流出洞中來地藏恩游山玩水事尋常早晚歸來𩯭欲霜踏破草鞋回首看數聲猿呌白雲鄉開福寧續收游山玩水數如麻誰識韶陽老作家截斷跛師三寸舌回頭總是舊生涯肯堂充游元玩水萬萬千千孰透韶陽語中帶玄鐵山仁朝西天暮東土玩水游山徐行欵步是則不動道場不是亦在裏許誰為證明石霜角虎呆堂定東村王大翁從來不睹是却將別人田喚作自己地絶象鑒雲門因僧問殺父殺母佛前懺悔殺佛殺祖甚處懺悔師曰露頌曰石火流星曾未急璇璣電轉一何遲雲門露字突然出著眼看時子飛正覺逸簸土揚塵無避處將門直到御樓前回頭不見來時路下是黃泉上是天白雲端露超宗越祖人言渠爇返魂香我道伊撾塗毒鼓天童覺續收重關金鎖不用鑰匙舌根不動韶陽已知典牛游椎鑼擂鼓轉船頭席卷波翻喊激流赤腳上船乘快便順風相送下楊州卍菴顏雲門露猛如虎達磨師不是祖豈不見鹽官老須彌為椎虗空為鼓又不見禾山老解打鼓休莾鹵甜瓜徹蒂甜苦瓠連根苦喝一喝應菴華斗換風雷吼星移海嶽昏誰知席帽下元是昔愁人退谷雲雲門因僧問如何是正法眼師曰普風穴云瞎黃龍心云更道箇瞎且圖兩得相見頌曰普之一字豈尋常擡首須看掣電光擬議思量生會解堪嗟剜肉作身瘡洞山聰普之一字天然別著眼看時如電掣宇宙茫茫無處尋稱鎚踏著硬如鐵正覺逸說佛說法廣鋪舒矢上加尖也太愚明眼衲僧傍見一條拄杖兩人舁大愚芝頂上有來真箇瞎輝天鑒地不同時大悲手裏休擎手獨自夜行誰得知白雲端但無一切心自然合大道應用在臨時莫分妙不妙真淨文應機無出老韶陽法眼咨詢普字當機會若非師子子一場間夢過瀟湘圓通仙續收正法眼普伶俐衲僧多錯舉休錯舉冬至寒食一百五楊無為明暗雙雙照用分幾人親到孟嘗門街頭不識真彌勒却向靈山問世尊瞎堂遠雲門因僧問如何是啐之機師曰響頌曰有問啐機雲門答云響昨日雷震天夜來山水長真淨文啐之機響字酬過空雷電忽傾湫夜來雱霈漫天雨幾處波濤打釣舟圓通仙續收白牯問狸奴虗空酬萬象電激不停踪谷虗誰答響啐兮兮清機歷掌回頭𨍏轢範秦時舌上葛藤長萬丈心聞賁一啐一當頭響合母不離窠子已出殼絶象鑒雲門因僧問如何是雲門劒師曰祖頌曰吹毛寶劒問雲門來者投機豈更存路逢劒客如何也甑人携手向南奔北塔祚吹毛寶劒不須抽迸匣清光射斗牛日用全彰人不見雲門祖字為君酬雲溪恭三尺秋光匣裏藏時逢作者露鋒鋩如今四塞狼烟靜不展紅旗歸故鄉圓通仙增收雲門因僧問如何是吹毛劒師曰骼又曰胔頌曰誰謂吹毛劒雲門骼可知一朝權在手方見令行時真淨文雲門因僧問佛法如水中月是否師曰清波無透路曰和尚從何得師曰再問復何來曰正與麼時如何師曰重疊關山路頌曰灼然水月非難取自是時人手不親韶石老師拈出了關山重疊越光新白雲端遍界不藏清波澄寂互換投機箭鋒相直提起向上鉗鎚石火電光莫及便恁麼隔關山碧潭雲外不相關圓悟勤續收盡却命根方可關門一挨一拶電湧雷奔佛法水中月耳裏眼裏說差之毫釐失之千里南北東西知幾幾月堂昌清波無透路轉處少人知斫却月中桂清光付與誰湛堂深雲門示衆曰藥病相治盡大地是藥那箇是自己頌曰藥忌由來鑒作家示徒親切病如麻十方三世諸知識赫日光中雷電車五祖戒藥病相治事可嗟如何於此墮羣邪未語已前誰辨的洎乎開口見萌芽不在思惟休卜度徒勞管見強紛拏世上多有如斯者不知羞恥數如麻北塔祚盡大地是藥古今何太錯閉門不造車通途自寥廓錯錯鼻孔遼天亦穿却雪竇顯左眼不見山河右眼不見日月直得百花開時一一為君分別白雲端續收被裏出指水中露觜屈指眼開搖觜身起藥病不相治何須盡大地反笑老雲門失却娘生鼻月堂昌太譊訛全殺活絶承當無摸索寰中意氣閫外籌略倒退三千里盡大地是藥錯錯利劒七星光閃爍圓悟勤雲門問僧光明寂照遍河沙豈不是張拙秀才語僧曰是師曰話墮也頌曰叶路縱橫得自由牢關捩轉妙全收箇中密意人難會喝下須教水倒流禾山方萬丈龍門勢倚空懸崖撒手辨魚龍時人只看絲綸上不見蘆花對蓼紅月菴果問來答去無偏黨鐵壁銀山作麼通縱奪臨機言話墮遂令千古動悲風踈山如續收與奪雙行定是非韶陽用處太孤危這僧若與金剛眼趙璧連城一道歸旻古佛分明寫出與君看意在鈎頭不在盤縱使石人開得口不知猶被舌頭謾松源嶽當的帝都丁伊憂乙噎嚶若教呼吸正誤殺世間人石鼓夷增收雲門曰衲僧家須有巴鼻方識得天下人如何是衲僧巴鼻代云德山頌曰雲門舌上有龍泉愛把金針黑地穿要會衲僧巴鼻子一條紅線兩人牽慈受深增收雲門普請搬柴路次見僧遂拋下一片柴曰一大藏教只說者箇頌曰處處緑楊堪繫馬家家門口透長安一條大路平如掌自是時人措足難慈受深汝水向東流楚水從南至皆歸大海中鹹淡同一味頂門具眼底衲僧試向其中辨淺深佛性泰一大藏教說這箇雲門飄下是甚麼直饒於此徹根源眨得眼來還蹉過浙翁琰增收雲門因僧問生死到來如何排遣師展手曰還我生死來一作問生死到來如何回避師曰在什麼處頌曰針眼魚吞大千界蟭螟蟲吐妙高山太虗包括無遺漏萬彚全歸指掌間起復滅去還來石橋路斷通身黑那是華頂是天台圓悟勤飢便喫飯困來打眠長安城外一望平田絶中邊離言詮將軍不識烏騅馬海底犀牛把角鞭呆堂定增收雲門因僧問秋初夏末前程若有人問作麼生祗對師曰大衆退後曰未審過在甚麼處師曰還我九十日飯錢來頌曰大衆退後衲僧去就豈用機關那容體究蓑翁老熟慣風波橈棹不施船放溜天童覺夏末秋初萬萬千石頭路滑腳皮穿這僧劒刃翻身疾也被雲門索飯錢石田薰增收雲門因僧問如何是法身向上事師曰向上與汝道即不難作麼生會法身曰請和尚鑒師曰鑒即且置作麼生會法身曰與麼與麼師曰這箇是長連床上學得底我且問你法身還解喫飯麼僧無對頌曰西江一吸竟無痕三世如來一口吞鳳髓龍肝香積飯萬般嘗過不須論南堂興三韶陽機鋒迅雷霹靂僧問法身喫飯不喫學語之流卒說不出山河大地聊充飢四海五湖輕一吸未識雲門向上機祇尋向下轉生疑通身是飯如何喫無口從來亦不飢增收雲門問新到你是甚處人曰新羅人師曰將什麼過海曰草賊大敗師曰為什麼在我手裏曰恰是師曰𨁝跳無對本覺一云者兩箇有頭無尾漢乃頌曰新羅衲子罕曾逢風月詢來也略同可惜為山爭一簣徒勞賓主各無功增收雲門曰三家村裏賣卜東卜西卜忽然卜著也不定僧便問忽然卜著時如何師曰伏惟頌曰賣卜三家村裏頭吉凶禍福辨端由忽然卜著僧來問生死唯將一句酬本覺一增收雲門曰平地上死人無數過得荊棘林是好手時有僧出云與麼則堂中第一座有長處也師曰蘇嚕蘇嚕頌曰舉手攀南斗移身倚北辰出頭天外看須是箇般人水菴一聲如鳴玉靜邊門誰信幽人不見君花到海棠將寂寞繡衣猶把麝香熏虗堂愚將軍令下閃旌旗胡騎紛紛頓失威縱有突然驍驟者不知身已陷重圍斷橋倫增收雲門示衆曰古佛與露柱相交是第幾機僧無語師曰你問我與你道僧遂問師曰一條縚三十文曰如何是一條縚三十文師曰打與自代前語云南山起雲北山下雨頌曰南山雲北山雨四七二三面相覩新羅國裏僧上堂大唐國裏未打鼓苦中樂樂中苦誰道黃金如糞土雪竇顯一道神光初不覆藏超見緣也是而無是出情量也當而無當巖花之粉兮蜂房成蜜野草之滋兮麝臍作香隨類三尺一丈六明明觸處露堂堂天童覺油然南山雲沛然北山雨露柱笑呵呵燈籠超佛祖中涌邊沒西天東土樓閣門開盡日間野老不知何處去圓悟勤古佛頭拄天露拄腳踏地上古今來成一體頭拄天兮戴帽子腳踏地兮沒草鞋同赴大悲院裏齊佛鑑勤
