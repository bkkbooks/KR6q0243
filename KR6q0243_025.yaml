body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第五世之六清源下第四世之餘鄂州清平山令遵禪師嗣翠微因僧問如何是大乘師曰井索曰如何是小乘師曰錢索又問如何是有漏師曰笊籬曰如何是無漏師曰木杓曰覿面相呈時如何師曰分付與典座頌曰有漏笊籬無漏木杓烜赫禪和妄生卜度伶俐座主何處摸索金牙解使神鎗李廣箭穿雙鶚琅琊覺大乘小乘井索錢索有漏無漏笊籬木杓直下承當鼻孔失却法雲秀笊籬木杓錢貫井索見成家風受用廓落生涯放得信緣看佛法更於何處著不用安排只麼從自然心地常安樂天童覺二乘諸漏扣空王雪後那堪半夜霜秦漢旌旗度沙漠唐虞黼黻拱巖廊張無盡笊籬木杓錢貫井索打瓦鑽龜徒勞卜度休卜度麒麟只有一隻角南華昺續收有漏笊籬無漏木杓學語禪流徒勞卜度江邊有箇釣魚人擲鈎驚起遼天鶴白鹿先笊籬木杓錢貫桶索説妙談玄俱是錯清平鼻孔塞乾坤天下衲僧無處摸明來握土成金悟去百草皆藥拗折俱胝指頭踏斷趙州略彴平常一句用無窮限量知見徒斟酌雪竇宗丈二鋼釘八尺鐵橛插在眼中猶自不瞥中庵空增收清平初參翠微便問如何是西來的的意微曰待無人即向汝説師良久曰無人也請和尚説微下禪床引師入竹園師又曰無人也請和尚説微指竹曰這竿得恁麼長那竿得恁麼短師雖領其微言猶未徹出住大通上堂舉初見翠微機緣謂衆曰先師入泥入水為我自是我不識好惡頌曰父子相逢意已彰尊卑何必敘炎涼叮嚀指點家園事行盡荒郊話短長大洪遂土埋處處鐵菱角半夜經由未覺難天曉嶺根傷中倒方知行過鐵門關雪堂行舒州投子山大同禪師嗣翠微趙州問大死底人却活時如何師曰不許夜行投明須到州曰我早猴白伊更猴黑頌曰活中有眼還同死藥忌何須鑒作家古佛尚言曾未到不知誰解撒塵沙雪竇顯大死底人同活人三千豪俠又隨塵李陵本是收番將却作降番上將身佛印元死去活來牙上露投明須到己先行誰家別館池塘裡一對鴛鴦畫不成白雲端虗空産出鐵牛兒頭角分明也大奇踏破澄潭深處月夜闌牽向雪中歸長靈卓趙州解撚無絲線投子能穿沒鼻針好手手中呈好手紅心心內中紅心佛鑑勤大死底人還却活不許夜行投明到陳州人出許州門翁翁八十重年少鼓山圭禾黍不陽艷競栽桃李春翻令力耕者半作賣花人徑山杲續收我疑千年蒼玉精化為一片秋水骨海神欲護護不得鰲頭一旦忽擎出正堂辨棚前夜半弄傀儡行動威儀去就全子細思量無道理裏頭畢竟有人牽雪菴瑾投子因僧問如何是十身調御師下禪床立又問凡聖相去幾何師亦下禪床立頌曰水出崑崙浪接連天高地逈秀林巒禪床略下雲山斷凡聖無蹤海嶽寒投子青老婦低垂事舅姑起來爭免面糢糊強將雲髻高高綰遮得傍人眼也無白雲端投子下禪床雲中迸電光胡僧歸漢土六月下嚴霜佛慧泉投子示全機清風動翠微十身何處是嬴得眼如眉才佛心愛向江邊弄釣絲碧潭深處有嘉魚釣頭不是無香餌箇底如何釣得渠長靈卓捉賊分明要見贓十身調御下繩牀曾經巴硤猿啼夜鐵作心肝也斷腸佛鑑勤投子下禪床通身誰辨的擬議即千差覿面難相識京兆天寧璉投子下繩床今朝為舉揚驢前馬後漢切忌亂承當徑山杲續收玉麟帶角離霄漢金鳳銜花下綵樓野老不嫌公子醉相將携手御街遊水菴一投子下繩床終非孟八郎不搖三寸舌未免鬼分贓眼底欲條直臨機爭探囊裂破古今無面目縱橫何處有關防或庵體投子因僧問月未圓時如何師曰吞却三箇四箇曰圓後如何師曰吐却七箇八箇頌曰七八雖然正好觀四三焉得便顢頇靈光萬古輝天地隱顯尋常不用搏洞山聰圓缺曾伸問老翁石龜銜子引清風昨朝木馬潭中過踏出金烏半夜紅投子青圓後圓前作者知四三七八解呈機令人長笑善吞吐留與叢林作是非正覺逸吞却三四枚吐出七八箇吞吐總完全不知是什麼保寧勇續收吞却易吐還難須彌頂上天風寒昨夜三更白如晝不知誰共倚闌觀佛性泰投子投子機輪無阻要吞即吞要吐即吐若還殢齒粘牙爭得超今邁古石庵玿投子因僧問和尚住此山有何境界師曰丫角女子白頭絲頌曰山家世界別塵世罕曾聞只可自怡悅不堪持贈君持贈君還也奇丫角女子白頭絲正覺逸丫角女子白頭絲猛焰堆中雪片飛一等住山誰可擬間雲流水不同歸白雲端續收花萼樓前春正濃濛濛柳絮舞晴空金錢擲罷嬌無力笑倚闌干屈曲中懶庵樞住山境界問如何女子雙鬟鬢已皤覿面不逢休更會白雲飛過舊山河天目禮增收投子因僧問春雨淋淋百草為什麼不抽芽師曰芭蕉只麼長僧問如何是玄中玄師曰去年端午今年亦然曰畢竟如何師曰故非同別誰説前後僧問如何是第二月師曰仲春漸暄曰如何是第一月師曰孟春猶寒頌曰投子投子超今邁古遇人識人頭灰面土一月二月寒暄説説住峯高處見翠微紅蓮舌上無橫骨龍門遠孟春猶寒第一月仲春漸暄第二月若無間事挂心頭便是人間好時節江南并兩浙春寒與秋熱𫎇庵嶽增收投子因僧問一大藏教還有奇特事也無師曰演出大藏教僧又問黃龍新一大藏教還有奇特事也無新曰演入大藏教頌曰頓漸偏圓權實空有釘觜鐵舌河目海口一道清虗亘古今八角磨盤空裡走圓悟勤演出大藏教言端語亦端兩頭都坐斷一劒倚天寒冶父川一出一入半合半開羸鶴翹寒木狂猿嘯古臺要知奇特事當甚破草鞋木庵永增收投子因僧問曹溪猶如指月靈山猶如畫月如何是真月師曰昨夜三更轉向西頌曰昨夜三更轉向西曉來任運落前溪舉頭不薦團欒底無限清風付與誰慈受深昨夜三更轉向西昏昏宇宙幾人迷澄潭影轉風初息猿狖微聞嶺外啼懶庵需昨夜三更轉向西明眼宗師為指迷若於話下尋端的未免泥中又洗泥巳菴深增收投子因僧問如何是露地白牛師曰叱叱曰飲噉何物師曰喫喫頌曰玉角霜毛露地牛人間天上顯蹤由不同雪嶺時時吼肻若溈山日日收洞山聰露地白牛起問端隨機叱叱齒牙寒不知飲噉是何物喫喫直教滄海乾乾明慧覺增收投子問僧甚麼處來曰東西山禮祖師來師曰祖師不在東西山僧無語頌曰蒼龍帶雨離深洞彩鳳銜花入帝關一句古今無滲漏祖師不在東西山雪堂行增收投子因僧問如何是學人一卷經師曰題目分明頌曰半滿金言玉轉環靈山一會受欺謾拈來題目分明也付與兒孫著眼看佛心才增收投子因雪峯侍立師指菴前一磈石曰三世諸佛總在裡許峯曰須知有不在裏許者師乃歸庵中坐一曰不快漆桶頌曰説明道白埋塵混垢變化有由敗露不走誰知暗裡骨橫抽要在轟轟霹靂手月堂昌有客釣鼇魚區區走五湖不知泥裏蚌滿腹是驪珠佛鑑勤增收投子因僧問劫火洞然時如何師曰寒凜凜地頌曰天地為爐萬物焦石人駕浪渡雲霄風生半夜霜威星月落氷寒逼鬢凋投子青增收投子因僧問如何是本來人師曰共坐不相識曰恁麼則禮拜去也師曰暗寫愁腸寄與誰頌曰共坐同行世莫知幾人當面便逢伊縱饒紹續家門者半是貧寒乞養兒保寧勇增收投子因僧問一切聲是佛聲是否師曰是曰和尚莫豚沸碗鳴聲師便打僧又問粗言及細語皆歸第一義是否師曰是曰喚和尚作一頭驢得麼師便打頌曰投子投子機輪無阻放一得二同彼同此可憐無限弄潮人畢竟還落潮中死忽然活百川倒流閙聒聒雪竇顯高山可踰大海可涉投子投子到處盤摺一切聲是佛聲從他認我碗鳴粗言歸第一義自要看渠豚沸喚作一頭驢正令生光輝趂手打得走無路咭嘹舌頭何處歸月堂昌一條拄杖兩家使一往一來無彼此者僧若得投子機隨手拈來打投子圓悟勤增收投子與僧遊山僧見蟬殼遂問殼在這裏蟬向什麼處去師拈蟬殼就其耳畔作蟬鳴聲其僧有省頌曰輕薄寒蟬殼枯乾敗葉形拈來臨耳畔連噪兩三聲南堂興增收投子指雨示僧云數日來好雨且道什麼處來僧無語後因看華嚴經方有省頌曰陌上遊人競採芳不知眼底度春光夜來一陳落花雨一百十城流水香絶象鑒百花香裏鷓鴣啼白面郎君醉似泥赫日光中開得眼福城東際草萋萋竹屋簡增收投子因僧問三身中那身説法師乃彈指頌曰三身説法問端由彈指輕輕海嶽收金鎖塔開紅日晚夜深人笑碧峯頭投子青增收投子因僧問菩提煩惱是一是二師曰是二僧便問如何是菩提師曰且坐喫茶曰如何是煩惱師曰這僧聒噪人出去頌曰入草親尋草裏人重重有路掌中平不遇大商空突曉日高猶聽打三更木庵永六祖下第五世之七南嶽下後第四世之一溈仰袁州仰山慧寂通智禪師嗣溈山有梵僧從空而至師曰近離甚處曰西天師曰幾時離彼曰今早師曰何太遲生曰遊山玩水師曰神通遊戲則不無闍黎佛法須還老僧始得曰特來東土禮文殊却遇小釋迦遂出梵書貝多葉與師作禮乘空而去自此號小釋迦頌曰遠離西竺路迢迢親向支那弄海潮若要清風生閫外拽來更與四藤條南華昺小釋迦大文殊聞名號任稱呼藤條在握不能用被他碧眼謾塗糊疏山如續收瞬目西天此土揚眉此土西天出息千重百匝入息一念萬年禪禪閻浮樹在海南邊南堂興應真來訪仰山翁須信聲聞未盡空問著不知關棙子元來只是有神通本覺一仰山住東平時溈山送書并鏡與師師上堂提起示衆曰且道是溈山鏡東平鏡若道是東平鏡又是溈山送來若道是溈山鏡又在東平手裏道得則留取道不得則撲破去也衆無語師遂撲破頌曰仰山接得溈山鏡告衆拈來行正令懵懂禪流眼不開仰山直下驀頭釘汾陽昭提起分明照正邪衆人皆不啓唇牙譬如賣物無人買最後須歸本主家洞山聰古鏡封來辨者難示徒行令衆當觀會中若有仙陀客留得如今照影寒海印信師鏡拈來呈衆了癡人往往爭妍醜當時撲破不可尋免教壞却兒孫手白雲端溈山古鏡仰山提日上東方月落西撲落不知誰拾得秋風索索草萋萋保寧勇師資相照見非輕將示禪徒衆失驚此鏡分明分不得到頭分作兩分明佛國白全放全收意亦優溈山送至仰山頭可憐一片如秋水三問無人撲破休智海清父子相傳鏡絶塵須知秋夕不同輪可憐無限迷頭者錯認空華鏡裏春佛心才續收八十婆婆學畫眉風流意比少年時若無明鏡分妍醜盡道不勞紅粉施上方益比謂拈來伸一問如何舉衆盡茫然不因一撲百雜碎定作人間醜婦冤西禪淨仰山隨溈山遊山到磐陀石上坐師侍立次忽鴉銜一紅柿落在面前師取柿拭過呈似溈溈云子甚處得來師曰此是和尚道德所感溈云汝也不得無分即分半與師玄沙云大小溈山被仰山一坐至今起不得頌曰鴉銜柿子落師前致問何來事皎然各分一半甜如蜜如今不會更何年汾陽昭溈仰分明亘古今父子相見意輒深果熟馨香鴉銜至揑來擘去似交襟要會二人端的處中秋月落映潭心洞山聰增收仰山因溈山問大地衆生業識茫茫無本可據子作麼生知他有之與無師曰慧寂有驗處時有一僧從面前過師召曰闍黎僧回首師曰和尚這箇便是業識茫茫無本可據溈曰此是師子一滴乳迸散六斛驢乳頌曰父子有時揚密意神通變化不相知喚回業識茫茫者笑倒溈山老古錐真淨文一喚回頭識我不依俙蘿月又成鈎千金之子才流落漠漠窮途有許愁天童覺有本無本學益學損搬運不時提起却穩師子一滴迸六斛驢乳散入別人屋業識茫茫辨出時烏雞不在蘆花宿月堂昌增收仰山問溈山大用現前請師辨白溈下座歸方丈師隨入溈問子適來問甚麼話師再舉溈曰還記得吾答語否師曰記得溈曰你試舉看師珍重出去溈曰錯師回首曰間師弟若來莫道某甲無語頌曰是即全是非即全非大用現前擕手同歸不知猶自涉離微松源嶽問處分明答處親縱橫有路慣反身相如奪得連城璧秦主安然致太平木菴永仰山臥次夢入彌勒內院衆堂中諸位皆足惟第二位空師遂就座一尊者白槌曰今當第二座説法師起白槌曰摩訶衍法離四句絶百非諦聽諦聽衆皆散去及覺舉似溈溈曰子已入聖位師便禮拜頌曰夢中擁衲參耆舊列聖森森坐其右當仁不讓犍椎鳴説法無畏師子吼心安如海膽量如斗鮫目淚流蚌腸珠剖譫語誰知泄我機厖眉應笑揚家醜離四句絶百非馬師父子病休醫天童覺夢裡談空也大奇百非四句若為離當時能舉摩竭令何必堂中下一槌本覺一白日青天夢中説夢揑怪揑怪誑呼一衆無門開仰山因龐居士問久嚮仰山到來為什麼却覆師竪起拂子士曰恰是師曰是仰是覆士乃打露柱曰雖然無人也要露柱證明師擲拂子曰若到諸方一任舉似頌曰兩個八文為十六從頭數過猶不足拏來亂撒向階前滿地團團苔蘚緑白雲端賊偷賊物太希奇好手還他火伴知今日併贓齊捉獲得便宜是落便宜保寧勇增收仰山後參巖頭頭舉起拂子師展坐具頭拈拂子置背後師將坐具搭肩上而出頭曰我不肯汝放祇肯汝收頌曰一竪一展一放一收仰山弄險過似巖頭賴是隨風回櫓棹幾乎反却釣魚舟斷橋倫增收仰山一日在法堂上坐見一僧來問訊了向東邊叉手立以目視師師垂左足僧過西邊叉手立師垂右足僧向中間叉手立師收雙足僧禮拜師曰老僧自住此未曾打著一人拈拄杖便打僧騰空而去頌曰草舍蕭蕭寄白雲故人訪遠意殷勤寒暄禮節皆通罷難免杯茶供養君南叟茙增收仰山在洪州石亭粥後坐次有僧問和尚還識字否師曰隨分僧乃右旋一匝云是甚麼字師於地上書個十字僧又左旋一匝云是甚字師改十字作卍字僧畫一圓相兩手托如修羅擎日月勢云是甚麼字師乃畫圓相圍却卍字僧乃作樓至勢師云如是如是此是諸佛之所護念汝亦如是吾亦如是善自護持其僧禮拜騰空而去頌曰道環之虗未盈空印之手未形妙運天輪地軸密羅武緯文經放開揑聚獨立同行機發玄樞兮青天激電眼合紫光兮白日見星天童覺增收仰山因僧思𨜶問禪宗頓悟畢竟入門的意如何師曰此意極難若是祖宗門下上根上智一聞千悟得大總持其有根微智劣若不安禪靜慮到這裡總須茫然曰除此一路還更有入處否師曰有曰如何即是師曰汝是甚處人曰幽州人師曰汝還思彼處否曰常思師曰能思者是心所思者是境彼處樓臺林苑人馬駢闐汝返思底還有許多般也無曰某甲到這裡總不見有師曰汝解猶在心信位即得人位未在曰除却這個別更有意也無師曰別有別無即不堪也曰到這裡作麼生即是師曰據汝所解祇得一玄得坐披衣向後自看𨜶禮謝頌曰得坐應須更自看涅槃城裏未為安披毛戴角重相見歷盡艱難幾許般大洪恩無外而容無礙而沖門墻岸岸關鎖重重酒常酣而臥客飯雖飽而頽農突出虗空兮鳳搏妙趐踏翻滄海兮雷送遊龍天童覺幽州桑梓問來端歷歷山川在肺肝思底返思都叵得披衣向後更須看本覺一凡聖總無別路岐返思思底幾人知春風不到桃源洞葉落花開自有時慈受深增收仰山問僧近離甚處曰廬山師曰曾到五老峯麼曰不曾到師曰闍黎不曾遊山雲門云此語皆為慈悲之故有落草之談頌曰出草入草隨解尋討白雲重重紅日杲杲左顧無瑕右盻已老君不見寒山子行太早十年歸不得忘却來時道雪竇顯出草何如入草時全身入草為慈悲仰山垂手隨他去直至如今在路岐本覺一欲識廬山五老峯個中何地不相逢舌頭無骨隨人轉尉斗煎茶銚不同慈受深增收仰山問三聖汝名什麼聖云慧寂師曰慧寂是我聖曰我名慧然師呵呵大笑頌曰神通遊戲不為難互換機鋒始可觀雙放雙收底時節呵呵大笑幾何般本覺一慧寂剛言是我名幸逢禪者更饒人若將利器比君子大笑欣然滿座春圓悟勤增收仰山向火次有僧參師曰一言説盡山河大地僧問如何是一言師以火筯插向爐中又移向舊處頌曰一句稱提萬象分肯同摩竭掩重門夕陽影裡風濤急不覺移舟下渡昏增收仰山見雪師子乃指曰還有過得此色者麼衆無對雲門云當時好便與推倒雪竇云雲門只解推倒不解扶起琅琊覺云即今問汝諸人推倒扶起相去多少拄杖子拶過眉毛鼻孔呵呵大笑便擲下拄杖月堂昌云推倒也錯扶起也錯且道還有過此色者麼頌曰一倒一起雪庭師子慎於犯而懷仁勇於為而見義清光照眼似迷家明白轉身還墮位衲僧家了無寄同死同生何此何彼暖信破梅兮春到寒枝涼颷脫葉兮秋澄潦水天童覺推倒扶起覿面千里唯小釋迦風前按指直饒海印發光也是雪峯道底遍界是文殊遍界是慈氏樓閣門開竟日間誰識善財童子最菴印增收仰山因陸郎中問不斷煩惱而入涅槃師竪起拂子曰只如者個作麼生入曰入之一字也不用得師曰入之一字不為郎中頌曰生死涅槃翻手覆手正眼豁開二俱非有獨步大方塵塵正受片片亂飄巖上梅條條縱舞溪邊柳石門聰增收仰山一日見香嚴乃問近日師兄見處如何曰據某甲見處無一法可當情師曰你解猶在境曰某甲只如是師兄又作麼生師曰你豈無能知道無一法可當情者溈山聞舉曰寂子已後疑煞天下人去在頌曰寂子香嚴論見處直教聞者轉疑深相逢未肯三分語那得全拋一片心本覺一增收仰山臥次僧問法身還解説法也無師曰我説不得別有一人説得曰説得底人在甚處處師推出枕子溈山聞曰寂子用劒刃上事頌曰法身説法肉眼看物大智如愚大辨如訥拈起簸箕別處舂推出枕子露眠床劒刃上事放毫光月堂昌田中插鍬床上推枕千手千眼不審不審龍牙言增收仰山因梵僧來參師於地上畫半月相僧近前添作一圓相以腳抹却師展兩手僧拂袖便去頌曰寂子偶逢穿耳客曾將半月示伊家僧添半月反然去却道親逢小釋迦本覺一增收仰山夏末問訊溈山溈曰子一夏不見上來在下面作何所務師曰慧寂在下面鋤得一片畬下得一籮種溈山曰子今夏不虗過師却問未審和尚一夏之中作何所務溈曰日中一食夜後一寢師曰和尚今夏亦不虗過道了乃吐舌溈曰寂子何得自傷己命頌曰開一片田密密綿綿兩頓粥飯其道自辦一夏與諸人相見自是諸人不薦若也薦成一片是什麼一片看取當門箭龍門遠寂子不虗過钁頭邊有功祇將一籮粟千載顯家風咦菴鑒翁翁年德兩俱尊家有詩書富可論飽飯憨眠無個事却來敲枕弄兒孫別山智開得一片田種得一籮粟卞和三獻楚王玉設若不遇別寶人至今猶在荊門哭午間一齋早晨一粥斷絃須是鸞膠續陽春白雪有知音山自青兮水自緑辛菴儔增收仰山同陸侍御入僧堂公乃問如許多師僧為復是喫粥喫飯僧為復是參禪僧師曰亦不是喫粥飯僧亦不是參禪僧公曰在此作什麼師曰侍御自問取他頌曰來問威風頗不臧幾多龍象在雲堂旃檀林裡曾無雜造次風流豈易量本覺一增收仰山因劉侍御問了心之旨可得聞乎師曰若欲了心無心可了無了之心是名真了頌曰口朝鼻孔無空過眼蓋鬍鬚有古風信釆骨頭花十八等間擲出滿盆紅或菴體增收鄧州香嚴智間禪師嗣溈山因百丈遷化遂參溈山溈問我聞汝在百丈處問一答十問十答百此是汝聰明伶俐意解識想生死根本父母未生時試道一句看師茫然歸寮將平日看過底文字尋一句酬對竟不得乃歎曰畫餅不可充飢屢乞溈説破溈曰我若説似汝汝已後罵我去我説底終不干汝事師遂焚平昔所看文字曰此生不學佛法也且作個長行粥飯僧免役心神泣辭溈山抵南陽忠國師遺迹憩止一日芟除草木偶拋瓦礫擊竹作聲忽然省悟遽歸沐浴焚香遙禮溈山讚曰和尚大慈恩踰父母當時若為我説破何有今日之事述頌曰一擊忘所知更不假修持動容揚古路不墮悄然機處處無蹤迹聲色外威儀諸方達道者咸言上上機溈山聞得謂仰山曰此子徹也仰曰此是心機意識著述得成待慧寂親自勘道頌曰粥飯隨緣養病軀本無迷悟可關渠無端擊著菴前竹直至如今在半途雪竇宗放下身心如弊帚拈來瓦礫是黃金驀然一下打得著大地山河一法沉九峯升增收香嚴因仰山見曰和尚讚歎師弟發明大事你試説看師舉前頌仰曰此是夙習記持而成若有正悟別更説看師又頌曰去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無頌曰無地無錐未是貧知無尚有守無身儂家近日貧來甚不見當初貧底人鴈山元年去年來貧復貧祖師擡腳重千斤愁人莫向愁人説説向愁人愁殺人松源嶽增收香嚴初開堂溈山令僧送書并拄杖至師接得便哭蒼天蒼天僧曰和尚為甚麼如此師曰祇為春行秋令一作冬行春令頌曰拄杖將來便徹心淚流不覺思沉吟春行秋令人驚怪絶後光前絶古今汾陽昭接得杖哭蒼天不言絶後與光前春行秋令人難會踏破草鞋腳底穿正覺逸尊人寄物哭蒼天春令冬行也倒顛若有會中真衲子禪床好與即時掀本覺一家世拄杖佛祖付囑溈山寄來香嚴發哭父子投機陽春雪曲不是知音大難相續踈山如香嚴示衆曰若論此事如人上樹口銜樹枝腳不踏枝手不攀枝樹下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得時有虎頭招上座出衆云樹上即不問未上樹時請和尚道師乃呵呵大笑頌曰香嚴銜樹示多人要引同袍達本真擬議即從言下取喪身失命數如塵汾陽為你開迷路雲散長天日月新汾陽昭呵呵大笑沒針錐上樹何如未上時任使香嚴多伎倆傍觀不免為攢眉佛慧泉曲設多方老古錐那堪枝上更生枝好如良馬窺鞭影逐塊且非師子兒保寧勇古聖悲心利後人口銜枝上露全身直饒玄路無消息未免家中喪二親石門易香嚴埀語真堪賞口銜樹枝懸樹上此時不問祖師機且道渠儂底模樣地藏恩狹路轉身難東西盡是山行人不到處風定落花間上方益續收高高山頂立深深海底行新松趂嶺種芳草繞池生手不攀枝腳不踏樹口裏銜得當頭蹉路問著西來對不對罰錢依舊有人悔月堂昌故園春色在枝頭惱亂春風卒未休無事晚來江上望三三兩兩釣魚舟應菴華香嚴上樹口銜枝手不攀枝腳纍垂才開口咦不答也又相違未上樹時道將來金剛寶劒頂門揮卍菴顏香嚴上樹住住住住擬問如何葛藤露布月林觀香嚴真杜撰惡毒無盡限啞却衲僧口通身是鬼眼無門開無地無錐始是貧却來樹上強懸身雖然相識滿天下畢竟知心能幾人無禪才增收香嚴因僧問如何是道師曰枯木裏龍吟僧云如何師曰髑髏裏眼睛後問石霜如何是枯木裏龍吟霜云猶帶喜在又問如何是髑髏裏眼睛霜云猶帶識在頌曰枯木龍吟真是道髑髏無識眼初明喜識盡時消息盡當人那辨濁中清曹山寂
