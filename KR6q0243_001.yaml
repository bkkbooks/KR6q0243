body:
  text: 禪宗頌古聯珠通集目録卷第一通集敘馮子振撰通集敘普會撰重刻敘淨戒撰舊敘張掄撰本敘法應撰品目卷第二世尊機録佛世尊草四則卷第三菩薩機緣文殊師利四則舍利弗二則賓頭盧一則殃崫摩羅二則那吒太子一則七賢聖女一則城東老姥一則善慧大士七則卷第四菩薩機緣之餘布袋和尚一則跋陀尊者一則維摩居士一則善財菩薩五則天台智者一則志公和尚二則大乘經偈經題字一則首楞嚴經十七則卷第五大乘經偈之餘圓覺經十則法華經九則文殊般若經一則維摩經五則金剛般若經十一則華嚴經六則楞伽經一則般若心經一則卷第六祖師機緣西天諸祖初祖迦葉尊者二則九祖伏䭾蜜多一則十祖脅尊者一則十四祖龍樹大士一則草四祖師子尊者一則草七祖般若多羅一則東土諸祖初祖達磨大師六則卷第七祖師機緣東土諸祖二祖慧可大師一則三祖僧璨大師一則四祖道信大師一則五祖弘忍大師一則六祖慧能大師一則卷第八祖師機緣東土旁出諸祖初祖旁出波羅提尊者一則四祖旁出牛頭法融禪師一則鶴林玄素禪師一則徑山國一禪師二則鳥窠道林禪師二則五祖旁出蒙山道明禪師一則破竈墮和尚二則六祖旁出河北智隍禪師一則西京慧忠國師十一則永嘉玄覺禪師一則卷第九祖師機緣六祖下第一世南嶽懷讓禪師四則清源行思禪師六則六祖下第二世南嶽下第一世馬祖道一禪師九則六祖下第二世清源下第一世石頭希遷禪師三則北宗終南惟政禪師一則卷第十祖師機緣六祖下第三世之一南嶽下第二世之一百丈懷海禪師九則南泉普願禪師五則卷第十一祖師機緣六祖下第三世之二南嶽下第二世之二南泉禪師之餘草二則鹽官齊安國師三則歸宗智常禪師七則韶州乳源禪師一則卷第十二祖師機緣六祖下第三世之三南嶽下第二世之三大梅法常禪師四則五泄靈默禪師一則盤山寶積禪師七則水潦和尚二則麻谷寶徹禪師四則東寺如會禪師二則西堂智藏禪師一則大珠慧海禪師三則百丈惟政禪師二則泐潭法會禪師一則杉山智堅禪師一則石鞏慧藏禪師一則朗州中邑和尚二則卷第十三祖師機緣六祖下第三世之四南嶽下第二世之四泐潭常與禪師一則汾州無業國師二則鵝湖大義禪師一則三角總印禪師三則魯祖寶雲禪師二則紫玉道通禪師二則五臺隱峯禪師二則馬頭神藏禪師一則華林善覺禪師一則烏臼和尚二則石臼和尚二則本溪和尚二則西山亮座主一則金牛和尚一則嵩山和尚二則則川和尚三則欣州打地和尚一則江西樹和尚五則石林和尚一則潭州秀溪和尚一則浮杯和尚一則潭州龍山和尚一則卷第十四祖師機緣六祖下第三世之五南嶽下第二世之餘襄州龐蘊居士十四則六祖下第三世之六清源下第二世之一藥山惟儼禪師十四則丹霞天然禪師六則卷第十五祖師機緣六祖下第三世之餘清源下第二世之餘大顛寶通禪師三則長髭曠禪師三則法門佛陀禪師一則大同普濟禪師四則六祖下第四世之一南嶽下前第三世之一溈仰宗溈山靈祐禪師草五則卷第十六祖師機緣六祖下第四世之二南嶽下前第三世之二黃蘗希運禪師六則大慈寰中禪師二則平田普岸禪師二則長沙景岑禪師九則子湖利蹤禪師二則鄂州茱萸和尚二則白馬曇照禪師一則雲際師祖禪師一則陸亘大夫五則卷第十七祖師機緣六祖下第四世之三南嶽下前第三世之餘甘贄行者二則六祖下第四世之四清源下第三世龍潭崇信禪師二則道吾宗智禪師六則雲巖曇晟禪師七則百巖明哲禪師一則船子德誠禪師二則藥山高沙彌二則刺史李翱居士一則翠微無學禪師一則孝義性空禪師一則仙天禪師二則馬頰本空禪師一則三平義忠禪師一則卷第十八祖師機緣六祖下第四世之五南嶽下後第三世之一趙州從諗禪師二十則卷第十九祖師機緣六祖下第四世之六南嶽下後第三世之二趙州禪師之二草五則卷第二十祖師機緣六祖下第四世之七南嶽下後第三世之三趙州禪師之餘草四則芙蓉靈訓禪師二則五臺智通禪師一則鎮州普化和尚六則卷第二十一祖師機緣六祖下第四世之餘南嶽下後第三世之餘五臺祕魔和尚一則湖南祗林和尚一則河中公畿和尚一則六祖下第五世之一南嶽下前第四世之一臨濟宗臨濟義玄禪師十七則卷第二十二祖師機緣六祖下第五世之二南嶽下前第四世之二睦州陳尊宿十七則烏石靈觀禪師四則相國裴休居士四則新興嚴陽尊者一則杭州多福和尚一則興化石梯禪師一則大隨法真禪師六則靈樹如敏禪師二則漳州浮石禪師一則卷第二十三祖師機緣六祖下第五世之三南嶽下前第四世之餘靈雲志勤禪師五則金華俱胝和尚二則末山尼了然禪師一則六祖下第五世之四清源下第四世之一德山宣鑒禪師十四則卷第二十四祖師機緣六祖下第五世之五清源下第四世之二曹洞宗洞山良價禪師草六則神山僧密禪師三則石霜慶諸禪師六則漸源仲興禪師一則夾山善會禪師十則卷第二十五祖師機緣六祖下第五世之六清源下第四世之餘清平令遵禪師二則投子大同禪師十九則六祖下第五世之七南嶽下後第四世之一溈仰仰山慧寂禪師草二則香嚴智間禪師五則卷第二十六祖師機緣六祖下第五世之餘南嶽下後第四世之餘溈仰京兆府米和尚二則王敬初常侍三則三角法遇菴主一則六祖下第六世之一南嶽下第五世之一臨濟興化存獎禪師八則寶壽沼禪師六則三聖慧然禪師三則魏府大覺和尚二則灌溪志閒禪師二則定州善崔禪師一則襄州歷村和尚一則虎溪菴主一則桐峯菴主一則滄州米倉禪師一則雲山和尚一則刺史陳操尚書二則卷第二十七祖師機緣六祖下第六世之二南嶽下第五世之餘溈仰霍山景通禪師二則南塔光湧禪師二則無著文喜禪師三則六祖下第六世之三清源下第五世之一大光居誨禪師一則九峯道虔禪師十則鳳翔石柱禪師一則湧泉景欣禪師二則雲蓋志元禪師一則覆船洪薦禪師一則張拙秀才一則洛浦元安禪師十二則卷第二十八祖師機緣六祖下第六世之四清源下第五世之二韶山寰普禪師五則天蓋山幽禪師一則太原海湖禪師一則巖頭全奯禪師十三則雪峯義存禪師草一則卷第二十九祖師機緣六祖下第六世之五清源下第五世之三雪峯禪師之餘十一則高亭簡禪師一則曹洞雲居道膺禪師十則曹山本寂禪師草一則卷第三十祖師機緣六祖下第六世之餘清源下第五世之餘曹洞龍牙居遁禪師八則疏山匡仁禪師十二則越州乾峯和尚四則欽山文邃禪師三則白水本仁禪師一則天童咸啓禪師二則京兆蜆子和尚一則九峯普滿和尚一則幽棲道幽禪師一則六祖下第七世之一南嶽下第六世之一臨濟南院慧顒禪師五則卷第三十一祖師機緣六祖下第七世之二南嶽下第六世之餘臨濟鎮州寶壽禪師二則西院思明禪師一則魯祖山教禪師一則溈仰資福如寶禪師一則芭蕉慧清禪師二則六祖下第七世之三清源下第六世之一瑞巖師彥禪師一則羅山道閒禪師五則玄沙師備禪師十九則卷第三十二祖師機緣六祖下第七世之四清源下第六世之二長慶慧稜禪師七則保福從展禪師六則鏡清道怤禪師十則鼓山神晏國師三則翠巖令參禪師一則太原孚上座四則雲門宗門文偃禪師七則卷第三十三祖師機緣六祖下第七世之五清源下第六世之三雲門禪師之二三十則卷第三十四祖師機緣六祖下第七世之餘清源下第六世之餘雲門禪師之餘草五則谷山有緣禪師一則白雲善藏禪師一則禾山無殷禪師一則同安常察禪師四則新羅泊嚴和尚一則新羅大嶺禪師一則曹洞杭州佛日和尚一則同安丕禪師二則朱溪謙禪師二則雲居道簡禪師三則歸宗懷惲禪師一則新羅雲住和尚一則荷玉光慧禪師一則育王弘通禪師一則金峯從志禪師五則曹山慧霞禪師二則黃蘗山慧禪師一則護國守澄禪師五則報慈藏嶼禪師一則廣德延禪師一則石門獻蘊禪師一則木平善道禪師二則卷第三十五祖師機緣六祖下第八世之一南嶽下前第七世臨濟風穴延沼禪師十二則穎橋安禪師二則溈仰資福貞邃禪師一則芭蕉繼徹禪師一則六祖下第八世之二清源下第七世黃龍誨機禪師一則明招德謙禪師二則地藏桂琛禪師二則大龍智洪禪師三則白馬行靄禪師一則曹洞薦福思禪師一則同安志禪師二則廣德義禪師二則廣德周禪師一則石門慧徹禪師三則太陽慧堅禪師一則雲門德山緣密禪師一則巴陵皓鑑禪師四則般若啓柔禪師一則香林澄遠禪師六則卷第三十六祖師機緣六祖下第八世之餘南嶽下後第七世雲門洞山守初禪師四則奉先深禪師一則薦福承古禪師一則雙峯竟欽禪師一則六祖下第九世之一南嶽下第八世臨濟首山省念禪師九則六祖下第九世之二清源下第八世之一法眼宗法眼文益禪師十四則清溪洪進禪師一則龍濟紹修禪師四則卷第三十七祖師機緣六祖下第九世之餘清源下第八世之餘曹洞梁山緣觀禪師四則雲頂德敷禪師一則石門紹遠禪師一則雲門文殊應真禪師二則南臺勤禪師一則五祖師戒禪師四則智門光祚禪師四則蓮華峯祥菴主一則六祖下第十世之一南嶽下第九世臨濟汾陽善昭禪師三則葉縣歸省禪師一則谷隱蘊聰禪師二則廣慧元璉禪師一則六祖下第十世之餘清源下第九世雲門北禪智賢禪師二則洞山曉聰禪師三則雪竇重顯禪師十二則雲蓋繼鵬禪師一則天平從禪師一則曹洞太陽警玄禪師二則法眼天台德韶國師二則清涼泰欽禪師一則報恩玄則禪師一則永明道潛禪師一則卷第三十八祖師機緣六祖下第十一世之一南嶽下第十世臨濟石霜慈明禪師十五則琅琊慧覺禪師二則大愚守芝禪師二則法華全舉禪師三則大道谷泉禪師一則天聖皓泰禪師一則浮山法遠禪師三則內翰楊文公億三則六祖下第十一世之餘清源下第十世雲門雲居曉舜禪師一則玉泉承皓禪師一則天衣義懷禪師七則法昌倚遇禪師一則曹洞投子義青禪師二則法眼永明延壽禪師二則九曲慶祥禪師一則上方遇安禪師一則六祖下第十二世之一南嶽下第十一世之一臨濟黃龍慧南禪師一則卷第三十九祖師機緣六祖下第十二世之二南嶽下第十一世之餘臨濟黃龍禪師之餘四則楊岐方會禪師十則六祖下第十二世之餘清源下第十一世曹洞芙蓉道楷禪師四則六祖下第十三世南嶽下第十二世臨濟黃龍祖心禪師二則白雲守端禪師五則保寧仁勇禪師二則比部孫居士一則六祖下第十四世南嶽下第十三世臨濟五祖法演禪師十則兜率從悅禪師一則法雲杲禪師一則六祖下第十五世南嶽下第十四世臨濟昭覺圜悟禪師二則太平佛鑑禪師一則龍門佛眼禪師一則金陵俞道婆一則卷第四十祖師機緣六祖下第十六世南嶽下第十五世臨濟虎丘紹隆禪師一則徑山大慧禪師三則正堂明辨禪師一則大溈月菴禪師一則六祖下第十七世南嶽下第十六世臨濟天童應菴禪師二則育王佛照禪師二則水菴師一禪師一則六祖下第十八世南嶽下第十七世臨濟彥充肯堂神師一則密菴咸傑禪師一則伊菴有權禪師一則焦山或菴禪師一則六祖下第十九世南嶽下第十八世臨濟松源崇嶽禪師四則六祖下第二十世南嶽下第十九世臨濟天目文禮禪師一則荊叟珏禪師一則六祖下第二十一世南嶽下第二十世臨濟石溪心月禪師一則虗堂智愚禪師一世未詳承嗣樓子和尚一則杜順和尚一則月氏國王一則西天外道一則老宿一則茶陵郁山主一則二菴主一則古德五則宋太宗皇帝四則錢塘鎮使一則燒菴婆一則
