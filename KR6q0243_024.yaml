body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第五世之五清源下第四世之二曹洞宗增收筠州洞山良價悟本禪師嗣雲巖因辭雲巖臨行問百年後忽有人問還邈得師真否如何抵對巖良久曰祇這是師沉吟巖曰價闍黎承當個事大須審細師猶涉疑頌曰體量非功不墮今星移斗換豈同輪多年曆日雖無用犯著應須總滅門正堂辨洞山因過水睹影大悟前旨有偈曰切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如頌曰動靜從來每與俱回頭驀地始逢渠直饒與麼猶堪笑喚作如如又却迂本覺一水中影子因身有若實無身影亦無百尺竿頭才進步一毫端上現毗盧圓悟勤增收洞山後因供養雲巖真有僧問先師道只這是莫便是否師曰是曰意旨如何師曰當時幾錯會先師意曰未審先師還知有也無師曰若不知有爭解恁麼道若知有爭肯恁麼道頌曰爭解恁麼道五更雞唱家林曉爭肯恁麼道千年鶴與青松老寶鑑正明驗正偏玉機轉側看兼到門風大振兮規步綿綿父子變通兮聲光浩浩天童覺增收洞山辭雲巖巖曰自此一別難得與汝相見師曰不然自此一別難得與和尚不相見頌曰高高孤頂雪濛濛劫外行藏路不通半夜嶺梅消息轉不關春色暗香濃正堂辨增收洞山首謁南泉值馬祖忌修齋次泉曰未審馬祖還來應供否衆無對師出云待有伴即來泉曰此子雖後生却堪雕琢師曰莫壓良為賤頌曰白雲之賓青山伴位裡借切看互換無底合盤轉手擎穿心碗子通身飯天童覺千尺絲綸直下垂一波才動萬波隨江上晚來堪畫處漁人披得一蓑歸闡提點有伴即來地闢天開冷光重出匣古路絶纖埃萬象森羅齊合掌須彌岌崿舞三臺最庵印增收洞山參溈山問曰頃聞南陽忠國師有無情説法話某甲未究其微溈曰我這裡亦有祇是罕遇其人師曰乞師指示溈曰父母所生口終不為子説師曰還有與師同時慕道者否溈曰此去澧陵攸縣石室相連有雲巖道人若能撥草瞻風必為子之所重師既到雲巖問無情説法甚麼人得聞巖曰無情得聞師曰和尚聞否曰我若聞汝即不聞吾説法也師曰某甲為甚麼不聞巖竪拂子曰還聞麼師曰不聞曰我説法汝尚不聞況無情説法乎師曰無情説法該何典教曰豈不見彌陀經云水鳥樹林悉皆念佛念法師於是有省述偈曰也大奇也大奇無情説法不思議若將耳聽終難會眼處聞時方得知頌曰者箇分明有情無情者箇最親無處不真一打不著萬劫沉淪一透不破驢牽鐵磨一朝透徹以楔出楔鼻安面上口裡有舌不借不借東説西説要休便休要歇便歇無情説法有情聽有情説法無情別不是等間虗作解大地山河太饒舌人人盡有不相應露柱燈籠向你説大溈智好好萬象森羅俱是寶頭頭物物現家珍不識之人即荒草南堂興南陽師肌骨好洞山價也難討溈山翁雲巖老重注破成鼓倒分明行官路不覺入荒草葛藤因此到而今業識茫茫何日了月堂昌洞山示衆曰秋初夏末兄弟或東去西去直須向萬里無寸草處去始得又云只如萬里無寸草處且作麼生去後有僧到瀏陽舉似石霜霜云出門便是草僧回舉似師師曰大唐國裡能有幾人頌曰出門便是太忙然萬里無來未得圓欲識家山門去路暮煙輕鎖緑綿綿佛慧泉草漫漫門裡門外君自看荊棘林中下腳易夜明簾外轉身難看看幾何般且隨老木同寒瘠將逐春風入燒瘢天童覺出門便是草間殺龍門老北去禮文殊南來登五老鬢髮已蒼浪言歸恨不早獨立秋風前思量望江島好好不用更尋討龍門遠萬里無寸草但請恁麼去出門便是草各自有公據有公據何拘束清風月下守株人涼兔漸遙春草緑徑山杲不出漫漫草路遮出門猶更隔天涯回機踏著通霄路何處青山不是家疏山如續收庭前黃葉亂紛紛階下苔錢似錦紋戶外任教荒草緑石人踏斷海山雲淨因成萬里無寸草出門便絆倒爭如不動塵四山日杲杲壁立萬仞絶承當天上人間無處討無處討忽然突出拄杖頭直趨寶山親取寶圓悟勤新豐路坦然豈止正偏圓萬里無寸草何人可向前機不轉墮塵緣透得脫犯風煙瀏陽端的破中邊出門已是草芊綿投機倘若諳來脈兩岸俱玄一不全佛鑑勤虗玄鳥道沒纖埃玉殿空然瑣緑苔挂壁梭飛秋蛻骨滄溟老蚌盡懷胎足菴鑒洞山因僧問寒暑到來如何回避師曰何不向無寒暑處去曰如何是無寒暑處師曰寒時寒殺闍黎熱時熱殺闍黎頌曰垂手還同萬仞崖正偏何必在安排琉璃古殿照明月忍俊韓獹空上階雪竇顯無寒暑處如何唱和熱即乘涼寒即向火多口阿師一場懡㦬人人盡欲出常流折合還歸炭裡坐泉大道熱時熱殺寒時寒寒暑由來總不干行盡天涯諳世事老君頭戴楮皮冠湛堂準偏中有正正中偏流落人間千百年幾度欲歸歸未得門前依舊草芊芊長靈卓無寒暑處洞山語多少禪人迷處所寒時向火熱乘涼一生免得避寒暑佛燈珣無寒暑處為君通枯木生花又一重堪笑刻舟求劒者至今猶在冷灰中佛性泰續收裡頭看勿寒暑直下滄溟瀝得乾我道巨鼇能俯首笑君沙際弄釣竿天童覺水到渠成風行草偃類之不齊覩之難面誰信崖頽石裂時黃金白銀如糞泥月堂昌盤走珠珠走盤偏中正正中偏羚羊挂角無蹤迹獵犬繞林空踧踖圓悟勤避暑逃寒問是非不離寒暑少人知正中來也無回互句裡藏鋒辨者稀嚴天雪火雲飛風吹日炙杜闍黎冶父川寒時寒熱時熱無寒暑處天然別綿州附子漢州薑打刀須是邠州鐵洞山老子不瞞人親傳當面藏身訣鼓山圭寒暑分明説向君不容擬議辨疏親匾簷驀折兩頭脫舉目長空一笑新松源嶽洞山因僧問三身中那身不墮衆數師曰吾常於此切後有持此問曹山先師道吾常於此切意作麼生山云要頭便斫去又問雪峯雪峯以拄杖打云我亦曾到洞山來頌曰此切堪傷向外求至親何故似怨讎始終滿面無慙色更有曹山乞你頭保寧勇不入世未循緣劫壺空處有家傳白蘋風細秋江暮古岸船歸一帶煙天童覺續收玉鞭才舉乾坤靜皇道私無顯至尊貴極鑾輿才指斥將軍正令不容存正堂辨三人證龜喚作鱉啞子得夢向誰説電光影裡浪驅馳踏破澄潭一輪月木菴永吾常於此切不是神仙訣洞山空腹高心曹山寧可截舌切切不是標名虗事椃未了吾今為君訣棘田心洞山因僧問亡僧遷化向什麼處去師曰火後一莖茆頌曰野火燒時越轉新至今煙𦦨雨難淋旱地紅蓮遮日月無根樹長翠成陰投子青春風吹動緑波搖無限船師逐海潮只見江鷗飛白浪豈知明月在雲霄枯木成善應隨流妙意深明明一箭中紅心當鋒不是由基眼對面鐵山高萬尋佛智裕續收古人出世最難遭唯有江西路更高人問亡僧遷化事便言火後一莖茆石門聰雖然火過一堆灰爭奈人情會見稀畢竟水須朝海去到頭雲定覓山歸佛鑑勤增收洞山有頌云五臺山上雲蒸飯佛殿階前狗尿天幡竿頭上煎䭔子三箇胡孫夜簸錢頌曰山猱得樹尾連顛笑道階除夜簸錢敲磕髑髏無用處從來千聖不曾傳增收洞山因老宿拈袈裟角問云父母未生時還有這箇麼師曰只今豈是有耶宿搖手頌曰轉位投機覓更難回途復妙豈相關新豐洞口翻波浪一掃須教徹底乾正堂辨增收洞山有一僧在延壽堂不安要見師師至僧所僧便問和尚何不救取人家男女師曰你是什麼人家男女曰某甲是大闡提人家男女師良久僧曰四山相逼時如何師曰老僧亦從人家屋簷下過曰回互不回互師曰不回互曰教某甲向什麼處去師曰粟畬裡去僧噓一聲曰珍重便坐脫師以拄杖扣頭三下曰只解與麼去不解與麼來頌曰只解恁麼去沙禽夜宿滄洲樹不解恁麼來石筍穿開古路苔莫道鯤鯨無羽翼今日親從鳥道回天童覺聖量凡情淨盡時轉身無路事還非屋簷下過粟畬裡馬腹驢胎一道歸石溪月增收洞山因龍牙問如何是祖師西來意師曰待洞水逆流即向汝道頌曰洞水無緣會逆流見他苦切故相酬西來祖意實無意妄想狂心歇便休橫川珙增收洞山因僧問如何是空劫已前自己師曰白鳥入蘆花頌曰打起黃鶯兒莫教枝上啼幾回驚妾夢不得到遼西正堂辨增收洞山冬夜果子汝問泰首座曰有一物上拄天下拄地黑似漆常在動用中動用中收不得且道過在什麼處座曰過在動用中師曰侍者掇退果卓頌曰洞山果子誰無分掇退臺盤妙轉機今夜為君輕點破牡丹花下睡貓兒明極祚洞山玷辱家風首座埋沒自己雙雙繡出鴛鴦千古扶持不起運菴巖拄天拄地黑如漆不分晝夜是何物拈來拋向屎坑中火裡船蓮香拂拂虗堂愚增收洞山夜參不點燈有僧出問話退後師令侍者點燈乃召適來問話僧出來其僧近前師曰將取三兩粉來與這箇上座其僧拂袖而退自此省發遂罄捨衣資設齋得三年後辭師師曰善為時雪峯侍立問曰祇如這僧辭去幾時却來師曰他祇知一去不解再來其僧歸堂就衣鉢下坐化峯上報師師曰雖然如此猶較老僧三生在頌曰洞中日午打三更便有遊人把路爭除却華山陳處士誰人不帶是非行慈受深增收洞山因看病僧僧曰火風離散時如何師曰來時無一物去亦任從伊曰爭奈羸瘵何師曰須知有不病者僧曰如何是不病者師曰悟則無分寸不悟隔山坡僧曰前程還許卜度也無師曰雖然黑似漆成立在今時頌曰火風離散後一物鎮長靈佛國黃金地天堂白玉庭前程休卜度所至要惺惺一念心清淨人間亦只寧南堂興增收洞山不安僧問和尚病還有不病者麼師曰有曰不病者還看和尚否師曰老僧看他有分曰和尚看他時如何師曰老僧看他時則不見有病頌曰卸却臭皮袋拈轉赤肉團當頭鼻孔正直下髑髏乾老醫不見從來癖少子相逢向近難野水瘦時秋潦退白雲斷處舊山寒須勦絶莫顢頇轉盡無功伊就位孤標不與汝同盤天童覺增收洞山因僧問和尚教學人行鳥道未審如何行鳥道師曰不逢一人曰如何行師曰直須足下無私句曰祇如行鳥道莫便是本來面目否師曰闍黎因甚顛倒曰甚麼處是學人顛倒師曰若不顛倒因甚麼却認奴作郎曰如何是本來面目師曰不行鳥道頌曰古路翛然倚太虗行玄猶是涉崎嶇不登鳥道雖為妙點撿將來已觸途丹霞淳增收洞山問僧世間何物最苦曰地獄最苦師曰不然在此衣線下不明大事是名最苦頌曰人生最苦不知休逐浪隨波真可憂一句若能超佛祖蒙頭壞衲更何求枯木成鑊湯爐炭幾何般地獄三途未苦酸須信新豐親切語袈裟之下莫顢頇丹霞淳增收洞山曰一大藏教只是箇之字頌曰點畫分明無道理老胡幾度提不起不如分付王右軍無限風流歸手裡白雲端增收洞山參興平便禮拜興曰莫禮老朽師曰禮不老朽者興曰渠不受禮師曰渠不曾禮頌曰渠非老朽不禮不受威音世前毗盧頂後把定壺中白日長觸著匣內青蛇吼良醫叮囑病人服藥不如忌口天童覺上座莫要禮老朽興平未易揚家醜尊貴從來不出門渠儂豈在威音後自得暉增收洞山因僧問如何是衲僧孔竅師曰十八女兒不繫裙頌曰衲僧孔竅少人知剛被宗師已識機十八女兒裙未繫先教阿母畫蛾眉海印信增收洞山因僧問時時勤拂拭莫遣惹塵埃為甚麼不得他衣鉢師曰直饒道本來無一物也未合得他衣鉢且道什麼人合得僧下九十六轉語皆不契末後云設使將來他亦不受師深肯之頌曰祖師衣鉢漫悠哉不受渠猶眼未開誰信普通年遠事豈從蔥嶺付將來本覺一增收洞山不安令沙彌傳語雲巖乃囑曰他或問和尚安樂否但道雲巖路相次絶也汝下此語須遠立恐他打汝沙彌領旨去傳語聲未絶早被雲巖打一棒沙彌無語頌曰洞山有路透雲巖絶處教通到者難拄杖頭邊開活路方知不隔一毫端絶象鑑年老心孤是洞山引人行路絶躋攀者僧若也知機變一去雲巖更不還竹屋簡增收潭州神山僧密禪師嗣雲巖與洞山行次忽見白兔走過師曰俊哉洞曰作麼生師曰大似白衣拜相洞曰老老大大作這箇説話師曰你作麼生洞曰積代簪纓暫時落魄頌曰即日貴人舊家貧漢兄弟相承尊卑互換向晚途中眼不開夜明簾外機旋轉騎牛戴帽異中來百鍊真金色不變天童覺二抗力雪霜平步雲霄下惠黜國相如過橋蕭曹謀略能成漢巢許身心欲避堯寵辱若驚深自信真情參迹混漁樵白衣拜相喜難加暫時流落向天涯移身換步人難見夜來歸宿五侯家佛性泰衣錦還鄉人盡見長時富貴許誰知無言童子呵呵笑嬴得風光滿面歸伊庵權增收神山把針次洞山問曰作甚麼師曰把針曰把針事作麼生師曰針針相似曰二十年同行作這箇語話豈有與麼工夫師曰長老又作麼生曰如大地火發底道理頌曰大地火發間不容髮南海崑崙天寒不襪祖祖相傳一頭搕𢶍天童覺逆放順收將寡敵衆隱顯同途得失共用針針相似不外來同行語話要分開自從大地火發後古廟香爐不著灰月堂昌增收神山與洞山過獨木橋洞先過了拈起木橋曰過來師喚價闍黎洞乃放下木橋頌曰平地無端鑿陷坑木橋拈起使人行沉沉寒水如何渡月夜金雞報五更丹霞淳增收潭州石霜山慶諸禪師嗣道吾抵溈山為米頭一日篩米次溈曰施主物莫拋撒師曰不拋撒溈於地上拾得一粒曰汝道不拋撒這箇是甚麼師無對溈曰莫輕這一粒百千粒盡從這一粒生師曰百千粒從這一粒生未審這一粒從甚處生溈呵呵大笑歸方丈頌曰萬廩千倉常住物出生來歷要分明不知一粒從何得雨過西山爽氣清枯禪鏡石霜在方丈內僧在窗外問咫尺之間為甚麼不覩師顏師曰遍界不曾藏僧舉問雪峯遍界不曾藏意旨如何峯曰甚麼處不是石霜師聞曰這老漢著甚麼死急峯聞曰老僧罪過玄沙云山頭老漢蹉過石霜頌曰千疑萬慮扣禪關遍界非藏豈小言象骨玄沙猶定動誤他遊子失歸源高賢不用隨聲色地久天長自對門汾陽昭石霜雪老盡悠悠月下相逢互唱酬爭似釣螺江上客一聲漁笛過滄洲佛慧泉雙眸自小患生盲兩耳從來只聽聲指點萬端都不見如何彈指得分明保寧勇咫尺之間不覩師顏幸然獨露誰作遮攔老倒石霜曾指月區區雪老重饒舌釣魚船上謝三郎金剛腦後添生鐵南華昺續收咫尺之間問石霜師云遍界不曾藏閙市交關急著眼塞北牛馬海南番洞山聰遍界不曾藏千眼應難見雖然咫尺間欲覓無背面象骨苦提撕箇中猶未辨玄沙與發機射人用好箭投子舒石霜因僧問如何是和尚深深處師曰無鬚鎖子兩頭搖頌曰三更月落兩山明古道程遙苔滿生金鎖搖時無手犯碧波心月兔常行投子青無鬚鎖子卒難開枯木堂中莫亂猜千古兩頭搖不動待他麟角衲僧來保寧勇增收石霜示衆云百尺竿頭如何進步頌曰百尺竿頭坐底人雖然得入未為真百尺竿頭須進步十方世界現全身長沙岑瞎却頂門眼錯認定盤星𢬵身能捨命一盲引衆盲無門開增收石霜因裴相國來師奪公手中笏曰在天子手中為圭在官人手中為笏在山僧手裡喚作什麼公無對乃留下笏頌曰不是圭兮不是笏反身直入蒼龍窟拿得驪龍照海珠知君大手方拈出雪竇顯不是圭兮不是笏祖祖相傳非外物掣電光中著眼看直下承當早埋沒遇作家須拈出中下聞之生恍惚太平恁麼多羅畢竟未離窠窟那堪明眼人前特地一場忉怛佛鑑勤潭州漸源仲興禪師嗣道吾一日隨道吾往檀越家弔慰拊棺曰生邪死邪吾曰生也不道死也不道師曰為甚麼不道吾曰不道不道歸至中路師曰和尚今日須與某甲道若不道打和尚去也吾曰打即任打道即不道師便打吾歸院曰汝宜離此去恐知事得知不便師乃禮辭隱于村院三年後忽聞童子念觀音經至應以比丘身得度者即現比丘身忽然大省遂焚香遙禮曰信知先師遺言終不虗發自是我不會却怨先師先師既沒唯石霜是嫡嗣乃造石霜霜見便問前來打先師因緣會也未師進曰却請和尚道一轉語霜曰不見道生也不道死也不道師遂禮拜石霜設齋懺悔他日持鍬復到石霜於法堂上從東過西從西過東霜曰作麼師曰覓先師靈骨霜曰洪波浩渺白浪滔天覓甚先師靈骨師曰正好著力霜曰這裡針劄不入著甚麼力師持鍬肩上便出頌曰兔馬有角牛羊無角絶毫絶釐如山如嶽黃金靈骨今猶在白浪滔天何處著無處著隻履西歸曾失却雪竇顯終日挨門復倚樓幾回明鏡照梳頭一從事却潘郎後也解人前不識羞保寧勇道吾解語無舌漸源無手行拳打得魂消魄喪方得此道流傳石霜為父雪耻苦屈之言難宣鍬子持來四顧茫茫白浪滔天黃金靈骨今何在留鎮閻浮千萬年妙湛慧木人把板雲中唱石女穿靴水上行生死死生休更問從來日午打三更長靈卓生也全機現死也全機現不道復不道箇中無背面直下便承當不隔一條線逼塞太虗空赤心常片片圓悟勤無鬚鎖子兩頭搖無瑕璧玉三回獻反遭刖足太無端誰料正言還似反佛性泰當時苦口曾不道悟來靈骨方尋討練江寒月兩蕭蕭浮雲散盡天如掃夢庵信生邪不道死邪不道一片清風閙浩浩一時漏泄道吾機反著襴衫倒頂帽楚安方續收本地靈明無一物幾人認得黃金骨扶鍬肩上便行時大辨從來還若訥丹霞淳生前曾弗遇知音死後徒將靈骨尋只在目前何處覓黃金鎖子任浮沉本覺一明頭落節暗裡喫交毒手當渠癢處搔雪裡鷺鷥飛不見一隻銀瓶挂樹梢雪竇宗無生曲子物外禪客唱者能唱拍者能拍唱拍相隨秋天月白大鵬展翅滄溟窄浩浩清風生羽翮南堂興急水灘頭下釣時錦鱗紅尾尚遲疑驀然跳出洪波裡霧拏雲宇宙低應庵華增收澧州夾山善會禪師嗣船子初住京口寺因僧問如何是法身師曰法身無相又問如何是法眼師曰法眼無瑕時道吾失笑師遂請益後散衆參船子省發後歸聚徒道吾令僧往問如何是法身師曰法身無相又問如何是法眼師曰法眼無瑕僧回舉似吾吾曰者漢此回方徹頌曰法身無相法眼無瑕因風吹火借水獻花絲毫不立萬別千差但看來年二三月銜泥燕子入人家慈受深臭口開來經萬劫絲毫才動鐵輪隨雲收雨散月明夜反動江波説向誰木庵永夾山因僧問撥塵見佛時如何師曰直須揮劒若不揮劒漁父栖巢僧後問石霜撥塵見佛時如何霜曰渠無國土甚處逢渠僧回舉似師師曰門庭施設不無老僧入理深談猶較石霜百步頌曰當機一句玉珊內外玲瓏溢目寒無漏國中曾不住月華影裡見應難丹霞淳不立纖毫已是塵那堪奔走問他人高揮寶劍無蹤迹月裡姮娥現半身枯木成拂牛劒氣洗兵威定亂歸功更是誰一旦氛埃清四海垂衣皇化自無為天童覺太阿在手誰敢當鋒青山萬朵白雲重重京兆天寧璉續收學佛人人被熱謾撥塵見得幾何般狂風掃地雲吹散獨立闌干宇宙寬別峯印隱顯全該不露顏白雲繚繞舊家山石人半夜敲金鎖天曉泥牛過玉關拗堂仁夾山因僧問如何是佛師曰此位無賓主曰尋常與甚人對談師曰文殊與吾携水去普賢猶未折花來頌曰親言言處幾人知今古無儔類莫齊玉馬雪行歸夜半羚羊挂角日沉西投子青當頭不犯難開口假借傍來落二三卓爾混融無向背西天佛是老瞿曇枯木成大方獨立峭巍巍八面玲瓏萬象圍正坐當軒無位位圓通無礙應群機踈山如夾山因僧問如何是夾山境師曰猿抱子歸青嶂後鳥銜花落碧巖前後來法眼云我二十年祇作境話會頌曰月皎青松鶴夢長碧霄丹桂挂羚羊巖高壁仞千峯雪石筍生條半夜霜投子青蚌含明月珠生腹龍擁深雲雨灑空莫向平田翻巨浪直須點點盡朝東丹霞淳古鏡重磨又一新一回出匣一驚人石頭城下風雷吼老老禪翁把要津寶峯祥二十年前此地遊木蘭花發院新修如今再到經行地樹老無花僧白頭鼓山圭境話會來猶未是却問而今作麼生清涼元自鼻頭直夾山依舊兩眉橫徑山杲續收古路雪深覆好山雲更遮雁聲天外急遊子夜還家瞞庵戌月挂寒松碧嶂深石人未會雪中吟從前此曲知音少鶴唳青霄出鳳林枯木成山邊水邊待月明暫向人間借路行如今還向山邊去只有湖水無行路天目禮增收夾山示衆云目前無法意在目前不是目前法非耳目之所到頌曰九轉靈丹難却易一鎚便當易還難相逢話盡壺中事重把仙書子細看長靈卓年來萬事總成魔老去間添白髮多道泰不傳天子令時清休唱太平歌鼓山圭癡人面前休説夢生鐵團上須有縫明明説與却佯聾只管外邊間打哄徑山杲握不成團撥不開德雲幾度下崔嵬有時行到海南岸密密還從舊路回最庵印增收夾山普請次維那命佛日送茶日云某甲只為佛法來不為送茶來那云和尚令請上座日云和尚即得日乃將茶去作務處見師遂撼茶碗作聲師不顧日云釅茶三五碗意在钁頭邊師曰瓶有傾茶勢藍中幾箇甌日云瓶有傾茶勢藍中無一甌便傾茶大衆俱以目視之日云大衆鶴望乞師一言師曰路逢死蛇莫打殺無底籃子盛將歸日云手執夜明符幾箇知天曉師召大衆已有人也歸去來乃住普請頌曰路逢死蛇莫打殺無底藍子須揚下往往事從間話生莫將間話為間話朴翁銛擔板漢沒拘束餓死首陽山誓不食周粟虗堂愚夾山在溈山作典座溈問今日喫甚菜師曰二年同一春溈曰好好修事著師曰龍宿鳳巢頌曰相逢借問衆僧麋莫比庵園香飯施紫氣夜隨丹鳳轉金龍曉纏月中枝投子青變生為熟逐時新好是二年同一春龍宿鳳巢輕奮意調和味塞口多人正覺逸雨過龍庭苔蘚潤夜央金殿燭初紅宮姬雅奏升平曲禁外虗勞視聽聰大洪預續收龍宿鳳巢裡二年同一春桂花香撲撲平地是青雲大洪恩增收夾山嘗遣一小師遍遊禪剎殊無趣向及聞師道譽遠播乃回省覲云和尚有如許奇特事何不早向某甲道師曰汝蒸飯時吾為著火汝行益時吾為展鉢甚處是孤負汝處小師因而悟入頌曰汝蒸飯時吾著火汝行益時吾展鉢尋常恁麼老婆心自是你儂機不活機若活夾山本無奇特事百川倒流閙聒聒癡絶沖增收夾山因僧問會處却不問不會處請師一言師曰戶挂凋林影中辨取頌曰威音那畔不能行撒手還家懶問程寢殿無人空寂寂滿窗唯有月虗明丹霞淳
