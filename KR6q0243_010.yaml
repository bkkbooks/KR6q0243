body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第三世之一南嶽下第二世之一洪州百丈山懷海大智禪師嗣馬祖再參馬祖祖於禪牀角取拂子示之師曰只遮箇更別有祖乃放舊處曰你已後將什麼為人師却取拂子示之祖曰只遮箇更別有師以拂子挂安舊處方侍立祖叱之後檀信請住大雄山巖巒峻極故號之百丈一日師謂衆曰佛法不是小事老僧昔日被馬大師一喝直得三日耳聾眼黑黃蘗聞舉不覺吐舌頌曰每因無事侍師前師指繩牀角上懸舉放却歸本位立分明一喝至今傳汾陽昭悟了遊方却再還全機大用久當權若無喝下忘知解良馬何曾離得鞭佛印元大寂雄峯再會時相將行處草離離回頭一喝乾坤暗兩耳俱聾總不知正覺逸一喝叢林辨者稀耳聾今古強針錐燈籠拊掌呵呵笑露柱低頭却皺眉海印信一喝分明守死灰青天赫日起風雷傍人拊掌呵呵笑唯有知音吐舌來淨照臻放收誰道沒譊訛漏泄機關見也麼一喝如雷聞者喪耳聾三日未為多佛慧泉未明大智再參尋相逐相隨用不任斷浪絶流全體現一聾三日孰知音照覺總客情步步隨人轉有大威光不能現突然一喝雙耳聾那吒眼開黃蘗面真淨文顧視拈來事已同師資相見展家風因思昔日鼻頭痛一喝分明三日聾佛國白木馬踏殺閻浮人泥牛飲竭滄溟水霹靂滿空山嶽摧看看平地波濤起保寧勇馬祖親傳古佛心海禪百丈是知音當時一喝聾三日無見無聞直至今智海清雨霽遊雲尚未歸晴空忽地一聲雷嶺梅已得春消息不比山桃一例開上方益放去拈來更是誰青山時見白雲歸孤峯坐斷無餘事翻笑蟾輪對落暉京兆府天寧璉馬駒一喝大雄峯聲入髑髏三日聾黃蘗聞之驚吐舌江西從此立宗風張無盡百丈重來參馬祖相逢便指曹溪路休言一喝雙耳聾須知別有親聞處疏山常大機大用不虗傳挂拂遭呵豈偶然打破畫瓶歸去後從教千古黑漫漫南華昺挂拂遭呵耳便聾衲僧奚苦驗宗風金剛腦後抽生鐵華嶽三峯倒卓空龍門遠江西一喝動乾坤大用全機是滅門三日耳聾風過樹纍他黃蘗喪兒孫鼓山圭馬駒腳下喪家風四海從茲信息通烈火焰中撈得月巍巍獨坐大雄峯徑山杲挂拂親遭喝當下舌頭脫把起便相呈為君重提掇要知三日聾大地如塵末楚安方續收踏著船頭把釣竿浪粗風緊得魚難翻思幾處雲為雨只見四方爭出山翠巖真父子相逢臭味同龍泉寶劒再磨礱要明馬祖當年喝大地山河盡耳聾慈受深迅雷吼破澄潭月當下曾經三日聾去却膏肓必死疾叢林從此有家風虎丘隆一喝非唯三日聾龍威虎勢也潛蹤從前汗馬無人識只要重論蓋代功訥堂思父子相將草裏遊人前拈弄幾包羞返雷一震驚天地直得滄溟絶點流懶菴需頂門一擊塗毒鼓生殺全機振古今雪後始知松柏操事難方見丈夫心尼無著總馬駒蹴踏非驢事要使兒孫腳下行三日耳聾猶可怪謾勞灼卜聽虗聲牧菴忠喝聲絶處怒雷收喪盡家風一不留總是戰爭收拾得却因歌舞破除休石菴玿精金無變色因甚聾三日一字入公門九牛車不出肯堂充風雲會合又相期覿面難明第一機霹靂一聲天地迫西河師子却生兒龍牙言世路風波不見君愁腸暗寫共誰論迅雷才震清飈起白日一天星斗分木菴永匹馬單鎗與麼來鐵連之陳勢難開忽然一棒鑼聲響不動干戈得勝回野雲南一喝當頭雷電奔人間説亦暗銷魂看來豈止聾三日直至如今海嶽昏雪菴瑾啐之機類不同飛星撒火髑髏空偷心死盡難為語忽見金烏出海東虗堂愚增收溈山問仰山百丈再參馬祖竪拂因緣此二尊宿意旨如何仰曰此是顯大機之用溈曰馬祖出八十四人善知識幾人得大機幾人得大用仰曰百丈得大機黃蘗得大用餘者盡是唱導之師溈曰如是如是頌曰家肥生孝子國霸有謀臣拳頭劈口捶未到無兒孫龍門遠百丈侍馬祖遊山次見野鴨飛過祖曰是甚麼師曰野鴨子曰甚麼處去也師曰飛過去也祖𢬟師鼻頭師負痛失聲曰阿耶耶阿耶耶祖曰又道飛過去也師於此契悟頌曰野鴨飛空却問僧要傳祖印付心燈應機雖對無移動才𢬟綱宗道可增汾陽昭野鴨子知何許馬祖見來相共語話盡山雲海月情依前不會還飛去却把住道道雪竇顯師資間向草中行野鴨飛鳴意忽生鼻孔𢬟翻成底事新羅日午打三更智海清流水有西東蘆花無背向沙鳥忽飛來漁人驚夜唱誰道月明無處尋元來只在秋江上上方益野鴨過前溪千峯凜寒色相顧不知歸未免資傍擊𢬟破疑團葛怛銷梢風直上透青霄雲山海月渾餘事一語歸宗萬國朝圓悟勤馬師憫汝無知識借來野鴨通消息直得鼻頭鮮血流費盡老婆多少方佛鑑勤草裏尋常萬萬千報云飛去豈徒然鼻頭是甚間皮革十字縱橫一任穿龍門遠野鴨野鴨無來無去飛去飛來本無去住忽然把住鼻頭看大地山河全體露太平古續收野鴨羣飛勢莫留瞥然一過已高秋和聲𢬟著平生痛短綆毋勞繫鼻頭佛燈珣野鴨從空過張三逢李大岸上繫孤舟黃牛解拽磨白楊順心燈不可付祖印亦難傳野鴨飛過去𢬟得鼻頭穿橫川珙增收百丈侍馬祖遊山歸侍者寮哀哀大哭同事問汝憶父母邪師曰無曰被人罵邪師曰無曰你哭作甚麼師曰我鼻孔被大師𢬟得痛不可徹同事曰有甚因緣不相契師曰你問取和尚去同事問馬祖曰海侍者有何因緣不契在寮中哭告和尚為某説祖曰是伊會也汝自問取同事歸寮曰和尚道汝會也教我自問汝師乃呵呵大笑同事曰適來哭如今為甚却笑師曰適來哭如今笑同事罔然頌曰一回思想一傷神不覺反然笑轉新雲在嶺頭間不徹水流澗下太忙生龍門遠有時笑有時哭悲喜交并暗催促此理如何舉向人斷弦須是鸞膠續徑山杲有時笑兮有時哭調高和寡難拘束一派清音徹九天風前誰解聯芳躅妙峯善哭不徹笑不徹倒腹傾腸向君説父子非親知不知擡頭腦後三斤鐵松源嶽百丈因溈山五峯雲巖侍立次師問溈山併却咽喉唇吻作麼生道溈曰却請和尚道師曰不辭向汝道恐已後喪我兒孫又問五峯峯曰和尚也須併却師曰無人處斫額望汝又問雲巖巖曰和尚有也未師曰喪我兒孫頌曰却請和尚道虎頭生角出荒草十洲春盡花凋殘瑚樹林日杲杲雪竇顯三和尚也併却龍頭陳上看謀略令人長憶李將軍萬里天邊飛一鶚和尚有也未金毛師子不踞地兩兩三三舊路行大雄山上空彈指三箇兒郎盡長成大家將本去經營其間消折兄嫌弟也有嬴錢弟怨兄保寧勇却請和尚道千人萬人所不到杲日曚曨海面紅清風凜凜霜天曉佛鑑勤三和尚也併却後人要踏前人腳其餘利鈍不同途畢竟到頭輸一著和尚有也未且向自身明見地未能展翼逆風飛少逐青雲千里志百丈因僧問如何是奇特事師曰獨坐大雄峯僧禮拜師便打頌曰祖域交馳天馬駒化門舒卷不同途電光石火存機變堪笑人來捋虎鬚雪竇顯巍巍獨坐鎮雄峯三尺龍泉握掌中堪笑人來挨白刃立為虀粉在誰躬正覺逸巍巍獨坐大雄山咳唾風生天地寒直下棒頭開正眼隔雲千里望長安野軒遵雄峯獨坐鎮巍巍四海歌謠滿路歧任是通身鋒刃者到來無不竪降旗海印信大機大用豈虗然獨坐雄峯自有權稍若錯傳王令者腦門須喫棒三千白雲端大雄峯頂獨巍巍直下橫分八字眉賴得縮頭知進退未嘗容易敢相虧保寧勇獨坐大雄峯言談宇宙空不行峯頂上四海路難通寶峰祥清風括地氣橫天獨坐雄峯有大權哮吼一聲巖洞裂更無狗迹到門前佛鑑勤續收醬裏著鹽雪中送炭才捋虎鬚棒頭有眼怪來獨坐大雄山他家曾踏上頭關圓悟勤雄峯獨坐不囊藏捉敗分明已見贓設或更求奇特事野狐涎唾涴諸方無際派百丈機先疾似風巍巍獨坐大雄峯要知奇特中奇特明月難教下碧空石田薰百丈每上堂有一老人常隨衆聽法衆退唯老人不退師問汝何人也曰吾非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某甲對曰不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問乃問大修行人還落因果也無師曰不昧因果老於言下大悟作禮曰某甲已脫野狐身住在山後敢乞依亡僧事例師令維那白椎告衆食後送亡僧衆驚異食後師領衆至山後巖下以杖挑出一死野狐乃依法火葬師至晚上堂舉前因緣黃蘗便問古人錯祗對一轉語五百生墮野狐身轉轉不錯合作箇什麼師曰近前來與汝道蘗近前與師一掌師拍手笑曰將謂胡鬚赤更有赤鬚胡靈源和尚觀諸家頌野狐話復為頌曰明明道不落老人何曾錯的的言不昧百丈何曾會不會將不錯渾然宣妙覺不落與不昧卓爾標正位全機因果有來由脫體升沉無忌諱非自非是誰是言下迷宗生擬議再問重教舉一回潛觀徹底起風雷逆風喝轉雷聲絶飲氣歸家藏醜拙他日如何舉似人雄峯撑破秋天月畫師畫地獄畫出百千般駐筆從頭看特地骨毛寒百丈政老人當日曾祗對五百生來由自悔一言才出馬難追纍他百丈成羣隊落不落昧不昧逃得須彌赴滄海寄語修行大徹人從來十字難更改佛印元不昧不落二俱是錯取捨未忘識情卜度執滯言詮無繩自縛廓爾太虗何處摸索海印信問來答去盡因緣流落寰區數百年自古自今諸衲子一人傳了一人傳淨照臻不落不昧成羣作隊師子咬人韓獹逐塊大洪恩大雄曾決野狐因五百生前錯墮身不落不昧如未曉年華又歷幾秋春照覺總五百生前墮野狐元來用處太心粗一字尚能招是報那堪心地更模糊佛迹昱大雄山裏大雄師曾謂言中脫野狐一劒令傳家國靜狼煙無使息亨途三祖宗不落不昧僧俗本無忌諱丈夫氣宇如王爭受囊藏被蓋一條楖𣗖任縱橫野狐跳入金毛隊大庾嶺圓五百生前墮此身而今依舊入紅塵相逢盡道休官去林下何曾見一人真如哲二大冶紅罏烹佛烹祖規模鎔盡識者罔措六合英雄無限幾箇能知痛癢臨川羡人取魚不如歸家結網寶峯祥百丈親曾見野狐為渠參請太心粗而今敢問諸禪客吐得狐涎盡也無枯木成不落與不昧依前入皮袋不昧與不落皮袋俱拋却令人長憶李將軍萬里天邊飛一鶚草堂清萬丈洪崖倚碧空人間有路不能通奈何一點雲無礙舒卷縱橫疾似風兜率悅臨機只為語偏枯五百生來墮野狐姹女已歸霄漢去呆郎猶自守寒罏圓通仙韓信收齊密用機食其烹處共攢眉到頭自有榮身計蓋代之功復是誰道場如入骨忿難攄背楚復投吳將謂胡鬚赤更有赤鬚胡雄峯常獨坐寥寥鎮八隅黃龍震大智虗明徹果因一言超脫野狐身雄峯極目煙霄裏列耀分輝拱北辰雲溪恭百丈堂前驗野狐還如水上捺葫蘆而今到處全機入便好當場捋虎鬚禾山方江北江南問野狐只因昧落有差殊鴻門一踏開雙扇那箇男兒是丈夫上方益百丈野狐因果何如善財未了再見文殊溈山秀不落與不昧當機無人會一箇老狐兒走入金毛隊羅漢南大雄山下古路縱橫野狐巖中師子踞地狂風蕩盡落殘花獨有清香來撲鼻佛心才不落分明不昧親老人何事脫狐身丈夫氣鋭衝牛斗方見臨危不悚人踈山常化形來問大修行當下金篦刮眼睛轉得野狐成百丈夜來依舊野干鳴張無盡魚行水濁鳥飛毛落至鑒難逃太虗寥廓一往迢迢五百生只緣因果大修行疾雷破山風震海百鍊精金色不改圓悟勤醉眠醒臥不歸家一身流落在天涯祖佛位中留不住夜來依舊宿蘆花龍門遠不昧與不落老人何太錯不落與不昧分明如是對重舉示諸人諸人會不會平蕪斷處是青山行人更在青山外文殊道修行不落與不昧盡作野狐涎唾腥拾取娘生窮相口拶開雲路吸雷霆佛智裕不落因果何曾墮不昧因果何曾脫當堂鏡破兩頭忘掃影滅蹤無摸索無摸索何倚托秋風吹梧桐樹葉鳴佛性泰一言才諦當便脫野狐身早知雨是水不作兩般聲佛燈珣百丈野狐兩耳卓朔脫兮不昧墮兮不落不昧不落何是何錯若於當處不留情萬里晴空步廖廓踈山如百丈野狐塞鴈銜蘆李廣神箭張顛草書鼓山圭不落不昧石頭土塊陌路相逢銀山粉碎拍手呵呵笑一場明州有箇憨布袋徑山杲不落不昧徒云解會言下知歸牢關粉碎楚安方續收明鏡當臺鑒者稀禪人到此擬何之直饒點破秋天月元來只是野狐兒琅琊覺百丈野狐語至言粗怛薩阿竭吾有吾廬翠巖真語路分明在憑君子細看和雨西風急近火轉加寒道吾真不落藏鋒不昧分要伊從此脫狐身相逢盡道休官去林下何曾見一人真淨文一尺水一丈波五百生前不奈何不落不昧商量也依前撞入葛藤窠阿呵呵會也麼若是你灑灑落落不妨我哆哆和和神歌社舞自成曲拍手其間唱哩囉天童覺含血噴人先污其口百丈野狐失頭狂走驀地喚回打箇筋斗崇覺空諦觀五百生前事不昧何如不落親因果歷然殊可怕人人盡道野狐精牧菴忠颯颯春風動物華園林開葉又開花歸來謾與佳人説鸞鏡臺前雲鬢斜白楊順不昧不落作麼會會得依前墮野狐一夜涼風生畫角滿船明月泛江湖台州鴻福文不昧不落將錯就錯百丈野狐一坑埋却尼無著總不是翻濤手徒誇跨海鯨由基方撚鏃枝上衆猿驚宣祕禮一人道不落一人道不昧夜來一陳狂風生浪打石頭如粉碎自得暉秉大火聚燒太虗空達磨不會眼瞎耳聾塗毒䇿不向東山久薔薇幾度花白雲他自散明月落誰家正堂辨世人住處我不住世人行處我不行全身跳入野狐窟嬴得風流五百生肯堂充百丈堂前辨野狐紫羅帳裏撒真珠誰家別館池塘裏一對鴛鴦水上浮靈巖安不落不昧二俱是錯受捨未忘識情卜度執滯言詮無繩自縛春至花開秋來葉落錯錯誰知普化搖鈴鐸蘇州定慧信動口生荊棘移身墮野狐趙州來鬬富東壁挂葫蘆或菴體不落不昧誣人之罪不昧不落無繩自縛可憐柳絮隨春風有時自西還自東三峯印不落不昧東倒西擂鐵壁銀山一時粉碎不昧不落且無造作誠哉是言不從人學月林觀二不昧不落錯錯錯錯不落不昧莫莫莫莫坐致太平實難摸索墮脫知何處憑君子細看潮來無別浦木落見他山天目禮墮狐身與脫狐身葉落花開幾度春名利只隨騎馬客是非不到釣魚人朴翁銛大雄山下老狐精千古叢林惱殺人若遇金毛師子子看伊無處著渾身石菴玿百丈野狐石女無夫一回淚下滄海乾枯率庵琮不落不昧兩彩一賽不昧不落千錯萬錯無門開不落因果突出野狐人心似鐵官法如罏不昧因果得脫野狐頂上無骨頷下有鬚虗堂愚增收百丈普請鉏地次一僧聞飯鼓聲舉起鉏頭大笑便歸師曰俊哉此是觀音入理之門歸院乃喚其僧問適來見什麼道理便與麼僧曰適來聞鼓聲動歸喫飯去來師乃笑頌曰孰云意在钁頭邊一擊圓通徹大千大笑低頭歸去後飢餐且莫與人傳水菴一風前一曲動離愁那箇行人不舉頭手把花枝半遮面不令人見轉風流無準範天生箇樣鐵崑崙機智偏能入海門無限差珍收拾了却來空手敘寒溫簡翁敬增收百丈因一女子聯燈録作一僧哭上法堂師曰作甚麼女曰父母俱喪請和尚選日師曰明日來一時埋却頌曰百丈山頭坐不遙女人山下哭嘷咷一時埋向清涼地至孝方能今古超汾陽昭此理分明答教人爺娘俱喪向師深雖道分燈傳正法一時埋却始為親延壽慧增收百丈因黃蘗問從上諸聖以何法示人師良久蘗曰後代兒孫將何傳授師曰我將謂你是箇人便歸方丈頌曰國泰由來自偃兵路逢劒客也須呈雖然猛虎不食子正令他時作麼行本覺一池州南泉普願禪師嗣馬祖示衆曰喚作如如早是變了也今時師僧須向異類中行歸宗聞曰雖行畜生行不得畜生報師曰孟八郎又恁麼去也頌曰張公移住向深村被賊潛身入後門鍋子一時偷去了更來敲碗玩兒孫保寧勇續收父不慈子不孝作之在前悔之在後明眼衲僧難緘其口佛日才喚作如如已變名廓然無聖豈容情其間妙叶皆同類不有玄暉辨濁清護國欽涅槃寂滅本無名喚作如如早變生若問經中何極則石人夜聽木雞鳴本覺一南泉有時曰文殊普賢昨夜三更五燈會元三更下有相打二字每人與二十棒趂出院也趙州曰和尚棒教誰喫師曰且道王老師過在什麼處趙州禮拜而出玄覺云且道趙州休去是肯南泉不肯南泉雲門曰深領和尚慈悲某甲歸衣鉢下得箇安樂又代曰為衆除害頌曰普賢昨夜鬬文殊趂出還同兩手袪却道趙州行正令從茲王老一時無佛印元彩雲影裏仙人現手把紅羅扇遮面無人著眼看仙人却看隨後紅羅扇佛鑑勤鴛鴦繡出世無雙好手元來更有強呈罷各歸香閣去金針難把度蕭郎佛燈珣續收二俱不了隨合多少縱使夜行投明未到月堂昌霧起龍吟風生虎嘯兩口一舌異音同調文殊普賢佛法見南泉趙州日月面據令而行指顧間盡情貶向鐵圍山圓悟勤布鼓當軒為擊來臥龍驚起出巖隈千峯秀色憑誰寫一帶澄江古鏡開無菴全是賊識賊精識精南泉無過強惺惺趙州禮拜歸堂去前箭猶輕後箭深石菴玿春風吹落碧桃花一片流經十萬家誰在畫樓沽酒處相邀來喫趙州茶石鼓夷增收南泉因到莊所莊主預備迎奉師曰老僧居常出入不與人知何得排辦如此莊主曰昨夜土地報道和尚今日來師曰王老師修行無力被鬼神見侍者便問和尚既是善知識為甚麼被鬼神見師曰土地前更下一分飯玄覺云甚麼處是土地前更下一分飯雲居錫云是賞伊罰伊只如土地前見是南泉不是南泉頌曰土地堂前一分飯只為當年圖口辦行年在坎鬼臨身奉勸禪人休讚歎大圓智石上栽花分外奇枝頭春色暗芳菲馨香遍界無人嗅一任狂風取次吹伊菴權增收南泉曰江西馬祖説即心即佛王老師不恁麼道不是心不是佛不是物恁麼道還有過麼趙州禮拜而出僧隨問州曰上座禮拜了便出意作麼生曰汝却問取和尚僧問師曰適來諗上座意作麼生師曰他却領得老僧意旨頌曰不是心兮不是物那吒夜入蒼龍窟鐵鞭擊碎明月珠從教大地如翻墨雪竇宗深深深汲古今淺淺淺渾成現水瑩玉壺江澄素練跳出桃花三級浪戴角擎頭乘快便點額魚馬師口下空躊躇圓悟勤古佛場中不展戈後人剛地起譊訛道泰不傳天子令時清休唱太平歌龍門遠剔起便行三萬里只今休去八千年分明更為從頭舉一任諸方取次傳鼓山圭倒腹傾腸説向君不知何事尚沉吟如今便好猛提取付與世間無事人徑山杲金剛南際老番王反著襴衫入大唐牛首旃檀都賣了唯垂鼻孔不囊藏正堂辨心佛物兮俱不是坐斷舌頭除藥忌橫拈倒用總由他活捉魔羣穿却鼻南巖勝不是心不是佛不是物通身一串金鎖骨趙州參見老南泉解道鎮州出蘿蔔吳元昭不是心不是佛不是物以拂子擊禪牀為君擊碎精靈窟天上人間知不知鼻孔依前空突兀誰菴演不是心佛不是物六六依前三十六因思長慶陸大夫解道合笑不合哭尼無著總華嶽三峯翠插天上頭無路可躋攀不知誰有神仙手折取峯頭十丈蓮開善謙餓鬼鞭死尸仙人禮枯骨野犬吠荒丘鐵山空突兀六合羣靈競出頭不知何處為窠窟或菴體倒腹傾腸幾箇知更無絲髮可相依直饒徹底承當去也落他家第二機靈巖日突出難辨辨得出師子翻身師子窟哮吼一聲天地空驚起須彌高突兀月林觀剃頭頭光生洗腳腳清爽脫衣上牀眠抓著通身癢雪菴瑾不是心不是佛不是物瀝盡野狐涎躍反山鬼窟平田淺草裏露出焦尾大蟲太虗寥廓中放出遼天俊鶻阿呵呵露風骨等間拈出衆人前畢竟分明是何物咄咄遁菴珠鯨飲海水盡露出珊瑚枝海神知貴不知價留與人間光照夜朴翁銛慣弄瑤琴與琵琶清音歷歷遍天涯堪嗟不入聾人耳空使西山月又斜息菴觀夫子不識字達磨不會禪大唐天子國依舊化三千松源嶽破業亡家後渾身沒處安倒拈無孔笛吹過汨羅灣如菴用不是心佛物開口已話墮更擬問如何好與劈面唾殺六巖輝不是心兮不是物白頭生得黑頭鶻破門前下馬臺通身冷汗黑如墨蓬菴會南泉因黃蘗首座一日捧鉢於師位坐師乃問長老甚年中行道曰威音王佛前師曰猶是王老師兒孫蘗遂過本位頌曰彼此老來誰記得人前各自強惺惺一坑未免俱埋却幾箇如今眼子青龍門遠威音王佛是兒孫王老當時開大言黃蘗見機分主伴典刑千古定宗門踈山如續收明明攪動一缸屎却把麝香燒𭥃旎許多香氣不曾聞渾身坐在屎缸裏𫎇菴嶽南泉捧鉢入堂來賓主分明肯自乖莫把威音論戒臘本無位次可差排天目禮黃蘗下座南泉上坐常州紙貴一狀領過北澗簡黃蘗能施陷虎機奈何王老䇿尤奇舌頭反轉聊相問直得移身舊路歸簡翁敬
