body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第四世之餘南嶽下後第三世之餘五臺山祕魔巖和尚嗣永泰湍常持一木杈每見僧來禮拜即杈却頸曰那箇魔魅教汝出家那箇魔魅教汝行腳道得也杈下死道不得也杈下死速道速道學徒鮮有對者一日霍山通和尚訪師才見不禮拜便攛入懷裏師拊通背三下通起拍手曰師兄三千里外賺我來便回頌曰梨荒老倒眼彌麻自救無療更持杈嶺南獵獠當時見一棒打殺這魔家洞山聰祕魔巖下坐擎杈來者教伊識本家苦切為君都不薦失却真杈捉妄杈汾陽昭把斷重津過者難擎杈須信髑髏乾霍山到後知端的同死同生未足觀雪竇顯叔姪相逢兩不猜到頭撫背似癡呆回首恐人生怪笑報云千里賺豫來黃龍南手把長杈坐要津乾坤誰是妄遊人當時若遇英雄漢往往反成腳下塵佛印元自誇獨握誅龍劒及遇真龍不奈何也似將軍空索戰無功徒枉動干戈海印信祕魔杈子動家來往禪人被死降禪佛單刀直入處始知項羽到烏江崇勝珙道得無言杈下死霍山猛跳入懷中三千里外虗相賺更有何人透此宗夢菴信續收杈下要分生死路霍山直拔透重關雖然賺我三千里瞎却衆生眼萬千訥堂思𡽗崖之處無處插觜去却藥忌露當門齒杈下放身捨命箇裏如龍得水三千里外賺吾來捋虎鬚兮捉虎尾惠通旦拈得便用胡麻廝繳冷地看來知恩者少月林觀急水灘頭把釣竿洪波淘湧暮江寒錦鱗也解隨鈎上一吸滄溟徹底乾率菴琮祕魔為法力求人特地擎杈據要津剛被霍山懷裏坐至今有理不能伸咦菴鑒威風凜凜不容攀跳入懷中便解顏不是酒腸寬似海爭知詩膽大如山雪菴瑾增收湖南祇林和尚嗣永泰湍每叱文殊普賢皆為精魅手持木劒自謂降魔才見僧來參便曰魔來也魔來也以劒亂揮歸方丈如是十二年後置劒無言僧問十二年前為甚麼降魔師曰賊不打貧兒家曰十二年後為甚麼不降魔師曰賊不打貧兒家頌曰信手揮來一一親祇林劒下絶煙塵太平曲調無人會孤負皇家定亂人心聞賁無魔無我已降魔添得時人眼裏花今日鏌鋣無用處也知賊不打貧家雪菴瑾劒有魔益熾劒無魔自清只顧降魔全失照不知身是老魔精皖山凝增收河中公畿和尚嗣章敬惲因往羅漢路路逢一騎牛翁師曰羅漢路向什麼處去翁拍牛云道道師喝曰這畜生翁曰羅漢路向什麼處去師却拍牛曰道道翁曰直饒與麼猶少蹄角在師便打翁便拍牛走頌曰問路指路兩無差互彼此拍牛有放有救機鋒相觸針芥相投蕩蕩一條羅漢路大家把手去來休如庵用六祖下第五世之一南嶽下前第四世之一鎮州臨濟義玄禪師嗣黃蘗初在黃蘗隨衆參侍時堂中第一座即睦州勉令問話師乃問如何是祖師西來的的意蘗便打如是三問三遭打遂告辭第一座云早承激勸問話惟蒙和尚賜棒所恨愚魯且往諸方行腳去座遂告蘗云義玄雖後生却甚奇特來辭時願更垂提誘來日師辭蘗蘗指往大愚師遂參大愚愚問曰什麼處來師曰黃蘗來愚曰有何言教師曰親問西來的的意蒙和尚便打如是三問三轉被打不知過在什麼處愚曰黃蘗恁麼老婆為汝得徹困猶覔過在師於是大悟曰佛法也無多子愚乃搊師衣領曰適來道我不會而今又道無多子是多少來是多少來師向愚肋下打三拳愚托開曰汝師黃蘗非干我事師返黃蘗蘗問曰汝回太速生師曰只為老婆心切蘗曰遮大愚老待見與他一頓師曰説什麼待見即今便打遂鼓蘗一掌蘗吟吟大笑此依傳燈録所載聯珠元本并聯燈緑五燈會元皆大同小異溈山問仰山臨濟當時得大愚力得黃蘗力仰云非但騎虎頭亦解把虎尾頌曰睡眼三番打不開忽然狂蹶吼如雷君看馬帶紅纓紱只是去年曾秀才野軒遵一拳拳倒黃鶴樓一躍躍翻鸚鵡洲有意氣時添意氣不風流處也風流白雲端雷電喧轟海嶽昏一家愁閉雨中門狂風忽起烏雲散白日滿天星斗分保寧勇雷電風行便合休巨鼇無便上灘頭反身一吸滄溟竭鍾鼓山河四百州照覺總便言佛法無多子大丈夫兒肯自乖肋下三拳明有信不從黃蘗付將來真淨文叢林猛烈是黃蘗拈棒便打途中客回到大愚却知恩老婆面上與一摑黃蘗勝一槌便當未為奇六十山藤是太遲至竟不能知痛癢上堂猶道拂蒿枝佛國白三度龍門點額回高安灘裏浪如雷湧身再向洪波激透出滄溟眼便開雲溪恭九包之雛千里之駒真風度籥露機發樞劈面來時飛電卷迷雲破處太陽孤捋虎鬚見也無箇是雄雄大丈夫天童覺點額三回下禹門雙腮曝日赤如焚一朝忽透桃花浪騰騰頭角生風雲風雲生兮不可留揚鬐獵獵歸瀛洲老龍相見還相問吐出明珠更不羞上方益問的的意不是作戲三轉被打有甚巴鼻旻古佛鷲峯痛打不死高安輕撥便活見機獨露三拳當鋒誰辨一喝長靈卓臨濟度三夏不參黃蘗禪上來六十棒手腳遂忙然忽悟婆心切反行肋下拳無人知此意林下憶三玄張無盡劈開華嶽連天色放出黃河到海聲瞎驢死後蒿枝折大地如今有幾人龍門遠續收資糧不更著些些歧路年深恐轉賒直下痛施三頓棒夜來依舊宿蘆花真淨文打破當年山鬼窟豁開正眼耀乾坤三拳肋下無多子一喝雷轟迸海門佛性泰黃蘗棒頭曾不顧高安拳下錯商量從茲遍界生荊棘佛法初無一寸長佛照光棒下承當早自欺聽人饒舌固非宜縱知佛法無多子爭似當時未問時遁菴演黃蘗堂前喫棒去大愚肋下築拳來若言佛法無多子到底分明眼未開誰菴演一頓渾家盡滅門更加兩頓纍兒孫銀山鐵壁俱穿透萬里無雲宇宙分密菴傑黃蘗高安老骨撾端居寰海定龍蛇尿床鬼子無巴鼻一箇葫蘆販兩家笑翁堪黃蘗山頭喫棒大愚肋下築拳佛法的的大意猶隔十萬八千破菴先三度扣關轉不開赤手迢迢空往來忽然業鏡百雜碎始覺從前滿面灰木菴永禍福無門口自招三遭瞎棒打驢腰可憐敗國亡家恨萬古春風吹不消天目禮臨濟師黃蘗何曾把手行掌腮并築肋孝順兩邊生朴翁銛拔樹鳴條浩浩風雨雲反覆在其中千波萬浪驚天地到海方知信不通虗堂愚臨濟出世後唯以棒喝示徒凡見僧入門便喝頌曰臨濟喝霹靂一聲邪腦裂忽然透出蒼龍穴擊碎明珠拗角折海印信入門便喝已是忉怛無限杜禪和猶更論該括大洪恩萬里青霄絶點塵一聲霹靂震乾坤茫茫宇宙人無數幾箇如今有腦門白雲端一劒定煙塵憑何辨主賓梯山齊入貢誰識聖明君大洪遂當鋒喝喝震春雷萬蟄龍蛇眼豁開忽若反身無伎倆任從千古臥塵埃佛國白驀然一喝迅雷奔蟄戶雖開命少存若有轉身方用路休觀芳草怨王孫道場如赫日光中轟然霹靂禹門浪急風高無限錦鱗點額普融平一喝當機疾怒雷爍迦羅眼頂門開西天四七二三老那箇堪任這一槌佛心才順逆無蹤聖凡泯迹白日青天雷奔電激正法眼藏滅無傳臨濟老漢白拈賊雲巖因驀地如雷喝一聲聖凡從此不留情直饒劫火焚三際此喝常存性轉明雲蓋昌蟄戶幽扃凍不開虗空忽震一聲雷蛟龍一一拏雲霧蚯蚓頭頭食土埃張無盡入門便喝全無巴鼻引得兒孫弄粥飯氣徑山杲張公未醉李公扶從此嘉聲滿道途却被金剛開口笑誰能愛你護身符佛燈珣續收龍控懸河海月秋煙霞風雨一時收波濤急急人難會截斷千江水不流剋符道者入門便喝絶商量空奮雙拳立紀綱反轉殺人三角眼叢林千古受災殃佛照光喑嗚叱吒萬人氣索佛法商量猶欠一著尼無著總相逢便喝忉忉怛怛十字街頭打併榼𣜂典牛遊喝下忽雷驚聲前休領略當鋒囓鏃時蹉過第一著不在壁立處豈向平地泊野水白連天秋空飛一鶚應菴華之乎者也雪月風花頭面各別事同一家或菴體晴空轟霹𮦷官路栽荊棘沒興遭逢著前凶後不吉無準範臨濟因黃蘗普請鋤茶園蘗後至師問訊按钁而立蘗曰莫是困耶師曰才钁地何言困蘗便打師接杖推倒蘗呼維那拽起我來那拽起曰和尚爭容得這風漢蘗却打維那師钁地曰諸方即火葬我這裡活埋溈山問仰山黃蘗打維那意作麼生仰云正賊走却邏贓人喫棒頌曰奪旗掣鼓著精神父子雖親法不親為報四方禪客道等間莫作守株人真淨文百頭馬裏一頭騾踢踏縱橫不奈何今日風顛臨濟是却令黃蘗打維那佛鑑勤續收黃蘗倒地維那扶起火葬活埋清風未已真如黃蘗活作死醫臨濟死作活用維那聽事不真未免喚鐘作甕月堂昌增收臨濟栽杉次黃蘗曰深山裏栽許多作麼師曰與後人作古記乃將鍬拍地兩下蘗拈起拄杖曰汝喫我棒了也師作噓噓聲蘗曰吾宗到汝此記方出溈山問仰山且道黃檗後語但囑臨濟為復別有意旨仰云亦囑臨濟亦記向後溈云向後作麼生仰云一人指南吳越令行南塔注云獨坐震威此記方出又云若遇大風此記亦出溈云如是如是此並依傳燈録所載諸餘稍異頌曰帶礪山河畫土疆漢高殿下有張良千言萬語無人會又逐流鶯過短墻翠巖真手裏钁頭今日用喻己玉石千鈞重直饒八臂大那吒盡力搖來搖不動佛鑑勤風吹雨打節還枯千尺龍蛇插太虗堪笑兒孫無伎倆一生從此被搽糊懶菴樞臨濟示衆曰汝等諸人赤肉團上有一無位真人常向諸人面門出入汝若不識但問老僧時有僧問如何是無位真人師便打云無位真人是什麼乾屎橛後雪峯聞乃曰臨濟大似白拈賊此依傳燈所載與聯燈諸餘稍異頌曰卞璧無瑕奪日輝秦王雖愛不輸機可憐又入相如手一陳清風滿路歸佛印元春風浩浩烘天地是處山藏煙靄裡無位真人不可尋落花又見隨流水白雲端播土揚塵沒處藏面門出入太郎當撒屎撒尿渾間事浩浩誰分臭與香保寧勇眉橫鼻直眼睛烏擒住元來是鬼奴屎橛拋來渾不管看人猶自面糢糊上方益叢林獨步更無雙臨濟機鋒不可當至今四百年來事亦有兒孫再舉揚道場如無位真人面門出入凡聖不名死生何立雖然遍界不曾藏恍兮惚兮無處拾雲蓋昌無位真人臨濟道勸君不用更尋討鳥道無功遊者稀百尺竿頭要親到通照逢聲色不干眼耳天地本自同根巖下忽聞啼鳥反身又到松門佛心才無位真人赤肉團興來擺手出長安將軍自有嘉聲在不得封候也是間踈山常面門出入每相見日月由來不識真海嶽慣遊知己少反身歸臥嶺頭雲踈山如面門出入見還難無位真人咫尺間去路一身輕似葉高名千古重如山鼓山圭腦後見腮村僧大開眼了作夢雖然趂得老鼠一棒打破油甕徑山杲續收萬法一如不用揀一如誰揀誰不揀即今生死本菩提三世如來同箇眼長沙岑赤肉團上無位真人左眼八兩右眼半斤貴買賤賣黃金白銀保寧勇漳泉福建頭匾如扇只可聞名不可見面真淨文好花當面貼認著被渠使不認貼花時滿口有牙齒無位真人處處獻新攔胸扭住不落主賓乾屎橛乾屎橛三人證龜作箇鱉月堂昌無位真人不隱藏面門出入露堂堂應機接物頭頭現直得家聲播大唐禾山方鑄印銷印全提正令要識綱宗不隔一瞬尼無著總春雪滿空來觸處是花開不知園裏樹那箇是真梅訥堂思棒頭落節來反本閃電光中立信旗殃害叢林無雪處幾人錯認口頭肥或菴體臨濟問院主甚處去來曰州中糶黃米來師曰糶得盡麼曰糶得盡師以拄杖劃一劃曰還糶得這箇麼主便喝師便打典座至師舉前話座曰院主不會和尚意師曰你又作麼生座禮拜師亦打頌曰功德天黑暗女有智主人俱不取後代兒孫渾莾鹵宏綱委地憑誰舉正覺逸院主下喝典座禮拜臨濟令行古今獨邁真如臨濟全機格調高棒頭有眼察秋毫掃除狐兔家風峻變化魚龍雷火燒活人劒殺人刀倚天照雪利吹毛一等令行滋味別十分痛處是誰遭天童覺寶劒持來刃似霜幾回臨陳斬蠻王有情有理俱三段一道寒光射斗傍白雲端糶米闍黎意氣驕輕如春雪自飄飄才方落地人皆愛力不禁風當下消佛鑑勤一堆紅𦦨亘晴空不問金銀鐵錫同入裡盡教成水去那容蚊蚋泊其中徑山杲續收萬里無雲青天白日斗轉星移雷奔電激展得勝旗奪連城璧唱太平歌吹無孔笛南堂興吹毛在握逞全威不許依門傍戶窺是聖是凡俱坐斷直教千古轉光輝塗毒策行喝也打禮拜也打臨濟大師可知禮也巳菴深不問是誰俱截斷殺人須是上將軍棒頭有眼明如日要識真金火裏看無禪才增收臨濟到京行化至一家門首曰家常添鉢有婆曰太無厭生師曰飯也未曾得何言太無厭生婆便閉却門頌曰千尺絲綸直下垂錦鱗撥剌上鈎時斜風細雨歌歸去醉倒蓬窗百不知別峯印家常添鉢繞村行驀地一聲無厭生化主分明嫌少在籬門掩却強惺惺天目禮添鉢家常乞食時柴門掩處莫遲疑白拈手段重拈起鐵眼銅睛換却伊野牛平蠅見血鶻提鳩拳來踢報膠漆相投難提掇處轉風流虛堂愚增收臨濟升堂有僧出師便喝僧亦喝便禮拜師便打又有僧來舉起拂子僧禮拜師便打又有僧來師亦舉拂子僧不顧師亦打又有僧來參師舉拂子僧曰謝和尚指示師亦打雲門代云祇宜老漢大覺云得即得猶未見臨濟機在頌曰大抵宗師謁者難得盤桓處且盤桓儂家自有同風事蘆管橫吹宇宙寬翠巖真主賓都落第三機陳陳開旗不展旗石火光中分勝負倒騎鐵馬上須彌鼓山圭五月五日午時書赤口毒舌盡消除更饒急急如律令不須門上畫蜘蛛徑山杲棒頭有眼眼裏無筋多逢濁富罕遇清貧自入洞門煙鎖斷不知世上幾經春雪菴瑾閃電光中賓主分虗空背上立綱宗祖師活計只如此後代兒孫掃地空松源嶽臨濟上堂次兩堂首座相見同時下喝僧問師還有賓主也無師曰賓主歷然師召衆曰要會臨濟賓主句問取堂中二首座頌曰兩堂上座總作家其中道理有分拏賓主歷然明似鏡宗師為點眼中花汾陽昭啐之機箭拄鋒瞥然賓主當時分宗師憫物垂緇素北地黃河徹底渾慈明圓箭鋒相拄自譊訛李廣雙雕射得多堪笑人來望天際歷然飛過新羅佛印元兩堂上座齊下喝眼裏瞳人帶金屑錐刀同用不能分黑漆崑崙迷夜月浮山遠一喝須教水逆流歷然賓主未輕酬當人若解通消息半夜扶桑出日頭海印信兩堂齊下喝歷然分賓主踏著此機關南金賤如土地藏恩賓主歷然句下分三玄從此振乾坤如今多少途中客盡日區區獨自奔雲溪恭兩陳交鋒作者機富人施設在臨時若逢李廣將軍手定國安付與誰草堂清離婁明不到師曠聽亦訛箇中識賓主日午下星河黃龍震以平報不平王法本無親臨濟雖明眼也是黃龍精徑山杲續收兩堂齊喝主賓分照用同時透古今臨濟正宗傳盛化兒孫得旨意深深大溈智一喝當機賓主分莫將知見強踈親反身師子威獰甚眼裡無筋一世貧尼無著總臨濟因定上座問如何是佛法大意師下禪牀擒住打一掌便托開定佇立傍僧云定上座何不禮拜定才作禮忽然大悟頌曰斷際全機繼後蹤持來何必在從容巨靈擡手無多子分破華山千萬重雪竇顯不墮前後獨超古今喚回千歲夢飛出九皋禽直下一槌光迸散斬新彈子出爐金天童覺掣電之機過趙州為人須到結窮頭掌中擎出香山子直上高高十二樓佛鑑勤一棒一條痕一摑一掌血若無般若靈根到此如何打發南華昺續收出頭露角指點方見見處不留分定針線下床扭住才擬議拓開一掌佛法意脊背汗流喚得回白蓮花向半天開月堂昌半斤是八兩八兩是半斤不識耀州鐵喚作出山銀懶菴樞案頭書敕令行時閫外全提殺活機回首華山孤頂望巨靈神亦竪降旗瞎堂遠全收全放不通風點破將來已不中禮拜起來雖悟去街頭笑倒李三翁別峯印增收臨濟因麻谷第二世到參敷坐具問十二面觀音阿那面正師下繩床一手收坐具一手搊麻谷云十二面觀音向什麼處去也谷轉身擬坐繩床師拈拄杖打谷接却相捉入方丈頌曰大悲觀音開正面官不容針通一線鼠拽葫蘆有底忙鬼爭漆桶無人見鼓山圭昧却當陽箇一著牽來拽去互施呈不知除却王維手更有何人畫得成徑山杲十二面觀音兩箇都不識把手歸去來形端而影直人生相識貴知音水入水兮金博金退谷雲增收臨濟示衆曰有一人論劫在途中不離家舍有一人論劫離家舍不在途中且道那一人合受人天供養頌曰霹𮦷未收聲閃電不留影三更月到窗半夜驢覷井快騎駿馬驟高樓一塵不動須彌頂最菴印增收臨濟訪平田於路見一嫂使牛師問嫂平田路向什麼處去嫂將牛打云這畜生諸處走到這裏不知路師曰我問你平田路向甚麼處去嫂云這畜生養來五載尚使不得師云欲觀前人先觀所使更有抽釘拔楔之意頌曰有客平田問路頭高擡白棒打耕牛春光眼底無多子一對鴛鴦逐水流笑翁堪烏藤倒挂向平田便把羸牛痛下鞭更説養來經五歲始終只是老婆禪天目禮白水田邊問路頭雪眉婆子打耕牛草鞋泥滑青山遠不是愁人也著愁橫川珙目前條路平如砥何不堂堂掉臂行撩撥老婆牛性發赤身挨棒可憐生竹屋簡增收臨濟因僧問捉象亦全其力捉兔亦全其力未審全箇甚麼力師曰不欺之力頌曰力在如今作用時情存毫忽便成欺誰知修水千峰碧盡入秋風一瘦藜虗堂愚增收臨濟上堂僧出作禮師便喝僧曰老和尚莫探頭好師曰你道落在甚麼處僧便喝又僧問如何是佛法大意師便喝僧作禮師曰你道好喝也無僧曰草賊大敗師曰過在甚麼處曰再犯不容師曰大衆要會臨濟賓主句問取堂中二禪客頌曰孔明諸葛隱蓬廬明主求賢三下車為報將軍莫輕躁先生謀䇿必無虞崇覺空增收臨濟因僧問如何是三眼國土師曰我共汝入淨妙國土中著清淨衣説法身佛又入無差別國土中著無差別衣説報身佛又入解脫國土中著光明衣説化身佛頌曰法身報身化身咄哉魍魎妖精三眼國中逢著笑殺無位真人徑山杲臨濟後居大名府興化寺東堂咸通八年丁亥四月十日將示滅説傳法偈曰沿流不止問如何真照無邊説似他離相離名人不稟吹毛用了急須磨復謂衆曰吾滅後不得滅却吾正法眼藏三聖出曰爭敢滅却和尚正法眼藏師曰已後有人問你向他道甚麼聖便喝師曰誰知吾正法眼藏向這瞎驢邊滅却頌曰正法眼藏何生滅棒下分明須見血當時正令不曾行瞎驢從此爭饒舌佛印元圓寂將歸敘別時叮嚀法眼好任持喝下不開泥水路瞎驢從此少人騎黃龍南正法眼藏誰傳得喝下滄溟徹底乾從此瞎驢無覓處鐵山歸路黑漫漫佛慧泉劈破華山雷未猛照開滄海月非光瞎驢滅却正法眼直得哀聲振大唐白雲端出門握手再叮嚀往往事從叮囑生路遠夜長休把火大家吹滅暗中行保寧勇叮嚀法眼示將終一喝玄關絶不通自此瞎驢無覓處幾多江上問漁翁照覺總決別雌黃辨作家當頭一喝定龍蛇令行塗毒無能進縱得瞎驢徒𩥇沙三祖宗臨濟全機何指的瞎驢親喜遇知音宗風要見長無墜流水高山意轉深靈源清密室遺言不再徵臨行何必在叮嚀鳳毛一息驚天地水石生光四海清雲溪恭忽雷才震雨如傾九曲黃河漲四溟賴得斗門能下閘滔滔萬里絶流聲普融平信衣半夜付盧能攪撓黃梅七百僧臨濟一枝正法眼瞎驢滅却得人憎心心相印祖祖傳燈夷平海嶽變化鵾鵬只箇名言難比擬大都手段解反騰天童覺玉洞玄關道路長蟠桃不是等間芳遮藏不許時人見只恐春風漏泄香上方益丹鳳引雛栖竹實羚羊挂角覓應難瞎驢滅却正法眼聲價喧然宇宙寬佛心才瞎驢滅却正法眼出得兒孫遍大唐須信茫茫煙浪裡酌然別有好商量佛鑑勤萬派朝宗勢未休魚龍出沒任沉浮瞎驢滅却正法眼直得黃河却倒流南華昺到老不曾開語路臨行回首却叮嚀深深海底猶嫌淺直向金剛水際行鼓山圭瞎驢一喝衆皆驚正法那堪付與人三要三玄俱喪盡堂堂擺手出重城徑山杲續收叮嚀正法信非虗堪笑臨行捋虎鬚曾看華山圖籍上又添潘閬倒騎驢海印信三聖一喝少人提掇雖是死蛇解弄也活來蠅臭肉硬紏紏透網金鱗活潑潑臨濟瞎驢君子可八草堂清瞎驢滅却正法眼臨濟反身便倒騎佛祖位中留不得斷無蹤迹許誰知慈受深萬仞峯前握手時清歌一曲少人知但見瞎驢驚宇宙不知法眼付傳誰雪竇宗也大奇也大奇烏頭倣佛附子依稀萬里一條寒澗水蔡州打破幾人知幾人知咦馬面夜叉牛頭獄卒湛堂凖大寂宗風示後昆金剛寶劒利當門瞎驢滅却正法眼那箇男兒解出羣正堂辨臨行特地揚家醜帶纍傍人滿面慚霹靂一聲雲雨散至今父子未相諳誰菴演
