body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第六世之五清源下第五世之三增收雪峯示衆曰盡大地是箇解脫門把手拽伊不肯入時有一僧出曰和尚怪某甲不得又一僧曰用入作甚麼師便打頌曰大地是箇解脫門三世諸佛一口吞將為雪峯有奇特却來謾我好兒孫懶菴樞增收雪峯因僧問緊要處乞師指示師曰是甚麼僧於言下大悟雲門云雪峯向你道什麼頌曰雪峯騎駿馬雲門跨驢兒一踢一踏相奔馳長安有路非無路夜半行時人不知圓悟勤無量劫來是箇甚麼覿面全提幾乎蹉過不蹉過土苴堆頭且高臥增收雪峯一日在僧堂內燒火閉却前後門乃呌曰救火救火玄沙將一片柴從窗櫺中拋入師便開門頌曰巨嶽塵飛蟭螟生兒兒落塵裏如錐錐泥燒火救火閉門開門拋柴家醜外頭見萬象森羅一口吞月堂昌高燒榾柮暖通身快活難禁一屋春不是謝郎來合火誰知門外有寒人石林鞏增收雪峯問僧甚麼處來僧曰浙中來師曰船來陸來曰二途俱不涉師曰爭得到這裏曰有什麼隔礙師打趂出僧過十年後再來師又問甚處來曰湖南師曰湖南與這裏相去多少曰不隔師竪起拂子曰還隔這箇麼曰若隔即不到也師又打趂出此僧住後凡見人便罵師一日有同行聞特去訪問兄到雪峯有何言句便如是罵他遂舉前話被同行㖃叱與他説破這僧當時悲泣嘗向中夜焚香遙禮頌曰戴角擎頭去復來雪庭兩見戰旗開軍前不誤將軍令空有英雄出九垓九垓雖出有牢關未透牢關未足觀棒頭有眼如明日要識真金火裏看佛燈珣見説閩山多蠱毒千方百計避無由殤中既有催魂鬼一命還他方始休虗堂愚雪峯普請次自負一束藤路逢一僧便拋下僧擬取師一踏踏倒歸舉似長生曰我適來踏得者僧甚快長生曰和尚須替者僧下涅槃堂始得雪竇云長生大似東家人死西家人助哀也好與一踏頌曰暗拋香餌在江湄果是金鱗釣得歸不是𮈔綸收得疾幾乎輸與鷺鷥兒上方益偉哉雪老法中英肩上藤薪覿面呈目前不薦當頭著和身一踏倒囊傾會知擔重因柴束自然便重不便輕何山奉報諸禪侶孩兒須是的親生佛燈珣增收雪老擔藤憩歇時一僧才見便慈悲近前擬取攔胸踏舉似長生更一椎石門聰雪峯踏者僧不殺長生扶者僧不起可憐一束爛枯藤狼藉至今愁滿地西巖惠增收雪峯與玄沙夾籬次沙曰夾籬處還有佛法也無師曰有曰如何是夾籬處佛法師撼籬一下沙曰某甲不與麼師曰子又作麼生曰穿取篾頭道來頌曰父子相擕入故園篾頭時過短籬邊爛泥有刺無人見踏著方知腳底穿懶菴樞雪峯因三聖問透網金鱗以何為食師曰待汝出網來向汝道聖曰一千五百人善知識話頭也不識師曰老僧住持事繁頌曰網透之魚不識鈎貪遊浪水認浮頭高灘坐釣垂慈者回棹收綸却上舟汾陽昭透網金鱗休云滯水搖蕩乾坤振𩮻擺尾千尺鯨奔洪浪飛一聲雷震清飈起清飈起天上人間知幾幾雪竇顯張三賣物高擡價李四還依市價酬交易不成猶作閙李公店鋪一時休海印信老倒漁翁坐釣臺金鱗赫赫鼓波來海門空闊才施網霹𮦷一轟天地開真淨文二放去收來得自由不堪憂處亦堪憂可憐滯句承言者爭是爭非空白頭透網金鱗掣電機休云滯水與拖泥雷霆一擊青霄裏傾湫何處不滂瀰真如出網分明向道休風雲會處有來由雷霆昨夜聲相應依舊為霖遍九州圓通仙擭浪拏雲勢可平驚空驟雨似盆傾不因放却淮河閘九曲潮頭卒未平上方益洞裏無雲別有天桃花似錦柳如綿仙家不會論冬夏石爛松枯是一年五祖演鯤鯨已插摩霄翼海客猶懸釣月鈎不顧翻空洪浪惡一帆風信出鼇頭佛心才全死中全活全活中全死一箇訝郎當一箇福建子徑山杲金鱗透網欲吞舟一向衝波逆水流却被漁翁間引釣隨波逐浪謾悠悠鼓山圭續收俊鶻沖天寒雞嘵眠脫略窠窟遲速不偏截斷命根急處放當頭手腳緩時樣滴水氷生不認渠坐籌幃幄江海量君不見透網金鱗活計新住持事繁笑殺人月堂昌百草頭出沒三界外遨遊徒布漫天網虗下釣鼇鈎搖鱗振𩮻撼乾坤兀目昂頭洪浪噴棒雨點喝雲奔肯將爭戰定功勛圓悟勤張猴白李猴黑硬如綿軟如鐵驀路相逢兩會家臨濟未是白拈賊遁菴演新羅拄杖遂寧鉢衲子家風那箇無一等看來如墨黑誰能重與較錙銖虗堂愚增收雪峯問僧近離甚處曰覆船師曰生死海未渡為甚麼覆却船僧無語乃回舉似覆船船曰何不道渠無生死僧再至進此語師曰此不是汝語曰是覆船恁麼道師曰我有二十棒寄與覆船二十棒老僧自喫不干闍黎事頌曰未渡生死海不應覆却船渠本無生死超然離二邊長如杲日麗中天舒光照到雪峯前圓悟勤生死海中猶未渡傳言送語幾千程一棒打翻東海鯉迷人直下便狂惺尼無著總增收雪峯上堂舉拂子曰遮箇為中下僧問上上人來如何師舉拂子僧曰遮箇為中下師打之或作拈起拄杖雲門曰我不似雪峯打葛藤驀拈拄杖云我這箇只為中下機人有僧問忽遇上上人來時如何門便打頌曰迅雷不及掩耳下樁要在急水水深樁腳若長耳畔雷聲四起拈起拄杖為他中下上上人來放過不打秦人一入桃花源子孫千世為神仙月堂昌大機圓應大用直截雪峯雲門只得一橛畢竟如何不説不説松源嶽增收雪峯因閩王問擬欲蓋一所佛殿去時如何師曰大王何不蓋取一所空王殿曰請師樣子師展兩手雲門云一舉四十九頌曰空王殿樣子雪峯展兩手添得老韶陽一舉四十九總是面南看北斗即菴覺增收雪峯送南際長老出乃作女人拜際斂手應諾諾師以手斫額便歸頌曰送客隨家豐儉施盡情為餓免生疑却蒙惠重過相贈斂手遙知向暮歸投子青增收襄州高亭簡禪師嗣德山初隔江見德山遙合掌呼曰不審德山以手中扇子再招之師忽開悟乃橫趨而去更不回顧後於襄州開法嗣德山頌曰江上相逢問逗留師資針芥便相投定光金地遙招手智者江陵暗點頭大洪遂德山棺木裏瞪眼高亭死水裏藏身賺他多少英靈漢錯認山河作眼睛少室睦曹洞洪州雲居道膺禪師嗣洞山因僧在房內念經師隔窗問闍黎念者是什麼經曰維摩經師曰不問維摩經念者是什麼經其僧從此得入頌曰不問維摩念甚麼新羅子穿雲過杖頭擊著沒威靈惆悵嵩山破竈墮佛慧泉念底却是維摩經一回舉著一回精鸚鵡故鄉歸不得大都言語太分明楊無為問經不問念維摩念底分明見也麼欲入塵沙法門海一言演出不須多越州天章和尚順風將欲到揚州風轉船頭水逆流把柂全憑三老力瞥然到岸不須憂道場如續收須彌山高不見巔大海水深不見底簸土揚塵無處尋回頭撞著自家底南堂興雲居因僧問截水停輪時如何師曰磨不轉頌曰雲居有語機關絶不轉今君返照看截鐵閉關停妄解百花俱發一花園開花結果從他有因地抽條長碧天汾陽昭截水停輪話已圓借婆裙子拜婆年後人不見雲居老往往思量石二邊佛印元續收截水停輪中此情吾師知道不惺惺微露一言令省覺不轉何曾更有停般若柔增收雲居示衆云老僧二十年前住三峯菴時魏府有興化長老來問云權借一問以為影草時如何老僧當時機思遲鈍道不得為伊置得箇問頭奇特不敢辜他伊云想菴主答這話不得不如禮拜了退而今思量當時不消道箇何必後因化主到魏府興化乃借問山中和尚住三峯菴時老僧曾問伊話祗對不得而今道得也未化主遂舉前話興化云雲居二十年只道得箇何必興化即不然爭如道箇不必頌曰何必不必一七二七龍樹馬鳴𦦨光透出道吾真雲居道何必興化道不必眼若不開夢中呌屈月堂昌何必不必綿綿密密覿面當機有人續得末後句許你親見二尊宿大慧杲何必不必金刀玉尺甜者如檗苦者如蜜二十年來無處雪屈咦別峯印何必不必方圓曲直眉目分明若為辨的影草既隨身覿面當機疾一雙孤鴈忽高飛兩隻鴛鴦還獨立最菴印何必不必綿綿密密覿面當機官馬廝踢無得慈增收雲居上堂曰如人將三貫錢買箇獵狗祇解尋得有蹤迹底忽遇羚羊挂角莫道蹤迹氣息也無僧問羚羊挂角時如何師曰六六三十六曰挂角後如何師曰六六三十六僧禮拜師曰會麼曰不會師曰不見道無蹤迹其僧舉似趙州州曰雲居師兄猶在僧便問羚羊挂角時如何州曰九九八十一曰挂後如何州曰九九八十一曰得恁麼難會州曰有甚麼難會曰請和尚指示州曰新羅新羅又問長慶羚羊挂角時如何慶曰草裏漢曰挂後如何慶曰亂呌喚曰畢竟如何慶曰驢事未去馬事到來此五燈會元所載與傳燈録稍異傳燈曰師謂衆曰如一獵狗只解尋得有蹤迹底忽遇羚羊挂角莫道迹氣亦不識僧問羚羊挂角時如何師曰六六三十六又曰會麼僧曰不會師曰不見道無蹤迹有僧舉似趙州州曰雲居師兄猶在僧乃問羚羊挂角時如何州曰六六三十六頌曰羚羊挂角向甌峯獵犬茫然不見蹤却是石橋橋畔老三千里外解相逢正覺逸羚羊挂角六六三十六貧兒得古錢瘦馬餐枯粟報你參玄人聽取無生曲昨夜火燒空跳出水中浴草堂清獵狗迷蹤還觳觫氣息全無何處逐趙州城裏忽相逢依然六六三十六純增收雲居因新羅僧問是什麼得與麼難道師曰有甚麼難道曰請難道師曰新羅新羅頌曰新羅僧問答新羅飛騎將軍意氣多奪得鎗來騎賊馬不勞餘刃罷干戈率菴琮即此非此離此全此平步青霄高山仰止目前包褁不爭多森羅萬象眼中花就身打劫新羅新羅增收雲居因僧問僧家畢竟如何師曰居山好僧禮拜師曰你作麼生會曰僧家畢竟於善惡生死逆順境界其心如山不動師乃打曰孤負先聖喪我兒孫又問傍僧你作麼生會僧禮拜曰僧家畢竟眼不觀玄黃之色耳不聽絲竹之聲師曰孤負先聖喪我兒孫黃龍南云作麼生道得一句不孤負先聖喪我兒孫若人道得到處青山無非道場若道不得有寒暑兮促君壽有鬼神兮妬君福頌曰突兀嵯峩萬仞橫四邊無路不通行自古兩輪光不到夜深王老入西岑投子青四顧巍峩瑣碧陰松風和雨響於琴居山不用逃聲色百鳥歸來何處尋枯木成僧家畢竟居山好丫角女子白頭早行穿月色嶺頭松迹到白雲巖下草寂寂峯前古寺基家家門首長安道相將八月鴈南來莫教孤負太平老佛鑑勤增收雲居因僧問六戶不明時如何師曰不涉緣曰向上事如何師曰慎者不護頌曰春到石人視遠山鶯啼花木碧波間須知雲外巖松瑞千古迎風任歲寒投子青增收雲居臨終時問侍者曰今日是幾者曰今日初三師曰三十年後但道只這是乃端然告寂頌曰瞎漢臨危不識羞問人出氣借咽喉可憐便説初三日活陷爛泥堆裏頭寶葉源增收雲居因僧問全無學處如何立身師曰無立身處曰佛事何勞師曰不同興化頌曰苔殿煙收紫氣旋拱班宸幄退堯年鳳樓不宿桃源客豈並金光矚漢天投子青增收雲居因荊南節度使成汭遣大將入山送供問曰世尊有密語迦葉不覆藏如何是世尊密語師召曰尚書其人應諾師曰會麼曰不會師曰汝若不會世尊密語汝若會迦葉不覆藏頌曰迦葉不覆藏橫身獨自當語意分明在今古露堂堂佛眼遠二世尊密語難覆藏迦葉兒孫見如土千古萬古黑漫漫焦尾大蟲元是虎撫州曹山本寂禪師嗣洞山僧清鋭問今訛作清稅者非清鋭孤負乞師拯濟師曰鋭闍黎近前來鋭近前師曰泉州白家酒三盞猶道未霑唇五燈會元訛作清稅孤貧乞師賑濟師召稅闍黎稅應諾師曰清源白家酒三盞喫了猶道未霑唇玄覺云什麼處是與他酒喫頌曰清鋭孤貧心太粗曹山擕手步亨途白家三盞霑唇酒醉後添杯一似無佛印元清源白家酒三盞未霑唇七十二棒且輕恕一百五十難放君地藏恩滿屋黃金不肯親吁嗟甘怨自孤貧無端更飲三杯酒醉後郎當笑殺人南華昺續收販海波斯入大唐先將珍寶暗埋藏却來伸手從人覓爭奈難謾有當行肯堂充清貧三盞便輕酬萬里曹門出鄭州盡情斫却月中柱惱亂春風卒未休天童淨張甕李甕各有病痛赤眼撞著火柴頭焦磚打著連底凍朴翁銛曹山慣用白家酒掇向人前盡底傾醉倒十洲雲水客闍黎猶自不惺惺皖山凝干木逢場探淺深辨龍蛇眼決疏親兩箇駝子相逢著世上思量無直人退谷雲銅公塘鐵奉化得人憎得人怕不是明州人定説蘇州話無準範增收曹山因鏡清問清虗之理畢竟無身時如何師曰理即如此事作麼生曰如理如事師曰謾曹山一人即得爭奈諸聖眼何曰若無諸聖眼爭鑒得箇不恁麼師曰官不容針私通車馬頌曰不與麼太無端曹山甘被鏡清謾如如理事誰相悉畢竟無身也大難也大難大家諸聖眼前看方庵顯鴻濛未判絶疏親畢竟難將事理分夜半正明還不露金剛腦後鐵崑崙雪巖欽增收曹山因僧問學人通身是病請師醫師曰不醫曰為什麼不醫師曰教你求生不得生求死不得死頌曰生死既不可求根塵萬病俱休從此俱空獨露蟾輪一片清秋雪竇宗增收曹山因僧問學人抱璞投師請師雕琢師曰不雕琢曰為甚不雕琢師曰須知曹山好手頌曰抱璞投師來意濃一條狹路忽相逢誰知妙手不雕琢分破華山千萬重笑翁堪增收曹山因紙衣道者來參師曰莫是紙衣道者否曰不敢師曰如何是紙衣下事曰一裘才挂體萬事悉皆如師曰如何是紙衣下用者近前應諾便立脫師拊其背曰汝祇解恁麼去何不解恁麼來者忽開眼問曰一靈真性不假胞胎時如何師曰未是妙曰如何是妙師曰不徣借者珍重便化師示頌曰覺性圓明無相身莫將知見妄疏親念異便於玄體昧心差不與道為鄰情分萬法沉前境識鑒多端喪本真如是句中全曉會了然無事昔時人頌曰麻纏紙褁若嬰孩優鉢羅華火裏開一點靈光千古在月輪孤處借胞胎南堂興三勞形苦骨不知春得意忘言便出塵不假胞胎不徣借金烏出海月離雲紙衣下事不假胞胎懸崖撒手襁褓嬰孩涅槃會上道場開單傳直指狀元來增收曹山因僧問朗月當空時如何師曰猶是階下漢曰請師接上階師曰月落後來相見頌曰朗月當空未入關落花流水不相干明明一句超凡聖光境俱忘誰解看皓月光中立問端上他階級轉顢頇會須月落來相見別有靈光照膽寒在菴賢增收曹山因鏡清問心徑苔生時如何師曰難得道者曰未審此人向什麼處去師曰只知心徑苔生不知向什麼處去頌曰心徑苔生何處去謝家人不在漁船蘆花萬頃水天濶白鳥深沉任轉旋自得暉心徑苔生去莫知口如鼻好眼如眉迢迢劫外封疆濶明月蘆花類不齊掩室開增收曹山因僧問雪覆千山為甚麼孤峯不白師曰須知有異中異曰如何是異中異師曰不墮衆山色頌曰雪覆千山沒路岐孤峯不白峭巍巍五陵公子雖增氣野老相逢不展眉朴翁銛混不得類不齊六爻宛轉見重離夜深下視千山白不是其中人不知石溪月言中彼此帶幽玄盡向言中辨正遍孤負一條官驛路茫茫沉在月明前絶岸湘增收曹山問金峯志曰作甚麼來曰蓋屋來師曰了也未曰這邊則了師曰那邊事作麼生曰候下工日白和尚師曰如是如是頌曰運斤成風匠石之奇喬松聳壑粱棟之姿宗中辨的量外知機這邊那邊兮著著無虧走盤不定兮落落明珠雲耕靜增收曹山因僧問端坐團圓時如何師曰望不見身曰還假用也無師曰才説坐時便是用也不可移山塞海説禪説道方為用也頌曰團圓莫謂清虗理若謂清虗總喪身却是眉毛曾問眼烏睛那自見瞳人本覺一增收曹山辭洞山山云子歸鄉莫打飛鳶嶺過麼師曰是山云來時莫打飛鳶嶺來麼師曰是山云有一人不打飛鳶嶺過便到此間子還知麼師曰渠無彼往山云子見甚道理便道渠無彼往師曰若不到這田地爭解恁麼道頌曰不打飛鳶便到來大圓鏡裏絶塵埃東君節令分明也桃李年年二月開自得暉增收曹山因僧問世間甚麼物最貴師曰死貓兒最貴曰為甚麼死貓兒却貴師曰無人著價頌曰腥臊紅爛不堪親觸動輕輕血污身何事杳無人著價為伊非是世間珍丹霞淳增收曹山辭洞山山問曰子向甚麼處去師曰不變異處去山曰不變異處豈有去邪師曰去亦不變異頌曰家家門掩蟾蜍月處處鶯啼楊柳風若謂縱橫無變異猶如擲劒擬虗空丹霞淳齋時一鉢飯飯後一覺睡睡起去放尿洗手成變異闡提照增收曹山聞鐘聲乃曰阿㖿阿㖿僧問和尚作甚麼師曰打著我心僧無對五祖戒代云作賊人心虗頌曰聞鐘告衆打吾心遊子間言醉更深楞嚴會上圓通者正法明王觀世音般若柔聞鐘便道打吾心語淺分明理事深上流默默點頭笑可謂真鍮不博金汾陽昭增收曹山因僧問家貧遭劫時如何師曰不能盡底去曰為什麼不能盡底去師曰賊是家親頌曰六門曉夜任開張家賊難防事可傷識得家親恩愛斷更無一物獻尊堂卍菴顏增收曹山問僧作甚麼曰掃地師曰佛前掃佛後掃曰前後一時掃師曰與曹山過靸鞋來一作與我過袈裟來頌曰引問當機看起倒僧對師云一時掃曹山索把袈裟來智深功德禪和妙般若柔器量方圓識得伊問君掃地示慈悲前後一時俱掃却也是拈他第二機汾陽昭增收曹山因僧問靈衣不挂時如何師曰曹山孝滿曰孝滿後如何師曰曹山好顛酒頌曰清白門庭四絶鄰長年開掃不容塵光明轉處傾殘月爻象分時却建寅新孝滿便逢春醉步狂歌任墮申散髮夷猶誰管你太平無事酒顛人天童覺曹山顛酒有誰諳醉語狂言不自慚夜半日頭當午照騎牛背面著靴衫東谷光增收曹山問強上座曰佛真法身猶若虗空應物現形如水中月作麼生説箇應底道理曰如驢井師曰道則太煞道祇道得八成曰和尚又如何師曰如井覷驢或作蟾首座問洞山頌曰出路從來無十成有言須是脫凡情江邊玉女呵呵笑嶺上石人側耳聽古木成應物現形如水月當時應物不留情如驢井終難喻如井驢何十成本覺一驢井井覷驢智容無外靜涵有餘肘後誰分印家中不蓄書機絲不挂梭頭上文彩縱橫意自殊天童覺驢井井驢五臺何處不文殊黃面老人任多口未知道得八成無張無盡驢井井驢冬瓜葉上長葫蘆會不得莫踟蹰定盤星上絶錙銖無菴全增收曹山因僧問五位對賓時如何師曰汝即今問那箇位曰某甲從偏位中來請師向正位中接師曰不接曰為甚麼不接師曰恐落偏位中去師却問僧祇如不接是對賓是不對賓曰早是對賓了也師曰如是如是頌曰月中玉兔夜懷胎日裏金烏朝抱卵黑漆崑崙踏雪行轉身打破琉璃碗丹霞淳故國安居象帝先夜明簾外信無傳金雞啼破玉人夢曉色依依錦帳前增收曹山因僧問子歸就父為甚麼父全不顧師曰理合如是曰父子之恩何在師曰始成父子之恩曰如何是父子之恩師曰刀斧斫不開頌曰翡翠簾垂絲綸未濟紫羅帳合視聽難通犯動毛頭月升夜戶密移一步鶴出銀籠脫身一色無遺影不坐同風落大功天童覺刀斧斫不開靈機絶點埃清風掃殘雪和氣帶春回退谷雲增收曹山因僧問國內按劒者誰頌曰嵯峨萬仞是曹山氣岸雄雄坐祖關橫按鏌鎁全正令太平寰宇斬癡頑佛性泰
