body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集菩薩機緣文殊師利在靈山會上諸佛集處見一女子近佛坐入於三昧文殊白佛云何此女得近佛坐佛云汝但覺此女令從三昧起汝自問之文殊繞女子三匝鳴指一下乃至托上梵天盡其神力而不能出佛云假使百千文殊亦出此女定不得下方過四十二恆沙國土有罔明菩薩能出此女定須臾罔明至佛所佛敕出此女定罔明即於女子前鳴指一下女子於是從定而出有尊宿問僧曰文殊是七佛之師為甚麼出女子定不得罔明為甚麼却出得僧無對翠巖芝和尚云僧投寺裏宿賊打不防家頌曰文殊托上梵天罔明輕輕彈指女子黃面瞿曇看他一倒一起天衣懷千眼莫辨來由孤坐是何三昧文殊著力雖多女子隨邪亦殺罔明關捩有誰知雨過春山如潑黛佛慧泉罔明彈指也尋常豈是文殊智不長因憶江南二三月鷓鴣啼處百華香佛印元佛性天真事誰云別有師罔明彈指處女子出禪時不費纖毫力何曾動所思衆生總平等日用自多疑真淨文百千文殊出不得罔明不費纖毫力落霞與孤鶩齊飛秋水共長天一色雲居祐獨坐靈山誰得知罔明出定破羣迷如今四海皆通達信道無心總不疑雲蓋智文殊用盡平生力罔明彈指便回來不是老胡深有意雙眸未肯為渠開成枯木拂拭瑤琴月下彈調高雪曲和還難五矦費盡平生志從此詩書懶更看寶峯照坐擁羣峯覆白雲鶯啼深谷不知春巖前華雨紛紛落夢覺初回識故人石門易一拳拳倒黃鶴樓一踢踢翻鸚鵡洲欲識罔明彈出定青山不動水長流智海清當機密薦箇中玄女子何因坐佛前切莫途中為解礙刻舟求劍實徒然禾山方女子文殊與罔明禪徒畢竟如何委除非格外妙投機始信波濤元是水龍牙才出定只消彈指佛法豈用工夫我今要用便用不管罔明文殊洪覺範畫得天然別花間試展開黃鶯偷眼覷不敢下枝來慈受深出得出不得初不離是定聖者超凡情凡人而乃聖到用與橫拈扶邪及顯正春雨春風竹戶涼落花啼鳥千峯靜龍門遠瞿曇身心如泥女子肝腸似鐵文殊貪尋鍋子罔明由來著楔歷觀大地衆生不解閉門作活不動干戈建太平雨過青山如黛潑佛燈珣女子與瞿曇自起還自倒無眼傍觀人投身入荒草月菴果二菩薩出定笑殺老禪和富嫌千口少貧恨一身多圓覺演不假文殊神通休要罔明彈指爾時靈山會中女子從定而起鼓山圭出得出不得是定非正定罔明與文殊喪却窮性命徑山杲文殊出不得罔明却出得叵耐這冤家冷地裏作賊白楊順文殊彈指罔明出定今日重新打翻舊令女子瞿曇在我心鏡楚安方續收入定出定因邪打正堪笑文殊春行秋令石明長江輥底浪如銀秋日白蘋紅蓼新莫怪扁舟難到岸行船由在把梢人慈受深大定等虗空廓然誰辨的女子與瞿曇據令何調直師子奮迅兮搖蕩乾坤象王回旋兮不費餘力孰勝孰負誰出誰入雨散雲收青天白日君不見馬駒踏殺天下人臨濟未是白拈賊圓悟勤抹粉塗壞恰我呆神頭鬼面舞三臺千千萬萬人窺看子細不知誰見來開福寧懷藏日月八面玲瓏袖裏金鎚鮮血通紅香風𩖼𩖼花雨濛濛兵隨印轉處萬里長虹將逐符行時些子神通南堂興四箇沒意智漢做處總無畔岸一狀領過階前與伊據欵結案開善謙出得出不得滿面是埃塵愁人莫向愁人説説向愁人愁殺人應菴華金不博金水不洗水兩既不成一何有爾罔明文殊靴裏動指尼無著總一畝之地三蛇九鼠子細看來是何面胔佛縣光苦瓠連根苦同坑無異土二千年已前一火破落戶或菴體出得何如未出時瞎驢成隊喪全機如今四海平如砥蘆笛迎風撩亂吹密菴傑人平不語水平不流瞿曇女子鬼面神頭肯堂充出得出不得攧落精靈窟何處不風流祖師無妙訣松源嶽子不嫌母醜犬不厭家貧舉頭天外看誰是我般人孤峯深文死罔明休卜度瞿曇女子謾針錐推倒鐵山歸去也縱橫十字更由誰石菴玿誰在畫樓西相逢語笑低到家春色晚華落鷓鴣啼雪菴瑾文殊繞三匝罔明輕彈指世尊努眼睛女子從定起幻菴覺鵲鴉午夜破雲飛寶印無私孰解提若道罔明能出定是人拔舌入阿鼻劒門分古老相傳鬼叫坑看來人鬼不多爭早知鬼便是人作夜半三更也可行無準範鮑叔眼下安眉趙哥口邊著耳驀然狹路相逢兩個是甚面胔斷橋倫出得出不得渠儂得自由神頭并鬼面敗闕當風流無門開是定出得不得關捩初無多子文殊神通太過罔明輕輕彈指橫川珙文殊師利令善財童子採藥云是藥者採將來善財遍採無不是藥却來白云無不是者殊云是藥者採將來善財拈一枝草度與殊殊接得示衆云此藥能殺人亦能活人頌曰是藥拈來更不疑師資相見在臨時從茲病甚無醫處殺活還應作者知佛印元信手拈來草最靈一枝能殺亦能生曼殊室裏開金口直至如今藥道行正覺逸大地蒼生病似麻吉祥靈藥示無涯其間殺活難分辨又是重添眼裏花保寧勇藥病相治貶更褒當機殺活按吹毛毗盧海闊煙波靜誰把長竿釣巨鰲照覺總歷劫何曾異明明百草頭甘和苦澀味死活病須瘳好笑文殊老憐兒不覺羞雲溪恭善財拈起一枝草持來度與文殊老殺活雖然在手中遍界不藏光杲杲楚安方續收善財採藥不知名度與文殊用得靈便把黃連當甘草等間殺活幾多人鐵山仁採藥與用藥相逢一會家殺人活人不眨眼白玉無瑕却有瑕石田薰一莖草上定綱宗殺活全歸掌握中未舉已前先薦得分明子過遼東掩室開增收文殊問菴提遮女云生以何為義女云生以不生生為生義殊云如何是生以不生生為生義女云若能明知地水火風四緣未嘗自得有所和合而能隨其所宜以為生義殊又問死以何為義女云死以不死死為死義殊云如何是死以不死死為死義女云若能明知地水火風四緣未嘗自得有所離散而能隨其所宜以為死義頌曰生以不生生死以不死死根本豁然明應時超佛祖隨宜離散與和合十字縱橫活鱍鱍金剛寶劒倚天寒外道天魔皆膽懾圓悟勤生以不生生為生指天指地四方行死以不死死為死雙林樹下亦如此生不生死不死四十九年無一字掣斷金鎖天麒麟突出金毛師子子南堂興生無所生死無所死風動塵飛波澄浪止和合離散隨處發現滿月彎弓雙雕一箭佛性泰問處分明答處端當機覿面不相謾死生生死元無際月上青山玉一團簡翁敬增收文殊三處度夏一月在魔宮一月在長者家一月在淫坊夏畢却歸世尊會中解制迦葉欲白槌擯出才舉此念見會中有無量釋迦無量文殊無量迦葉無量楗稚迦葉既見世尊云汝擯那箇文殊晦室明云文殊遍越聖制固是罪不容誅大小世尊前言不副後語楞嚴會上道如是文殊若有二相即非文殊者裏又道欲擯出那箇文殊惑亂不少育王當時作迦葉且放過文殊但擯出世尊一箇何故殺一有罪而天下咸服頌曰千峯月照楚江秋衲子初開布袋頭聞道淮南米價賤便隨船子下楊州褚衲秀大象不遊兔徑燕安知鴻鵠據令宛若成風破的渾如齧鏃遍界是文殊遍界是迦葉相對各儼然舉槌何處罰好一劄金色頭陀曾落節圓悟勤剎剎塵塵見不難頭陀何苦被他瞞當初若論收姦細莫把瞿曇做佛看心聞賁天高雲靜月彎彎雨過秋空眼界寬百億文殊真妙體分明只在一毫端正堂辨三處移場定是非頑心全不改毫釐胡言漢語憑誰會鐵額銅頭也皺眉密菴傑錦衣公子春遊慣白首佳人懊恨多彼富尚嫌千口少自貧無奈一身何月庭忠舍利弗入城遙見月上女出城弗心口思惟此姊見佛不知得忍不我試問之才近便問甚麼處去女曰如舍利弗與麼去弗云我方入城汝當出城云何言如舍利弗與麼去女云諸佛弟子當依何住弗云諸佛弟子當依大涅槃而住女云諸佛弟子既依大涅槃而住而我如舍利弗與麼去頌曰淡籠煙深瑣霧鶖子寧知此條路直饒撞入涅槃城未免隨他與麼去月上女實堪悲愛將青黛畫峨眉佛慧泉本來正體徹根源出入同途只此門已住如來大解脫掌中至寶耀乾坤圓悟勤重城曉入冒輕煙閙市相逢豈偶然一句等間相借問平田忽爾浪滔天月上女實堪憐雲髻高梳何處去借婆裙子拜婆年佛性泰涅槃一路同來往寸步寧虧達本鄉鶖子黠兒輕借便由如啞子喫生薑月上女太無良不塗紅粉自風光金瑣玄關留不住百尺竿頭信腳行佛燈珣續收出入分明報已知更言何處有狐疑但如鶖子恁麼去莫管傍人説是非文殊道如舍利弗與麼去千人萬人攔不住優遊自在涅槃城步步蓮華隨足舉且菴仁相逢打鼓弄琵琶須是還他兩會家曲罷不知何處去夕陽斜映暮天霞石菴玿有禮有樂能放能收人平不語水平不流漢地不收秦不管又騎驢子下楊州無際派月上女曾與麼去我今亦依如是住明明今古不曾藏一點靈光常獨露月林觀大地絶纖塵面南看北斗嫁雞逐雞飛嫁狗逐狗走雪菴瑾增收舍利弗因維摩詰室有一天女散華次問言汝何不轉却女身曰我從十二年來求女人相了不可得當何所轉即時天女以神通力變舍利弗作天女天乃化身如舍利弗而問言何不轉却女身弗以天女像而答我今不知何轉而變為女身天曰舍利弗若能轉此女身則一切女人亦當能轉如舍利弗非女而現女身一切女人亦復如是雖現女身而非女也即時攝舍利弗身還復如故而問言女身色相今何所在舍利弗言女身色相無在無不在天曰一切諸法亦復如是無在無不在頌曰鶖子已圓無漏種換却身形總不知通途一貫非他物午夜胡僧步雪歸正堂辨賓頭盧尊者赴阿育王宮大會王行香次作禮問曰承聞尊者親見佛來是不者以手策起眉毛曰會麼王曰不會者曰阿耨達池龍王請佛齋吾是時亦預其數頌曰拈起眉毛示育王當時凡聖絶商量從來對衆難收拾眼上依前兩簇長佛印元一翳在眼空花亂墜狹路相逢難為回避大王還識老僧無似雪眉毛長窣地佛慧泉我佛親見賓頭盧眉長髮短雙眉粗阿育王猶疑狐唵摩呢噠哩悉哩蘇嚧保寧勇續收靈山會上舊家風脫略從茲勢莫窮金斗峯前重漏泄莫將附子當天雄正堂辨尊者親曾見佛來雙眉䇿起笑顏開古今不隔絲毫許天上人間孰可陪佛照光以手䇿起眉毛千聖從來不識一會靈山儼然説甚今朝昨日月林觀䇿起眉毛答問端親曾見佛不相謾至今應供四天下春在梅梢帶雪寒天童淨尊者當時親見佛眉毛䇿起有來端頂門𣤩瞎金剛眼恩大難酬雨露寬枯禪鏡厖眉䇿起貌稜層見佛元來却不曾南嶽天台相撞著被人喚作捉齋僧巳菴深䇿起眉毛示育王分明佛面露堂堂至今阿耨池中水流落人間潤八荒天目禮君王一語出如綸尊者眉毛八字分四海風清煙浪靜碧天無際水無垠無準範尊者䇿眉王不會十方剎土古風清佛齋勝會親曾預不是尋常粥飯僧橫川珙殃崫摩羅未出家時事外道受教為憍尸迦欲登王位用千人拇指為花冠所得九百九十九唯欠一指遂欲殺母取指時佛在靈山以天眼觀之乃化作沙門在殃崫前殃崫遂釋母欲殺佛佛徐行殃崫急行追不及乃喚曰瞿曇住住佛告曰我住久矣是汝不住殃崫聞之心忽開悟遂棄刃投佛出家佛即授與落髮披衣頌曰殃崫雄雄方勇鋭瞿曇住住息風波殺人作佛當頭劄覆雨翻雲在剎那踈山如急行緩步無前後渾踏長安路一條殃崫回頭知住處便能平步上雲霄花冠不用娘生指鬚髮寧煩費力搖好是移花兼蝶至等間買石得雲饒佛燈珣續收我住久矣是汝不住是汝若住鼻孔相拄不動步而遍界遊師姑畢竟女兒作雲居悟從人求覓枉奔波過在孳生口數多殺却渾家仍自殺誰能奈得你儂何野雲南殃崫摩羅既出家為沙門因持鉢入城至一長者家值其婦産難子母未分長者云瞿曇弟子汝為至聖當有何法能免産難殃崫曰我乍入道未知此法當去問佛却來相報遽返白佛具陳上事佛告曰汝速去説我自從賢聖法來未曾殺生殃崫往告其婦人聞之當時分免母子平安頌曰聖法從來不殺生本無生殺亘精明是諸人我皆空相一切冤親盡假名甘露才霑除熱惱玉蓮金子兩敷榮覺海元月裏姮娥不畫眉只將雲霧作羅衣不知夢逐青鸞去猶把花枝蓋面歸鼓山圭華陰山前百尺井中有寒泉徹骨冷誰家女子來照影不照其餘照斜領徑山杲續收不遲一步不疾一刻明眼衲僧如何會得粉骨碎身未足酬一句了然超百億尼無著總賢聖劫來未曾殺而今斷這一刀休果然葛怛胸中落笑殺靈山老比丘密菴傑不因一事不長一智不曾殺生了無忌諱傅言送語當風流拈得口兮失却鼻木菴永賢聖中來不殺生其家子母自團圓陰陽造化初無迹春在花枝特地妍天目禮綵仗神旗獵曉風雞人催唱鼓鼕鼕銅壺漏永何時歇如此相催即老翁南叟茂非食不療飢非藥不療病黃面老瞿曇識盡衆生性寶葉源我瞿曇佛具正遍知子母分解只在當時橫川珙那吒太子析肉還母析骨還父然後現本身運大神力為父母説法佛眼遠云肉既還母骨聚還父用甚麼為身學人到這裡若見得去廓清五蘊吞盡十方乃頌曰骨還父肉還母何者是身分明聽取山河國土現全軀十方世界在裏許萬劫千生絶去來山僧此説非言語骨肉都還父母了未知那箇是那吒一毛頭上翻身轉一一毛頭渾不差徑山杲續收那吒太子本來身卓卓無依不受塵雲散水流天地靜籬間黃菊正爭春自得暉析骨還父肉還母不知那箇是那吒夜深失腳千峯外萬古長風片月斜少室睦骨還父肉還母日西沉水東注良久露北澗簡雨散雲收後崔嵬數十峯王維雖敏手難落筆頭蹤無準範七賢聖女姊妹同遊尸陀林一姊指尸曰尸在此人在甚處諸姊妹諦觀皆悉悟道乃感帝釋雨華讚曰我是帝釋見諸姊悟道故來供養但諸姊有何所須我能給施女曰我家四事七珍悉皆具足唯要三般物一要無根樹一株二要無陰陽地一片三要叫不應谷一所帝釋曰一切所須我悉有之若此三物我實無女曰汝若無此爭解濟人遂同往白佛佛言我諸弟子不解此義唯有諸菩薩乃解此義頌曰寒林裏忽逢伊帝釋行檀恨已遲三物索來何處有却令諸姊皺雙眉憍尸迦知不知更獻天華三兩枝佛慧泉尸在此兮人何在疾雷破山風振海雲飛雨散相見時髑髏眼睛放光彩龍牙才帝子遊春不逐他相邀諸姊入尸陀死人堆裏出身路撥動煙塵見也麼靈利漢不消多回頭踏著自家底洞雲深處舊煙蘿佛燈珣續收談玄談妙實堪誇帝釋才聞便雨華臨機須索三般物看看愁殺憍尸迦歷劫不曾違背面明明借問却周遮大溈智無陰陽地無根樹谷呼不應當頭露羅列七珍森太虗動地雨華無量數天帝釋七賢女明明指出真金處無生無法本如如只箇如今離言語圓悟勤無陰陽地叫不響山無根樹子大家攀七賢女太嬌癡却將紅粉畫蛾眉憍尸無此三般物那得天華撩亂飛佛鑑勤無根樹子枝條纍山谷無聲句最親陰陽不到間田地結子開華朵朵新正堂辨觀之不可見聽之不可聞家有三般寶富貴壓乾坤月菴果無根樹子一株山翁不費誅鋤鎚碎千年桃核不須緣木求魚蒙菴嶽三無陰陽地一片明明賣貴買賤死尸無處活埋露出三頭兩面不應山谷一所透出千門萬戶清曉一聲杜鵑勸人不如歸去無陰陽地有甚巴鼻無根樹子荒得人死叫不響山谷摩醯亞三目作麼作麼因禍致福惱得憍尸迦大笑却成哭退菴奇七珍八寶任君需三物從來的是無若向無中拈得出不須見佛問何如天目禮增收昔城東有一老姥與佛同生而不欲見佛每見佛來即便回避雖然如此回顧東西總皆是佛遂以手掩面於十指掌中亦總是佛頌曰覺城東際老婆婆白髮𣯶𣯶意氣多與佛同生嫌見佛惡人無奈惡人何笑翁堪開眼也著合眼也著回避無門將錯就錯祥麟只有一隻角掩室開城東聖姥坐蓮臺大地衆生正眼開與佛同生嫌見佛一身難作二如來虗堂愚平生不願佛相逢十指尖頭現紺容夾路桃華風雨後馬蹄無處避殘紅石室輝雙林善慧大士因梁武帝請講經士升座以尺拊案一下便下座武帝愕然志公乃問陛下會麼帝云不會志云大士講經竟頌曰不向雙林寄此身却於梁土惹埃塵當時不得志公老也是悽悽去國人雪竇顯遠別雙林事有因金陵明主慕仁人良哉高座登臨次一擊大千經出塵正覺逸大士何曾會講經志公方便且相成一揮案上俱無取直得梁王努眼睛白雲端大士講經時揮案成注腳一丸消衆病不假驢駝藥慈受深案上一聲鳴已是重重添注腳梁王何事不回頭志公將錯還就錯佛鑑勤續收身受龍華三會主槌開鳳閣九重城梁王築倒金剛佛更問如何不講經剋符道者兩口明明一無舌同生同死為君決那吒頂上喫蒺藜金剛腳下流出血東山空大士錯解注志公錯注解臭肉積屠門堪笑無人買範無準雙林大士太無端又向梁朝露一班經旨未分玄路絶一揮案上動龍顏葛廬覃傅大士見梁武帝不起羣臣曰大士見王為甚不起士曰法地一動一切不安頌曰梁國令他魏國愁渡江投水暗隨流雖然寸土居無動爭奈雙林半樹秋投子青增收傅大士一日披衲頂冠靸履朝見梁武帝帝問是僧邪士以手指冠帝云是道邪士以手指靸履帝云是俗邪士以手指衲衣汾陽昭代云大士多能五祖戒云笑殺傍觀佛心才云要識三教聖人體麼向武帝問處會要識三教聖人用處麼向大士指處薦取直饒體用分明衲僧門下大遠在頌曰道冠儒履釋袈裟和會三家作一家忘却率陀天上路雙林端坐待龍華胡隱濟身披壞衲片雲寒腳著朝靴頂戴冠要使三宗同一轍揑沙終是不成團笑翁堪泥封三詔出煙霞直到金陵帝主家自古多能誰得及道冠儒履釋袈裟寶葉源非儒非道亦非禪杜撰修行忒可憐擔閣一身三不了至今八百有餘年一衲戒增收傅大士頌云夜夜抱佛眠朝朝還共起起坐鎮相隨如形影相似欲識佛去處祇者語聲是頌曰誰有單于調換取假銀城良久曾被雪霜苦楊花落也驚天衣懷要眠時便眠要起時即起水洗面皮光啜茶濕却觜大海紅塵生平地波濤起呵呵阿呵阿囉哩哩囉哩保寧勇增收傅大士頌云空手把鋤頭步行騎水牛人從橋上過橋流水不流頌曰六月上伏八月中秋人平不語水平不流心聞賁魚行水濁鳥飛毛落大士橫身不受斧鑿木菴永狗走抖擻口猴愁摟搜頭瑞巖門外水自古向西流斷橋倫增收傅大士頌云須彌芥子父芥子須彌爺山水坦然平敲氷來煮茶頌曰須彌納芥不容易芥納須彌匹似間長河攪著成酥酪輕輕擊透祖師關圓悟勤增收傅大士頌云有物先天地無形本寂寥能為萬象主不逐四時凋五祖演云古人恁麼道可謂錦上鋪花不妨奇特諸人且作麼生會白蓮今日曲順後機不惜眉毛亦為頌云有中有無中無細中細粗中粗土面灰頭不染塵華街柳巷樂天真金雞唱曉瓊樓夢一樹華開浩劫春足菴鑒
