body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第三世之五南嶽下第二世之餘襄州龐蘊居士見馬祖初謁石頭乃問不與萬法為侶者是甚麼人頭以手掩其口豁然有省後參馬祖問曰不與萬法為侶者是甚麼人祖曰待汝一口吸盡西江水即向汝道士於言下頓領玄旨頌曰一口吸盡西江水萬古千今無一滴要知儻理不儻親馬祖可惜口門窄白雲端風吹日炙露尸骸泣問仙人覔地埋忍俊不禁多口老陰陽無處可安排保寧勇吸盡西江向汝道馬師家風不草草截流一棹破煙寒天水同秋清渺渺天童覺一口吸盡西江水洛陽牡丹新吐藥簸土揚塵勿處尋擡眸撞著自家底五祖演一口吸盡西江水道頭便合自知尾可憐龐老馬大師相逢對面千萬里佛鑑勤一口吸盡西江水大師也是不得已偶被龐公借問來盡力道得只如此文殊道借問乾坤獨步人全提分付太言覩西江吸盡無涓滴誰解喉門鎖要津石門易一口吸盡西江水鷓鴣啼在深花裏自有知音笑點頭其來不入聾人耳寶峯照一口吸盡西江水嶺上桃華香幞鼻枝枝葉葉盡含春也是因我得禮你高菴悟大海波濤闊小人方寸深海枯終見底人死不知心鼓山圭一口吸西江通身不隱藏聖凡不到處頂上放祥光楚安方續收一口吸盡西江栗棘𡎺殺老龐當陽若也吞得管取海內無雙圓悟勤一口吸盡西江水涓滴不留洪浪起駒兒自是不尋常嘶風弄影斜陽裏白楊順一口吸盡西江馬駒踏殺老龐不用燒錢引鬼自然安怗家尼無著總吸盡西江今古無雙及第歸也本身姓龐典牛遊龐公孰謂問頭親馬祖言猶泥齒唇吸盡西江禁不住嶮崖句裏笑翻身水菴一一口吸盡西江水碓觜生花猶未已葉葉枝枝垂雨露須彌藏在針鋒裏大禪明一口吸盡西江水龐老不曾明自己爛醉如泥膽似天鞏縣茶瓶三隻觜松源嶽密呾哩狐密咀哩智開口動舌是甚滋味㘞你莫癡簡堂機西江一吸了無餘突出堂堂大丈夫盡道世間胡鬚赤誰知更有赤鬚胡密菴傑稱鎚搦出油間言長語休腰纏十萬貫騎鶴上揚州堂仁淨裸裸赤灑灑沒可把喏可知禮也退菴休一口吸盡西江水千手大悲提不起碓觜生花春晝長狸奴白牯皆歡喜普菴玉一著高一著一步闊一步馬駒踏殺人住住住住住枯禪鏡增收居士見丹霞霞作走勢士曰猶是拋身勢作麼生是嚬呻勢霞便坐士向前以拄杖畫箇七字於下畫箇一字曰因七見一見一忘七霞便起去士曰更坐少時猶有第二句在霞曰向這裏著語得麼士遂哭出去頌曰因七見一見一忘七月在中央天無四壁十方虗空掃蹤滅迹通身是口説不出青黃碧緑亂搽抹嗄南堂興因七見一尋蹤訪迹見一忘七青天白日第二句中因凶得吉挂劍虗堂歸去來忠義之言難可失哀哀哀方菴顯增收居士訪丹霞於霞前立少時便出去霞不顧士却來坐霞却來士前立少時便歸方丈士曰汝出我入未有事在曰者老翁出出入入有甚了期士曰略無些子慈悲曰引得箇漢到這田地士曰把甚麼引霞拈起居士幞頭曰恰似一箇師僧士拈幞頭安霞頭上曰恰似一箇俗人霞應喏三聲士曰猶有些子氣息在霞拋下幞頭曰大似箇烏紗巾士亦應喏三聲師曰昔時氣息爭解忘得士彈指三下曰動天動地頌曰一出一入徐行欵步庠序威儀風流俏措互換誰分僧俗禮義於茲富足正覺逸丹霞與龐公終日用神通是處遊歷盡全身遍界中千峯勢到嶽邊止萬派流歸海上融大圓智燒木佛老有甚心肝賣笊籬翁家破人殘相追相逐相激相歡難難倚天長劒兮射斗光寒攪海蒼龍兮不觸波瀾看看家家有路透長安南堂興增收居士見丹霞來遂不語亦不起霞乃提起拂子士便拈起槌子霞曰只與麼別更有在士曰此回見師不似於前曰不妨減人聲價士曰本來要折倒汝一上曰與麼則啞却天然口去士曰汝啞却本分猶纍我啞却霞擲下拂子便行士召然闍黎霞不顧士曰不唯患啞兼亦患聾頌曰丹霞初訪龐公日覿面分明竟不言竪拂只因無外物拈槌何別有天然回頭患啞真兼實拂袖如聾外得玄欲得會師相見處石人行處笑喧喧般若柔古人覿面機相見無可道竪拂有丹霞拈槌是龐老龜毛逐語斜兔角隨意倒患啞仍患聾分明好更好汾陽昭動絃別曲葉落知秋聾盲槌拂彼此相酬有意氣時添意氣不風流處也風流塗毒策挂角羚羊亡氣息倚天長劒用無痕纖波不動寒蟾影無限魚龍暗吐吞正覺顯增收居士因辭藥山山命十禪客相送至門首士乃指空中雪曰好雪片片不落別處有全禪客曰落在甚處士遂與一掌全曰也不得草草士曰恁麼稱禪客閻羅老子未放你在曰居士作麼生士又掌曰眼見如盲口説如啞雪竇顯別云初問但握雪團打復頌曰雪團打雪團打龐老機關沒可把天上人間不自知眼裏耳裏絶瀟灑瀟灑絶碧眼胡僧難辨別龐公全提滴水滴凍藥山闍黎兩眼定動機不發時一場困夢本自天真阿誰解用真淨文全禪相送龐公正值滿天雪下片片不落別處可憐有口如啞直饒握得成團過新羅去也解道前路善為免得東打西打也大奇三年留客住莫待去時飢上方益三尺寒光射斗牛鏌鋣提處鬼神愁蠻夷不識軍將令誤入重圍血頸流冶父川頭上漫漫腳下漫漫拄定即易瞥轉還難金剛寶劒逼人寒不墮機鋒句外看石溪月增收雲居悟曰若有人問雲居落在甚麼處即向伊道落在雪裏大衆會麼頌曰落在雪裏不犯腳手釘觜鐵舌也難下口揮掌雪團劈面來打著金剛腦背後增收居士有偈曰有男不婚有女不嫁大家團欒頭共説無生話頌曰收拾山雲海月情團欒鼻直眼眉橫龜毛拂子兔角杖敲得虗空嚗嚗聲石溪月春至花開秋後葉落父子團欒識甚好惡枯禪鏡不説是不説非揚眉瞬目姦裏放癡父慈子孝無他事渾家一味討便宜尼間林英男兒懶墯女無良多口翁翁快口娘討盡便宜不知足何曾有箇會無生間極雲增收居士偈曰十方同聚會箇箇學無為此是選佛場心空及第歸頌曰幞頭塵土靴襴破選佛場中無兩箇若道心空及第歸頂上一槌難放過佛慧泉風月山川共一家誰來語下定龍蛇太白不曾登便殿筆頭昨夜自生花心聞賁喪盡生涯賣笊籬白拈火裏討便宜看來伎倆只如此也道心空及第歸佛照光居士一日曰難難十石油麻樹上攤婆應聲曰易易百草頭邊祖師意靈照曰也不難也不易飢來喫飯困來睡頌曰口子喃喃略不休把却笊籬做火遊有箇女兒不肯嫁他年定作老丫頭懶菴樞冤家復冤家面面咸相覩品弄沒絃琴清聲播千古夏菴觀居士以家業盡投湘水女子靈照日將笊籬鬻於市中頌曰髽角堆雲美態嬌笊籬數柄杖頭挑入廛寧可無人問撞著行家定不饒圓照本爺將活計沉江水纍汝沿街賣笊籬不是家貧連子苦此心能有幾人知無際派父既心空及第歸女兒依樣畫蛾眉一家只了一家事那得間錢買笊籬無量壽居士因賣竹漉籬下橋喫檏女子靈照一見亦去爺邊倒士曰你作甚麼女曰見爺倒地某甲相扶士曰賴是無人見頌曰憐兒不覺笑嗄嗄却於中路碾泥沙黃龍老漢當時見一棒打殺者冤家黃龍南居士倒地靈照扶起乞兒伎倆討甚巴鼻應菴華孝順藏五逆人前醜莫遮今生親骨肉夙世惡冤家南叟茂龐公倒地靈照扶起至今幾百年清風猶未已猶未已東海鯉魚千尺觜巳菴深居士坐次問靈照曰古人道明明百草頭明明祖師意如何會照曰老老大大作這箇語話士曰你作麼生照曰明明百草頭明明祖師意士乃笑頌曰萬里無雲銀漢橫大方玄路等間行阿爺智量世希有女子圓光頂𩕳生或菴體龐老家聲千古在説難説易互相酬就中靈照較些子祖意分明百草頭成首座居士將入滅謂靈照曰視日早晚及午以報照遽報日已中矣而有食也士出戶觀次靈照即登父座合掌坐亡士笑曰我女鋒捷於是更延七日頌曰家有全棚樂新翻調不同分明恨離別却是喜相逢西巖惠一棚戲舞渾家樂鼓樂喧天恣攛掇戲衫卸下許誰知無端笑倒黃番綽北海心居士臨示寂州牧于公頔問疾次士謂之曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖就枕公膝而化頌曰欲識窮源處何人為指迷夕陽雞犬外桃李自成溪虛堂愚龐婆入鹿門寺作齋維那請疏意回向婆枯梳子插向髻後曰回向了也便出去頌曰龐婆移轉髻邊梳一段風流舉世無萬事便將公道斷維那不用筆頭書慈受深維那對衆要宣揚返被婆婆笑一場挈轉牙梳重詰腳相逢猶更醋商量呆堂定六祖下第三世之六清源下第二世之一澧州藥山惟儼禪師嗣石頭師辭馬祖返石頭一日在石上坐次頭問曰汝在這裏作麼師曰一切不為曰恁麼即間坐也師曰若間坐即為也曰汝道不為且不為箇什麼師曰千聖亦不識頭以偈讚曰從來共住不知名任運相將祇麼行自古上賢猶不識造次凡流豈可明頌曰玄微及盡本修然若謂渠間萬八千月印澄江魚不見釣人何必更拋筌丹霞淳任運不知名輕輕著眼聽水上青青緑元來是浮萍五祖演擺撥佛祖縛曠然繩墨外一物亦不為縱橫得自在古鑑臨臺明辨去來金槌影動樹花開任運相將不可陪法雲隨處作風雷圓悟勤續收行行月冷風高步步山寒水深逢人披肝露膽見義劈腹剜心瞎堂遠石頭打草要蛇驚密護玄機絶彚情迅馬追風須辨的報云千聖不知名隱靜儼平常間坐與間行嶺上無心雲片橫照境俱忘人不立從前日午打三更雪巖欽增收藥山首造石頭之室便問三乘十二分教某甲粗知嘗聞南方直指人心見性成佛實未明了伏望和尚慈悲指示曰恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生師罔措曰子因緣不在此且往馬大師處去師稟命恭禮馬祖仍伸前問祖曰我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是子作麼生師於言下契悟便禮拜祖曰你見甚麼道理便禮拜師曰某甲在石頭處如蚊子上鐵牛祖曰汝既如是善自護持頌曰總不得太無端野老焉知天地寬直饒數到八九十家山猶隔一重關楊無為四海狼煙靜中原信息通罷拈三尺劒休弄一張弓鼓山圭好箇話端阿誰解舉舉得十分未敢相許徑山杲倒腹傾腸説向伊不知何故尚遲疑只今便好猛提取莫待天明失却雞𫎇菴聰重疊峯巒俱鎖斷知誰深入到桃源行人只見一溪水流出桃花片片鮮肯堂充坐斷千峯路穿開碧落天那容問端的端的髑髏前松源嶽恁麼不得總不得脫却布衫赤骨律劈頭一搭忽翻身便見口開并眼白雪菴瑾一重山了一重雲行盡天涯轉苦辛驀劄歸來屋裏坐落花啼鳥一般春虛堂愚剖盡枯腸喪盡機通身不挂一毫絲清風步步隨身轉明月誰分上下池高峯妙增收藥山侍奉馬祖三年一日祖問子近日見處作麼生師曰皮膚脫落盡唯有一真實曰子之所得可謂協於心體布於四肢既然如是將三條篾束取肚皮隨處住山去師曰某甲又是何人敢言住山祖曰不然未有常行而不住未有常住而不行欲益無所益欲為無所為宜作舟航無久住此頌曰師資會遇意非輕脫落皮膚轉不親三篾束來成話至今錯認定盤星增收藥山因僧問如何是道中至寶師曰莫諂曲曰不諂曲時如何師曰傾國不換頌曰道中有至寶濟世無倫匹藥嶠發深藏唯云不諂曲不諂曲傾國相酬未相直壁立萬仞此心真不必當來問彌勒圓悟勤直如絃瑩如玉露膽傾心更無迂曲直饒遍地黃金未免易之不得易不得南海波斯面如墨佛性泰藥山久不升堂院主白云大衆久思和尚示誨師曰打鐘著衆才集師便下座歸方丈主隨後問曰和尚既許為大衆説法為甚麼一言不措師曰經有經師論有論師爭怪得老僧傳燈録與此稍異乃曰一日院主請師上堂大衆才集師良久便歸方丈閉門院主逐後曰和尚許某甲上堂為什麼却歸方丈師曰院主經有經師論有論師律有律師又爭怪得老僧頌曰藥山老應病藥請上堂椎鍾著一丸不再愈顛狂孤負金仙換骨方野軒遵家法簡嚴非二非三月來明湛水雲退露寒巖真機自得妙處誰參不是文殊白槌後也應千古屈瞿曇天童覺明珠一顆價難酬不是知音便暗投翻笑藥山空費力水清魚現不吞鈎慈受深續收誰云藥嶠不升堂日日相逢為舉揚獨耀無私常顯露莫將無語錯商量成枯木癡兒刻意止啼錢良駟追風顧影鞭雲掃長空巢月鶴夜寒入骨不成眠天童覺明修棧道暗度陳倉絲毫不犯總教滅亡掩室開鋪席宏開見也麼買人何似看人多十成好箇吹毛劒只作陶家壁上梭無凖範鐘鳴衆集歸方丈苦殺當頭請法人法法本來無一法若言無法法纏身橫川珙增收藥山坐次僧問兀兀地思量什麼師曰思量箇不思量底曰不思量底如何思量師曰非思量頌曰兀兀地思量無可得思量無可思量處真箇好思量大庾嶺頭逢六祖鰲山店上見曾郎無凖範增收藥山一日因遵布衲浴佛乃曰這箇從汝浴還浴得那箇麼曰把將那箇來師乃休長慶云邪法難扶玄覺云且道長慶恁麼道在賓在主衆中喚作浴佛語亦曰兼帶語且道盡善不盡善頌曰愛將惡水驀頭澆引得清風慰寂寥無限遠山描不得喬松修竹冷蕭蕭塗毒策一番雨過一番晴蠶眼已開桑眼青鵓鳩樹頭啼不已百舌黃鸝相共鳴懶菴樞增收藥山書佛字問道吾是什麼字曰佛字師曰多口阿師頌曰道吾忽爾見先師問字開拳顯妙機對佛是真真是佛藥山為破肚中疑汾陽昭藥山此問實堪嗟啐同風不易誇問佛須知呈妙旨多因於此現空花延壽慧藥山手中書佛字問他端爾要心開只將佛字為酬對元是曾持五戒來橫川珙增收藥山夜參次不點燈師垂語曰我有一句子待特牛生兒即向你道時有僧曰特牛生兒也何以不道師曰把燈來把燈來其僧退入衆雲巖舉似洞山山曰這僧却會祇是不肯禮拜頌曰犢牛生子頗相諳兩眼通紅色似藍把火照來無覔處大家普請一時參龍門遠藥山看經有僧問和尚尋常不許人看經為什麼却自看師曰我只圖遮眼曰某甲學和尚還得也無師曰若是汝牛皮也須看透長慶云眼有何過玄覺云且道長慶會藥山意不會藥山意頌曰徹底更何疑穿會者稀叮嚀由付囑句句是玄機汾陽昭門前自有千山月室內都無一點塵貝葉若圖遮得眼須知淨地亦迷人成枯木遮眼誰同藥嶠看牛皮穿透骨毛寒五湖四海知多少字密行踈總一般保寧勇續收藥山不許衆看經自是時人眼不明常持經卷去來者學師遮眼不惺惺石門聰看破牛皮徹底穿到頭無義亦無文問伊遮得何人眼梵語唐言總不分天目禮你若學他看牛皮真箇穿長年橫案上字義自然圓橫川珙續收藥山謂雲巖曰與我喚沙彌來曰喚他來作甚麼師曰我有箇折腳鐺子要他提上挈下曰恁麼則與和尚出一隻手去也師便休頌曰藥山道頭雲巖知尾雖然頭尾相稱要且不識羞耻應菴華豈要共出一隻手只教喚著沙彌來鐵鐺無腳又無耳墻下春深薺葉開橫川珙藥山一日坐次道吾雲巖侍立師指案山上枯榮二樹問吾曰枯者是榮者是曰榮者是師曰灼然一切處光明燦爛去又問巖枯者是榮者是曰枯者是師曰灼然一切處放教枯淡去高沙彌忽至師曰枯者是榮者是曰枯者從他枯榮者從他榮師顧道吾雲巖曰不是不是頌曰落霜黃葉作金錢癡騃啼兒見喜歡捉得獻娘俱道好不知誰是哂傍觀海印信一枝榮一枝枯中心緑葉更扶踈黃鶯任解千般語免得傍人彈子無佛慧泉抹粉塗壞復褁頭盡由行主線牽抽鼓皮打破曲吹徹收拾大家歸去休保寧勇説盡榮枯轉見難沙彌平墮語言端老僧遙指猿啼處雲散千空月色寒地藏恩雲巖寂寂無窠臼燦爛宗風是道吾深信高禪知此意間行間坐任榮枯草堂清藥山用處少人扶堪笑雲巖與道吾猶向榮枯生解會豈知潘閬倒騎驢楚安方年老心孤笑藥山團欒諸子坐忘還從頭細問榮枯事鼻孔元來總一般雲巖因續收三三兩兩不相同携手行行入草中掇轉腳頭穿繡履何妨臘月鼓春風東谷光增收藥山因僧問平田淺草麈鹿成羣如何射得麈中主師曰看箭僧放身便倒師曰侍者拖出這死漢僧便走師曰弄泥團漢有甚麼限頌曰麈中主君看取下一箭走三步五步若活成羣趂虎正眼從來付獵人師高聲云看箭雪竇顯平地飛鐵騎弓矢不開張好箇麈中主穿心向路傍佛心才獵人有神箭射得麈中主箭下便承當跳出曹溪路翻身踏著上頭關敵勝驚羣瞥爾間圓悟勤馬駒出廄腰猶軟鳳子離巢力尚微生就玉蹄千里去養成金翅九霄飛佛鑑勤藥山一日齋時自打鼓高沙彌捧鉢作舞入堂山便拋下鼓槌曰是第幾和曰第二和師曰如何是第一和高就桶內舀一杓飯便去頌曰一般打鼓并作舞與你諸方事不同歷歷正聲霄漢外且非數目落寰中汾陽昭父子相投氣味同擎盂打鼓展家風雖然百味般般有爭奈風吹別調中成枯木聲鼓拈槌第二籌鉢盛香飯飽還休東風扇後韶光美別岸垂楊弄翠柔雪峯預增收鄧州丹霞天然禪師嗣石頭參石頭執役三載忽一日頭告衆曰來日剗佛殿前草至來日大衆諸童行各備鍬钁剗草獨師以盆盛水沐頭於頭前胡跪頭見而笑之便與剃髮又為説戒師乃掩耳而出頌曰石頭剗草驗英豪懵懂丹霞眼不高若解轉身行活路至今應不纍兒曹谷源道丹霞於慧林寺遇天寒取木佛燒火向院主訶曰何得燒我木佛師以杖子撥灰曰吾燒取舍利曰木佛何有舍利師曰既無舍利更取兩尊燒主自後眉鬚墮落頌曰古巖苔閉冷侵扉飛者驚危走者迷夜深寒爇汀洲火失曉漁家忙自疑投子青雪擁嵓扉凍不春一尊木佛劈為薪眼睛動處眉毛落為謗如來正法輪張無盡老倒丹霞燒木佛院主眉鬚剛突出罪過從來作底當誰道千虗不博實佛燈珣覿面難藏向上機家風千古為人施銀山鐵壁重重透賴有丹霞院主知楚安方續收橫行私路乍赴公筵幞頭腳短腰帶夸圓不是伴郎來勸酒誤他年少覔青氈月堂昌丹霞燒却木佛院主眉鬚墮落普天匝地人知院主當頭不覺本是醍醐上味爭奈反成毒藥果報自家擔當罪因却是他作叢林浩浩商量未免情識卜度却慮一箇自己直下不須推托更問如何若何要且無繩自縛圓悟勤彭祖八百乞延壽秦皇登位更求仙昨向天津橋上過石崇猶自送窮船文殊道丹霞寒燒木佛院主因禍得福可憐杜撰巡官祇管胡卜亂卜應菴華丹霞燒木佛院主眉鬚落彎弓射蔚遲須是金牙作無相範荒院天寒燒木佛一堆紅焰對枯床渾身終夜烘烘暖罪過難教院主當橫川珙丹霞一日訪龐公見女子取菜次師曰居士在否女放下菜藍斂手立師又問居士在否女便提藍去師回須臾公歸女舉前話公曰丹霞在麼曰去也公曰赤土塗牛妳頌曰丹霞一問女子斂手擬議之間烏飛兔走何人證明菴中野叟赤土塗牛不談子醜妙高臺主露頭露面便相酬慣出人前不怕羞自是奴奴肌骨好不施紅粉也風流白面郎從來門戶恰相當可憐赤土塗牛妳打瓦鑽龜亂度量上方益淡薄衣裳取次粧放籃斂手自無良老龐猶更多愁在不到奴奴漏泄香張無盡續收作者相逢用處親携籃歸去意深深雲收雨散江天淨一曲漁歌過遠村妙峯善爺頑賴兒還債徹底老婆心赤土塗牛妳北澗簡人前賣俏最風流一釣無端便上鈎縱使菜藍提得去奈何覆水已難收笑翁堪放行把住謾周遮一段風流出當家不是當年漆桶破爭能撒土又拋沙蓬菴會揖問居士在否放下藍兒斂手咄哉一對冤家獨許龐公知有退菴演當風鴉臭氣一箇豆娘兒熏得行人走衝爺皺斷眉西巖惠嘮嘈口觜是丹霞斂袂携藍已答他要得家私無漏泄歸來莫説與爺爺間極雲增收丹霞問僧甚處宿曰山下宿師曰甚處喫飯曰山下喫飯師曰將飯與闍黎喫底人還具眼也無僧無對長慶問保福將飯與人喫感恩有分為甚麼不具眼福云施者受者二俱瞎漢慶云盡其機來又作麼生福云道某甲瞎得麼玄覺徵云且道長慶明丹霞意為復自用家財頌曰盡機不成瞎按牛頭喫草四七二三諸祖師寶器持來成過咎過咎深無處尋天上人間同陸沉雪竇顯增收丹霞問龐居士昨日相見何似今日曰如法舉昨日事來作箇宗眼師曰祇如宗眼還著得龐公麼曰我在你眼裏師曰某甲眼窄何處安身曰是眼何窄是身何安師休去士曰更道取一句便得此話圓師亦不對士曰就中這一句無人道得頌曰是眼何窄是身何安昨日今日事無兩般淮南兩浙秋熱春寒恁麼會得也太無端三十年後莫受人謾佛鑑勤昨日今朝事不同一番寒雨一番風太平基業分明在溪澗河源總向東塗毒策棊逢敵手著還新得意難藏眼裏身局罷不知何處去空山惆悵爛柯人方菴顯昨日與今日同中却不同獰龍攪滄海俊鶻摩青空宗眼明如日機輪疾似風丹霞回首處遍界覔無蹤石溪月增收丹霞一日手提數珠居士近前奪却曰二彼空手即休師曰妬忌老翁不識好惡曰捉師公案未著後回終不恁麼師曰吽吽曰吾師得人怕師曰猶少棒在曰年老喫棒不得師曰不識痛癢漢打得也無益曰也無接引機關在師拋下數珠而去曰賊人物終不敢收師回首呵呵大笑士曰這賊敗也師近前把住曰更不諱得士與一掌頌曰龐老無風起浪丹霞浪起風生迤邐雷奔電掣逡巡虎戰龍爭引水插田博飯居山火種刀耕雨散雲收日出信步東行西行南堂興
