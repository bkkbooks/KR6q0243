body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第十一世之一南嶽下第十世臨濟潭州石霜楚圓慈明禪師嗣汾陽僧問如何是佛師曰水出高原師自頌曰水出高原也大奇禪人不會眼麻彌若也未明泥水句燈籠露柱笑嘻嘻慈明為水出高原天下禪僧走似煙只聽清聲來耳畔不知流落那峯前正覺逸水出高原上風翻浪似銀摛毫聊一頌夢裏説書紳翠巖真衝斷雲根迸石來泠冷千古下崔嵬未明的的朝宗意聽取春深動地雷溈山秀高原水出曉晴天對答臨機豈偶然衲子不知流落處一尋寒木破溪煙地藏恩續收穿雲迸石不辭勞大抵還他出處高溪澗豈能留得住終歸大海作波濤雪巖欽水出高原浪拍天四維上下絶塵煙分明好箇真消息未必時人到那邊高峯妙增收慈明室中插劒一口以草鞋一緉水一盆置劒邊每見入室即曰看看有至劒邊擬議者師曰嶮喪身失命了也便喝出頌曰暑往寒來春復秋夕陽西去水東流將軍戰馬今何在野草間花滿地愁瞎堂遠四五百條花柳巷二三千處管絃樓縱然有搭間田地不是栽花蹴氣毬堂仁家山指出路非遙萬仞嵯峨插碧霄一片白雲橫谷口幾多歸鳥盡迷巢水庵一單鎗匹馬出汾陽端的還他主將強盆水草鞋橫室內殺人更不犯鋒鋩無際派百花藂裏𩍐鞭過俊逸風流有許多未第儒生偷眼滿懷無奈舊愁何斷橋倫增收慈明在衆中時到芝和尚寮中芝坐間開合子取香在手中欲燒次師問曰作麼生燒芝便放爐中燒師曰齖郎當漢又恁麼去也頌曰千人萬人行一路幾箇移身不移步對面拈香爐上燒齖郎當漢又恁去白雲端增收慈明因僧問如何是古佛家風師曰銀蟾初出海何處不分明頌曰銀蟾出海照無私處處分明是阿誰見面不須重問訊從教日炙與風吹高峯妙增收慈明冬日榜僧堂作此字二二三几其下注曰若人識得不離四威儀中首座見曰和尚今日放參師聞而笑頌曰選佛堂前光焰焰分明一柄道士劍果然堂頭放晚參首座之言有神見野雲南畫下畫上畫短畫長明明揭示浩浩商量何似京師出大黃月庭忠增收慈明因僧問閙中取靜時如何師曰頭枕布袋頌曰杭袋安眠得自由任他人物閙啾啾粗衣糲食尤無念誰管扶桑日出頭海印信增收慈明因僧問如何是不動尊師曰提不起頌曰不動尊提不起茫茫宇宙誰能委秋江清夜月澄鮮鷺鷥飛入蘆花裏高峯妙增收慈明因僧問行腳不逢人時如何師曰釣絲紋水頌曰老倒慈明為指迷釣絲紋水出羣機時人貪看蘆花白不見沙鷗隔岸飛石田薰增收慈明問楊岐馬祖見讓師便悟去且道迷却在甚麼處歧云要悟即易要迷即難頌曰要悟即易要迷即難絲毫透不盡咫尺隔千山説食終不飽著衣方免寒憶昔五臺曾有語前三三與後三三圓悟勤衲僧悟易要迷難無限漁翁失釣竿點鐵成金猶自可點金成鐵太無端別峯印增收慈明因李駙馬問我聞西河有金毛師子是不師曰駙馬甚處得這消息來李喝一喝師曰野干鳴李又喝師曰師子吼頌曰逆風吹又順風吹鐵眼銅睛孰敢窺萬古碧潭空界月再三撈摝始應知高峯妙增收慈明問顯英上座近離甚處曰金鑾師曰夏在甚處曰金鑾師曰去夏在甚處曰金鑾師曰前夏在甚處曰金鑾師曰先前夏在甚處曰何不領話師曰我也不能勘得你教庫下奴子勘你且點一盞茶與你濕觜頌曰焦磚打著連底凍赤眼撞著火柴頭將軍但有嘉聲在何必榮封萬戶侯石田薰增收慈明頌黑黑黑道道道明明明得得得得頌曰八十翁翁著繡靴踏開幽洞笑呵呵傍人指點忘歸路不覺腰間爛斧柯無菴全增收慈明因僧問如何是佛法大意師曰一畒之地三蛇九鼠頌曰一畒之地三蛇九鼠物是定價錢是足數印空叟增收滁州琅琊山慧覺禪師嗣汾陽上堂汝等諸人在我這裏過夏與你點出五般病一不得向萬里無寸草處去二不得孤峯獨宿三不得張弓架箭四不得物外安身五不得滯於生殺何故一處有滯自救難為五處若通方名導師汝等諸人若到諸方遇明眼作者與我通箇消息貴得祖風不墜若是常徒即便寢息何故裸形國裏諸服飾想君太煞不知時頌曰曲蟺踏著兩頭摮啞子得夢自家笑笑到天明説向誰烏鴉解作麒麟呌正堂辨琅琊指出五般病舉世良醫發藥難直下為君俱擊碎延齡何必九還丹少室睦琅琊因長水法師問經云清淨本然云何忽生山河大地師厲聲曰清淨本然云何忽生山河大地頌曰混混玲瓏無背面拈起有時成兩片且從依舊却相當免被傍人來見白雲端當明不犯體全彰進步剛然要論量妍醜只因逢古鏡回頭滿面負慚惶大洪遂見有不有反手覆手琅琊山裏人不落瞿曇後天童覺相罵饒接觜相唾饒潑水塵舉大地收花開世界起一模脫出絶功勛句裏挨開大施門圓悟勤因風吹火徒為妙借手行拳未足多清淨本然隨口道忽生大地與山河佛鑑勤續收清淨本然云何忽生山河大地大小琅琊禪師借人鼻孔出氣出得氣有巴臂昨夜那吒生八臂南堂興青天復青天打失髑髏前看看日又過爭教人少年松源嶽不設陷穽不揮雪刃一箭穿楊神目不瞬反思昔日李將軍射虎之機猶是鈍虗堂愚瑞州大愚山守芝禪師嗣汾陽僧問如何是佛師曰鋸解稱鎚頌曰鋸解稱鎚無縫鏬風吹日炙朝復夜雖然不許亂商量一任稱提繞天下白雲端鋸解稱鎚星飛電轉左拽右拽七片八片有時落地礙人行千眼大悲看不見佛慧泉鋸解稱鎚渾似鐵大愚老子曾饒舌水流澗下太忙生雲在嶺頭間不徹鼓山圭問佛如何是宗師即便酬稱鎚將鋸解言外度迷流徑山杲續收手把金鞭擊鐵牛大千世界任遨遊恆沙岸上相逢著默識無言自點頭保寧勇鋸解稱鎚出老杜詩香稻餘鸚鵡粟碧梧棲老鳳凰枝懷玉宣首座鋸解稱鎚血滴滴地截斷生死疑根不是等間兒戲朴翁銛增收大愚芝上堂曰大家相聚喫莖虀若喚作一莖虀入地獄如箭頌曰殺活全機覿面提大家相聚喫莖虀後生不省這箇意只管茫茫打野榸松源嶽苦中樂樂中苦大唐打鼓新羅舞寒山燒火滿頭灰却笑豐干倒騎虎石菴玿硬如綿軟似鐵諸人飲水須防噎堪笑灘頭老大愚至今弄巧反成拙枯禪鏡增收舒州法華院全舉禪師嗣汾陽到琅琊覺和尚處琊問近離甚處師曰兩浙曰船來陸來師曰船來曰船在甚處師曰步下曰不涉程途一句作麼生道師以坐具摵一摵曰杜撰長老如麻似粟拂袖而出琊問侍者此是甚麼人者曰舉上座琊曰莫是舉師叔麼先師教我尋見伊遂下旦過問上座莫是舉師叔麼莫怪適來相觸忤師便喝復問長老何時到汾陽琊曰某時到師曰我在浙江早聞你名元來見解祇如此何得名播寰宇琊遂作禮曰某甲罪過頌曰相罵無好言相打無好拳何似風恬并浪靜一江明月滿溪船大洪恩奪得驪珠即便回小根魔子盡疑猜拈來拋向洪波裏撒手大家歸去來徑山杲漁翁瀟灑任東西蘆管橫吹韻不齊夜靜月明魚不食扁舟臥入武陵溪夢菴信水不洗水金不博金昧毛色而得馬靡絲絃而樂琴結繩畫卦有許事喪盡真淳盤古心心聞賁官路無人獨自行自家公驗甚分明路傍偷販私鹽客草裏蹲身過一生鼓山圭有主有賓有禮有樂得失是非如何摸索才摸索無上醍醐成毒藥君不見大鵬展翼蓋十洲投窗之物空啾啾石菴玿揭大鼓噪紅塵遍地刀鎗解出身結角羅紋隨處入銀山鐵壁是通津伊菴權聞名不如見面見面不如聞名此地無金二兩俗人沽酒三升石鼓夷增收法華舉因僧問生死事大請師相救師曰洞庭湖裏失却船頌曰洞庭湖裏失却船赤腳波斯水底眠盡大地人呼不起春風吹入杏花村雪菴瑾增收南嶽芭蕉菴大道谷泉禪師嗣汾陽省同參慈明明問白雲橫谷口道人何處來師左右顧視曰夜來何處火燒出古人墳明曰未在更道師作虎聲明以坐具便摵師接住推明置禪床上明却作虎聲師大笑曰我見七十餘員善知識今日始遇作家頌曰問如綿裏針答似泥中刺咆哮二虎吼生獰各各利牙爪可怖坐却碧峯頭截斷當陽路直饒擎出祕魔叉路狹草深難進步相見不相逢回互不回互四七二三眼相覩雲從龍兮風從虎冶父川兩陳交鋒出戰時旗鎗倒卓鼓無槌絲毫不犯將軍令獨腳機關各自提瞎堂遠一文一武偶相逢説盡英雄各不同俱往長安朝聖主姓名終是達天聰虗堂愚增收安吉州天聖皓泰禪師嗣汾陽僧問如何是佛師曰黑漆聖僧頌曰聖僧黑漆實希奇莫把丹青點汙伊合掌燒香人不敬寒山拾得笑攢眉海印信增收舒州浮山法遠圓鑑禪師嗣葉縣省僧問如何是祖師西來意師曰平地起骨堆頌曰嫩草踈斜徑山泉帶碧流文曾要渭水恥任列莊周投子青平地起骨堆三春震地雷只聞千里去不見一人回本覺一平地起骨堆金毛師子吼誰知無味談塞斷衆人口地藏恩增收浮山遠因僧問師唱誰家曲宗風嗣阿誰師曰八十翁翁輥繡毬曰與麼則一句逈然開祖胄三玄科甲振藂林師曰李陵元是漢朝臣投子青云水深魚隱葉落巢踈復頌曰月裏無根草山前枯木花鴈回沙塞後砧杵落誰家古殿莓苔滿天河斗柄垂金雞才報曉玉女上階遲京兆府天寧璉師子嚬呻開口解把金毛抖擻反身時輥繡毬百獸奔騰潛走祖印明增收浮山遠因僧問如何是向上一路師曰正月孟春猶寒頌曰正月孟春猶寒從頭萬種千般昨夜虗空落地和風搭在闌干別峯印增收宋內翰楊文公億參廣慧璉公字大年出守汝州首謁廣慧慧接見公便問布鼓當軒擊誰是知音者慧曰來風深辨公曰恁麼則禪客相逢祇彈指也曰君子可八公應喏喏曰草賊大敗夜語次慧曰祕監曾與甚人道話來公曰某曾問雲巖諒監寺兩箇大蟲相咬時如何諒曰一合相某曰我祇管看未審恁麼道還得麼曰這裏即不然公曰請和尚別一轉語慧以手作拽鼻勢曰這畜生更𨁝跳在公於言下脫然無疑有偈曰八角磨盤空裏走金毛師子變作狗擬欲將身北斗藏應須合掌南辰後頌曰內翰攀南斗倚北辰廣慧轉天關反地軸寥寥千古許誰知斷絃須是鸞膠續石巖璉白石鑿鑿韞爾美璞君子道晦君子斯樂虗堂愚增收楊文公問廣慧承和尚有言一切罪業因財寶所生勸人踈於財寶而況閻浮提衆生以財為命國以財聚人教中有財法二施何得勸人踈於財慧曰幡竿頭上鐵籠頭公曰海壇馬子似驢大慧曰楚雞不是丹山鳳公曰佛滅二千年比丘少慚愧頌曰夜叉頭菩薩面鬼搗穀佛跳墻同門共戶不相識邁古超今無寸長燈心𭣟破石人腳扁鵲盧醫爭主張或菴體一人牙如劒樹一人口似血盆一拳還一踢一踢報一拳亞竪摩醯頂門眼不妨親踏上頭關石菴玿巧笑倩兮美目盻兮素以為絢兮夫是之謂大年翁與廣慧師也寶葉源增收楊文公問慈明如何是上座為人一句慈曰切公曰長裙媳婦拖泥走慈曰誰得似學士公曰作家作家慈曰放你三十棒公以手拍膝曰這裏是甚所在慈拍手曰也不得放過公呵呵大笑頌曰風和日暖正春濃柳色如金花影重入到桃源舊遊處一層峯鎖一層峯柏庭永六祖下第十一世之餘清源下第十世雲門增收南康軍雲居曉舜禪師時號舜老夫嗣洞山聰自洞山如武昌行乞首謁劉公居士家士高行為時所敬意所與奪莫不從之師時年少不知其飽參頗易之士曰老漢有一問若相契即開疏如不契即請還山遂問古鏡未磨時如何師曰黑似漆曰磨後如何師曰照天照地士長揖曰且請上人還山拂袖入宅師懡㦬還洞山山問其故師具言其事山曰你問我我與你道師理前問山曰此去漢陽不遠師進後語山曰黃鶴樓前鸚鵡洲師於言下大悟機鋒不可觸頌曰黑雲當午蔽清虗白雨翻空失畫圖雨過雲收山色淨趙州東壁挂葫蘆伊菴權黃鶴樓前鸚鵡洲雲居意不在鈎頭扁舟穩泛長江淥大笑一聲煙雨收鐵牛印增收荊門軍玉泉承皓禪師時稱皓布裩嗣北塔廣冬至上堂運推移布裩赫赤莫怪不洗無來換替頌曰矜誇富貴賤賣亦窮殺人可恕無禮難容無準範增收越州天衣義懷禪師嗣雪竇赴杉山請初入院上堂二十年前樂慕此山今日且喜因緣際會山僧未到此山身先到此山及乎到來杉山却在山僧身內頌曰移身換步老天衣不惜眉毛幾箇知今日若明當日事江南日暖鷓鴣啼慈受深增收天衣因僧問古鏡未磨時如何師曰撑天拄地曰磨後如何師曰夕陽影裏快藏身頌曰拄地撑天全體用夕陽影裏不藏身有時獨坐孤峯頂寂寂猶聞落葉頻松源嶽增收天衣上堂鴈過長空影沉寒水鴈無遺蹤之意水無留影之心若能如是方解向異類中行不用續鳧截鶴夷嶽盈壑放行也百醜千拙收來也攣攣拳拳用之敢與八大龍王鬪富不用都來不直半分錢參頌曰塞鳴高貼冷雲飛影落寒江不自知江水無情鴈無意行於異類亦如斯本覺一長空孤鴈一聲秋獻寶波斯鼻似鈎風捲白雲歸別嶂黃昏月挂柳梢頭萬菴柔增收天衣舉金剛經云若見諸相非相即見如來法眼云若見諸相非相即不見如來師曰若見諸相非相眼在什麼處此語有兩負門頌曰諸相非相孰能諸見與不見要須參兩處負門如透徹此時方得覩瞿曇本覺一增收天衣示衆曰九天雲路早順尋莫遣蹉跎歲月深天地懸遠向甚麼處去頌曰夏金烏似火當空挂最高峯插在青雲罅南堂興增收天衣示衆曰百骸俱潰散一物鎮長靈百骸潰散皆歸士一物長靈甚處安頌曰一物長靈甚處安長空雲散碧天寬蓮宮佛剎花無數眨起眉毛子細觀南堂興增收天衣因僧問如何是頂門上眼師曰衣穿瘦骨露屋破看星眠頌曰骨瘦皮枯衣服穿夜深屋破看星眠頂門不具迦羅眼莫問西來諸祖禪本覺一增收洪州法昌倚遇禪師嗣北禪賢垂語曰我要一箇不會禪底作國師頌曰要箇無禪底國師才涉毫芒便取誅堪笑這僧垂手處道無便見有偏枯月林觀曹洞增收舒州投子義青禪師嗣太陽玄僧問和尚適來拈香祝延聖壽且道當今皇帝壽年多少師曰月籠丹桂遠星拱北辰高頌曰六國清平賀聖年珠簾高捲月明前金輪那肯當堂座不用丹墀擊靜鞭丹霞淳增收投子青因僧問師唱誰家曲宗風嗣阿誰師曰威音前一箭射透兩重山云如何是相付底事師曰今因淮地月得照郢陽春云恁麼則入水見長人師曰祇知荊玉異那辨楚王心隨後以拂子敲禪牀頌曰珊瑚枝上玉花開風透清香遍九垓勿謂乾坤成委曲韶陽曾見睦州來丹霞淳法眼增收杭州慧日永明延壽智覺禪師嗣韶國師僧問如何是永明妙旨師曰更添香著曰謝師指示師曰且喜沒交涉僧禮拜師示偈曰欲識永明旨門前一湖水日照光明生風來波浪起頌曰門前湖水鏡容開對面和盤托出來可是永明無剩語酒濃初不在多杯象潭泳增收智覺因二僧來參師問參頭曰曾到此間不曰曾到又問第二上座曰曾到此間不曰不曾到師曰一得一失少頃侍者問適來二僧未審那箇得那箇失師曰你曾識這二僧也無者曰不識師曰同坑無異土頌曰到與不到一得一失不是砒霜便是石蜜舌端無眼如何喫侍者剛要詢端的莫怪同坑無異土閃電未收轟霹𮦷癡絶沖增收杭州九曲觀音院慶祥禪師嗣韶國師僧問險惡道中以何為津梁師曰以此為津梁曰如何是此師曰築著汝鼻孔頌曰溫州瑞鹿寺上方遇安禪師嗣韶國師嘗閲首楞嚴經到知見立知即無明本知見無見斯即涅槃師乃破句讀曰知見立知即無明本知見無見斯即涅槃於此有省畢生不易時謂之安楞嚴臨行乃説偈曰不是嶺頭携得事豈從雞足付將來自古聖賢皆若此非吾今日為君裁春草碧色春水緑波送君南浦傷如之何偃溪聞六祖下第十二世之一南嶽下第十一世之一臨濟隆興府黃龍慧南禪師嗣慈明圓室中常問僧曰人人盡有生緣上座生緣在何處正當問答交鋒却復伸手曰我手何似佛手又問諸方參請宗師所得却復垂腳曰我腳何似驢腳三十餘年示此三問學者莫有契其旨脫有酬者師未嘗可否藂林目之為黃龍三關廬山圓通旻古佛云昔見廣辨首座收南禪師親筆三關頌諷誦無遺近見諸方傳録不全又多訛舛故茲注出我手佛手兼舉禪人直下薦取不動干戈道出當處超佛越祖我腳驢腳並行步步踏著無生會得雲收日卷方知此道縱橫生緣有語人皆識水母何曾離得蝦但見日頭東畔上誰能更喫趙州茶復總頌曰生緣斷處伸驢腳驢腳伸時佛手開為報五湖參學者三關一一透將來長江雲散水滔滔忽爾狂風浪便高不識漁家玄妙意偏於浪裏颭風濤景福順三南海波斯入大唐有人別寶便商量或時遇賤或時貴日到西峯影漸長黃龍老和尚有箇生緣語山僧承嗣伊今日為君舉為君舉貓兒偏解捉老鼠佛手才開古鑑明森羅無得隱纖形朝朝日日東邊出多少行人問丙丁照覺總三驢腳伸時動地輪大洋海底播紅塵唯餘庭際青青柏一度年來一度春垂問生緣何處來到家禪客絶纖埃毗盧剎海周遊也休説峩眉與五臺我手何似佛手反覆誰辨好醜若非師子之兒野干謾為開口真淨文三我腳何似驢腳隱顯千差萬錯欲開金剛眼睛看取目前善惡人人盡有生緣處認著依前還失路長空雲散月華開東西南北從君去我手佛手誰人不有分明直用何須狂走溈山秀三我腳驢腳高低踏著雨過苔青雲開日皪問我生緣處生緣處不疑語直心無病誰論是與非東京法雲惟白佛國禪師熙寧初至南師法席殆二年師歸圓寂然入師室問師道而師以平生三轉語示天下學徒得叩于左右近數見印行語録者其間或拈或頌罔測其旨噫去世未三十年謬妄者傳習若此良可傷哉因而成頌知師者可同味焉頌曰主賓相見展家風問答分明箭拄鋒伸手問君如佛手鐵關金鎖萬千重遍參知識扣玄微偶爾相逢話道奇我腳伸為驢腳問平生見處又生疑莫怪相逢不相識宗師須是辨來端鄉關風月俱論盡却問生緣道却難我手何似佛手天上人間希有直饒總不恁麼也似枷上著杻海印信三我腳何似驢腳奉為衲僧拈却昔年有病未痊如今又遭毒藥若問生緣真俗氣生緣斷處墮無為二途不涉如何也八十婆婆學畫眉我手佛手十八十九雲散月圓癡人夜走湛堂準三我腳驢腳放過一著龐老笊籬清平木杓人人生緣北律南禪道吾舞笏華亭撑船玄關將多意氣手不執寸鐵兵不用一騎八蠻與四夷太平皆坐致困臥桑陰春日斜騰騰不識今何世普融平我手何似佛手從來有衫無袖有時間向人前不覺露出雙肘上方益三我腳何似驢腳寒來須要襪著莫教踏著泥水和鞋一時失却人人有箇生緣何須盡要梁原若問老僧生處荔枝香滿南園我手何似佛手爐鞴鉗鎚鐵帚曾烹紫磨金軀光射七星牛斗南堂與三我腳何似驢腳白刃紅旗閃爍坐斷百戰場中妙鬪六韜三略人人有箇生緣視聽俯仰折旋頂戴寰中日月手握閫外威權我手何似佛手隨分拈花折柳忽然摸著蛇頭未免遭他一口圓悟勤三我腳何似驢腳趙州石橋略彴忽若築起皮毬崩倒三山五嶽人人有箇生緣蹲身無地鑽研若也眼皮迸綻慮他桶底別穿佛手驢腳生緣黃龍元無此語直饒恁麼知之我儂未敢輕許奉報四海禪人第一不得錯舉龍門遠佛手驢腳生緣落處便是乾坤重重無限樓閣彈指入者無門佛心才三驢腳生緣佛手打透上頭關捩脫腳泥水布裩直下心空及第生緣佛手驢腳為君一體拈却坦然坐致太平猛將謾誇謀略扣關豈是丈夫兒驢腳生緣問阿誰佛手展開無處用太平基業各豐滋道場如續收我手何似佛手天上南辰北斗我腳何似驢腳往事都來忘却人人盡有生緣箇箇足方頂圓大愚灘頭立處孤月影射深灣會不得見還難一曲漁歌下遠灘白楊順我手何似佛手黃龍鼻下無口當時所見顢頇至今百拙千醜正堂辨三我腳何似驢腳文殊親見無著好箇玻璃茶盞不要當面諱却人人有箇生緣從來罪過彌天不是牽犂拽耙便是鼎鑊油煎我手何似佛手天下衲僧無口縱饒撩起便行也是鬼窟裏走諱不得張無垢三我腳何似驢腳又被𥻿膠粘著反身直上兜率天已自遭他老鼠藥吐不得人人有箇生緣鐵圍山下幾千年三災燒到四禪天者漢猶自在傍邊殺得工夫我手何似佛手堪笑紫湖養狗撞著焦尾大蟲性命輸他一口石菴玿四我腳何似驢腳擬議知君大錯進前欲飲醍醐已似遭他毒藥人人盡有生緣且非夷狄中原鎮府出大蘿蔔趙州親見南泉佛手驢腳生緣生緣驢腳佛手李公醉倒街頭元是張公喫酒黃龍山裏老婆禪恰似河陽新婦醜我手何似佛手二八恰恰十九年尾算到年頭家內一錢無有伊菴權四我腳何似驢腳踏著趙州略彴驚得迦葉皺眉文殊却打無著人人有箇生緣男兒氣宇衝天若是爭田競地我即喚死如眠佛手驢腳生緣浩浩藂林盛傳直饒一穿穿却未免十萬八千我手何似佛手合掌面南看北斗兔推明月上千峯引得寒山開笑口雪菴瑾四我腳何似驢腳急走歸家日將落自古長安如鏡平無端醉倒黃番綽人人有箇生緣且非東土與西天擊珊瑚樹枝枝好撒水銀珠顆顆圓佛手驢腳生緣南海波斯泛鐵船精金美玉團堆賣畢竟何曾直一錢佛手驢腳容易見最難道處是生緣黃梅不是周家子七歲傳衣便會禪橫川珙
