body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第十二世之二南嶽下第十一世之餘增收黃龍南初參泐潭澄因雲峯悅指見慈明既寓福嚴時賢禪師命掌書記賢歸寂適慈明繼席一日造室明曰書記參雲門禪必善其旨如放洞山三頓棒是合喫不合喫師曰合喫明曰從朝至暮鴉鳴鵲噪皆因喫棒乃使拜之復問趙州道臺山婆子我與汝勘破了也且阿那裏是他勘破婆子處師汗下不能答明日又詣室明嘔罵不已師曰罵豈慈悲法施耶明曰你作罵會那師始大悟述頌曰傑出藂林老趙州老婆勘破有來由如今四海清如鏡行人莫與路為讐明頷之頌曰錯錯戲海獰龍冲霄遼鶴老慈明無著莫笑裏重重露牷索佛手一展日月昏大江從此風濤惡石林鞏死水如何養活龍終歸大海鼓腥風天教一霎風雲便送出臺山烟雨中竹屋簡二有喫棒分無喫分當爐一煅汞銀流不因踏斷臺山路千古雲峯恨莫酬增收黃龍南因僧問不去不來時如何師曰華嶽三峯頭倒卓曰却去却來時如何師曰風吹柳絮毛毬輥頌曰冰雪肌膚西舍女梳粧巧巧畫雙眉傍人筆力強傳寫戶外如何見得伊本寂觀增收黃龍南住黃蘗時室中每舉鐘樓上念讚牀脚下種菜眾皆下語不契一日勝首座云猛虎當路坐師乃退黃蘗與勝住頌曰鐘樓上念讚牀脚下種菜猛虎當路蹲時人俱不會黃蘗花開自有時明州有箇憨布袋照堂一直出直入當面不識更擬如何著甚死急徑山杲猛虎當路坐游魚脚下過不學子湖老便打劉銕磨鼓山珪增收黃龍南因禾山普參普善經論兩川號為義虎問師云阿難問迦葉世尊傳金襴外更傳何物因緣意旨如何師曰上人出蜀曾到玉泉否普曰曾到師又問曾掛搭否曰一夕便發師曰智者道場關王打供結緣住幾時何妨普良久再理前面師俛首普趨出大驚曰兩川義虎不消此老一唾頌曰黃龍一唾絕遲疑笑殺傍觀又可悲姹女已歸霄漢去獃郎猶向火邊棲遯菴演袁州楊岐方會禪師嗣慈明僧問如何是佛師曰三脚驢子弄蹄行曰莫只這便是師曰湖南長老頌曰三脚驢子弄蹄行奉勸行人著眼睛草裏見他須喪命只緣踢踏最分明白雲端前步高兮後步低動頭搖尾三隻蹄騎過閙市人東西湖南更有須菩提保寧勇三脚驢子弄蹄行騏驥追風趂不前踏破化城無覓處湖南長老重加鞭佛鑑懃三脚驢子弄蹄行步步蓮花襯足生堪笑草中尋覓者不知芳樹囀春鶯佛性泰三脚驢兒忒殺好長放後園教喫草等閒牽去向人前踢倒湖南瞎長老鼓山珪楊岐一頭驢祇有三隻脚潘閬倒騎歸跌殺黃旛綽徑山杲續收三脚驢子弄蹄行直透威音萬丈坑雲在嶺頭閑不徹水流㵎下太忙生湖南長老誰解會行人更在青山外梁山遠三脚驢子弄蹄行兩浙江南秋復熱西北風霜怯早寒閉門愁見楊花落卍菴顏一拽耙二牽犂平田淺地且相隨恰到飢時無草料放開頭角便東西老楊岐老楊岐盡道從來解弄蹄上方益蹇驢三脚弄蹄時若不親騎也不知紫磨金容䭾不動竹篦端勝冷鉗鎚典牛游法出姦生垛生招箭三脚驢子是誰親見若親見釋迦老子那吒面佛照光三脚驢子弄蹄行鼓動清風入骨寒踏破毗盧光影斷不須平地起波瀾月菴果楊岐一頭驢眼光如電爍踏殺天下人說甚三隻脚徑山雲菴慶一箭射落天邊鴈千人萬人著眼看不知此箭自何來湖南長老何曾見中菴空增收楊岐因僧問少林面壁意旨如何師曰西天不會唐言頌曰天高地逈非難見水闊山重不易論萬古八風吹不入西天人不會唐言白雲端西天人不會唐言端坐巍巍少室前剛被流支打齒缺至今有理不能宣佛性泰西天人不會唐言旱地雷聲徹大千九年面壁無人會玉兔金烏火裏旋無菴全增收楊岐因慈明忌辰設齋眾纔集師於真前以兩千揑拳安頭上以坐具畫一畫打一圓相便燒香退身三步作女人拜首座曰休揑怪師曰首座作麼生座曰和尚休揑怪師曰兔子喫牛妳第二座近前打一圓相便燒香亦退身三步作女人拜師近前作聽勢座擬議師與一掌曰這漆桶也亂作頌曰楊岐聽勢印千差今古令人愛作家但握祖師三印在不妨揑怪亂如麻圭堂居士一傀儡木雕成半是神形半鬼形歌鼓歇時天未曉尚餘寒月掛踈櫺虗堂愚增收楊岐因僧問撥雲見日時如何師曰東方來者東方坐頌曰堯舜垂衣萬國賓撥雲見日意休陳東方來者東方坐草木重霑雨露新白雲端增收楊岐因慈明上堂師出問幽鳥語喃喃辭雲入亂峯時如何明曰我行荒草裏汝又入深村師曰官不容針更借一問明便喝師曰好喝明又喝師亦喝明連喝兩喝師禮拜明曰此事是箇人方能擔荷師拂袖便行頌曰將出驪珠遇大商金盤撥動有餘光無煩一句論高價把手歸家笑幾場白雲端試問人間有底忙好將春事報春光直饒日日花前醉一季都來九十場正堂辯胡張三背手張弓黑李四反身架箭直饒囓鏃古將軍對面髑髏穿一穿別峯印將杖探其水方知水淺深路遙知馬力歲久辯人心子不孝父不慈恭而無禮親而有踈不入驚人浪難逢稱意魚冶父川猫全食血功虎備起屍殺無奈阿舅何不傳上樹訣南巖勝馬轉牛回豈足誇爛泥中刺當行家霜刃一揮全意氣坐令千載定龍蛇無菴全增收楊岐問僧雲深路僻高步何來曰天無四壁師曰踏破多少草鞋僧便喝師曰一喝兩喝又作麼生曰你看這老和尚師曰拄杖不在且坐喫茶頌曰高步何來釣象犀反身全不帶纖泥驀然一喝高千丈劫外相看誰得知圭堂居士增收楊岐因僧問天得一以清地得一以寧衲僧得一堪作什麼師曰鉢盂口向天頌曰鉢盂向天底時節十方世界一團鐵少林面壁謾多年衲僧眼裏重添屑白雲端衲僧一拶鉢盂口闊天下楊岐望梅止渴松源岳增收楊岐問僧栗棘蓬你作麼生吞金剛圈你作麼生跳頌曰楊岐金圈與栗蓬吞跳依前事不同大海都來一口吸更無南北與西來照堂一金剛圈栗棘蓬玄沙三種病石鞏一張弓直截為君說新羅在海東徑山杲楊岐老人鎻口訣萬里長城一條鐵斫牌禪客知到來不動金鎚腦門裂鼓山珪栗蓬吞得有何難更教吐出又心酸吞吐得來休嚼碎南辰光射北辰寒正堂辯肘後驀生閒落索風前忽布閙叉撑那吒八臂空惆悵夜半三更白晝行天童淨昨夜發新雷毒蛇離窟穴居常口不開蹋著迸鮮血或菴體增收楊岐入院陞座畢下座九峯勤把住云今日喜得箇同參師曰作麼生是同參底事勤曰九峯牽犁楊岐拽耙師曰正恁麼時楊岐在前九峯在前勤擬議師拓開曰將謂同參元來不是頌曰一拽耙二牽犂平田淺草且相隨恰到飢時無草料放開頭角便東西老楊岐老楊岐盡道從來解弄蹄上方益楊岐左眼半斤九峰右眼八兩一對無孔鐵鎚至今收拾不上無相範六祖下第十二世之餘清源下第十一世曹洞增收東京天寧芙蓉道楷禪師嗣投子青僧問夜半正明天曉不露如何是不露底事師曰滿船空載月漁父宿蘆花頌曰星流水國夜然燈月印江天明似鏡隱顯無私位不該依稀擬動成偏正丹霞淳增收芙蓉楷上堂法身者理妙言玄頓起終始之患諸仁者莫是幻身外別有法身麼莫即幻身便是法身麼若也恁麼會去盡是依他作解蒙昧兩岐法眼未得通明不見僧問夾山如何是法身山云法身無相如何是法眼山云法眼無瑕所以道吾云未有師在忽有人問老僧如何是法身羊便乾處臥如何是法眼驢便濕處尿更有人問作麼生是法身買帽相頭作麼生是法眼坑坎堆阜若點檢將來夾山祇是學處不玄如流俗閨閤裏物不能捨得致使情關固閉識𤨏難開老僧今日若不當陽顯示後學何以知歸勸汝諸人不用求真唯須息見諸見若盡昏霧不生自然智鑑洞明更無他物諸人還會麼良久云珠中有火君須信休向天邊問太陽頌曰道合平常絕異端行人何必歷艱難從今莫信孫臏卜龜殻無靈不用鑽丹霞淳增收芙蓉楷因僧問如何是無縫塔師曰白雲籠岳頂終不露崔嵬頌曰屠層落落影團團切忌當陽著眼看直下有無俱不立白漫漫又黑漫漫雪巖欽增收芙蓉楷因僧問師唱誰家曲宗風嗣阿誰師曰金鳳夜棲無影樹峯巒纔露海雲遮頌曰等閒應問豈安排一句全提隱顯該薄霧依依籠古徑孤峯終不露崔嵬丹霞淳六祖下第十三世南嶽下第十二世臨濟增收隆興府黃龍祖心禪師嗣黃龍南因黃山谷太史乞指徑截處師曰祇如仲尼道二三子以我為隱乎吾無隱乎爾太史居常如何理論公擬對師曰不是不是公迷悶不已一日侍師山行次時巖桂盛放師曰聞木樨花香麼曰聞師曰吾無隱乎爾公釋然即拜之曰和尚得恁麼老婆心師笑曰祇要公到家耳頌曰渠儂家住白雲鄉南北東西路渺茫幾度欲歸歸未得忽聞巖桂送幽香石溪月學海波瀾捲未乾幾煩仙屐上林巒天香吹落秋風老不覺相擕到廣寒石林鞏水邊林丁舊生涯夢裏還家未到家昨夜月明歸興動西風一陣木樨花雪磯綱增收晦堂室中竪拳示僧曰喚作拳頭則觸不喚作拳頭則背未審喚作甚麼頌曰赤體更無藏隱處黃龍未語先分付若將見解上門來他家自有通霄路道場林背觸人難會憑君子細看片雲纔出洞遮却面前山雪巢一增收舒州白雲守端禪師嗣楊岐示眾曰此事如萬仞崖頭相似總知道放著手便撲到底只是捨命不得法華今日不動一毫頭教諸人到底去也擲下拄杖頌曰擬從險處放身時那箇商量不皺眉不動毫芒親到底眼睛皮綻蓋須彌虗堂愚增收白雲上堂舉一則公案布施大眾良久云口只堪喫飯頌曰白雲舉古直是希奇口堪喫飯少有人知諸禪老莫遲疑一飽自然忘百飢遯菴演增收白雲上堂見眾集乃拈拄杖曰大眾會麼復卓拄杖曰珊瑚枕上兩行淚半是思君半恨君頌曰幾回霑水又拖泥年老心孤不自知遊子不歸空悵望一溪流水落花隨無菴全增收白雲因僧問舊歲已去新歲到來如何是不遷義師曰眉毛在眼上頌曰罷釣歸來不繫船江村月落正堪眠縱饒一夜風吹去只在蘆花淺水邊月庭忠二落葉已隨流水去春風未放百花舒青山面目依然在盡日橫陳對落暉增收金陵保寧仁勇禪師嗣楊岐示眾曰釋迦老子四十九年說法不曾道著一字優波毱多丈室盈籌不曾度得一人達磨不居少室六祖不住曹谿誰是後昆誰為先覺既然如是彼自無瘡勿傷之也拍膝顧眾曰且喜天下太平頌曰烟暖土膏農事動一犂新雨破春耕郊原眇眇青無際野草閑花次第生虗堂愚增收保寧勇示眾曰三界唯心萬法唯識檻外雲生簷前雲滴㵎水湛如藍山花開似錦此時若不究根源直待當來問彌勒頌曰靈然不涉去來今三界都盧一點心檻外春風春蝶舞門前楊柳曉鶯吟丹霞淳增收比部孫居士因楊歧來謁值視斷次公曰某為王事所牽何由免離歧指曰婁悉得麼曰望師點破歧曰此是比部弘願深廣利濟羣生曰未審如何岐示以偈曰應現宰官身廣弘悲願深為人重指處棒下血淋淋公於此有省頌曰棒下血淋淋真鍮不愽金鴛鴦親繡出休更覓金針雪堂行六祖下第十四世南嶽下第十三世臨濟增收蘄州五祖山法演禪師嗣白雲端初謁浮山遠和尚遠一日語師曰吾老矣恐虗度子光陰可往依白雲此老雖後生吾未識面但見其頌臨濟三頓棒話有過人處必能了子大事師潸然禮辭至白雲遂舉僧問南泉摩尼珠話請問雲叱之師領悟獻投機偈曰山前一片閑田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可頌曰山前田地賣還買松竹清風痛自憐堪笑夢中誇富貴覺來那直半分錢遯菴演忍死叮嚀見白雲一杯鴆酒十分斟若教不飲空歸去田地無由被陸沉竹屋簡二卒風暴雨忽迷蹤撞入浮山網子中縱得白雲提得出依然只是賣柴翁增收五祖演云老僧遊方十餘年參數十人善知識將謂了當及到浮山圓鑑會下更開口不得末後又到白雲因咬破一箇鐵餕餡直是百味具足且道餡子一句作麼生道花發雞冠媚早秋何人能染紫絲頭有時風動頻相倚似向階前鬬不休頌曰白雲鐵餕餡衲僧難下口忽然咬得破大作師子吼月菴果增收五祖演在白雲端會中作磨頭一日端下來曰磨頭你還知一件事麼師曰不知曰近有數禪客自廬山來問他皆有悟入處教伊說亦說得有來由舉因緣向伊亦明得教下語亦下得端良久謂師曰磨頭只是未在你道如何師聞之心下不安得七日七夜不成腸肚正中心下乃自思惟曰既悟了說亦說得明亦明得如何却未在忽然中夜方會得從前寶惜一時放下遂白端端起來手舞足蹈佛眼遠云某甲侍先師舉此因緣謂某甲云參學須是一時放下方得安樂大眾還見得不乃頌曰放得下好脫灑放不下牛拽耙堪笑諸方老古錐打鼓說禪無尾無尾不驚怕可嚒訝解踏毗盧頂上行不言亦自傳天下好大哥增收五祖演因僧問一大藏教是箇切脚未審切箇什麼字師曰鉢囉娘頌曰唇上必并班豹剝舌頭當的帝都丁且道是什麼字自古上賢猶不識造次凡流豈可明石菴玿一大藏教是切脚東山切得鉢囉娘胷中憤氣盤不得忽作虹霓萬丈長即菴覺倒腹傾腸與麼來華言梵語幾曾該言前句後知端的陸地蓮花朵朵開別山智大藏教文為切脚鉢囉娘義最深幽孔門弟子無人識碧眼胡僧暗點頭遯菴演增收五祖演因僧問如何是佛師曰口是禍門頌曰的的當陽句明明箭後路著靴人喫肉赤脚人趂兔徑山杲口是禍門電掣雷奔娑竭出海震動乾坤鼓山珪如何是佛口是禍門一錢不直賣與買人雪堂行兵行詭道賊是家親無功受祿有理難伸或菴體坑坑坎坎嶮嶮𡾟𡾟一言易出駟馬難追虗堂愚增收五祖演因僧問如何是佛師曰肥從口入又曰露𮌎跣足頌曰老去眉鬚似雪霜元來習氣尚難忘少年無限傷心事一度思量一斷腸佛鑑懃牙根爛嚼真彌勒腹裏橫吞老釋迦大地虗空皆得飽這回不到負檀家心聞賁增收五祖演因僧問如何是臨濟下事師曰五逆聞雷頌曰從前五逆怕聞雷不似大蟲看水磨孤峯頂上要同行十字街頭還共坐鼓山珪五逆聞雷曾參顏回一粒豆子𪹼出冷灰徑山杲者僧苦下打爺拳霹𮦷聲中宇宙昏驚起無明金翅鳥擘開滄海取龍吞東山空五逆聞雷露出屍骸人間天上無處堪埋朴翁銛五逆聞雷慊慊然尋常爭敢與人宣自從六十輕酬後濟北驢名不浪傳虗堂愚增收五祖演示眾曰釋迦彌勒猶是他奴且道他是阿誰頌曰老年經節臘樂事甚悠悠不及兒童日都來不解愁南堂興他弓莫挽他馬莫騎他非莫管他事莫知無門開釋迦彌勒是他奴今古禪流知也無酒好不須懸望子醋酸何必掛葫蘆野牛平增收五祖演問僧曰倩女離魂那箇是真底王宙欲娶倩娘為妻倩父母不許倩遂臥病在家王宙將欲遠行月下見倩來同舟而去三年後遂生一子倩遂歸父母家纔到門家中有一倩娘出來相見兩人遂合成一身頌曰二女合為一媳婦機輪截斷難回互從來往返絕踪由行人莫問來時路普融藏主只是舊時行履處等閒舉著便譊訛夜來一陣狂風起吹落桃花知幾多慈受深兩女合為一媳婦古寺基前幢子竪彷彿上有陀羅尼多少行人盡驚怖正堂辯縱使百千劫所作業不忘因緣會遇時果報還自受或菴體涼宵愛月上危樓幾處笙歌幾處愁歌管未闌愁未歇忽然天曉一時休且菴仁憶昔春風上苑行爛窺紅紫厭平生如今再到曾行處寂寂無人草自生萬菴柔南枝向暖北枝寒何事春風作兩般憑仗高樓莫吹笛大家留取倚闌看雪菴瑾雪月是同溪山各異萬福萬福是一是二無門開行弔先桃茢喪車後紙錢老胡門下客寧可入黃泉虗堂愚增收五祖演垂語曰路逢達道人不將語默對且道將甚麼對頌曰來說是非者便是是非人誠哉是言也弄物不知名月林觀路逢達道人不將語默對攔腮擘面拳直下會便會無門開增收五祖演一日持錫遶廊曰莫有屬牛人問命麼眾皆無語自曰孫臏今曰開鋪更無一人埀顧可憐三尺龍鬚喚作尋常破布頌曰無端平地起干戈爭似屬牛人更多滿目慚惶無著處低頭依舊入烟蘿高峯妙增收五祖演曰譬如水牯牛過窓櫺頭角四蹄都過了因甚麼尾巴過不得頌曰牛過窓櫺錯為安名大唐國裏不見一人月林觀龜本真靈物都緣不自知一朝親脫殻直透九天飛如庵用等閑放出這牛兒頭角分明舉似誰若向尾巴尖上會新羅子過多時高峯妙增收五祖演謝監收上堂曰人之性命第一須是欲得成此先須防於若是真人頌曰一二三四五六圈心肝粉碎髑髏寒若將方木投圓竅醜婦爭教得少年高峯妙增收五祖演舉昔日有秀才著無鬼論一日鬼現身云你道無我聻秀才無語師曰當時只舉手作鵓鳩觜云谷孤故頌曰說有道無徒費力現身無語強分踈只消一箇鵓鳩觜百怪千妖盡掃除此山應五祖鵓鳩啼當機直下提隔山尋蟻跡能有幾人知石田薰增收五祖演因僧問如何是為人一句師曰門前石塔子頌曰門前石塔子八白與九紫方道既分明免被巡官使雪堂行增收五祖演每遇僧來請益祇曰無這閑工夫頌曰彼此且無相負累行人無不失鈎錐雖然不瞎眾生眼也好拳頭劈口槌龍門遠開口便見膽工夫傲東魯昔於豆子山也解打瓦鼓南巖勝增收五祖演凡見僧來便曰屈屈僧曰屈作甚麼師曰如今不屈更待何時頌曰盡力不奈何按牛頭喫草若無錦繡文難以論嘉藻龍門遠銕餡價難窮誰知屈味濃法幢光祖域正董在𮌎中南巖勝增收五祖演問僧離却四大五蘊那箇是你清淨法身頌曰堂堂白日上刀梯任是崑崙眼亦迷多謝門前案山子春來秋去泄天機雪堂行增收五祖演展手問僧曰因何喚作手頌曰何故喚作手衲僧難開口擬議自顢頇可憐太蒙斗佛眼遠先祖滔滔無固必後人悱悱有雌雄巨靈擡手無多子分破華山千萬重南巖勝增收隆興府兜率從悅禪師嗣真淨文室中設三語以驗學者一曰撥草瞻風祇圖見性即今上人性在甚麼處二曰識得自性方脫生死眼光落地時作麼生脫三曰脫得生死便知去處四大分離向甚麼處去頌曰陰森夏木杜䳌鳴日破浮空宇宙清莫對曾參問曾晳從教孝子諱爺名張無盡三人間鬼使符來取天上花冠色正萎好箇轉身時節子莫教閻老等閒知鼓合東村李大妻西風曠野淚沾衣碧蘆紅蓼江南岸却作張三坐釣磯驢放三千馬放八百透過重關未為英傑月林觀一念普觀無量劫無量劫事即如今如今破這一念破如今底人無門開增收東京法雲佛照杲禪師嗣真淨文師以力參深到語不入時每示眾常舉老僧熈寧八年文帳在鳳翔府供申當年崩了華山四十里壓倒八十村人家汝輩後生茄子瓠子幾時知得或問曰寶華王座上因甚麼一向世諦師曰癡人佛性豈有二種邪頌曰隔水何人歌竹枝動人情思極幽微夜深轉入單于調月朗風高聽者稀虗堂愚六祖下第十五世南嶽下第十四世臨濟增收成都府昭覺寺克勤圓悟佛果禪師嗣五祖演先住東京天寧師凡埀問學者疑議則一拳頌曰盡力當𮌎一拳幾箇眉鬚墮落更欲如何若何普化空中木鐸瞎堂遠增收圓悟因僧問西天以蠟人為驗此土以何為驗師曰生銕鑄就崑崙兒頌曰生銕鑄就崑崙兒眼耳鼻舌如泥塊西天此土謾紛紜銕眼銅睛看不破別峯印生銕鑄就崑崙兒頭輕脚重肚皮大明眼衲僧薩普吒九十日中看不破看不破笑倒嵩山破竈墮晦叟光增收舒州太平慧懃佛鑑禪師嗣五祖演僧問如何是佛師曰喫飯咬著砂頌曰喫飯咬著沙隱落第三牙春風纔過後拄杖亦開花慈受深增收舒州龍門清遠佛眼禪師嗣五祖演甞請益五祖凡有所問演即曰我不如你你自會得好或曰我不會我不如你師愈疑遂咨決於元禮首座禮以手引師耳繞圍爐數匝行且語曰你自會得好師曰有冀開發乃爾相戲耶禮曰你他後悟去方知今日曲折耳頌曰我不會兮不如你達磨當門缺兩齒滿堂無限白蘋風明明不自秋江起雪堂行二我不會兮不如你堪咲千花生碓觜善財謾到百城游何曾踏著自家底我不會兮不如你旃檀林裏香風起漁歌一曲過瀟湘攪動滄溟聲未已獃堂定增收龍門示眾曰千說萬說不若親見一面縱不說亦自分明王子寶刀喻眾盲摸象喻禪學中隔江招手事望州亭相見事深山巖崖處事此皆親面而見之不在說也頌曰寧辨人間是與非生來淈𣸩眼如眉不因說著當年事萬古千秋那得知虗堂愚增收金陵俞道婆市油餈為業參瑯琊起和尚起以臨濟無位真人話示之一日聞丐者唱蓮華樂云不因柳毅傳書信何緣得到洞庭湖忽大悟以餈盤投地夫曰你顛邪婆掌曰非汝境界往見瑯琊琊望之知其造詣問那箇是無位真人婆應聲曰有一無位人六臂三頭努力瞋一擘華山分兩路萬年流水不知春琊印可之凡有僧至則曰兒兒僧擬議即掩門佛燈珣和尚往勘之婆如前所問珣曰爺在甚處婆轉身拜露柱珣即踏倒曰將謂有多少奇特便出婆蹶起曰兒兒來惜你則箇珣竟不顧安首座至婆問甚處來曰德山婆曰德山泰乃老婆兒子曰婆是甚人兒子婆曰被上座一問直得立地放尿頌曰柳毅傳書只自知得便宜是落便宜親夫愛子都拋却痛惜深憐乞養兒笑翁堪驀別相逢銕面皮渾家喪盡喚孩兒翻身師子施牙爪猶落渠儂第二機咦且道渠是阿誰塗毒策
