body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集菩薩機緣布袋和尚常在通衢或問在此何為師云等箇人來曰來也師曰汝不是這箇人或解布袋百物俱有撒下曰看看又一一將起問人曰這箇喚作甚麼或袋內探果子與僧僧擬接師乃縮手曰汝不是這箇人或見僧行過乃拊背一下僧回首師曰把一錢子來有時倚袋終日憨睡或起行市肆間小兒譁逐之或拄杖或數珠與兒戲有僧問如何是祖師西來意遂放下布袋叉手而立僧曰祇此別更有在師拈起布袋肩負而去頌曰彌勒既非布袋不是是非兩忘金生麗水至寶滿袋貴買賤賣若解商量不勞三拜詮了義注大乘月裏螢光日下燈布袋枕頭眠一覺倚天山色碧層層野軒遵拈起即行放下便歇瞌睡阿師弄巧成拙佛意祖意寧知裙子褊衫百結有時獨立兮誰是知音歸去來兮一天明月佛慧泉困來抱囊無語傍觀盡生疑慮未免開獻諸人是甚間家破具莫訝衣裳破碎入鄽且無忌諱橫身要道等人那個便知圈繢雲峯悅千般萬樣有誰能會瞌睡老僧收拾滿袋心無諸受觸處三昧巷尾街頭貴買賤賣圓通秀都盧一箇布袋裏面討甚奇怪困來且得枕頭擕去亦無妨礙有時閙市打開多是自家買賣白雲端咄這憨皮袋眉粗兼眼大終日在街頭市行無買賣阿呵呵歸去來典錢還却債保寧勇分身百億混塵埃氣貌憨憨勿可猜一袋挑擎隨處去千般撒下復拈來人間天上相呈示市尾街頭睡覺回等得箇時還不是至今猶是老黃梅佛國白天不能蓋地不能載包括乾坤全歸布袋十字街頭大打開般般拈起隨人愛靈源清三千威儀都不修八萬細行全不顧只因閙市裏等人被人喚作破落戶兜率內院久拋離縱歸忘却來時路稽首彌勒世尊得與麼寬腸大肚徑山杲續收接著一箇半箇覔得三文兩文誰知破布袋裏許多彌勒世尊瞎堂遠拊背覓錢成漏逗回頭轉腦昧真機可憐閙市無人識空手肩擔布袋歸佛照光長汀汀上風顛子曳杖回頭等阿誰向道那人元不在汝須知有轉身時天目禮轉得頭來已是遲恰如曾未轉頭時一錢覓得無及處猶自區區誑阿誰北澗簡逢人乞一文袋裏敵國富不是下生遲嫌佛不肯作環溪一增收跋陀尊者因生法師論衆微聚曰色衆微無自性曰空者云只明得因中色空未明得果上色空法師問如何是果上色空者云一微空故衆微空衆微空故一微空一微空中無衆微衆微空中無一微鹽官云因中色空果上色空總是夢中說夢頌曰靈光滿目簇山河幻境之中物像多體妙已知緣不礙執情還被境消磨雙泉瓊色空空色色空空閡却潼關路不通劫火洞然毫末盡青山依舊白雲中天衣懷二東西南北十萬八千空生罔措火裏生蓮堂堂色裏無空相皎皎空中絶色形直下色空無一二色號元來不我名靈隱本增收維摩居士示疾毗耶離城自念寢疾于牀世尊大慈寧不垂愍佛知其意告文殊師利言汝行詣維摩詰問疾文殊白言世尊彼上人者難為酬對深達實相善說法要辨才無滯智慧無礙一切菩薩法式悉知諸佛祕藏無不得入降伏衆魔遊戲神通其慧方便皆已得度雖然當承佛聖旨詣彼問疾頌曰咄這維摩老悲生空懊惱臥病毗耶城全身太枯槁七佛祖師來一字俱屏掃請問不二門當時便靠倒不靠倒金毛師子無處討雪竇顯佛病法病最難醫獨有雜摩也大奇文殊稽首讚居士失却金毛師子兒天衣懷毗耶城裏維摩詰知伊畢竟徹不徹金毛師子未到來一室屏除先漏泄及乎回問不二門推出一團無孔鐵剛被文殊下一槌千年萬載成凹凸大洪遂冷坐毗耶城百病一時發不得文殊來幾乎無合殺徑山杲千人萬人射一鴈箇箇手親并眼辨刮地西風鴈影奇可憐發盡弦中箭猿臂將軍仰面看弓開秋月影團圓飛星一點天邊去羽翼離披落眼前廣鑑英冤憎會苦愛別離苦鈍置瞿曇一場莽鹵咄正堂辨示疾毗耶方丈文殊亦難近傍看來無藥可醫只是忌口為上浙翁𤥎詐病從來不可醫文殊特為下針錐事褫一喙長三尺問著依前似鼓椎無準範一箇病維摩無風自起波富嫌千口少貧恨一身多胡隱濟增收善財初詣娑羅林中參文殊文殊指往南方勝樂國謁德雲比丘次第至彌勒樓閣所歸至普門城外思惟竚立欲得奉覲文殊文殊伸手過百十由旬與摩其頂即見微塵數知識即受行其教上藍超因僧問善財見文殊後為甚麼却往南方師云學憑入室知乃通方僧云到蘇摩城為甚麼彌勒却遣見文殊師云道曠無涯逢人不盡投子青云然道無迷悟發證由師不住聖凡莊嚴妙行是以文殊遣去登須彌山海岸逢師市廛禮友或刀山淫舍罪杻王宮或童女童男瞿夷聖后彌勒彈指普賢親瞻再見文殊復有何事信知通方知有道曠無涯不昧光蹤歷窮盡妙諸仁者還知更有一人為甚麼善財不參且道是甚麼人良久云滿頭白𩬊離巖谷半夜穿雲過市廛復頌曰日出升空高下用崑崙源派入川流春山雲逗風無盡鴈去回南天地秋五十三人指路人因循流落百餘城草鞋踏破成何事爭似歸家罷問程鐵山仁茫茫夢裏去遊南五十三參發指端大士臂長衫袖短善財腳瘦草鞋寬大川濟增收善財詣妙峯山參德雲比丘四維尋覓七日方見在別峯上徐步經行頂禮聞法入佛境界得憶念諸佛普見法門證發心住頌曰妙高峯頂尋知識南北東西望何極德雲遙自別山來珍重分身千百億延慶忠妙高峯頂草茸茸步步相隨不見蹤若謂別山親覿面片帆已過海門東別山智淡煙草茸茸七日徘徊信不通一步竿頭輕蹉腳海門波卷白蘋風棘田心增收善財詣那羅素國參毗目瞿沙仙人無量仙人同音讚已下牀執手佛剎現前悟真淨智卷舒自在得無勝幢法門證童真住頌曰毗目仙人下寶牀摩頭執手看殊祥十方佛境同時現萬象森羅忽頓彰無勝妙牀騰瑞色遮那文藏顯靈光却還本座求端的轉覺平生見處長佛國白坦然古路勿迂疏霽月涼風動十虗毗目善財當日事好如潘閬倒騎驢或菴體增收善財詣佛會中參普賢菩薩見乘白象王處紅蓮座一心親近咨聞法要智悲圓滿行願功成即獲佛德顯同果海得一切佛果微塵數三昧法門頌曰百一由旬摩頂歸片心思見普賢師堂堂現在紅蓮座落落分明白象兒沙劫智悲方滿日微塵行願正圓時佛功德海重宣說愁見波濤轉渺瀰佛國白打鼓弄琵琶還他一會家木童能撫掌石女解煎茶雲散天邊月春來樹上華善財參遍處黑豆未生芽延慶忠增收善財歷百十城參五十三位善知識後到毗盧樓閣前曰是解空無相無作之所住處云云見樓閣門閉善財暫時斂念曰大慈大悲願樓閣門開令我得入尋時彌勒領諸眷屬至善財前彈指一下樓閣門開善財得入入已還閉見百千萬億樓閣一一樓閣有一彌勒領諸眷屬并有一善財面在前立彌勒復彈指云善男子起法性如是頌曰妙意童真末後收善財到此罷南遊豁然頓入毗盧藏悔向他山見比丘張無盡妙峯孤頂無知識百十城遊喪善財樓閣若還彈指現分明有眼不曾開或菴體五十三人一縷穿小兒雖小膽如天茫茫煙水無重數買得風光不用錢北澗簡問處分明答處端還同雙劒倚天寒一從樓閣門開後滿面慚惶無處安浙翁𤥎知識曾參五十三精金百鍊罷鎚鉗回頭萬壑烟雲散午夜蟾光浸碧潭坦堂圓南方經歷幾雲烟收得珍奇貨滿船彈指便風帆到岸一時翻作大光錢無準範增收天台智者大師在南嶽誦法華經至藥王品曰是真精進是名真法供養如來於是悟法華三昧獲旋陀羅尼見靈山一會儼然未散頌曰世尊三昧安詳起師悟藥王精進時靈鷲山中人未散不因南嶽有誰知楊無為溪山盡處夕陽斜溪上冬風雪滿沙便是江南舊行路和烟隔水見梅華蘿月瑩舍盡家財與己財只將真法供如來當初一路今何在觸目靈山翠作堆天目禮好將真法供如來花在幽巖險處開一夜狂風吹欲盡落英無數點莓苔虗堂愚心迷念念法華轉心悟時時轉法華誰知百萬靈山客盡是天台眼裏沙此山應增收金陵志公和尚或名寶公令人傳語南嶽思大云何不下山教化衆生一向目視雲霄作麼思云三世諸佛被我一口吞盡何處更有衆生可度頌曰一口吞盡三世佛牙如劒樹眼如鈴斷絃不必鸞膠續只要知音側耳聽虗堂愚佛與衆生一口吞纖毫不立道方存杖頭日月才挑起鼓動三千海嶽昏尼間林英目視烟霄臥白雲不知山下有乾坤從何更有衆生度三世如來一口吞本覺一時清休唱太平歌大冶紅罏著一毛試向其中撮灰燼亘天紅焰已周遭蒙菴嶽志公曰終日拈香擇火不知身是道場玄沙曰終日拈香擇火不知真個道場玄覺徵云只如此二尊者語還有親疏也無雪竇顯云一對無孔鐵鎚圓悟勤云終日拈香擇火不知拈香擇火天童覺云奇怪八十翁翁出場屋不是小兒戲且道利害在甚麼處有智無智較三十里頌曰五蘊山頭古佛堂拈香擇火好承當何須向外求賢聖終日無非是道場本覺一大乘經偈經首題字昔有僧問地藏琛和尚以字不成八字不是未審是甚麼字地藏曰看取下注腳又有問披雲寂師答以頌曰以字不是八不成森羅萬象此中明直饒巧說千般妙不是漚和不是經以八不成只目前經中未識注中看垂慈不為多知解切要參玄達本源汾陽昭以字不成八不是拈起經題皆擬議下頭注腳任君看却是入門先問諱佛印元以字不是八不成龍門風浪苦雷霆多少游魚迷去路依前和雨落滄溟佛慧泉我佛金言義海深開遮唯要悟真心首標妙在當頭劄密使泥牛曉夜吟雲居祐拈起題摸不著却看下頭注腳了知字義炳然大藏潛通廣略地藏恩以字不成八字不是法身睡著無遮閉衲僧對面不知名百萬人前呼不起覺範洪以字不成八字不是十方諸佛同參三世如來共軌慶喜多聞罔措鶖子神通莫擬若非金色頭陀焉能密傳斯旨旻古佛以字不是八字非滿琅函載絶毫釐看經到此須開眼玉軸分明兩畔題羅漢南經題滿目孰知元點畫分明句義全佐國欲知功力大蕭何元是漢朝賢疏山常以字不是八不成無言童子笑欣欣優曇華現人間世鼻孔通天嗅不聞開福寧以字不成八字非爍迦羅眼不能窺一毛頭上重拈出忿怒那吒失却威徑山杲龍宮海藏不曾收梵語唐言亦謾求剛被祖師輕漏泄當門齒缺乃因由靈巖因續收鳥跡半露蒼苔科斗並遊春水若不信受奉行未免即從座起石明不向經題識本真紙堆討甚法王身未開梵夾承當去免作循行數墨人絶岸湘問你地藏知不知下頭注腳萬千千算沙入海徒疲倦不若教他了目前橫川珙楞嚴經佛告阿難吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝頌曰全象全牛意不殊從來作者共名模如今要見瞿曇老剎剎塵塵在半途雪竇顯堂堂露柱久懷胎長下孩兒頗俊哉未解語言先作賦一操直取狀元來白雲端老胡徹底老婆心為阿難陀意轉深韓幹馬嘶芳草渡戴嵩牛臥緑楊陰湛堂準雲收空闊天如水月載姮娥四海流慚愧牛郎癡愛叟一心猶在鵲橋頭佛心才說離百非存軌則言無一法尚筌毗耶默默曾緘口摩竭寥寥鎮掩扉佛鑑勤續收初學賣華日嬌羞掩齒牙及至容顏老脫然無可遮却笑白雲它自散不知明月落誰家崇覺空隔林倣佛聞機杼知有人家在翠微及至入門親見了元來只是小兒嬉簡堂機見時不見非見見非見不見總非非織女機梭撩亂擲牧童鞭索恣胡揮幽鳥一聲驚宇宙碧灣溪畔緑楊垂呆堂定石潤非玉水麗非金大禹決而西溯卞和泣而陸沉美兮渺兮錯古礱今虗堂愚楞嚴經佛謂阿難若能轉物即同如來頌曰若能轉物即如來春暖山華處處開自有一雙窮相手不曾容易舞三臺白雲端若能轉物即如來處處門開見善財花柳巷中呈舞戲九衢乘醉臥樓臺真如毛吞巨海芥納須彌乾坤大地直下同歸一氣不言含有象萬靈何處謝無私佛心才若能轉物即同如來咄哉瞿曇誑呼癡呆徑山杲續收雨色和烟匝四維眼皮未綻若為窺等間破金剛際坦蕩無因役路岐或菴體他人住處我不住他人行處我不行不是與人難共處大都緇素要分明此山應楞巖經佛謂阿難見見之時見非是見見猶離見見不能及頌曰見不及處江山滿目不覩纖毫花紅柳緑白雲起處本無心江海滔滔豈盈縮海印信拄杖頭邊無孔竅大千沙界猶嫌小毗婆尸佛早留心直至而今不得妙鼓山圭春至自開花秋來還落葉黃面老瞿曇休搖三寸舌徑山杲續收色空明暗本無因見見由來亦誤人見不及時猶未瞥那知殃祟是家親遁菴演沒絃琴上無私曲一曲彈來轉轆轤斷崖流水少知音六六不成三十六妙峯善瘦藤拄到風烟上乞與遊人眼界寬不知眼界寬多少白鳥去盡青天還朴翁銛雨洗淡紅桃蕚嫩風搖淺碧柳絲輕白雲影裏怪石露緑水光中古木清潛菴光隔墻見角便騎牛騎入紅塵閙市遊遊遍歸來欄裏臥三更半夜失踪由雪菴瑾增收楞嚴經七處徵心頌曰七處徵心心不遂懵懂阿難不瞥地直饒徵得見無心也是泥中洗土塊西余端七處徵心欵便成推窮尋逐按分明都緣家賊難防備撥亂乾坤見太平卍菴顏吹糠著米翻成特地不因一事不長一智北澗簡七處徵他天外天毫光直射阿難肩瞿曇忒殺憐兒切逼得鮎魚上竹竿絶岸湘增收楞嚴經八還辨見頌曰八還之教垂來久自古宗師各分剖直饒還得不還時也是蝦跳不出斗西余端明暗色空不可還不可還者絶躋攀夾截虗空成畔岸一重水隔一重山卍菴顏色空明暗各不相知行到水窮處坐看雲起時北澗簡還還還後更無還一箇間人天地間昨夜大蟲遭虎咬皮毛落盡體元斑絶岸湘增收楞嚴經阿難大衆獲本妙心頌曰東西南北捉虗空海角天涯信不通力盡神疲無處覓萬年松在祝融峯卍菴顏適我昔所願今者已滿足是玉也大奇只恐不是玉北澗簡增收楞嚴經觀世音菩薩成三十二應身獲十四無畏法頌曰良哉觀世音旋聞與聲脫犬吠驢鳴休未休世出世間活鱍鱍瞎堂遠三十二應不思議十四無畏如流水男子身中入定時女子身中從定起卍菴顏趂隊選圓通無端立下風當時供死欵錯說在聞中北澗簡增收楞嚴經妙性圓明離諸名相頌曰一錢為本萬錢利富不足而貧有餘換骨奪胎些子藥輸他潘閬倒騎驢卍菴顏金盤不可動轆轆轉難住停待良久間圓明湛如露北澗簡增收楞嚴經諸可還者自然非汝不汝還者非汝而誰頌曰日暖風和景更奇華華草草露全機荼一陳香風起引得遊峰到處飛心聞賁千山鳥飛滅萬里人迹絶扁舟蓑笠翁獨釣寒江雪肯堂充不汝還者復是誰殘紅流在釣魚磯日斜風定無人掃燕子銜將水際飛天目禮增收楞嚴經六解一亡頌曰根塵縛脫本同源一處休復六用捐手把一條紅斷貫娘生鼻孔一時穿卍菴顏六用無功信不通一時分付與春風篆烟一縷間清晝百鳥不來花自紅北澗簡結解非殊存亡無據試問本來宗當初誰縛汝增收楞嚴經阿難大衆復白佛言若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生頌曰雙劒峯前古寺基天尊元是一牟尼時難只得同香火莫聽間人說是非卍菴顏三蛇九鼠一畝之地竿木隨身逢場作戲北澗簡增收楞嚴經佛言阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨順殺盜淫故反此三種又則出生無殺盜淫有名鬼倫無名天趣有無相傾起輪回性頌曰七處精研一妄心更隨三業殺盜淫身心不是間家具前箭猶輕後箭深卍菴顏客舍并州已十霜歸心日夜憶咸陽無端又渡桑乾水却望并州是故鄉北澗簡增收楞嚴經佛告阿難無令心魔自起深孽頌曰瞿曇徹底老婆心見明色發理難任入鄉隨俗那伽定佛魔到此盡平沉卍菴顏挽弓須挽強用鏘須用長射人先射馬擒賊先擒王北澗簡增收楞嚴經佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣說性覺妙明本覺明妙詳在本經頌曰清淨本然遍法界山河大地即皆現性覺必明認影明眼耳便隨聲色轉卍菴顏彌滿清淨中不容他山河大地萬象森羅北澗簡增收楞嚴經若能推者即是汝心則是認賊為子修山主云若能推者不是汝心則是認賊為子頌曰如今推也是子是賊買帽相頭食魚去骨天童覺增收楞嚴經跋陀婆羅入浴忽悟水因頌曰了事衲僧消一個長連床上展腳臥夢中曾說悟圓通香水洗來驀面唾雪竇顯超諸現量即悟水因體明無垢孰云洗塵得無所有了無相身成佛子住妙觸常存大溈智洗塵觸體兩空寂妙證密圓超見思白璧無瑕空受玷圓通會裏受塗糊塗毒䇿增收楞嚴經當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶汝等一人發真歸元此十方空皆悉消殞頌曰一人發真歸元十方虗空消殞試問楊岐栗蓬何似雲門胡餅尼無著總瞌睡茫茫困思來喫碗濃茶眼便開四海五湖王化裡更無一物是塵埃朴翁銛
