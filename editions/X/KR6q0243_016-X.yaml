body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第四世之二南嶽下前第三世之二增收洪州黃蘗希運禪師嗣百丈初遊天台逢一僧與之言咲如舊相識熟視之目光射人乃偕行屬㵎水暴漲捐笠植杖而止其僧率師同渡師曰兄要渡自渡彼即褰衣躡波若履平地回顧曰渡來渡來師曰咄這自了漢吾早知當斫汝脛其僧歎曰真大乘法器我所不及言訖不見頌曰道人猛利難親近漾笠中流驗作家憶昔高人何處去夜深和月過平沙虛堂愚前溪綠漲雨初晴浮笠波心掌樣平伎倆由來祇如此放教急急奔前程石溪月增收黃蘗一日在鹽官殿上禮佛次時唐宣宗為沙彌問曰不著佛求不著法求不著僧求長老禮拜當何所求師曰不著佛求不著法求不著僧求常禮如是事彌曰用禮何為師便掌彌曰太麤生師曰這裏是甚麼所在說麤說細隨後又掌頌曰象王蹴踏師子嚬呻奇哉三掌分付著人大唐扶得真天子不動干戈致太平枯禪鏡黃金殿上顯全機爭似揚眉瞬目時三度爪牙親弄處干戈中立太平基東山源曾施三掌觸君王佛法何曾有寸長麤行沙門封斷際至今無地著慚惶北海心大機之用誰擔荷斷際孤風不可追濟北少年曾未委風光太子已先知石溪月從門入者不是家珍攔腮便掌重賞分明前際後際獨見太平寶劒拂開龍體現直至如今六國清尼閑林英膝下黃金貴掌中天地寬風雲欣際會四海盡濤寒西巖惠轟雷掣電奮全機正是潛龍熟睡時忽地夢回春恨斷曉風吹雨過前溪閑極雲增收黃蘗一日辭南泉泉門送提起師笠曰長老身材沒量大笠子太小生師曰雖然如此大千世界總在裏許泉曰王老師聻師戴笠便行頌曰相見錦江頭相携上酒樓會醫還少病知分不多愁龍門遠黃蘗因裴相國鎮宛陵建大禪苑請師說法以師酷愛舊山還以黃蘗名之公一日拓一尊佛於師前跪曰請師安名師召曰裴休公應諾師曰與汝安名竟公禮拜頌曰師前跪托請安名驀地當鋒喚一聲不是裴公誰敢應直教聾瞽也開聽汾陽昭裴相當時忘却名被人喚著又惺惺不知未具胞胎日誰敢塗糊此性靈佛印元五彩粧來掌上擎老胡剛為立虗名君今欲得超諸祖須向金剛頂上行保寧勇不是心兮不是佛黃蘗喚出是何物裴公從此認虗名天下衲僧跳不出草堂清捧來前面請安名黃蘗高高喚一聲剖出從前真面目從茲佐得國風清楚安方續收裴公悟處絕譊訛尺水能翻萬丈波霹𮦷機中反活眼鋒𨦵句裏罷干戈峯頭路暫經過濃綠萬枝紅一點動人春色不須多湛堂深名正字亦正形端影必端呼來并諾去驢屎雜旃檀西巖惠土木形骸權號佛呼來喚去強名誰要知箇裏難安立相國須當大姓裴閑極雲黃蘗云汝等盡是噇酒糟漢還知大唐國內無禪師麼時有僧問諸方聚眾為甚麼却道無禪師師曰不道無禪祇是無師頌曰凜凜威風不自誇端居寰海定龍蛇大中天子曾輕觸三度親遭弄爪牙雪竇顯無師充塞大唐國噇酒糟漢會不得竹寺閒過春已深落花亂點莓苔色佛慧泉大唐國裏無禪師與君携手歸家裏拋鈎本欲釣鯤鯨誰知釣得跛鼈子白雲端黃蘗山中明示眾大唐國裏暗藏身袈裟一角猶拖地誰是藂林有眼人佛鑑懃大唐國裏無禪師不許會兮祇許知著肉汗衫如脫了方知棒喝誑愚癡龍門遠大唐國裏無禪師禮拜歸堂更不疑堪咲河陽新婦子不如臨濟小廝兒鼓山珪身上著衣方免寒口邊說食終不飽大唐國裏老婆禪今日為君注破了徑山杲續收象外橫該宇宙身聖凡極盡不容塵衲僧意氣合如此當場誰是奪標人雪竇宗有禪無師真可咲大唐國裏何處討可憐多少路行人噇却酒糟隨路倒懶菴樞荊棘林中宣妙義蒺藜園裏放毫光千言萬語無人會又逐流鸎過短墻慧通旦義從親處斷貧向富邊休腰纏十萬貫騎鶴上揚州或菴體大冶烹金豈一途無星秤子定錙銖祗這無師成漏逗扁舟已過洞庭湖退菴奇鬼門貼卦鬼猶驚又見毛頭掃帚星若得過關公驗正夜深把手御街行中菴空國內無師眼最高分明拈起七星刀衲僧皮下如無血未免依前噇酒糟咦菴鑒洞門無鑰劒閣崔嵬風露高寒且非人世是則是天上人間知幾幾者僧一問不將來黃蘗通身是泥水運菴巖大唐國裏無禪師獨弄單提見也無茫茫宇宙人無數幾箇男兒是丈夫月林觀大唐國裏無禪師噇酒糟漢難解注只是無師苦口禪天下無如黃蘗苦朴翁銛增收黃蘗在百丈開田歸丈問運闍黎開田不易師云隨眾作務丈云有煩道用師云爭敢辭勞丈云開得多少田地師將鋤築地三下丈便喝師掩耳而去頌曰相見言談理不虧等閒轉面便相揮畢竟水須朝海去到頭雲定覔山歸龍門遠增收杭州大慈山寰中禪師嗣百丈上堂曰山僧不解答話祇能識病時有僧出師便歸方丈法眼云眾中喚作病在目前不識玄覺云且道大慈識病不識病此僧出來是病不是病每日行住不可總是病若言不是病出來又作麼生頌曰輕如毫末重如山地角天涯去復還黃葉殞時風骨露水邊依舊石斕斑虗堂愚增收大慈一日因趙州問般若以何為體師曰般若以何為體州大咲而出明日州掃地次師曰般若以何為體州置帚拊掌大咲師便歸方丈頌曰以何為體呵呵咲推倒當頭陷虎機鳥帶香從花裏出龍含雨向洞中歸心聞賁增收台州平田普岸禪師嗣百丈師一日訪茂源源纔起迎師把住曰開口即失閉口即喪去此二途請師別道源以手掩鼻師放開曰一步較易兩步較難源曰著甚死急師曰若非和尚不免諸方檢點頌曰主山高與案山低幾見雲開又合時彷彿暮樓堪對處兩峯相峙絕高低絕像鑒廝擈欣逢是對頭拳來踢去兩相酬中間手面交加處鶻眼鷹睛莫可求竹屋簡增收平田見僧來便打僧近前把住拄杖師曰適來造次僧奪棒却打師師曰作家作家僧禮拜師近前作攙勢僧呵呵大咲拂袖出去師曰草賊大敗頌曰祖令初行亦可觀從他互換太無端幸然打著其間漢草賊終來識不難本覺一湖南長沙景岑招賢禪師嗣南泉師一日遊山歸首座問和尚甚處去來師曰遊山來座曰到甚麼處師曰始從芳草去又逐落花回座曰大似春意師曰也勝秋露滴芙蕖頌曰天地絕纖埃何人眼不開始隨芳草去又逐落花回羸鶴翹寒木狂猿嘯古臺長沙無限意咄雪竇顯拂拂山香滿路飛野花零落草離披春風無限深深意不得黃鸎說向誰上方益獨步曾無語逢人口便開始隨芳草去又逐落花回薄霧篩紅日輕烟襯綠苔若將詩句會埋沒法王才佛鑑懃續收無事携笻閒縱步堂中首座問何來潛奇掩勝皆窮盡不謾遊山空往回本覺一落花芳草如鋪錦滿目春光人畫圖門外相逢親切處也勝秋露滴芙蕖圓悟勤芳草織茵迎步綠落花鋪錦拂衣香歸來說似諸禪子蕩蕩風光遶畫梁增收長沙因僧問如何是上上人行履處師曰如死人眼曰上上人相見時如何師曰如死人手頌曰死人眼死人手金烏飛玉兔走直截根源取之左右張翁醉倒官街元是李翁喫私酒印空叟增收長沙因僧問了即業障本來空未了應須還宿債只如二祖是了不了師曰空又問雲門門曰確頌曰長沙空雲門確信手拈非造作離心意識參出聖凡路學纔有絲毫騰蛇遶脚大溈秀增收長沙一日遣僧問同參會和尚曰和尚見南泉後如何會默然僧曰和尚未見南泉已前作麼生會曰不可更別有也僧回舉似師師示偈曰百尺竿頭不動人雖然得入未為真百尺竿頭須進步十方世界是全身僧便問祇如百尺竿頭如何進步師曰朗州山澧州水曰不會師曰四海五湖皇化裏頌曰玉人夢破一聲雞轉生涯色色齊有信風雷催出蟄無言桃李自成蹊及時及節力耕犁誰怕春疇沒膝泥天童覺朗州山澧州水四海五湖皇化裏百尺竿頭進步時築著磕著自家底老長沙也希有好路不行草裏走踏著南山鼈鼻蛇驚起面南看北斗佛鑑懃一句舉揚宗旨事法堂上草亦須荒回頭却說人間話大地山河常放光光未明無有佛三條椽下好商量岑大蟲岑大蟲澧州水朗州峯蒙菴岳長沙因張拙秀才看千佛名經問師曰百千諸佛但見其名未審居何國土還化物也無師曰黃鶴樓崔顥題後秀才還曾題也未曰未曾師曰得閒題取一篇頌曰黃鶴樓前法戰時百千諸佛竪降旗渠無國土居何處留與多才一首詩死心新聞名直下驚天地更問所居成自謾回首却登歸去路家家門下透長安靈源清黃鶴樓詩崔顥題古今吟詠韻難齊秋空月影千江印春曉流鸎是處啼大洪遂千佛靈蹤莫別求長沙機轉有來由要知覿面難藏處黃鶴樓前鸚鵡洲禾山方海水有時終見底人生到死不知心秀才若會翻身句管取白衣入翰林慈受深黃鶴樓中四望賒滿天風月屬詩家百千諸佛居何土風起長江湧浪花普融平百千諸佛倒騎牛對面分明失路頭却問老師何處去勸君更上一層樓黃龍震百千諸佛聞名久國土莊嚴何處求覿面若無精徹眼又隨船子下揚州南華昺百千諸佛但聞名國土何曾不現成自是不歸歸便得五湖烟景有誰爭寶峯明續收龍門遠曰大眾秀才問佛居何國土長沙為甚麼却恁麼道秀才尋常嘲風咏月為甚麼長沙面前一辭不措若是黃鶴樓有甚麼難題處聽取山僧題破乃頌曰容顏甚奇妙光明照十方我適曾供養今復還親覲黃鶴樓前共語時白蘋紅蓼對江湄衷腸已訴無人會惟有清風明月知天童覺赤土纔將畫簸箕烏雞何事忽驚飛自從題入新詩後黃鶴樓前忘却歸月堂昌黃鶴樓前鸚鵡洲夕陽西去水東流要知諸佛居何處風葉蕭蕭月滿樓訥堂思黃鶴樓前題一篇無限措大失平仄長沙一隻眼長長今古何曾有蹤跡心聞賁堂堂妙相真難比歷歷梵音猶更奇可憐逐句尋言者蹉過長沙覿面機知不知黃鶴樓崔顥題詩佛性泰百千諸佛問來由崔顥曾題黃鶴樓雪後竹籬梅亂放一枝臨水最風流懶菴樞𪂶𪂶鳥守空池魚從脚底過𪂶𪂶總不知遯菴演崔顥曾題黃鶴樓上頭春色少人遊清香已逐殘春去無限狂蜂戀不休湛堂深崔顥曾題黃鶴樓長沙拈起當風流大千國土俱家業諸佛何曾有地頭混源密秀才覔火和烟得長沙賣石著雲饒欲知千佛居何土嬴得詩禪價轉高伊菴權黃鶴樓前一首詩把將掃帚畫蛾眉百千諸佛真消息覿面分明舉似伊松源岳百尺竿頭一布巾分明寫出酒家春相逢不飲空歸去明月清風也咲人掩室開百千諸佛居何土崔顥曾題黃鶴樓倒腹傾腸猶不會長江千古自東流天目禮百千諸佛在何居黃鶴樓詩錦不如問汝秀才題也未一篇題取莫躊躇石田薰增收長沙與仰山翫月次山曰人人盡有這箇祇是用不得師曰恰是倩汝用山曰你作麼生用師劈胷與一踏山曰㘞直下似箇大蟲自此諸方稱為岑大蟲長慶云前彼此作家後彼此不作家乃別云邪法難扶頌曰浮雲散盡月當空兔子懷胎產大蟲跳出風前弄牙爪至今撼動廣寒宮曹源生作者提持逈不同廣寒宮裏起清風一朝踏到雖然活已落他家陷穽中掩室開長沙因僧問本來人還成佛也無師曰汝見大唐天子還自割茅刈草麼曰未審是何人成佛師曰是汝成佛僧無語師曰會麼曰不會師曰如人因地而倒因地而起地道甚麼頌曰岑公拂袖播鴻機問佛人多作佛稀王主割茅親下手不能土上更加泥汾陽昭臺殿重重紫氣深星分辰位正乾坤金輪不御閻浮境豈並諸侯寶印尊投子青簾幙春風曉尚寒歌樓聲咽夢驚殘金輿不御人間世休羨壺中日月寬雲巖因續收巨岳何曾乏土唐皇豈可刈茅禮拜近前叉手西天十萬迢迢古佛即自己自己即古佛珊瑚瀲灔十洲春蟾蜍暎奪驪龍窟圓悟勤增收長沙因三聖令秀上座問師曰南泉遷化向甚麼處去師曰石頭作沙彌時參見六祖秀曰不問石頭見六祖南泉遷化向甚麼處去師曰教伊尋思去秀曰和尚雖有千尺寒松且無抽條石筍師默然秀曰謝和尚答話師亦默然秀回舉似三聖聖曰若恁麼猶勝臨濟七步然雖如此待我更驗看至明日三聖上問承聞和尚昨日答南泉遷化一則語可謂光前絕後今古罕聞師亦默然頌曰客見長沙路陌同令人依約探家風須彌萬仞磨今古折箭量天枉費工佛印元長沙似水洗水者僧自倒自起三聖特地出頭賣盡滿園桃李月堂昌長沙老長沙老入理深談何處討昨夜三更斗柄垂依舊天明日杲杲南泉遷化知不知今古傳來也大奇也大奇雪裏誰能解辨梅大圓智探花蝴蝶舞三臺木掉頭鳴訝鼓處處相逢岑大蟲元來便是長沙虎長靈卓蘿蔔頭禪聒噪人霜刀累切了無痕自古不通人咬嚼只容衲子鶻崙吞正堂辯也大奇也大奇長沙畫虎却成狸南泉一去無消息空使行人說是非佛鑑懃王老踪由孰可知那堪更問大蟲兒直饒石筍抽條盡無處堪尋向上機投子舒也大奇也大奇卷舒出沒看全機若非鑑物張華眼未免隨人說是非石溪月增收長沙因僧問如何轉得山河國土歸自己去師曰如何轉得自己成山河國土去曰不會師曰湖南城下好養民米賤柴多足四鄰僧無語師示偈曰誰向山河轉山河轉向誰圓通無兩畔法性本無歸頌曰塵剎平常露此身疑生情動見疎親湖南城裏從來事米賤柴多足四鄰保寧勇誰問山河解轉身轉身方覺體全真清淨界中無一物一重山後一重人大圓智一顆圓明非內外老盧鏡裏絕纖塵山河大地非他物萬象森羅露此身既不會更無人向道湖南好養民長沙因有僧問如何是諸佛師師云汝從無量劫來承甚麼人恩力頌曰水墨丹青狀不成混然竹木箇精靈求恩乞福拋柸校向道明明自不聽保寧勇混沌未分便有渠堂堂相貌絕名模長沙謾道承恩力試問還曾識也無疎山常衢州子湖巖利蹤禪師嗣南宗師住子湖院於門下立牌曰子湖有一隻狗上取人頭中取人心下取人足擬議即喪身失命臨濟會下二僧參師方揭簾師喝曰看狗僧回顧師便歸方丈或有人問如何是子湖狗師云嘷嘷頌曰子湖堂上絕人行只為堂前狗子獰見影聞聲心膽懾當頭寧免喪殘生正覺逸子湖狗子最威獰來者投明莫暗行向道看時如不見當頭咬殺喪平生佛國白老大宗師沒巴鼻養狗之緣太兒戲奪牌禪客如到來鉛刀爭及吹毛利龍門遠續收子湖狗子劒戟牙齒虎豹遭傷象龍被耻外道天魔望風頂禮立國安不勞弧矢南堂興貧家無所有只養一隻狗任是佛出來也須遭一口顏如如蹉過跨門一機昧却見成公案子湖指處太親直須急著眼看浙翁琰增收子湖因僧問自古上賢還達真正理否師曰達僧曰真正理作麼生達師曰霍光當時賣銀城與單于契書是什麼人作其僧無語頌曰手裏絲綸卷復舒扁舟撩撥洞庭湖忽然惡浪翻空立收拾歸來一伎無月坡明鄂州茱萸山和尚嗣南泉問僧曰闍黎為復是游山翫水為復是問道參禪曰和尚試道看師曰雕蚶鏤蛤不滲之泥勞君遠至曰渾身是鐵猶被一槌師曰降將不斬頌曰杖藜林下步蒼苔擾擾勞生眼未開好是花紅隨水綠一時流出洞中來地藏恩游山翫水事尋常早晚歸來𩯭似霜踏破草鞋回首看數聲猿呌白雲鄉保寧勇來時相伴來去時相伴去須知去與來同行不同步池邊鴨聽雷嶺上風吹樹九曲黃河徹底渾三千年清只一度佛鑑懃增收茱萸上堂汝等諸人莫向虗空裏釘橛時有靈虗上座出眾曰虗空是橛師便打虗曰和尚莫錯打某甲師便歸方丈頌曰虗空是橛幾人諳獨有靈虗最善參潦倒茱萸雖倚勢龍頭蛇尾更何堪本覺一增收荊南白馬曇照禪師嗣南泉常曰快活快活及臨終呌苦又曰閻羅王來取我也院主問和尚當時被節度使拋向水中神色不動如今何得恁麼地師舉枕子曰汝道當時是如今是主無對法眼代云當時但掩耳出去頌曰一二三四五金木水火土鼓之以雷霆潤之以風雨誰道者漢生也顢顢頇頇死也莾莾鹵鹵咄地藏恩甜瓜徹蒂甜苦瓠連根苦拈起枕子時新羅夜打鼓寶峯照一生呌快活臨終沒依怙甜瓜徹蒂甜苦瓠連根苦圓照本終南山雲際師祖禪師嗣南泉初參南泉問云摩尼珠人不識如來藏裏親收得如何是藏泉云王老師與汝往來者是藏雪竇云草裏漢師云直得不往來時如何泉云亦是藏雪竇云雪上加霜師又問如何是珠雪竇云險泉召師祖師應諾泉云你不會我語師信入雪竇云百尺竿頭作伎倆不是好手者裏著得隻眼賓主互換便能深入虎穴或不恁麼縱饒師祖悟去也是龍頭蛇尾漢頌曰問渠摩尼珠摩尼在何許呼名應答聲諸方莫錯舉神鼎諲碧波深處釣魚翁拋餌牽絲力已窮一棹清風明月下不知身在水晶宮佛慧泉別是非明得喪應之心指諸掌往來不往來只這便是藏輪王賞之有功黃帝得之罔象轉樞機能伎倆明眼衲僧莫鹵莾天童覺往來是藏珠何在省去方知不外求罔象得之猶特地回光返照便甘休海印信續收蒼鷹逐兔驪龍翫珠透青眼不瞬照物手寧虗往來不往來草裏漫塗糊百尺竿頭入虎穴分明月上長珊瑚圓悟勤收者易見者難見者易用則難見得用得二無兩般閒把一枝歸去笛夜深吹過汨羅灣遯菴演分明月上長珊瑚一段風光爍太虗大地眾生同受用如來藏裏本來無松源岳一顆玄珠不昧歷劫曾無向背可憐窮漢愚癡日逐伶俜羣隊南泉傾盡愁腸恰似水澆鴨背而今直下拈來對面一槌打碎普菴玉宣州刺史陸亘大夫或稱侍御或稱中丞見南泉問南泉弟子家中有一片石有時或坐或臥如今擬鐫作一尊佛還得麼泉云得大夫云莫不得麼泉云不得不得頌曰問得也道得不得還不得侯白何曾白侯黑未是黑貴他王老師天下賊中賊賊大夫象簡曾拈得正覺逸得與不得天寬地窄坐臥經行無勞疑惑真如南泉得得何似不得淑人君子其儀不忒黃龍震親從家中來家中何所有持此一片石廣大堅且久靈山曾獻佛帝釋聊舉手心中出何物安樂并長壽龍門遠續收南泉道得拈出片石南泉道不得拈出片石石中有玉淨無瑕堪與大夫為寶璧見得不見一絲毫坐臥未曾離頃刻不用雕鐫徒勞拂拭儀相堂堂分明歷歷若人於此便回光何必當來見彌勒佛鑑懃前得得後不得一貫誰知兩五百雨檜蕭蕭風松瑟瑟隔山人聽鷓鴣詞錯認胡笳十八拍石菴玿大夫鐫石意彌高王老無端教壞他裂破重關行活路一天風月照娑婆掩室開得得與不得分明露肝膽無人知此意令我憶南泉簡翁敬坐臥曾經幾度春半封苔蘚半籠雲無稜無縫難提掇空把肝腸說向人閑極雲兩手持來難蓋覆依前兩手還分付一枕清風睡正濃鳥啣花落嵓前路諾菴肇陸大夫問南泉曰肇法師也甚奇怪解道天地同根萬物一體泉指庭前牡丹曰大夫時人見此一株花如夢相似頌曰見聞覺知非一一山河不在鏡中觀霜天月落夜將半誰共澄潭照影寒雪竇顯舉則易見還難彌盧頂上天風寒峨峨直下蒼龍窟誰敢著晦堂心天地同根自唯然當時猶喜遇南泉指言見此花如夢須信壺中別有天白雲端大夫作牧見南泉舉古明今理事圓正好捨身𢬵命處不知何故却茫然保寧勇舉則易見還難同根天地又顢頇南泉指出花如夢對此憑君子細看死心新一枝兩枝千萬枝金刀擬剪却離披不離披有誰知自緣今日人心別未必秋香一夜衰上方益山潤石韞玉林秀淵藏珠見此一株花似夢灼然根本不同途王老師脫規模解向長安正閙處喚起悠悠陸大夫圓悟勤南泉瀝膽為諸人笑指庭前別是春不是守株閒待兔直須騎鶴上青雲佛鑑懃孰云天地與同根事見爭如理見親一檻庭花渾巳物滿天風月與誰論堪笑南泉老作猶來因語識人可憐陸亘大夫對面埋沒家珍佛燈珣若知天地本同根不應重來更問人却得南泉親指似等閒花發夢中春鼓山珪天地同根伸一問未曾擡步已亡家無陰陽處花重發玉本無瑕似有瑕徑山杲續收南泉據令不輕酬曾指庭花對陸侯舉世盡從忙裏老誰人肯向死前休真淨文須知天地共同根萬物從來元一體未審南泉庭下花幾人看了夢相似照堂一指點深紅與昔同更無夭艶在芳叢南泉笑裏移春去留得殘紅醉蜜蜂心聞賁玉洞玄關道路長蟠桃豈是等閒芳遮藏不許人間見只恐春風漏泄香正堂辯堪笑當年陸大夫獨誇身外更無餘不因指出花如夢爭得雙眸翳盡除懶菴需未曾脚下分泥水剛向人前弄口唇滿眼芳花蝴蝶夢不知辜負洛陽春肯堂充同根一體都如夢夢裏惺惺眼又花蝴蝶飛來過墻去不知春色落誰家雪菴瑾天地同根物一體大夫曾舉向南泉庭前指出花如夜幾箇親曾到檻前天目禮裁書擬欲扣天閽往往無人可共論因得老生輕指撥臨風不覺暗消魂虗堂愚天地同根已自明大夫何用逞英靈壓良為賤南泉老笑指庭花換眼睛無隱鑑陸亘回珠轉玉南泉換斗移星花陰滿地日午夢覺流鸎一聲南巖勝天地同根元一體畫師難畫亦難描南泉轉步移身處引得黃鸎下柳條嘯巖蔚增收陸大夫問南泉師姓甚麼泉曰姓王公曰還有眷屬麼曰四臣不昧公曰王居何位曰玉殿苔生公曰玉殿苔生時如何曰不居正位頌曰金鴨香消更漏長沉沉玉殿紫苔生高空有月千門照大道無人獨自行石帆衍玉殿苔生正不居四臣無路納嘉謨老農知是承誰力風暖歌聲落野鉏石林鞏增收陸大夫問南泉大悲菩薩用許多手眼作什麼泉曰如國家用大夫作甚麼頌曰大悲手眼問來親王老酬機列主賓倒轉鎗頭來快便從茲六國絕煙塵野菴璇增收陸大夫問南泉弟子從六合來彼中還有身麼泉曰分明記取舉似作家公曰和尚不可思議到處世界成就曰適來總是大夫分上事頌曰馬前相撲入交失脚不來外求當面修削六合彼中身分明舉似人到處世界總成就脫略窠臼還滲漏月堂昌
