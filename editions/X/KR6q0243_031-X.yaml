body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第七世之二南嶽下第六世之餘鎮州寶壽第二世禪師嗣寶壽沼開堂乃先寶壽遺囑三聖為作請主開堂日師方陞座聖便推出一僧師便打聖曰你恁麼為人非但瞎却這僧眼瞎却鎮州一城人眼去在師擲下拄杖便下座歸方丈頌曰三聖擔他寶壽鏘推僧出眾擬商量塞外將軍行正令直得盲人滿大唐汾陽昭寶華王座始登時三聖推僧決眾疑棒下分明無老少天下盲人幾箇知黃龍南金槌擲下如星疾好手接來不費力當時擲向洪波中千古萬古無消息白雲端黑白未分著著奇任他閑漢畔頭窺不知除却神仙手更有何人敵得伊保寧勇探馬飛來棒下寧瞎人翻滿鎮州城太平本是將軍建不許將軍見太平真淨文臨濟家風兩獻酬推僧棒瞎見宗猷若非寶壽全機眼更有誰明此話頭佛國白法眼傳來付與誰三聖推僧決眾疑將軍令舉群夫駭直得盲聾徹四夷真如寶壽開堂座始登當時三聖便推僧要知打瞎人人眼好向曹溪問老能智海清當鋒更不借全機勍敵須還作者知銕馬放閒沙塞靜瞎驢千古少人騎上方益豐城收寶劒宇宙識人稀不入張華手焉能別是非佛心才驀刃開時飛銕騎電光閃處擲金槌一城瞎却渾閒事直至而今成是非佛性泰寰中天子勑塞外將軍令萬里掃烟塵威雄難比並曲中直細中麤瞎却人眼真作略掀倒禪床捋虎鬚人平不語水平不流劒去久矣徒勞刻舟權柄在手專殺活大丈夫兮得自由南華昺矢在弦上不得不發擬議蹉過箭鋒一劄京兆府天寧璉寶壽開堂推出僧棒頭有眼要分明滿城人瞎誰能曉今古清風匝地生踈山如提起須彌第一鎚電光石火太遲遲象王行處狐蹤絕獅子咆哮百獸危徑山杲棒頭瞎却一城人三聖撩他寶壽瞋正令只堪提一半一盲引得眾盲行鼓山珪續收養得男兒要賭錢渾身無有寸絲纏是非窟裏和身入生滅門中滿口宣正堂辯塞北千人帳江南萬斛船菩提窩裏坐總謂是虗傳石菴玿寶壽第二世在先寶壽為供養主壽問父母未生前還我本來面目來師立至夜深下語不契翌日辭去壽曰汝何往師曰南方學佛法壽曰汝且在此作街坊若是佛法紅塵浩浩談說一日在市中見二人相打一人近前打一拳云你是甚麼面目師覩之忽然大悟歸告寶壽壽深可之頌曰閙市相逢兩知識面目無來太廢力粉骨碎身未足酬一句了然超百億海印信南北東西是處游更深歸去月如鈎春風一陣花狼籍不覺思量暗點頭枯木成甚妙也甚妙於此知性命擗鼻與一拳當時便打正五祖演十字街中六不收本來面目絕踪由縱饒悟得分明去已落儂家第二頭禾山方一拳拳倒黃鶴樓一趯趯翻鸚鵡洲幸有傍人為著力自家端坐看揚州佛性泰一拳打就無面目碧眼胡僧不足秋來黃葉落紛紛六六反成三十六南華昺續收寶壽作街坊閙市中薦得父母未生前恁麼無面目最奇特大用現前無軌則圓悟勤春色依依柳色萋桃花猶夾杏花枝欲識本來無面目塵中方見丈夫兒佛鑑懃借路經過無面目因邪打正有拳頭衲僧門下無干涉徒用精金換得鍮南巖勝增收汝州西院思明禪師嗣寶壽沼僧問如何是伽藍師曰荊棘叢林曰如何是伽藍中人師曰貛兒貉子頌曰毫𩬊不留縱橫自由閫外乾坤廓落大方無外優游明明祖師意明明百草頭褫破狐疑網截斷愛河流縱有回天力爭如直下休四衢道中淨躶躶放出溈山水牯牛圓悟勤增收西院明在許州聞汝州南院出世元與同參遂特去相訪纔入寺了曰啟和尚某甲無可人事自從許州來收得江西剃刀一柄上和尚院曰汝從許州來收得江西剃刀師於院手上掐一掐院曰侍者收師以袖拂一拂便行院曰阿剌剌阿剌剌頌曰南院門前信莫窺登臨無不喪全威許州收得江西信針芥相投只自知海印信增收池州魯祖山教禪師嗣灌溪因僧問如何是雙林樹師曰有相身中無相身曰如何是無相身師曰金香爐下鐵崑崙頌曰有相身中無相身金香爐下鐵崑崙雙林別後無消息滿路風塵來往人方菴顯增收吉州資福如寶禪師嗣酉塔穆因陳操尚書來師畫一圓相操曰弟子與麼來早是不著便更畫圓相師於中著一點操曰將謂是南番舶主師便歸方丈閉却門頌曰團團珠遶玉珊珊馬載驢䭾上鐵船分付海山無事客釣鼇時下一棬攣復云天下衲僧跳不出雪竇顯布漫天網鯨鼇不上水底反身波前躍浪在彼在此千里萬里不著便處却能回閉了方丈依前來雙收雙放半合半開主賓全體用石女老黃梅月堂昌李公要勸張公酒却被張公罰一盃珠遶團團休錯會還家拍手笑咍咍別峯印郢州芭蕉山慧清禪師嗣南塔湧上堂拈拄杖曰你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子靠拄杖下座頌曰有無今古兩重關正眼禪人過者難欲通大道長安路莫聽崑崙說往還投子青芭蕉示眾世無隣與奪縱橫不易親雨散雲收何處去空令游子淚沾巾正覺逸你有面前拈取去如無背後奪將來可憐黑漆光生底擊著千門萬戶開保寧勇縱奪臨機得自由相逢切忌更擡眸轉身必合知時節擬議山藤便到頭枯木成芭蕉拄杖與奪直要當風眼活剎那纔昧隔生鼻孔遭他牽撮佛智裕有無與奪太譊訛拄杖當途不奈何好把斜橫禪椅畔免令就上長枝柯文殊道十字街道見成行貨擬欲商量漆桶蹉過徑山杲續收舒無踪卷無跡日午晴空轟霹𮦷衲子驚迷失路頭神號鬼哭知何極雪竇宗趂水泛船隨泥作佛船行佛成水泥不物有拄杖兮與拄杖船中輕蕩漿無拄杖兮奪拄杖佛面巧出相好手芭蕉眼不開塞壑填溝何處來月堂昌赫日光中風雷雨雹海水逆流須彌倒卓走獸飛禽懸崖撲落塞外將軍生擒活捉捋猛虎鬚折蒼龍角南堂興相罵饒汝接觜相唾饒汝潑水等閒摸著蛇頭拍手囉囉哩哩卍庵顏芭蕉舉起拄杖驚動森羅萬象蝦蟇飛過梵天眉毛元在眼上尼無著總蠱毒之鄉水不可甞沾他一滴渾家喪亡肯堂充你有更須當面與渠無背手奪將來驀然夜半化龍去黑雨烏風裂地雷虗堂愚增收鼓山珪云五祖以拄杖子話請益白雲雲曰要會麼多處添些子少處減些子何故神仙秘訣父子不傳白雲和尚大似一錢為本萬錢為利殊不知如人善博曰勝日貧老禪道多處添些子少處減些子自然到處恰好者箇筭法極省工夫你諸人要會麼乃頌曰多添減少休那兌支移拆變加三倍平生有子不須教一回落賺自然會增收芭蕉清因僧問如何是透法身句師曰一不得問二不得休曰學人不會師曰第三度來與汝相見頌曰休問維摩臥病城羅山空自掩光陰流沙欲渡全無難莫聽鶯啼在那林投子青一不問兮二不休直須識取那鈎頭再三回首來相見急水波心輥綉毬懶菴需六祖下第七世之三清源下第六世之一天皇台州瑞巖師彥禪師嗣嚴頭師尋居丹丘瑞巖坐磐石終日如愚每日喚主人公復應諾乃曰惺惺著他後莫受人謾後有僧參玄沙沙問近離甚處曰瑞巖沙曰有何言句示徒僧舉前話沙曰一等是弄精魂也甚奇怪乃曰何不且在彼住曰已遷化也沙曰而今還喚得應麼僧無對頌曰一生長喚主人公不受人謾逈不同今日惺惺何處去滿山松栢起悲風佛國白彎彎新月聚三星誰信心王本自寧可笑瑞巖方丈老夜深呼喚強惺惺祖印明瑞巖家風喚主人公昨夜南山虎咬大蟲徑山杲一主人公死一主人公活若解弄精魂兩頭皆透脫鼓山珪自呼呼應已惺惺不受欺謾理不輕池內白蓮香未已簷前山色四時青白楊順續收瑞巖常喚主人公突出須彌最上峯大地掀翻無覓處笙歌一曲畫樓中天衣哲不施棒喝喚主人公鵞王擇乳鴨類不同高原泉水洗水兮金博金瑞巖徹底老婆心自擕缾去沽村酒却著衫來作主人無量壽學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來身無門開磐陀漠漠秘蒼苔終日加趺兩𩯭摧縱使不曾呼喚著何甞謾得阿師來天目禮風前一曲動離情調古無人和得成自唱自斟還自飲至今猶自不惺惺別山智福州羅山道閑禪師嗣巖頭閩王請開堂師陞座方收斂僧伽黎乃曰珍重便下座閩王近前執手云靈山一會何異今日師曰將謂是箇俗漢五燈會元載云閩帥飲其法味請居羅山號法寶禪師開堂陞座方斂衣便曰珍重時眾不散良久師又曰未識底近前來僧出禮拜師抗聲曰也大苦哉僧擬伸問師乃喝出與舊載公案稍異頌曰羅山忍俊不能禁大展家風吼一音紙墨如山書莫盡衲僧休向義中尋洞山聰紛紛雪影耀閩天閩主欣逢倍樂然一旦春風吹大地更無一點在階前白雲端須彌座上斂伽黎海口潮音闡大機世主大檀能藻鑒靈山嘉會愈增輝疎山如續收一道直如弦千古應無對縱有囓鏃機髑髏成粉碎栢堂雅瑞世優曇見最難異香浮動曉風寒自非世主垂青眼却作閑花野草看寶葉源增收羅山初謁石霜問起滅不停時如何霜云直須寒灰枯木去一念萬年去函蓋乾坤去純清絕點去師不契後謁巖頭理前問頭喝曰是誰起滅師於此大悟五燈會元載云嘗謁石霜問去住不寧時如何霜曰直須盡却師不契乃參巖頭亦如前問頭曰從他去住管他作麼師於是服膺與前稍異頌曰斫斷老葛藤打破狐狸窟豹披霧而變文龍乘雷而換骨咄起滅紛紛是何物天童覺是誰起滅就窠打劫擊殺烏龜救得跛鼈殺六巖輝起滅不停誰解看當機一拶透重關東西總是長安路蕩蕩無拘自往還無準範冷水點沸湯舌頭不出口可惜老巖頭慈悲成過咎石田薰增收羅山在禾山遊同行矩長老出門次師把拄杖向前一攛矩無對師曰石牛攔古路一馬勿雙駒後有僧舉似疎山山曰石牛攔古路一馬生三寅頌曰春有百花夏有熱秋有涼風冬有雪若無閒事掛心頭便是人間好時節照堂一不踏門前路春歸又一年落花紅滿地芳草碧連天鼓山珪出門握手話分擕古道迢迢去莫追却笑波心遺劒者區區空記刻舟時徑山杲增收羅山一日問巖頭和尚三十年前在洞山來又不肯洞山是否頭曰是又問和尚豈不是承嗣德山又不肯德山頭曰是師曰不肯德山即且置只如洞山有什麼虧欠處頭良久曰洞山好佛只是無光師便禮拜頌曰一箇銕額銅頭一人三頭六臂二俱借人鼻孔却與洞山出氣南巖勝不肯宗師滿大唐羅山禮拜錯商量洞山無佛人難措慚愧巖頭口放光卍菴顏增收羅山因無軫上座問祇如巖頭道洞山好佛祇是無光未審洞山有何虧缺便道無光師召軫軫應諾師曰灼然好箇佛祇是無光曰大師為甚麼撥無軫話師曰甚麼處是陳老師撥你話處快道快道軫無語師打三十棒趂出軫舉似招慶慶一夏罵詈至夏末自來問師乃分明舉似慶便作禮懺悔曰洎錯怪大師頌曰格外談驚人句懵懂禪和徒指注酌然好箇佛無光言下迷宗空自忙賴有知音招慶在譊訛一夏為雌黃雌黃出暗寫愁腸寄知識佛性泰福州玄沙師備禪師嗣雪峯示眾曰諸方老宿盡道接物利生且問汝只如盲聾瘂三種病人汝作麼生接若拈鎚竪拂他眼且不見共他說話耳又不聞口復瘂若接不得佛法盡無靈驗時有僧出曰三種病人和尚還許人商量否師曰許汝作麼生商量其僧珍重出師曰不是不是法眼云我當時見羅漢和尚舉此僧語便會三種病人雲居錫曰只如此僧會不會若道會玄沙又道不是若是不會法眼為什麼道我因此僧語便會三種病人上座無事上來商量大家要知有僧持此語請益雲門門曰汝禮拜著僧禮拜起門以拄杖桎僧退後曰汝不是患盲復喚近前來僧近前門曰汝不是患聾門曰還會麼曰不會門曰汝不是患瘂其僧於此有省頌曰盲聾瘖瘂杳絕機宜天上天下堪笑堪悲離朱不辨正色師曠豈識玄絲爭如獨坐虗牕下葉落花開自有時復云還會麼無孔鐵鎚雪竇顯退後近前兼對辯相逢邂逅難回面春風驀地撼庭前還見落花千萬片白雲端雲門老子手親眼親因風吹火不費精神盲者便視聾者便聞雖然無語掛在口唇三種病人一種法門佛鑑懃盲聾瘖瘂接不得玄沙枉費閒心力扁鵲盧醫拱手歸三人俱是膏肓疾鼓山珪玄沙三種病人語透出雲門六不收莫待是非來入耳從前知己返為讎徑山杲續收權生聾瞽瘂𤸷要顯吾宗驗作家金剛截銕如泥碎透金纔動失玄沙汾陽昭欲知三種人應用理常新未有纖毫法能為中外塵永明壽一二三見聞覺更是誰頓銷爍花簇簇處鷓鴣啼草薰薰時鴛鴦飛玄沙老玄沙老賴遇當年欠一著諦當之言徒唯然中間樹子半零落翠巖真玄沙三種接人諸人口耳現在不要開眼尿床特地移山塞海花裏幽禽語不休風光滿地誰人買塗毒策玄沙三種病人有理不在高聲引得香嚴老子却來樹上懸身龍門遠玄沙以毒出人毒三種病人同一屋堪笑雲門老古錐河裏失錢河裏摝或菴體盲聾瘖瘂不相干莫被玄沙恣熱謾一句與君重剖露老君頭戴楮皮冠晦室明聾盲瘖瘂捉敗了也更問如何聾盲瘖瘂月林觀曲設多方驗作家有誰親見老玄沙耳聾口瘂眼睛瞎五濁眾生數似麻橫川珙玄沙見僧來禮拜乃曰禮拜著因我得禮拜汝此依傳燈錄所載其餘皆作因我得禮你頌曰拜我得禮你自笑沒道理豈獨玄沙翁天下人不是覺海元因我得禮你扶倒又扶起要行即便行要止即便止寶峯明夫子不識字達磨不會禪玄沙無此語切莫妄流傳徑山杲利刀自斷命根不要依草附木若有一法與人永入拔舌地獄鼓山珪因我得禮你牽牛去飲水岸上蹄踏蹄水中觜對觜高菴悟因我得禮你崑崙臥潭底雖然浪拍天身上無滴水雪堂行續收因我得禮你分明好慚愧玄沙不是癡咄開眼休瞌睡照堂一說你說我轉見話墮大地眾生元無一箇典牛游老鼠咬生銕十分滋味別猫兒左右看嚥唾也不徹正堂辯因我得禮你窮源須到底九九八十一閻羅王是鬼止菴顏圓悟改云當下便歸家不隔一番紙因我得禮你事從叮囑起誰知白蘋風不在秋江裏天目禮因我得禮你莫放屁撒屎帶累天下人錯認自家底𫎇菴聰玄沙一日普請往海坑斫柴見一虎僧曰和尚虎師曰是汝虎歸院後僧問適來見虎云是汝未審尊意如何師曰娑婆世界有四重障若人透得許汝出陰界東禪齊曰上座古人見了道我身心如大地虗空如今人還透得麼雪竇云要與人天為師前面端的是虎頌曰前虎後虎急須看取凜烈威風生獰爪距今古樵人不回顧喪身失命知何數若回顧雄雄坐斷山前路佛慧泉猛虎當途獨振威爪牙真箇利如錐可憐不覺亡身者碎骨收來良可悲保寧勇宗師方丈大慈悲是汝之言寔古錐萬里神光騰頂後肯將生死嚇愚癡龍門遠欲識玄沙虎覿面是誰覩直下透牢關全機超佛祖禾山方續收玄沙見虎是汝多少人明自己色聲逼滿太虗有底纖毫依倚永明壽老玄沙太饒舌覿面明明重漏泄衲僧於此便承當驗來未免眼中屑屑屑誰甄別火發新羅燒脚熱海印信山中有虎人世上有人虎常磨笑裏刀利牙爪可怖寄語花狸奴莫教渠上樹慈受深前面有虎元來是汝更問如何冤苦冤苦月堂昌玄沙一日遣僧送書上雪峯和尚峯開緘唯白紙三幅問僧會麼曰不會峯曰不見道君子千里同風僧回舉似於師師曰遮老和尚蹉過也不知頌曰故遣馳書通遠信不干文字示家風回來却報玄沙語蹉過分明理更封汾陽昭玄沙封白紙雪老却同風蹉過人難會古曲調不同真如玄沙封白紙雪老把火披元來不識字白日走須彌雲蓋智玄沙象骨眼睛烏白紙三番便當書千里同風多錯會一條拄杖兩人扶慈受深踏翻漁艇承家業笑出蘆花月正圓地闊天長三幅紙同風千里為誰宣佛心才白紙三張通信去展開千里却同風陽春轉入胡笳曲不是風吹別調中佛性泰續收三番白紙問寒暄千里同風月滿船奪得高標全用處盤蛇口內打鞦韆丹霞淳白紙連封寄雪峯雪峰由是喜同風中間蹉過無人識齋後江城打暮鐘佛陀遜白紙馳來上雪峯雪峯千里却同風玄沙蹉過人難會熨斗煎茶銚不同真淨文鵽鳭夜夜連聲呌月下同人不忍聞啼得血流無用處不如緘口過殘春文殊道三張白紙千里同風宗師蹉過衲子迷踪金烏飛出海門東風從虎兮雲從龍野雲南千里同風見不差僧持此語報玄沙不知蹉過如何也莫是玄沙蹉過他橫川珙增收玄沙因雪峯召曰備頭陀何不徧參去師曰達磨不來東土二祖不往西天雪峯然之頌曰驀然趯倒便知休百青山更不游從此七閩江上月至今空照釣魚舟佛國白釣魚船上謝三郎趯倒須彌返故鄉應笑途中未歸客伶俜旅泊向他本覺一未離閩底已還家纔跨飛鳶又眼花堪笑曾郎更心毒烏藤輕放老玄沙遯菴演增收玄沙南游莆田縣排百戲迎接來日師問小塘長老昨日許多喧閙向什麼處去也塘提起衲衣角師曰料掉沒交涉法眼別云昨日有多少喧閙法燈別云今日更好笑頌曰夜壑藏舟澄源著棹魚龍未知水為命折筯不妨聊一攪玄沙師小塘老函蓋箭鋒探竿影草潛縮也老龜巢蓮游戲也華鱗弄藻天童覺今日靜愀愀昨日閙啾啾風定花猶落鳥鳴山更幽北磵簡人前提起袈裟角堪笑無端露醜惡二老風流出當家未明向上那一著無際派增收玄沙問鏡清教中道菩薩摩訶薩不見一法為大過失且道不見什麼法清指露柱云莫是不見遮箇法麼同安顯別云也知和尚不造次師曰浙中清水白米從汝喫佛法未會在玄覺云且道玄沙恁麼道意在什麼處不見僧問洞山云不見一法為大過失此意如何洞山云不見一法好言語上座一宿覺云不見一法即如來方得名為觀自在普賢菩薩又云不見一法是大過失是一箇是兩箇試斷看頌曰雪老門高兒女盛又能情重貴天倫把家幹蠱雖相似也有貪盃落草人虗堂愚密機深設穽利刃疾交鋒汗馬無人識重論蓋代功東叟穎玄沙因鏡清問學人乍入叢林乞師指箇入路師曰還聞偃谿水聲否曰聞師曰是汝入處五燈會元作師曰從這裏入頌曰從這裏人頭上脚下俱濕雖然通得咽喉未免一場氣急風浙浙浪悠悠清風何處起人在木蘭舟佛慧泉一滴偃溪水四海少人聞直饒玄會得也是弄精魂法雲秀天生碧眼崑崙兒有藝過人自不知幾度黑風翻大海波心出沒自閒嬉白雲端風飄碎玉千峯雪雨滴巖花萬國春堪聽偃溪流水意潺潺終日不聞聞羅漢南投老玄沙付鏡清返聞來聽偃溪聲如今洗耳滄浪在誰肯臨流便濯纓旻古佛滔滔無問說只為太親切有誰曾共聞山河齊漏泄楚安方續收玄沙指示太深深引線須憑一寸針聞與不聞門外語勸君休向偃溪尋文殊道乾坤獨立從這裏入風吹不著雨打不濕月林觀一派寒泉下翠微玄沙拈出為真機鏡清雖向聞中入流水何曾洗是非銕山仁增收玄沙因參次聞燕子聲乃曰深談實相善說法要便下座時有僧請益曰某甲不會師曰去誰信汝頌曰紫燕飛來繞畫梁深談實相響浪浪千言萬語無人會又逐流鶯過短墻本覺一薄宦奔南北長憐客路塵濛濛烟雨裏深憶故園春延壽慧殺活交馳千聖不共救得眉毛失却鼻孔空叟印增收玄沙因僧問如何是學人自己師曰用自己作麼一作是你自己雲門云沒量大人被語脉裏轉却僧問如何是學人自己門云忽然路上有人喚衲僧齋你也隨分得飯喫頌曰是你自己莫相鈍置衲子兩兩三三祇道早眠晏起大中隆玄沙驢前雲門馬後更問如何合取狗口雪菴瑾玄沙因僧問如何是清淨法身師曰膿滴滴地頌曰滴滴通身是爛膿釣魚船上顯家風時人只看絲綸上不見蘆花對蓼紅天衣懹膿滴滴地金色光法身全體露堂堂釣螺江上曾分化一葉漁舟泛渺茫楊無為續收清淨法身無可比病後依前滴滴膿燕鴻呌斷秋光老落葉飄來一樣紅懶菴樞滴滴通身是爛膿更無一點落西東若言不是知音者未免風吹別調中高峯妙增收玄沙因僧侍次以主丈指面前地上一點白問曰還見麼曰見師如是三問其僧三云見師曰你也見我也見為什麼道不會頌曰你見我見十分成現打破荊棘林方知無背面一點從教徹古今黑白未分何處辨玄沙因僧問如何是親切底事師曰我是謝三郎頌曰本是釣魚船上客偶除鬚髮著袈裟祖佛位中留不住夜來依舊宿蘆花雪竇顯親伸端的問君言莫比流沙少室傳昨夜鴈回雙嶺後謝家人立月明前投子青閩山滄海浪悠悠父子生涯一釣舟忽爾踏翻深猛省大家收拾去來休草堂清杪秋時節水雲鄉千頃蘆花未著霜江景不將零碎賣一時分付謝三郎祖印明續收蕭蕭蘆葦映江流獨棹孤篷漾小舟細雨斜風渾不顧一心只在釣竿頭笑翁堪增收玄沙示眾曰若論此事喻一片田地四止界分結契賣與諸人了也只有中心樹子猶屬老僧在頌曰萬事由王老師樹子未屬你在廣額屠兒成佛二祖大師償債鼓山珪祖父田園都賣了四邊界至不曾留奈何由有中心樹惱亂春風卒未休徑山杲祖父田園俱屬我中間樹子豈由他連枝帶葉和根要見兒孫意氣豪遯菴演玄沙曾指上頭關四海禪流覺未閑惟有漢朝天子貴彭城垓上信旗還姜山愛增收玄沙曰亡僧面前正是觸目菩提萬里神光頂後相頌曰嶺中奇特是玄沙埀語諸方不易加亡僧面前真心驗後人子細莫周遮石門聰亡僧雖不是亡僧既是菩提道自通若更二途斟酌會非但無知兼耳聾般若柔就中至直是玄沙觸目全真話不賒亡者面前親證驗更無偏黨絕周遮藂林浩浩爭唇吻恰似虗空捉幻花汾陽昭增附天衣懷云亡僧面前即且置只如活人背後底是箇甚麼頌曰且置亡僧面前事活人背後若為逢自從打破雲南國直至如今塞北通本覺一增收玄沙云萬里神光頂後相沒頂之時何處望事已成意已休此箇來踪觸處周智者聊聞猛提取莫待須臾失却頭頌曰神光頂後照無邊萬里區區豈足言若問玄沙端的意霜天夜半髑髏寒本覺一增收玄沙甞訪三斗菴主纔相見主曰莫怪住山年深無坐具師曰人人盡有為什麼菴主無曰且坐喫茶師曰菴主元來有在頌曰傍菴來往路相通步步相隨躡去蹤山遠年深人不到一溪流水質長松率菴琮增收玄沙見鼓山來作一圓相山曰人人出者箇不得師曰情知你向驢胎馬腹裏作活計曰和尚又作麼生師曰人人出者箇不得曰和尚恁麼道得某甲為什麼道不得師曰我得汝不得頌曰作者好求無病藥馬腹驢胎何處著鼓山當日可憐生鼻孔遭人白拈却本覺一增收玄沙見三人新到自打普請鼓三下欲歸方丈新到具威儀了亦去打普請鼓三下却入僧堂久住來白云新到輕欺和尚師曰打鐘集眾勘過大眾集新到不赴師令侍者去喚新到纔出法堂却於侍者背上拍一拍云和尚喚你侍者至師處新到便歸堂久住乃問和尚何不勘新到師曰我與你勘了也最菴印云可惜放過這僧乃頌曰玄沙明修棧道新到暗度陳倉夜行各不相投投明共到咸陽嚴號令按條章明明四海清如鏡更於何處覓邊疆
