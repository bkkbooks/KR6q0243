body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第三世之三南嶽下第二世之三增收明州大梅法常禪師嗣馬祖住山後馬祖令一僧到問曰和尚見馬祖得箇什麼便住此山師曰馬祖向我道即心是佛我便向這裏住曰馬祖近日佛法又別師曰作麼生別曰近日又道非心非佛師曰這老漢惑亂人未有了日任汝非心非佛我只管即心即佛僧回舉似馬祖祖曰大眾梅子熟也頌曰只將馬祖鉛刀子裂破漫天鐵網羅碧沼夜敲荷葉雨至今貧恨一身多一關溥荷衣松食住深雲蓋是當年錯見人埋沒一生心即佛萬年千載不成塵野雲南郎心葉薄妾冰清郎說黃金妾不譍假使偶然通一笑半生誰信守孤燈簡翁敬增收大梅因龐居士問久嚮大梅未審梅子熟也未師曰你向甚處下口曰百雜碎師曰還我核子來頌曰大梅梅子熟龐老已先知正眼驗真要相逢拍手歸松源岳龐公親到竪降旗一劒當香斬萬機不是從前生咬破為他梅子熟多時辛菴儔增收大梅因夾山與定山同行定山曰生死中無佛即無生死夾山曰生死中有佛即不迷生死二人互相不肯同上大梅夾山乃問曰不知那箇親那箇疎師曰一親一疎夾山曰未審那箇親師曰且去明日來夾山來日上方丈再問師曰親者不問問者不親夾山住院後曰我當初在大梅失却一隻眼雲峯悅云夾山只知失却一隻眼殊不知換得一隻眼圓悟云是則兩口金剛王寶劒要且拂掠虗空金山則不然生死為諸佛根基諸佛乃生死爐鞴若解險絕承當即證六通八解乃頌曰有佛不迷無佛則無大梅頂門正眼劃時已驗親疎家抱荊山璞人握靈蛇珠失却與換得同歸故殊途作家金鎚當面擲臨機俊趂不及將謂赤鬚胡更有胡鬚赤未曾拈出定盤星多少行家怨不平待得權衡來就手方知斤兩自分明心聞賁生死有無佛虗名如電拂俊博天飛不打籬邊鶻無欠無餘若太虗不知誰解強名模冶父川同行自古不相肯峯頂老人何足論山凹落盡桃花片流水依前繞竹門懶菴樞竹籬茆舍酒旗斜一箇葫蘆敗兩家酒後不知天與地歸來滿地是桃花雪菴瑾苦瓠連根苦甜瓜徹蒂甜兩般滋味惡終後入黃泉應菴華佛之一字強安排有無生死一坑埋大梅老子舌無骨臘月蓮花火裏栽雲巢巖青天白日切忌尋覔更問如何抱贓呌屈無門開增收大梅因僧問如何是祖師西來意師曰西來無意鹽官聞之乃曰一箇棺材兩箇死漢玄沙云鹽官是作家雪竇云三箇也有頌曰活中死眼無作有用方寸不移十方獨弄巧拙不到處鹽官有出身親言出親口雞犬閙比鄰月堂昌因事長智認渠遭累反身曉行全家富貴競頭擡薦自埋沒逆順是非誰可出提起是令放得行兩手扶犂水過膝增收婺州五洩山靈默禪師嗣馬祖遠謁石頭便問一言相契即住不契即去頭據坐師便行頭隨後召曰闍棃師回首頭曰從生至死祇是這箇回頭轉腦作麼師言下大悟乃抝折拄杖棲止焉洞山云當時若不是五洩先師大難承當然雖如此猶涉在途長慶云險玄覺云那箇是涉在途處有僧云為伊三寸途中薦得所以在途覺云為復薦得自己為復薦得三寸若是自己為甚麼成三寸若是三寸為甚麼悟去且道洞山意作麼生莫亂說子細好頌曰石頭據坐五洩便去石頭喚回却成多事翠巖芝在途在舍若為酬莫把先師一例求雄雄宇宙如王者未免半邊無髑髏龍門遠欲去高聲喚得回當時心眼一齊開要知不假修持力生死悠悠任往來成枯木幽州槃山寶積禪師嗣馬祖初參馬祖作街坊一日出門見人舁喪歌郎振鈴云紅輪決定沉西去未委魂靈往那方幕下孝子哭云哀哀師覩之忽然省悟舉似馬祖祖印可之頌曰歌聲繚繞哭聲悲笑殺槃山老古錐歷劫無明昏暗處一時頓覺發光輝文殊道紅輪決定沉西去未委魂靈往那方踏得故鄉田地穩本來面目露堂堂人只在不曾亡率陀天上非人世須知別有好商量佛燈珣哀哀相應便承當畢竟魂靈往那方踊躍自然全體露始知徧界不曾藏海印信續收未審魂靈往那方無棲泊處露堂堂水向石邊流出冷風從花裏過來香月林觀紅輪決定沉西去未委魂靈往那方孝子盡情宣說了槃山無處可遮藏藏不得堪與人天為軌則遯菴演忽聞幕下哭哀哀頓使天台對五臺風月一天今古在通身是口也難開誰菴演薤歌聲咽些聲長聽得哀哀忽斷腸依舊紅輪西畔沒大千無地著凄涼天目禮薤露凄涼亦可憐白楊丹旐去翩翩哀哀聲裏無消息打著南邊動北遵北磵簡紅輪決定沉西去未審魂靈往那方哭慟一聲無處避擡頭親見本爺娘無凖範槃山又一日於街市見人在肉肆買肉云精底割一斤來屠兒放下刀叉手云長史那箇不是精底師聞之忽然大悟歸以所悟告馬祖祖印可之頌曰箇事分明不覆藏頭頭物物自相當千言萬語無人會又逐流鶯過短墻南華昺續收江邊送客上扁舟相對漁翁暗擲鈎一掣錦鱗隨手上遠山疊疊水悠悠妙峯善槃山示眾曰三界無法何處求心四大本空佛依何住璣不動寂爾無言覿面相呈更無餘事珍重頌曰三界無法何處求心白雲為蓋流泉作琴一曲兩曲無人會雨過夜塘秋水深雪竇顯青青入座當軒竹黯黯遮門對面山更有一般堪羨處夜深流水響潺潺佛鑑懃三界無法何處求心山容雨過松韻風吟橫眠倒臥無餘事一任莓苔滿地侵佛性泰續收三界無法何處求心月明夜暗山高水深三界本因心所現無心三界自平沉本覺一三界無法何處求心山花似錦綠葉成陰杜宇一聲歸去也獃郎猶自守園林塗毒䇿三界無法何處求心驚蛇入草飛鳥出林雨過山堂秋夜靜市聲終不到孤岑善權智春眠不覺曉處處聞啼鳥夜來風雨聲花落知多少或菴體山舍無塵分外清石榴花發透簾明槐陰滿地日卓午夢覺流鶯時一聲掩室開依依楊柳欲藏鴉社後東風捲落花理䇿邀朋何處好山南山北看桑麻愚谷困增收槃山示眾曰心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物洞山曰光境未忘復是何物頌曰光非照境境非存光境俱忘復是痕百鳥不來春已老落花流水遶江村月堂昌光非照境境非存光境俱忘復是痕滿地落花風掃盡依前流水繞孤村肯堂充描不成兮畫不成臥龍長怖碧潭清擬心湊泊終難會達者應須暗裏驚松源岳增收槃山示眾曰禪德可中學道似地擎山不知山之孤峻如石含玉不知玉之無瑕若如此者是名出家頌曰山既孤峻遊人罕至玉既無瑕莫辨真偽死心新地厚山高孰使然中藏巨璞不知年若人念念常如是堪作人間火裏蓮本覺一山忘孤峻玉忘瑕到處仙源是我家堪笑葛洪曾未悟遠從勾漏問丹砂天目禮增收槃山曰向上一路千聖不傳慈明云向上一路千聖不然楊歧云口上著頌曰槃山向上路何言罕見行人耳有穿口上著來無咬處方知千聖不能傳白雲端不傳不然海口難宣須彌頂上駕起鐵船徑山杲千聖不傳到今日口上著來無等匹洞庭山脚太湖心行人路上空啾唧松源岳增收槃山將順世告眾曰有人邈得吾真否眾將所寫真呈皆不契師意普化出曰某甲邈得師曰何不呈似老僧化乃打筋斗而出師曰這漢向後掣風狂去在頌曰師真醜拙不堪呈用盡身心笑殺人彼中莫覔絲頭意白鼻崑崙賀新正龍門遠徹底冰壺無影像倒翻筋斗摸難成千峯雨歇黃梅後桂魄還從海上生雪菴瑾清奇古怪娘生面妙筆丹青作麼施者廝十分傳得似依然畫虎只成狸寶葉源水潦和尚嗣馬祖來參馬祖禮拜起欲伸問次祖一踏踏倒師忽然大悟起來呵呵大笑曰也大奇也大奇百千三昧無量妙義只向一毫頭上識得根源去頌曰馬駒一踏驢兒倒地大笑起來羊鳴犬吠野軒遵一踏倒時堪大笑從前伎倆盡徒勞蛇頭却要重揩痒萬萬千千出一毫白雲端水潦承機徹祖意馬駒一踏曉根源虗空撲落無閑地却向滄溟駕鐵船照覺總海上追奔天馬駒偶來騰踏露全軀百千妙義毫端現拊掌呵呵笑識渠旻古佛續收筠管釀來應已熟不辭醉裏帽欹斜酴醾浪有幽香在是酒元來不是花懶菴樞無量妙義皆周帀旋乾轉坤為一合當陽橫按笑中刀猶欠頂門上一踏南巖勝說道春來好狂風太放顛吹花隨水去翻却釣魚船雪菴瑾增收水潦因僧到乃畫圓相放師肩上師撥三下却畫圓相指其僧僧禮拜師打曰這掠虗漢保寧勇別僧拜處但唾之而去復頌曰趯去拳來乃是常如何得不見參商依公定奪無偏黨短自短兮長自長蒲州麻谷寶徹禪師嗣馬祖持錫到章敬繞禪牀三帀振錫一下卓然而立敬曰是是又持錫到南泉亦如是泉曰不是不是師曰章敬道是和尚為甚道不是曰章敬是是汝不是此是風力所轉終成敗壞雪竇拈兩處云錯又頌曰此錯彼錯切忌拈却四海浪平百川潮落古䇿風高十二門門門有路空蕭索非蕭索作者好求無病藥章敬南泉路不殊明明道理話親疎多人不用磨金鏡漢自漢兮胡自胡指月迷津迷自指示君持錫却如無汾陽昭顏色規模却似真人前拈弄越光新及乎入火重烹試到了終歸是假銀保寧勇如是不是去却藥忌擬犯封疆全軍失利杖頭突出古菱花舉世風流出當家圓悟勤曉日出都門忽逢二商旅一指我南行一指我北去南行有官船過渡北去有車馬大路雖然南北不通途都在中華一國土佛鑑懃續收振錫通風似章敬章敬無私驀頭釘其僧尋討到南泉深深一杓更酩酊般若柔是與不是全彰妙義章敬南泉一場失利草堂清是兩頭語未出泥水非兩頭語依前自死振錫卓然白日青天風力還他敗壞時漫天大網生光輝月堂昌章敬道是南泉非逆水之波透者誰可憐箇漢皮無血駕與青龍不解騎南堂興是是放出南山真鼈鼻不是不是勒回千里追風驥終成敗壞可憐生塞斷咽喉無出氣無出氣有巴鼻趙州東壁掛葫蘆堪笑維摩談不二窮谷璉妙轉之機掣電飛目前生殺盡交馳明珠自有明珠價休向籬邊彈兒木菴永麻谷問臨濟大悲千手眼那箇是正眼濟曰大悲千手眼那箇是正眼速道速道師近前拽臨濟下禪牀却坐濟近前曰不審師擬議濟便喝拽下禪牀却坐師便出去頌曰大悲正眼問來端互換之機仔細看會得不得亦瞞頇也似鮎魚上竹竿海印信正眼英雄逢正眼勝劣短長徒用揀那吒現出本來身且非父母能生產覺海元多年塞上只聞名今日陣前親見面疋馬單槍戰數場好是見機開一箭保寧勇相逢狹路轉身難一陣交鋒瞬息間旗鼓縱橫渾莫辨試問何人得勝還普融平續收胡鬚赤赤鬚胡珠走盤兮盤走珠狹路相逢誇好手兩邊雪刃血模糊石田薰賊隊相逢午夜時攙旗奪鼓討便宜驀然天曉重相見滿面羞慚各自歸別山智麻谷因良遂座主來參師見來閉却門將鋤頭去削草遂又來扣門師曰誰曰某甲師曰鈍根阿師下去凡數四如是遂忽然有省再去扣門曰和尚莫謾良遂良遂若不來禮拜洎被十二本經賺過一生師乃開門令通悟由印可之遂返都城講肆散席告諸徒曰諸人知處良遂總知良遂知處諸人不知頌曰逆順之機不易當大根良遂解思量若非久積同風事爭肯回頭見法王汾陽昭禪林深邃乍遊盤鋤草關門豈易看莫謂老師渾不是得相謾處且相謾正覺逸閉戶携鋤理最幽豁然大悟話元由從來學業空勞力始信黃河輥底流海印信閉戶携鋤已太賒更來當面受糊塗光中自覺遭謾久方信無人共出家白雲端韶石汾陽肯諾他便知回首逆風波不登麻谷玄關路十二本經休得麼照覺總平生心膽向人傾到此門中有幾人別後都城舊知己暖煙斜日又黃昏龍門遠閉戶敲門向誰道遂公言下便知歸從前活計都拋下爭奈時人會者稀楚安方續收尋言逐句謾多端只為從前被眼謾撒手便能歸故國暗思歧路幾多般丹霞淳親到桃源景物幽一壺明月湛如秋反思洞口春殘日無數紅英逐水流成枯木麻谷高聲問阿誰一言駟馬卒難追遂公打破精靈窟現出金毛師子兒真淨文閉門入圃已周遮一喚回頭便到家良遂知時人不委海山空暎夕陽斜懶菴需為人為徹咬著生鐵逆水之波虗空釘橛松源岳諸人知處良遂知良遂知處人不知王維已死無人盡留得青山對落暉破菴先閉戶復携鋤雲深路更迂須知形影外肝膽向人輸虛堂愚携鋤不顧便好回去誰人敢道你是座主月坡明增收麻谷一日在紙帳內坐以手巾蓋却頭披雲和尚入見便作哭聲良久出去法堂遶禪牀一帀却入撥開帳見師去却手巾而坐乃曰死中得活萬中無一師便下牀就位作抽坐具勢雲近前把住曰前死後活你還甘麼師曰甘即甘師堪作什麼雲推開曰知道你前言不副後語頌曰五十笑他先百步何如騎馬勝騎牛不須重較多和少歸到家山即便休虛堂愚增收湖南東寺如會禪師嗣馬祖甞患門徒以即心即佛之談誦憶不已且謂佛於何住而曰即心心如畫師而曰即佛遂示眾曰心不是佛智不是道劒去久矣汝方刻舟頌曰心不是佛智不是道舉得十分未敢相保携條拄杖閑行切忌回頭轉腦照堂一心不是佛智不是道青山白雲落花芳草若是伶俐阿師終不回頭轉腦鼓山珪雨散雲收後崔嵬數十峯倚䦨頻顧望回首與誰同徑山杲太平時節歲豐登旅不齎粮戶不扃官路無人夜無月唱歌歸去恰三更開善謙青山不青白雲不白針鋒太寬宇宙太窄寥寥獨坐有誰知流水涓涓花片飛浩浩風光人不會滿園春色鷓鴣啼妙峯善昨日因過竹院西隣家稚子隔溪啼山寒水肅半黃落無數歸鴉卜樹棲虛堂愚天晴日頭出雨下地上濕盡情都說了只恐信不及無門開心不是佛智不是道飛鳥出林驚虵入草無縫罅難尋討笑倒嵩山破竈墮南叟茙增收東寺問仰山甚處人山曰廣南人師曰我聞廣南有鎮海明珠是否曰是師曰此珠如何曰白月即隱黑月即現師曰將得來否曰將得來師曰何不呈似老僧曰某甲昨到溈山被索此珠直得無言可對無理可伸師曰真師子兒善能哮吼頌曰鎮海明珠到處晶從來一顆自圓明仰山東寺曾遭索叉手還將取次呈本覺一善撫太阿鋏決無傷手阨慣編猛虎鬚必有全身䇿鎮海珠巧呈似離色離聲離名字旃檀林裏爇旃檀師子窟中吼師子圓悟勤師子窟中師子兒逸羣遊翫海珠璣溈山呼索渾無竅有理難伸穿得奇南巖勝無言可對口纔開已是和光吐出來東寺不知何意志深深一丈掘坑埋雲衲慶增收䖍州西堂智藏禪師嗣馬祖僧問有問有答即且置無問無答時如何師曰怕爛却那百丈曰從來疑著老兄僧問丈曰請和尚道丈曰一合相不可得後有僧問長慶慶云相逢盡道休官去林下何曾見一人頌曰終日論文不記年禪心淡泊契幽玄白雲繚繞青山在一法無私萬古傳大溈智增收越州大珠慧海禪師嗣馬祖因僧問如何是佛師曰清談對面非佛而誰眾皆茫然法眼曰是即沒交涉頌曰偃蹇蒼髯十萬本參差翠玉數千竿風敲月戶三秋冷雨打茅堂六月寒石溪月增收大珠示眾曰身口意清淨是名佛出世身口意不淨是名佛滅度黃龍南云也好箇消息古人一期方便與你諸人討箇入路既得箇入路又須得箇出路登山須到頂入海須到底登山不到頂不知宇宙之寬廣入海不到底不知滄溟之淺深既知寬廣又知淺深乃頌曰一踏踏翻四大海一摑摑倒須彌山撒手到家人不識鵲噪鴉鳴栢樹間增收大珠問座主蘊何經論曰講金剛經師曰若言如來有所說則為謗佛若言不是佛說又是謗經除此之外試與老僧說看主無對頌曰百非四句都拈了敢問云何會此經却是虗空能講得熾然常說有誰聽本覺一洪州百丈山惟政禪師嗣馬祖師問南泉諸方善知識還有不說似人底法也無曰有師曰作麼生曰不是心不是佛不是物師曰恁麼則說似人了也曰某甲即恁麼和尚作麼生師曰我又不是善知識爭知有說不說底法曰某甲不會請和尚說師曰我太煞與汝說了也頌曰祖佛從來不為人衲僧今古競頭走明鏡當臺列象殊一一面南看北斗斗柄垂無處討拈得鼻孔失却口雪竇顯涅槃老子順風吹囉哩哩囉爭得知隔嶺幾多人錯聽一時喚作鷓鴣詞白雲端不會誰不會相逢且喫茶不尋雲水路爭得到僧家長靈卓誰謂宗師有妙旨切切為人須到底手按瑤琴徹曉彈其來不入聾人耳佛鑑懃倒腹傾腸說向君不知何故尚沈吟而今便好猛提取付與世間無事人徑山杲續收百丈南泉論古今龍生龍子老婆心若人要識二禪老綉出鴛鴦須是針慈受深鸞膠續斷絃猊血化驢乳從來不為人今古參佛祖箭既離絃無返回將欲奪之必固與語時默默時語人從陳州來却往許州去圓悟勤百丈政示眾曰汝等為我開田我為汝說大義普請開田了眾請和尚說大義師展兩手示之頌曰常憐百丈解開田今古行人手裏傳誰道舌頭曾不動五音六律太周旋白雲端大義由來不可陳休於言下覔疎親而今欲識大雄老金毛生得玉麒麟佛迹昱開口說大義後人莫容易百丈總持門淡而還有味龍門遠百丈開田說大義理事圓融無不備梵音清徹十方聞草樹鋤鍬皆聳起末後雙拳再展開拖泥帶水為癡獃船流到岸五千里刻舟求劒徒悠哉佛性泰續收展開兩手當時說大義流通滿世間莫謂入荒田不揀而今到處草漫漫牧菴忠大義開田創祖基分明書契示傳持兒孫不肯遺先業乞食年年役路歧懶菴需普請開田力已齊紛紛帶水又拖泥展開兩手人休問昨夜三更月落西此菴淨百丈說大義全然沒巴鼻通身是水泥溺死在平地無際派增收洪州泐潭法會禪師嗣馬祖問馬祖如何是西來祖師意祖曰低聲近前來師近前祖打一摑曰六耳不同謀來日來師至來日猶入法堂曰請和尚道祖曰且去待老漢上堂時出來與汝證明師乃悟曰謝大眾證明繞法堂一帀便去頌曰雞聲茅店月華明客夢沉迷尚未醒開得眼來天大曉髼頭垢面便奔程絕象鑒十八佳人嫁未酬每憑媒妁善搜求一從嫁却潘郎後便解人前不識羞竹屋簡增收池州杉山智堅禪師嗣馬祖與歸宗南泉路次逢虎各從邊過了泉問歸宗適來見虎似箇甚麼宗曰似箇猫兒復問師師曰似箇狗子師却問泉泉曰似箇大蟲大溈智曰三箇老漢聚頭寐語若要徹一時參取這大蟲始得復頌曰一虎三人見不同高低各自立宗風為伊途路不得力空過浮生一夢中一物兩名也大奇三人那箇可為師頂門未具金剛眼透出縱橫孰辨伊開先瑛五五二十五大蟲元是虎狗子與猫兒豈可同時語夜閉門早開戶須信利牙爪可怖家家門首透長安盡是舉子朝天路佛鑑懃撫州石鞏山慧藏禪師嗣馬祖初為獵人射鹿因遇馬祖令自射無下手處省悟投出家既得法住山後常張弓架箭凡見僧來便曰看箭一日三平到師曰看箭平乃披襟當之曰此是殺人箭活人箭又作麼生師彈弓絃三下平乃禮拜師曰三十年張弓架箭只射得半箇聖人遂抝折弓箭平後到大顛處舉前話顛曰既是活人箭為甚麼向弓絃上辨平無對遂再參既悟為顛之嗣頌曰張弓架箭喚君回不省宗師特意來箇箇盡隨迷醉走句中認影影難開三平猶未全提得霹靂雷聲徧九垓汾陽昭三十年來事一弓一弓弓擬定寰中寧知半聖雖投欵納璧牽羊信不通正覺逸架箭張弓用得深平生猶喜中紅心後來半箇人雖得猛火方成百煉金佛印元張弓架箭豈徒然中的雖多命不全半聖投機無別意功高何必畫凌烟佛慧泉張弓架箭三十年射得三平半不全爭似萬人齊指處斜陽一鴈落秋天佛國白三十年來握箭弓三平纔到擘開胷半箇聖人今日得大顛弦外幾時逢崇勝珙續收古有石鞏師架弓箭而坐如斯三十年知音無一箇三平中的去父子相投和子細返思量元伊是箭垛法燈欽解擘當𮌎箭因何只半人為從途路曉所以不全身灌州靈巖安認得斑斑急上弦吼風一鏃去驚天近前子細來觀誰把藍田石射穿心聞賁張弓架箭幾何年接得三平機不全若使當時能羿射免教落節向弓弦水菴一朗州中邑和尚嗣馬祖每見僧拍手鼓唇曰嗚㖿嗚㖿仰山到參從東過西立師曰子甚處學得此三昧山曰從曹溪脫印學來師曰如是如是山却問和尚甚處得此三昧師曰吾從章敬處得來頌曰鼓唇拍手口嗚㖿直引來人辨正邪千萬往來都不薦仰山纔見便同家汾陽昭曹溪脫印傳來錯章敬師承受處麤將謂胡鬚天下赤元來更有赤鬚胡正覺逸仰山善問中邑善應覆去翻來拍拍是令慈受深增收中邑因仰山問如何得見性去師曰譬如一室有六窻內其一獼猴外有獼猴從東邊喚狌狌獼猴即應如是六窻俱喚俱應山作禮曰適來蒙和尚譬喻無不了知更有一事只如內獼猴瞌睡外獼猴欲相見時如何師下繩牀捉山手作舞曰狌狌我與汝相見了也頌曰六窻一一喚獼猴睡著如何解應酬只與加鞭令醒悟當時中邑謾悠悠本覺一凍眠雪屋夜摧頹窈窕籬門夜不開寒槁園林看變態春風吹起律筒灰天童覺人人有箇老獼猴暮四朝三卒未休喚著便能知落處八花磚上輥金毬慈受深一室虗涵對六窻獼猴留在更無雙忘懷絕慮獼猴死一國安寧六國降南堂興一室蕭然六窻廓爾中邑仰山自作自起拈弄一箇猢猻作出千般舉止浣盆浣盆我識得你皖山凝
