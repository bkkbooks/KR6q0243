body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第十六世南嶽下第十五世臨濟增收平江虎丘紹隆禪師嗣圓悟初參死心心問你是甚麼僧師曰行腳僧心曰你是何處村僧行甚驢腳馬腳師曰廣南蠻道甚麼何不高聲道心曰却有些衲僧氣息遂留過夏頌曰客裏謾牢落天涯多故人好懷無處寫舊話得重論殘雪未消石梅英先破春徘徊殊有約來此續芳塵虗堂愚邂后何期語笑新秋風松館客邊身憑䦨不語平生事到老相逢是別人寶葉源增收臨安府徑山宗杲大慧普覺禪師嗣圓悟師至天寧一日聞悟升堂舉僧問雲門如何是諸佛出身處門曰東山水上行若是天寧即不然忽有人問如何是諸佛出身處只向他道薰風自南來殿閣生微涼師於言下忽然前後際斷頌曰萬德不自有十身何處藏薰風生殿閣化日正舒長石林鞏諸佛東山水上行間中無事日偏長薰風拂拂來無已無意涼人人自涼葛廬覃增收大慧因僧問心佛俱忘時如何師曰賣扇老婆手遮日頌曰賣扇老婆手遮日一種風流出當家說與途中未歸客何須向外喫波楂月坡明增收大慧後來留古雲門菴學者雲集久之入閩結茅於長樂洋嶼室中舉竹篦子問學者喚作竹篦則觸不喚作竹篦則背不得下語不得無語從之得法者十有三人頌曰雲門舉起竹篦凡聖潛踪匿跡金剛門外生瞋木馬廄中面赤尼無著總二雲門舉起竹篦才涉思惟蹉過只遮背觸商量老人已是話墮徑山有箇竹篦直下別無道理佛殿厨屋三間穿過衲僧眼耳福州清涼坦三尺筠蛇口帶腥曾吞英特十三人塵蒙四壁籠燈黑老尾焦黃眼正瞋竹屋簡增收安吉州道場明辨正堂禪師嗣龍門遠室中問學者蚯蚓為甚麼化為百合頌曰客舍并州已十霜歸心日夜憶咸陽無端更渡桑乾水却憶并州是故鄉圜極岑增收潭州大溈善果月菴禪師嗣開福寧上堂奚仲造車一百輻拈却兩頭除却軸以拄杖打圓相曰且莫錯認定盤星卓一下下座頌曰海神知貴不知價留與人間光照夜碧眼胡僧笑點頭誰知用處無縫罅月林觀機輪轉處達者猶迷四維上下南北東西無門開六祖下第十七世南嶽下第十六世臨濟增收明州天童曇華應菴禪師嗣虎丘隆示衆曰盡力道不得底句不在天台定在南嶽頌曰相罵饒汝接觜相唾饒汝潑水驀然摸著蛇頭拍手囉囉哩哩肯堂充耆婆去後無消息病者憧憧日扣門百草自知無識者叢叢埀泣在籬根虗堂愚增收應菴示衆曰如世良馬見鞭影而行時佛照光和尚出衆云見鞭影者非良馬師休去頌曰疾𦦨過風第二頭不堪惆悵只堪愁一聲振𩮻長鳴後萬馬皆瘖一戰收北澗簡增收明州育王德光佛照禪師號拙菴嗣大慧宋孝宗召對師舉靈雲頌直至如今更不疑奏曰那裏是他不疑處帝曰空手牽鐵牛頌曰萬機之暇探禪宗中路寧堪憩六龍空手牽牛過天闕紫宸深在妙高峯圭堂居士增收佛照因孝宗宣問釋迦佛入山六年所成何事師對曰將謂陛下忘却頌曰六年勤苦竟何如為問君王記得無直下雖知難抵諱到頭終不受塗糊北澗簡二借婆衫子拜婆年監本𢁈挑不上禪抉起玉龍轟霹𮦷明星猶在九重天問處天左旋答處地右轉太平無象眼頭寬雪山高映黃金殿覺圓明大根大器大熏修瞥轉機輪向上頭萬億斯年惟一佛雪山元不隔龍樓石巖璉增收臨安府淨慈水菴師一禪師嗣佛智裕室中問僧曰西天鬍子因甚無鬚頌曰癡人面前不可說夢鬍子無鬚惺惺懵懂無門開牧童失却破蓑衣流落年深見者稀拈來搭在籬頭上引得烏鴉繞樹飛呆堂定六祖下第十八世南嶽下第十七世臨濟增收臨安府淨慈彥充肯堂禪師嗣卍菴顏示衆曰觀方知彼去去者不至方草鞋跟忽斷全身在帝鄉頌曰孰謂觀方不在方才開臭口便乖張行人要覔長安路不覺全身在帝鄉掩室開增收慶元府天童密菴咸傑禪師嗣應菴應菴問如何是正法眼師遽答曰破沙盆庵頷之頌曰五陵公子少年時得意春風躍馬蹄不惜黃金為彈子海棠花下打黃鸝雙杉元法眼拈來早自謾無端錯對破沙盆而今遍界難遮掩殃害叢林纍子孫掩室開直甚破沙盆掀翻海嶽昏頂門真箇瞎千古纍兒孫虗堂愚白玉琢成泥彈子黃金鑄就鐵崑崙千年滯貨無人買未免如今纍子孫大歇謙增收常州華藏伊菴有權禪師嗣無菴全嘗夜坐達旦行粥者至忘展鉢鄰僧以手觸之師感悟為偈曰黑漆崑崙把釣竿古帆高掛下驚湍蘆花影裏弄明月引得盲龜上釣船頌曰雲深江絶引帆孤可惜鄰僧拽轉渠方信圓明彈指事元來此語不傳虗圭堂居士增收鎮江府焦山普濟禪寺或菴師體禪師嗣此庵元因信齊葛知府問曰夫妻二人相打通兒子作證且道證父即是證母即是師曰小出大遇乃頌曰八臂那吒三隻眼雙槌擂鼓轉船頭巨鼇一吸滄溟竭宇宙風清四百州生死自憐同室穴因何中路隔關山一朝忽得親兒證躍踏方知蓋覆難雪堂行六祖下第十九世南嶽下第十八世臨濟增收臨安府靈隱松源崇嶽禪師嗣密菴埀語曰大力量人因甚擡腳不起頌曰沒量大人擡腳不起眼瞎耳聾撒溺撒屎求生不生求死不死苦哉佛陀耶韓信臨朝底朴翁銛擡腳踏翻香水海低頭俯視四大禪一箇渾身無處著請續一句無門開力難擡起為君宣神駿何勞更著鞭一躍洞天三十六到時凡骨便成仙虗堂愚增收松源垂語曰開口不在舌頭上頌曰開口不在舌頭上咬斷牙關供死狀莫教吞了大還丹命根難斷空惆悵朴翁銛含糊一世無分曉開口何嘗在舌頭萬古業風吹不盡又隨月色過羅浮虗堂愚增收松源垂語曰明眼衲僧因甚腳跟下紅絲線不斷頌曰大丈夫漢紅線不斷直饒親見松源敢保錯來批判朴翁銛腳根不斷紅絲線掉臂乾坤自在行塞壑填溝無處著歸來依舊兩眉橫虗堂愚增收松源示衆曰明眼衲僧因甚打失鼻孔有賊無贓頌曰殺人一萬損三千獨弄單提機不全萬頃滄波明月夜一聲短笛釣魚船諾菴肇六祖下第二十世南嶽下第十九世臨濟增收慶元府天童天目文禮禪師嗣松源因虎維那參次師問汝名什麼曰智虎師退身作怕勢虎擬議師便歸方丈頌曰白浪堆中下一鈎錦鱗紅尾尚悠悠漁翁不計竿頭事笑入蘆花萬頃秋石林鞏增收臨安府靈隱荊叟珏禪師嗣癡鈍癡鈍室中舉如何是佛師曰爛冬瓜仍頌曰如何是佛爛冬瓜咬著冰霜透齒牙根蒂雖然無窖子一年一度一開花如何是佛爛冬瓜鐵額銅頭沒奈何萬里鴻溝歸漢後八千人恨一聲歌獨木林六祖下第二十一世南嶽下第二十世臨濟增收臨安府徑山石溪心月佛海禪師嗣掩室開僧問如何是佛曰師矮子看戲頌曰巍巍丈六紫金容百戲場中有變通矮子看來眉卓竪鐵鎚無孔舞春風葛廬覃增收臨安府徑山虗堂智愚禪師嗣運菴巖垂語曰己眼未明底因甚麼將虗空作布袴著畫地為牢因甚透者箇不過入海算沙底因甚向針鋒頭上翹足頌曰縫却虗空算盡沙針頭畫地是生涯改頭換面無人見幾度春風吹落花間極雲解把虗空作袴單地牢畫出透還難針鋒頭上翹雙足猶對春風話歲寒葛廬覃未詳承嗣樓子和尚因從街市過經酒樓下偶整襪帶少住聞樓上人唱曲云你既無心我便休聊聞忽然大悟從此號樓子出長慶巘禪師注楞巖經說文頌曰唱歌樓上語風流你既無心我也休打著奴奴心裏事平生恩愛冷啾啾慈受深偶聞清唱發高樓你若無心我也休直下狂心能頓歇從茲演若不迷頭本覺一你既無心我也休此心無喜亦無憂飢來喫飯困來睡花落從教逐水流寶峯明續收你若無心我也休鴛鴦帳裏懶擡頭家童為問深深意笑指紗窗月正秋寶華鑑因過花街賣酒樓忽聞語唱惹離愁利刀剪斷紅絲線你若無心我也休堂仁增收杜順和尚法身頌懷州牛喫禾慈明著語云河沙世界竹菴圭著語云懷州牛喫禾益州馬腹脹慈明云蟻銜碗走竹菴云益州馬腹脹天下覔醫人慈明云驢生馬角竹菴云天下覓醫人炙猪左膞上慈明云畫虎成狸竹菴云炙猪左膞上頌曰古德法身頌寐語熱𡱰沸若學唱巴歌須是自伶俐大溈智一雨一陰風未和春從不快裏消磨桃花暗已隨流水空使劉郎惆悵多心聞賁也好笑也堪悲耳朵元來兩片皮松源嶽增收月氏國王聞罽賓國祇夜多尊者有大名稱與羣臣往彼國禮見問法王至彼修敬已畢乃請開演者曰大王來時好道今去亦如來時王乃歎伏頌曰至簡至易最尊最貴往還千聖頂𩕳頭世出世間不思議彈指圓成八萬門一超直入如來地圓悟勤增收西天有一外道索馬鳴祖師論義集國王大臣并及四衆俱會論場馬鳴云汝義以何為宗外道云凡有言說我皆能破馬鳴乃指國王云當今國土康寧大王長壽請汝破之外道屈伏頌曰六師不正起干戈自謂無能奈我何九十六宗令結舌不消一曲太平歌本覺一昔有老宿一夏並不為師僧說話有僧自歎曰我只與麼空過一夏不敢望和尚說佛法得聞正因兩字也得老宿聊聞曰闍黎莫𧬊速若論正因一字也無道了乃扣齒曰適來無端與麼道鄰壁有老宿聞得乃曰好一釜羮被兩顆鼠糞污却頌曰一夏調和一釜羮傅巖猶未許爭衡莫言污了無人見鄰壁禪翁隻眼明正覺逸長夏無別趣調和羮一釜滋味頗馨香剛地成點污口是禍之門舌是斬身斧陪却三斤鐵只因看錮鏴慈受深續收泠泠寒溜泣秋壑才會滄溟便泛舟見說許由曾洗耳可憐巢父更鞭牛虗堂愚潭州茶陵郁山主不曾行腳因廬山有化士至論及宗門中事教令看僧問法燈百尺竿頭如何進步法燈曰噁凡三年一日乘驢度橋一踏橋板而墮忽然大悟遂有頌曰我有神珠一顆久被諸塵封鎖今朝塵盡光生照見山河萬朵因此更不游方頌曰百尺竿頭曾進步溪橋一踏沒山河從茲不出茶川上吟嘯無非邏哩囉白雲端續收進步竿頭踏斷橋太虗凸處水天凹古今喫𨈀知多少不似闍黎這一交北澗簡失腳溪橋兩眼枯錯將魚目作明珠直饒塵盡光生也照破山河夢見無無準範拾得明珠笑口開謂言塵盡轉塵埃若無直下承當分孤負驢兒一攧來介石朋百尺竿頭話最親一交橋斷絶纖塵死中得活珠離離甘作驢前馬後人無門開溪橋驢子失腳處百尺竿頭進步時頂踵一時都換了依然只是郁闍黎石溪月一攧成狼籍茶川路轉迂却將泥彈子認作夜明珠葛廬覃增收昔二庵主旬日後相見上庵主曰許多時在什麼處下庵主曰在庵裏造箇無縫塔上庵主曰某甲也要造一箇就兄借樣子得麼下庵主曰何不早道恰被借去了頌曰無縫塔子樣兩手擡不起被人借將去至今尋未已尋未已天上人間知幾幾月菴果恰好被人借去了莫言鄰舍不通容團圝無縫難安筆只抹烟雲一兩重石林鞏昔有古德一日不赴堂侍者請赴堂德曰我今日在莊上喫油糍飽者曰和尚不曾出入德曰汝去問莊主者方出門忽見莊主歸謝和尚到莊喫油糍或作鵝湖孚和尚或作南泉頌曰近在口皮邊遠過河沙國世間多少人不得油糍喫鼓山圭和尚不赴堂莊主謝臨屈一字入公門九牛車不出徑山杲續收江南江北勿同倫疑了還疑笑殺人誰信一盤油煠底古今塞斷是非門雪堂行熱糍蕩口成痕跡糍冷令人便動脾何似且拈安一處家常茶飯且隨時照堂一背衆喫油糍對人誇好手潦倒不識羞抵死揚家醜應菴華喫了油糍不赴齊莊師特特謝師來千山萬水俱尋遍踏破芒鞋眼未開尼無著總古德何曾動口皮喫油糍飽幾人知而今冷地思量著暗寫愁腸寄與誰肯堂充增收古德因僧問年窮歲盡時如何德曰東村王老夜燒錢頌曰目前無異路信手斫方圓眉毛橫眼上鼻孔大頭懸空叟印年窮王老夜燒錢斷送難逢下水船懵底不知身到岸隨他寒暑謾推遷遁菴演問來答去有來源一句全該遍大千歲盡年窮窮底事東村王老夜燒錢簡翁敬春風陌上郎得錢隨手使貨物忽相當撞著恰却子雪巖欽增收古德因僧問生死以何為舟航德曰年盡不燒錢頌曰年盡不燒錢鼠穴被蛇穿直饒玄會得對面隔西天曹源生增收古德因僧問年窮歲盡時如何德曰家家盡看野狐兒頌曰家家盡看野狐兒鐵笛橫拈撩亂吹吹罷不知何處去夕陽已掛柳梢西松源嶽家家盡看野狐兒見者雖多識者稀百怪千妖俱掃跡春風已到萬年枝晦叟光增收古德問僧曰何不看經曰不識字德曰何不問人僧展手曰是什麼字德無對頌曰袖中寶劒磨星斗肘後靈符照八方撥轉目前關捩子從教天下竟茫茫誰菴演鶴立蛇行勢不休五天梵字鬼神愁孔門弟子無人識碧眼胡僧笑點頭殺六巖輝增收宋太宗皇帝因夢神人勸發菩提心次日問廷臣菩提心作麼生發羣臣無對雪竇代云實為古今罕聞別峯印代答云王言如𮈔其出如綸頌曰菩提妙心作麼發日應萬機元不差回首瞥然輕著大千沙界是皇家松源嶽萬里謳歌聖化成條風磈雨樂樵耕不因嵩嶽三呼後無象誰知真太平雙杉元菩提心發不為難只在君王一念間聖聖相傳皆一揆綿綿國祚泰山安辛菴儔增收太宗問僧近離甚處曰臥雲菴帝曰臥雲深處不朝天因甚到此僧無對雪竇代云難逃至化頌曰試問臥雲深處客不知何以答升平蕩然至化難逃避萬里堯天一點雲北澗簡增收太宗因僧朝見奏云陛下還記得麼帝曰甚處相見曰靈山一別直至如今帝曰以何為驗僧無語雪竇代云貧道得得而來頌曰靈山一別二千年聖世重逢豈偶然細掬清泉揩老眼撥開雲霧見青天石溪月增收太宗一日擎起鉢問丞相王隨曰既是大庾嶺頭提不起為甚麼却在寡人手裏隨無對慈明圓代云陛下有力頌曰大地收歸掌握間鉢盂擎起有何難箇中消息憑誰委秋水秋雲秋夜寒雲衲慶增收錢塘鎮使在界上為鎮將凡見僧便問若相契即留止宿一日因二僧至遂問近離甚處曰江西馬大師處使曰馬大師有什麼方便曰道即心是佛便被揖出又有二僧到亦如前問僧曰非心非佛又被揖出頌曰是是非非俱請出巍巍萬仞如壁立平生心膽向人傾相識還如不相識無際派碧油幢下立功勛韜略雙全獨見君一自赤心來報國邊頭刁斗不曾聞虗堂愚增收昔有一婆供養一菴主經二十餘年嘗令一二八女子送飯給侍一日令女子抱定云正當與麼時如何庵主曰枯木倚寒巖三春無暖氣女歸舉似婆婆曰我二十年只供養得箇俗漢遂趂出放火燒却菴頌曰不見人斑見虎斑算來莫願見人斑虎斑見後通回避唯有人斑避最難或菴體鐵壁迸開雲片片黑山輥出月團團就中明暗相陵處天外出頭誰解看虗堂愚貧人常妬富富者不欺貧莫信直中直須防人不仁間極雲二十年來不具眼茅菴燒却是徒為三春暖氣無多子真實之言亦可師橫川珙禪宗頌古聯珠通集後序青蓮瞬視金色笑微師承肇茲密著少林華敷神光印受世系由是彌彰雖枝派之有殊分然機用之無二致或縱奪而破古人之幽鍵或捭闔而發後學之靈樞大用現前纖塵不立四句獨超於言外萬法俱泯於聲先玉振禪宗珠聯祖域流通雖遠選擇未純識者尚譏況於後乎錢唐魯菴會公孤標拔俗積行熏心遐扣祖機深染法味採機緣而補前闕綴頌古而入新刊通集後先洞照今古用心亦閎矣謹遣清侶躬索後題慚窺管而見微聊濡毫而塞請延祐戊午季夏徑山希陵題宗門中有一千七百則公案名之今古又曰長物言之則污人唇齒置之則回避無門句句玉轉珠回字字冰銷瓦解歷代宗匠頌之未免畫蛇添足寶鑑師編緝於前魯菴公增收於後贓證分明不勞再勘中間一處誵訛具眼衲僧必能辨白延祐丁巳重陽日靈隱住山淳朋拜書聯珠頌古通集變本加麗勾章棘句愈出而愈多如蜂房釀百華之蜜蟻絲穿九曲之珠食其蜜者念其蜂好其珠者慕其蟻余作是說有客進曰忽遇不食蜜不好珠不嗜語言文字者此集又將奚為余曰病其病者不能自病客慚而退於是乎書至治春天童雲岫題
