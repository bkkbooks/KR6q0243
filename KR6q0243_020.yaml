body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第四世之七南嶽下後第三世之三趙州問新到曾到此間麼曰曾到師曰喫茶去又問僧僧曰不曾到師曰喫茶去後院主問曰為甚麼曾到也云喫茶去不曾到也云喫茶去師召院主主應喏師曰喫茶去頌曰趙州有語喫茶去天下衲僧總到來不是石橋元底滑喚他多少衲僧回汾陽昭見僧被問曾到此有言曾到不曾來留坐喫茶珍重去青烟時換綠紋苔投子青趙州有語喫茶去明眼衲僧皆賺舉不賺舉未相許堪笑禾山解打鼓雲峯悅曾到還將未到同趙州依舊展家風近來王令關防緊從此人情總不容佛印元趙州驗人端的處等閒開口便知音覿面若無青白眼宗風爭得到如今黃龍南一甌茶自振家風遠近高低一徑通未薦清香往來者誰諳居止院西東照覺總此間曾到不曾到人義人情去喫茶院主不知滋味好却來爭看盞中花佛國白叢林宗匠實難加臨事何曾有等差任是新來將舊住殷勤只是一甌茶正覺逸三等擎甌禮數全一般平挹更無偏石橋破院無珍味且夾油麻一例煎佛慧泉寶匣龍泉發夜光寥寥長掛在虗堂四來高客如相訪荼罷休勞話短長大溈秀趙州喫茶話自古至及今易開終始口難保歲寒心雲蓋智相逢盡道喫甌茶大抵風流出當家休問曾到未曾到自有行人滿路誇踈山常驪珠絕纇玉無瑕馬載驢䭾帝子家曾到不曾休擬議與君同泛一甌茶羅漢南箇中滋味若為論大展家風說早春三度口行人事了這回莫道不沾唇佛鑑懃趙州一甌茶驗盡當行家一期雖自好爭免事如麻龍門遠趙州滋味最為親覿面承當有幾人三度傳來親切處馨香滿口又全真楚安方三等接人喧海宇一茶驗客播叢林高山流水深深意不是子期誰賞音雲巖因續收高下來相訪只點一甌茶人情厭踈淡骨肉生冤家爭似盧仝閉關自煎喫發輕汗平生不平事盡向毛孔散石明趙州喫茶宗門奇特到與不到正白拈賊黃龍新曾到不曾到且喫一杯茶待客只如此冷淡是僧家牧菴忠曾到喫茶去未到喫茶去趙州老禪和口甜心裏苦心裏苦直至如今無雪處慈受深趙州喫茶我也怕他若非債主便是冤家倚墻靠壁成羣隊不知誰解辨龍蛇應菴華百尺竿頭㲲布巾上頭題作酒家春相逢不飲空歸去洞裏桃花笑殺人自得暉人來訪趙州唯道喫茶去無端院主不惺惺更與一甌令醒悟本覺一趙州三度喫茶禾山打鼓難比休於句下尋求識取口中滋味若識得觀音院裏有彌勒佛性泰曲盡周遮禮數頻苦茶何用勸三巡鼻中若有通天竅終不回頭問別人文殊道曾到未到普請喫茶口甜似蜜心毒如蛇淳菴淨趙州喫茶逆拔毒蛇虗空落地鐵樹開花夜叉羅剎彌勒釋迦改頭換面無窮數莫道風流出當家普菴玉趙州喫茶去毒蛇橫古路踏著乃知非佛也不堪作松源岳趙州老漢熱心腸一盞麤茶驗當行回首路傍橋斷處白蘋紅蓼映斜陽浙翁琰趙州逢人喫茶誰知事出急家反手作雲作雨順風撒土撒沙引得洞山無意智問佛也道三斤麻無禪才趙州因僧問萬法歸一一歸何所師曰老僧在青州作得一領布衫重七斤頌曰編擗曾挨老古錐七斤衫重幾人知而今拋向西湖裏下載清風付與誰雪竇顯七斤衫重豈難提日出東方定落西一擊珊瑚枝粉碎轟轟雷雨滿山溪白雲端獨坐獨行真竭斗無規無矩老禪和四方八面雞拘檢天下誰能奈你何保寧勇問來親切布衫酬指出青州是舊游皓月當空澄巨浸鯨鯢無奈不吞鈎照覺總趙州布衫重七斤問處分明答處親大地山河都蓋却誰是當機裁剪人文殊道七斤衫重絕纖埃妙手何人解剪裁堪笑東村王大伯滿身風雨入門來普融平青州七斤衫盡力提不起打破趙州關總是自家底徑山杲續收趙州老對面人難曉一歸何處青州布襖金銀琉璃硨磲碼碯龍牙言夜半墨漆黑捉得一箇賊點火照來看元是王大伯鼓山珪等閒提起七斤衫多少禪流著意參盡向青州作窠窟不知春色在江南運菴巖鑊湯無冷地黃河輥底流金剛難插觜腦後掛燈毬或菴體拶到懸崖撒手時七斤衫重有誰知寒來暑往渾無用挂在趙州東院西石菴玿當機覿面提覿面當機疾開眼放癡頑鞭逼人上壁北磵簡趙老七斤衫提來用恰好若更問如何且去青州討斷橋倫增收趙州在東司上見遠侍者過驀召文遠遠應諾師曰東司上不可與汝說佛法頌曰老僧正在東司上不將佛法為人說一般屎臭旃檀香父子之機俱漏泄鼓山珪趙州有密語文遠不覆藏演出大藏教功德實難量徑山杲東司上不說佛法喚來與伊劈面踏不用重論報佛恩將此深心奉塵剎無菴全明明道不說此理憑誰識春風一陣來滿徑花狼籍𫎇菴聰增收趙州因真定帥王公擕諸子入院師坐而問曰大王會麼王曰不會師曰自小持齋身已老見人無力下禪床王尤加禮重翌日令客將傳語師下禪床受之侍者曰和尚見大王來不下禪床今日將軍來為甚麼却下禪床師曰非汝所知第一等人來禪床上接中等人來下禪床接末等人來三門外接頌曰上等接人了無回互據坐堂堂是何謂度帥王用處若軒昂為渠拽倒破禪床天目禮跏趺迎上客曲彔對旌幢不是家風別他居禮樂鄉西巖惠折脚禪床接斷薪猶堪偃首揖高賓明知例土熏天富難闘他家徹骨貧石溪月人王爭似法王尊不下禪床接上根休說君臣猶有間入山先要主賓分月坡明趙州三等見人未舉已先話墮都衙喚得便回頭也是大蟲看水磨枯禪鏡禪床不下不擡身自小持齋到老人只有箇牙堪喫飯那知世有大王尊閑極雲增收趙州因侍者報大王來也師曰萬福大王者曰未到在師曰又道來也頌曰報客傳言信已通叉手低頭便鞠躬對面一雙清白眼當頭蹉過住山翁楚安方侍者來言報大王趙州曾揖下禪床憐兒不覺傍觀醜爭奈全身在帝鄉天童覺一句機鋒無價萬福承當不下看他拈尾作頭又道大王來也楮衲秀驥子駑駘滿道途皮毛孰敢辨精麤若無伯樂當時鑒失却追風千里駒慈受深許由臨岸洗耳巢父不飲牛水侍者親入帝鄉趙州只在草裏南巖勝來也宮殿隨身去也笙歌滿路侍者白頭如新趙州傾蓋如故別峯印趙州到一菴主處問有麼有麼主竪起拳頭師曰水淺不是泊船處便行又到一菴主處問有麼有麼主亦竪起拳頭師曰能縱能奪能殺能活便作禮頌曰問答元來總一般當頭一著莫顢頇將軍自有佳聲在不得封侯也是閒佛迹昱疋馬單槍戰祖關死生只在剎那間趙州最是難容漢菴主當頭楔兩拳文殊道無星秤子兩頭平提起應須見得明若向箇中爭分兩知渠錯認定盤星佛性泰趙州老漢少喜多瞋不會為客勞煩主人湛堂凖虎步龍驤徧九垓會從平地起風雷等閒喚出菴中主便見千江水逆回佛心才老作叢林是趙州兩拳提起不輕酬無星秤在當人手斤兩都盧在裏頭楚安方續收五陵公子爭誇富百衲高僧不厭貧近來世俗多顛倒祇重衣衫不重人三聖昌上菴竪起拳頭趙州左眼半斤下菴竪起拳頭趙州右眼八兩君看陝府鐵牛何似嘉州大像若謂總涉誵訛露柱燈籠合掌慈受深換手搥𮌎哭老爺棺材未出死屍斜不如掘地深埋却管取來年喫嫩茄瞎堂遠菴主當年用得親衲僧眼裏要生筋趙州舌有龍泉劒開口等閒疑殺人自得暉水淺不是泊船處能縱能奪自有據一槌擊碎兩重關填溝塞壑無回互尼無著總菴主拳頭舉處親趙州話魯指西秦知音不在千杯酒一盞空茶也醉人湛堂深順水張帆逆風把柂釣盡江波不出者箇月林觀菴主拳頭沒兩般趙州平易作艱難叢林多少杜禪衲誰解出頭天外看銕山仁閃爍旌旗驟往來幾人遙望起疑猜此時若得樊公脚一踏鴻門兩扇開無凖範增收趙州因文遠侍者在佛殿禮拜次師見以拄杖打一下曰作甚麼曰禮佛師曰用禮作甚麼曰禮佛也是好事師曰好事不如無頌曰文遠修行不落空時時瞻禮紫金容趙州拄杖雖然短分破華山千萬重徑山杲禮佛無端撞趙州却將知見作冤讐如今四海平如掌雲自高飛水自流照堂一只知瞻禮紫金容不覺腦門遭霹靂平生心膽向人傾相識還同不相識𫎇菴聰趙州因僧問如何是趙州師曰東門西門南門北門頌曰句裏呈機劈面來爍迦羅眼絕纖埃東西南北門相對無限輪槌擊不開雪竇顯四廓關閎鎮趙州幾於城下起戈矛將軍戰馬今何在野草閒花滿地愁照覺總袖裏金槌一擊開東西南北絕纖埃石橋南畔臺山路報你游人歸去來普融平豁達門開入趙州東西南北任遨遊龍樓鳳閣依然在失却來時好路頭羅漢南四門開豁往來遊脚下分明到地頭四五百條花柳巷二三千處管絃樓圓通僊續收趙州老有一訣四門開路頭徹入門來明皎潔出門去莫漏泄通一線為君說元正日太平節黃龍新者僧問趙州趙州答趙州得人一馬還人一牛人平不語水平不流受恩深處先宜退得意濃時正好休徑山杲南北東西老趙州見人騎馬也騎牛清風月下尋歸路夫子門前問孔丘瞎堂遠趙州因僧問初生孩子還具六識也無師曰急水上打毬子僧却問投子急水上打毬子意旨如何子曰念念不停留頌曰六識無功伸一問作家曾共辨來端茫茫急水打毬子落處不停誰解看雪竇顯初長嬰兒急水毬衲子隨波卒未休若問德山行正令何似當時問趙州天衣懷何謂識兮還具六八萬四千殊不足初生孩子尚喃喃急水打毬攔口𡎺白雲端續收朝日忙忙打箇毬生來念念不停留若知落地無蹤跡始會雲門六不收慈受深急水打毬子念念不停留未能全六識先見轉雙眸紹續門風只這是不須向外更尋求佛性泰初生孩子始徒然六識聰明心性巧急流水上打毬子出出沒沒人不曉既為掌上珠須作家中寶好老趙州恁麼道佛鑑懃增收趙州因僧問和尚姓甚麼師曰常州有曰甲子多少師曰蘇州有頌曰蘇州有常州有須信親言出親口趙州古佛豈徒然世界壞時渠不朽若能於此究根源決定面南看北斗雪竇顯常州有蘇州有吃嘹舌頭師子吼壽山高兮福海深八十一兮九箇九若能直下便回光千古萬古名不朽佛鑑懃常州有福州無江風作惡浪花麤不用刻舟徒記劒片帆已過洞庭湖淳菴淨蘇州有常州有未到蘇常不知有既到蘇常何處有今人不識古人意空向城中顛倒走退菴奇蘇州有與常州有三月江南啼鷓鴣堪笑有年無德漢被人拶著強分踈退耕寧增收趙州問一座主講什麼經曰講涅槃經師曰問一段義得否曰得師以脚趯空吹一吹曰是什麼義曰經中無此義師曰脫空謾語漢此是五百力士揭石義便道無頌曰一趯方令地軸反一吹還又轉天關講師不識圓陁義空捨前山過後山圭堂居士揭石從來義不同洪波深處逞神通高標不在蘆花岸隊隊雙雙趂曉風獃堂定增收趙州因僧問十二時中如何用心師曰汝被十二時辰使老僧使得十二時乃曰兄弟莫久立有事商量無事向衣鉢下坐窮理好老僧行脚時除二時粥飯是雜用心處除外更無別用心處若不如是大遠在頌曰百年三萬六千日一日朝昏十二時使殺老僧渾不管不知閙裏有誰知鼓山珪使得十二時辰呼來却教且去倚官挾勢欺人茫茫無本可據徑山杲鍾送黃昏雞報曉趙州何用閒煩惱裂破虗空作兩邊古廟香爐出芝草雪菴瑾安貼鄉老趙州時辰使得最風流今朝有酒今朝醉明日愁來明日愁野菴璇增收趙州在南泉井樓上打水次見南泉過便抱柱懸却脚曰相救相救南泉上胡梯曰一二三四五師少頃却去禮謝曰適來謝和尚相救頌曰南泉趙州用最密後人不了轉尋覔往返之言子細看二人把手並頭立汾陽昭趙州自作自受南泉外頭相救直饒數目分明也是私路上走月堂昌描不成塑不就樓上懸身呌相救南泉敲處有來由一段風流如錦綉阿呵呵一二三四五大蟲咬猛虎堂堂思等閒施設豈徒然平地波瀾欲浸天更向胡梯敲數下免教矢脚墮黃泉佛性泰增收趙州因在殿上過乃喚侍者者應諾師曰好一殿功德者無對頌曰殿上從來好功德如何侍者却疑惑趙州露出赤心肝問著依然墨漆黑照堂一殿上喚來先應諾不知業識太茫茫雖然功德已成就爭奈當初不放光鼓山珪好一殿功德總是過去佛百福相嚴身不使旃檀刻日日香烟夜夜燈看來當甚乾蘿蔔徑山杲增收趙州因到臨濟方始洗脚濟便問如何是祖師西來意師曰正值老僧洗脚濟乃近前側耹師曰若會便會更啗作麼濟拂袖去師曰三十年行脚今日為人錯下註脚頌曰洗脚處更不安排側聆時非是啗趙州臨濟二老人相見何勞下註脚鼓山珪一人眼似鼓椎一人頭如木杓兩箇老不識羞至今無處安著徑山杲臨濟趙州禪林宗匠特地相逢恰似撲相撞見今時行脚僧呼為兩箇閒和尚雪菴瑾增收趙州見僧來便面壁書梵字僧展坐具禮三拜師轉身僧收坐具出去師曰苦苦僧呵呵大笑頌曰苦苦向誰語發機要是千鈞弩三十三天撲帝鍾大地山河俱作舞典牛游苦苦苦中苦樂中苦誰道黃金如糞土象骨老師曾輥毬秘魔扠下捉老鼠應菴華苦中樂樂中苦趙州這僧俱欠悟直饒頓徹根源也是泥中洗土佛照光不昧當陽第一籌臨機拳趯不輕酬焦磚打著連底凍赤眼撞著火柴頭掩室開增收趙州到雲居居云老老大大何不覔箇住處師曰什麼處住得居云前面有古寺基師曰與麼即和尚自住取師又到茱萸萸云老老大大何不覔箇住處去師曰什麼處住得萸云老老大大住處也不識師曰三十年弄馬騎今日却被驢撲頌曰展陣開旗各運謀箭鋒相敵未輕休等閒露出反身句直得千江水逆流掩室開突出山前古寺基趙州聞得便攢眉寥寥今古無人共一片斷雲天外飛率菴琮增收趙州因僧問二龍爭珠誰是得者師曰老僧只管看頌曰風雲頭角黑𥻘皴苦死交爭額上珍淨洗眼來閒地看老僧未免費精盡圓悟勤珠在浪花深處白拏雲霧志悠哉老僧祗管從邊看得失從渠眼自開咦菴鑒增收趙州因僧問如何是祖師西來意師曰欄中失却牛頌曰欄中失却牛有問即有詶更若求玄妙猢孫築氣毬慈雲照增收趙州上堂纔有是非紛然失心還有答話分也無僧舉似洛浦浦扣齒又舉似雲居居曰何必僧回舉似師師曰南方大有人喪身失命曰請和尚舉師纔舉前語僧指傍僧曰這箇師僧喫却飯了作恁麼語話師休去頌曰坐底見立底立底見坐底咄哉老趙州白日眼見鬼無相範增收趙州因僧問如何是南泉真師下禪床立僧曰如何是和尚真師上禪床坐頌曰師下禪床立神號并鬼泣師上禪床坐龍蟠并虎臥一槌打與兩分張拈起元來是雙破本覺一增收趙州因一秀才云和尚是古佛師曰秀才是新如來頌曰廣寒宮殿淨無埃已是逢君八字開丹桂不須零碎折等閒和樹拔將來南叟茙增收趙州因僧問毫釐有差時如何師曰天地懸隔僧云毫釐無差時如何師曰天地懸隔頌曰毫釐有差天地隔毫釐無差天地隔隔不隔俱端的但能信手摘楊花須會風生庭前栢趙州關好標格曹溪路上沒蹤跡長靈卓一道如弦直長安信已傳萬皆入貢四海息狼烟掩室開增收趙州因僧問路逢達道人不將語默對未審將甚麼對師曰人從陳州來不得許州信頌曰滿滿彎弓射不著長長揮劒斫無痕堪笑日月不到處箇中別是一乾坤大溈行病餐毒藥訪良醫醫使元餐藥治之病去藥回滋味別舌頭具眼者方知佛性泰二世有逃形畏影人奔陳告訴謾勞神若知形影元無二坐對高堂秋月輪增收趙州因僧問南泉遷化向什麼處去師曰東家作驢西家作馬頌曰脫得驢頭載馬頭東家西家卒未休問君還有幾多愁恰似一江春水向東流懶菴樞增收趙州示眾曰此間佛法道難即易道易即難別處難見易識老僧這裏即易見難識若能會得天下橫行頌曰識不識見非見說易說難如油入汾源岳增收趙州臨順世令僧持拂子與趙王曰若問何處得來便說此是老僧平生用不盡底頌曰一生受用應無盡這箇都來有幾莖分付趙王千古在任他南北競頭爭保寧勇增收趙州因僧問如何是祖師西來意師曰冬至一陽生頌曰柳色黃金嫰棃花白雪開若解知時節冬至一陽來圓悟勤鐵樹開花千萬朵石頭抽筍兩三莖泥塑金剛開口咲明朝冬至一陽生佛鑑懃柳色黃金嫰棃花白雪香若知春氣力特地好風光龍門遠冬至一陽生乾坤通一線可憐無限人不識娘生面徑山杲增收福州芙蓉山靈訓禪師嗣歸宗師一日辭歸宗宗問甚麼處去師曰歸嶺中去宗曰子在此多年裝束了却來為子說一上佛法師結束了上去宗曰近前來師乃近前宗曰時寒途中善為師聆此言頓忘前解頌曰八十婆婆學畫眉癡心欲比少年時一朝打破當臺鏡始信從前萬事非慈受深增收芙蓉一日訪同參實性大師大師陞堂以右手拈拄杖倚左邊良久云此事若不是芙蓉師兄大難委悉便下座頌曰陪盡老精神杯盤越樣新誰知村酒店難勸御樓人西巖惠五臺山大禪師智通禪師嗣歸宗師初在歸宗會下忽一夜連呌曰我大悟也眾駭之明日上堂眾集宗曰昨夜大悟底僧出來師出曰某甲宗曰汝見甚麼道理便言大悟試說看師曰師姑元是女人作宗異之頌曰悟來不在苦多端解了都由瞥爾閒定道師姑女人作癡人積雪作銀山汾陽昭半夜高聲似少神箇中明自有踈親如今隨例傳其響也道師姑是女人保寧勇五月炎威當酷熱浹背汗流無處說帀地清風劈面來大禪眼裏重添屑草堂清童子學順朱赤處背模黑若將白紙來一點下不得若下得翻成紙上塗烟墨黃龍震悟了還同未悟時何須更說與人知賊贓敗露無藏處便道師姑是女兒大洪遂續收驚眾連聲呌悟由了知諸聖不相投師姑元是女人作有何佛祖向心頭延壽慧師姑元是女人作百衲禪僧多罔措鴈回沙塞口啣蘆燕遶紅梁渾不顧破菴先鎮州普化和尚嗣盤山師初於盤山處密受真訣而佯狂出言無度暨盤山順世乃於北地行化或城市或塚間振鐸曰明頭來明頭打暗頭來暗頭打四方八面來旋風打虗空來連架打一日臨濟令僧捉住曰總不恁麼來時如何師拓開曰來日大悲院裏有齋僧回舉似臨濟濟曰我從來疑著這漢頌曰老倒分明兩路差箭鋒相拄勿喎斜龍蛇混雜人難辨白日長空下雪花汾陽昭明暗俱打誇無上擒住方知無伎倆伎倆無亂稱呼至今誰解辨真虗海印信高堂公子醉雙陸亂撒明珠發異光一擲輸嬴誰辨得滿盤骰子不成雙佛智裕婁羅須要逞聦明金榜何曾得掛名捋下幞頭歸去好莫騎驢子傍人門鼓山珪續收不是風兮不是顛長街短巷走如烟院裏有齋常記得時時掛在口皮邊廓菴遠旱天忽震數聲雷遠近飛雲若往來甘雨未曾施一點返將風勢卷將回雲峯悅一拶銀山鐵壁摧大悲院裏趕村齋善財拄杖如無用乞與佯狂老萬回水菴一水急魚行澁峯高鳥不棲世情看冷暖人面逐高低松源岳以此振鈴伸召請旋風連架打將來大悲院裏邏齋去肘露皮穿可怪哉天目禮擺鐸搖鈴恣賣乖大悲院裏趕村齋河陽木塔休穿鑿是甚堂前破草鞋笑翁堪大用全提作者知爍迦眼活電光遲大悲院裏翻身處臨濟甘為小廝兒古巖璧明日大悲院裏齋鐵圍山岳盡衝開猪頭象鼻烏觜魚腮石人撫掌呵呵笑寒山拾得在天台石菴玿普化甞暮入臨濟院喫生菜濟曰這漢大似一頭驢師便作驢鳴濟謂直歲曰細抹草料著師曰少室人不識金陵又再來臨濟一隻眼到處為人開頌曰十字街頭金鐸鳴蹇驢生菜恣膨脝狂翻筋斗盤山恠踢倒飯床臨濟驚隻眼未開真瞎漢兩頭俱打震威聲鎮人何必揭棺看會得來時即去程野軒遵先師會裏呈真處臨濟堂前喫菜時連此三回露栓索咄這㳂臺盤乞兒徑山杲續收草裏相逢兩赤眉交鋒一陣疾如飛東西旗號渾相似試問何人得勝歸上方益一箇驢鳴兩箇賊堪與諸方為軌則正賊草賊不須論大施門開無塞塞徑山杲賸噇生菜似頭驢臨濟堂前捉敗渠聳耳長鳴隨踢踏不知業債倩誰除天目禮增收普化見馬步使出喝道師亦喝道作相撲勢馬步使令人打五棒師曰似即似是即不是頌曰混俗和光用最難相逢正是兩風顛雖然大化無方所俗官且不是僧官汾陽昭機境相投是妄真入河漸漸見長人受屈遭他一頓棒元來不是好官人江陵柔階頭放下劫初鈴相撲呼它馬使名五棒打來無雪處却言渠不是官行天目禮普化一日同臨濟赴施主家齋濟問毛吞巨海芥納須彌為復是神通妙用為復法爾如然師遂踢倒飯床濟云太麤生師云這裏什麼所在說麤說細濟休去次日又同赴一施主家齋濟問今日供養何似昨日師又踢倒飯牀濟云太麤生師云瞎漢佛法說甚麼麤細濟乃吐舌頌曰要識真金須入火再三煅煉見精麤上行買賣不饒讓好物從來價自殊海印信相逢一瞎一麤生齋主渾家喪膽驚誰識二尊龍象駕毗盧頂上等閒行野軒遵蘭羞供養不尋常兩度遭伊踢飯牀總似這般無禮漢將何因果利存亡上方益續收掣顛掣狂普化張口吐舌臨濟共展大機大用漏泄祖師關捩南山鱉鼻添牙焦尾大蟲插翅南堂興入海須是崑崙得珠還他罔象飯床兩次趯翻這漢是甚驢養典牛游臨濟慣白拈普化慣掣顛一場好笑具後世作三玄別峯印普化趯倒飯牀臨濟大張其口放出踞地金毛驚得須彌倒走通身是眼鑒不徹通身是口只隨後不隨後寶劒出匣風雷吼塗毒策增收普化因臨濟一日同河陽木塔在僧堂地爐內坐正說師每日在街市掣風掣顛知他是凡是聖師曰你道我是凡是聖濟便喝師指河陽木塔曰河陽新婦子木塔老婆禪臨濟小廝兒却具一隻眼濟曰這賊師曰賊賊便出去頌曰騏驥駑駘辨者稀淺深毛色混同之若無伯樂垂精鑒千里追風不易騎海印信增收普化初將示滅乃入市謂人曰乞我一箇直裰人與披襖或與布裘皆不受振鐸而去臨濟令人送與一棺師笑曰臨濟廝兒饒舌便受之乃辭眾曰普化明日去東門死也郡人相率送出城師厲聲曰今日葬不合青烏明日南門遷化人亦隨之又曰明日出西門方吉人出漸稀出已還返人意稍怠第四日自擎棺出北門外振鐸入棺而逝郡人奔走出城揭棺視之已不見唯聞空中鐸聲漸遠莫測其由頌曰風顛用盡到無餘一箇棺材八箇舁舁出鎮州城外去聽他木鐸自分疎北磵簡撮得虗空作近隣便於北斗裏藏身這掠虗漢何多事猶把空棺誑後人東山源
