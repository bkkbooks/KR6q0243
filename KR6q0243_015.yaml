body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第三世之餘清源下第二世之餘潮州靈山大顛寶通禪師嗣石頭韓文公一日相訪問師春秋多少師提起數珠曰會麼曰不會師曰晝夜一百八公不曉遂回次日再來至門前見首座舉前話問意旨如何座扣齒三下及見師理前問師亦扣齒三下公曰元來佛法無兩般師曰是何道理曰適來問首座亦如是師乃召首座是汝如此對否曰是師便打趂出院頌曰解展機鋒是大顛明知不是小因緣一般扣齒叢林異出院韓公始得閒汾陽昭宗師一等展家風盡情施設為韓公師子窟中無異獸象王行處絕狐蹤黃龍南潮者如山觀者如市本分弄潮人出沒如遊戲可憐不是弄潮人往往須向潮中死海印信一步纔行兩步移門前驚起鳳凰兒栖蹤不在梧桐樹羣鳥東西空繞枝保寧勇問來歲數數珠呈百八循環意甚明底事如何觸風化潮陽從此令嚴行照覺總二文公問處無多子大顛直答豈千差首座若教能返擲當時二老亦離家佛法無別好商量門前扣齒便承當一般出院難分雪疑殺唐朝韓侍郎佛國白續收一串摩尼覿面當機賺却首座疑殺昌黎弄盡許多窮伎倆春秋元自不曾知石帆衍牙齒唇皮包不過吾家密事俗人知首座出院未為過長老罰油方合宜橫川珙增收大顛因韓文公至白師曰弟子軍州事繁佛法省要處乞師一語師良久公罔措時三平為侍者乃敲禪床三下師曰作麼平曰先以定動後以智拔公乃曰和尚門風高峻弟子於侍者邊得箇入處頌曰徑截之言問大顛文公良馬暗窺鞭敏手三平加智拔中霄雲散月當天大洪遂省要之言伸一問宗師遽坐不輕酬無端醉後添盃酒惱亂春風卒未休枯禪鏡將軍宴坐碧油幢凜凜威風冷似霜却把機關輕漏泄至今千古錯商量北海心事繁求省要省要事頻繁縱得三平老文公只姓韓西巖惠增收大顛因韓文公問如何是佛師曰看頌曰宗師一等展家風盡情施設與韓公師子窟中無異獸象王行處絕狐踪黃龍南轟然如雷瞥然如電非青非黃非見不見兔角杖龜毛拂萬法宗千聖骨即處分明千百億何必釋迦又彌勒佛鑑懃潭州長髭曠禪師嗣石頭師初往曹溪禮祖塔回參石頭頭問甚處來師曰嶺南來曰嶺頭一尊功德成就也未師曰成就久矣祇欠點眼在曰莫要點眼麼師曰便請頭乃翹一足師禮拜頭曰汝見箇什麼道理便禮拜師曰據某甲所見如紅爐上一點雪玄覺云且道長髭具眼祗對不具眼祗對若具眼為甚麼請他點眼若不具眼又道成就久矣且作麼生商量法燈代云和尚可謂眼昏頌曰一鋪大悲千手眼十分圓就未開光君看筆下神通現更有靈蹤在上方保寧勇長髭未向嶺南來功德圓成眼已開珍重善財回首處文殊元不下樓臺智海清撥草瞻風到石頭關山重疊路迢迢嶺頭功德圓成久一點紅爐雪未消草堂清這鋪功德自何來垂足清機孰可猜點雪分明休指注木人心眼自然開禾山方圓光皎皎耀寒虗妙手丹青書不如當日石頭輕點破至今赤土亂搽糊普融平嶺頭功德眼倦足等閒垂紅爐一點雪直下廓亡依天童覺國手精奇老石頭毫端點出佛雙眸破繩床上閒垂足兩道神光夜不收張無盡大庾嶺頭功德成謾言點眼訪知音紅爐片雪明端的象外風光照古今疎山如續收紅爐一點雪知音瞥不瞥龜毛扇子扇泥牛一點血五祖演一足垂來親點眼嶺頭功德已圓成長髭只怕精神露却指紅爐片雪輕心聞賁南岳峯前老石頭憐兒何事不知羞為人點眼長伸脚直至而今懶不收無凖範增收長髭因李行婆來乃問憶得在絳州時事麼曰非師不委師曰多虗少實在曰有甚諱處師曰念你是女人放你拄杖曰某甲終不見尊宿過師曰老僧過在甚處曰和尚無過婆豈有過師曰無過底人作麼生婆竪拳曰與麼總成顛倒師曰實無諱處頌曰長髭李行婆相見打破鍋彼此兩無失是非轉更多大圓若見伊掃蕩葛藤窠奉勸參學者休哆哆囉囉咄大圓智長髭解接無根樹婆子能挑水底燈燈爛樹生真可笑佳聲千古播乾坤諱得麼方菴顯增收長髭有僧為點茶三巡後僧問不負從上諸聖如何是長髭第一句師曰有口不能言曰為什麼有口不能言師乃頌云石師子木女兒第一句諸佛機言不得也大奇直下是莫狐疑良久云是第一句第二句曰不一不二師曰見利忘錐猶自多在僧禮拜師拈起盞子曰直下不負從上諸聖曰直指人心見性成佛又作麼生師放下盞子便歸方丈僧隨後入師翹一足曰大地不容針汝從何處來曰直是維摩也緘口不得師曰偶爾之間又逢猛虎僧便作虎聲師以拄杖作亞鏘勢僧却把住曰大地不容針何處得這箇來師曰不但維摩文殊也緘口不得曰著箭虎不可當師與一掌推出方丈頌曰是精識精是賊識賊猛虎鼈蛇釋迦彌勒觀音勢至寒山拾得一盞清茶古今規則南堂興一句兩句葛藤路布維摩文殊緘口無處暗箭藏鋒射中猛虎一掌相酬繪事後素方菴顯第一句言不及見利忘錐何得何失拈起放下翹足而立文殊維摩鎗箭交擊果不可當一掌推出縱是舜若多神額頭也須汗出石溪月增收鳳翔府法門寺佛陀禪師嗣石頭尋常持一串數珠念三種名號曰一釋迦二元和三佛陀自餘是甚麼椀躂丘乃過一珠終而復始事迹異常時人莫測頌曰三種佳名一箇過邀君把手上高坡時人自沒登山力空負當年一曲歌佛燈珣增收澧州大同普濟禪師嗣石頭因僧問如何是本來人師曰共住不相識曰恁麼則禮拜去也師曰暗寫愁腸寄阿誰頌曰共住同行世莫知幾人當面便逢伊縱饒紹續家門者半是貧寒乞養兒保寧勇增收大同一日問龐居士曰是箇言語今古少人避得只如龐公還避得麼曰諾師再舉前話曰什麼處去來師曰非但如今古人亦有此語士作舞出去師曰風顛老風顛老自過教誰檢頌曰慣逐羊腸路相逢莫問津江山異今古風物逐時新方菴顯增收大同因龐居士來訪提起笊籬喚曰大同師大同師師不顧士曰石頭一宗瓦解冰消師曰若不得龐公輩灼然如此士拋下笊籬曰寧教不直一文錢師曰錢雖不直欠他又爭得士作舞而退師乃提起笊籬曰龐公龐公士曰你要我笊籬我要你木杓師作舞而退士撫掌笑曰歸去來歸去來頌曰提起笊籬清風滿寰宇放下笊籬黃金如糞土可憐兩箇老古錐相見何用同作舞塗毒策你愛我笊籬我愛你木杓主山纔放高案山又岌嶫居士大同師將錯便就錯歸去來兮天地寬一對鐵槌何處著瞎堂遠普濟把定被龐公痛處一錐直得左轉右側前依後隨笊籬提起處相呼作舞時若言依樣畫猫兒定把黃金鑄子期石溪月增收大同因僧問十二時中如何合道師曰汝還識十二時麼曰如何是十二時師曰子丑寅卯僧禮拜師示頌曰十二時中那字別子丑寅卯吾今說若會惟心萬法空釋迦彌勒從茲訣頌曰十二時中別不別通身是口難分說東村王老暗嗟吁達磨西來有妙訣佛鑑懃十二時中時時別終日說兮未甞說經行坐臥在其中吾今直下為君訣大圓智子丑寅卯何曾別古人今人如是說喪盡靈臺一物無佛祖分明為秘訣塗毒策識得子丑寅卯句應須繼紹此門風如王仗劒當堂坐佛魔俱拂一時空石溪月六祖下第四世之一南嶽下前第三世之一潭州溈山靈祐禪師嗣百丈一日侍立百丈問誰師曰靈祐丈曰汝撥爐中有火否師撥曰無火丈躬起深撥得少火舉以示之曰此不是火師發悟禮謝陳其所解丈曰此乃暫時岐路耳經曰欲見佛性當觀時節因緣時節既至如迷忽悟如忘忽憶方省己物不從他得故祖師云悟了同未悟無心亦無法只是無虗妄凡聖等心本來心法元自備足汝今既爾善自護持傳燈錄所載如此五燈會元於護持下云次日同百丈入山作務丈曰將得火來麼師曰將得來曰在甚處師乃拈一枝柴吹兩吹度與丈丈曰如蟲禦木頌曰提起都來只一星豁然騰焰亘天明連延野外猶難救直得三年草不生保寧勇力士曾遺額上珠搜尋無處幾嗟吁傍人為指珠元在始覺平生用意麤大洪邃撥動寒灰火便明曉來山外尚熒熒堪嗟法眼堂前客猶向南方問丙丁上方益大雄山下路遙長父子相將草裏行拈得枯柴呈是火家私穩密自斟量門前幸有通津路信脚何妨步夕陽四海五湖龍世界高梧脩竹鳳雛鄉佛燈珣續收通身是口徧身是舌口欲談而不談舌欲說而不說說不說瞥不瞥皎皎光明徧大千任從天下紛紛說南堂興拈起枯柴吹兩吹應時星𦦨亘天飛可憐癡坐圍爐底面面相看總不知高原泉用盡工夫夜欲蘭東挑西撥見還難驀然豆𪹼寒灰裏便把柴頭作火看別山智重重何必逞風流箇事纔知便合休縱使見烟非是火也須燒手更燒頭寶葉源根尋到底得星兒冷𦦨騰輝是此時拈一莖茅輕點著不知燒殺五須彌雪巖欽溈山在百丈為典座因司馬頭陀自湖南來尋得一山名大溈是一千五百人善知識所居之處丈曰老僧住得否曰彼是肉山和尚是骨人若居徒不盈千觀典座可住得丈呼來說與時首座聞得曰合當某去彼何人也丈乃告眾下語出格者得遂拈淨瓶置地上設問不得喚作淨瓶喚作什麼座曰不可喚作木𣔻丈復問典座座乃踢倒淨瓶而去丈笑曰首座輸却山子也因命典座往住山即大溈圓祐禪師也果安千眾頌曰定奪英雄是淨缾毫釐分處更無情太平本是將軍致不許將軍見太平照覺總正令全提作者知淨缾拈起定狐疑須知大智無私鑑解道溈山却屬伊佛迹昱淨缾踢處有來由自是行人不到頭須信春風生大野不風流處也風流兜率悅百丈堂前定大溈金毛師子振全威淨缾踢倒還元化千里淳風動地歸智海清不顧山前有信旗單刀一直入籌帷長戈短戟都無用奪得將軍金印歸上方益大用應須作者知當場一踢絕狐疑堪嗟不紹家園者只向缾邊定是非通照逢淨缾踢倒贏山子體用全彰邁古今洞徹玄關垂手處到頭須是遇知音踈山如溈山與仰山摘茶次師謂仰曰終日摘茶祇聞子聲不見子形請現本形相見仰撼茶樹師曰子祇得其用不得其體曰未審和尚如何師良久仰曰和尚祇得其體不得其用師曰放子三十棒五燈會元於此下又云仰曰和尚棒某甲喫某甲棒教誰喫師曰放子三十棒玄覺云且道過在甚麼處頌曰摘茶更莫別思量處處分明是道場體用共推真應物禪流頓覺雨前香汾陽昭體用全彰用不難當時溈仰自相謾禪流若具金剛眼互換機鋒子細看佛印元龍生龍子鬪全威霹𮦷聲中掣電機雨過雲收何處去溈山千古獨巍巍野軒遵體用俱非烏飛兔走撼樹默然天長地久三十拄杖令雖嚴也是憐兒不覺醜佛慧泉春暖相呼出翠微時行時坐幾忘歸黃昏一陣東風雨未免渾身透濕衣保寧勇續收祇聞子聲不見子形茶株撼處太分明要知寂子惺惺處便乃徐徐著眼聽慈受深家醜不可外揚父子體用全彰父奪子機猶可子奪父機無良大溈智張翁乍與李公友待罰李公一盞酒倒被李公罰一杯好手手中無好手佛鑑懃溈山得體仰山得用體用俱全夢中說夢喝一喝誰菴演聞聲不見形撼樹却惺惺體用何須論歸家落日明橫川珙增收溈山問仰山從何處歸曰田中歸師曰禾好刈也未曰好刈師曰作青見作黃見作不青不黃見曰和尚背後是甚麼師曰子還見麼仰拈起禾穗曰和尚何曾問這箇師曰此是鵞王擇乳頌曰不作青黃見其如稻穗何鵞王能擇乳子過新羅天目禮增收溈山冬月問仰山天寒人寒曰大家在這裏師曰何不直說曰適來也不曲和尚如何師曰直須隨流頌曰北風逞寒威凜凜侵肌骨一句括天寒幾曾容朕迹隨流認得本來身徧界莫非無價珍圓悟勤吹盡風流大石調唱出富貴黃鍾宮舞腰催拍月當曉更進蒲萄酒一鍾正堂辨大家在這裏兩手扶不起放下近前看是什麼面觜無際派大家在這裏初不礙隨流兩口無一舌葛藤殊未休茫茫大地人無數幾箇男兒解點頭寂巖中大家在裏許南山焦尾虎牙爪利如鋒日輪正當午已菴深增收溈山睡次仰山問訊師便面向壁仰曰和尚何得如此師起曰我適來得一夢汝試為我原看仰取一盆水與師洗面少頃香嚴亦來問訊師曰我適來得一夢寂子原了汝更與我原看嚴乃點一椀茶來師曰二子見解過於鶖子頌曰取水烹茶不失機當時原夢善知時如斯始謂仙陀客鶖子神通豈及伊本覺一撥草瞻風孤峯獨宿鼓無絃琴唱無生曲溈仰香嚴鼎之三足臨機不費纖毫力任運分身千百億南堂興神機妙用開眼作夢非時現通顯異惑眾萬菴顯一杯晴雪早茶香午睡初醒春晝長拶著通身俱是眼半窓疎影轉斜陽雪巖欽溈山示眾曰老僧百年後向山下作一頭水牯牛左脇書五字曰溈山僧某甲此時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧喚作甚麼即得五燈會元於即得下又云仰山出禮拜而退雲居膺代曰師無異號資福寶曰當時但作此相拓呈之新羅和尚作此相拓呈之又曰同道者方知芭蕉徹作此相拓呈之又曰說也說了也注也注了也悟取好乃述偈曰不是溈山不是牛一身兩號實難酬離却兩頭應須道如何道得出常流古德垂慈力未酬纔聞異相便爭牛聲前句後明玄旨失却溈山見不週且與同袍通一線蘆花雪覆菊當秋汾陽昭千羣萬羣水牯牛不出溈山這一隻無心管帶常現前作意追尋尋不得不大不小有筋力一身兩號少人識隨緣放去草木青遇晚收來天地黑收放須得鼻頭繩若不得繩無準則世間多少無繩人對面走却這牛賊黃龍南二昔日溈山有水牯而今老倒臥荒坵形容卓犖雖無力灌啖依前是好牛四野草青隨處放千峯雪白早須收若能提舉及時節極目桑田何用憂水牯溈山峭峻機分明人類顯幽奇兩途語出分明處夜鳥投林曉復飛道吾真山下為牛山上僧河沙異號未為能常愛暮雲歸未合遠山無限碧層層海印信不道溈山不道牛酌然何處辨蹤由絲毫差却來時路萬劫無由得出頭白雲端改却形容換却頭當陽難隱箇蹤由驢名馬字雖呼喚多少傍觀滿面羞保寧勇山上山僧山下牛披毛戴角混同流普天成佛兼成祖獨有溈山作水牛佛國白蹄角分明觸處周不勞管帶不勞收但知不犯他苗稼水草隨緣得自由真如溈山山上老禪翁山下作牛而已矣是非些子不能消說甚參禪明自己寶峯祥反手書空事已成忙忙人問兩頭明屈原不是逢漁父千古誰人論獨醒佛心才野逕蹄涔賺殺人早曾耕徧大田春有時落草無尋處顯現溈山老漢身張無盡千頭萬頭只一頭騎去騎來得自由放去高原水草足也須時把鼻繩收佛鑑懃異類中行得自由須知千聖亦難收和光日照溪山曉笑指乾坤那一頭楚安方續收溈山水牯牛禪人聚頭咬可憐負舂人喚作嶺南獠天童覺春寒料峭凍殺年少切忌參商別無玄妙龍門遠溈山水牯異常流不是溈山不是牛舉世有誰能道得波聲漁笛釣魚舟南堂興一箇形骸兩姓名入泥入水可憐生回頭掣斷黃金鏁肯向毗盧頂上行別峯印百年猶恐沒人知名字仍將左脇題入水入泥難放牧仰山只得半邊騎虛堂愚增收溈山上堂云仲冬嚴寒年年事運推移事若何仰山進前叉手而立師曰我情知汝答這話不得却顧香嚴嚴曰某甲偏答得這話師躡前問嚴亦進前叉手而立師曰賴遇寂子不會頌曰運推移事若何絲來線去定譊訛織成蜀錦千般巧不出當時一隻梭懶菴樞叉手進前寂子不會殺人活人好箇三昧這般阿師叢林殃害白雲盡處是青山行人更在青山外月林觀一竿絲線兩金魚不犯清波意自殊斜拽蓑衣遮蓋後空餘明月滿江湖石溪月一箭暗穿紅日影雙鵰已落碧雲端不知李廣無玄妙多向弓弦發處看閑極雲溈山見尼劉鐵磨來師曰老牸牛汝來也磨曰來日臺山大會齋和尚還去麼師乃放身作臥勢磨便出去頌曰曾騎鐵馬入重城勑下傳聞六國清猶握金鞭問歸客夜深誰共御街行雪竇顯百戰功成老太平優游誰肯共爭衡玉鞭金馬閒終日明月清風富一生天童覺老牸牛來到此間明朝大會去臺山白雲一曲知音少樵唱漁歌自往還張無盡續收主人無德客無機石火光中閃電飛同死同生同得失此心能有幾人知中菴空雲巢夢斷月華秋玉女翻身過斗牛卸却花冠歸舊隱玄途鳥道未容收足菴鑒共樂昇平道泰時相逢終不展鎗旗隨宜淡飯清茶外困臥閒行幾箇知無凖範岸草青青得自由等閒牽著便昂頭通身露出一般白莫是山前水牯牛雪巖欽打鼓弄琵琶相逢一會家陽春同唱罷蘸雪喫冬瓜雲衲慶增收溈山因僧問如何是百丈真師下禪床叉手立曰如何是和尚真師却坐頌曰百丈狸奴面溈山鬼眼睛見人空解咲弄物不知名松源岳老婦臨粧絳點唇人前自逞好精神顰眉冷笑渾相似不顏傍邊掩鼻人石帆衍增收溈山問仰山即今事且置古來事作麼生仰叉手近前師曰猶是即今事古來事作麼生仰退後立師曰汝屈我我屈汝仰便禮拜方菴顯云仰山進前退後洞古明今溈山因甚道彼此相屈乃頌曰相見錦江頭相携上酒樓會醫還少病知分不多愁師資會遇意何深驀地臨機問古今叉手近前還退後曾經百鍊見真金本覺一溈山坐次仰山香嚴侍立師舉手曰如今恁麼者少不恁麼者多嚴從東過西立仰從西過東立師曰這箇因緣三十年後如金擲地相似仰曰亦須是和尚提唱始得嚴曰即今亦不少師曰合取狗口頌曰一窟金光師子兒相將無事共遊嬉同時啐知機變鳳轉龍盤也大奇本覺一溈山垂語辨龍蛇一對驪珠絕點瑕師子窟中無異獸嘉聲動地徧天涯隱靜儼象王嚬呻師子哮吼踞地盤空移星換斗坐斷舌頭合取狗口一回擲地作金聲九曲黃河徹底清南興待得郎來月已西寒暄不道醉如泥五更又欲向何去騎馬出門烏夜啼寂窓照增收溈山坐次仰山入來師以兩手握拳相交示之仰作女人拜師曰如是如是頌曰仰山自外纔方入兩手相交復握拳寂子深深女人拜謝師特為老婆禪本覺一佳人十八正嬌癡一曲堂前舞柘枝祇有五郎知雅態更無人道柳如眉慈受深芙蓉月向懷中照楊柳風來面上吹夜半庭前柘枝舞天明羅袖濕臙脂心聞賁增收溈山方丈內坐次仰山入來師曰寂子近日宗門令嗣作麼生曰大有人疑著此事師曰寂子作麼生曰慧寂祇管困來合眼健即坐禪所以未曾說著在師曰到這田地也難得曰據慧寂所見祗如此一句也著不得師曰汝為一人也不得曰自古聖人盡皆如此師曰大有人笑汝恁麼祇對曰解笑者是慧寂同參師曰出頭事作麼生仰繞禪牀一帀師曰裂破古今頌曰宗門中令嗣合眼坐禪處平地打毬子急須著眼兩挑挑得上三築築不住築得住依前輥向毬門去石溪月增收溈山問仰山妙淨明心汝作麼生會曰山河大地日月星辰師曰汝祇得其事曰和尚適來問甚麼師曰妙淨明心曰喚作事得麼師曰如是如是頌曰妙淨明心一句全真山河大地日月星辰舒肝瀝膽照徹古今箇中如不昧徧界是黃金雪竇宗增收溈山因僧問如何是祖師西來意師竪起拂子後有僧到王常侍處舉前話王曰彼中兄弟如何商量曰即色明心附物顯理理曰不是這箇道理上座快歸溈山去某甲寄一封書與和尚僧得書馳上師師開書見一圓相相中書日字師曰誰知千里外有箇知音仰山侍立乃曰雖然如是也祇是箇俗漢師曰子又作麼生仰作圓相於中書日字以脚抹却師乃大笑頌曰南星北斗忽移位四海九州如鼎沸波斯匿王鼻拄天樓至如來脚踏地保寧勇竪起拂子封白紙千里誰知有知己行人莫與路為讎四海五湖王化裏別峯印增收溈山因僧問如何是道師曰無心是道曰某甲不會師曰會取不會底好曰如何是不會底師曰祇汝是不是別人復曰今時人但直下體取不會底正是汝心正是汝佛若向外得一知一解將為禪道且沒交涉名運糞入不名運糞出污汝心田所以道不是道頌曰雪中送炭堪為喜醬裏添鹽更是佳往往盡隨言語轉却同蛙步𩥇泥沙東叟頴溈山問仰山什麼處來曰田中來師曰田中多少人仰插鍬子叉手而立師曰南山大有人刈茅仰鍬子便行玄沙云當時便踏倒鍬子頌曰溈山問處少知音插地酬他佛祖沈踏倒玄沙傍不肯免教蒼翠帶春深投子青淺種深耕正及時入泥入水更同誰南山茅草多人刈獨是爺兒兩箇知保寧勇借問親從甚處來插鍬叉手口慵開雖然不犯當頭令爭奈音聲徧九垓成枯木盡道溈山父子和插鍬猶自帶干戈至今一井明如鏡時有無風帀帀波黃龍震老覺情多念子孫而今慚愧起家門是須記取南山語鏤骨銘肌共報恩天童覺金鞭擊動蒼龍窟吐霧拏雲出海門溟渤吸乾天上去空餘雷電滿山川佛心才數目分明舉即難衲僧無不膽毛寒須知別有壺中路但向須彌頂上看龍門遠插鍬叉手異何同要顯全機立大功雖然有數通呈了留得高傳振祖風楚安方續收叉手當𮌎鍬插深幾人遺劒刻舟尋面前水牯全頭角田裏生涯自古今雪後始知松柏操事難方見丈夫心刈茅盡是南山事達磨休言在少林佛鑑懃試問田中有幾人插鍬叉手意分明可憐不逐南山去撒手歸家罷問程佛性泰插鍬叉手事希奇誰識溈山父子機回首南山山下路刈茅人去已多時文殊道賊火相逢恰五更見成贓物不須爭暗中多少都分了天曉依然各自行無凖範一日頻來三五度有時歡喜有時瞋改頭換面休疑著元是尖簷帽下人虛堂愚增收溈山坐次仰山問和尚百年後有人問先師法道如何祇對師曰一粥一飯曰前面有人不肯又作麼生師曰作家師僧仰便禮拜師曰逢人不得錯舉慧海儀曰自古及今多少人下語道嚴而不威恭而無禮橫按拄杖竪起拳頭若只恁麼如何知得他父子相契處山僧今日也要諸人共知乃頌曰莫分彼我彼我無殊困魚止濼病鳥棲蘆逡巡不進泥中履爭得先生一卷書溈山在百丈因司馬頭陀問野狐話作麼生會師以手撼門扇三下陀曰太麤生師曰佛法不是這箇道理頌曰因果雙行孰共知茫茫四海路多岐擡頭拶出初生月便効張公畫翠眉佛心才春至自花開朱顏安在哉可憐園裏色不入鏡中來龍門遠盲人來與啞人抓說著無因話病苗一下被他抓著後平生癢處一時消佛燈珣增收溈山因仰山問如何是西來意師曰大好燈籠曰莫只這個便是麼師曰只這箇是什麼曰大好燈籠師曰果然不識頌曰覿面提來付與伊分明此意沒東西腕頭有力千鈞重誰道通身是水泥雪巖欽溈山問仰山終日與子商量成得箇什麼邊事仰空中畫一畫師曰若不是吾終被子惑頌曰盡日商量古佛言當時一畫却成冤至今尚有溈山在莫道宗枝絕子孫佛印元松直棘曲烏玄鵠白末後商量空中一畫若言向上玄關走殺諸方禪客地藏恩續收父子雖親共較量𮌎中爭信有刀鎗當時一畫畫得斷徧界葛藤無復生簡翁敬增收溈山一日見野火乃問道吾還見火麼曰見師曰從何處起曰除却經行坐臥請師別致一問來師便休去頌曰野火連天誰云不見道吾有準聊通一線坐臥經行風力所轉妙辯縱橫機輪掣電還會麼若也擬議事久多變大圓智連天野火了無涯起處猶來辨作家眼裏瞳人雙翳盡面前徧界絕空華道吾老也堪誇旦道畢竟從什麼處起汲水僧歸林下寺待船人立渡頭沙佛燈珣野火炎炎何處起紫烟紅𦦨便燒人須知坐臥經行裏見得無殊用得親石溪月增收溈山因僧問如何是露地白牛師曰叱叱僧云噉餧何物師曰喫喫頌曰白牛生下是白牛現起堂堂莫外求是我不能藏委曲直下分明是一頭般若柔白牛露地沒遮闌在處橫眠在處閒水草恣情甘美足醍醐純出潤良田汾陽昭玉角霜毛露地牛人間天上顯蹤由不同雪嶺時時吼肯若溈山日日收冷吸月光無影像徧經塵國任遨遊牧童忽上須彌頂指出乾坤那一頭洞山聰露地白牛起問端隨緣叱叱齒牙寒不知飲是何物喫喫直教滄海乾天童覺增收溈山問僧甚處來曰西京來師曰還得西京主人公書來麼曰不敢妄通消息師曰作家師僧天然猶在曰殘羮餿飯誰人喫之師曰獨有闍黎不喫僧作嘔吐勢師曰扶出者病僧著僧便出去頌曰莫怪相逢無信息誰能長作置書郵直饒說盡千般事那箇心中得到頭懶菴樞
