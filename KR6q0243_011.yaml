body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第三世之二南嶽下第二世之二南泉問黃蘗定慧等學明見佛性是否蘗曰十二時中不依倚一物師曰莫便是長老見處否蘗曰不敢師曰漿水錢且置草鞋錢教誰還頌曰兩陳交鋒戰不難埋兵調鬬何人曉只解輪鏘趂勢來喪身失命有多少海印信獵獵奔馳勢不休草深風徑更堪愁翻身師子無尋處空使行人說路頭佛慧泉昨夜銀蟾誇箕尾驀然一陳天風起卷盡千重萬重雲碧空寂寂凝如水佛鑑勤問答分明已切磋幾人於此見譊訛少年曾決龍蛇陳老倒還聽稚子歌龍門遠續收水乳不分菽麥難辨擔帶病深改移功淺十二時中不依倚明見佛性有此理漿水錢在草鞋裏月堂昌李下不得整冠瓜田豈可納履行藏自要分明免見傍人說你懶菴慪增收南泉因僧問師歸丈室將何指南師曰昨夜三更失却牛天明失却火五燈會元作天明起來失却火頌曰昨夜三更失却牛天明起來失却火腰未繫兮鞋未穿面不洗兮頭不褁保寧勇奴顏婢膝走人間羞見羊裘七里灘文叔雖為天子貴子陵元作故人看希叟曇丈室端居無隱乎更何言語可名模失牛遭火分明道還覺眉毛在也無寶葉源南泉因東西兩堂各爭猫兒師遇之白衆曰道得即救取猫兒道不得即斬却也衆無對師便斬之趙州自外歸師舉前語示之州乃脫草履安頭上而出師曰汝適來若在即救得猫兒也頌曰兩堂上座未開盲猫兒各有我須爭一刀兩段南泉手草鞋留著後人行汾陽昭兩堂俱是杜禪和撥動煙塵不奈何賴得南泉能舉令一刀兩段任偏頗雪竇顯二公按圓來問趙州長安城裏任閒遊草鞋頭戴無人會歸到家山便即休手把狸奴定死生禪人空使口相爭趙州救得成何事恰似天明打五更佛印元提起兩堂應盡見拈刀要取活狸奴可憐皮下皆無血直得橫尸滿道途白雲端二狸奴夜靜自舒張引手過頭露爪長王老室中巡邏了狼忙走出恐天光雪刃含光射斗牛不唯天地鬼神愁命根落在南泉手直下看看兩段休保寧勇二狸奴頭上角重生王老門前獨夜行天曉不知何處去楚山無限謾崢嶸一刀兩段南泉令當頭高著趙州關劈面若無宗正眼又隨流水落人間照覺總狼煙起處看兵機不是將軍孰辨伊兩段一刀垓下令威風千古霸雄基圓通仙當機不薦眼如癡豈辨鋒鋩未露時日暮草鞋頭戴去暗中拊掌笑嘻嘻成枯木作者縱橫斬萬機趙州頭戴草鞋時當臺寶鑑無私燭離匣金刀豈亂揮羅漢南伯牙之絃鸞膠可續調古風淳霜月可掬南泉南泉龍象繼躅佛心才二草鞋頭戴與誰論四海無風浪自平解道曲終人不見江頭嬴得數峯青五色狸奴盡力爭及乎按劒總生盲分身兩處重相為直得悲風動地生龍門遠二安國安家不在兵魯連一箭亦多情三千劒客今何在獨許將軍建太平要得狸奴覿面酬渾如鉗口鎖咽喉一刀兩段從公斷直得悲風動地愁佛燈珣二堂前飯店重新販屋裏揚州勝外求頭戴草鞋高跨步晚春江景也風流斬了猫兒問諗師草鞋頭戴自知時兩堂不是無言對只要全提向上機踈山如南泉提起為諸人自是諸人眼不親付與趙州呈好手拈來覿面便翻身楚安方續收捕鼠有功人競愛霜刀揮處罷相爭太平本是將軍致不許將軍見太平石明縮水酒越濃負心人越窮鐵剛刀自利不用苦磨礱草鞋頭戴今何在我見牽來劈面舂闡提照石裏藏金誰辨別遊人但見蘚痕斑却被石人窺得破鐵船載入洞庭山雪竇宗放去若雷奔收來如掣電不識李將軍徒學穿楊箭南堂興二趙州牙如劒樹南泉口似血盆兩箇無孔鐵槌打就一合乾坤釋迦老子不會問取彌勒世尊手握乾坤殺活機縱橫施設在臨時滿堂兔馬非龍象大用堂堂總不知胡文定公安國南泉提起下刀誅六臂修羅救得無設使兩堂俱道得也應流血滿街衢廣德光孝慜提起分明斬處親落花飛絮撲行人頭戴草鞋出門去四月圓荷葉葉新檇李楶青蛇提起血腥臊幾箇男兒有膽毛直下血流猶未覺舉頭還見鐵山高簡堂機南泉一刀斬了趙州戴履摩挲雖然子承父業滿地老鼠奈何典牛游當日臨崖看滸眼至今觀水憶南泉趙州頭戴草鞋去漁翁腰帶好牽船龍牙言克己堂前開飯店股肱屋裏販揚州頭戴草鞋呈醜拙湊成一段好風流或菴體手按吹毛豈易為兩堂要活死猫兒趙州上樹安身法多少傍人眼搭𭿇別峯印南泉揮劒斬猫兒殺活唯憑作者知權柄一朝如在手分明看取令行時尼無著總草鞋頭戴有譊訛諸老機鋒會得麼道泰不傳天子令時清休唱太平歌一刀兩段絶譊訛天下禪和不奈何頭戴草鞋重漏泄知恩者少負恩多木菴永趙州若在倒行此令奪却刀子南泉乞命無門開盡力提持只一刀狸奴從此脫皮毛血流滿地成狼籍暗為春風染小桃無凖範一刀成兩段釋得二僧爭草鞋頭戴出猫兒無再生橫川珙增收南泉因僧問訊叉手而立師曰太俗生其僧便合掌師曰太僧生僧無對頌曰合掌太僧叉手太俗撒手出門山青水緑換步移身振古風木人共唱無生曲大洪遂南北東西無不利令人深愛老南泉眉毛廝繫如相似鼻孔遼天不著穿龍門遠南泉示衆曰王老師要賣身阿誰要買一僧出曰某甲買師曰他不作貴價不作賤價汝作麼生買僧無對臥龍代云屬某甲去也禾山代云是何道理趙州代云明年來與和尚縫箇布衫頌曰王老明明要賣身一時分付與傍人可憐天下爭酬價請續此句佛印元貴賤非同價不常箇中交道沒商量趙州布衫應時用一任間人說短長泉太道南泉鋪席大開張差寶希珍壓市行競買雖多酬價少至今天下錯商量野軒遵賣身王老難為價貴賤俱非不易酬若使當時無退悔喚來分付與園頭海印信王老哀哉不惜身臨危將賣與何人若無令子輕酬價往往一年空過春保寧勇續收不作貴兮不作賤翻覆高低隔一線利害分明說向人憐悧衲僧見不見呆堂定南泉與歸宗麻谷同去參禮南陽國師先於路上畫一圓相曰道得即去宗便於圓相中坐谷作女人拜師曰與麼則不去也宗曰是什麼心行師乃相喚曰不去禮國師玄覺云只如南泉恁麼道是肯底語不肯語雲居錫云比來去禮拜國師南泉為甚麼却相喚回且道古人意作麼生頌曰國師欲見義多般圓坐端居拜請看不去同音聞便解久經行陳奪旗幡汾陽昭由基箭射猿繞樹何太直千箇與萬箇是誰曾中的相呼相喚歸去來曹溪路上休登陟復云曹溪路坦平為什麼休登陟雪竇顯三人同行必有我師焉擇其善者而從之其不善者而改之翠巖真三箇同人去選官偶值清風明月夜或吟或詠或彈琴夜靜更䦨猶未捨忽覺天明歸去來他時自有知音者海印信漫漫大地盈尺雪江湖一片難分別漁父披蓑月下歸誰道夜行人路絶保寧勇三人禮拜南陽去半路抽身信已通休論東西與南北此心千里自同風草堂清巧奪豪拈浪苦辛誰能於此辨疏親落花芳草空歧路細雨斜風不見人旻古佛珍重南陽好在哉三人半路不空回道存目擊猶多事若遇知音請舉來雲巖因同氣相求事可論一回見面一歡情兩行何處閒文字一隊誰家好弟兄龍門遠同坑無異土千古少人知月下休相喚還從舊路歸開福寧南泉麻谷與歸宗道眼元來總不通去禮國師瞻相好區區只到半途中踈山如續收手擕花鼓到城根反著麻鞋過短門笑把柴頭書古字大家來步月黃昏月堂昌野店齊餘聊問津作家竿木鎮隨身相逢盡道休官去林下何曾見一人尼無著總氣直語直眼親手親峯巒競秀紅紫爭春神通妙用施呈盡要見國師猶隔津且菴仁金針繡出玉鴛鴦石女擎來不覆藏剛被木人偷眼至今兩兩不成雙萬菴柔各將財本去經營上國如天好趂晴未出門時先算帳如何得到鳳凰城虛堂愚圓相中間坐底誰便施女拜各呈機國師道大遍天下未許尋常人得知橫川珙增收南泉玩月次趙州指月問曰何時得恁麼師曰王老師二十年前亦恁麼來曰只今作麼生師便歸方丈頌曰劒落寒潭謾刻舟霜花浪急使人愁若憑言語論高下嬴得南泉一默酬虎頭上座趙州捧出菱花鏡王老親拈白玉槌一擊當陽令瓦碎此心能有幾人知幾人知兩箇分明是赤眉風前月下揚家醜笑倒靈山老古錐慈受深皎月團團麗碧天趙州王老玩階前二人心眼俱相似光彩從來共宛然本覺一劒落寒潭謾刻舟霜花浪急使人愁漁翁罷釣歸深塢一隻鴛鴦落渡頭上方嶽增收南泉因趙州問道非物外物外非道如何是物外道師便打州捉住棒云已後莫錯打人去師曰龍蛇易辨衲子難謾聯燈録與此稍異乃示衆云道非物外物外非道趙州出問如何是物外道師便打州捉住云和尚莫打某甲已後錯打人去在師擲下棒云龍蛇易辨衲子難謾頌曰軟纏藏鋒入陳來盡將擒下眼瞪開死生一決英雄士文武雙行將相才保寧勇龍蛇能易辨衲子最難謾性淨秋空闊心清巨海寬天涯毫末見世界掌中觀萬法不為侶西江一吸乾南堂興增收南泉住菴時有一僧到菴師向其僧道某甲上山待到齊時作飯自喫了送一分來山上少時其僧自喫了却一時打破家事就牀臥師待不見來遂歸見僧臥師亦去一邊而臥僧便起去師住後曰我往前住菴時有箇伶俐道者直至如今不見頌曰吹毛劒利逆水波清丈夫志氣不順人情君征塞北我伐西秦千古萬古共樂升平南堂興短袴長衫白苧巾咿咿月下急推輪洛陽路上相逢著盡是經商買賣人虛堂愚斬猫機用未為過猶勝厨中打粥鍋才有此心招此報惡人無奈惡人何寶葉源增收南泉謂座主曰你與我講經得麼主曰和尚為某甲說禪某甲與和尚講經師曰不可將金彈子換銀彈子去頌曰盤走珠兮珠走盤當機脫略好生觀世人知貴不知價信手拈來也不難正堂辨南泉因僧問和尚百年後向什麼處去師曰山下作一頭水牯牛去曰某甲隨和尚去還得也無師曰汝若隨我即須銜取一莖草來頌曰類中難辨要分明戴角披毛卒未醒銜取草來方定動頭頭物物自真靈汾陽昭行履從來異類中不知頭角與誰同若銜水草時相見擺尾搖頭四野風佛印元異類中行得自由拽穿鼻孔卒難收草枝銜得相逢處高臥深雲任白頭佛慧泉南泉在山上刈茅次有僧問南泉路什向麼處去師拈起鎌子曰我這鎌子是三十文錢買曰我不問這箇南泉路向什麼處去師曰我用得最快頌曰茆鎌使得快如風三十青蚨建大功南泉向上路難到到者方知觸處通照覺總茆鎌三十文錢買覿面高提第一籌直下便知歸去路也須更上一層樓圓通仙二撥草瞻風探祖禪誰知草裏有南泉分明一句無私語徹骨風生天地寒王老真機迅若風示人方便孰能通茆鎌舉起神鋒露驚得泥牛過海東智海清問路分明指路頭青蚨三十不輕酬用時最快無機巧無味之談塞衆流真如我這鎌子用得快當時三十文錢買南泉門下路歧通寄語行人著精彩天童覺匇匇禪客問南泉欵段徒勞痛下鞭今日為君重漏泄翩翩孤鴈下遙天道場如增收南泉曰三世諸佛不知有狸奴白牯却知有頌曰喫官酒臥官街當處死當處埋沙場無限英雄漢堆山積嶽露尸骸大溈智三世諸佛不知有一一面南看北斗狸奴白牯却知有戴角擎頭師子吼四稜塌地又團欒八角磨盤空裏走擬推尋劈脊摟拈得鼻孔失却口為問普化一頭驢何似子湖一隻狗圓悟勤三世諸佛不知有老老大大外邊走眼皮蓋盡五須彌大洋海裏翻筋斗徑山杲二狸奴白牯却知有瀑布不溜青山走堪笑無端王老師錯認簸箕作尉斗越鳥巢南枝胡馬嘶北風狸奴并白牯寸步不曾通千山都坐斷萬派盡朝東天王才合掌那吒撲帝鍾或菴體野老祭江神乞兒打筋斗莫作兩般看等是揚家醜村翁銛增收南泉魯祖杉山歸宗四人離馬祖處去各住菴於路分袂處師插下拄杖曰道得也被這箇礙道不得也被這箇礙歸宗拽拄杖打師一下曰只是者箇王老師說什麼礙與不礙魯祖曰只此一句大播天下宗曰還有不播者麼祖曰有宗曰作麼生是不播者祖作掌勢頌曰同門曰朋同志曰友同門同志始終相守長大分離得緣好醜同條生也大家知同條死也誰知有一句分明播天下無味之談塞人口大圓智難兄難弟一二三四同母而生箇箇相似竿木隨身逢場作戲莫言礙塞不得一句播天播地佛鑑勤礙與不礙龍吟霧起播與不播蠅附驥尾南北東西千里萬里俊哉正覺顯增收南泉巡堂次牽一頭牛入堂首座以手拊牛背一下師便休去趙州以草二束放在首座前頌曰等將草料好供看何故皮毛要一般惹起羣中相似者翻令頭角不完全寶葉源增收南泉訪百丈丈問甚處來師曰江西來丈曰還將得馬大師真來麼師曰只這是丈曰背後底𠰚師拂袖便去頌曰八面當風祇這是拂袖之談動天地堪愛賣身王老師不作賤兮不作貴龍門遠兄難兄弟難弟馬祖真只這是撼動西江十八灘水面無風波自起石溪月增收南泉因趙州問明頭合暗頭合師便歸方丈州到僧堂前曰堂頭老漢被我一問直得無言可對首座曰莫道和尚無語自是上座不會州便掌曰這一掌本是堂頭老漢喫五祖戒云正賊走却邏賊人喫棒又云南泉當斷返招其亂頌曰大事當陽已皎然十分須是更周圓堂中上座黑如漆冷地為誰喫暗拳保寧勇增收南泉示衆曰王老師自小養一頭水牯牛擬向溪東牧不免食他國王水草向溪西牧亦不免食他國王水草如今不免隨分納些些總不見得頌曰溪東去溪西去難免官家苗稅賦直饒隨分供輸未解牽牛去住楊無為垂垂楊柳暗溪頭不問東西却自由幾度醉眠牛背上數聲橫笛一輪秋懶菴樞南泉水牯自天然隨分些些任變遷大笑一聲天地窄更無佛法與人傳月林觀不放溪東西隨分納些兒冷暖只自知分明說向誰木菴永南泉水牯忘鞭索南北東西共一家王稅及時都納了牧童橫笛遠山斜天目禮不如隨分納些些喚作平常事已差緑草溪邊頭角露一蓑煙雨屬誰家鐵牛印增收南泉一日因齊次乃自將生盤去首座前出生時杉山堅和尚為首座乃曰無生師曰無生猶是末師才行數步座乃召曰長老長老師回顧曰作麼座曰莫道是末頌曰古老巡堂親掠生渡水行舟不易耕莫道無生猶是末纖毫不了亂縱橫智門祚增收南泉問座主講得甚麼經曰彌勒下生經師曰彌勒甚麼時下生曰現在天宮未來師曰天上無彌勒地下無彌勒洞山舉問雲居居云天上無彌勒地下無彌勒未審誰與安名洞山被問直得禪牀振動乃云吾在雲巖曾問老人直得火爐振動今日被子問直得通身汗流頌曰禪牀驚振被搽糊惹得兒孫不丈夫拄杖劈頭連打出也教知道赤鬚胡龍門遠增收雲居悟云昔日東山和尚謂衆曰天上無彌勒地下無彌勒十字街頭被人喚作賊且道此人被他喚作賊歡喜則是煩惱則是元來也不歡喜亦不煩惱何故為伊有箇著到處乃頌曰被人喚作賊吞聲便飲氣雖然言語惡真箇好滋味不向如來行處行丈夫自有衝天志上天下地無彌勒安名立字是何因黃金自有黃金價終不和沙賣與人文殊道增收南泉因趙州問離四句絶百非請師道師下座歸方丈州曰這老和尚每常口𭺗𭺗地及其問著一言不措侍者曰莫道和尚無語好州便打一掌云這一掌合是王老師喫頌曰離四句絶百非作者相諳識得伊跳下禪牀便歸去從他子搏天飛智門祚南泉一日不赴堂侍者請赴堂師曰我今日在莊上喫油糍飽曰和尚不曾出入師曰汝去問莊主者方出門忽見莊主歸謝和尚到莊喫油糍頌曰咄哉王老師赤窮身也賣喫些油糍歸至今被人怪典牛游不出方丈門已到莊上坐好一飣油糍至今咬不破萬菴如騎虎穿市過把火去偷猪主人開眼睡鄰舍呌失驢卍菴顏偷喫油糍賣弄口觜年老成魔謾神鬼潛菴光阿魏無真水銀無假老倒南泉可知禮也復菴封杭州鹽官齊安國師嗣馬祖一日喚侍者曰將犀牛扇子來者曰破也師曰扇子既破還我犀牛兒來者無對投子代云不辭將出恐頭角不全資福代作圓相心中書牛字石霜代云若還和尚即無也保福云和尚年尊別請人好頌曰犀牛扇子用多時問著元來總不知無限清風與頭角盡隨雲雨去難追雪竇顯可憐一柄犀牛扇謾道曾遭已破除無限清風隨手處卓然頭角出寰區白雲端扇子破索犀牛圈欒中字有來由誰知桂轂千年魄妙在通明一點秋天童覺老師底死索犀牛用處其誰得自由侍者不知頭角具鼻根繩索被他收祖印明明月冷相照清風卒未休鹽官無限意何用覔犀牛草堂清犀牛扇子用多年歷掌清機授手傳頭角不全收拾取雨餘風月滿長川佛燈珣續收扇上犀牛從古畫索來既破要元牛縱教戴子重描出不是當時那一頭勝因戲魚靜炎暑蒸人汗似湯鹽官用底豈尋常輕搖休問犀牛在拈出清風宇宙涼虎丘隆犀牛扇子有來由幾度拈來幾度休荷葉亂傾珠的皪一番雨過碧溪頭懶菴樞扇子分明都破了鹽官却又索犀牛須知侍者難開口無可還他即便休天目禮增收鹽官一日謂衆曰虗空為鼓須彌為椎甚麼人打得衆無對有人舉似南泉泉云王老師不打這破鼓法眼別云王老師不打頌曰南泉王老太無端却逐鹽官作樂官西祖令嚴行禁止免他禪會錯欣歡南巖勝虗空為鼓須彌為椎要打便打莫問是誰應菴華國師費力置面鼓猶勝塗毒萬千千解打南泉非好手至今天下勿聲冤野牛平增收鹽官因僧問如何是本身盧舍那師曰與老僧過淨瓶來僧將淨瓶至師曰却安舊處著僧安了復來問如何是本身盧舍那師曰古佛過去久矣頌曰兩手分明過淨瓶不知身已在隍城直饒便具金剛眼也較溈山半月程上方益鳥之行空魚之在水江湖相忘雲天得志擬心一絲對面千里知恩報恩人間幾幾天童覺廬山歸宗智常禪師嗣馬祖一日剗草次有講僧來參忽見一蛇過師以鋤斷之僧曰久嚮歸宗元來是箇粗行沙門師曰你粗我粗曰如何是粗師竪起鋤頭曰如何是細師作斬蛇勢曰與麼則依而行之師曰依而行之且致甚處見我斬蛇僧無對頌曰廬嶽宗師接上機斬蛇特地施慈悲高茆座主驚忙怕却道粗心錯是非汾陽昭大用縱橫掣電機爍迦羅眼尚膠𥻿迷徒夢裏爭唇吻却憶隨他去一隨海印信千尋竿上翻筋斗大海波心擲釣鈎大體還他肌骨好不搽紅粉也風流南華昺續收斬蛇却非小小事直是教他脫苦輪座主高茆心未泯如何胡亂妄通言橫川洪增收歸宗示衆曰吾今欲說禪諸子總近前大衆進前師曰汝聽觀音行善應諸方所僧問如何是觀音行師彈指曰諸人還聞麼曰聞師曰一隊漢向這裏覔箇什麼以拄杖打趂呵呵大笑歸方丈頌曰無學彈指超圓通耳根淨透出聞不聞妙哉觀音行棒頭指出金剛王嶮惡道中為津梁圓悟勤增收歸宗因泥壁次白舍人來師便問君子儒小人儒白曰君子儒師乃打泥盤一下白遂過泥與師師接得便使良久云莫便是快俊底白侍郎否曰不敢師曰祇有過泥分頌曰堂堂非是小人儒得得深雲訪隱居已與過泥殊不恥更何言外見親疏寶葉源增收歸宗因小師辭乃問甚處去曰諸方學五味禪去師曰諸方有五味禪我這裏只有一味禪僧便問如何是和尚一味禪師便打僧曰會也會也師曰道來道來僧才開口師又打頌曰五味與一味喫了須噫氣金輪峯下令行時凜凜清風誠可畏石明私醞香醇價又輕至今官路少人行歸宗一味如連苦蹉過叢林幾後生長靈卓增收歸宗因僧問如何是玄旨師曰無人能會曰向者如何師曰有向即乖曰不向者如何師曰誰求玄旨又曰去無汝用心處曰豈無方便門令學人得入師曰觀音妙智力能救世間苦曰如何是觀音妙智力師敲鼎蓋三下曰子還聞麼曰聞師曰我何不聞僧無語師以棒趂下頌曰三聲鼎蓋普門開苦海勞生喚不回九十春光今又半空飛花片點莓苔絶岸湘增收歸宗因僧問如何是觸目菩提師翹足曰會麼曰不會師曰三箇見在一任選取頌曰觸目菩提不撒沙示渠三箇更周遮衲僧相見呵呵笑春鳥喃喃罵落花海印信歸宗因江州刺史李渤問嘗聞須彌納芥子渤則不疑芥子納須彌莫是妄談否師曰人傳史君讀萬卷書是否曰不敢師曰身如椰子大萬卷書向甚麼處著李俯首而已頌曰放開日月明把定乾坤黑一劄不回頭滿地生荊棘龍宮海藏兮非多石火電光兮非急君不見紫霄峯下墨池邊八駿如風追不及佛慧泉芥納須彌特地疑琴書拋下扣禪扉忽聞萬卷難藏處瞥轉神機唯自知唯自知丹桂和根拔得歸佛心才芥納須彌驗祖風清機歷歷妙難窮要知萬卷書來處跳出當人智鑑中禾山方續收用盡自己心笑破他人口八角磨盤空裏走金毛師子變作狗喝一喝雪堂行萬卷詩書一時頭角才跨宗門便施謀略古歸宗真老作只顧滿彎弓不知誰見雙鵰落絶毫絶釐如山如嶽堂堂氣宇冠儒林浩浩清風播寥廓癡禪妙增收韶州乳源禪師嗣馬祖上堂西來的的意不妨難道大衆莫有道得者出來試道看有僧出才禮拜師便打曰是什麼時節出頭來後人舉似長慶慶云不妨不妨資福代云為和尚不惜身命頌曰祖意西來豈易量擡眸已是錯承當闍梨不解知時節開眼堂堂入鑊湯此山應西來的的意何如舉唱多憐在半途勾賊到門還破賊信知身佩辟兵符趙善期通判
