body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第六世之四清源下第五世之二增收鳳翔府天蓋山幽禪師嗣夾山有一院名無垢淨光造浴室有人問既是無垢淨光為甚麼却造浴室僧無語後請師代師曰三秋明月夜不是騁團圓頌曰雖然答盡深深意爭奈投機句未親欲會本來無垢的更須入水見長人丹霞淳太原海湖禪師嗣夾山因有人請灌頂三藏供養敷座訖師乃就彼位坐時有雲涉座主問曰和尚甚麼年行道師曰座主近前來涉近前師曰祇如憍陳如是甚麼年行道涉茫然師喝曰這尿床鬼頌曰多是從人學得來一生空把口胡開欲窮此片虗明地七佛前前總不該丹霞淳鄂州巖頭全奯禪師嗣德山一日參德山方跨門便問是凡是聖山便喝師禮拜有人舉似洞山山曰若不是奯公大難承當師曰洞山老人不識好惡錯下名言我當時一手擡一手搦頌曰巖頭老漢凡聖孰辨半僧半俗可貴可賤三文取箇黑撈波江邊相喚摝鰕蜆法雲秀平川走兔放蒼鷹一搦便㗖雙眼睛毒手奪來人買去奈何斤兩未分明保寧勇一喝驚天動地雷海翻太華洞然開巖頭膽喪魂飛也謾道當時手搦擡踈山如續收好手呈機不露鋒慣將雙劒定雌雄忽雷迸出驚天地華岳三峯倒卓空湛堂深大鵬搏風蒼龍出海手擡手搦日上月下霜雪嚴凝識歲寒雙陸盆邊須喝采最菴印前箭猶輕後箭深無限平人被陸沉箇裏豁開天地眼吹毛拈起任橫行木菴永增收巖頭初參德山展坐具禮拜次山以拄杖挑却坐具於階下師下階拾起搭向背上便去參堂山曰不肯子放只肯子收頌曰動絃別曲葉落知秋不肯子放只肯子收來年更有新條在惱亂春風卒未休遯菴演增收巖頭示眾曰吾教意如塗毒鼓擊一聲遠近聞者悉皆喪身失命時有小嚴上座出問云如何是塗毒鼓師兩手按膝亞身云韓信臨朝底頌曰佛法無情報爾曹忽生忽殺在吹毛若教韓信得妙訣自是深明防漢高南巖勝巖頭因僧問古帆不掛時如何師曰後園驢喫草頌曰槌打不碎火燒不著天上人間何處安泊阿呵呵是什麼莫咬破須爛嚼海印信古帆不掛是巖頭月冷風高下直鈎誰見後園驢喫草脫籠卸䭾飽大洪遂後園驢喫草一老一不老驀地撞山來闘湊得恰好徑山杲後園驢喫草莫隨言語討跳上驀腰騎來往長安道鼓山珪風信不來春色老却憶後園驢喫草滿天明月贈行人野客溪邊歸路早楚安方續收後園驢喫草可憐無限虗生老半夜盲人問故鄉不知身在長安道雪竇宗後園驢喫草蘆花輥雪飛霜前雙白鴈孤影落天池塗毒策古帆未掛時後園驢喫草日短苦夜長行人須及早雪菴瑾巖頭因僧問古帆掛後如何師曰小魚吞大魚頌曰古帆掛後更何疑學問依前又是迷大小二魚俱一海爭柰鈎頭餌不齊汾陽昭小魚吞大魚直路太縈紆古帆休更問處處得逢渠徑山杲小魚吞大魚門上釘桃符邪魔俱不入佛法也消除鼓山珪續收的的古帆已掛後小魚吞却大頭魚雖然李廣運神箭自古張顛解草書照堂一不動蒲帆問一言大魚却被小魚吞直從意外超唇吻始信巖頭無腦門天目禮巖頭因僧問塵中如何辨主師曰銅砂鑼裏盛油依傳燈所載頌曰塵中辨主最難明千人萬人少一惺銅砂鑼油今古淨與君拔却眼中釘汾陽昭塵中辨主眼分明特地尋方更點睛堪笑耆婆雖瞑眩至今南北絕人行佛印元礎潤天將雨雲開月正明漁翁閑引釣牽動一潭星海印信銅砂鑼裏滿盛油正是毗盧印後收更有塵中辨得主太平將將盡封侯雲溪菴銅砂鑼裏油清淨照見塵中舊主人寄語禪人猛參取莫教孤負此生身草堂清續收終日廛中走廛中渾大有堪笑五湖人衲衣貧抖擻大溈智銅砂鑼裏滿盛油生菜還他蘿蔔頭但看來年正月半家家門首掛燈毬佛鑑懃頂起砂鑼時身心都不見西風一陣來落葉兩三片塗毒策村飲夜歸來健倒三四五摩挲青莓苔莫瞋驚著汝息菴觀銅砂鑼裏滿盛油潦倒巖頭不識羞却向蟭螟眼睫上樓頭浪宕逞風流空叟印百萬雄兵入漢關威如猛虎陣如山單刀直取顏良首不是關公也大難無境徹塵中辨主問巖頭心識如何會得休鼻孔眼睛都要見銅砂鑼裏滿盛油橫川珙增收巖頭問欽山如何是真言欽曰南無佛陀耶頌曰隨機有問隨機答不是禪兮不是玄後代無端翻譯出却將梵語作唐言退耕寧增收巖頭凡有所問只噓一聲頌曰龍臥碧潭靜雲收皓月圓七星光燦爛誰薦未生前大洪遂增收巖頭因僧問路逢猛虎時如何師曰拶頌曰巖頭一拶虗空迸裂父子不傳神仙妙訣破菴先增收巖頭示眾云大凡唱教須從無欲中流出三句只是理論咬去咬住欲去不去欲住不住或時一向不去或時一向不住頌曰三文買箇撈波子摝蜆摝鰕經幾年逆順短長休要說誰家屋裏竈無烟虗堂愚巖頭值沙汰於鄂渚湖邊作渡子兩岸各掛一板有人過渡打板一下師曰阿誰或曰要過那邊去師乃舞棹迎之一日因一婆抱一孩兒來乃曰呈橈舞棹即不問且道婆手中兒甚處得來師便打婆曰婆生七子六箇不遇知音祇這一箇也不消得便拋向水中頌曰買賣交關直須當價若少分文定遭行罵休行罵遠近聞之成話欛海印信時展家風與眾殊探身虎穴有功夫拈橈擊處留無計夜靜同誰泛五湖三祖宗親兒棄了更無親撒手歸家罷問津呈橈舞棹波中客休向江頭覔渡人真如二老來無累亦無因獨寢高堂只此身除却江中混波客復誰還是不覊人咄哉箇老婆親兒不奈何富嫌千口少貧恨一身多楮衲秀舞棹呈橈意自殊相逢江上話程途親兒擲了獨歸去春水溶溶碧滿湖智海普融平舞棹呈橈古渡頭婆婆相見問來由何人拚得親生子拋向江心更不救上方益鄂陽江口擲釣絲摝蜆撈蝦不計時驀被老婆相借問藂林千古振雄規如今過在邪師客擺手相逢論棄兒意在目前如會得莫信傍人說是非佛燈珣借路經過常式事誰知祖禰累兒孫婆婆耐恨江頭棄留得佳聲四海聞月菴果親兒棄了復何言月在波心印碧天獨有一身無繫累困眠醒坐任隨緣疎山如續收鄂陽江上埀鈎線時節相逢錦鱗現拈來信手任縱橫逐浪隨波無顧戀大溈智一子親生步步隨呈橈舉棹指人歸老婆遭打機先露海岳掀翻動四維簡堂機一葉扁舟泛渺茫呈橈舞棹別宮商山雲海月俱拋棄嬴得莊周蝶夢長尼無著總相逢把手上高峯四顧寥寥天宇空一曲漁歌人不會蘆花飛起渡頭風無菴全舞棹呈橈逢賊脚扣舷三下親擒捉只這一枚都颺却棹歌歸去風濤落朴翁銛從來六箇不知音一箇全拋惡浪深義斷情忘無處覔三千剎海冷沉沉天目禮鄂渚渡頭窮鬼子全機錯在扣舷時何如別下一轉語救取婆婆第七兒南叟茙舞棹呈橈鄂渚邊驗人何苦結生冤自從賺了婆拋子誰敢拚身上渡船梓巖玉增收巖頭在鄂渚湖三文買箇黑撈波每日撈鰕摝蜆且恁麼過時僧舉似雪峯峯云窮鬼子道地快活也不徹頌曰且於湖畔撈鰕蜆不向滄溟釣巨鼇一葉扁舟一蓑笠閑眠閑坐任風濤海印信野水舟橫芳草渡人來舞棹或呈橈撈鰕摝蜆隨時過却向何時得六鼇水菴一巖頭因沙汰在甘贄家過夏補衣次贄行過師以針作劄勢贄遂整衣欲謝妻問云作什麼贄云說不得妻云也要大家知贄舉前話妻云此去三十年後須知一回飲水一回噎女子聞云誰知盡大地人性命被奯上座劄將去也頌曰針頭劄去幾人知婦兒女子莫猜疑聖凡命脉果何在以拂子擊禪床角云向此須明上上機長靈卓無孔笛子兩頭吹韻出青霄徹九維可憐一對冤家種人人鼻孔大頭埀佛燈珣不點自行不自撥轉伎倆天然機輪如箭如今分付當行家百歲光陰已不多若能直下猛提取天上人間爭奈何巳菴深夜半三更來討火我罵你兮你罵我相喚相呼歸未歸也有無衣草裏坐虗堂愚福州雪峯義存禪師嗣德山初參德山問從上宗乘學人還有分也無山打一棒曰道甚麼師曰不會至明日請益山曰我宗無語句實無一法與人頌曰此疾懷來沒量時尋醫求卜過多師濃煎一服通神散血汗滂流徹四肢保寧勇是法平等無高下伊余有分必相亞雖無一法輕與人棒下龍蛇從變化雲巖因雪峯與巖頭欽山至澧州鼇山鎮阻雪頭每日打睡師一向坐禪一日喚頭曰師兄師兄且起來頭曰作甚麼師曰今生不著便共文䆳箇漢行脚到處被他累今日到此又只打睡頭喝曰噇眠去每日床上坐恰似七村裏土地他時後日魔魅人家男女去在師點胷曰我這裏未穩在不敢自謾頭曰我將謂你他日向孤峯頂上盤結草庵播揚大教猶作這箇語話師曰我實未穩在頭曰若實如此據你見處一一通來是處與你證明不是處與你剗却師曰初到鹽官見上堂舉色空義得箇入處頭曰此去三十年切忌舉著又見洞山過水偈曰切忌從他覓迢迢與我踈渠今正是我我今不是渠頭曰若與麼自救也未徹在師又曰後問德山從上宗乘中事學人還有分也無山打一棒曰道甚麼我當時如桶底脫相似頭喝曰你不聞道從門入者不是家珍師曰他後如何即是頭曰他後若欲播揚大教一一從自己胷襟流出將來與我蓋天蓋地去師於言下大悟便作禮起連聲呌曰師兄今日始是鼇山成道頌曰說盡平生去住因到頭難遇赤心人忽然自肯成家業瓦礫拈來也是珍枯木成鼇山成道足人傳莫是從前話未圓賴有玄沙知始末徧身紅爛在漁船龍門遠丈夫淩勵志英雄向外馳求枉用功到得鼇山開眼覰方知屋裏用無窮佛燈珣續收孤村陋店雪紛紛平地無風起浪痕醜拙只因藏不得𮌎襟流出葢乾坤銕山仁二三回九度太顢頇到底須尋舊路還待得鼇山消積雪至今平地起波瀾困有眠床飢有飯連聲何事呌師兄明朝雪霽鼇山路依舊一程還一程象外超雪峯住菴時有兩僧來師以手拓菴門放身出曰是甚麼僧亦曰是甚麼師低頭歸菴僧辭去師問甚麼處去曰湖南師曰我有箇同行住巖頭附汝一書去書曰某書上師兄某一自鼇山成道後迄至于今飽不飢同參某書上僧到巖頭頭問甚處來曰雪峯來有書達和尚頭接了乃問別有何言句僧遂舉前話頭曰他道甚麼曰他無語低頭歸菴頭曰噫我當初悔不向伊道末後句若向伊道天下人不奈雪老何僧至夏末請益前話頭曰何不早問曰未敢容易頭曰雪峯雖與我同條生不與我同條死要識末後句祇這是頌曰末後句為君說明暗雙雙底時節同條生也共相知不同條死還殊絕還殊絕黃頭碧眼須甄別南北東西歸去來夜深同看千巖雪雪竇顯末後句兮無問處萬仞銕山橫在路當日巖頭不奈何至今雪老難伸吐倒捋虎鬚方識虎未解行人休離母透過牢關舉似君把定咽喉淚如雨佛印元雪老却入菴中後路上無人見得伊賴有故人千里在同條生死不同時白雲端雪老別鼇山卓菴閩中坐一日見僧來探頭道什麼末後句少人和却得巖頭重注破同條生同條死末後句莫錯舉照覺總切磋琢磨變態譊訛葛陂化龍之杖陶家居蟄之梭同條生兮有數同條死兮無多末後句祇這是風舟載月浮秋水天童覺續收雪老大開方便路低頭却入菴中去者僧有眼恰如盲却被巖頭行一步者僧好休不肯休依然依路去悠悠元來不會雪峯意却被巖頭甕頭天童覺龍吟枯木菴中出天上人間無等匹虎嘯巖頭石上來晴空忽迸一聲雷堪笑春池不拾礫空山空到又空回佛心才露面出來猶不識低頭歸去更難知那堪末後一句子直到于今四海疑保寧勇雙明復雙暗獨立絕殊方乘機覿面提其鋒安可當同條生兩鏡相照無能名不同條死鐵樹花開亘今古末後句始到牢關拈却門前大案山圓悟勤末後句為君說踏著秤鎚硬似鐵寒則普天寒熱則普天熱若是達磨兒孫各各自知時節知時節為君說九尾烏龜莫當鼇山石鼈佛鑑懃雪峯費盡平生力懵懂禪和意轉疑可憐末後一句子巖頭土上更加泥龍門遠同條生兮不同死弟既耳聾兄目瞽家門蕩盡徹骨窮却把黃金如糞土末後句休莾鹵甜者甜兮苦者苦北海心雪峯一日陞座眾集定師輥出木毬玄沙遂捉來安舊處頌曰雪峯輥毬孰辨機一千五百幾人知眨起眉毛千萬里須是吾門師子兒北塔祚天兮寬地兮闊雪峯輥毬幾忉怛一輥直上須彌山無量人天眼開豁眼開豁脫却多年臭皮韈步行走馬到新羅報道花須連夜發天衣懷雪老平生好輥毬輥來輥去輥無休一千五百人同戲誰解輸機賽一籌佛國白收來輥去事方圓獨許漁郎上鈎船明月蘆花同一色落霞孤鶩共遙天夢菴信續收象骨木毬一輥出三世如來能事畢可憐天下徧參尋只道黃連不是蜜石明輥向人前事未休再安舊處有來由一聲斷鴈鳴雲漢兩岸蕭蕭蘆荻秋戴無為一作雪峯因玄沙來三箇一時輥出沙便作偃倒勢師曰尋常用幾箇曰三即一一即三頌曰團團輥出沒來由不立名模見便休三一一三重注脚螺江依舊向東流圓覺演山寺裏頭無可作輥出木毬兩三箇不獨玄沙遭一攧雪峯老人亦話墮懶菴樞雪峯上堂南山有一條鼈鼻蛇汝等諸人切須好看長慶出曰今日堂中大有人喪身失命雲門以拄杖攛向師前作怕勢有僧舉似玄沙沙曰須是稜兄始得然雖如是我即不然曰和尚作麼生沙曰用南山作麼頌曰象骨巖高人不到到者須是弄蛇手稜兄備師不奈何喪身失命知多少韶陽知重撥草南北東西無處討忽然突出拄杖頭拋對雪峯大張口大張口同閃電剔超眉毛還不見如今藏在乳峯前來者一一看方便師高聲喝云看脚下雪竇顯臨濟喝兮德山棒子胡狗兮誰敢向未若南山鼈鼻蛇一千五百衲子喪韶陽本色弄蛇手自古及今曾未有忽然放出若星流象骨禪翁遭一口正覺逸象骨鼈蛇當大路稜師可惜便亡身雲門弄得雖然活爭似南山不用親白雲端打鼓弄琵琶相逢一會家雲門能合調長慶解隨邪古曲非青律南山鼈鼻蛇何人知妙訣的子是玄沙真淨文玄沙太剛長慶少勇南山鼈鼻死無用風雲際會頭角生果見韶陽下手弄下手弄激電光中看變動在我也能遣能呼於彼也有擒有縱底事而今付阿誰冷口傷人不知痛天童覺續收象骨老人示徒擬議遭他一口韶陽突出驚人未免傷鋒犯手尼無著總增收雪峯示眾曰飯籮邊坐餓死人臨河渴死漢玄沙云飯籮裏坐餓死人水裏沒頭浸渴死漢雲門云通身是飯通身是水頌曰通身是飯通身水饒舌沙彌下口難悟得頓除饑渴念迷時往往更求餐本覺一雪峯示眾曰大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看長慶問雲門曰雪峯與麼道還有出頭不得處麼門曰有曰作麼生門曰不可總作野狐精見解又曰狼籍不少頌曰牛頭沒馬頭回曹溪鏡裏絕塵埃打鼓看來君不見百花春至為誰開雪竇顯眉毛罅裏遊南岳大海波心泛釣舟薄爇隨身終不說從他打鼓看無休白雲端疾𦦨過風奔流度刃唱拍相隨拳踢相應驀然轟起震天雷百草頭顛春色回圓悟勤打鼓普請看直得眉毛寒拾得寒山舞笑倒老豐干楚安方續收撥動乾坤步轉移南觀北斗有誰知金烏暮向西山急曉逐扶桑半夜飛石門易天不能蓋地不能載簉破面門漆桶不會銕船同駕入滄溟持得驪珠如斗大佛心才增收雪峯一日登座召眾曰看看東邊底又曰看看西邊底汝若要會拈拄杖擲下曰向這裏會取頌曰東邊了復西觀拄杖重重話歲寒帶雨一枝花落盡不煩公子倚䦨干冶父川增收雪峯與玄沙行次師指面前地曰這一片田地好造一箇無縫塔沙曰高多少師上下顧視沙曰人天福報即不無和尚靈山受記未夢見在師曰你作麼生沙曰七尺八尺琅琊覺云國清才子貴家富小兒嬌圓悟云要神通妙用須參雪峯要田地穩密須參玄沙更有一箇不涉二途諸人還委悉麼須彌頂上擊金鐘頌曰父子同行相將入草起無縫塔功高䇿巧帶水拖泥漏逗不少雖然落七落八爭奈有道理好佛燈珣指出長生地不迷造成無縫塔巍巍大家從此無餘事渴飲飢餐且度時野菴璇雪峯示眾曰三世諸佛向火𦦨上轉大法輪玄沙云近日官令稍嚴師曰作麼生沙云不許人攙行奪市師不覺吐舌雲門云火𦦨為三世諸佛說法三世諸佛立地聽頌曰火𦦨騰輝說最親無邊諸佛近前聞誰知更有傍觀者鼻孔撩天不喜君白雲端一堆猛𦦨亘天紅三世如來在此中轉大法輪今已了眉毛眨上起清風保寧勇紅𦦨光中也大奇明明演說白毫輝可憐雪老并韶石燒却眉毛總不知普融平續收阿誰踏著雪峯蹤三世諸佛火𦦨中賴有雲門相暖熱火星吹得滿堂紅慈受深將謂猴白更有猴黑互換投機神出鬼沒烈𦦨亘天佛說法亘天烈𦦨法說佛風前剪斷葛藤窠一言勘破維摩詰圓悟勤三世諸佛轉法輪一大藏教說不盡象骨當機正令行玄沙見機行正令或說或聽聞不聞電捲星飛誰與論撥轉那邊關捩子眉毛留得兩莖存瞎堂遠有是父兮有是子同條生也同條死三世如來烈𦦨堆互換說法元如此莫顛言休倒語截斷葛藤須薦取石菴玿雪峯普請往寺莊路逢獼猴師曰這畜生一人背一面古鏡摘山僧稻禾僧曰曠劫無名為什麼彰為古鏡師曰瑕生也曰有什麼死急話端也不識師曰老僧罪過頌曰人人有面古鏡何法門而不罄參玄上士迷頭緝線老婆頓證興教壽堪笑山翁不識羞為他頭上更安頭巖前跳躑無尋處一片殘霞曉未收保寧勇大地為爐冶何年鼓鑄功圓同諸佛面高鑑十方空祖印明鑒覺未萌全體現纔分鑑照便成瑕要知瑩徹圓明處長短青黃總不差白楊順增收雪峯在洞山作飯頭淘米次山問淘沙去米淘米去沙師曰沙米一時去山曰大眾喫箇甚麼師遂覆却米盆頌曰滿鉢盛來一物無豈同香積變珍蘇日月並輪長不照木人舞袖向紅爐投子青乖龍作雨非意測猛虎挾物不露迹洞山雪老共相酬寥寥千古人無識伊菴權增收雪峯因僧問我眼本正因師故邪時如何師曰迷逢達磨曰我眼何在師曰得不從師頌曰達磨迷時在少林今人不曉為傳心堪羨迷人逢達磨三冬過後又新春天衣懷裂破古今沒窠臼當機大闡血盆口脚尖趯出佛如麻李四張三無路走或菴體增收雪峯因僧問寂寂無依時如何師曰猶是病曰轉後如何師曰船子下楊州頌曰寂寂無依病正深雪老當年痛處針一喚喚回春夢破千山渾作木龍吟自得暉增收雪峯示眾云此事不從唇吻得不從黃卷上得不從諸方老宿得合從甚麼處得也須子細頌曰一滴真珠紅潑醅殷勤相勸兩三回到頭欲盡東君意吞却臨行上馬杯皖山凝雪峯因僧問古㵎寒泉時如何師曰瞪目不見底曰飲者如何師曰不從口入僧後到趙州舉此話州曰不從口入不可從鼻裏入僧却問古㵎寒泉時如何州曰苦曰飲者如何州曰死師聞得乃曰趙州古佛遙望作禮自此不答話頌曰古㵎寒泉浩渺瀰分明枝派暗流時不從口入無滋味苦死令渠話不知雲蓋昌黯黯雲攢覆雪峯青青趙老一雙瞳從前汗馬無人識只要重論蓋代功寶峯照縱奪還他老作家奔流度刃數如麻深深㵎裏無人到飲者重添眼裏沙佛心才續收鮑老當年笑郭郎人前舞袖太郎當及乎鮑老出來舞依舊郎當勝郭郎真淨文趙州象骨巖舉世無倫擬共撫沒絃琴千載清人耳古㵎寒泉瞪目凝然不從口入飲者忘筌重出語苦又死不答話同彼此相逢兩會家打鼓弄琵琶箇中誰是的白鳥入蘆花圓悟勤雪峯古㵎泉深趙州石橋水苦若知異水同源飲者不妨疑悟不從鼻孔入白浪高三級從此不答話豈免酬高價金剛圈子栗棘蓬解透橫行四天下佛性泰增收雪峯曰世界闊一尺古鏡闊一尺世界闊一丈古鏡闊一丈玄沙指火爐曰闊多少師曰如古鏡闊沙曰老和尚脚根未點地在頌曰世界能將古鏡齊言中辨的却成迷白雲起處青山秀天曉依前月落西象田卿十方世界一面鏡鏡裏看形未足真摸著鼻頭渠是我那時方見本來人懶菴樞增收雪峯聞一僧在山下卓菴多年不剃頭畜一長柄杓溪邊舀水時有僧問如何是祖師西來意主曰溪深杓柄長師聞得乃曰也甚奇怪一日將剃刀同侍者去訪纔相見便舉前話問是菴主語否曰是師曰若道得即不剃你頭主便洗頭跪師前師即與剃頭頌曰當言不避截舌當爐不避猛火趂手作得家生到老自能穩坐水深杓柄長舀水洗頭剃雪峯刀上眼忽開琉璃殿裏無關閉月堂昌雪老垂慈肻訪他一毫頭上辨龍蛇須知不涉言詮外脫體風流出當家東山源雪峯因閩帥施銀交床僧問曰和尚受大王如此供養將何報答師以手托地曰少打我近訛作輕打我僧問踈山曰雪峯道少打我意作麼生山曰頭上插瓜虀垂尾脚跟齊頌曰大王信重送交床傍問禪徒太著忙下手低聲言少打劣中全勝阿誰詳洞山聰因問如何報主恩舉畢全收坐要津船頭若有風浪動滿目流沙不見人汾陽昭得人一牛還人一馬投之報之風流儒雅如今大有受恩人不知誰是報恩者正覺逸不知將底報君恩風起江湖水皺痕一片古帆乘興去與誰相逐過天門保寧勇續收此旨流行七十年多人言論少人甄托地便令輕打我認著依前又更顛般若柔受施兩邊皆是幻臨機何不惜眉鬚也知此外無長伎咄這黔州老瞎驢寶葉源雪峯因閩王封柑橘各一顆遣使送至柬問既是一般顏色為甚麼名字不同師遂依舊封回王復馳問玄沙沙將一張紙蓋却頌曰柑橘閩王親手封將來直問擊宗風長人入水分明在更問玄沙又不通汾陽為汝開天路寶坊金界碧霄空汾陽昭閩主兩般馳獻上雪峯一等倒封回人情上下俱周美免把完全更擘開保寧勇續收柑橘將來不用疑銕牛蚊子咬應癡閩王猶未識師旨更請玄沙下一錐延壽慧分明柑橘勿譊訛獻花借水辨龍蛇白紙一張都盖了免教天下動干戈冶父川一般顏色兩般名紙盖難謾眾眼睛雪嶺當時便封轉閩王猶未息疑情橫川珙
