body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第六世之二南嶽下第五世之餘晉州霍山景通禪師嗣仰山初參仰山山閉目坐師翹起右足曰如是如是西天二十八祖亦如是中華六祖亦如是和尚亦如是景通亦如是山起來打四藤條師因此自稱集雲峯下四藤條天下大禪佛師曾到霍山和尚處自稱集雲峯下四藤條天下大禪佛參霍山喚維那打鐘著師驟步而去歸宗下亦有大禪佛名智通住五臺頌曰集雲峯下四藤條幾險當時打折腰堪笑後來稱猛將只知空説霍嫖姚野軒遵竺國支那咸印定更無毫髮可參差眼橫鼻直喧天下一頓殘羮永不飢保寧勇當場翹足有來由四下藤條未足酬又向霍山門下去見機雖足未風流地藏恩集雲峯下四藤蒿打破潼關路一條似鶴似雲天地外如龍如鳳在煙霄圓通仙二藤條喫了任間遊未到牢關未肯休打鼓打鐘俱是令知機識變有誰儔續收子陵灘水急如絃摸得黃魚縮項鯿提向市中頻索價他家不直半文錢佛心才強盜遭逢惡抵家賊贓才敗別無他山藤徹骨令甘伏反與渠儂貼面花或菴體千年萬歲老枯樁鐵杵銅槌任擊撞且在爛泥堆裡立咄寶葉源增收霍山因行者問如何是佛法大意師乃禮拜者曰和尚為甚麼禮俗人師曰汝不見道尊重弟子頌曰黃金打作鍮石筯白玉碾出象牙梳黑漆崑崙多伎倆海中拾得夜明珠慈受深增收袁州仰山南塔光湧禪師嗣仰山因僧問曹溪意旨如何師曰一鎖入寒空頌曰重峯層仞插寒空塔鎖深雲勢莫窮千古松聲來有韻萬年溪水去無蹤投子青增收南塔湧向火次有僧來參師曰一言説盡山河僧便問如何是一言師以火筯插向爐邊却收舊處頌曰一句稱提萬象分摩竭空自掩重門當初衲子微開眼插筯爐邊當火焚投子青杭州無著文喜禪師嗣仰山往五臺華嚴寺至金剛窟禮謁遇老翁牽牛行邀師入寺翁曰近自何來師曰南方曰南方佛法如何住持師曰末法比丘少奉戒律曰多少衆師曰或三百或五百師却問此間佛法如何住持曰龍蛇混雜凡聖同居師曰多少衆曰前三三後三三日晚遂問翁擬投一宿得否曰汝有執心在不得宿師曰文喜無執心曰汝曾受戒否師曰受戒久矣曰汝若無執心何用受戒師辭退翁令童子相送師問童子前三三後三三是多少童召大德師應諾童曰是多少師復問此為何處曰此金剛窟般若寺也師悽然悟彼翁者是文殊也不可再見即稽首童子願乞一言為別童説偈曰面上無瞋供養具口裏無瞋吐妙香心裏無瞋是珍寶無垢無染是真常言訖均提童子與寺俱隱頌曰廓周沙界聖伽藍滿目文殊接話談言下不知開佛眼回頭只見翠山巖明招謙顧問南方住若何對云三五衆非多吉祥自述龍蛇混三三之説告和和無著未明重話會均提為指不仙陀金剛背後看名字滿目荒山不奈何汾陽昭千峯盤屈色如藍誰謂文殊是對談堪笑清涼多少衆前三三與後三三雪竇顯堪笑前三與後三當初相對語喃喃却因無著分明見從此清涼沒可參佛印元二樓臺雖有額全無試問頑童起創初忽指金剛看背後年衰多被鬼揶前後三三問若干應機召發轉顢頇如今大有如斯者負鉢腰囊到處摶正覺逸三積翠千峯倚半空龍蛇凡聖混其中其中凡聖知多少前後三三數莫窮寺額突然耀指端大悲千眼莫能觀自從一覷金剛背直至如今作野盤前後三三是多少大事光輝明皎皎回頭不見解空人滿目白雲臥荒草道吾真聖者由來不可陪相逢相問豈安排三三前後輝今古一句無私振九垓照覺總前三三與後三三算過籌量卒未諳芳草萋萋煙景裏鷓鴣啼處是江南地藏恩文殊前後答三三獨泛輕舟過海南洪浪波心看水勢一輪明月印寒潭雲溪恭青山門外白雲飛緑水溪邊引客歸莫怪坐來頻勸酒自從別後見君稀龍門遠續收三三之旨極幽深老漢當牙下一針為報禪徒應諦聽船乃隨流石乃沉般若柔前後三三不失宗逈超千聖數難窮金剛腦後全軒露疊疊青山鎖翠空丹霞淳無著文殊不易逢相逢各自問家風清涼海衆知多少前後三三數莫窮本覺一腰金上太行賊眼盡驚慞不因遭毒手誰肯夜燒香月堂昌二寬鞋著瘦腳短袖入長臂竿木既隨身逢場還作戲前三三後三三一時堆在簷頭擔到得家中重點檢目前包裹露𣯶𣯶前後三三謝師指南龍蛇躍躍虎視耽耽擬數看數欲談何談均提謾有垂鞭意象王蹴踏亦奚堪投子舒陌路相逢眼裡塵低頭禮拜昧天真起來不見文殊現打破大唐無一人秀巖瑞前三三與後三三不可承當不可參更問清涼多少衆月移松影落寒潭月林觀佛法初無北與南何須對面立玄談文殊固是能機變前後分踈落二三雲納慶無著因老翁邀師入寺命坐對談翁呼童子致茶并進酥酪師納其味心意欲然翁拈起玻璃盞問曰南方還有這箇否師曰無曰尋常將甚麼喫茶師無對頌曰文殊大士托玻璃遂問南方有箇奇無著忽言無這箇誤他多少老闍黎至今猶未知端的擡手拈茶不用疑汾陽昭自別南方涉路岐喫茶處處用玻璃如何恰到清涼寺問著元來總不知正覺逸南方不可離須臾無著因何却道無寄語後來禪子道喫茶拈起莫生踈佛印元續收玻璃寶盞對君擎茶味雖濃夢不醒更問三三多少衆爭教人不辨輸嬴象田卿五臺凝坐思遲遲白日青天被鬼迷最苦一般難理會玻璃盞子喫茶時象潭泳增收無著因參仰山頓了心契令充典座文殊嘗現於粥鑊上師以攪粥篦便打曰文殊自文殊文喜自文喜文殊乃説偈曰苦瓠連根苦甜瓜徹蒂甜修行三大劫却被老僧嫌頌曰爍迦羅眼頂門開悟了不須師更來打落粥鍋休説偈修行須信禍為胎象田卿六祖下第六世之三清源下第五世之一增收潭州大光山居誨禪師嗣石霜因僧問祇如達磨是祖否師曰不是祖曰既不是祖又來作甚麼師曰祇為汝不薦曰薦後如何師曰方知不是祖頌曰少林續𦦨事堪奇臘夜梅開雪後枝黃蘗昔年曾有語大唐國裏沒禪師丹霞淳覿面全提少室令當機不薦過新羅清風樓上逢知己撥動煙塵不奈何足庵鑒增收瑞州九峯道虔禪師嗣石霜因僧問祖祖相傳復傳何事師曰釋迦慳迦葉富曰如何是釋迦慳師曰無物與人曰如何是迦葉富師曰國內孟嘗君曰畢竟傳底事作麼生師曰百歲老人分夜燈頌曰寂光影裏現全身貴異天然逈出倫家富兒奴偏得力夜分燈火照西鄰丹霞淳增收九峯因僧問如何是學人自己師曰更問阿誰曰便恁麼承當時如何師曰須彌還更戴須彌頌曰自家冷暖自家知祖意西來更問誰全體承當全體是須彌頂上戴須彌石溪月增收九峯因僧問西天坐夏以蠟人為驗多有得道果者未審此間如何師曰頭戴午夜月腳踏黃金地曰此人還轉也無師曰爭得不轉曰如何轉師曰今世已聞龍退骨頌曰午夜山房月色深十分明白墮功勛撥開向上通天竅煙嶂重重不見人自得暉增收九峯因僧問十二時中如何合道師曰無心合道曰畢竟如何師曰土上覓泥猶自可波中求水實堪悲頌曰牽驢飲江水鼻吹波浪起岸下蹄踏蹄水中觜連觜方庵顯增收九峰因僧問如何是不壞身師曰正是曰學人不會請師直指師曰適來曲多少頌曰不壞身正是正是不壞身適來曲多少𢬟得鼻頭辛石溪月九峯因石霜遷化衆請首座住持師時為侍者白衆問首座曰先師道休去歇去冷啾啾去一條白練去古廟香爐去一念萬年去明什麼邊事會得即住持會不得不可首座對曰明一色邊事師曰與麼則不會先師意在座曰但裝香來香煙斷處若去得即會先師意若去不得即不會師遂焚香香炷未斷座遂脫去師拊首座背曰坐脫立亡即不無先師意未夢見在頌曰張家養得數個兒大者效爺治家業中有一男藝最精氣宇如王威德別別別踏翻滄海兮不顧驪龍喝散白雲兮不羡明月海印信石霜繼嗣擇高才上座貪程去不回只愛寒天無𦦨起豈知枯木放花開虔侍者實堪哀先師大意雖明得未免長拖破草鞋佛慧泉世間何事最堪悲無孔由來是鐵鎚爐冶不能烹得破任教千古與風吹保寧勇坐亡立脫數如麻幾箇於茲路不差翻憶石霜曾有語不光華處盡光華智海清一片虗空亘古今麟龍頭角競踈親坐亡立脫知多少鐵樹花開別是春開福寧帶角披毛異類身寒灰枯木眼中塵雖然未會先師意爭奈臨行一著親丹霞淳枯木堂中第一人坐觀成敗枉精神可憐明一色邊事直至而今沒眼筋寶峯照雖然一箭定天山百戰場中出手難莫道古祠香火斷神前自有酒臺盤上方益座元脫去有生機侍者因何不肯伊若謂石霜明一色似將掃帚畫蛾眉地藏恩香煙淡淡風飄處首座凝凝坐脫時不是久參虔侍者石霜巴鼻有誰知張無盡本分漁人一釣舟千波萬浪裏遨遊兒孫不慣風濤惡走入蘆花不轉頭慈受深脫去還如臂屈伸先師旨趣得來親貪他一粒多年粟失却家中萬斛珍義重天倫虔侍者平生肝膽若為論芳草渡頭輕舉步等間身在杏花村佛燈珣石霜一宗親傳九峯香消脫去正脈難通月巢鶴作千年夢雪屋人迷一色功坐斷十方猶點額密移一步看飛龍天童覺涅槃城裏未為親帶角披毛始是真相逢盡道休官去林下何曾見一人大洪遂一片虗凝絶謂情白雲消散彩霞橫行人莫怪貪程速坐守寒巖異草青雲巖因續收石人不怕師子吼須彌頂上反筋斗滄溟竭盡正三更生鐵崑崙雲外走雪竇宗死中得活人無數活中得死古來稀只知枯木回春早蹉過寒灰再𦦨時虔侍者也是癡雖然會得先師意未免全身陷虎機圓悟勤萬丈寒潭徹底清霜天午夜欲生氷釣魚要擲金鱗餌撥轉蘆蓬向月明正堂辨增收九峯因僧問人人盡道請益未審師還拯濟也無師曰汝道巨嶽還曾乏寸土麼曰四海參尋當為何事師曰演若迷頭心自狂曰還有不狂者麼師曰有曰如何是不狂者師曰突曉途中眼不開頌曰寒谷生洪律全超拯濟功園林變花柳何必待春風方菴顯巨嶽何曾乏寸土演若迷頭狂未回參尋喜有得力句突曉途中眼未開且居門外石溪月增收九峯因僧問如何是把定乾坤眼師曰乾坤在裏許曰乾坤眼何在師曰正是乾坤眼曰適來為什麼道乾坤在裏許師曰若不恁麼髑髏前見鬼無數五燈會元稍異頌曰識問不亂答識答不亂問問答有來由直下明知見果然明得破不被髑髏換奉勸參學人子細參詳看大圓智一拳拳倒黃鶴樓一躍躍反鸚鵡洲有意氣時添意氣不風流處也風流虗堂愚增收九峯因僧問古人道因真立妄從妄顯真是否師曰是曰如何是真心師曰不雜食是曰如何是妄心師曰攀緣起倒是曰離此二途如何是本體師曰本體不離曰為甚麼不離師曰不敬功德天誰嫌黑暗女頌曰是真是妄披金擇沙同門出入宿世冤家方菴顯增收九峯示衆曰常住法身不生不滅僧問既是不生不滅為什麼六道輪回師曰為有心故曰以何方便當證法身師曰以虗空心合虗空理曰證後如何師曰任從三界轉徒聽四生奔復曰會麼曰不會師曰禮拜著頌曰精金須百鍊百鍊色不回轉道貴無心無心道即更深秋夜月古廟香爐灰法身無一物山嶽空崔嵬南堂興增收鳳翔府石柱禪師嗣石霜師遊方時到洞山時虔和尚埀語曰有四種人一人説過佛祖一步行不得一人行過佛祖一句説不得一人説得行得一人説不得行不得阿那個是其人師出衆曰一人説過佛祖行不得者祇是無舌不許行一人行過佛祖一句説不得者祗是無足不許説一人説得行得者祇是函蓋相稱一人説不得行不得者如斷命求活此是石女兒擔枷帶鎖山曰闍黎分上作麼生師曰該通分上卓卓寧彰山曰祇如海上明公秀又作麼生師曰幻人相逢拊掌呵呵頌曰海底泥牛耕白月雲中木馬驟清風胡僧懶捧西乾鉢半夜乘舟過海東丹霞淳增收台州湧泉景欣禪師嗣石霜因僧問如何是相傳底事師曰龍吐長生水魚吞無盡漚曰請師挑硩師曰擂鼓轉船頭棹穿波底月頌曰依依半月沉寒水耿耿三星落碧巑昔日雲巖曾漏泄金輪王子寶花冠丹霞淳增收湧泉欣因唐武宗廢教在院看牛時有強德二禪客到於路次見師騎牛不識乃云蹄角甚分明爭奈騎者不識師驟牛而去二禪客相次憩於樹下煎茶師回下牛近前問訊與坐喫茶師乃問二禪客近離甚處云那邊師曰那邊事作麼生禪客提起茶盞師曰此猶是這邊那邊事作麼生二人無對師曰莫道騎牛者不識好頌曰芳草漫漫豈變秋牧童白牯恣優遊異中有路人難見却謂騎牛不識牛丹霞淳增收潭州雲蓋山志元禪師嗣石霜因僧問石霜萬戶俱閉即不問萬戶俱開時如何霜曰堂中事作麼生僧無對經半年方始下一轉語曰無人接得渠霜曰道即太殺道祇道得八成曰和尚又且如何霜曰無人識得渠師聞知乃禮拜乞為舉霜不肯師乃抱霜上方丈曰和尚若不道打和尚去在霜曰得在師頻禮拜霜曰無人識得渠師於言下頓省頌曰古殿巖開月鎖松霜凝雪露韻無窮星前人臥千峯室佛祖無因識得儂投子青無人接得渠遺逼馬相如果來橋上也記得柱頭書天童覺二無人識得渠棋局醉樵夫回頭斧柯爛大海亦成枯接得與識得誰復較錙銖若問堂中事堂中事轉踈只如雲蓋悟去又作麼蘇嚕蘇嚕最菴印增收福州覆船山洪薦禪師嗣石霜因僧問抱璞投師師還接否師以手拍香臺僧禮拜師曰禮拜則不無其中事作麼生僧却拍香臺師曰舌頭不出口頌曰舌頭不出口三三成九九算到香臺還彼此落人後月堂昌增收張拙秀才見石霜因禪月大師指參石霜霜問何姓曰姓張名拙霜曰覓巧了不可得拙自何來公忽有省呈偈曰光明寂照遍河沙凡聖含靈共我家一念不生全體現六根才動被雲遮斷除煩惱重增病趣向真如亦是邪隨順世緣無罣礙涅槃生死等空華頌曰老倒石霜無忌諱當頭一句曾提起只因當日老婆心千古寥寥挂唇齒佛鑑勤臚傳不羡擅嘉聲錯認山河作眼睛巧拙一時俱裂破斷除煩惱病重增笑翁堪進前峭壁三千丈退後懸崖幾萬重珍重大唐張拙老鐵鎚無孔舞春風寶葉源澧州洛浦山元安禪師嗣夾山久為臨濟侍者一日辭去濟升堂曰臨濟門下有箇赤梢鯉魚搖頭擺尾向南方去不知向誰家虀甕裏淹殺師遊歷罷直往夾山卓菴經年不訪夾山山修書令僧馳往師接得便坐却再展手索僧無對師便打曰歸去舉似和尚僧回舉似山曰這僧若開書三日內必來若不開書斯人救不得也師果三日後至見山不禮拜乃當面叉手而立山曰雞棲鳳巢非其同類出去師曰自遠趨風請師一接山曰目前無闍黎此間無老僧師便喝山曰住住且莫草草匆匆雲月是同溪山各異截斷天下人舌頭即不無闍黎爭教無舌人解語師佇思山便打因茲服膺興化代云但知作佛莫愁衆生頌曰無伴石人夜入山雪籠紅頂緑衣寒喝開劫肇三峯頂捧出金襴對日看投子青喝下承當草已深却來蘭浦訪知音溪山雲月何嘗異今古誰人鑑此心枯木成執侍巾瓶二十年搖頭擺尾出林泉悠悠直往南方去虀甕淹來得穩眠雲居祐搖頭擺尾赤梢鱗徹底無依解轉身截斷舌頭饒有術拽回鼻孔妙通神夜明簾外兮風月如晝枯木巖前兮花水長春無舌人無舌人正令全提一句新獨步寰中明了了任從天下樂欣欣天童覺洛浦因僧問供養百千諸佛不如供養一箇無心道人未審百千諸佛有何過無心道人有何德師曰一片白雲橫谷口幾多歸鳥盡迷巢頌曰拾得疏慵非覺曉寒山懶墮不知歸聲前一句圓音美物外三山片月輝丹霞淳是佛由來尚涉功明心方與道相同花開花落緣何事盡屬無私造化中枯木成百千諸佛眉彎曲無證無修眼搭癡踏著未消連底凍一時認作碧琉璃佛智裕續收故山岌岌鎖寒煙未肯將心輕授傳玉女夜尋無字印石人遙指月明前自得暉增收洛浦因僧問學人擬歸鄉時如何師曰家破人亡子歸何處曰恁麼則不歸去也師曰庭前殘雪日輪消室內遊塵遣誰掃乃有偈曰決志歸鄉去乘船渡五湖舉篙星月隱停棹日輪孤解離邪岸張帆出正途到來家蕩盡免作屋中愚頌曰太平鄉國路空賒歸興悠悠思莫涯撒手到家何所有琉璃寶殿鎖空華丹霞淳增收洛浦因僧問如何是一大藏教收不得者師曰雨滋三草秀片玉本來輝頌曰畢鉢巖前曉帶春香風時結鷲峯層須知玉像瓶中塔別有輝天照地燈投子青增收洛浦因僧問一毫吞盡巨海於中更復何言師曰家有白澤之圖亦無如是妖怪保福別云家無白澤之圖必無如是妖怪頌曰巖前雖有雲千頃戶內殊無半夜燈極目危巒今古宿暮天斜照碧層層丹霞淳增收洛浦因僧問如何是祖師西來意師曰青嵐覆處出就藏鋒白月輝時碧潭無影頌曰羣花未發梅先折萬木雕零柏轉奇雲淡不彰篩月影煙輕那露引風枝丹霞淳增收洛浦因龐居士禮拜起曰仲夏毒熱孟冬薄寒師曰莫錯曰龐公年老師曰何不寒時道寒熱時道熱曰患聾作麼師曰放你三十棒曰啞却我口塞却你眼頌曰直下啞却我口分明塞却你眼由來洛浦龐公未出睦州擔板覿面全提照古今冬寒夏熱憑誰揀靈源清增收洛浦因僧問祖意教意是同是別師曰日月並輪輝誰家別有路曰恁麼則顯晦殊途事非一槩師曰但自不亡羊何須泣岐路頌曰月篩松影高低樹日照池心上下天赫赫災空非卓午團團秋夜不知圓丹霞淳增收洛浦因僧問如何是佛法大意師曰雲覆孤峯峯不白雨滋石筍筍初生頌曰海底龍吟雲雨潤林中虎嘯谷風清莫言滿路生荊棘況是貧家少送迎丹霞淳增收洛浦因蛤溪道者相訪師問自從犂溪相別今得幾年曰和尚猶記得昔時事師曰見説道者總忘却年月也曰和尚住持事繁且容子細看師曰打即打會禪漢曰某甲消得師曰道者住山事繁頌曰這般消息不尋常蟾桂枝枝有遠香昨夜姮娥呈巧妙眼睛直上繡鴛鴦丹霞淳增收洛浦因僧問衆手淘金誰是得者師曰拳中舊寶不揀披沙曰恁麼則展手不逢也師曰莫將鶴唳擬作鶯啼頌曰淘金豈假披沙得石觸波瀾猶費力露柱三更忽放光此時未審何人識丹霞淳增收洛浦示疾十二月一日告衆曰吾非明即後也今有一事問汝等若道這箇是即頭上安頭若道不是即斬頭求活第一座對曰青山不舉足日下不挑燈師曰是甚麼時節作這箇語話時有彥從上座對曰離此二途請和尚不問師曰未在更道曰彥從道不盡師曰我不管汝盡不盡曰彥從無侍者抵對和尚師便休至夜令侍者喚從問曰闍黎今日抵對甚有道理汝合體得先師意先師道目前無法意在目前不是目前法非耳目之所到且道那句是賓那句是主若擇得出分付鉢袋子曰彥從不會師曰汝合會曰彥從實不會師喝出乃曰苦苦玄覺云且道從上座實不會是怕見鉢袋子粘著伊頌曰餌雲鈎月釣清津年老心孤未得鱗一曲離騷歸去後汨羅江上獨醒人天童覺紙衣下事不假胞胎懸崖撒手襁褓嬰孩涅槃會上道場開單傳直指狀元來南堂興增收洛京韶山寰普禪師嗣夾山因僧問如何是韶山境師曰古今猿鳥呌翠色薄煙籠曰如何是境中人師曰退後看頌曰最好韶山境煙籠翠色輕欲描描未就猿鳥一聲聲石溪月增收韶山因遵布衲訪師在山下相見遵問韶山路向甚麼處去師以手指曰嗚那青青黯黯處去遵近前把住曰久嚮韶山莫便是否師曰是即是闍黎有甚麼事遵曰擬伸一問師還答否師曰看君不是金牙作爭解彎弓射蔚遲曰鳳凰直入煙霄去誰怕林間野兒師曰當軒畫鼓從君擊試展家風似老僧曰一句逈超千聖外松蘿不與月輪齊師曰饒君直出威音外猶較韶山半月程曰過在甚處師曰倜儻之辭時人知有曰恁麼則真玉泥中異不撥萬機塵師曰魯般門下徒施巧曰學人則恁麼未審師意如何師曰玉女夜拋梭織錦於西舍曰莫便是和尚家風也無師曰耕夫裂玉漏不是行家作曰此猶是文言如何是和尚家風師曰橫身當宇宙誰是出頭人遵無語師遂同歸山才人事了師召近前曰闍黎有衝天之氣老僧有入地之謀闍黎橫吞巨海老僧背負須彌闍黎按劒上來老僧掗鎗相待向上一路速道速道曰明鏡當臺請師一鑒師曰不鑒曰為甚不鑒師曰水淺無魚徒勞下釣遵無語師便打頌曰趨時適變隨物窮通鴻鵠之志誰辨雌雄韓侯未遇布衲家風三秦席卷非無計忠義何勞憶蒯通方庵顯增收韶山因僧問是非不到處還有句也無師曰有曰是甚麼句師曰一片白雲不露醜頌曰一片孤雲不露醜白雲兒倚青山父鶴巢靈滴夢初回新月半鈎升萬戶自得暉獨向滄溟截衆流等間舞棹擲金鈎白雲不露煙波闊橫笛一聲天地秋木庵永增收韶山因僧問如何是和尚家風師曰絶頂無根草無風葉自搖頌曰妙峯孤頂偏肥膩天産靈苗不觸地翠葉無風常自搖清香那逐春光媚丹霞淳增收韶山因僧到參禮拜起立師曰大才藏拙戶僧過一邊立師曰喪却棟梁材頌曰叉手須知已隔津更重進步轉漂淪頑銅若作黃金貨祇可瞞他無眼人丹霞淳
