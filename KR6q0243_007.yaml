body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣東土諸祖二祖慧可大師初至少林參承達磨立雪斷臂悲淚求法磨知是法器乃曰諸佛最初求道為法忘形汝今斷臂求亦可在祖曰諸佛法印可得聞乎磨曰諸佛法印不從人得祖曰我心未寧乞師安心磨曰將心來與汝安祖曰覔心了不可得曰與汝安心竟祖於此悟入頌曰九年面壁待當機立雪齊腰未展眉恭敬願安心地法覔心無得始無疑汾陽昭斷臂難於立雪難覓心無處始心安誰知萬頃蘆花境一一漁翁把釣竿正覺逸終始覔心無可得寥寥不見少林人滿庭舊雪重知冷鼻孔依然搭上唇白雲端覓心不可得處處逢知識無用一雙眉同渠超百億雲居祐立雪齊腰成底事以刀斷臂亦奚為從門入者非家寶休殢西來老古錐地藏恩思量何用覓安心求得心安却苦身三尺雪深曾立處不知誰是雪中人佛國白少林面壁太多言接得門人一臂全京洛至今三尺雪天寒何止普通年楊無為覓心不得已安心屠肆淫坊嗣少林爭奈子孫嫌直截諸方五味苦參尋張無盡斷臂覓心心不得覓心無得始安心心安後夜雪庭際滿目瑤花無處尋草堂清覓心不有三拜聊施靈焰益熾肯首自知回觀法印全彰處江月松風盡入微佛心才父財子用父用子財覓心無處心眼自開長靈卓若有絲毫付與人可師何得更全身人間天上迷逢處八兩元來是半斤龍門遠三拜勤劬雪到腰覔心無處強相饒神光冷地思量著始覺春來雪自消佛燈珣二祖當年立少林滿庭積雪到腰深叉手當胸無一事不求不覓不安心鼓山圭覓心無處更何安嚼碎通紅鐵一團縱使眼開張意氣爭如不受老胡謾徑山杲續收不待七處徵當下便不見猢孫水上打鞦韆新羅王子放一箭高著眼分明穿破波斯面石明立雪齊腰寶刀斷臂不動神情十方遊戲白楊順二祖無端向少林庭前立雪到腰深直饒覓得心無有未免全身被陸沉誰菴演屈節從長也大𢬵雪堆斷臂仰高寒鐵牛鞭起熊峯下一吸黃河徹底乾或菴體達磨九年面壁坐深雪之中得一箇得一箇森羅萬象平分破尼無著總拈刀截臂露全真忘却求安心底人若是當時知痛癢老胡何處著渾身無際派長安深夜雪漫漫欲覓心安轉不安縱使言前開活眼那知已被老胡謾息菴觀平地無端起骨堆將身活向雪中埋假饒覓得安心法還我娘生一臂來隱山璨自有覓不得無端面發紅翻身喫一𨈀兩手摸虗空雪菴瑾深雪堆中斷一肢老胡抑下十分威當時便好掀翻去未到教他死馬醫石室輝二祖當年不丈夫分皮分髓被塗糊可憐要乞安心法直至而今一臂無毒菴常覓心無處覓當下便心安早知冰是水兩臂定完全石田薰三祖僧璨大師不知何許人不言名氏為居士謁二祖曰弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺居士良久曰覓罪不可得祖曰我與汝懺罪竟宜依佛法僧住曰今見和尚已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然曰今日始知罪性不在內不在外不在中間如其心然佛法無二也祖深器之即為剃𩬊曰是吾寶也宜名僧璨執侍二載乃付達磨信衣正法眼藏說偈密囑護持無令斷絶後居舒州潛皖山谷或司空山頌曰潛溪水急天柱峯高洞然明白不隔絲毫從來生計平如掌後世兒孫弄海潮楊無為罪已無根性已空正生風處不生風至今山谷山前水一派清流入海中佛國白說罪師前請懺除罪忘心滅兩如如誰知璨是僧中寶來往司空山下居草堂清半醒半醉臥街衢忽悟通身業本無三昧若從人處得效顰何異更塗糊成枯木無孔笛子氈拍板五音六律皆普遍時人不識黃番綽笑道儂家登寶殿五祖演風恙纏身覓罪不得九萬里程展摩霄翼旻古佛三祖以罪懺罪二祖將錯就錯一陳清風劈面來罪花業果俱凋落靈丹一粒有神功瘥病不假驢駝藥佛鑑勤續收渾身燥癢倩人搔入骨搔來身已勞一下被伊搔著了平生癢處一時消水菴一二祖安心三祖懺罪逐惡隨邪成羣作隊只許老胡知不許老胡會退菴奇彌天罪過無門懺紅爛通身世莫醫已是四稜俱踏地儘教後代亂針錐無門開平生罪性覔無踪直得乾坤大地空天地依然高突兀潛溪一派自朝宗癡絶冲風恙纏身世莫醫家貧遭劫更堪悲誰知覔罪了無處正是賊歸空屋時大歇謙罪過彌天乞懺除看時似有覓渾無直饒言下滅胡族冷地尋思不丈夫石室輝四祖道信大師初為沙彌年始十四禮三祖曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎師於言下大悟服勞九載乃付衣法住蘄州破頭山學侶雲臻攝心不寐脅不至席一日告衆曰吾武德中遊廬山登絶頂望破頭山見紫雲如蓋下有白氣橫分六道汝等會不衆默然弘忍曰莫是和尚它後橫出一枝佛法不師曰善唐太宗響師道三詔不赴就賜紫服頌曰慈雲之塔大醫之師瞻之仰之雙峰巍巍懶融不得西天鉢直付黃梅路上兒楊無為島外逢師解縛歸雙峯山下獨幽奇却將衣鉢為人事乞與黃梅箇小兒佛國白道出乾坤動至尊飛雲三詔不離雲求人的嗣周家子遙望牛頭紫氣分草堂清絶知名迹能妨道正恐師承亦纍人問法沙彌莫饒舌百年逆旅要同塵覺範洪無縛無釋脅不至席分開一貫兩箇五百旻古佛牛頭未生梅子熟也玩步人間池成月下鳳書三到懶開眸白蓮峯頂光相射雲嵓因續收堅辭鳳闕紫泥詔玷辱宗風箇古錐坐斷雙峰無寸草愛松留得礙人枝無門開掀翻解脫脫巢窠從此縵天布網羅落賺小兒猶自可一枝橫出轉譊訛癡絶冲誰縛無人縛何更求解脫未必右軍鵝便是支郎寉石田薰破頭峯頂紫雲飛三却天書老翠微滯貸雖然無用處不應分付小孩兒少室睦五祖弘忍大師前身在蘄州西山栽松遇四祖告曰吾欲傳法與汝汝已年邁汝若再來吾尚遲汝師諾遂往周氏家女托生因拋濁港中神物護持至七歲為童子四祖一日往黃梅縣逢一小兒骨相奇秀乃問曰子何姓曰姓即有非常姓祖曰是何姓曰是佛性祖曰汝無性耶曰性空故祖默識其法器即俾侍者後令出家後付衣法居黃梅東山頌曰栽松何老傳衣何少前身後身一夢兩覺白藕花開峯頂頭明月千年冷相照楊無為二日出而作栽松為樂昔栽幾何今滿嵓壑白頭人去小兒歸笑殺林梢千歲鶴在聖權方世莫評雙峯密付豈虗稱前身已老難傳鉢託陰重來始繼燈昔日栽松名尚振千靈報母願何增如今海內宗風遍只為春中擇得能白雲端垂垂白𩬊下青山七載歸來換舊顏人却少年松已老是非從此落人間佛國白誰是前身孰後身謾將名字較新陳鄰家莫問去來事吾是昔人非昔人祖印明無父無兄絶是非江心誰辨逆流時西山得法東山隱此事只教能者知草堂清濁港滔滔歧路絶翻身釘出空中橛白蓮花向半天開從此天機渾漏泄旻古佛黃梅果熟白藕花開問唯佛性體異凡胎衣傳南嶺人將去松老西山我再來兩借皮囊成底事一壺風月湛無埃天童覺老大不堪用約去了還來伸腳縮腳裏貪程速快哉有娘生面無爺姓趂得曇華五葉開佛燈珣香火綿綿五百年孤猿野寉老松巔人傳妙道回南嶺我禮浮圖向半天前後真身無覓處古今靈迹尚依然若人問我東山事峯頂池中有白蓮白楊順東山法門衆盈七百真能者師為世作則濁港滔滔清有餘黃梅路上人南北雲嵓因續收一去一來一老一少兩鏡對懸光影俱照直饒用盡神通未明向上一竅尼無著總約去栽松箇老人還來傳法喜童真有娘生面無爺姓劫外靈苗不犯春水菴一元是黃梅舊日僧事師年老氣彌增翻身揚下栽松钁轉步來分照世燈皮袋假於溪畔女衣盂付與嶺南能佳聲籍籍能長久雨過淮山碧萬層湖隱濟滿頭白𩬊老嵓隈萬本青松懶更栽皮袋纍他周氏女難尋踪跡去還來天目禮好箇栽松道者臨老無端打野不識從本爺娘負纍周家小姐濁港浸他不殺養大便成奸猾鼓弄黃梅七百僧成羣逐隊爭衣鉢朴翁銛青松未種鼻遼天種了青松失半邊玷辱周家猶自可再來不直半文錢笑翁堪栽遍滿山松暗地翻身轉雖然得信衣何曾識爺面石田薰幾年活計钁頭邊萬本青松瑣翠烟夢破曹溪天地闊再來不直半文錢少室睦栽松幸自可憐生剛要隨人入火坑換得皮囊急回首依前鼻孔不多爭石室輝六祖慧能大師本姓盧家貧賣薪養母因往五祖求法祖曰汝自何來曰嶺南祖曰欲須何事曰唯求作佛祖曰嶺南人無佛性若為得佛曰人即有南北佛性豈然祖知是異人乃訶曰著糟廠去遂禮足而退便入碓坊服勞於杵臼之間因五祖示衆索偈欲付衣法堂中上座神秀大師呈偈曰身是菩提樹心如明鏡臺時時勤拂拭莫遣有塵埃師和偈曰菩提本無樹心鏡亦非臺本來無一物何假拂塵埃祖默而識之夜呼入室密示心宗法眼傳付衣鉢令渡江過大庾嶺南歸曹溪開東山法門頌曰今古曹溪一派寒師來因為起波瀾擕囊庾嶺人空逐負石黃梅衆識難佛慧泉石墜腰間舂碓鳴老盧便重不便輕黃梅衣鉢雖傳得猶去曹溪數十程楊無為七百高僧夢裏時三更月下獨南歸賣柴舂米儂家事底事親傳六代衣佛國白一偈投機一衆降銜花百鳥去雙雙家山記得來時路半夜傳衣過九江祖印明六祖當年不丈夫倩人書壁自塗糊明明有偈言無物却受他家一鉢盂死心新七百僧中選一人本來無物便相親夜傳衣鉢曹溪去鐵樹花開二月春草堂清續收擔柴賣火村裏漢舌本瀾翻不奈何自道來時元沒口却能平地起風波徑山杲黃梅席上數如麻句裏呈機事可嗟直是本來無一物青天白日被雲遮西塔壁間書偈言無物腰石當知力有餘莫道懶翁無伎倆糠中舂出走盤珠水菴一菩提無樹鏡非臺臭口分明鬼劈開幸是賣柴無事獠剛然惹得一身災無門開揚下採樵斧直入碓坊舂一腳踏到底黃梅信息通佛照光應無所住以生心大地山河一發沉從此別開窮世界新州柴把貴如金破菴先四句伽陀不解書三更傳得本來無曹溪路上生荊棘直至如今在半途妙峯善箇樣村夫舉世無鬻薪終日奔窮途黃梅有路何曾到誰謂衣盂親付渠少室睦黃梅分付太倉忙半夜淒淒暗渡江將謂無人知下落賊身已露更和贓辛菴儔不作樵夫作碓夫只將腳力驗精粗知他踏著踏不著和米和糠到鉢盂西嵓惠癡意貪他破鉢盂間言長語倩人書只知半夜潛身去祖意還曾夢見無石室輝師資緣會有來由明鏡非臺語暗投壞却少林窮活計櫓聲搖月過滄洲葛廬覃六祖受法辭五祖令隱於懷集四會之間屆南海遇印宗法師於法性寺暮夜風揚剎幡聞二僧對論一云幡動一云風動往復酬答曾未契理祖曰可容俗流輒預高論否直以風幡非動動自心耳印宗聞語竦然異之遂問其由祖實告之印宗於是集衆請開東山法門祖遂落𩬊披衣受戒即廣州天寧寺也頌曰非風幡動唯心動自古相傳直至今今後水雲徒欲曉祖師直是好知音瑞鹿先不是風兮不是幡黑花猫子面門斑夜行人只貪明月不覺和衣渡水寒法昌遇不是風兮不是幡斯言形已播人間要會老盧端的意天台南嶽萬重山天衣懷蕩蕩一條官驛路晨昏曾不禁人行渾家不是不進步無奈當門荊棘生保寧勇不是風兮不是幡於斯明得悟心難胡言漢語休尋覔剎竿頭上等間看圓通秀東西南北無空處上下四維隨分舉眷屬都來止一身行盡天涯無伴侶三祖宗不是風兮不是幡白雲依舊覆青山年來老大渾無力偷得忙中些子間雪峯圓不是風兮不是幡清霄何事撼琅玗明時不用論公道自有間人正眼看圓通仙不是風幡不是心迢迢一路絶追尋白雲本自無踪跡飛落斷崖深更深草堂清昔時盧老泄天機直指風幡說向伊是風是幡便是你左之右之不曾離黃蘗勝風幡非動乞兒得夢金銀珍寶快活受用旻古佛滄溟直下取驪珠覿面相呈見也無到此不開真正眼膏之病卒難蘇道場如不是風幡是汝心人傳此語遍藂林若還踏著鄉關路瓦礫無妨喚作金祖印明不是風兮不是幡寥寥千古競頭看徹見始知無處所祖庭誰共夜堂寒通照逢指出風幡俱不是直言心動亦還非夜來一片寒溪月照破儂家舊翠微佛心才不是風幡不是心幾人求劒刻舟尋分明寄語諸禪侶自古真鎮不博金佛鑑勤不是風兮不是幡認為心者亦顢頇風吹碧落浮雲盡月上青山玉一團踈山常相爭但見風幡動不肯回頭識動心從此老盧露消息松風江月盡知音夢菴信夢遊華頂過丹丘躡盡寒雲倚石樓貪看瀑泉瀉崖壁不知身在碧江頭長靈卓不是風幡不是心曹溪深也未為深那吒忿怒掀騰去析遍微塵不可尋黃龍震不是風兮不是幡幾人北斗面南看祖師直下無窠臼眼綻皮穿較不難佛燈珣不是風兮不是幡一重山後一重山青春雨過無餘事獨倚危樓望剎竿佛性泰不是風幡不是心從來只為少知音舉頭萬里長空外唯見白雲流水深楚安方續收不是風兮不是幡多口闍黎莫可詮若將巧語求玄會特地千山隔萬山琅琊覺非風幡動唯心動龍生龍兮鳳生鳳老盧直下示全機底事今人見如夢石明不是風幡是心動似倩麻姑癢處搔天外孤鸞誰得髓何人解合續絃膠崇覺空不是風幡不是心祖師正眼只如今如今不識山河礙識得如今海嶽沉雪竇宗風幡不動人心動直指分明休矒𥋾若將知見巧商量大似夢中加說夢大溈智非風幡動唯心動猶涉廉纖強指陳大地未曾添寸土不知誰是點頭人開福寧直指單傳自祖宗非風幡動出盧公玄徒若具金剛眼剎剎塵塵總是空南堂興是風是幡君莫疑百草叢中信步歸王道太平無忌諱戲蝶流鶯繞樹飛自得暉二不是風幡不是心衲僧徒自強錐針巖房雨過昏烟靜臥聽涼風生竹林浪靜風恬正好看秋江澄徹碧天寬漁人競把絲輪擲不見冰輪蘸水寒常菴崇不是風幡動亦非仁者心自從胡亂後淈𣸩到如今瞎堂遠風動幡動心動死蛇要人活弄嘶風木馬當途無角鐵牛入洞白楊順非風幡話露全機千古叢林起是非咄這新州賣柴漢得便宜是落便宜佛照光不是風幡不是心休將此語播藂林從來一派天河水透石穿崖古到今塗毒䇿大海波濤湧千江水逆流龍王宮殿裏不見一人遊應菴華不是風幡動天生李老君出胎頭上𩬊寸寸白如銀雪堂行不是風兮不是幡碧天雲靜月團團幾多乞巧癡男女猶向牀頭甕裏看水菴一二不是幡兮不是風軒轅寶鑑出懷中森羅萬象難逃影戀窟狐狸失却蹤張騫推倒崑崙後幾人窮到孟津源堪笑不知天地者至今剛道有乾坤肯堂充非風幡動唯心動踏雪貧兒徹骨寒在聖在凡誰改變螂蟟嚼碎鐵圍山劒門分不是風兮不是幡入泥入水與人看莫把是非來辨我浮生穿鑿不相干月林觀不是風兮不是幡白雲盡處見青山可憐無限英靈漢開眼堂堂入死關淳菴淨不是風兮不是幡分明裂破萬重關誰知用盡腕頭力惹得閒名落世間松源嶽不是風兮不是幡將軍騎馬出潼關安南塞北都歸了時復挑燈把劒看天目禮不是風幡也可疑却言心動甚言詞天生不受形容者舉世何人見得伊朴翁銛長安一片月萬戶搗衣聲西風吹不斷總是玉關情孤峯深風幡心動一狀領過只知開口不覺話墮無門開地神歸地天神歸天殷勤奉送寶馬金錢無準範增收育王崇舉巴陵和尚道不是風動不是幡動不是風幡又向甚麼處著有人為祖師出氣出來與巴陵相見雪竇和尚道風動幡動既是風幡又向甚麼處著有人為巴陵出氣出來與雪竇相見師乃頌曰非風非幡無處著是風是幡無著處遼天俊鶻悉迷蹤踞地金毛還失措阿呵呵悟不悟令人轉憶謝三郎一絲獨釣寒江雨增收六祖因僧問黃梅衣鉢是何人得祖云會佛法者得僧曰和尚還得不祖曰不得僧曰因甚不得祖曰我不會佛法頌曰信手拈來見自殊箇中消息沒工夫黃梅未許傳斯旨半夜曾將付老盧大洪恩斬釘截鐵大巧若拙一句單提不會佛法儘他葉落花開不問春寒秋熱別別萬古寒潭空界月圓悟勤我不會佛法不得黃梅旨本體自圓成畢竟只者是道已契平生腳已踏實地無一法當情靈山親授記佛鑑勤不會黃梅佛法夢中合眼惺惺此地無金二兩俗人酤酒三升雪菴瑾蕉芭蕉芭有葉無丫忽然一陳狂風起恰似東京大相國寺裏三十六院東廊下北角頭王和尚破袈裟徑山杲增收六祖示衆曰吾有一物非青黃赤白男女等相還有人識得麼時有沙彌神會出曰某甲識得祖曰你喚作什麼曰是諸佛之本源神會之佛性祖便打曰我喚作一物尚自不中更喚作本源佛性頌曰呼為一物早不中那堪指作本源佛應現縱橫總不動用施為收不得活潑潑黑焠焠借問諸人知不知直待當來見彌勒海印信畫師五彩畫虗空落筆須知失本蹤更有唐朝吳道子平生紙上枉施功慈受深一翳在眼空華亂墜神會沙彌失錢遭罪只見鑿頭方不見錐頭利大丈夫小釋迦鐵鞭一擊珊瑚碎圓悟勤增收六祖謂門人曰吾欲歸新州汝等速治舟楫門人曰師從此去早晚却回祖曰葉落歸根來時無口法雲秀云非但來時無口去時亦無鼻孔頌曰葉落歸根來時無口水長船高烏飛兔走若非林間師子兒三歲便能大哮吼海印信五蘊山頭一段空來時無口去無踪要明葉落歸根旨末後方能達此宗本覺一祖師底物待客只是家常茶飯如今後代兒孫須要珍羞異饌圓悟勤葉落歸根後曹溪一滴深山居人少到真實好知音龍門遠二歸根得旨復何論洞口秦人半掩門花落只隨流水遠空留野雲屯落葉歸根鐵牛當路來時無口索鹽得醋金槌不動落羣機列聖叢中第六祖雪堂行雲開空自闊葉落即歸根回首烟波裏漁歌過遠村松源嶽興在天南天盡頭未行先已到新州來時無口去無伴那更蕭蕭黃葉秋虗堂愚
