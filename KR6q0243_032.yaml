body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第七世之四清源下第六世之二福州長慶慧稜禪師嗣雪峯與保福遊山福問古人道妙峯山頂莫即遮箇便是也無師曰是即是可惜許僧問鼓山只如稜和尚恁麼道意作麼生山曰孫公若無此語可謂髑髏遍野白骨連山頌曰因上高嚴到頂頭僧人致問已圓周是即便是可惜許只恐同音別處游汾陽昭妙峯孤頂草離離拈得分明付與誰不是孫公辨端的髑髏著地幾人知雪竇顯八萬四千非一一七金山內海滔滔妙高峯頂平如掌誰把長竿釣巨鼇草堂清擕手相將孰共行目前唯覩妙高山雲泥不隔來時路付與兒孫觸處看佛心才續收囓鏃交鋒是作家不孤來問這些些知時及節因行事可惜茲人返嘆嗟般若柔是即是兮可惜許擬心早涉三千里行人念路客思家達磨杖頭挑隻履呆堂定妙高孤頂忽登臨浩浩無風曰浪深除却鏡清長慶外此時誰更是知音寶葉源增收長慶因僧問如何是正法眼師曰有願不撒沙保福云不可更撒也頌曰願力山高豈足誇藏身露影數如麻若非保福親曾見誰信稜公更撒沙寶葉源增收長慶曰總似今日老胡有望保福云總似今日老胡絶望頌曰天高鴻鴈侵雲舉地肅蛩螿入草鳴渾是一秋風景裏客愁幾逐異鄉情東叟頴增收長慶上堂撞著道伴交肩過一生參學事畢頌曰驀路相逢交臂過眉毛躍起莫蹉跎平生參學明何事悟了寧消一剎那本覺一增收長慶因僧問如何得不疑不惑去師乃展兩手僧不進語師曰汝更問我與汝道僧再問師露膊而坐僧禮拜師曰汝作麼生會曰今日風起師曰恁麼道未定人見解汝於古今中有甚麼節要齊得長慶若舉得許汝作話主其僧但立而已師却問汝是甚麼人曰向北人師曰南北三千里外學妄語作麼僧無對頌曰展手之時萬仞摧枯河無水月無來若疑別問龐居士石女黃梅誰共陪投子青增收長慶因僧問有問有答賓主歷然不問不答時如何師曰相逢盡道休官去林下何曾見一人頌曰人人盡道我心休問著何曾有地頭口說心違謾自己業河迅速任漂流智門祚增收長慶因僧問衆手淘金誰是得者師曰有伎倆者得曰學人還得也無師曰大遠在頌曰衆手淘金得者誰纖塵窒礙豈能為洪波浩渺黃金遠四事無成空手歸智門祚衆手淘金誰可得巧有伎倆必能克隋候得珠聞京西卞和獻玉在河北湛堂準漳州保福從展禪師嗣雪峯長慶云寧說阿羅漢有三毒不說如來有二種語不道如來無語只是無二種語師曰作麼生是如來語曰聾人爭得聞師曰情知和尚向第二頭道慶却問作麼生是如來語師曰喫茶去雲居錫云什麼處是長慶向第二頭道處頌曰頭兮第一第二臥龍不鑒止水無處有月波澄有處無風浪起稜禪客稜禪客三月禹門遭點額雪竇顯如來語為君舉任是聾人得聞未免和泥合土喫茶保福亦憨癡似向雷門撾布鼓佛慧泉不說如來二種語三三為九須重數何謂聾人爭得聞狐裘未免還移主白雲端無是無非歸掌握有聞有見隔關山始知一種如來語不在世人情解間佛鑑勤第一頭第二頭清風明月兩悠悠將軍戰馬今何在野草閒花滿地愁南華昺續收撞墻撞壁曲不藏直摘葉拈花與儉寧奢羅漢有三毒如來有二語聾人爭得聞依舊喫茶去保福老保福老鐵眼銅睛還失了月堂昌便恁喫茶去還知第二頭可憐長慶老特地一場愁寶葉源保福因雪峯上堂曰諸上座望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也師舉問鵝湖僧堂前相見即且置祇如望州亭烏石嶺甚麼處相見鵝湖驟步歸方丈師低頭入僧堂頌曰望州烏石與堂前相見相逢萬萬千唯有鵝湖并保福此時相見解推遷汾陽昭望州烏石常相見何故禪人却背違保福鵝湖雖得意埋兵曾未展鏘旗海印信登山過水幾區區特地相逢問道途堪笑華山潘處士長安路上倒騎驢大洪遂密密堂堂早二三本來無物更何堪癡人見了生歡喜作者相逢滿面慚龍門遠望州烏石與僧堂業識茫茫不可當提起衲僧拄杖子五湖四海沸如湯徑山杲續收藕絲引鯨鼇針鋒輥芥投望州烏石嶺未唱已先酬大唐擊鼓新羅舞覿面相呈不相覩圓悟勤望州烏石僧堂前驟步低頭隔大千若是咬人師子子反身不在草頭邊一翁如增收保福因僧問雪峯平生有何言句得似羚羊掛角時師曰我不可作雪峯弟子不得頌曰人前慣出手退三添作九有眼未嘗看無家自能走雪峯之句羚羊掛角作他弟子沒來由龍蛇陳上看謀略月堂昌雪峯未審何言句得似羚羊掛角時拊擊自然皆率舞不須羌管隔雲吹虗堂愚增收保福問僧殿裏底是甚麼曰和尚定當看師曰釋迦佛曰和尚莫謾人好師曰却是汝謾我又問飯頭鑊闊多少曰和尚試量看師以手作量勢曰和尚莫謾某甲師曰却是汝謾我又問僧汝作甚麼業來得恁麼長大曰和尚短多少師蹲身作短勢曰和尚莫謾人好師曰却是汝謾我又問僧汝名甚麼曰咸澤師曰忽遇枯涸時如何曰誰是枯涸者師曰我是曰和尚莫謾人好師曰却是汝謾我頌曰保福四謾人真中道理親兩兩從頭舉雙雙句後明若也更不會新羅打鐵丁洞山聰竿木隨身老作家逢場作戲更難加謾人謾我無人會水長船高眼裏沙雪竇顯一箇人謾四箇人四人謾一一謾親思量一代謾人漢遞代相謾謾殺人佛國白一般見得有多般若也謾他實自謾要識展公端的處水闊山高天色寒東林總保福從來不謾人問著禪流總及身浴鑊量來闊多少兩長一短是誰真堅增收保福因僧侍立問曰汝得恁麼粗心曰甚麼處是某甲粗心處師拈一塊土度與僧曰拋向門前著僧拋了却來曰甚麼處是某甲粗心處師曰我見築著磕著所以道汝粗心頌曰晨朝有粥齊時飯展鉢開單飽便休築著磕著如薦得不風流處也風流尼無著總增收保福與甘長老相看鄭十三娘才坐定師乃問承聞十三娘子參見溈山是否曰是師曰溈山遷化向甚麼處去鄭起身偏床而立甘曰間時說禪口似懸河何不道取鄭曰鼓這兩片皮堪作甚麼甘曰不鼓這兩片皮又作麼生鄭曰合取狗口頌曰溈山遷化絶音容躍起眉毛何處去十三娘子側身時放出金毛師子子南堂興禪禪鄭十三娘握玉鞭正法眼更參三十年南巖勝杭州龍冊寺道怤禪師即鏡清嗣雪峯僧問學人未達其原請師方便師曰是什麼原曰其原師曰若是其原爭受方便僧禮拜退後侍者問曰和尚適來莫是成他問否師曰無曰莫是不成他問否師曰無曰未審畢竟意作麼生師曰一點水墨兩處成龍其原一作其源頌曰成龍兩處若為分碧眼黃頭笑未聞莫怪鏡清多意氣他家曾謁聖明君正覺逸鏡水平湖碧湛然茫茫曾未達其源王維妙手堪圖畫一點成龍兩處全保寧勇手把空行未是難難中難是問其源其源未達奈何也且看成龍點下分雲溪恭續收學人未問指其源句裏明機好細觀自語不能知落處煩他我作費言端本覺一冰稜鎖斷長河口不見人從鳥道來一陳風回修竹裏玉䦨干上雪成堆心聞賁源泉混混望無涯澄湛平如鏡面開兩處成龍一點墨幾人換却眼睛來寶葉源鏡清問僧門外什麼聲曰雨滴聲師曰衆生顛倒迷己逐物五燈會元於迷己逐物下曰和尚作麼生師曰洎不迷己曰洎不迷己意旨如何師曰出身猶可易脫體道應難頌曰虗堂雨滴聲作者難酬對若謂曾入流依前還不會會不會南山北山轉雱霈雪竇顯是甚麼聲雨滴浩浩迷己逐物衆生顛倒楊無為簷前雨滴聲正在眼中鳴貪他蓑笠者失却舊茅亭長靈卓順流逆流轉物物轉良哉觀音快逢其便出身脫體自分明門外依前雨滴聲圓悟勤續收明頭便打暗裏閃過盡底活時死中要坐門外簷間雨滴聲衆生顛倒逐迷情可憐洎不迷己處出得身來體未明月堂昌簷頭雨滴階前地濕法法現成人信不及更問如何長江水急慈受深簷頭雨滴聲歷歷太分明若是未歸客徒勞側耳聽白楊順門外依然雨滴聲萬般巧說爭如實平生心膽向人傾相見還同不相識卍菴顏直下全提是鏡清脫難出易語分明這僧更是能親切聽得簷頭雨滴聲寶葉源增收鏡清問僧門外是甚麼聲曰蛇咬蝦蟆聲師曰將謂衆生苦更有苦衆生頌曰將謂衆生苦更有苦衆生相見易得好共住難為人卍菴顏增收鏡清問僧門外什麼聲曰鵓鳩聲師曰欲得不招無間業莫謗如來正法輪頌曰聞聲見色非聞見見色聞聲是見聞欲得不招無間業莫謗如來正法輪卍菴顏增收鏡清因僧問聲前絶妙請師指歸師曰許由不洗耳曰為甚麼如此師曰猶繫腳在曰某甲祇如此師意又如何師曰無端夜來鴈驚起後池秋頌曰飄風揚塵落花流水聲前絶妙無處著觜驚起後池秋許由不洗耳容貌好西施開唇不露觜方菴顯鏡清因僧問學人啐請師師曰還得活也無曰若不活遭人怪笑師曰也是草裏漢頌曰古佛有家風對揚遭貶剝子母不相知是誰同啐覺猶在殼重遭撲天下衲僧徒名邈雪竇顯語見人心苗見地頭痛癢喝如聾諸方開口不同用寶印全機繼祖風佛國白啐之機不謬傳軒轅寶鑑正當軒萬緣喪盡泥中土四海澄清月在天本分鉗鎚須煅煉自家爐韛且磨研相逢莫問參玄事此去西天萬八千佛鑑勤河目海口釘觜鏡舌雞宿鳳巢素非其鴨直饒啐同時未免當頭一劄佛性泰增收鏡清因僧問如何是大道之源師曰從這裏流出頌曰從這裏流出滔滔無盡日巨浪湧千尋誰知無一滴無準範增收鏡清一日於僧堂前自擊鐘曰玄沙道底玄沙道底僧問玄沙道甚麼師畫一圓相僧曰若不久參爭知與麼師曰失錢遭罪宗門統要作師曰還我草鞋錢來雪竇云洎被打破蔡州圓悟云爛泥裏有硬刺頌曰鏡清湖心拋一餌錦鱗躍浪上鈎來幾乎掣斷竿頭線引得傍觀下釣臺石溪月增收鏡清問雪峯古人有言峯便倒臥良久起曰問甚麼師再問峯云虗生浪死漢頌曰尋常愛客恨無來及至人來懶話陪空臥早知眠不當虗勞紅焰落寒灰投子青增收鏡清因僧問新年頭還有佛法也無師曰有曰如何是新年頭佛法師曰元正啓祚萬物咸新曰謝師答話師曰鏡清今日失利頌曰七寶杯酌蒲萄酒金花紙寫清平詞春風院靜無人見閒把君王玉笛吹心聞賁新年佛法答云有小盡依前二十九玉麟掣斷黃金勒却向雲中大哮吼懶菴樞增附又僧問明教寬新年頭還有佛法也無師曰無曰日日是好日年年是好年為甚却無師曰張公喫酒李公醉曰老老大大龍頭蛇尾師曰明教今日失利頌曰新年佛法答云無會得依前在半途誰把扁舟清夜笛月明吹過洞庭湖懶菴樞新年佛法播真風笑殺街頭賀歲翁三級浪高何處去謾將雙劒定雌雄雪堂行南堂興云鏡清道有時失利明教道無亦失利且道譊訛在什麼處徑山杲云一人向高高峯頂立不露頂一人向深深海底行不濕腳是則是未免有些譊訛頌曰新年景物漸舒蘇佛法徒勞問有無得失是非都喪却波斯鼻孔自來粗建隆原穩密田地神通游戲佛法新年頭有無俱失利一槩等虗空豈容立巴鼻草上之風祖令行誰云雷罷不停聲圓悟勤新年佛法鏡清有須信親言出親口新年佛法明教無西天鬍子沒髭鬚可笑兩翁同失利南海波斯失却鼻太平今夜太郎當還如雪上更加霜歲寒孫臏收却劒釣魚船上謝三郎佛鑑勤增收福州鼓山興聖神晏國師嗣雪峯一日參雪峯峯知其緣熟忽起搊住曰是什麼師釋然了悟亦忘其了唯舉手搖曳而已峯曰子作道理邪曰何道理之有峯審其懸解撫而印之頌曰驀被曾郎搊著胸平生途路忽然窮無端擡手輕搖曳笑倒南方大頂峯竹屋簡增收鼓山上堂埀語曰鼓山門下不得咳嗽時有僧咳嗽一聲師曰作甚麼曰傷風師曰傷風即得頌曰遼空一箭九重城雪老門風儘有聲見說禁班宣號令那邊渾不許人行虗堂愚增收鼓山有偈示衆曰直下猶難會尋言轉更賒若論佛與祖特地隔天涯五燈會元於此偈下曰師舉問僧汝作麼生會僧無語乃謂侍者曰某甲不會請代一轉語者曰和尚與麼道猶隔天涯在僧舉似師師喚侍者問汝為這僧代語是否者曰是師便打趂出院頌曰國師樣子太慈悲入草何如出草時射透九重聖箭子依前特地隔天涯石溪月明州翠巖令參禪師嗣雪峯上堂曰今夏與諸兄弟語論看翠巖眉毛還在麼此依傳燈所載五燈會元與傳燈異乃曰一夏與兄弟東語西話看翠巖眉毛在麼長慶云生也雲門云關保福云作賊人心虗翠巖芝云為衆竭力禍出私門頌曰翠巖示徒千古無對關字相酬失錢遭罪老倒保福抑揚難得嘮嘮翠巖分明是賊白圭無玷誰辨真假長慶相諳眉毛生也雪竇顯青山岌岌緑水滔滔穿過鼻孔落盡眉毛大洪遂作賊保福擔枷過狀生也長慶迷真逐妄掩關雲門秋江月亮老倒翠巖眉在眼上死心新續收金鎚血色透雲袍閫外威權膽氣豪打破魔王山鬼窟碧潭深處釣鯨鼇南堂興天魔謗佛桀犬吠堯巍巍大人聖德可昭𫎇菴嶽萬鈞之弩射何人箭未離弦已喪身帶纍盲龜失浮木欲來火裏透金塵伊菴權發言先要心無愧為事應須理處長莫學里閭無信者從朝至暮錯商量虗堂愚太原孚上座嗣雪峯鼓山問父母未生時鼻孔在什麼處師曰老兄先道曰如今生也汝道在什麼處師不肯山却問作麼生師曰將手中扇子來山與扇子再徵之師默置山罔測乃驅之一拳頌曰父母未生前鼻孔在何處藂林老作家俱昧藏身句鼓山雖見機未免撑門戶搖扇太原孚播弄閒家具山中春色深飛花落無數佛慧泉父母未生前生也只如然一般拈掇能奇特直下渾如火裏蓮輝今耀古極妙窮玄大可憐清風長滿座一念八千年圓悟勤續收高安灘頭百雜碎象骨峯前眼搭癡敢道鼓山無鼻孔藂林千古笑嘻嘻正堂辨增收孚上座參雪峯峯聞乃集衆師到法堂上顧視雪峯便下看知事明日却上禮拜曰某甲昨日觸忤和尚峯曰知是般事便休頌曰李廣將軍古今無對深入虜庭全身遠害不動干戈嬴小捷至今邊塞嘉聲在海印信雪峯集衆待孚公上堂一顧便西東明日却云曾觸忤公案從來是幾重本覺一針頭削鐵牛背拔毛多將少使冷作熱燒直上法堂便下去觸忤和尚重解注知是般事休便休茫茫塞壑與填溝月堂昌壯氣如虹上法堂就籬縛犍恰相當若言觸忤老和尚雪上無端又著霜稱巖玉增收孚上座初在揚州光孝寺講涅槃經有禪者阻雪因往聽講至三因佛性三德法身廣談法身妙理禪者失笑師講罷請禪者喫茶曰某甲素志狹劣依文解義適蒙見笑且望見教禪者曰實笑座主不識法身師曰如此解說何處不是曰請座主更說一遍師曰法身之理猶若太虗竪窮三際橫亘十方彌綸八極包括二儀隨緣赴感靡不周遍曰不道座主說不是祇是說得法身量邊事實未識法身在師曰既然如是當為我說曰座主還信否師曰焉敢不信曰若如是座主輟講旬日室內端然靜慮收心攝念善惡諸緣一時放却師依所教從初夜至五更聞鼓角聲忽契悟扣禪者門曰阿誰師曰某甲禪者咄曰教汝傳持大教代佛說法夜來為甚麼醉酒臥街師曰禪德自來講經將生身父母鼻孔𢬟揑從今已去更不敢如是曰且去來日相見師遂罷講遍歷諸方頌曰一曲單于風引長孚公聞處是宮商至今夜夜維陽客空聽樓頭聲斷腸本覺一誰將畫角吹江城一曲梅花隔岸聽宿酒乍醒金鴨冷海棠枝上月猶明懶菴樞增收孚上座掌雪峯浴室一日玄沙上問訊雪峯曰此間有箇老鼠子今在浴室裏沙曰待與和尚勘破言訖到浴室遇師打水沙曰相看上座師曰已相見了沙曰什麼劫中曾相見師曰瞌睡作麼沙却入方丈白峯曰已勘破了峯曰作麼生勘伊沙舉前語峯曰汝著賊也頌曰象王象子儘相隨岸上人看蹄踏蹄香草細餐知飽足歸來不待日頭低虗堂愚孚上座因鼓山赴大王請雪峯門送回至法堂乃曰一隻聖箭直射九重城裏去也師曰是伊未在峯曰渠是徹底人師曰若不信待某甲去勘過遂趂至中路便問師兄向甚麼處去山曰九重城裏去師曰忽遇三軍圍繞時如何山曰他家自有通霄路師曰恁麼則離宮失殿去也山曰何處不稱尊師拂袖便回峯問如何師曰好隻聖箭中路折却了也遂舉前話峯乃曰奴渠語在師曰這老凍膿却有鄉情在頌曰洞天無壁月無遮朝斗先生扣齒牙風撼古壇松子脫打反頭上楮冠斜絶象鑒青童雙勒玉驄嘶淡白春衫緑帶圍半夜歸來花底過金鞭敲落亂紅飛竹屋簡二九重城裏本非遙射折重重箭倍饒忽遇三軍圍繞處分明有路直通霄雲門宗主韶州雲門文偃禪師嗣雪峯示衆曰人人自有光明在看時不見暗昏昏作麼生是諸人自己光明自代云厨庫三門又云好事不如無頌曰自照列孤明為君通一線花謝樹無影看時誰不見見不見倒騎牛兮入佛殿雪竇顯徹底昏昏不待看拄天拄地黑漫漫三門厨庫長相對一徑松風滿院寒白雲端恍恍惚惚若亡若存築著磕著厨庫三門金烏照不破玉兔又西奔不知是何物能為天地根佛心才夜明簾外千峯秀鸞鏡臺前萬象殊掃蹤滅迹不立錙銖誰為佛殿誰是香厨敲出鳳凰五色髓擊碎驪龍明月珠圓悟勤續收黑黑無問東西與南北厨庫三門相對高撑天拄地同聚墨雖然好事不如無敢保韶陽會不得正覺逸人人自有光明在看時不見暗昏昏踢倒三門與厨庫此時明暗自然分蔚嘯巖雲門上堂乾坤之內宇宙之間中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上作麼生自代云逐物意移又曰雲起雷興頌曰看看古岸何人把針竿雲冉冉水漫漫明月蘆花君自看雪竇顯嶺上白雲舒復卷天邊皓月去還來低頭却入茅簷下不覺呵呵笑幾回白雲端看看野草間花極撩亂三月洞庭江上春烟霄飛過瀟湘岸溈山秀帝網交羅幾萬般形山消殞影團團拈來不是無尋處只在乾坤宇宙間佛心才虎豹文章麒麟頭角輝天燦地堆山積嶽拶破面門兮蓋色騎聲截斷羅籠兮解粘去縛罷却干戈百草頭萬里秋天飛一鶚圓悟勤續收開眼也著合眼也著擬議躊躇放過一著遁菴演隱隱烟村聞犬吠欲尋尋不見人家忽於橋斷溪回處流出碧桃三四花斷橋倫雲門示衆曰十五日已前不問汝十五日已後道將一句來衆無對自代曰日日是好日頌曰去却一拈得七上下四維無等匹徐行踏斷流水聲縱觀寫出飛禽跡草茸茸烟空生巖畔花狼籍彈指堪悲舜若多莫動著動著三十棒雪竇顯日日是好日風來樹點頭九江烟靄裏月上謝家樓海印信日日是好日誰言無等匹甜瓜徹蒂甜未必甜如蜜大洪恩冰消河北岸花發樹南枝到處有春色天涯亦早歸上方益續收破二作一分三成六著串數珠數不足南辰信手攀北斗回身觸豁開戶牖正當軒玉兔金烏如轉軸傳不傳得不得那知陌上春條緑圓悟勤日日是好日佛法世法盡周畢不須特地覓幽玄只管鉢盂兩度濕尼無著總雲門上堂聞聲悟道見色明心遂舉起手曰觀世音菩薩將錢買糊餅放下手曰元來祇是饅頭頌曰買得欣欣急走歸不知放手却成非直饒超過毗盧頂也落韶陽第二機上方益小院春風特地寒佳人寂寞倚䦨干斷腸曲調無人聽更把琵琶月下彈慈受深見色心光現聞聲道已彰掣雷光中分皂白海潮音裏辨宮商韶陽老慈門普發機直用千鈞弩圓悟勤見色明心事已差聞聲悟道更交加觀音妙智慈悲力荊棘林中優鉢華徑山杲南無觀世音菩薩補陀巖上紅蓮舌不知成佛是何時打刀須是并州鐵鼓山圭續收撲落非他安排不多蓋覆自在隱顯包羅擡頭失却舊時路拈篙便上別人渡轉易作難拔貧成富千人萬人恁麼去月堂昌頓超見色聞聲句不涉明心悟道言花落鳥啼巖下寺月明人喚渡頭船雪菴瑾一曲風前信是誰調高爭肯落今時見無人會曲中意又把雲簫特地吹簡翁敬雲門每見僧必顧視曰鑒僧擬議乃曰咦後德山圓明大師刪去顧字謂之抽顧叢林目雲門顧鑒咦有抽顧頌頌曰雲門抽顧笑嘻嘻擬議遭他顧鑒咦任是張良多計䇿到頭於此也難施北塔祚雲門抽顧自有來由一點不到休休休休真淨文韶陽一鑒生鐵餕餡直下咬破莫怪相賺鼓山圭續收雲門抽顧頌衲僧眼皮重眼皮重七八量雷車打不動打不動抽顧頌時念彌陀三兩聲追薦東村李鬍子生西天山裏孟八郎強健福田院裏貧兒呌喚乞與我一文大光錢五祖戒韻陽為人最急切未入門來已甄別若於顧鑒裏承當大棒打落天邊月典牛游雲門因僧問如何是和尚家風師曰門前有人讀書五燈會元作有讀書人來報或作門外讀書人報來頌曰藂林在處有家風且與雲門事不同門外若有讀書者任是顏回亦不通北塔祚家風施設不無私獨有雲門語可疑偏囑讀書人若到急來通報汝須知為他老杜王摩詰愛我高吟落韻詩覺海元讀書人到切須看無絃難遇知音者端的家風說與君沒階趨進翼如也佛慧泉續收讀書人報來豈在之乎者孔子與周公皆不及門也天目禮雲門因僧問如何是祖師西來意師曰日裏看山頌曰日裏看山也是常西來祖意謾商量金毛獅子希逢有多是狐狸喚作狼北塔祚日裏看山好清風拂白雲夜來何處火燒出古人墳東京淨因佛日日裏看山滿眼青千巖萬壑鬪縱橫洞門疑是雲遮斷到者須知路坦平楊無為日裏看山言簡語端後進初機切在諦觀黃檗勝𭅕真不惜兩莖眉日裏看山對祖機臘月火燒春又緑只宜飛走會相依三祖宗雨餘江上兩三峯堆疊烟嵐不記重眼裏看來端的瞎耳根聞處出天聰佛鑑勤續收坦然曾問老師安爭似韶陽一句傳日裏華山仙掌露夜深猿呌月當軒投子青日裏看山大難大難重重峭壁疊疊危巒只見嵐光拂拂爭知瀑布潺潺上方益日裏看山好好在什麼處要見老雲門不落第二句月林觀日裏看山酬所問分明開口見心肝若於句裏求宗旨墮在嵯峩疊嶂間退耕寧
