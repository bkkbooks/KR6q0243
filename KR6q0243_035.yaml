body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第八世之一南嶽下前第七世臨濟汝州風穴延沼禪師嗣南院師在郢州李史君衙內度夏普請大會請師陞座乃曰祖師心印狀似銕牛之機去即印住住即印破祇如不去不住印即是不印即是還有人道得麼時有盧陂長老出問學人有鐵牛之機請師不搭印師曰慣釣鯨鯢澄巨浪却嗟蝸步𩥇泥沙陂住思師喝曰長老何不進語陂擬議師便打一拂子曰還記得話頭麼試舉看陂擬開口師又打一拂子牧主曰信知佛法與王法一般師曰見甚麼道理牧主曰當斷不斷反招其亂師便下座頌曰擒得盧陂跨銕牛三玄戈甲未輕酬楚王城畔朝宗水喝下曾令却倒流雪竇顯鋒頭壁立銕牛機十字縱橫寶劒揮一陣賊軍俱粉碎凱歌齊和太平歸保寧勇列聖風規初不放過擬跨銕牛驀頭印破盧陂當斷却沉吟電轉星飛被活擒喝下機鋒如霹𮦷三玄戈甲振叢林圓悟勤續收銕牛之機印住印破透出毗盧頂𩕳行却來化佛舌頭坐風穴當衡盧陂負墮棒頭喝下電光石火歷歷分明珠在盤眨起眉毛還蹉過天童覺全鋒敵勝鐵牛機電掣雷奔已是遲等閒活捉盧陂老縱饒猛略若為施君不見寰中意氣閫外威權擬議衝前總滅門懶菴需一句猶如劈箭機纔生擬議犯重圍分明佛法同王法只許當年牧主知簡翁敬風穴上堂若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安貼於此明得闍黎無分全是老僧於此不明老僧却是闍黎闍黎與老僧亦能悟却天下人亦能瞎却天下人欲識闍黎麼右邊一拍曰這裏是欲識老僧麼左邊一拍曰這裏是頌曰野老從教不展眉且圖家國立雄基謀臣猛將今何在萬里清風獨自知雪竇顯立國仍教野老欣威行閫外不揚塵縱橫莫測文兼武宇宙茫茫有幾人白雲端皤然渭水起垂綸何似首陽清餓人只在一塵分變泰高名勛業兩難泯天童覺二幾許歡心幾許愁好看野老兩眉頭家平貼清如鏡水瘦山空一樣秋增附五祖演云太平即不然若立一塵法堂前草深一丈不立一塵錦上鋪花何也不見道頌曰九九八十一窮漢受罪畢纔擬展脚眠蚊蟲獦蚤出且看雙放更雙收有底歡聲有底愁一切聖賢如電拂大千沙界海中漚雪巖欽家國分明得自由盛衰全在一塵收將軍戰馬眠方熟野草從教滿地愁竹屋簡增收風穴參南院院問近離甚處師曰南方曰南方一棒一喝如何商量師曰作奇特商量曰我這裏不然師曰未審此間一棒一喝如何商量曰棒下無生忍臨機不見師師便省頌曰有喝端如探竿草無師血脉通紅線當陽不識李將軍徒學穿楊一枝箭南巖勝風穴因僧問語默涉離微如何通不犯師曰常憶江南三月裏鷓鴣啼處百花香頌曰鷓鴣啼處百花香拊掌呵呵咲一場因憶舊年游歷處送人雲塢入斜陽海印信鷓鴣啼處百花鮮江國從來路坦然為報途中未歸客謝家人不在漁船寶峯明快騎駿馬上高樓南北東西得自由最好腰纏十萬貫更來乘鶴上楊州鼓山珪忽爾出門先見路纔方下脚便登船神仙秘訣真堪惜父子雖親不可傳徑山杲續收彩雲影裏神仙現手把紅羅扇遮面急須著眼看仙人莫看神仙手中扇佛鑑懃不露風骨句未語先分付進步口喃喃知君太罔措無門開風穴因僧問如何是佛師曰杖林山下竹筋鞭頌曰杖林山下竹筋鞭南北行人萬萬千莫怪相逢不下馬東西各自有前程慈明圓杖林山下竹筋鞭枝節蕭踈古㵎邊要會宗師開正眼滿輪午夜照秋天海印信杖林山下竹筋鞭搭索拏鈎火裏牽拽近不能推向後回旋却到使君前道吾真杖林山下竹筋鞭頭尾拈來總一般莫怪玄沙不出嶺他家元是釣魚船雲峯悅杖林山下竹筋鞭水在深溪月在天良馬不知何處去阿難依舊世尊前真淨文杖林山下竹筋鞭南北行人萬萬千堪笑一堂無事客臥雲深處不朝天雲溪恭杖林山下竹筋鞭拈出寒巖尚帶烟扶過斷橋曾得力而今不直半分錢上方益續收杖林山下竹筋鞭六月行人口吐烟曾在祝融峯頂見十分月出在平田東山空杖林山下竹筋鞭憍梵鉢提舌拄天羣黨元來諱空手起家消息在荒田或菴體風穴因僧問如何是清淨法身師曰金沙灘頭馬郎婦頌曰金沙灘裏馬郎婦宗匠臨機發一言自笑箭穿紅日影孰云斫水不成痕正覺逸相逢盡道歸山去林下何曾見一人回首面南看北斗金鷄早報五更春浮山遠截鐵之機安可測頓開千眼莫能窺禪人到此徒名邈錯認查梨作乳梨海印信何年嫁事馬家郎鳳枕同歡碧玉牀回首畫橋離別苦落花流水淚千行張無盡續收十分美麗誰家女百倍聰明是馬郎堪笑金沙灘畔約始終姻婭不成雙或菴體增收風穴因僧問如何是佛師曰如何不是佛曰學人未曉乞師再指師曰家住海門東扶桑最先照頌曰眉間一道白毫光歷劫知將甚處藏永夜寥寥天未曉更須斫額望扶桑保寧勇增收風穴到黃龍龍曰石角穿雲路垂條意若何師曰紅霞籠玉像擁嶂照川原曰恁麼則相隨去也師曰和尚低聲頌曰無價明珠暗處懸夜深將把木人穿誰知却被泥牛見吞入紅霞碧浪淵投子青增收風穴因僧問如何是道師曰五鳳樓前曰如何是道中人師曰問取城隍使頌曰深宮禁殿隔重闈簾靜簷楹紫氣垂苔地不通朝請近家人指路莫遲疑投子青增收風穴因僧問麈鹿成羣如何射得麈中主曰釣船載到瀟湘岸氣咽無寥問白鷗頌曰禁殿重闈視聽危側思偏立絳綸垂漢鄉雲斷汀洲逈嶺莫猿啼孤月隨投子青增收風穴因僧問如何是學人親切處師曰須彌南畔齊打鼓賀蘭山前築皮毬頌曰親切曾伸問老翁東山歌唱北山吟弄潮須是吳江客別語還他漢地人投子青風穴因僧問古曲無音韻如何和得齊師曰木雞啼子夜芻狗吠天明頌曰古巖月色鎻重雲枯木迎芳晚帶春昨夜星河隔南斗金烏隨鳳過天輪投子青增收汝州頴橋安禪師號鐵湖嗣南院向火次因鍾司徒問三界焚燒如何出得師以香匙撥開火鍾擬議師召曰司徒司徒鍾忽有省頌曰三界炎炎如火聚道人未有安身處連忙撥火召司徒眼上眉毛渾不顧眉毛落盡人還生死火寒灰解脫坑奉報禪人急跳出莫教日午打三更佛鑑懃高聲撥火召司徒火燄炎天驀面驅祇向此間能穩坐任教門外雪盈衢冶父川三界焚燒要出離見春來了見春歸是他不見春來去日出東方夜落西閑極雲溈仰增收吉州資福貞邃禪師嗣資福寶僧問如何是古人歌師作此相示之頌曰一曲兩曲深夜彈松風和雨過前山可憐卞玉離荊岫誰是知音却取還投子青增收郢州芭蕉山繼徹禪師嗣芭蕉清僧問有一人不捨生死不證涅槃師還提携也無師曰不提携曰為甚麼不提携師曰林溪麤識好惡頌曰百歲兒童出戶來滿身紅爛惹塵埃火中閑步清涼地識者無因敢近擡投子青六祖下第八世之二清源下第七世增收鄂州黃龍山誨機禪師嗣玄泉彥僧問風恬浪靜時如何師曰百尺竿頭五兩垂頌曰百尺竿頭五兩垂窮沙絕漠任風吹可憐無限滄浪客猶把南針定所歸石林鞏婺州明招德謙禪師嗣羅山一日天寒上堂眾纔集師曰風頭稍硬不是汝安身立命處且歸暖室商量便歸方丈大眾隨至立定師又曰纔到暖室便見瞌睡以拄杖一時趂下頌曰堂上非常凜冽眾人誰敢當頭只見西風刮地豈知一葉驚秋暖處去極停囚無人為與塞咽喉須信高皇功業大鴻溝兩岸一時收佛慧泉風頭坐斷進還難衲子相將不易看未到潼關天已曉不堪回首望長安開福寧風頭稍硬難安立暖氣纔通瞌睡來却笑明招閑費力無端兩處強差排鼓山珪夜半明星當午現愚夫猶待曉雞鳴可憐自屎不知臭又欲重新拈似人徑山杲風前露出無瑕璧室內擎將如意珠兩度獻渠渠不識可憐流落在江湖佛性泰續收𪂶𪂶鳥守空池魚從脚底過𪂶𪂶總不知懶菴需稍硬風頭早已乖更將暖處自沉埋反令千古成踪跡枉喫羅山白飯來介石朋風頭稍硬無棲泊暖處商量一句無老倒不堪醫世患謾將毒藥當醍醐東山源前頭計較既不成後面安排亦不是古時若有今時人不落他家圈䙡裏斷橋倫增收明招因僧問虎生七子那箇沒尾巴師曰第七箇沒尾巴頌曰燕尾大蟲難傍近近前便是傷人命除非自解據虎頭自然頭正尾亦正鼓山珪第七於菟沒尾巴食牛之氣已堪誇藂林悱悱爭唇吻幾箇行人得到家徑山杲第七箇沒尾巴不落羣隊獨露爪牙擬心湊泊終難見須信蓮開火裏花松源岳福州地藏桂琛禪師嗣玄沙問僧什麼處來曰南方來師曰南方佛法如何曰商量浩浩地師曰爭似我這裏種田愽飯喫曰爭奈三界何師曰喚什麼作三界頌曰種田愽飯喫言中誰辨的午後打齋鐘真金曾失色雲峯悅種田愽飯喫佛法要商量言下超三界靈機發妙光靈源清種田愽飯待方來玄妙商量一任猜無影樹頭懸日月幾人於此便心灰旻古佛宗說般般盡強為流傳口耳便支離種田愽飯家常事不是飽參人不知參飽明知無所求子房終不貴封侯忘機歸去同魚鳥濯足滄浪烟水收天童覺種田愽飯有來由免見區區向外求莫謂勞心便勞力大都工拙要全收雲巖因續收千鈞發重機千古仰遺則雖連十五城那換相如璧商量浩浩地爭如種田愽飯喫一片殊勝緣兩段俱奇特要知火裏鉢曇花天上人間不可加佛鑑懃種田愽飯喫飽臥長伸脚把將三界來安向左邊著引得龍牙老古錐手裏把柄破木杓無準範增收地藏翫月曰雲動有雨去有僧曰不是雲動是風動師曰我道雲亦不動風亦不動曰和尚適來又道雲動師曰阿誰罪過頌曰風起心搖樹雲生性起塵若明今日事昧却本來人龍濟修若教捉物入迷津但有纖毫即是塵不信舊時無相貌外尋知識也非真草堂清雲生洞裏陰風動林間響若明今日事半斤是八兩上方岳樹動風搖塵生雲起太上老君何曾姓李斷橋倫鼎州大龍山智洪禪師嗣白兆圓僧問色身敗壞如何是堅固法身師曰山花開似錦㵎水湛如藍頌曰問曾不知答還不會月冷風高古巖寒檜堪笑路逢達道人不將語默對手執白玉鞭驪珠盡擊碎不擊碎增瑕纇國有憲章三千條罪雪竇顯山花如錦水如藍雲在高峯月在潭兩箇泥牛闘入海行人脫袴杖頭擔地藏恩山花如錦春長在㵎水如藍碧湛然信步白雲深處去須知別有洞中天佛鑑懃色身敗壞世常情一點靈光到處晶㵎水如藍花似錦法身何處不分明南堂興雲散蟾輪滿烟收岳面高泥牛穿巨海轉角起風濤京兆府天寧璉續收山花如錦水如藍親見文殊接話談十字街頭輕一拶前三三對後三三瞎堂遠大龍景物最幽妍㵎水山花照眼鮮堅固法身何必問風光長在劫壺先天目禮山花似錦水如藍突出乾坤不露顏曾踏武陵溪畔路洞中春色異人間無準範襄州白馬山行靄禪師嗣白兆圓僧問如何是清淨法身師曰井底蝦蟇吞却月頌曰九重深密視聽難玉殿瓊樓宿霧攢爕理盡歸臣相事輪王不戴寶花冠丹霞淳頴州薦福思禪師嗣護國澄僧問古殿無佛時如何師曰梵音何來曰不假修證如何得成師曰修證即不成頌曰古殿苔生像不安霜風八面逼人寒梵音忽奏誰能會人天盡聽玉珊珊大洪遂古殿無佛梵音何來夢中喚省樓閣門開靈光一點絕塵埃耀古騰今徧九垓南堂興增收洪州同安志禪師嗣同安丕僧問二機不到處如何舉唱師曰徧處不逢玄中不失頌曰這邊那畔總難逢一句無私不處中紅日暮沉西嶂外空留孤影照溪東丹霞淳增收同安志因僧問凡有言句盡落今時學人上來請師直指師曰目前不說句後不迷又問如何是向上事師曰逈然不換標的即乖頌曰天黑雲深飛莫鴉鷺鷥立雪對蘆花幸然不屬今時事句後聲前會即差雪巖欽增收襄州廣德義禪師嗣廣德延僧問古人云言語道斷非去來今此理如何師曰彌勒涅槃知幾劫護明猶未降迦維頌曰妙湛圓指第一機降生成道涅槃時迦維摩竭雙林樹認著元來不是伊丹霞淳增收廣德義因僧問久負不逢時如何師曰扇開人不遇陋巷莫能收頌曰妙體堂堂相好全青霄獨步躡金蓮千華臺上猶慵坐弊垢襴衫豈肯穿丹霞淳增收襄州廣德周禪師嗣廣德延僧問教中道阿逸多不斷煩惱不修禪定佛記此人成佛無疑此理如何師曰鹽又盡炭又無曰鹽盡炭無時如何師曰愁人莫向愁人說說向愁人愁殺人頌曰收放隨時雖有準出門入戶恐難論長安路子君須到莫向深村草裏蹲虗堂愚增收襄州石門慧徹禪師嗣石門蘊僧問實際理地如何進步師曰鳥道無前僧曰幽谷白雲藏白擬心棲處隔山迷頌曰幽谷白雲藏白擬心棲處隔山迷直饒不住棲心處猶落怡山第二機懶菴需石門徹因僧問如何是三乘教外別傳一句師曰東村王老夜燒錢頌曰東村王老夜燒錢草鞋踏地帽指天家無白澤招禍福窮時相炒餓相煎洞山聰三乘教外別流傳瞎漢多知喚作禪天下衲僧參不到東村王老夜燒錢楊無為東村王老夜燒錢眼中塵霧口中烟招神引鬼成妖怪三脚蝦蟇飛上天地藏恩東村王老夜燒錢野鬼閒神滿目前休更逢人覓玄旨謝家人不在漁船上方益續收王老夜燒錢白日看星月磕頭禮慈尊手把名香爇道吾真木食草衣隨分過此身贏得樂天真忽咨教外別傳句未免燒錢引鬼神寶葉源王老燒錢言端語端錦包特石鐵裹泥團退耕寧增收石門徹因僧問雲光作牛意旨如何師曰陋巷不騎金色馬回途却著破襴衫頌曰瑞草藂中懶欲眠徐行處處逈翛然披毛戴角人難識為報芒童不用鞭丹霞淳增收郢州太陽慧堅禪師嗣靈泉仁因僧問如何是玄旨師曰壁上掛錢財頌曰輕輕人問玄中旨便吐肝腸說與他木人暗皺雙眉處石女多言爭奈何投子青玄旨玄旨壁上錢財挂起家門幸自平安白日招神引鬼楊無為玄旨分明示學人錢財壁上挂金銀連珠六貼三千貫不濟飽寒不濟貧張無盡增收鼎州德山圓明緣密禪師嗣雲門上堂大眾及盡去也直得三世諸佛口挂壁上猶有一人呵呵大咲若識此人參學事畢頌曰雙盲入暗路崎嶇日落栖蘆暫得甦爭似石人眠夜半免教舜讓守林居須知花綻非干木無脚行時早觸途昨朝風起長安道元是崑崙進國圖投子青收把斷襟喉風磨雲拭水冷天秋錦鱗莫謂無滋味釣盡滄浪月一鈎天童覺青山是父白雲兒雲散青山總不知玉兔晝眠雲母地金烏夜宿不萠枝足菴鑑岳州巴陵新開院顥鑑禪師嗣雲門僧問如何是道師曰明眼人落井頌曰落井須明出井機直宜擡眼動睛輝於斯倜儻無纖隔祖道汪洋得旨歸洞山聰南北東西苦問人新開多口接迷津從茲八駿追風急空望悠悠脚下塵佛印元好箇明眼人落井藂林話會幾時休修心未到無心地萬種千般逐水流正覺逸明眼人落井靈丹透金鼎黑水崑崙奴夜過漫天嶺覺海元秋夜霜天月正明仰觀星象約三更一條大路平如掌歸去何妨徹曉行保寧勇明眼人落井波斯上古臺龍門三級浪死水有曝腮長靈卓續收明眼人落井西方在東嶺捉得箇饅頭開拳是餬餅海印信語不邪笑不來拙鋪設巧安排猢猻將板拍野老舞三臺冶父川巴陵一句子對面却相謾大地平如掌何事放無端月菴果誰解當頭領坐斷毗盧頂稽首老巴陵明眼人落井月林觀明眼人落井恩深怨亦深海枯終見底人死不知心朴翁銛巴陵因僧問如何是吹毛劒師曰珊瑚枝枝撑著月頌曰要平不平大巧若拙或指或掌倚天照雪大冶兮磨礱不下良工兮拂拭未歇別別珊瑚枝枝撑著月雪竇顯珊瑚枝枝撑著月射斗鋒𨦵未足觀四海盡來歸貢後乾坤同耀寶光寒白雲端價重三千不可圖從教千古強名模長因塞北烟塵息記得江南啼鷓鴣長靈卓續收脫得邊城戍役身却來偷賞上園春御街前畔低聲語不覺衝他貌事人心聞賁巴陵因僧問如何是提婆宗師曰銀椀裏盛雪頌曰老新開端的別解道銀椀裏盛雪九十六箇應自知不知却問天邊月提婆宗提婆宗赤旛之下起清風雪竇顯大冶精金澄潭皎月南北東西孰分優劣昨夜春風一陣來掃盡千山萬山雪海印信人天會上分緇素龍象堂前定是非選甚邪魔并異類好教齊向此中歸保寧勇銀椀裏盛雪冰壺含寶月縱具四韋陀到此虗搖舌西天令嚴此土還別佛性泰續收提婆宗銀椀雪泰華摧滄海竭赤旛之下起清風吹落楊花硬如鐵佛心才巴陵因僧問祖意教意是同是別師曰鷄寒上樹鴨寒下水頌曰同別祖教問端由便將元價與他酬絲綸夜靜人垂釣曉得金烏帶月收投子青昨夜三更屈指輪世間休說兩三人數聲長笛離亭晚君向瀟湘我向泰保寧勇雞寒上樹鴨寒下水三百餘會不能宣九年面壁徒瞌睡休瞌睡上是天兮下是地佛性泰雞寒上樹鴨寒下水時節不相饒古今自然理寒松十里吼清風流水一溪聲未已湛堂準續收一朵梨花春帶雨金色頭陀笑不語龍宮海藏月明前織女姮娥相對舞咲者咲舞者舞十方無虗空大地無寸土南堂興雞寒上樹鴨寒下水鷲嶺費分踈少林提不起千峯寒色露全機眨上眉毛千萬里寂巖中雞作蒼鷹拏鼈鼻鴨為金翅作獰龍空王以此垂洪範錦上鋪花知幾重南巖勝般若啟柔禪師嗣雲門僧問西天以蠟人為驗未審此土以何為驗師曰新羅人草鞋頌曰龜毛拈得笑咍咍一擊萬重關鎻開假使蠟人似冰結當甚新羅人草鞋枯禪鏡益州青城香林院澄遠禪師嗣雲門僧問如何是西來的的意師曰坐久成勞曰便回轉時如何師曰墮落深坑頌曰一箇兩箇千萬箇脫却籠頭卸角䭾左轉右轉隨後來子湖要打劉鐵磨雪竇顯香林無雜木一一是旃檀野火忽然發清風天地寬祖意報爾曹坐久自成勞野軒遵禪家流何太錯只管追求無病藥若知煩惱即菩提坐久成勞亦安樂佛鑑懃續收絕消息處捉來有形影中走却只因懶問兒孫要把襴衫反著坐久成勞位次已高起時失却人天相無限行人認白毫月堂昌香林因僧問如何是衲衣下事師曰臘月火燒山頌曰臘月燒山萬種千般翹松鶴冷立雪人寒達磨不會大難大難雪竇顯臘月火燒山天邊兩矅還香林曾未會空坐劒門關佛印元僧問衣下事師答火燒山佛手遮不得人心似等閒正覺逸歲晚年來正苦寒千林木葉盡凋殘炎炎野火無流水應是隨風過別山上方益老大藂林快說禪不將禪挂口皮邊谷深山遠空無像何處人呼應不圓天童覺臘月燒山特地無端錦包特石鐵裹泥團圓悟勤臘月山頭火亘天衲衣下事若為傳老來不是觀時節困即長伸兩脚眠白楊順續收偉哉臘月火燒山巢知風穴知雨可憐謝三郎月下自搖櫓文殊能臘月燒山對面熱謾瞥然悟去身在長安咄哉無限未歸客沙裏求油實可憐石窻恭香林臘月火燒山鐵眼銅睛見亦難腦後一星輕點著三千里外髑髏乾拙菴光臘月火燒山苦口是黃連相將歲除夜竇八布衫穿大可憐把手入黃泉卍菴顏衲衣下事火燒山臘月家貧徹骨寒堪咲連延曾未息眉毛焦赤面皮乾天童淨香林臘月火燒山冷淡家風退後看閙裏果然輕踏著方知日午打三更百拙登臘月燒山天寬地寬築著磕著徹骨毛寒松源岳臘月火燒山天寬與地寬常啼菩薩苦滿市鬻心肝高原泉臘月燒山有甚相謾漆桶不快休要胡鑽朴翁銛增收香林因僧問如何是衲僧活計師曰耳裏種田頌曰耳裏種田滿口含烟鍾馗解舞十八拍張老乘槎上九天無菴全增收香林因僧問萬頃荒田是誰為主師曰看看臘月盡頌曰綉毬拋出畫堂前妙轉無私體自圓真箇要行劒刃事更須再見老雲門石明萬頃荒田誰是主須知答處有來由箇中若也無人委臘月看看又盡頭簡翁敬看看臘月盡日用事如何富嫌千口少貧恨一身多雲衲慶增收香林因僧問如何是室內一椀燈師曰三人證龜成鱉頌曰六耳阿謀事不成直言心表赤心人室中燈焰誰來撥白𩬊兒童兩𩯭新投子青皎皎清光徧界莫藏聲拋不出色豈能彰直下斬釘截銕剗却古今途轍高出臨濟德山三人證龜成鱉別別一回喫水一回噎圓悟勤三人證龜成鼈井底泥牛氣噎直饒辯瀉懸河有理亦難分雪耿耿孤光常皎潔佛性泰三人證龜成鱉毗嵐一吹吹滅從茲暗裏穿針鼻孔七花八裂水菴一三人證龜成鱉剛把天機漏泄木人嶺上唱歌石女眼中滴血懶菴需室內一盞明燈等閑一撲撲滅自然不辯東西免得證龜成鱉退菴奇
