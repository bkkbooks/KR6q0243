body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣東土旁出諸祖增收波羅提尊者西天無相宗首因異見王問何者是佛者曰見性是佛王曰師見性否曰我見佛性王曰性在何處曰性在作用王曰是何作用我今不見曰今見作用王自不見王曰於我有否曰王若作用無有不是王若不用體亦難見王曰若當用時幾處出現曰若出現時當有其八王曰其八出現當為我說者即說偈曰在胎為身處世名人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂頌曰古有異見王執迷生異見波羅提尊者為君通一線佛性等虗空八門常出現榮華有盛衰大道無更變變不變清涼須是犀牛扇南堂興在胎為身隨緣托質示天真分明見得當時事晝夜舒光轉法輪劉興朝居士八處世名人我今知是釋迦身堪悲擾擾昏昏者箇箇埋藏無價珍在眼曰見昨夜三更光掣電照破塵根一物無始知身坐空王殿在耳曰聞如何昏聵滿乾坤那知鼓響鐘鳴夜一一齊開衆妙門在鼻辨香旃檀林裏親聞得徹地薰天只自知相逢覿面難相識在舌談論方便須開大施門若是知音兩相見何勞一默與多言在手執捉放開揑聚總由伊笑他龐老當年道運水搬柴未是奇在足運奔草鞋踏破無消息吾今了了報君知自是不歸歸便得金陵牛頭山第一世法融禪師幽栖石室有百鳥銜花之異唐貞觀中四祖遙觀氣象知有奇人躬自尋訪見師端坐祖問曰在此作什麼師曰觀心祖曰觀是何人心是何物師無對作禮問曰大德高棲何所祖曰貧道不決所止師曰還識道信禪師不曰何以問他師曰嚮德滋久冀一禮謁祖曰即貧道是師曰因何降此祖曰特來相訪莫更有宴息處否師引至菴所唯見虎狼之類祖舉兩手作怖勢師曰猶有這箇在祖曰適來見什麼師無語祖於師坐石書一佛字師覩之竦然祖曰猶有這箇在師未曉乃請說法祖曰百千法門同歸方寸河沙妙德總在心源師領悟祖曰吾受三祖頓教法門今付於汝汝受吾言只住此山後有五人紹汝玄化百鳥不復䘖花號懶融僧問南泉牛頭未見四祖為什百鳥銜花泉曰為渠步步踏佛階梯曰見後為什不來泉曰直饒不來猶較王老師一線道又趙州因僧問牛頭未見四祖時如何州曰飽柴飽水見後如何曰飽柴飽水頌曰古人抱志坐牛頭信師說話示無休飽柴飽水安心靜真正無私是趙州汾陽昭牛頭峯頂鎖重雲獨坐寥寥寄此身百鳥不來春又盡不知誰是到菴人雪竇顯紫氣氤氳透白雲因逢宗匠指迷津銜花百鳥空惆悵不見菴中舊主人楊無為喧寂同為不二門莫來無佛處稱尊寄言牛首菴中老百鳥䘖花禍有根祖印明二一榻蕭然傍翠陰晝扃松戶冷沉沉懶融得到平常地百鳥䘖花無處尋花鳥不來空過春牛頭山上懶融人自心淨故元無作放下許多間苦辛天童覺花落花開百鳥悲菴前物是主人非桃源咫尺無尋處一櫂漁蓑寂寞歸張無盡寥寥風月臥烟霞百鳥從茲不獻花人義盡從貧處斷世情偏向有錢家夢菴信續收六葉牛頭樹別栽五天熊耳縱雲雷須知四祖乘機接百鳥䘖花去不來剋符道者水因有月方知靜天為無雲始覺高獨坐孤峯休更問此時難著一絲毫別峯印雨前不見花間葉雨後渾無葉底華胡蝶紛紛過墻去不知春色落誰家孤峯深著鞭騎馬去空手步行歸寂寞菴前路銜花鳥不飛鐵山仁學者疑心尚未什飽柴飽水坐牛頭子期不用黃金鑄末世知音有趙州橫川珙增收潤州鶴林玄素禪師嗣牛頭威有僧敲門師云誰僧云是僧師云莫道是僧佛來也不著僧云為甚麼不著師云無棲泊處頌曰十月清霜重臨風徹骨寒苦無棲泊處擺手出長安松源嶽道箇佛來也不著骨頭節節是黃金不消三拜勘破了鶴唳空山竹滿林自默恭杭州徑山國一道欽禪師嗣鶴林素因馬祖遣人送書到書中作一圓相師發緘見遂於圓相中著一畫却封回忠國師聞得乃曰欽師猶被馬祖惑頌曰馬祖當時見徑山同風微露密機關無端却被南陽老平地坑人似等間佛印元被惑之言事有由神交千里芥針投誰知解使雲通信我不然兮石點頭照覺總自南自北自西自東溪山雖異雲月還同何事南陽老倒令人擾擾匇匇地藏恩馬師仲冬嚴寒欽師孟夏漸熱雖然寒熱不同彼此不失時節徑山杲增收國一因唐代宗詔至闕下親加禮敬一日師在大內見帝來乃起立帝云師何以起師云檀越何得向四威儀中見貧道頌曰法地安然不動移振身而立亦相宜勿於起坐經行外別討大唐天子師石溪月立在威儀外全身在裏頭重重賜龍袖難掩面門羞西巖惠萬乘君王一國師尋常不離四威儀山長水遠空相憶黃葉吹風人未歸間極雲杭州鳥窠道林禪師嗣國一初詣長安西明寺學華嚴唐代宗詔國一禪師至闕乃謁之得法歸於西湖秦望山有長松枝葉繁茂盤屈如蓋遂棲止其上故以為名有侍者會通乃唐德宗六宮使棄官從師落𩬊伏勤數年未蒙印授一日告辭師曰往甚處通曰往諸方學佛法去師曰若是佛法老僧亦有少許曰如何是和尚佛法師拈起布毛吹一吹通於言下大悟更不復他遊乃居左右後開法為的嗣或號布毛侍者頌曰侍者初心學勝緣辭師擬欲去參禪鳥窠知是根機熟吹毛當下得心安汾陽昭鳥窠拈起布毛吹一道寒光對落暉雖是老婆心意切悟來由在半途歸石門易無風匝匝起波痕碧髻羅紋正眼觀恰值黃河三凍鎖那羅延窟見龍蟠雲居祐鳥窠吹布毛紅日午方高趙王因好劒合國人帶刀真淨文顧視顰眉落二三那堪重把布毛拈承當直下便休去眼裏無筋舉世嫌成枯木老倒忘機是鳥窠西湖湖上控烟蘿布毛吹起無多子鐵眼銅睛不奈何寶峯乾鳥窠拈起布毛吹鷲嶺祇園頓息疑須信化工多少力枯槎生出向東枝張無盡老師曾把布毛吹舉處分明第一機欲識箇中端的意嶺頭遙指白雲飛真覺添直下無私是鳥窠布毛吹起絶譊訛會通忽綻頂門眼照破山河佛與魔旻古佛眼中難著透金塵悟了今人即古人大地撮來如粟米一毛頭上現全身佛鑑勤欲求佛法往南方老大宗師為舉揚山花滿地都狼藉一陳風來一陳香龍門遠布毛一吹當下知歸冷光遍地獨露針錐楚安方續收白鳳烟霞控鳥窠驪龍珠耀祖山河當初捻起布毛意體用毗盧些子多剋符道者游騎紛紛驟曉風將軍施令在城東拈來金鏃些兒妙射破花心一點紅塗毒藥兩指爪開權撮起一毛頭上為吹開這回不在身邊立休說清風遍九垓心聞賁用處天然別更不落思惟山河并大地全露法王機月林觀鳥窠拈起布毛吹萬仞孤峯對落暉未舉已前先瞥地早知不是丈夫兒秀巖瑞鳥窠佛法無多子只在襤襂一布毛一氣吹來何處去至今天下有譊訛懶菴需八十翁翁要力行布毛吹起禍重生殺人流血三千里枯樹枝頭一老僧北山隆佛法有些少言中沒網羅布毛吹起處依舊不離窠無準範增收鳥窠因白居易侍郎問如何是佛法大意師曰諸惡莫作衆善奉行白曰三歲孩兒也解恁麼道師曰三歲孩兒雖道得八十老人行不得頌曰惡無相貌善無形皆自心田長養成不動鋒鋩輕剔破菩提煩惱等空平無量壽增收袁州蒙山道明禪師嗣五祖因趂盧行者至大庾嶺者見師至即擲衣鉢於石上曰此衣表信可力爭耶任將去師遂舉之如山不動踟蹰悚栗乃曰我來求法非為衣耶願行者開示曰不思善不思惡正與麼時阿那箇是明上座本來面目師當下大悟遍體汗流泣禮問曰上來密語密意外還更別有意旨不曰今與汝說者即非密也汝若返照自己面目密却在汝邊師云某甲雖在黃梅隨衆實未省自己面目今蒙指授入處如人飲水冷暖自知今行者即是某甲師也曰汝若如是則吾與汝同師黃梅善自護持頌曰正當恁麼時歷劫不曾迷步步趍三略歸家鎮絶疑龍門遠堂堂妙相絶錙銖善惡都忘見也無萬里雲收天界淨海心無浪月輪孤佛性泰平欺佛祖氣如王直趂盧能到嶺傍不得衣盂遭惡水分明雪上更加霜笑翁堪不思善不思惡千手大悲難摸索難摸索處盡掀翻方知普化搖鈴鐸殺六巖輝描不成兮畫不就贊不及兮休生受本來面目無處藏世界壞時渠不朽無門開夜深傳付老盧衣恨殺黃梅老古錐向道趕人休趕上果然落節一番歸雪溪戒嵩嶽破竈墮和尚嗣嵩嶽安國師因嵩山塢有廟甚靈殿中唯安一竈遠近不輟祭祀烹殺物命甚多師以杖敲竈三下云咄此竈只是泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下竈乃傾破墮落須臾有青衣峩冠設拜曰我本此廟竈神久受業報今蒙師說無生法得脫此處生天特來致謝師曰是汝本有之性非吾強言神再拜而沒後僧問師某甲久侍左右未蒙方便竈神得何宗旨便乃生天師曰我只向伊道是泥瓦合成別也無道理為伊僧佇思師曰會麼曰不會師曰本有之性為什麼不會僧作禮師曰墮也墮也破也破也後有僧舉白安國師國師歎曰此子會盡物我一如頌曰古廟神竈禪師法要杖子敲來業身勃跳楊無為竈破土落不在圖度呼茶喚飯量水煎藥黃蘗勝禍福威嚴不在靈殘杯冷炙笑何人一從去後為消息野老猶敲祭鼓聲龍門遠二春寒料峭凍殺年少切忌參商別無奇妙低頭侍奉歡喜問訊佛法商量傷子性命倚竈為靈自不靈靈蹤斷處一堆塵野老不來敲祭鼓打正因邪別是春佛燈珣續收聖不聖兮靈不靈磚瓦為堆土合成杖頭擊著無消息多年妖怪不成精而今仔細思量著為他間事長無明大溈智摩天鴆鳥九頭毒護世那吒八臂長水自竹邊流出冷風從花裏過來香南巖勝增收破竈墮因僧問如何是大修行底人師曰擔枷帶鎖如何是大作業底人師曰修禪入定頌曰帶鎖擔枷招罪犯安禪入定墮深坑兩頭踢脫無依倚一箇閒人天地間別山智增收河北智隍禪師嗣六祖始參五祖循乎漸行後結庵長坐二十餘載不見惰容及遇六祖門人䇿禪師激心勤求法要往參六祖祖愍其遠來便垂開抉師於言下豁然契悟前二十年所得心都無影響頌曰禪非出入非行坐坐立經行總是禪若是守他山鬼窟迢迢特地隔西天本覺一當年睥睨此山阿欲著紅樓貯綺羅今日重來無一事却騎羸馬下坡陀增收西京光宅寺慧忠國師嗣六祖居南陽白崖山黨子谷四十載不下山唐肅宗詔赴京待以師禮問師得何法或曰師在曹溪得何法師曰陛下還見空中一片雲麼曰見師曰釘釘著懸掛著頌曰無開口處却開口有意歸時即便歸趙州不在明白裏未是羺羊掛角時慈受深增收忠國師因肅宗問如何是十身調御師乃起立曰還會麼曰不會師曰與老僧過淨瓶來頌曰𪂶𪂶鳥宿空池魚從腳下過𪂶𪂶總不知若也知碧潭深萬丈直下取魚歸寶峯淳帶雪含霜半倚籬橫斜影裏露仙姿前村昨夜春來了竹屋老僧猶未知心聞賁國師因肅宗又問曰如何是無諍三昧今訛作如何是十身調御師曰檀越踏毗盧頂上行曰此意如何師曰莫認自己清淨法身又問師師都不視之曰朕是大唐天子師何以殊不顧視師曰還見虗空麼曰見師曰他還眨眼視陛下否頌曰一國之師亦強名南陽獨許振佳聲大唐扶得真天子曾踏毗盧頂上行雪竇顯二鐵槌打碎黃金骨天地之間更何物三千剎海夜澄澄不知誰入蒼龍窟作者清規世莫儔金篦曾握上龍樓良哉撥破毗盧頂直得文殊笑點頭溈山秀二寶月含虗列數峯高低誰辨淡烟中須彌擊碎鹽官鼓降得毗盧在下風步步踏著毗盧頂亦非自己清淨身妙入空門得空相祖師肝膽佛精神佛鑑勤增收國師因代宗命試驗西天大耳三藏師問曰汝得他心通邪曰不敢師曰汝道老僧即今在什麼處曰和尚是一國之師何得却去西川看競渡良久再問汝道老僧即今在什麼處曰和尚是一國之師何得却在天津橋上看弄猢猻師良久復問汝道老僧只今在甚麼處藏罔測師叱曰這野狐精他心通在什麼處藏無對頌曰他心三藏太顢頇猢孫觀了看划船對面國師尋不見祇為從來被眼謾冶父川日應羣機必有方未知何處覔南陽自從失却猢孫後橋上多時不作場懶菴樞藏鋒避箭路千差萬古相饒老作家好是鷺鷥無覔處夜深和月宿蘆華鐵山仁國師一日喚侍者者應諾如是三召皆應諾師曰將謂吾孤負汝却是汝孤負吾頌曰師資會遇意非輕無事相將草裏行負汝負吾人莫問任從天下競頭爭雪竇顯國師喚侍者重言不當喫他耳又不聾自又無處雪投子青龍吟虎嘯與誰同天際雲生洞下風從此太平田舍老兒孫擕手賀年豐佛印元國師三喚侍者打草只要蛇驚誰知㵎底青松下有千年茯苓黃龍南二國師有語不虗施侍者三應絶消息平生心膽向人傾相識不如不相識侍者何曾喚不回國師乾地起風雷當時若也相逢著九轉還丹化作灰翠巖真老倒南陽太古錐等閒垂釣泛江湄夜靜水寒魚不食滿船空載月明歸海印信國師三度喚侍者三回應家富小兒嬌病多諳藥性吾負汝隴西鸚鵡能言語汝負吾笑殺西來碧眼胡欲會南陽端的意大都年老覺心孤佛慧泉國師三喚侍者侍者三度應喏茫茫亂下針錐誰知可知禮也白雲端國師三喚古今明何事勞生不自能信是與人無舊分非干人與我無情照覺總三喚三回應已休却云孤負強生讎大唐國裏揚家醜試問南陽羞不羞佛國白國師三喚侍者三應兩個無孔鐵槌傍觀也須氣悶彼此無便宜今古誰相信圓通秀國師三喚侍者侍者三度應喏若言負汝負吾真個可知禮也智海清國師三喚侍者侍者三應無餘只知身強力壯不覺年老心孤寶峯祥南陽三喚侍者三酬依稀魯國倣佛揚州回首寒江空漾碧夕陽西去水東流上方益國師年老太多圖截鶴由來要續鳧彼此無瘡安樂甚何勞傷損好皮膚祖印明雄鎮南陽傳祖令清風凜凜動寰區老來偏愛晚生子把手時時教順朱佛心才喚處分明應處親不知誰是負恩人東家漏泄西家事却使傍人笑轉新長靈卓三喚三應意已深南陽曲盡老婆心傍人莫謂揚家醜到底真鍮不博金慈受深國師侍者共悠悠無事堂前互唱酬鑽天子穿雲去空使行人指路頭佛鑑勤寶劒連飛急透頂便通神有時輕按處驚動五湖賓高庵悟世路風波不見君一回見面一傷神水流花落知何處洞口桃花別是春鼓山圭啞子得夢向誰說起來相對眼麻迷已向人前輸肺府從教他自覔便宜徑山杲續收三呼三應諾彼此不相辜踏斷南陽路馨香滿道途五祖演三喚三應更饒貼稱月逗寒窗水歸巨浸負汝負吾全鋒敵勝瞎堂遠喚應尋常誰不曉及乎按劒總茫然分明好個神仙訣父子從來不許傳訥堂思南陽三喚無風起浪侍者應諾為蛇安腳明眼衲僧知不知萬古清風自廖廓尼無著總三喚須知意不輕平生肝膽一時傾負吾負汝還知否縱有丹青畫不成水菴一一段風光畫不成洞房深處暢豫情頻呼小玉元無事只要檀郎認得聲靈巖安全提正令高低普應三應三呼諦聽諦聽月林觀一日君家把酒杯幾年波浪與塵埃不知烏石嶺頭路老去相尋能幾回頑石空一箭射雙鵰雙鵰隨手落波動嶽陽城月滿滕王閣雪菴謹鐵枷無孔要人擔纍及兒孫不等間欲得撑門并拄戶更須赤腳上刀山無門開一擲神杯定吉凶再占重卜轉靈通分明見了今年事却說明年事不同無準範三喚聲聲出痛腸國師何事錯商量欲分恩怨無分處吳楚茫茫共一江覺庵真增收國師因僧問如何是佛法大意師曰文殊堂裏萬菩薩曰不會師曰大悲千手眼頌曰時年蔬菜賤滿地蘿蔔頭一文買一箇得者飽佛鑑勤尋真悟入蓬萊島香風不斷松花老採芝何處未歸來白雲滿地無人掃棘田心國師因耽源問百年後有人問極則事作麼生師曰幸自可憐生剛要箇護身苻子作麼頌曰護身苻子最通靈國師起坐總將行耽源得用南方去為說令人睡眼醒汾陽昭不重己靈猶自可護身苻子更那堪為君旨外通消息秋月無風落碧潭海印信續收真正道流行腳去護身符子不須擔國師實為耽源切不是臨岐作對談橫川珙國師化緣將畢乃辭唐代宗帝曰師滅度後弟子將何所記師曰告檀越造取一所無縫塔曰就師請取塔樣師良久曰會麼曰不會師曰貧道去後有侍者應真却知此事師遷化後帝詔應真問此意如何真述偈湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識應真後住耽源山頌曰無縫塔見還難澄潭不許蒼龍蟠層落落影團團千古萬古與人看雪竇顯無縫塔從誰手造雖然有樣不堪傳如何強寫無層級永向琉璃殿上懸白雲端窣堵無縫立還危寶鐸玲瓏八面垂千手大悲捫不著百重關鎖下金槌羅漢南前面是珍珠琉璃後面是瑪瑙珊瑚左邊是觀音勢至右邊是普賢文殊中間有箇幡子被風吹著道胡盧胡盧五祖演續收欲建南陽無縫塔般輸下手實應難本來成現何須作到處巍然著眼看本覺一八面自玲瓏盤空勢岌㠋表裏鎮巍然若為分六鑿執名匿相認影迷形臥龍長怖碧潭清合同船子開心碗日用如何不現成圓悟勤無縫塔兮不見影廓然一片真如境爍迦羅眼電光流杳杳冥冥不見頂佛鑑勤窣堵古形儀未舉已先知巍然存海底影落樹頭輝潛菴光無縫塔兮誰敢知國師也是落便宜信知師子行踪絶何必尋常問是非問是非百草頭頭雨露垂戴無為湘南潭北影團團面面簷楹風雨寒突出虗空無縫罅從教千古與人看無門開國師塔樣最尖新覿面拈來不露文却被耽源添一線至今描邈亂紛紛高峯妙增收國師曰語漸也返常合道論頓也不留朕迹頌曰上無衝天之計下無入地之謀蔡州千箇萬箇打破只在須臾雪竇顯二六時中合返常經行坐臥好參詳相逢不審人人會問著依前未廝當本覺一增收忠國師因丹霞來才展坐具師曰不用不用霞退後三步師曰如是如是霞進前三步師曰不是不是霞繞禪牀一匝而出師曰去聖時遙人多懈怠三十年後討箇師僧也難得大溈云丹霞可謂懷藏至寶遇智者乃增輝國師鴻門大啓陟者須是其人如今還有為丹霞作主者麼出衆與大溈相見有麼良久云不是龍門客切忌遭點額頌曰不用不用千聖不共如是如是蝮蝎蛇虺不是不是徹骨徹髓進前退後繞禪牀掣電之機落二三印空叟增收國師問紫璘供奉甚處來曰城南來師曰城南草作何色曰作黃色師乃問童子城南草作何色童曰作黃色師曰祇這童子亦可簾前賜紫對御談玄頌曰慣使渡頭船如今不記年愛他風浪惡方是趂粗錢月堂昌欲把枯腸盡底傾出門不覺又叮寧勸君及早回頭去莫待春風柳眼青虗堂愚增收永嘉真覺玄覺禪師嗣六祖精天台止觀圓妙法門四威儀中常冥禪觀後因左溪朗激勵與東陽策同詣曹溪初到振錫𢹂瓶繞祖三匝祖曰夫沙門者具三千威儀八萬細行大德自何方而來生大我慢師曰生死事大無常迅速祖曰何不體取無生了無速乎師曰體即無生了本無速祖曰如是如是時大衆無不愕然師方具威儀參禮須臾告辭祖曰返太速乎師曰本自非動豈有速耶祖曰誰知非動師曰仁者自生分別祖曰汝甚得無生之意師曰無生豈有意耶祖曰無意誰當分別師曰分別亦非意祖歎曰善哉善哉留一宿時謂一宿覺頌曰圓悟真心作本心無人證據自沉吟崫多激發緣當熟一見能師便得金汾陽昭永嘉萬里到曹溪三拜云何略不施却繞禪牀三匝後卓然振錫底威儀本覺一掀翻海嶽求知己撥動乾坤見太平二老不知何處去宗風千古播家聲正法灝振錫曹溪生大我慢一宿少留咄哉齪漢永嘉城裏闡宗風江月松風無畔岸無禪才
