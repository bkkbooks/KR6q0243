body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第四世之五南嶽下後第三世之一增收趙州觀音院從諗禪師嗣南泉師初謁南泉泉問汝是有主沙彌無主沙彌師曰有主沙彌泉曰那箇是你主師近前躬身曰仲冬嚴寒伏惟和尚尊候萬福泉器之許其入室頌曰解把一莖野草喚作丈六金身會得頭頭皆是道眼中童子面前人顏如如試問如何是主人進前叉手敘寒溫但知北極羣星拱不見黃河徹底渾寶葉源趙州一日問南泉曰如何是道泉曰平常心是道師曰還可趣向也無泉曰擬向即乖師曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知無記若真達不疑之道猶如太虗廓然蕩豁豈可強是非耶師於言下悟理頌曰平常心是道舉步入荒草翻嗟王老師到底不能曉不能曉玉兔金烏任飛走雲峯悅欲識平常道天然任自然行船宜舉棹走馬即加鞭若遇飢來飯還應困即眠盡從緣所得所得亦非緣佛鑑勤二所得亦非緣當人自了然雨中看皓月火裏汲清泉直立頭垂地橫眠腳指天應須與麼會方契祖師禪若謂平常心是道枝蔓向上更生枝貼肉汗衫如脫了喚來眼上與安眉鼓山圭勸君不用苦勞神喚作平常轉不親冷淡全然沒滋味一回舉著一回新徑山杲續收趙州昔日見南泉言下投機自廓然要會平常心是道平常不住道方玄本覺一白日遲遲兮花菲菲白雲流水兮兩相依長安路上人迹稀南泉也落第二機慈受深礙得銅盤不打老鼠所以抽身入還從屋裏來圾教臺凳穩聊且勸三杯兄呼弟應殷勤處留得兒孫辨劫灰月堂昌遇飯喫飯遇茶喫茶千重百匝四海一家解却粘去却縛言無言作無作廓然本體等虗空風從虎兮雲從龍圓悟勤萬里長空雨霽時一輪明月瑩清輝浮雲掩斷千人目見得嫦娥面者稀龍門遠向道平常心是道斬丁截鐵妙中妙若將玄路擬思量連纍兒孫入荒草業識茫茫知不知終日紅塵無價寶大溈智玄途不涉透離微道合平常發上機無影樹頭春色曉金雞啼在不萌枝足菴鑒悟得平常達本鄉時人多怕落平常青春只有九十日爛醉都無一百場雪菴瑾春有百花秋有月夏有凉風冬有雪若無間事掛心頭便是人間好時節無門開趙州一日問南泉曰知有底人向甚麼處去泉曰山前檀越家作一頭水牯牛去師曰謝師指示泉曰昨夜三更月到窗頌曰拽脫鼻頭何處是亂拋泥水恣縱橫日斜倒坐騎驢去又見東山片月生保寧勇出窟金毛奪父機同聲哮吼衆狐疑三更窗月如清畫誰敢重來弄嶮𡾟寶峯祥眼中見慣是尋常又不驚人又久長留得寒窗夜來月三更依舊照茅堂鼓山圭度體裁衣量水打碓毫𩬊不差且居門外徑山杲續收南泉搖頭趙州擺尾子細看來二俱失利慈受深檀越家中作水牛收來放去任優游不曾犯著人苗稼何必南泉對趙州照堂一戴角擎頭笑一場父子家和醜外揚知有底人何處去春來依舊百花香冶父川掣開金殿鎖撞碎玉樓鐘貪程未歸客徒自覔行蹤木菴永趙州一日到茱萸執拄杖於法堂上從東過西萸曰作甚麼師曰探水萸曰我這裏一滴也無探箇甚麼師以杖倚壁便下頌曰逐步移笻探淺深果然滄海碧沉沉一雙足迹分明在將謂歸家不可尋保寧勇古今難透趙州關取次施為不等間拄杖靠來斜倚壁輕如毫𩬊重如山佛鑑勤茱萸這裏無一滴趙州無言便走出春去秋來三百年拄杖至今猶倚壁鼓山圭深淺聊將拄杖探忽然平地起波瀾傾湫倒嶽驚天地到海方知徹底乾徑山杲續收趙州有語標庭柏今古叢林光烜爀若到茱萸堂上行到底反成箇老賊地藏恩趙州探水誰能知委一滴也無洄澓衮沸靠却拄杖囉囉哩哩文殊道一滴也無費盡工夫靠倒拄杖何處逢渠香爐上一堆牛糞氣東壁上倒掛大葫蘆典牛游趙州曾探水茱萸無一滴東西了拄杖便靠壁滄海深處歸何人辨端的楚安方平地鼓波濤青天轟霹𮦷腳下爛如泥身上元不濕古往今來幾百年拄杖依然空靠壁無際派增收趙州因僧問如何是清淨伽藍師曰丫角女子曰如何是伽藍中人師曰丫角女子懷胎頌曰橫胸抱腹藏龍種剖膽㓟肝觸鳳胎勿謂此兒容易得須知出自痛腸來汾陽昭咄這老竭得恁饒舌清淨伽藍一時漏泄金剛門外笑呵呵菩薩堂中聲哽咽海印信丫角女子出天真清淨伽藍蓋得人世俗不知林下意無錢難得買紅裙佛鑑勤增收趙州因僧問外方忽有人問趙州說什麼法如何抵對師曰鹽貴米賤頌曰鹽貴米賤諸事成現擬欲商量腦後箭懶菴需趙州因僧辭師曰甚處去曰諸方學佛法去師竪起拂子曰有佛處不得住無佛處急走過三千里外逢人不得錯舉曰與麼則不去也師曰摘楊花摘楊花頌曰截斷三關過者稀臨鋒誰解振全威楊花摘處何人見風送漫天似雪飛佛慧泉堂堂好箇丈夫兒剛被胡麻取次欺若解奮拳張意氣世間何處可容伊保寧勇青山不異白玉無瑕茫茫流水擾擾黃花有佛處纖毫不立無佛處萬別千差長安路上未歸客尋溪由自摘楊花天童覺三千里外兩重關衲子紛紛過者難回首石橋南北路楊花風散雪漫漫普融平有佛處不得住生鐵稱鎚被蟲蛀無佛處急走過撞著嵩山破竈墮三千里外莫錯舉兩箇石人相耳語恁麼則不去也此話已行遍天下摘楊花摘楊花唵嚤呢噠哩吽㗶吒徑山杲續收摘楊花摘楊花打鼓弄琵琶昨日栽茄子今日種冬瓜訥堂思有佛處不得住春風蕩蕩飛楊絮無佛處急走過一葉漁舟江面破林裏烏鵲去又來園中桃李開還謝舜若多神相太空無目仙人逢暗夜白楊順鐵山崩倒壓銀山盤走珠兮珠走盤密把鴛鴦閒繡出金針終不與人看松源嶽有佛無佛不得住三千里外無憑據趙州嬴得口皮光却是這僧知落處虗堂愚趙州因僧問承聞和尚親見南泉是否師曰鎮州出大蘿蔔頭頌曰因問當初得法緣不言東土及西天鎮州有菜名蘿蔔濟却飢瘡幾萬年汾陽昭鎮州出大蘿蔔天下衲僧取則只知自古自今爭辨鵠白烏黑賊賊衲僧鼻孔曾拈得雪竇顯鎮州蘿蔔播華夷萬物還他本土宜孰謂當時人獨愛至今更是好充飢正覺逸陶潛彭澤唯栽柳潘嶽河陽只種花何似晚來江上望數峯蒼翠屬漁家海印信衲僧巴鼻徒穿鑿平實商量紹祖宗多謝張公勤苦力滿園留得過深冬佛慧泉鎮州出大蘿蔔頭報君來處須分曉衲僧多是渾瀹吞子細得他滋味少白雲端鎮州蘿蔔天然別滿口明明說向人薄福闡提人不信一枚稱得重三斤保寧勇鎮州出菜名蘿蔔過後思量却難得王老兒孫不覆藏逢人直露真消息長靈卓趙州古佛尚多言蘿蔔出生鎮府田天下衲僧多咬嚙齒間蹉過老南泉文殊道參見南泉王老師鎮州蘿蔔更無私拈來塞斷是非口雪曲陽春非楚詞徑山杲續收趙老機關沒淺深鎮州蘿蔔接叢林過後思量也難得入泥入水老婆心大溈智鎮州出大蘿蔔頭師資道合有來由觀音寺裏有彌勒東院西邊有趙州鼓山圭青出於藍氷生於水寸步不通白雲萬里或菴體些兒活計口皮邊點著風馳與電旋謾說鎮州蘿蔔大何曾親見老南泉石菴玿親見南泉箇眼目老人說話無拘束只因菜氣不曾除帶纍兒孫咬蘿蔔野雲南增收趙州因秀才問曰佛不違衆生願是否師曰是曰某甲欲覔和尚手中拄杖得否師曰君子不奪人所好曰某甲非君子師曰我亦不是佛頌曰當機轉處不躊躇琉璃盤裏走明珠趙州老子村校書一條拄杖兩人舁石菴玿增收趙州因參百丈丈問甚處來師曰南泉來曰南泉近日有何言句示徒師曰無事之人直須悄然去曰悄然一句且致忙然一句作麼生道師進前三步丈便喝師作縮身勢丈曰大好悄然師便出去頌曰作家相見彼此難搆忙然悄然進前縮後揑不成塑不就大路不行草裏走佛鑑勤門裏有門外有不作嚴平犯牛斗師子吼野干鳴摘出離婁眼裏睛一手縮一手伸重陽決定九月九掀翻海嶽訪知音赤骨力窮露雙肘瞎堂遠增收趙州示衆曰佛之一字吾不喜聞幻菴覺拈云諸人切忌恁麼會既不恁麼會又作麼生會乃頌曰佛之一字不喜聞去年依舊今年春今年春間降大雪陸墓烏盆變白盆增收趙州因大衆晚參師曰今夜答話去也有解問者出來時有一僧便出禮拜師曰比來拋磚引玉却引得箇墼子法眼問覺鐵觜先師意作麼生覺云如國家拜將相似乃問甚人去得時有人出云某甲去得云爾去不得法眼云我會也頌曰探竿影草幾人知正似將軍一面旗斬將安營都在我倒騎鐵馬上須彌慈受深千年田八百主誰當機辨來處趙州要答話拋磚引墼子覺老話端倪如拜將相似去得去不得言下分緇素箇裏高於萬仞峯不動纖毫擒佛祖圓悟勤趙州上堂金佛不度爐木佛不度火泥佛不度水真佛內裏坐頌曰泥佛不度水神光照天地立雪如未休何人不鵰僞金佛不度爐人來訪子胡牌中數箇字清風何處無木佛不度火常思破竈墮杖子忽擊著方知孤負我雪竇顯併却泥佛金木佛趙州放出遼天鶻東西南北謾擡頭萬里重雲只一突白雲端泥佛不度水法華前陳曾止止君之退步若參詳不使縱然波浪起金佛不度爐海上江山入畫圖千手大悲徒著力却慚舜若眼眉粗木佛不度火多口阿師曾議過隈刀避箭不堪論無限英雄又蹉過大溈秀金佛木佛泥佛度爐度水度火盡入趙州紅爐烈𦦨光中鍛過一聲白雪陽春萬古無人能和鼓山圭九十七種妙相顧陸丹青難狀趙州眼目精明見心肝五臟徑山杲續收木佛不度火甘露臺前逢達磨惆悵洛陽人未來面壁九年空冷坐金佛不度爐坐嘆勞生走道途不向華山圖上看豈知潘閬倒騎驢泥佛不度水一道靈光照天地堪羡玄沙老古錐不要南山要鱉鼻三聖昌三佛形容總不真眼中瞳子面前人若能信得家中寶啼鳥山花一樣春冶父川金佛不度爐風光滿帝都少年花酒客大醉幾人扶木佛不度火大士無人我毫釐念不差永劫遭羈鎖泥佛不度水明月照千里風高古木秋凍盡長江底金佛不度爐窮源有處無木佛不度火渾崙咬不破泥佛不度水何處不是你真佛屋裏坐趙州言是禍水牯會耕田黃牛能拽磨常菴崇金佛不度爐圓光爍太虗直下便薦得不用更躊躇木佛不度火院主眉毛墮烈𦦨亘天虹舍利無一顆泥佛不度水衲僧難下觜擬議隔千山迢迢十萬里真佛內裏坐趙州休話墮覿面便承當擡眸即蹉過金佛木佛泥佛穿來擲過閻浮更說真佛在內無端已被塗糊尼無著總真佛屋裏坐開口成話墮幸自可憐生教我說甚麼月林觀泥佛金佛木佛度水度火度爐妙體本來無處所莫將真佛強塗糊天目禮增收趙州因尼問如何是密密意師以手掐之尼曰和尚猶有這箇在師曰却是你有這箇在頌曰密密深深意最長幾人冷地錯商量師姑若會趙州掐鐵打心肝也斷腸慈受深兜羅綿樣硬贅頭河北風流老趙州醎處著鹽淡添水軒頭一笑更無休正堂辨猛虎深藏淺草窠幾回明月入烟蘿頂門縱有金剛眼未免當頭蹉過他高峯妙趙州因僧辭師問甚處去曰閩中去師曰彼中兵馬隘你須回避始得曰向甚麼處回避師曰恰好頌曰僧去閩中路不遙報言軍馬閙嘈嘈問師回避歸何處恰好安眠日正高汾陽昭聞說閩中兵馬多叮嚀遊子避干戈臨岐指箇藏身處無限雄師不奈何正覺逸七閩歸路日爭鋒回避須教不見蹤恰好藏身何處是青山雲外萬千重佛慧泉趙州因僧遊五臺問一婆子曰臺山路向甚麼處去婆曰驀直去僧便去婆曰好箇師僧又恁麼去後有僧舉似師師曰待我去勘過明日師便去問臺山路向甚麼處去婆曰驀直去師便去婆曰好箇師僧又恁麼去師歸院謂僧曰臺山婆子為汝勘破了也頌曰臺山路上老婆禪南北東西萬萬千趙州勘破人難會來往草鞋徹底穿汾陽昭趙州勘破婆子葉落便合知秋天下幾多禪客五湖四海悠悠慈明圓靈龜未兆無凶吉變動臨時在卜人路頭問破誰人委王老東村怒目瞋投子青趙州作者勘婆婆太平時代用干戈趙州收得龍泉劒掃盡烟塵總是他佛印元僧問遊臺路婆直指不誤雖然徑直言奈緣多恁去趙州勘破歸會者憑何據月色曉堂分雲收山嶽露浮山遠傑出叢林是趙州老婆勘破沒來由而今四海清如鏡行人莫與路為讎黃龍南撥動干戈老趙州坐觀勝敗有良謀婆婆勘破人誰委多少禪流錯路頭海印信趙州勘破老婆禪語默分明在目前近日五湖參學者剛於岐路走如烟淨照臻言中辨的老禪和驀直臺山路不蹉勘破却回人莫問嶽陽船子洞庭波雲峯悅昔日趙州為主將老婆戰罷許誰評而今何事臺山路却被時人取次行大溈秀臺山一路去悠悠親到還他古趙州勘破老婆回首日長江依舊向東流佛慧泉干戈中立太平基磈雨條風勝古時婆子為君勘破了趙州腳跡少人知白雲端何事趙州婆子話雄雄今古振家聲高空有月千門閉大道無人獨自行保寧勇趙州一勘老婆也千古英風價轉新南去北來猶未薦臺山從此長荊榛照覺總似狂不狂趙州老或凡或聖人誰曉是非長短任君裁婆子被伊勘破了真淨文趙州問路婆子答云直與麼去皆云勘破老婆婆子無你雪處同道者相共舉景福順勘破不勘破婆子能招禍直饒千眼補陀人也是大蟲看水磨雲居祐趙州勘破事非真走殺臺山路上人要識婆婆親指處一回舉首一回新地藏恩臺山路上婆往往人問過末後趙州知一言便勘破雲蓋智是箇遊臺發問端婆婆指路盡顢頇可憐眼裏無筋骨却把時人一樣看佛國白撥動烟塵老古錐坐觀勝負有誰知從來古路平如掌自是行人不見歸圓覺演婆指臺山路不差遊人恁麼去無涯趙州勘破歸來後四海五湖同一家草堂清驀直臺山路不迂趙州親去定賢愚古今來往何妨礙未透金塵終是粗三祖宗臺山山下路崎嶇多少行人在半途五里牌邊相借問不知駑馬是龍駒上方益臺山路上白頭婆無限行人幾度過直道玄關人不曉趙州特地斷誵訛雲溪恭叢林老作是無儔凜凜威風四百州一擊鐵關曾粉碎恩大難將雨露酬真如驀直去驀直去不逐指頭不行舊路大丈夫漢乾坤獨步兜率悅本欲平夷道路反成土上加泥而今五湖四海剛被勘婆話迷圓通仙臺山有路是人過兩兩三三借問多要識趙州親勘破舌頭無骨奈渠何枯木成高握金鞭出禁城霜風凜凜馬蹄輕烟塵掃盡歸來後四海行人賀太平普融平五臺山路入嵯峨驀直饒聲指似他更有趙州多事漢歸來道我勘婆婆張無盡勘破誰知老趙州玉鞭鞭起臥金牛臺山今古行人口笑飲清風味轉幽長靈卓兩重問答絶誵訛趙老於中却勘婆若不全身探虎穴安能徹底驗仙陀禾山方趙州親勘破臺山勿兩岐只這老婆子踪跡少人知佛心才燕趙當年有一僧干戈叢裏等閒行定亂不携三尺劒至今天下絶攙搶寶峯祥老婆心切勿交加要路逢渠指不差休問禹門求變化風雷只在葛洪家旻古佛趙州勘破路難過無限平人走似梭日暮臺山空寂寂至今猶未絶誵訛少林通臺山路上老婆禪驀直教人好進前須得趙州親勘破從茲四海路平然雲蓋昌行路難行路難最難難過是臺山唯有趙州公驗正昂頭掉臂總閒閒總閒閒遂府出鉢盂湛堂凖臺山一路坦平自是行人不慣明鏡醜婦之冤智者愚人之患踈山常臺山古路是人遊箇箇尋婆問路頭堪笑趙州才勘破寥寥千古使人愁踈山如玉簫吹作鳳鸞吟惹動遊人離別心一陳東風捲寥廓四方八面少知音佛智裕臺山路坦平婆子苦商量趙州勘破了清風滿大唐高菴悟天下禪和說勘破爭知趙州已話墮引得兒孫不丈夫人人黠過泠地臥徑山杲劈面三拳連腮七掌盡大地人不知痛癢鼓山圭臺山路上人難進獨有趙州親到來勘破老婆回首處從此行人眼不開楚安方續收指路婆婆在五臺禪人到此盡癡呆一拳打破扶桑國杲日當空照九垓西蜀廣道者老婆元是魔王腳三軍不動旗閃爍趙州無柄鐵掃菷掃蕩烟塵空索索石頭回婆子只知指路雞犬被人偷去直得趙州勘了這回緊閉門戶戲魚靜二趙州老老大大不解山中打坐自言去勘婆子倒被婆子勘破善繫無繩約善行無轍迹不戰屈人兵直面當機疾老婆勘破五臺山有誰參透趙州關圓悟勤年老成精不謬傳趙州古佛嗣南泉招魂喪命因圖象良馬追風纍索牽勘破了老婆禪說向人前不直錢天童覺賊是小人智過君子大妄語成便白拈去膽大心粗無你會處稽首趙州大法王主典牛游大用全提似海深魔軍戰退鬼難禁趙州勘破婆婆處草偃風行無處尋南堂興二趙州老子爛泥裏刺勘破老婆叢林受賜婆婆不在五臺山平地行人作易難驀直坦然今古路區區却過趙州關雪竇宗臺山路驀直去趙老見婆無別語勘破回來知不知莫信間人說是非冶父川三月春光上國遊祥雲瑞氣瑣龍樓親從宣德門前過更問行人覔汴州文殊道婆子幾年尋劒客趙州勘破有誵訛解使不由來富貴風流何在著衣多訥堂思一按牛喫草一與賊過梯早知燈是火飯熟也多時遁菴演干戈中有太平基不用干戈始得之若無舉鼎拔山力千里烏騅不易騎明大禪四海同一家兩口同一舌趙州勘破了有理向誰說卍菴顏踞坐臺山古路頭往來雲衲被戈矛趙州提起那羅箭穿過髑髏即便休尼無著總天高地厚人難見海闊山遙只自知勘破却回休借問得便宜是落便宜密菴傑趙州舌頭連天老婆眉毛覆地分明勘破歸來無限平人瞌睡妙慧尼淨智趙州勘婆百發百中趂得老鼠打破油甕佛照光村婆暴富誑唬閭閻趙州賣俏矢上加尖或菴體驀直驀直青天白日勘破了也一文不直月林觀本是山中人愛說山中話五月賣松風人間恐無價蒙菴嶽臺山路上箇婆婆平地無風起丈波下却斗門通底閘更無一滴到黃河無凖範勘破婆子面青眼黑趙州老漢謾我不得文殊業趙州言破勘心頭打額頭如何無轉智特地覔冤讎野雲南增收趙州問僧甚處來僧云摘茶來師曰間頌曰道著不著何處摸索背後龍鱗面前驢腳反身筋斗孤雲野鶴阿呵呵雲蓋智增收趙州一日敲火問僧曰老僧喚作火汝喚作甚麼僧無語師曰不識玄旨徒勞念靜法燈欽別云我不如你頌曰趙州眼放光爍破四天下鉢盂上安柄至今成話老衲證直下是非著不得著不得處好承當木人昨夜通消息南海波斯過大唐野菴璇增收趙州因一婆子令人送錢請轉藏經師受施了却下禪牀轉一匝乃曰傳語婆轉藏經已竟其人回舉似婆婆曰比來請轉全藏如何祇為轉半藏頌曰走下禪牀行一轉看了如來五千卷婆子年高眼尚明夜深月下穿針線慈受深左轉右轉金剛寶劍全藏半藏由基發箭紅心心裏中紅心驚得須彌頭倒旋正堂辨趙州一匝天輪轉婆子知音未足酬普為人天開正眼大千沙界一毫收足菴鑒不知兀坐常輪轉空下禪牀繞一遭背面却言虧一半老婆惡業自家招天目禮趙州劒氣衝牛斗婆子神符懸肘後一條拄杖兩人扶好手手中誇好手殺六巖輝增收趙州因僧侍次遂指火問曰這箇是火你不得喚作火老僧道了也僧無對復策起火曰會麼曰不會師曰此去舒州有投子和尚汝往禮拜問之必為汝說因緣相契不用更來不相契却來其僧到投子子問近離甚處曰趙州子曰趙州有何言句僧舉前話子曰汝會麼曰不會乞師指示子下禪床行三步却坐問曰會麼曰不會子曰你歸舉似趙州其僧却回舉似師師曰還會麼曰不會師曰投子與麼不較多也頌曰我喚作火汝即不可已道了也喚作甚麼楊無為趙州喚作火全身入荒草我今不是渠渠今正是我月林觀
