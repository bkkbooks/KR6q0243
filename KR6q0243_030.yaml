body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第六世之餘清源下第五世之餘曹洞湖南龍牙山居遁禪師嗣洞山初參洞山一日問如何是祖師西來意山曰待洞水逆流傳燈錄作待洞水泝流即向汝道師始悟厥旨頌曰龍牙未息狂心地徧問諸師不肯休先達愍他親意切直言洞水逆須流汾陽昭古源無水月何生滿岸西流一派分葱嶺罷詢熊耳夢雪庭休話少林春投子青續收洞水無緣會逆流見他苦切故相酬西來祖意實無意妄想狂心歇便休橫川珙龍牙在翠微時問如何是祖師意微曰與我將禪板來師遂過禪板微接得便打師曰打即任和尚打且無祖師意又問臨濟如何是祖師意濟曰與我將蒲團來師乃過蒲團濟接得便打師曰打即任和尚打且無祖師意後有僧問和尚行脚時問二尊宿祖師意未審二尊宿道眼明也未師曰明即明已要且無祖師意頌曰龍牙山裏龍無眼死水何曾振古風禪板蒲團不能用只應分付與盧公盧公付了亦何憑坐倚休將繼祖燈堪對暮雲歸未合遠山無限碧層層雪竇顯子卿不下單于拜始末常遵漢帝儀雪後乃知松栢操事難方見丈夫兒佛性泰續收西來祖意問重重禪板蒲團用處同休把虗空增粉飾他家肯重似盲聾枯木成駕與青龍不解騎人人盡道阿師癡爛泥中有傷人刺三度曾施陷虎機瞞菴成蒲團禪板對龍牙何事當機不作家來意成褫明目下恐將流落在天涯虗空那挂劒星漢却浮槎不萌草解藏香象無底籃能貯活蛇今日江湖何障礙通方津渡有船車天童覺增收龍牙因僧問二鼠侵藤時如何師曰須有隱身處始得曰如何是隱身處師曰還見儂家麼聯燈訛作還見文殊麼頌曰寒月依依上遠峯平湖萬頃練光封漁歌驚起沙洲鷺飛入蘆花不見踪丹霞淳堂堂成現密密難見二鼠雖黠莫逢其便藤枝透出未生前正眼當陽巧回換龍牙老機如電遇賤即貴貴即賤圓悟勤增收龍牙因韶國師問天不能蓋地不能載時如何師曰道者合如是累經十七次問師曰若為你說恐爾後罵我去在韶後住通玄峯因澡浴次忽省前話具威儀望龍牙禮拜曰當時若與我說破我今日定罵他頌曰赤骨力寸絲不掛淨倮倮兮赤灑灑浴出低頭滿面慚為我說時定相罵卍菴顏大海中心泛銕船隨波逐浪浪滔天順風到岸無人識江北從來使銕錢東谷光增收龍牙因僧問如何是祖師西來意師曰待石烏龜解語即向汝道曰石烏龜語也師曰向汝道什麼頌曰石龜無語是知音無耳髑髏深夜聽天曉便藏無影樹太陽徧照不能尋投子青烏龜誰道不能言妙語浪浪只自宣說盡西來祖師意知音弗遇也空然本覺一增收龍牙因僧問十二時中如何用力師曰如無手人行拳頌曰如人無手欲行拳誰敢當頭輒向前二六時中常若此不須更問祖師禪本覺一增收龍牙因僧問古人得箇什麼便休去師曰如賊入空室頌曰枯松野鶴呌衡門雪滿寒林入夜聞只箇生涯無所有不妨巖下有溪雲枯木成買帽相頭量才補職明眼衲僧面前不識真淨文綠林強士正心狂心中妄意室中藏不覺投虗入空屋懡㦬徒然笑一場本覺一增收龍牙因僧問師子返擲時如何師曰返擲且止你道還怕文殊麼曰非但文殊佛亦不怕師曰爭奈被文殊騎何曰文殊騎者不是師子師曰返擲事作麼生曰應用無虧師曰正是文殊騎者返擲事作麼生僧無語頌曰眾獸之中師子兒善能哮吼震全威縱橫妙用能返擲爭奈文殊坐著伊于闐國王牽不住善財童子却生疑將謂世界無過者也被六塵吞著時智門寬撫州疎山𭅖仁禪師嗣洞山聞福州大溈安和尚示眾曰有句無句如藤倚樹師特入嶺到彼值溈泥壁便聞承聞和尚道有句無句如藤倚樹是否曰是師曰忽然樹倒藤枯句歸何處溈放下泥盤呵呵大笑歸方丈師曰某甲三千里賣却布單特為此事而來何得相弄溈喚侍者取二百錢與這上座去遂囑曰向後有獨眼龍為子點破在後聞婺州明招謙和尚出世徑往禮拜招問甚處來師曰閩中來招曰曾到大溈否師曰到曰有何言句師舉前話招曰溈山可謂頭正尾正祇是不遇知音師亦不省復問樹倒藤枯句歸何處招曰却使溈山笑轉新師於言下大悟乃曰溈山元來笑裏有刀遙禮悔過頌曰樹倒藤枯伸一問呵呵大咲有來由羚羊掛角無尋處直至如今笑未休海印信樹倒藤枯呵呵大咲不許夜行投明須到游子貪程去不歸及至歸來親已老親已老不須嗟猶勝當日未還家佛慧泉江邊閒把直鈎垂也有金鱗上釣時三跳若能乘羽化免教漁父皺雙眉枯木成藤枯樹倒意如何一著分明舉示他笑裏有刀須錯解正頭正尾却仙陀道場如冷刃吹毛笑裏來爍迦羅眼不容裁一目金龍曾舉爪髑髏覺痛頂門開大洪預若將此語定綱宗孤負明招獨眼龍笑裏忽分泥水路方知千里共同風徑山杲有句無句藤倚樹白飯元來用米作高樓吹笛柳如烟滿地春風落飛絮鼓山珪樹倒藤枯意若何溈山開口笑呵呵可憐三尺龍泉劒喚作陶家壁上梭佛性泰二索却布單錢了行行意氣轉高不得明招點破焉知笑裏有刀樹倒藤枯問大溈呵呵大咲顯全機布單賣却盤纏了秋夜寒來怨阿誰文殊道二却使溈山笑轉新笑中有刃暗傷人曹溪路上奔馳者由更區區苦問津樹倒藤枯笑未休箇中誰解辨宗由堂堂蹉路溈山老空去空來一肚愁楚安方二添得溈山笑轉新當時覿面已呈君明招漏泄溈山句無限風光付與人續收有句無句明來暗去活捉生擒捷書露布如藤倚樹物以類聚海外人參蜀中附子樹倒藤枯切忌名模句歸何所蘇嚧蘇嚧呵呵大笑破鏡不照大地茫茫一任𨁝跳護國欽呵呵大笑不尋常須得眉間也放光不是明招重注脚叢林洎合錯商量浮山遠呵呵大笑意難論樹倒藤枯問有因縱向明招言下悟眼開只是舊時人真淨文仰之彌高鑽之彌固昭昭明明如藤倚樹大咲呵呵跨白牛碧雲繚繞無尋處龍牙言有句無句如藤倚樹玄沙斫牌禾山打鼓君不見雪竇有語兮要與人天為師面前端的是虎尼無著總笑裏憑誰眼豁開龜毛須向火中栽脚跟有路雲泥隔千里區區謾往來湛堂深尀耐溈山老鬼精垂鈎便要釣鯤鯨幾多頭角為龍去鰕蟹依前努眼睛中菴空掀翻海岳求知己雪刃橫身立太平野老不知堯舜力鼕鼕打鼓祭江神木菴永有句無句如藤倚樹回避無門毒蛇當路樹倒藤枯句歸何處明眼衲僧一場罔措天目禮增收琅琊覺云有句無句如藤倚樹樹倒藤枯好一堆爛柴頌曰布單酬價見明招滴水如今未合消不是咸通年後事住山爭得有柴燒張無盡轉得眼來十萬里千江匝匝寒波起若能借便使風帆無明海裏尋知己中菴空領得溈山笑裏刀方知不枉到明招元來樹倒藤枯後了得三年五載燒石林鞏增收疎山因僧問如何是諸佛師師曰何不問疎山老漢頌曰養子方知在上慈親言無味外人疑欲窮滄海深深處聽取漁家傲莫迷投子青踈山因主事僧為師造壽塔畢白師師曰將多少錢與匠人曰一切在和尚師曰為將三文錢與匠人為將兩文錢與匠人為將一錢與匠人若道得與吾親造塔來僧無語後僧舉似大嶺庵閑和尚即羅山嶺曰還有人道得麼曰未有人道得嶺曰汝歸與踈山道若將三錢與匠人和尚此生決定不得塔若將兩錢與匠人和尚與匠人共出一隻手若將一錢與匠人累他匠人眉鬚墮落僧回如教而說師具威儀望大嶺作禮嘆曰將謂無人大嶺有古佛放光射到此間雖然如是也是臘月蓮花大嶺後聞此語曰我恁麼道早是龜毛長三尺頌曰一文兩文與三文踈山大嶺謾區分須知無縫元無價獨露乾坤聳白雲雲巖因接得風流傅粉郎一朝三度巧梳粧改頭換面無人識元是東村李二娘佛鑑懃鑿壞十方常住地三錢使盡露屍骸羅山古佛雖靈驗未免將身一處埋徑山杲袖頭打領無添減腋下剜襟有短長大庾嶺頭一尊佛踈山兩度放毫光鼓山珪窣堵波成賞匠人工錢一二與三文可憐眼裏無筋者當面定將數目分佛性泰續收清風吹動釣魚船鼓起澄波浪拍天堪笑錦鱗爭戲水到頭俱被釣絲牽丹霞淳三文與匠人每愛佳人笑目青音容常隔一沙汀黃河誰道如今輥波浪無風不掛情崇覺空三兩文與匠人惱惱牛攔昨夜開嶺頭人喚不歸來煩君道與西山月莫照孤燈冷處灰一文與匠人行因感果事須分寶塔凌空直一文要會踈山端的意吾家宗祖在并汾冬瓜蘸雪未為淡匠者三文淡最幽天共白雲曉水和明月流本寂觀鑿開蒼徑造浮圖往復商量價不孤無限落花隨水去夕陽春色滿江湖應菴華臘月蓮花菡萏香三回賞手不尋常直饒會得鬚眉落早是龜毛數丈長密菴傑墮落眉鬚不得塔三文使盡見分踈無端大嶺重饒舌數丈龜毛舉世無月林觀踈山造塔行令今古藂林揀正三錢酬酢相應驀地傳聞大嶺看看臘月蓮花龜毛三尺相慶是則古佛放光非則尋聲弄影方菴顯增收踈山冬至夜有僧上堂問如何是冬來意師曰京中出大黃今訛作京師頌曰京師出大黃熟處最難忘道吾常作舞元是謝三郎丹霞淳京師出大黃不許謾商量貴買還賤賣纔喫便承當懶菴需京中大黃答冬來意杲日麗天盲人摸地肯堂充有問冬來事京師出大黃貪他一粒粟失却半年糧密菴傑京師出大黃見賊便見贓竹杖化龍去癡人戽夜塘松源岳京師出大黃直截為君舉冬至到寒食恰是一百五無際派有問冬來事京師出大黃漢家勳業在樊噲與張良破菴先增收踈山上堂曰病僧咸通年前會得法身邊事咸通年後會得法身向上事雲門出問如何是法身邊事師曰枯樁曰如何是法身向上事師曰非枯樁曰還許某甲說道理也無師曰許曰枯樁豈不是明法身邊事師曰是曰非枯樁豈不是明法身向上事師曰是曰祇如法身還該一切也無師曰法身周徧豈得不該門指淨瓶曰祇如淨瓶還該法身麼師曰闍黎莫向淨瓶邊覔門便禮拜頌曰法身向上法身事我見枯樁眼中刺多年多歲易成精一切處該該不是相逢打鼓弄琵琶知音相見今如此大溈智眼觀東南意在西北撥轉天關掀翻地軸法身向上法身邊間氣英靈五百年膠漆相投箭相拄南山起雲北山雨圓悟勤青青掩映松蘿窟修行超然物外物莫將修竹比喬松不及喬松老風骨佛鑑懃法身向上法身邊會得咸通無後先一箇矬來一箇跛擔為一檐更無偏石溪月增收踈山手握木蛇有僧問手中是什麼師提起曰曹家女頌曰別面不如花有笑離情難似竹無心因人說著曹家女引得相思病轉深慈受深我愛曹家女姿質嗔心猛熾火長然紫羅帳裏深深夜說悟當年四八禪崇覺空增收踈山問僧甚處來僧曰雪峯來師曰我已前到時是事不足如今足也未曰如今足也師曰粥足飯足僧無對頌曰一條官路坦然平無限遊人取次行莫謂地平無險處須知平地有深坑慈受深增收踈山到夾山山上堂師問承師有言目前無法意在目前如何是非目前法山曰夜月流輝澄潭無影師作掀禪床勢山曰闍黎作麼生師曰目前無法了不可得山曰大眾看取這一員戰將頌曰八花毬上綉紅旗百戰場中赤手提一自凱歌歸去國英雄嬴得作清時無量壽增收踈山因韶國師問百匠千重是何人境界師曰左搓芒繩縛鬼子頌曰百匠千重欲問周踈山脫體解相酬當時一眾知誰會直得江西水逆流投子舒增收踈山因靈泉問枯木生花始與他合是這邊是那邊句師曰亦是這邊句曰如何是那邊句師曰石牛吐出三春霧靈不栖無影林頌曰滄海無風波浪平烟收水色虗含月寒光一帶望何窮誰辨箇中龍退骨丹霞淳越州乾峯和尚嗣洞山上堂曰舉一不得舉二放過一著落在第二雲門出眾曰昨日有人從天台來却徑徑山去師曰典座來日不得普請便下座雪竇云雲門祇能一手擡不能一手搦頌曰乾峯舉一不舉二雲門擡手添意氣花開花落任風吹自有馨香滿天地晦堂心聲前一句口如眉佛祖從來總不知昨夜崑崙閒說夢白頭生得黑頭兒丹霞淳黑白分明滿局棊曾無一著有相虧可憐無限傍觀者斧爛柯消總不知白雲端貌出形儀已不真二三分數像當人傍邊有箇無端者第一難謾是眼親保寧勇天台南岳去無蹤更有何人覿面逢東嶺雲生西嶺白前山花發後山紅普融平煑海成鹽終有味敲空作響本無聲崑崙撞著波斯子把手相將海底行慈受深高樓美女一雙雙各向瓊窻坐玉牀綉出鴛鴦呈似了金針深插錦香囊佛性泰波斯捧出海南香白眼崑崙與論量賈客不諳彈舌語只看兩箇鼻頭長佛智裕東嶺西巖路暗通有誰曾見老乾峯雲門把手雖同步白雲飛蓋月含空楚安方續收莫向乾峯頂上參言無童子却相諳放開一線通消息走徧天台與嶺南枯木成春蘭與秋菊一一各當時底處無回互怨誰分髓皮風來烏已覺露重鶴先知為問何能爾渠儂初不知圓悟勤乾峯撒手懸崖韶陽天然標格謂言只有猴白那知更有猴黑佛心才相見不須嗔君窮我亦貧謂言侵早起更有夜行人萬年閑明頭暗合緩放急收脚手忽露針線還偷舉一不舉二天台過徑山嚼他桃李核終是損牙關月堂昌乾峯上堂法身有三種病二種光須是一一透得始解歸家穩坐須知更有向上一竅在雲門出問庵內人為甚麼不知菴外事師呵呵大咲門曰猶是學人疑處師曰子是甚麼心行門曰也要和尚相委師曰直須與麼始解穩坐門應喏喏頌曰鋪主將鍮試買人謂言難似此金真買人拂袖先行去滿面慚惶不敢嗔白雲端垂鈎四海釣獰龍格外玄談知己從相見披衫帶席帽不妨把手上高峯佛性泰三種病兮二種光法身於此露堂堂時人不會箇中意猶把法身謾度量楚安方續收動絃別曲聞一知十手榒手檯以膠投漆庵內不見菴外無孔銕鎚不會人生相識貴知音水入水兮金愽金圓悟勤庵內不知庵外事銕額銅頭不相似定花板上打鞦韆猛虎舌頭書卍字瞎堂遠乾峯因僧問十方薄伽梵一路涅槃門未審路頭在甚麼處師以拄杖劃云在這裏僧後請益雲門門拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似傾盆會麼頌曰入手還將死馬醫返魂香欲起君危一期拶出通身汗方信儂家不惜眉天童覺樓閣重重擊不開乾峯劃破露崔嵬十方佛剎全彰處一一門中見善財佛心才須彌頭倒卓大海起清風東弗已搖落西瞿花正紅長靈卓撦破雲門一柄扇拗折乾峯一條杖二三千處管絃樓四五百條花柳巷徑山杲乾峯不用指陳雲門休打骨董自然東海鯉魚築著帝釋鼻孔鼓山珪續收烏龜三眼紅如火一角麒麟快似錐土宿夜遊南贍部泥牛脚下火星飛雪竇宗一人向陸地行船一人向針鋒走馬同時同日到長安其中一箇最尖耍佛鑑懃當面非暗投應機皆直說乾峯與雲門兩口同一舌若是續貂人弄巧便成拙雪菴瑾增收乾峯因雲門到云請和尚答話師曰到老僧也未門曰恁麼那恁麼那師曰將謂猴白更有猴黑頌曰乾峯舉一不舉二雲門握手添意氣為言只有猴白那知更有猴黑晦堂心弦筈相啣網珠相對發百中而箭箭不虗攝眾景而光光無礙得言句之總持住游戲之三昧妙其間也宛轉徧圓必如是也縱橫自在天童覺增收澧州欽山文䆳禪師嗣洞山巨良禪客參禮拜了便問一鏃破三關時如何師曰放出關中主看曰恁麼則知過必改師曰更待何時曰好隻箭放不著所在便出去師曰且來闍黎良回首師下禪牀擒住曰一鏃破三關即且置試為欽山發箭看良擬議師打七棒曰且聽箇亂統漢疑三十年有僧舉似同安察安曰良公雖解發箭要且未中的僧便問未審如何得中的去安曰關中主是甚麼人僧回舉似師師曰良公若解恁麼也免得欽山口然雖如此同安不是好心亦須看始得頌曰一鏃破三關爭知中的難放出關中主移疆還就土雲凍鴈聲孤愁人皆閔戶甜瓜自古甜苦瓠從來苦獃堂定增收欽山因巖頭問如何是真言師曰南無佛陁耶頌曰隨機有問隨機答不是禪兮不是玄後代無端翻譯出却將梵語作唐言退耕寧增收欽山與巖頭雪峯同到德山一日問德山曰天皇也恁麼道龍潭也恁麼道未審和尚作麼生道山曰汝試舉天皇龍潭道底看師擬進語山便打師被打歸延壽堂曰是則是打我太煞巖頭曰汝恁麼道地後不得道見德山來法眼別云是則是錯打我頌曰老倒忘機太作家古今皆貴絕纖瑕天皇一脉龍潭現湧出靈源萬路差差切屬欽山猶定動得無言說至今跨汾陽昭老將交羅事一期於中得失少人知欽山若棒無言說若更非言更是非延壽慧增收高安白水本仁禪師嗣洞山上堂老僧尋常不欲向聲前色後鼓弄人家男女何故且聲不是聲色不是色僧問如何是聲不是聲師曰喚作色得麼曰如何是色不是色師曰喚作聲得麼僧作禮師曰且道為汝說答汝話若向這裏會得有箇入處頌曰色自色兮聲自聲新鶯啼處柳烟輕門門有路通京國三島斜橫海月明丹霞淳聲出虗色生無聲前色後轉塗糊間不容𩬊安可名模堂堂圓應沒錙銖巧張爐鞴費分疎爭如棒下無生忍聞見馨香滿道途圓悟勤增收明州天童咸啟禪師嗣洞山簡大德問學人卓卓上來請師的的師曰我這裏一屙便了有甚麼卓卓的的曰和尚恁麼答話更買草鞋行脚好師曰近前來簡近前師曰祇如老僧恁麼答過在甚處簡無對師便打頌曰卓卓的的一屙便息老鼠舞三臺猫兒吹觱篥烏龜舉首唱巴歌一二三四五六七雪竇宗增收大童啟因僧問如何是應用無虧底眼師曰恰如瞎一般頌曰盲聾瘖瘂逈天真眼似眉毛道始隣昨夜東君潛布令黃鶯啼處綠楊春丹霞淳增收京兆府蜆子和尚嗣洞山混俗閩川不蓄道具不循律儀冬夏一衲逐日沿江岸採掇鰕蜆充腹暮即宿東山白馬廟紙錢中居民目為蜆子和尚華嚴靜禪師聞之欲決真假先潛入紙錢中深夜師歸嚴把住曰如何是祖師西來意師遽答曰神前酒臺盤嚴放手曰不虗與我同根生頌曰神前酒臺盤鐵彈大如拳一擊便擊碎不直半分錢圓悟勤神前撥紙問西來直截當機指酒臺赤膊袒肩頭面禮禍從天降不成灾瞎堂遠摝蜆撈鰕昧己靈那堪古廟著渾身擡頭那畔空狼籍討甚多年鬼眼睛東野敷紙錢堆裏可憐生臭口纔開便葛藤蕩盡鬼家窮活計至今古廟絕人行東山源增收瑞州九峯普滿禪師嗣洞山問僧近離甚處曰閩中師曰遠涉不易曰不難動步便到師曰有不動步者麼曰有師曰爭得到此間僧無對師以拄杖趂下頌曰雲重重又水重重步不曾移到九峯遠涉若還言不易主人却在半途中雪巖欽增收台州幽棲道幽禪師嗣洞山一日斂鍾上堂大眾纔集師乃問甚麼人打鐘僧曰維那師曰近前來僧近前師遂打一掌却歸方丈臥投子青云然自急須逃古今皆有行窮絕處試問傍人不識下情果然獲有既從相問急索端由不顧危亡得他假難雖獲小利也是暗地傷人不為好手這僧雖然失利蓋為自不守分致禍臨身未為分外然雖如是終是平人橫遭羅網自有傍人證據在且道證據箇甚事乃云東家不了西舍受殃復頌曰驀路相逢借問由寸心莫便與他酬雖然重檐教人代終是慚顏暗地羞六祖下第七世之一南嶽下第六世之一增收汝州南院慧顒禪師亦曰寶應嗣興化上堂諸方只具啐同時眼不具啐同時用時有僧便問如何是啐同時用師曰作家相見不啐啐同時失僧曰此猶未是某甲問處師曰汝問處又作麼生僧曰失師乃打之其僧不肯後於雲門會下聞別僧舉此話方悟旨却回參省師已圓寂遂禮風穴和尚穴問曰汝當時問先師啐話後來還有省處也無曰已見箇道理也穴曰作麼生曰某甲當時在燈影裏行照顧不著穴曰汝會也此依傳燈所載五燈會元少異乃曰諸方秪具啐同時眼不見啐啄同時用師曰作家不啐啄啐啄同時失曰此猶未是某甲問處師曰汝問處作麼生僧曰失師便打其僧不肯後於雲門會下聞二僧舉此話一僧曰當時南院棒折那其僧忽契悟遂奔回省覲師已圓寂乃謁風穴穴一見便問上座莫是當時問先師啐啄同時話底麼曰是穴曰汝當時作麼生會曰某甲當時如在燈影裏行相似穴曰汝會也頌曰不將佛法當人情驗盡諸方鬼眼睛縱使作家不啐依然錯認定盤星笑翁堪同時啐不同時石火電光猶較遲燈影裏行今已會蹉跎非是落便宜雪巖欽增附雲居悟云且作麼生是啐同時眼若得眼明其用自備又道作家不啐啐同時失何故不啐所以道子若哮吼其母即喪諸人還明得麼乃頌曰子若哮吼其母即喪全歸其子十方通暢大用現前理自然何必起心作模樣更若不會雲居拄杖增收南院上堂赤肉團上壁立千仞僧問赤肉團上壁立千仞豈不是和尚道師曰是僧便掀倒禪床師曰這瞎驢亂作去聲僧擬議師便打頌曰掌中擎日月舌上覆金錢壁立爭千仞毫光徹梵天鼓山珪赤肉團邊用得親主賓有理各難伸兩箇駝子相逢著世上如今無直人徑山杲電光影裏緇素區分纖毫不犯總教滅門木菴永日月無光殺氣浮揭天鼉鼓戰貔貅捷呼獲下真番將那箇兒郎不舉頭虗堂愚增收南院問僧名什麼僧曰普參師曰忽遇屎撅時如何曰不審師便打頌曰兩箇屎撅合作一團熏天炙地誰能齅千古藂林作話端西山亮增收南院因僧問古殿重興時如何師曰明堂瓦插簷曰與麼則莊嚴畢備也師曰斬草蛇頭落頌曰縱奪之機安可測隨言生解實堪悲曉來一陣春風起吹落庭花三四枝海印信重興古殿辨來風瓦插重簷氣象雄怪得人前多意氣他家無法在胷中西禪寂增收南院因僧問寒暑到來時如何一作問日月迭遷寒暑謝還有不涉寒暑者麼師曰紫羅抹額綉腰裙曰上上之機今已曉向下之機事若何師曰炭庫裏藏身頌曰紫羅抹額綉腰裙傾國風流宛勝秦玉笛插藏人不見夜深吹起鳳樓春雪堂行
