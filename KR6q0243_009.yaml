body:
  text: 宋池州報恩光孝禪寺沙門法應集元紹興天衣萬壽禪寺沙門普會續集祖師機緣六祖下第一世南嶽懷讓禪師嗣六祖初往曹溪參六祖祖問什處來師曰蒿山來曰什麼物恁麼來師曰説似一物即不中曰還可修證否師曰修證即不無污染即不得曰只此不污染諸佛之所護念汝既如是吾亦如是頌曰因師顧問自何來報道嵩山意不回修證不無不染污撥雲見日便心開汾陽昭玉在池中蓮出水污染不能絶方比大家如是若承當洞庭一夜秋風起佛印元戴角擎頭與麼來鐵圍山嶽盡衝開閻浮踏殺人無數驀鼻深雲拽不回保寧勇嵩頂來來恁麼來不中一物早塵埃便歸南嶽磨甎片照得追風馬子回佛國白續收是什麼物恁麼來此中何假拂塵埃瞪目看時還不見謾將明鏡挂高臺大洪恩二説似一物即不中風從虎兮雲從龍此事由來非草草休言無法是真宗什麼堂堂與麼來當機覿面不迂回經行坐臥非他物自是時人眼不開本覺一當堂古路白雲漫碧眼黃頭尚未諳無孔笛兒氈拍板輕輕吹破御街寒正堂辨説似一物即不中八年方契賣柴翁大都模樣無多子歷劫如何用得窮朴翁銛直言發足自嵩山蕩蕩乾坤任往還一物尚無寧有似倚天長劒逼人寒無際派讓和尚居南嶽時馬祖住傳法院常日坐禪師知是法器往問曰大德坐禪圖什麼曰圖作佛師一日乃取一甎於彼菴前磨曰磨此何為師曰磨作鏡曰磨甎豈得成鏡師曰坐禪豈得成佛曰如何即是師曰如人駕車車若不行打車即是打牛即是於是悟旨於言下遂印心傳法符西祖讖馬駒踏殺天下人之語南宗闡於江西頌曰磨甎作鏡慕同音來問分明示本心才喚木人回面指犁牛耕出古黃金汾陽昭磨甎作鏡不為難忽地生光照大千堪笑坐禪求佛者至今牛上更加鞭佛印元死馬醫來無用處車牛腦後更加鞭皮穿骨綻還知否任重應知角力全保寧勇磨甎作鏡相席打令一切魚龍知水為命旻古佛坐禪成佛心中病作鏡磨甎眼裏華一掣牢關金鎖斷等間信步便歸家馬駒子實堪誇自從胡亂後著處是生涯佛燈珣續收打車即是打牛是鼻孔遼天也被穿已向人前輸肺府可憐今古妄加鞭懶菴需車牛腦後痛加鞭棄却黃金抱碌甎逐惡隨邪至今日即非心佛錯流傳笑翁堪平生心膽向人傾過犯彌天已不輕帶纍馬師胡亂後至今錯認定盤星松源嶽坐禪成佛生妄見磨甎成鏡妄尤多打車打牛俱是妄攪得心腸沒奈何橫川珙萬法俱忘百念灰等間驀鼻拽將回鏡光一點明如日直得木人心眼開雪巖欽增收讓和尚因僧問如鏡鑄像像成後鏡明向什麼處去師曰如大德為童子時相貌何在曰只如像成後為什麼不鑒照師曰雖然不鑒照謾他一點不得頌曰髑髏裏眼見猶在枯木中龍聲更狂打破虗空光境盡箇中別有好商量慈受深問處鉤深答更幽就身打劫最風流要知一點難謾處江上數峯青欲浮掩室開增收讓和尚因馬大師闡化江西師問衆曰道一為衆説法否衆曰已為衆説法師曰總未見人持箇消息來衆無對因遣一僧去云待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨回謂師曰馬師云自從胡亂後三十年不曾缺鹽醬喫師然之頌曰胡亂三十年不曾少鹽醬江西馬大師南嶽讓和尚鼓山圭見得分明識得親舉來猶自涉途程直饒不犯毫芒者也是拈䭔舐指人徑山杲家貧連子屈事急不由人開口露拴索郎當纍近鄰或菴體做得些兒活計成人前賣弄逞才能直饒踏殺人無數也是西川老鬼精中菴空自從胡亂後更不少鹽醬開口便見膽豈在語言上月林觀石火光中驗正邪等間拈却眼中沙自從不曾少鹽醬敢保渠儂未到家木菴永昔年高甲已登科讀盡人間萬卷書今日一身天地窄思量好事不如無雪菴瑾老婆心切日忡忡恐墮他家虀甕中消息得來胡亂後江西宗派好流通虗堂愚吉州清源行思禪師嗣六祖初參六祖問當何所務即不落階級祖曰汝曾作什麼來師曰聖諦亦不為祖曰落何階級師曰聖諦尚不為何階級之有祖深器之頌曰無見頂露雲攢急劫外靈枝不帶春那邊不坐空王殿爭肯耘田向日輪投子青卓爾難將正眼窺迥超今古類難齊苔封古殿無人侍月鎖蒼梧鳳不棲丹霞淳無階無級見何求奪得曹溪第一籌却向廬陵言米價百行千市競相酬佛國白續收劫外相逢那畔行靈苗叢裏鐵牛耕東風吹散千巖雪空界無雲孤月明成枯木一掬澄潭鏡樣磨無風何必自生波轉身縱不離初際子細看來較幾何雪巖欽增收清源既得法往吉州清源山靜居寺六祖將示滅有沙彌希遷即南嶽石頭和尚問曰和尚百年後希遷未審當依附何人祖曰尋思去及祖順世遷每於靜處端坐寂若忘生第一座問曰汝師已逝空坐奚為遷曰我稟遺誡故尋思爾座曰汝有師兄行思和尚今住吉州汝因緣在彼師言甚直汝自迷耳遷聞語便辭祖龕直詣靜居頌曰尋思去此地清涼離煩暑暮雨朝雲樂太平青山緑水人難覩不難覩深林有箇白額蟲元來却是玄沙虎高菴悟增收清源因石頭問和尚出嶺多少時師曰我却不知汝早晚離曹溪曰希遷不從曹溪來師曰我亦知汝去處也曰和尚幸是大人莫造次頌曰木人來問青霄路石女年尊似不聞攜手相將歸故國暮山岌岌鎖重雲丹霞淳增收清源問石頭汝什麼處來曰曹溪師乃舉拂子曰曹溪還有這箇麼曰非但曹溪西天亦無師曰子莫曾到西天否曰若到即有也師曰未在更道曰和尚也須道取一半莫全靠學人師曰不辭向汝道恐已後無人承當頌曰白雲藏玉鳳紅日照無遼隱隱星攢處無私鎮九霄投子青相見錦江頭相携上酒樓月闌歌笑罷回首上扁舟遁菴演清源令石頭持書與南嶽讓和尚曰汝達書了速回吾有鈯斧子與汝住山頭至彼未呈書便問不慕諸聖不重己靈時如何嶽曰子問太高生何不向下問曰寧可永劫沉淪不慕諸聖解脫嶽便休頭回至靜居師問曰子去未久送書達否曰信亦不通書亦不達師曰作麼生頭舉前話了却曰發時蒙和尚許斧子便請取師垂一足頭禮拜尋辭往南嶽頌曰諸聖不求己靈不重一問太高天驚地動拂袖而回音書肯開從茲盤石上更不過山來佛印元從來祖上作君王子子孫孫代代昌文武百僚都不識只應金殿有尊堂保寧勇千里迢迢信不通歸來何事太匇匇白雲鎖斷巖前石挂角羚羊不見蹤成枯木鈯斧持來便住山斫開南嶽好峯巒兒孫失利將何用又被㗅嚧笑魯般佛國白續收順水使船猶自可逆風把舵世間稀雖然好箇擔板漢到頭未免落便宜海印信千里親傳事不同須憑鈯斧賞優功相如奪璧來還趙可擬當時一信通投子舒清源因僧問如何是佛法大意師曰廬陵米作麼價頌曰出家學道未心開請問宗師大意來却問廬陵米幾價當時心境一時灰汾陽昭烏龜三眼赤祥麟一角尖騰雲生暮雨溪月夜明簾法昌遇巨宋山河四百州交關物物有來由盧陵米價依然在天下衲僧語路綢正覺逸廬陵米價逐年新道聽虗傳未必真大意不須岐路問高低宜見本來人黃龍南廬陵米價越尖新那箇商量不挂唇無限清風生閫外休將升斗計踈親白雲端廬陵米價知不知合下相酬兩莫虧君信入鄽空返者到頭只是愛便宜三祖宗太平治業無象野老家風至淳只管村歌社飲那知舜德堯仁天童覺豐儉時年各不同豈教浮俗妄爭功廬陵米價誰增減貴賤宜當見祖翁草堂清廬陵米價播諸方高唱輕酬力未當覿面不干升斗事悠悠南北謾猜量長靈卓廬陵米價若為酬入市知行趣自由借問年來何所直大宋山河四百州佛燈珣老清源沒縫罅問佛法酬米價衲僧一粒若沾唇拄杖橫擔繞天下高菴悟廬陵米價少知音佛法商量古到今繡出鴛央任人看無端却要覔金針鼓山圭老清源沒縫罅問佛法酬米價差毫𨤲成話霸無面目得人怕徑山杲續收廬陵米價走禪徒五老嵯峨矗太虗堪笑華山圖籍上又添潘閬到騎驢海印信自古廬陵是吉州至今米價沒人酬青山緑水依前在黃葉西風又一秋佛陀遜清源佛法意如何米價酬來太老婆眨上眉毛行大道莫於平地起風波照堂一廬陵米價報君知浩浩塵中識者稀回首不知何處去白雲流水共依依妙峯善衝開碧落松千尺截斷紅塵水一溪飽食高眠人不到日從東出又沉西無準範一派清源出少林信衣到此只傳心尋常示衆無人會盡向廬陵米價尋張無盡六祖下第二世南嶽下第一世江西道一禪師時號馬祖嗣南嶽讓示衆曰汝等諸人各信自心是佛此心即是佛心達磨南天竺國來至中華傳上乘一心之法令法等開悟有僧問云和尚為什麼説即心即佛祖曰為止小兒啼僧曰啼止後如何祖曰非心非佛僧曰除此一種人來如何指示祖曰向伊道不是物曰忽遇其中人來時如何祖曰且教伊體會大道頌曰百萬雄兵出將軍獵渭城不間弓矢力斜漢月初生翠嵓真心心即佛佛心心佛佛心心即佛心心佛悟來無一物將軍止渴望梅林佛國白兔角不用有牛角不用無有無不是處馨香滿道途草堂清風徑葉頻落山高日易沉坐中人不見外白雲深長靈卓素琴張午月流水落花深寂聽希聲徹泠泠太古音佛心才韶光三月景和融錦繡山川處處同碧瓦曉煙寒食雨朱簾晴卷杏花風慈受深敲之即響聽則無聲嚴冬汗濕酷熱冰清試問道途來往客長安去此幾多程黃龍震江西馬祖據通津隻漿孤帆度世人不是大梅看得破也應虗度嶺頭春張無盡無鬚鎖子八面玲瓏不撥自轉南北西東海神知貴不知價留與人間光照夜圓悟勤美如西子離金閣嬌似楊妃倚玉樓猶把琵琶半遮面不令人見轉風流佛鑑勤即心是佛一家風馬祖聲傳四海中靈利衲僧才一顧娘生賦性出天聰佛燈珣即心即佛莫妄求非心非佛休別討紅爐𦦨上雪花飛一點清涼除熱惱徑山杲續收鐵牛耕破洞中天桃花片片出深源秦人一去無消息千古峯巒色轉鮮雪竇宗即心即佛眉拖地非心非佛雙眼橫蝴蝶夢中家萬里子規枝上月三更瞎堂遠即心是佛外忘求心佛圓明不假修雲淨遠山千點翠水和明月一天秋足菴鑒馬祖非心非佛直下更無窠窟今年樹上胡桃勝似去年柑橘正堂辨一簇人煙島外村落花流水月黃昏百川到海應須住畢竟何曾別有源鐵山仁金毛師子生鐵稱槌渾侖無縫切忌針錐無準範馬祖一日升堂百丈收却面前席祖便下座頌曰百丈當時侍馬師對師卷席更無私人天不測為奇特恰是攢鴉捉鳳兒上士瞥然全體現太陽出照嶽峯低汾陽昭升堂馬祖卷席百丈得人半斤還他八兩直饒縫罅全無未免傍觀拊掌泉大道百萬雄師陳相覩何人却會回戈鼓將頭不猛誤三軍可憐正令無行處佛印元升堂卷席迥難儔杲日騰輝處處周堪笑忽雷驚宇宙井中之物不擡頭海印信高登猊座已圓成大智仙陀卷便行師子嚬呻猶似可象王回首更堪驚淨照臻野鴨飛鼻頭裂卷席更來呈醜拙直饒獨坐大雄峯也是天邊第二月楊無為昨日東風偶然惡桃花亂落如紅雨昨夜東風又發狂滿地不知何處去白雲端誰將秦鏡挂高臺妍醜分明皆顯露石女溪邊努目嗔相逢對面難回互成枯木夜深認得歸時路不待天明便出關三尺鏌鋣橫在手至今坐斷大雄山上方益潮來潮子上潮頭手把紅旗逆水流忽被猛風吹退浪此時伎倆一時休佛鑑勤挂得帆來遇便風須臾千里到家鄉臨門上岸逢妻子歡喜情懷不可當龍門遠卷起堂堂露眼睛拈來覿面更相呈鼻頭脫盡誰能把手歸來相並行楚安方續收馬祖升堂百丈卷席正令不從拗曲作直雪竇顯馬駒千里行卷席相隨逐秋風一夜生處處開黃菊石鬼子挂起那吒面赤腳跨定須彌盧鐵牛鞭起黃河岸大洋海底食珊瑚雪竇宗馬祖升堂百丈卷席現成公案不用尋覓草堂清馬祖才始升堂百丈卷席歸去不是拾得寒山有理也無雪處石窗恭風定五湖寬收帆恣意觀波光隨水靜練色逼人寒舉棹逗雲塢移舟上碧灣聲華光祖域千載與人看龍門遠馬祖才升堂百丈便卷席春風一陳來滿地花狼藉高菴悟浩浩長江碧際空片帆高挂便乘風快哉不費纖毫力萬里家山只尺通開善謙捲席因緣也大奇諸方聞舉盡攢眉臺盤躍倒人星散直漢從來不受欺張無垢百丈卷席馬祖升堂作麼作麼驗盡當行月林觀一柄無情雪刃刀當鋒誰敢犯秋毫馬師父子親提掇血噴千山風怒號無準範增收馬祖因僧問如何是佛祖云即心即佛頌曰即心是佛鐵牛無骨戲海獰龍摩天俊鶻西江吸盡未為奇火裏生蓮香拂拂南堂興即心即佛龍入蛇窟出將入相安定國石頭回誰家飯挂空梁指與小兒令看解開即是灰囊當下命根便斷開善謙美如西子離金闕嬌似楊妃下玉樓終日與君花下醉更嫌何處不風流肯堂充即心是佛顢頇淈𣸩菽麥不分光陰飄忽三杯兩碗背爺娘百怪千妖同一窟咄或菴體大海波濤闊千峯氣象雄古今無間斷南北路頭通密菴傑即心便是佛姮娥不畫眉才將脂粉污妍好却成天目禮即心是佛砒霜狼毒起死回生不消一服環溪一增收馬祖因僧問如何是佛祖云非心非佛頌曰碧海珠荊山璧耀乾坤誰別識利刀剪却無根樹萬疊峯巒斂煙霧圓悟勤賣盡田園徹骨貧不知何處可容身樓頭浪蕩無拘檢鐵笛橫吹過洞庭開善謙二月風光景氣浮少年公子御街遊銀牀鋸坐傾杯樂三個孩童打馬毬牧菴忠非佛非心絶謂情玄途鳥道急回程爍迦羅眼存機變莫守寒巖異草青南巖勝分明與麼無無無釋迦彌勒是他奴茫茫宇宙人無數幾個男兒是丈夫月林觀路逢劒客須呈不遇詩人莫獻逢人且説三分未可全拋一片無門開馬祖與百丈西堂南泉玩月次祖曰正與麼時如何丈曰正好修行堂曰正好供養泉拂袖便行祖曰經入藏禪歸海唯有普願獨超物外頌曰三獸渡河深淺別不勞精辨迥然分爭如巨浸張帆者不顧波濤過海門海印信經入藏禪歸海唯有普願獨超物外咄只有照璧月且無吹葉風照覺總經入藏禪歸海稽首皈依合掌頂戴王老師超物外二十年前恁麼來而今去盡間光彩天童覺馬師曾玩月三子左右侍吹箇無孔笛清音聒天地真如詰皎皎凝虗碧沉沉發皓彩秋色共澄清永夜臨寰海修行供養逗圓機聊聞便行超方外馬駒兒端的別萬古定乾坤一言全殺活圓悟勤經入藏禪歸海未是衲僧親道底拂袖前行歸去來擊碎重關門大啓開福寧國清才子貴家富小兒嬌大家出隻手彼此不相饒徑山杲張公養得三箇兒長大不知誰立志呼來月下問蹤由眼睛箇箇皆相似佛性泰續收大機大用銀山鐵壁供養修行眼橫鼻直拂袖便行萬象絶迹敢問諸人誰是端的楮衲秀一箇翁翁三箇兒威音路上偶相擕風前唱起玄中曲千古同聲和莫齊彼一時此一時指鹿為馬證鱉成龜雖然弄巧翻成拙免教間却兩片皮雪竇宗古渡無風下直鉤絲綸意在得鯨鰲馬師言下揚家醜千古兒孫草裏遊湛堂深諸子營家各自肥就中一箇最堪悲滿籃盛墨無人買半夜持歸染皂衣大歇謙諸子生涯各有成從來孝順兩邊生貪歡一夜渾家樂失曉連忙打五更無準範馬祖不安院主問和尚近日尊位如何祖曰日面佛月面佛頌曰日面佛月面佛五帝三皇是何物二十年來曾苦辛為君直下蒼龍窟屈堪述明眼衲僧莫輕忽雪竇顯日面月面左旋右轉大唐擊鼓新羅發箭流水前溪後溪落花三片五片聾人不聽忽靁聲空向雲中看閃電佛慧泉少年公子忽猖狂半夜穿雲入洞房二八仙娥百般巧眼睛之上繡鴛鴦野軒遵日面佛月面佛夜夜朝朝好風物馬駒踏殺天下人軒轅照破精靈窟揚無為大地山河俱是寶不識之人入荒草日面月面佛現前閃爍珊瑚光杲杲白雲端蒲團上端坐針眼裏穿線西風一陳來落葉兩三片保寧勇日面月面佛無私誰薦驪龍頷下珠滿握光明耀牛斗何須按劒立階除照覺總日面月面胡來漢現一點靈光萬化千變真淨文日面月面星流電卷鏡對像而無私珠在盤而自轉君不見鉗槌前百鍊之金刀尺下一絲之絹天童覺日面東兮月面西誰言任運落前溪山桃落盡春歸去猶有子規枝上啼上方益什邡駒子氣生獰蹴踏毗盧頂上行正患脾疼却頭痛病來猶有巧心情張無盡日面佛月面佛大海波翻須彌突兀磕破腦門額頭汗出明眼衲僧未辨明擡頭好看沖天鶻長靈卓丫鬟女子畫娥眉鸞鏡臺前語似癡自説玉顏難比並却來架上著羅衣五祖演東街柳色拖煙翠西巷桃華相映紅左顧右盻看不足一時分付與春風佛鑑勤近日尊位復如何日面月面哩來囉自從舞得三臺後拍拍元來總是歌佛燈珣日面月面空中閃電顧杼停機垛成招箭南華昺日面月面靈光洞現大地山河南州北縣雖是老婆心切那知疑殺監院踈山如日面月面頭頭出現揑聚放開成團成片楚安方續收金烏才唱日方中王道平平觸處通爭奈馬駒生太早依前踏殺太虗空正覺逸日面月面星移斗轉失曉波斯討頭不見翠巖真日面月面突出難辨繡出巧鴛鴦雙雙誰不羡戴月宿蘆華隨波戲水面瞥然飛起碧霄空舉首銀河橫素練雪竇宗日面月面虗空閃電雖然截斷天下衲僧舌頭分明也只道得一半金陵俞道婆打殺黃鶯兒莫教枝上啼幾回驚妾夢不得到遼西典牛遊尊位如何澄潭影裏探秋波日面月面鐵眼銅睛安可辨君不見一聲霹𮦷兮霧長空千眼頓開兮雲收嶽面瞎堂遠朱沙鏡裏開顏笑白玉盤中展腳眠大抵人生難得共得團圓處且團圓佛性泰兩輪舉處煙塵起電急星馳擬何止目前不礙往來機正令全施無表裏丈夫意氣自衝天我是我兮你是你信相修古殿無人到者稀蒲團端坐有誰知不因院主通消息爭得寒光萬里輝中際能尊位如何問最親攢簇不得病源深等間提起軒轅鏡扁鵲盧醫無處尋退菴奇漢州生得馬駒兒病在膏肓不可醫院主無端問安好引他賣弄口脣皮鐵山仁日面佛月面佛西巖樹色含煙東谷華光映日仰視莫窮俯看已老一時分付主林神明眼衲僧無處討天目禮日面月面突出難辨擬欲擡眸空中兩片無準範馬祖因僧問離四句絶百非請師直指西來意祖曰我今日勞倦不能為汝説得問取智藏去僧去問藏藏云何不問和尚僧云和尚教來問藏云我今日頭疼不能為汝説得問取海兄僧去問海海云我到這裏却不會僧回舉似馬祖祖曰藏頭白海頭黑頌曰藏頭白海頭黑明眼衲僧會不得馬駒踏殺天下人臨濟未是白拈賊離四句絶百非天上人間唯我知雪竇顯不知何所問人覔將寶示渠渠不識持來持去問商人不別東西徒費力依舊回自惆悵踏破草鞋多少輛海印信百非四句絶何言黑白分明定正偏師子窟中無異獸驪龍行處浪滔天照覺總湘靈二女神仙格笑倚朱門香陌陌一抹胭脂透臉紅更加十分天真色佛鑑勤四句百非皆杜絶陽春白雪唱彌高風清月皎無雲夜誰把吹毛換寶刀南華昺百非四句絶疏親馬駒踏殺天下人藏頭白兮海頭黑門外金剛笑又嗔圓覺演續收却似暗地箭半夜飛來人不見又似藏鋒筆白日堂堂明不出藏頭白海頭黑琉璃殿上加金碧反思達磨見梁王對面者誰還不識佛鑑勤短帽輕衫宮樣窄舞遍胡笳十八拍曲罷酒闌猶未歸歸來月色和雲白瞎堂遠百非路絶透離微四句情忘發上機竹密不妨流水過山高豈礙白雲飛足菴鑒離四句絶百非西來祖意太離披藏頭白海頭黑叵耐馬師這老賊千古萬古黑漫漫填溝塞壑無人識無禪才父為子隱子為父隱一火白拈誰敢親近藏頭白海頭黑不動刀鎗斷人性命退菴奇離四句兮絶百非𮞏相推過幾曾知這僧擔一簷懵懂換得兩頭𣸩淈歸月坡明增收馬祖示衆云凡有言句是提婆宗以此箇為主頌曰玉轉珠回著眼看有相干處沒相干只將此箇以為主喝一喝云一劒倚天星斗寒石溪月增收馬祖一日封三甕醬令僧馳書寄與百丈百丈集衆上堂開書了拈拄杖指甕曰道得即不打破道不得即打破衆無語丈打破歸方丈頌曰送醬三瓶通遠信當時打破衆還驚父慈子孝誰相委莫道禪家太不情本覺一六祖下第二世清源下第一世增收石頭希遷大師嗣清源思因清源曰有人道嶺南有消息師曰有人不云云曰若恁麼大藏小藏從何而來師曰盡從這裏去終不少他事源甚然之頌曰有消息太沉屈無消息轉埋沒大藏小藏從茲出撒沙撒土無終極甜如蜜苦如蘗明如日黑如漆擊碎千年野狐窟填溝塞壑無人識圓悟勤增收石頭因僧問如何是解脫師曰誰縛汝頌曰未息狐疑問上流如何解脫得心休承君解脫從誰起直得無生是石頭汾陽昭曾把疑情問解脫擬意投師示一訣興慈旨意應機酬是汝當觀第二月般若柔增收石頭因僧問如何是祖師西來意師曰問取露柱曰某甲不會師曰我更不會頌曰覿面相呈便相罵兩箇中有一人嗔要識是非須看取鐵牛耕出玉麒麟靈源清北宗增收終南山惟政禪師嗣北宗秀下嵩山寂因唐文宗大和中嗜蛤蜊一日御饌中有擘不張者帝以為異焚香禱之俄變為菩薩形梵相具足即貯以金粟檀香合覆以美錦賜興善寺令衆僧瞻禮因問羣臣斯何祥也或言太一山有惟政禪師深明佛法博聞強識帝即令召至問其事師曰臣聞物無虗應此乃啓陛下信心耳契經曰應以此身得度者即現此身而為説法帝曰菩薩身已現且未聞説法師曰陛下覩此為常耶非常耶為信耶非信耶帝曰希奇之事朕深信焉師曰陛下已聞説法竟皇情大悅詔天下寺院各立觀音像以答殊休頌曰螺螄蚌蛤類大唐天子心嗜好即深信南無觀世音西巖惠合水和泥底事忙被渠點破太乖張雖然默契君王意已是全身陷鑊湯北海心一點悲心擘不開鑊湯袞處笑盈腮希奇之事朕深信見與君王説法來石溪月蚌蛤之中有應身更言説法亦非真補陀大士唐天子橫眼人無隔宿恩間極雲
